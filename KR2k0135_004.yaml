亦上裂成峽髙聳尤劇透隘門西出堂西闢光明四溢以西洞門髙敞獨甚也堂左右分嵌樓龕至洞門石閾髙阻透竅出始俯瞰門下崖穴層接如累棋已出西望第三門最上下即為中門坐其上倒樹外垂環流下湧較南北門為最暢下洞即在瑯山西麓門西向東之三丈餘輒止仰其上層穴競開懸崖頂凡叠門兩重予初至此望之深苦不上通明日又至亦不知上層可由東達并不知有東洞可級也既而由南峽往百感出山之東囘望見梯已蜿蜒垂空始知上洞由東入但无通中洞道耳向武多何首烏生石山穴中有大至五斤者予於州以十二錢得三枚重約十五斤土人皆以為馬梹榔云十八日始别向武向州東過紅石崖下直東即出東隘可五十里至舊州又三十里為刀村又三十里為土上林縣予從鎮逺道乃南入山五里南踰石山脊亦置隘門曰峺腋下嶺入土山峽東南二十五里宿銅槽村十九日曉起半里過寧墟從南峽去抵天燈墟聞有營懷洞乃龍英分界為左右二江脊東十四里飯龍瀨村地已鎮逺屬初至村遥見屋角黄花燦爛以為菊疑無此盛逼視之乃細花叢叢不知其名又見白梅一樹折之固李也黄英白李錯紅霜葉中亦仲冬一竒景東十七里又與石山遇循南崖入崖上石竇歴亂下累石屬南山傍崖設隘門南北兩石山復峥峥立共一里抵鎮逺州州屬太平府在郡東北二百里二十日鎮逺東一里出石山隘東北六里山峽開東西界俱深木宻藤䝉障不辨土石北七里東踰土山嶺共二里為鎮逺佶倫界東四里宿佶倫州二十一日東南二里有岐西南溯大溪乃結安養利大道為佶倫入郡者正南一里東折入土山峽其處西為鎮逺州來所踰石峯峭聚如林東為土山自佶倫北南繞而西遥裹西面石峰中開大塢亦自西南轉北去東三里登南嶺巔東望盤谷東復有石山遥列自東北環自西南踰嶺東南四里一村倚東山麓為都結舊州其站夫絶黠詭與佶倫互委往返者凡五日乃散步村前東隨溪入山峽里餘水西南轉墜深峽中東峯崖下有兩洞南向東洞頗寛邃一圓石界門為兩右門為大右入深十丈髙三丈濶如之後壁北轉漸隘黑而中若穹然无炬不能入出從左南擴復分兩岐一東北一東南皆不深然明爽透徹有上下旁穿者上則青石穹覆盤旋竟尺圓宕宻布无餘地又黄石倒垂其間紋色俱異此中一異境也二十七日夫始至從舊州東北七里上一嶺嶺畔多叢木木中行嶺上者三里林木少斷處下瞰左右旋谷中木合葉阻飛鳥不能墮下一里木山盡黄茅彌望東十里踰二嶺得一平脊東從嶺北行漸入叢木出山南又度一脊南望皆石峯排列東南一峯尤峻出衆峯上過脊稍下輒東上直造前所望東南峻石峯北始東南下一里半及塢底兩崖壁立叢木沈翳循水穿峽一里峽流南滙成陂直潄峯足又一里始東南出峽東十三里都結州治倚南山麓土守農氏求余作兩院申文留飲三日十二月初二日乃行東五里一石峯東峙峽中先是南北兩界山自州西八里即排闥而至至此則東石峯中峙塢始盡由石峯北東走北塢十二里復穿山峽峽甚逼石骨稜稜刺人趾不堪著足出峽路忽降而下已復南轉石壑中髙下亂石共三里山漸開路左石穴曲折墜成兩潭清流中瀦心目怡霽東折五里北渡西來溪溪水穿石壑中路隨之水石交亂從溪北轉入北壑共二里水復自南來又渡之東東一里水復自南而北又渡之乃東向出峽忽墜峽直下者一里下山是為龍安界亦為太平南寧兩郡分壤處乃知都結地直在西山頂也北溯溪一里得巖村居民始有瓦房髙櫈如見漢儀矣南行六里抵西界石山下峰皆尖若卓錐岩有中空者行石山下嵌石中南四里乃循東界土山東南五里宿巴潭村黄姓家初三日東南踰土山共三里溪自西北石山下東來㶁㶁有聲南隨溪一里西南平壑大開西界石山至此南盡而石猶未盡于是平疇曲塍中怪石森森佹離佹合高下不一流泉時潄之環以畦塍使置一椽其中石林精舍勝无敵此者行石間一里得村曰把定東北六里至隆安縣縣城在右江西南岸予前至南寧入郡堂觀屏間所繪合郡圖此縣繪右江北故余自都結來以為必渡江邑抵邑至此乃先邑後江非身遊其域則縣郡圖殊不足憑也地多巨竹徑尺餘土人以為牢柵婦人每担四竹筒汲於溪筒節長至四尺縣北關外為鞏閣右江自西北來經閣下東去江涯深峭遥望竟不之見涯下得南寧舟期明日發初四日舟忽改期初八日遂以初五日定担夫為步行計初六日夫至始行出城南六里土山南盡一石山如錐中央立南六里又抵一石山下山自北遥望若屏列近循其西麓愈見平展已繞其南復東向三里山忽前東西兩壁前環中央則北壁後遜皆削崖布空三面圍合南獨缺前復有土岡横接兩峯盡處為當門閾焉先按百粤志記隆安有金榜山合沓成城至是心異其山問之皆不知所謂金榜者問此山何名曰石巖山也北半里踰土岡下直抵北崖脚東崖上兩裂透壁光若日月髙懸又望西崖頂裂罅層懸叠綴嵌空天半乃先從北崖麓入一門門南向嵌壁可層累上内不甚寛而外皆叠透連躋二重猶飛軒下臨爽朗可憩左轉一罅西裂最深直自崖巔及麓底扳夾縫僅可脅肩上乃下趨西崖懸扉門東向仰眺皆崇崖莫躋惟北崖有可扳線痕乃逆上兩盤短峽下復上始凌洞門門以内隙西北穹起門外隙直從崖麓墜下峽深數十尺前巨石立掩之故自下望祗知崖石懸立不復知内有峽也然峽壁峻削俯不能下欲扳入門内隙亦傾側難措手内窺漸暗于是從舊法扳縁下南出大道過路左魚奥村村人勞予曰遊金榜大洞樂乎余始知金榜即此山亟問大洞云何曰是山三面環列惟西面如屏大洞在前崖後髙峰半中闢四門宏朗靈透予乃悟所遊者為前崖小洞尚非大洞也東南七里右江自北來隨之南下抵江畔一水西自石峽中來注水亦深廣可勝舟但峽中多石不能入耳下有渡舟曰龍塲渡渡溪東南二十六里至那同村宿初七日東南三十七里抵平陸村已為宣化屬暮黑行四里至那吉土人呼為屯吉云初八日二十三里至宋村即來時左右二江夾合處南面臨左江為大果灣宋村正在兩江夾中寔即古之合江鎮土人莫存其名矣東一里即右江口路從東北一里半渡右江南望兩江合處在半里外正猶前日舟過右江口内望此地也渡右江東北四里雨阻王宫村初九日淋漓雨中僅行二十三里煨濕木爇衣羅氓村初十日東南十五里至南寧崇善寺聞静聞永訣事歿在九月二十四日酉時止隔余行一日也寺僧引至窆骨所拜哭之南顧橋上顧奴行李適至遂寓城外梁店一别南寧已七十五日矣徐霞客遊記卷四上欽定四庫全書徐霞客遊記卷四下明徐宏祖撰西南遊日記六廣西十一日余在南寧行道莫決聞静聞訃音必窆骨雞足山遂至崇善寺拜揀骨起置大竹撞間北取慶逺府由黔入滇道十九日乃行以積日雨阻今始得夫也出南寧朝宗門東北六十里至施湴驛二十日由施湴驛東北十七里為韋村朝著山負扆列村後按郡志東八十里有横山髙險截横江即此山南走截江特立者也宋置横山寨為市馬所又十七里溯流入山峽峽東處截塘堰水兩崖山甚逼曰關山土人又名為山心按志崑崙關在郡東九十餘里必此地无疑然土人皆謂崑崙關在賔州南謝在杭百粤志亦謂在州南十里按在賔州南者乃古漏關非崑崙關也世因狄武襄駐賔州以上元饗士夜二鼓破崑崙遂以賔州古漏當之而今在南寧者皆以崑崙為關山在賔州者又以古漏為崑崙若崑崙果去賔州十里則兩軍已對壘武襄十日駐飲二鼓起破之及曙反不足為神竒矣又十五里抵長山驛又十里宿裏段墟二十一日北十里東入一隘門門以内屬賔州為柳州南寧分界處土人名隘為界牌嶺又指為崑崙關按志崑崙為南寧地去郡東九十五里此與賔州分界去南寧已一百二十里今經行者見其處有隘遂以崑崙當之故西事洱云崑崙關不甚雄險其上多支徑欲守崑崙須慎間道亦誤謂此也又十六里小水自南來東渡之為上林縣境自界牌嶺至此皆屬賔州獨此水東又為上林屬以上林思籠一驛孤懸其中也過橋東北升陟岡陀四里抵思籠其地東西南皆賔州境惟西北五十里達上林驛南面曰髙尖山北面崇山並障東曰北斗山西曰晒麯嶺遥山層叠正西者曰陸䝉山溪自界牌嶺東北至此扼於北山遂西南去惟陸䝉隔於溪西也由思籠東下塢南北皆崇山逼夾乃髙尖北斗二山東垂也東二里半至二山度脈脊水遂分二派脊東北者入都泥江西南者入右江為黔鬱兩江脊踰脊隨水行峽中峽甚束半里稍下復為賔州界蓋賔州之地東西夾思籠一驛於中屬上林南界者横過僅七里耳既下山愈逼路益東轉已越髙尖山東麓按志賔州南四十五里有古漏山古漏水出焉其關曰古漏關當即此地然土人无復知者隨水東北出峽三十里至山口溪北山東盡溪南山亦漸東南轉其東平疇齊望天嵐空豁萬山扼塞中乃有浩蕩區東可十五里至賔州州在平楚中謝肇浙謂崑崙在州南十里此何據也余取三里道從山口北渡溪二十里至公村二十二日北越山七里西望雙峯峻極雲表者大明山也山在北斗山西北為上林武縁分界北渡大明山大溪共八里登思落墟西北二十五里至開籠山一名雞籠由此西二十里可抵上林縣余自隆西嶺入土山崇卑不一皆壤阜无片石至此復睹崢嶸面目矣北入石山峽中山千百為羣離合競變有分三岐者東岐大而髙中次之西岐特鋭細若竹枝詭態尤甚有聳立衆峯間卓如簪筆者如此者五里北至洋渡大溪由上林西北崇山中東流至此直逼溪北石山下又一溪北自三里山峽中南向入大溪二流合其溪愈大循石山東抵遷江入都泥江焉舟渡北山下稍東溯南來溪西岸入峽十里峽復大開四山為大塢一峯當塢起平疇中道經其西北三里度桂水橋水自西北潄崖南崖瞰溪臨橋上又二里抵三里城城建於萬厯八年設參府移南丹衛於此以鎮壓八寨云三里東西皆石山排列自後營分支南下中有土山一支至此盡參府即倚之建牙城久頽且无樓櫓鎮江陸參戎鎮此六年増緝雉堞創三門樓南門外又建南樓壯一方形勢又前則東西二溪交於滙水橋俱發源後營東西谷西大東稍遜合而下洋渡而獨山岩又中峙為下流鑰前又有獨山村之山為鑰第二重三里四境南踰洋渡抵雞籠山共二十里北過後營抵分脊嶺共五十里東抵周泊隘共二十五里西抵蘇坑共四十五里縱横皆七十里名三里者以昔為賊踞王文成平八寨始清出之編户三里一曰上无虞二曰下无虞三曰順業里曽置鳳化縣隨廢設衛與參府鎮之田糧初輸衛後收歸上林縣民以不便復紛紛議歸衛矣三里以洋渡為聖門李依江西自上林大明山發源東至此横為洋渡渡南石峯雜立若建標列㦸渡之北則石峰迴合中開一峽小江自北來南注洋渡下流即滙水橋下合流水也溯小江入峽宛轉石山中北數里兩界山漸拓平疇中開獨山村界其中一石山中立西溪為外案又有獨山巖為内案北面石山愈開土山自北來結為城治其東西兩界石山迴合如抱愈逺愈宻殆天成石郭蓋西來巨脊髙峙為大明山分支東走遶蘇坑南北者為西界障又北轉東抵後營乃中抽土山一支直南四十里結三里城其分支東度者又南轉環遶為東界障故周泊蘇坑兩地為三里東西腋正中與城治相值其處東西最拓由周泊而南漸轉漸合至洋渡西向臨溪則青獅廟後崖也蘇坑南下亦漸轉漸合至洋渡東向臨溪則白崖堡東崖也二崖凑於洋渡為三里城之前門東西兩溪俱在兩界石山内土山北自後營盤伏來兩源遂夾與俱西界者南至羅墟北又合一西來水曲折遶城西抵石村併汎塘水東南出滙水橋下合東溪東界水南至琴岩東又南出琴水橋合一東來水曲折抵東南石峯下又穿流山峽中乃西出合西溪二水合而南瀠兩獨山又南注洋渡東併大江東去西北峽即洋渡東北峽為青獅廟後崕仙廟山在城西四里西面石峯之最近城者石峯中懸三面陡絶惟從西南坳扳崖上則三里四際盡在目中昔有村氓登山採樵遂仙去土人廟祀之汛塘浮石在城西五里汛塘中汛塘者即仙廟山南塢也自仙廟山前西接佛子坳塢中塘長數里水漲時洪流漫衍巨魚逆流上土人利之故障為塘而不畝其地當塘之中有石壑一區上浮如敗荷覆葉支撑旁偃中空漏水一潭遶之石踞其上去水不及三尺極蜿蜒分合勢西北里許即汛塘村村倚北山下汛塘后塢石洞在城西七里西山東來過佛子嶺分為兩支一支直東為汛塘村後峯一支北轉為韋龜山二山東北又環成一塢東以仙廟山為前障中有支峯對其麓一洞東向前隔水内望甚深中可容千人所向東峯上亦有西向洞髙懸嵌側皆翳沈莽中俱未及登韋龜洞在城西十里韋龜村西由汛塘踰佛子嶺北其道近北由羅墟轉石山嘴而南道較逺五里其中羣峯環繞内拓平疇小水自北趨南分流石穴去惟北面石山少開亦獨峯中峙為之標韋龜山中懸東南直北向對之函蓋獨闢山水皆逆捍洵世外丹丘也數十家倚山北麓以造楮為業棲舍纍纍髙下層嵌石隙望之欲仙西即洞門亦北向初入甚隘暗西南下數步透出石隙忽穹然髙蟠内朗四際博通頂有懸空穴天光倒映正中墮北向躋石上乳柱前排環一平臺可布几席拾級南下滙泉碧黛中用周村汲平臺前西多森列柱幢蓋縱横文采瑩潤東則怪石磊落如獅象交踞不少相下内復可左右深入秉炬由右西向入北躋半里轉一竇返三里雖多巖谷固當以是巖冠況巖外村居又擅桃源谷口之勝乎佛子嶺北巖在城西七里汛塘村西佛子嶺者石山分支東出為汛塘仙廟諸峯嶺界其間石骨嶙嶙踰嶺北下韋龜村西塢水南流抵其麓傾入洞洞門北向甚豁中迴環成潭潭水際四壁時久齊溪壑涸入无涓流潭中瀦水特澄深不可測潭四週石壁无隙聞其南隙伏水下大潦從北下撃洞滿不能容則躍出於山南崖門右穿旁竇南抵潭東涯上一石髙䂬潭旁上懸洞頂不及尺若鵲橋坐瞰深潭橋石下更悠然也佛子嶺南巖門南向前有石澗天成若槽橋横其上時澗中无水即由澗入洞洞外髙巖層穹側裂不能宏拓北入洞僅受一人中漸黑而光潔類琢磨者入頗深即北洞洩水道水盛北洞中滿水從下反溢出激湧勢壯故洞與澗皆若磨礪以成云佛子嶺西北巖去佛子嶺西北一里門東向韋龜村西塢水自北來又分流一澗西抵此洞前穴地墜洞乘水上臨外門危朗入可三四丈輒止洞南又一隙傾側下下漸黒轉西南向无炬出聞下與水遇循水西南炬行即透出後山乃知此村水墜穴山透腹與向武百感一轍也琴水巖在城東六里琴水橋北中支土山東南盡處也東溪自北來環山東土山既盡獨露石山一拳石參差層沓山南亦有村數家洞在村西山半門南向初入窪下北進數丈秉炬踰一隘西轉始穹然中髙西透明穴上垂柱繽紛當明處平石濶三丈卧洞底可攀憩躋西穴出則山之西面也下山仍轉出山前騎周玩之洞前稍下又東開一洞門亦南向村人以為積薪寮北又開二巖上下立上者託重巖苦无徑下巖多瀦水然亦不能與前通也周泊隘在城東二十五里東界石山脊也隘當脊中南北崇崖髙壓東踰隘即遷江境其東北石山内為八寨之羅洪洞東南石山内為馬膓洞地无居民皆巨木獨山巖今名砥柱巖在城南四里此地有三獨山皆以旁絶附麗得名一在溪東岸與東界石山近一在此山南五里障溪而東環之獨此山髙正當中立與向武瑯巖絶類省中獨秀无此峭拔透達也巖當山腹南北透南門尤髙迸前有巨石自巖頂分跨而下界洞門為兩正門在東偏門稍西南皆有古虬藤倒掛其上每輕風揺曳香翠欲流巖中合掌起髙數丈濶一丈五尺平通山後者五六丈南北徹眺衆山无不羅列出北竅上飛崖倒覆又分竅西透亦北轉通一門内架閣兩重上穿圓竅人下竅行若透橋出又闢西向洞一洞四門相通小峯乃出此殊幻惟東面不通而崖外一門東向西入深數丈是又分門立户者小獨山巖在城東南五里與砥柱東西夾溪立自砥柱東望似此山偏傍東界自此山西望又似砥柱偏與西界近平中望之兩山去東西界各懸絶等也山小於砥柱尖鋭殊甚極似一浮屠中立下亦通一門石外跨西透小隙上懸崖側峙平石為臺上陡絶處有洞南向極深若能階梯上亦異境也游砥柱日獨隨一騎浮江并盡此勝砥柱巖西峯水巖在城南四里有峯兀突砥柱西髙不可砥柱迴列倍之上冒下削其淋漓痕儼若黄熟香片側立南多空裂成門北麓洞北向兩崖合掌上並内深杳有光南透若甚空洞第洞口瀦水溢兩崖不能入策馬渡水水多亂石不能前堡北巖在城南十二里巨堡北堡南去洋渡僅三里洞門東向深六丈窪下不能深入獨山村西北水巖在城南八里大道西門東南洞口危石磊落欹嵌正倚西山下中窅然沈黒竟不得入白崖堡南巖在城南十六里由洋渡北岸西溯江轉入山塢得白崖堡山南北迴合又成一洞天洞在南山上重門北向髙綴萬仭壁自堡中仰之即在目眦末无從著足崖底石脚下挿亦開裂成紋初扳數隙如升重樓復出望始知去洞猶極逺土人秉炬前導仍出山口循南山東抵南麓拾級上得一門東南向為後洞正對卓筆青獅崖諸峯洞内東北上躋甚暗更北上益峻遥見天光中引愈扳躍以升得掌大隙瞰隙外即闢巨門則上洞下層也隙隘不受側身過祗供俯眺而已内更上躋透隘出一洞門岈然北臨无地向仰眺莫可及者今忽躬立其上此洞最髙前夾崖下陷假以木横架補其闕即堪托憩凭挈諸峯也仍下内隘再外窺第二層洞已置為必不可到姑以杖從隙中投之由故道下抵前途見天光處明炬遍燭洞北崖下得一穴引炬蛇行入中漸髙成峽數丈後宛轉東折又北透數丈其門北向髙裂巨樹盤根洞中偃出洞外為第二層洞洞前平石如掌上下皆危崖峭懸絶級上眺層門重叠出數十仭巔即上洞與第二層洞也稍縁平石而東峽壁間藤樹蟠絡乃猿接以登久之竟歴第二層外洞前所投杖儼然在洞深三丈髙五丈嵌上下兩洞間獨不中通必藉外躋始達倍覺幽峭白崖堡南山下洞在後洞西三百步門亦東南向洞外崖嵐氤氲内横分二道一西南一東北皆下從窪中入必以炬西南者數丈後輒分兩層下層一井大穴由井下墜即得平峽西行三丈又懸峽下墜得平窪中峽竅盤錯乳柱花萼垂垂圍簇者千萬計又白乳蓮花一簇徑大三尺細瓣攢合逆懸洞底根平貼上石懸一線盤折久之忽明光一縷透竅出井口如前在前井之南矣又從上層西南入中石脊髙下屢見下陷坑窅无底疑即前所探下層也深入亦盤互多乳柱細若駢枝團聚每千百枝惟後營東洞乳柱多而大悉作垂龍舞虬狀比列皆數丈云于是從東北進不五丈有北嵌竅兩重俱淺東向扳崖上進漸曲盤錯亦如西洞深奥少殺耳青獅南洞在城南二十里西南與上林分界處路由洋渡過江東南四里乃止其山石峯卓立洞在山下開東西二門東門坦下門髙數丈濶亦數丈直透山西者三十丈平拓修整下闢如砥幔覆其上間有石柱倒掛幔下洞西垂又石柱一隊外自洞口排列抵洞後西界别成長榭從榭内矚外洞如疏楞綺牖牽幙自蔽西門特崇峻下巨石盤叠為臺上忽中盤髙穹從臺内眺已不見前洞頂祗覺四面層繞皆雲氣嘘鬱時有竅穴鉤連空懸无上處外眺則西面三岐卓筆諸詭岫正近當洞門設之供内臺北下奥窟中復開平洞一圍外峙巨石為障下透中虚若橋之度空從此秉炬北入東轉穴大而易窮東脇隘直入計其止處當不下十五丈已踰外洞半此下洞最奥處也出坐臺上仰視上層冀一登不可得忽見北光墮影知其外通陸公令健捷者從山外扳崖索之久之其人已穿入其上呼曰速攜炬來尚可深入余從之乃從西門下循山麓轉出山北南向扳崖躋山半有門北向穿石竇入俯見諸君酌臺上其上石底平庋石端懸空處復有石柱外列分窓界户故自下望之綴竇不一内寔旁通也于是秉炬東入愈深窅中闢幾二十丈東窮西北轉得一竇扳而北上忽倒影遥徹有峽縱横駢沓東北峽一穴髙懸僅納雲日光道絶升降更披西北峽上透得一北向門愈髙吐納烟嵐其北脇尚有餘奥然所入已不甚遥乃由其門出欲縁石覓磴下下皆削立壁復從洞中故道降至懸臺下瞰處諸君自下呼噪皆以為仙也青獅北洞在青獅潭北岸青獅潭者即洋渡下流也江潭深滙為羣魚藪窟乃參府設禁罟網所不敢入者北崖亦多穹門與南洞隔江對雨中過此不及旁搜又西為青獅廟危峯西南來抵水盡江至此合流而東峯截其灣愈見屼嵲廟倚山下遂極幽閟焉後營東山洞在城北四十里即後營東界石山西麓也去後營四里中又界小山一重山坳中斷處有尖峯在前亦曰獨山則其西䕶也直抵東山下小石峯一支西附起遥見當峯半一門西向髙懸則西洞後穿别竅正門尚在南脇間有兩門東西列皆南向先從西一門入中平朗若堂皇石柱後列從其東轉出柱後下墜小穴上則飛乳窈窕圍成龕紋極玲瓏纎幻龕中圓且峻貯水一池沈映崕壁光映上照紺碧奪目穿西隙而入又闢後室髙整與前堂无異門西向下臨絶壁即前從塢中遥見髙懸者乃列炬從東洞門入門外隘中窪入數丈輒巨乳夭矯垂空下繽紛不一底甚平岐而西峽東隙皆不數丈盡惟直北踰乳隙進内復寛稍東折遇方石中横諺號棺石從石東北轉石坡髙下乳笋參差立披竅北入復闢一最巨室乳柱迴環闔闢莫測道因從西北竅入悞穿東南腋仍下方石邊聞此洞内透甚遐行至半日一大溪中貫上有空明倒影飛梁渡溪直出遷江云予欲挽炬復入從者恐東炬不給强余出計所入未及十之一也瑰麗已壓諸岩矣三層閣在參府㕔事東陸公所新搆長松迴䕃羣峯四合松風亭在署後土山巔松隂山色遥接城陴月下尤佳絶予下榻三層閣幾至忘行陸公餞余於松風亭沈醉月中故并記焉三里週圍石峰中當土山盡處風氣含和獨盛於此土膏腴美生物茁茂非他處可及參府四圍喬松百餘株髙刺霄大可三人抱余疑數百年物考之碑記植於隆慶初建帥府時纔踰六十年其巨如此為良區異壤可知所藝禾穡特大恒種一郭長倍之性柔嘉亦異庶土所植鴨大者重七十兩方體粤西鯽魚甚艱長僅寸此地有至尺者木棉樹最髙巨粤西隨處有之此中尤多春時花大如木筆紅色燦然時有素禽羣啄四面繞之竹皆中寔外多刺叢生最大如吾地虚中者間有之然无巨者予以二十二日下午抵三里二十四日乃入謁陸公為下榻東閣自後多雨二十八稍霽陸公特同予遊韋龜巖後復雨至十一年嵗戊寅正月十三始遊兩獨山巖十五日雨中往遊周泊隘晩酌南樓觀龍燈甚盛二十七日同陸公乃孫伯恒遊白崖保巖洞二十八日陸公昆仲至同遊青獅巖既乃觀打魚江潭抵暮歸卧疴閣東者數日二月初三日雨中復往青獅潭觀漁先是張揮使謂青獅巖南雞籠山亦有大巖陸公以騎送余命張同往張謂雨中不可入固阻余仍冒雨歸自後予辭陸公行陸公擇十三日為期至是日始治裝凡留三里者五十日十三日午後出東門度琴水橋共六里北向入山皆東石西土凡三十三里抵後營營在西畔土山嶺十四日東遊東巖出飯於後營下山北行兩界山仍東石西土小水南流兩山中經後營南西南墜壑去即琴水橋上流也北八里土脊自西而東横屬兩界中為南北分水脊南入洋渡北入羅木渡焉自此而北昔皆三里民居今為八寨賊踞北二十二里為橋藍村又十二里為周安鎮鎮并西南古鵬北蘇吉總為三鎮界入寨中者也今古鵬已廢周安僅數家倚溪西溪東膏腴俱為賊踞不得成鎮矣十五日隨大溪西岸北行石峯西突路左峰四面多開穴竅中空第髙莫能上北又有荔枝巖深黒須炬入聞中有荔枝盆自是東西界皆石峯无復土山中間先北涉一小水又北渉一澗水皆東向入大溪共四里小峯當塢立嵌空多穴乃下流鎮山亦如三里之獨山但南北易位耳又六里抵蘇吉鎮復與土山遇又十八里一江西自萬峯石峽中破隘出東復破萬峯入峽則都泥江也刳木小舟二以渡江濶與太平左江隆安右江略相似兩岸甚峻江嵌深崖間所謂北盤江也土人云自利州那地至此北渡江飯羅木堡堡屬慶逺府賔州慶逺分南北以此江界堡北有小江南入都泥溯小江三十里抵髙陽站站西石峯後即猺窟其西有夷江即羅木渡上流也十六日北二十里東西兩界俱石山兩界石山突東出曰横山乃忻城縣永定司分界處縁山嘴盤崖北轉宻樹䝉蔽磊石上上下莫可窺眺偶瞰路下石潭淵沈仰見雲嶂排空髙低隠現令人惝恍二十里至永定司又西北十六里踰石山如門西望擴然則永順司接境南即石峯叢合皆猺窟北循石山西麓升降土阜上多迴環中窪如塘如井俯不見底水由地行此其中墜處一如太平府所見北七里歇東峯麓草堂十七日北三十里抵慶逺府之南門廣逺郡城在龍江南龍江西自懐逺鎮北憑空山透石穴出循北界石山而東流少殺羅木渡兩岸森石嶙峋過之江北石峯聳立曰北山中為㑹仙東為青塢西為宜山又西為天門拜相山即馮京祖墓皆憑臨江北中復開塢北趨天河者也江南即城城南五里石山一支自西而東曰南山中為龍隠洞山東為屛山西為火號山又西為九龍山皆蜿蜒郡南為來脈西竺寺在郡城西門外殿宏壯為粤西所僅見南為香山寺寺前平地湧石環立為門為峽為屛為嶂甚微而幻小峯頂每有巨樹箕踞其根籠絡與石為一幹盤曲下覆極似蘇閶盆玩寺西一池中亦有石池西北為黄文節祠後有卧龍石前有龍溪西流焉龍隠巖在郡城南五里石峯東隅迴環北轉處也前三門俱西向後通山背亦有三門俱東南向其中上下縱横无不貫穿今中道交通處以巨石窒穴洞遂分而為兩北偏門最髙敞前有佛宇南偏二門在山腋間其中門已无路余先從南門入北透暗穴反從上層下瞰得之无從下仍出南門扳搜到其處再攜炬入遂盡其奥曲北門西向髙穹前列佛宇三楹入數丈洞稍隘偏南遂昏昧秉炬直東入又數丈有岐在南崖上扳木梯以登南向入一窪下陷如穽横木板以度又南西壁下紋一縷縁崖根卧鱗脊蜿蜒似龍形隠起又南數丈踰隘俯石級下墜下層穴亦開南北塢南透則與中門内穴通已為巨石隔斷遂北透度二隘仰其上即横板上度處再北塢隘且窮遂從横板竅扳空上仍北下木梯直東入又踰一隘有岐亦南去從之漸見前竅流光燁燁已透山得後門矣行數丈抵後門門東南向下瞰平疇山麓溪一支環而北透其腋前復有石山繞為塢别成一洞天仍北返分岐處直東入數丈遇巨石中踞由北隙側身入一眢井憑空下陷大三四丈深如之懸梯投炬令一人垂索下兩人從上懸索以縶梯其人既下余隨之東南入一竅中復有下墜穴極深隘一飛鼠驚竄其上從其西南扳崖上崖内亦眢井空陷燭之不見底循其上西南入穴窮乃依故徑直西出前門南門在北洞南二百步山百步俗謂之雙門洞東向入輒横裂分南北南向忽明透山腹數丈出後門亦後洞最南者北向内分兩岐一北一東北余先從直北者透腋平入下伏深窞循其上若履棧道數丈北抵透明處中門西闢在五丈下此則中門上層也前列柱垂楞飛崖下懸與下洞相隔隙間俯窺下洞洞前明敞不啻堂皇也上層踰隘北轉昏黒不能入乃出南門索炬於北巖復入至分岐東北處踰石垣下内寛宏窈窕數轉約二十丈透出東門則後洞中門也門内五丈有岐東南去轉西南不十丈輒窮中門在南門北數十步與南門祗隔一崖上下懸絶叢箐翳之須下而復上搜剔久之乃得門秉炬東入其後壁頂即南來上層也從其下入峽峽窮扳而上南即上層北轉處向所瞰昏黑不能下者今援側坂可通焉東直進又五六丈穿穴下為大石窒塞即北洞中交通中斷處也大抵北洞後通之門一南洞後通之門二中洞則南通南洞上層北通北洞奥窟是山東西南三面无不貫達惟北山不通而頂有蚺蛇洞另闢一境云蚺蛇洞在龍隠山北絶頂遵山東北麓一里溪水從兩峽中破壁西北來潄空倒影自成一壑渡水共一里扳崖南上兩崖如削𤓰突石纍纍縁之躋佳木叢藤䝉宻揺颺上一里洞門穹然北向正與郡城對前有土山障溪西北去環麓成塢門之中石柱玲瓏叠綴前浮一臺東闢洞空朗多外透竇東崖窮南轉始昏黑須炬入數丈无復旁竅乃出仰眺東崖上復有重龕扳崖上躋則外龕甚巨内龕則重綴其上坐内龕猶對外龕外竇一圓恰當其中照若明鏡盧僧洞在龍隠北洞旁北數十步門亦西向最隘中闢一室東北扳隙上又得一小室其東北奥垂蓋上懸下聳圓笋若人之首即指以為盧僧者也九龍潭在郡城西南五里平岡上有潭一泓深窅无底水常溢流成溪九龍洞石山在其南山北有巖北向前列石屏由西隙入内闢巨室不甚髙後復有石柱一圍當洞之中秉炬南入又得一室南漸隘乃出巖西下又有一南入峽甚深隘秉炬深十餘丈而止底多石丸色黄不及向武營白東下又一覆壁横拓平廣去巖東北四里石陣排列自西而東如挿屏直止於香山寺前俗稱為鐵索繋孤舟云又一里返香山寺寺僧謂九龍洞甚深須易數炬此洞為丹霞墓非九龍巖也㑹仙山在龍江北南面正臨郡城渡江半里即抵麓山盤崖峻叠東西南俱无可上惟北山腋裁受級道從西麓北向行抵山西北隅乃東躋第一層南岐為百子巖第二層南岐為雪花洞岐而北為百丈深井巖直東上嶺脊南轉為絶頂此㑹仙西北面勝也東麓北向上者直抵絶壁下最東北隅為丹流閣西循崖為東觀以次漸西為白龍洞為中觀為西觀此㑹仙東南面勝也百子巖在㑹仙山西崖門西向入下門三丈餘梯空上上復叠為洞前門復出下門上洞雖不邃峻而是山石質皆青黝洞石獨赭南又一洞與上洞並復青石為異雪花洞在㑹仙山西崖乃百子上絶頂側洞西北向前結菴大士菴後秉炬入門少不宏漸進愈拓皆石柱石門宛轉數曲内復狹下石始嶔﨑不復平底越一小潭南轉境遂窮夜宿洞側臺巔三面陡臨絶壑灝氣上接沖穆萬象絶頂中懸霄漢江流如帶横於下東界青烏山西界天門拜相山俱自北而南左右翼對宜山則近伏西腋以其卑小宜民則此山巖巖壓衆可知矣峯頂有𤣥帝殿頗巨无棲者深井在絶頂北平雪花洞列道由二天門東北行忽山頂中陷下週圍大數十丈深且百丈四面皆嶄削下嵌宻樹古藤垂結相虧蔽俯不見底獨南面石崖自山頂直剖下下有洞北向髙穹上及崖半中特平逺反可欹曯以洞崖削无片隙樹皆莫能縁也崖西北峯頭横突石窞中踞之正對洞門傍又有一棋枰石可憩晩停杖雪花洞至横突石上心目俱動僧謂洞直通山南穿江底出南山恐未必然也中觀在㑹仙山南崖下縁石坡上至此則危崖削立洞南向洞東三百步得白龍巖白龍巖在中觀東危崖下洞南向入門即西行秉炬漸轉西北入愈崇放二十丈内石柱中懸撑洞頂殊極偉麗後有巨石中亘四旁愈擴穿隙入石柱益繁立北數丈度隘又數丈石壁忽湧起如蓮下垂不絶无旁竇上復深眛去平地三四丈不得級乃出至懸柱處又東上一岐入數丈石柱夾而成門踰門東下漸北轉恐火炬不給未竟而返東觀在白龍洞東北二百步穹壁覆空門南向西復有東向洞崇峻空洞西入數丈忽深坑下墜上嵌危石北轉益宏深蓋下陷窟透石北轉於下洞上穹亦凌石北轉中皆欹嵌石横跨側偃彼此間阻故无深入道第一望窅黑而已是洞乃白龍後洞前洞東岐未竟處可通此出云丹流閣在東觀東北二百步危崖至此又一折矣閣西有洞門東向甚髙洞西入亦數十丈即隘无深入處閣北崖嶺巔墜北路遂盡此西觀在中觀西三百步危崖上上下皆石壁懸亘後有洞亦南向余至中觀仰眺不見洞遂東折既下山麓迴睇見之不及復往矣聞㑹仙山西南層崖上又有仙姑巖由西南山麓扳躋上當在西觀上層雪花百子巖南崖无正道也多靈山最髙聳其上四時皆春瑶花仙菓不絶於樹登其巔四望无與障者山在慶逺西南九十里永順司鄧宗勝之境乃龍江西南都泥江東北二江中分脊處也予以十一年二月十七抵慶逺郡税駕香山寺日方午乃抵南山遊龍隠雙門洞諸勝即宿龍隠菴十八日由山北登蚺蛇洞既下循南山北西行二里半穿山腋南出循山南又西一里半過龍潭又西一里渡龍潭所北出小溪南入丹霞墓洞遂渡龍江北循㑹仙巖西麓東上山共三里遊雪花洞又一里登絶頂下宿雪花洞十九日探深井巖從雪花東坳下遊百子巖下山二里至卧雲閣攜火遊中觀東觀丹流閣白龍洞下午還香山寺二十日至二十五日日日坐雨寺中二十六日早晴同僧慧菴往九龍西南五里越北流溪繞丹霞墓洞東麓南三百步迴眺丹霞墓山峯頂有東向巖玲瓏幻極无可登道又東南三百步抵東峯北麓路旁皆水坑流貫路行其上若橋西有巨楓樹一株下為九龍祠九龍潭在祠南石崖下水從中北向經路旁水坑出丹霞墓洞前平岡潭乃其下流也九龍洞山在郡城西南五里丹霞墓東南山從丹霞墓山後繞而東其北崖有洞下即深潭嵌石壁中一石中横東西界潭為二西潭南石壁髙數丈下挿潭底潭多巨魚然水際无穴穴深入通流處當沈伏水脚洞髙懸潭上三丈餘門北向頗隘入乃髙穹峽南進秉炬直入十餘丈東轉下雖平石級屈曲湧起中環停澇成仙田東二丈忽深坑下陷由坑上南崖傴僂出坑之東下平仙田每每如西但其上覆石壓乳人不能舉首僅披隙透稍南北分岐逼難入仍西出坑崖上投炬諦視坑中下深三丈餘復開洞東西透西洞直入與上峽等東洞則横拓空濶坑南崖平覆如棧惟北則自上直挿坑底坑裂竅南北濶二丈東西長三丈洞頂懸柱倒蓮恰下貫坑中色瑩潔逾衆乳俯窺久之恨无梯索得竟奥底也東三百步又有巖北向深十餘丈在東峯崖過脊處其九龍西峯髙懸洞在丹霞墓山之東頂无路上重崖綴石逆扳雖險然石鋩競裂似可援手以發足乃凌空上躍者數層從其北得一巖門東向前隘峻極中通一線可尺許曲折入三丈内忽穹開西南轉遂黑暗中又轉入一小室似无餘隙乃出然非髙懸洞也髙懸洞尚在南畔絶崖上虧蔽不能仰見稍下轉崖脚扳隙以升巖亦東向然无門環迴前列髙十丈覆空若垂天之雲内壁後層削起上嵌赭石一區尤玲幻連開二門累累髙接雲氣惜无十丈梯凌空上也下山五里返香山寺二十七日渡北門大江登北岸觀音閣前為澄碧菴皆江崖危石飛突洪流就之結廬者北一里過雪花洞下又三里循西山轉入西塢北界皆石峯崔巍南則土山間之中有土岡南北屬踰岡西下三門巖在北崖之中乃北抵山下拾級上先抵巖東則石隙縱横駢沓皆可深入前有徑循崖端而西其巖中闢髙二丈五尺深如之横拓四丈餘外列三石界門為四俱南向惟中門最巨東腋一門頗卑伏稱三門者舉其大也西門崖壁莫能前其上石態更竒東門穿隙出即與東偏縱横隙並出巖東披縱横隙亦宛轉三四丈始闢而大踰閾或上前穴通明另成一境乃巖外奥室也透前穴出石髙擎穴前平齊臺東又有宛轉小隙瓣萼蓮簇紛披无不畢達由臺前小隙下即前循崖端而西復崖端東轉石山嘴稍入有洞内闢亦南向深數丈致幽美乃出舊道東近三百步北望山坳間巖髙懸絶峽上北向扳崖以登東入巖巖前皆棕竹翳峽中洞當轉峽側上下懸峭門西南向入五六丈遥望西南鋭峯一線直上列洞前洞兩旁石壁廉利沓合洞後透石門入凡三闢三闔中連下透俱若浮橋架空思躋其上竟无一受踵處及已穿出三橋中轉寛黑從左壁摸索上扳東崖南出三四丈凌内梁之東梁背刀削起趾不得著梁西亦峻石柱頂隔别不容西度又南縁東崖凌中梁不可度如前益南凌前崖之東梁背平整架兩崖間又圓石尺許聳立上遂平行西渡梁北轉入峽門即内二梁西端石所界成者峽内東豁即下通梁後西剜又透入一穴中皆為龕為門為峽細沙鋪底平潔如玉但暗束不能窮深即返至前梁西崖半扳石笋南下穿石窟出抵洞中央矣出洞取棕竹數枝東可百步一洞裂削崖間如丁字上横下豎門南向乃北抵崖脚石峽間纍數巨石上最上一石髙削數丈无級下有斗大穴蛇穿以入中遂穹然上髙數十丈外透起則丁字豎裂也洞内夾壁入底傾下北進七八丈東折始昏昧不可詰出洞下累石循崖東數十步又入巨峽門亦南向北進五六丈東折入暗中忽有光如星在履底近索之復不見益東二三丈石板盡處復燁燁微光動就視之一外界石如屏中細孔僅寸屈曲透漏不一下亦有斗大穴可墜乃懸手下抵下層外亦開門南向門内距石門僅二丈屏下又横竅内通即前所望履底有光處門外循崖東數丈又得一南向巖内不深折後壁特石竅玲透巖前崖磴懸絶不能東仍西歴前所入洞口下至山麓東百步又一洞南向當北麓穿入之則東轉透峽五六丈出門又東豁者也聞古城洞在青烏山前東門渡江三里可至石壁對夾中多種蔬者日已暮恐渡舟晩不及濟返由故道渡龍江抵香山寺街鼓發矣二十八日為多靈山遊西南十五里踰土嶺復與石山遇又三里南穿其峽西循石峯南麓行二里為黄窑村村西石峯前突曰黄窑山西二十里南渡下遷江共七里出土山隘于是塢遂南北豁東西兩界皆石山中有溪北流去南溯流三里宿黄村道人菴中二十九日黄村南三里峯迴塢夾藤蘿虧蔽山窮水盡處䝉宻中不知水從何出但聞潺潺有聲來自足底耳從此躡級西上踰坳共一里抵都田隘溪自西南來抵坳窟下穿穴東出即黄村上流也南八里登大歇嶺始見多靈三峯如筆架髙懸西南二十里外下嶺又三里西由塢中入石山峽漸轉西北行為永順境地窅絶无人居石峯離立色青白成紋態鬱紆若鏤刻五里路右一巖駢啟門皆南向東洞在麓可穿竅東出西洞須扳石始達門後透腋北入凌竇隙以上轉南出已在洞門上層矣下石板砥平薄逾葉踐之聲逢逢南有穴下俯洞門猶層樓通牖但自外望不覺上洞中虚也結構絶似㑹仙百子巖勝當十倍之南下山西北二里北山麓石崖下覆横亘如恒廊南一里路漸降北望石峰頂巖穹然東南向内微透明穴乃石梁飛架峯頭者下至壑足南轉始與溪遇凡兩渡此溪南五里直抵多靈北麓路左一土山自多靈夭矯下墜從其南前轉西南行一里下土山渡溪其溪自南來乃多靈以西石山村以東夾成者抵石村東北山環壑盡搗入石穴過溪北抵山麓為石山村乃飯一老人家望多靈正當其南問其上有廬无居者遂借鍋於老人老人攜火曳杖前導仍渡溪東南上土山共二里越岡得塢與多靈接阪老人指余登山道别去始踐土麓東南上轉東北行二里過土峽最峻扳之上扳石崖下崖峭立叢木中得石磴忽聞犬聲以為絶巘疑有人久之不見但竹捆駢置道旁蓋他村竊竹者聞人至避去耳扳磴上磴為墮葉覆積幾不得級磴旁壽枋大至三人抱者甚衆上一里得坪菴倚之北向竹床木几洒埽具悉給二桶向存斗米而苔葑古竈人去已久菴側斷積薪竹炊具甚贍但水不可得菴兩旁俱无汲水道惟東北路倚草伏樹循崖甚逺予從之半里果得泉蓋山頂皆縁懸崖綴石獨此腋衆木合翳水自崖石墜溜不絶昔人鑿痕接竹引之以通流供酌乃攜水返菴令從人淅米炊余西南入叢籜中覓登頂道初小有路痕乃竊笋者所踐竹盡上皆巨茅沒髻頂披之不開隙里許踰一西走脊脊西又旁起一峯下不能見至是始陟之循脊東上又一里踰一南走脊脊南亦旁起一峯此兩峯即大歇嶺所望合中峯為筆架者又循脊北上石崖峻垂扳石隙得移步直北上一里凌絶頂頂孤懸衆石山上南北逾一丈東西五丈惟南面可躋餘三面皆嵌空不受趾頂之北自頂平剖直墜至菴前石磴下巨木叢列翳不可窺惟遥四圍重峯矗矗南壑下層坑隔坂時見有水汪洋蓋都泥一曲也土人謂此山四時皆春花菓佳珍林无素木然但可採食懷之輒復迷道若余所見者引泉覆石之上有葉如秋海棠大倍之花如秋海棠者色獨白不知何種山頂巨木皆薔薇縁枝綴花殷紅鮮耀有酸草莖大逾指正赤作珊瑚色眺望久之仍由故道返菴飱所炊粥積薪佛座前為長明燈乃架匡牀展簟而卧三月初一日晨至石山村覓勝後山仰見石崖最髙處洞門穹懸依小徑抵西峽以為將扳崖上躋顧乃穿腋下北踰隘東峯峭立西崖多懸竅蘿蔓叢沓无可躋北隨峽出又通别塢不能窮仍轉出村前東索溪水所由入則洞穴伏山㘭下門南向溪流瀉入之洞髙濶各二丈深四丈水至後壁旁分二門入昏黑莫可進洞前石柱當其右穿柱入下有石坡尺許傍流渡水不煩涉水柱内西登隙上復闢一龕底平上穹亦石柱前列與水並向出洞還飯老人家東北抵黄村菴前道人瀹茶煮笋以待乃取所摘多靈山頂茶芽潔釜焙之當吾鄉陽羨最佳茗香色都无下意初二日别道人北渡下遷江東上髙山南坂踰兩土岡下塢有塘一方瀦水甚清西北石峯下破澗去叢木翳之甚遥又東踰岡巨塘滙陂間北墜下分為兩流一北入山穴一東循山嘴環流黄窑村前抵村詢觀巖道須東經草峽又東北一里踰石脊西轉即黄窑諸峰石山之隂也山排列西北去北盡於獨山而觀巖在其中循山東麓西北行凡三里西南折至其下則危崖上覆下有深潭水瀦其中不見所出惟從巖北隅瀉入巨門中窅黑水聲甚沸蓋水自山南來溢底出瀦為此潭即黄窑西巨塘分流入山穴者也乃一出輒復北入穴尤異覆巖之上垂柱懸旌紛紜歴亂後壁石脚直挿逆潭中上迴旋龕竇嵌不一俱隔潭不能至潭東北崖間神祠倚之祠後即潭水北入石門處門南向甚髙中望空洞疑浮筏可進從祠東北出平疇有北趨道欲從之入郡既乃愈北始知獨山懷逺道也忽見西山下潭淵然直逼石崖崖南開穴則前北向入門水又透此出也計所穿山腹中亦不甚遥若溯流入當可抵水聲沸處乃東轉半里前潭水散為平溪瀠村南東去又東北八里得入郡大道又五里路兩旁多眢井墜穴與太平一轍聞水聲淙淙石壑或連水走其底俯瞰底水所墜不一道皆不甚巨東二里踰岡下水走石壑底復如前又三里抵香山寺宿焉自後予欲西由南丹州入黔日候騎郡中至初九卒不得騎余決為步行初十日晨飯香山寺别慧菴西取南丹道去二十里有山中峙兩界石山間曰獨山尖峭孤聳亦獨秀亞又西北十里泉一泓止石窞中色澄碧西一巖北向前大石屏峙門洞深五丈後壁皆蓮花葉蕋層綴二里為大峒堡大峒在南山背堡後南入峽尚三四里始至洞一曰天門洞云自堡北望之南峯環迴如玦入至堡後又類蓮瓣自裂可披隙進也過堡十里江流自南而北江濶半慶逺乃懷逺鎮南江也江自荔波縣來至河池州東境為金城江又南合思恩縣東江南抵永順司北境入山穴山暗伏屈曲數里東出於泰順里又東北過此遂北與北江合為龍江焉渡江西岸即懷逺鎮鎮北有北江自思恩縣總州來舟溯南江至懷逺止北江通小舟可四日達總州十一日西北四十五里抵德勝鎮十二日由鎮北抵北山下半里過觀音菴菴左一洞南向倚山椒髙五丈後有巨柱中屏穿東西隙俱可入乃束炬從東隙北進數丈洞遂髙拓多擎天柱諸詭勝東折數丈北面光熠熠自上倒影以為從此出洞也及東去尚有道更張炬覓之又五丈止仍北出望明光趨之則懸石巉岨光上透如衆月並升將扳石登企忽平峽繞其左而轉遂透出一北向門又在前所望通明下也出洞扳叢崖南躋石萼攢沓正過通明上穴南向凌山頂登玉皇閣稍憩下山折磴石崖間凡數曲下出過前洞南去德勝又半里抵韋家山從山西麓扳級登懸崖峽轉樹倒垂其上類若乘空上有别柯從巖門横架巨樹杪合為一横架處枝體穿漏刓空穴竅工最雕鏤巖門在上下削崖間門西向前對樹杪就隘為門門旁即觀音閣閣左右皆可入洞不十丈輒止大約以凭虚勝无中通竒竇也北返德勝鎮西二里岐而南渡一小溪平原中亂石叢簇分裂不一中瀦水一泓澄无片草石頂各跨樹盤絡如香山寺石片更稠宻間以潭瀦尤竒潭西一石峽下與潭通南一石獨髙巨僧結茅於上曰蓮花菴門就石隙東西北俱小流環之地較香山幽麗特絶仍北出大道又一里入河池所十四日為北山遊出所城北門行平壑不半里亂石秀立路隅為門為標為屏為梁為芝為笋竒美博出倍巧於蓮花菴香山寺者又北向陟山危磴倚雲崖曲折上一里抵菴菴西凌削崖去上下皆絶壁菴无他竒惟臨深凭逺昇眺清廣耳下山至所城東北入壽山寺亂石一區水縱横滙其中石巔搆廬三四處髙下散布四渡橋遇側石一隊亦南北列上下有穴如門穿而西一菴北向前滙為塘石所擁成者菴後聳石獨髙憩久之返所城十五日西南二十三里宿馬草塘北村十六日西南五里一江自北而南深嵌危崖間所謂東江也西渡江江濶數丈深不測再南下數里即與金城江合入石穴中云西十五里又一江自北而南濶十丈深與東江並乃是荔波來者是為金城渡渡北西岸有水懸崖平瀉三丈聲轟如雷東注大江則官村南來水也渡江西十四里宿鬼巖村十七日西北三十三里抵河池州十八日西十六里為南丹境又十三里宿巖田村十九日西十里水自東北注西南深不及膝濶五丈是為大江源發西北山壑中南流東轉至永順界合東江下流者也渡江又十里至金村其地西往錫坑十五里西北去南丹州五十里二十日西北三里塢底小水自南而北大道南隨之錫坑道也從之北二里遂轉為東西塢大溪自西來即南出為大江者于是西溯大溪二十五里為大徐村又溯流四里抵西山下北轉一里涉水上西山望北塢山環壑盡瀑流從山腋乘空下髙及千尺粤西皆石山林故懸水最艱今於夷壤得睹此亦汗漫中一竒覯也西上一里瞻顧不能釋又十三里税駕南丹州逆旅南丹西三日程把巴鵞西即泗城州界銀錫二厰在南丹東南四十里其厰有三曰新州屬南丹曰髙峯屬河池州曰中坑屬那地州三地相間僅一二里由厰南兩日程至涯洞有大江自西而東為那地東蘭二州界其渡處名河水渡即都泥江也上流南來自泗界下流東歴永順土司北五里下石堰為羅木渡二十四日候夫南丹者數日始行西北四里石峯復出溯峽西入三里一石中立山峽髙鋭殊絶兩旁危嶂隘夾益覺峥嶸又三里西出夾山關數家倚北峯下後削崖如屏前接新篁宻箐路行峯竹中忽北山麓石崖飛架小水西來直潄石崖脚邊北入石洞中洞南向在架石東危崖下又西北二十里止蠟北村二十五日北竟村峒四里有洞在西小山坑中門東南向外甚敞中壁屏立又闢内門沈沈不可測路由東山上隔塢行對望之藤蘿掩蔽中有水潺潺出洞門成澗南流去又西北二十七里抵飄渺村二十六日西六里北轉山開東西兩界東界山自東突西凡五六峯西面悉平剖下墜排列而北若五老西向澗由中北向去北六里東界突山既盡塢大開東望一尖峯迴立中空如合掌懸架衆峯間空明下透合處僅凑徒杠千尺白雲正東映危峯脇可借名香爐瀑雪不復辨為山為雲也自桂林來所見穿山甚衆雖髙下各奮若此剜空出雲者得未曽有又北十二里抵銀村二十七日北五里為􅴂歹村乃丹州極北哨由此西去兩日程曰羅猴為泗城東北境都泥上流所經也􅴂歹北五里至山界與貴州下司分界處粤西西北境止此余粤西遊亦止此徐霞客遊記卷四下

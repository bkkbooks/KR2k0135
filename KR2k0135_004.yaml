body:
  text: 徐霞客遊記卷四上明徐宏祖撰西南遊日記五廣西九月二十二日豫自南寧崇善寺别靜聞下太平舟泊建武驛二十三日下午始解維行八里泊窰頭二十四日放舟西五十三里為右江口右江自北左江自西至此㑹聞右江之流溯田州而上舟至白隘止由右江口北望其內俱髙涯平隴無崇山為間而左江南岸則衆峯內突兀起一圓阜頗與衆山異西入左江二里泊大果灣乃兩江中交脊盡處北有小峯三石圓亘如覆鐘山至是始露石形二十五日西南二十里為楊美石嘴錯崿臨流又二十里泊金竹洲上流野岸二十六日西南十里過蕭村入新寧州境石山復出若列屏若角挺瀕江兩岸竒石碁置競露崢嶸又五里東折江南岸穹石成洞外裂多門如猛獸羣立空其跨下北岸則斷崖為峽飛梁駕其上兩端又五里仍西南轉與石山倐忽向背兩崖突石愈竒上下覆嵲如劈雲如肺葉降垂紛幻沓換但崖洞未甚深擴竟成閣殿耳又十八里石山始在江南岸又三里西透兩山腋兩岸始石山對列舟挾江北石峯北轉而循其西麓于是東岸之南峯列三洞門北向北駢立兩崖崖壁兩叠叠各有洞是名獅崖南向爭雄北三里直抵獅崖下南轉二里又西一里逼一尖峯下仍南向西岸復有駢崖平剖巍臨江潭者筆架山也而東岸石根愈透聳共三里過象石下泊新寧之西門自南寧來過右江口岸山始露石至楊美江石始竒過蕭村入新寧境江左始有純石山抵新寧北郭江右始有對峙之岫舟行峯石中如梳度緯應接不暇且江抵新寧不特石山最勝而石岸尤竒蓋江流擊山山削成壁流回沙轉雲根迸出或錯立波心或飛嵌水面皆洞壑層開膚痕縠皺江既善折岸石與山輔之恐後益使江山兩擅其竒豫謂陽朔山峭瀕江無此岸之石建溪水激多石無此石之竒雖連峯夾嶂逺不類巫峽凑泊一處促不及武夷而疏密宛轉在伯仲間至其一派玲瓏通漏别出一番鮮巧足奪二山之席矣二十七日西南行八里江東岸石根空中上覆已為詭幻忽一轉雙崖前突䂬石髙連下闢如閶闔更巧幻中雄觀又一里沖江自東南來㑹南三里東岸一峯甚峭其北垂環腋轉截處有洞西向纍纍特懸空無路又西曲南轉共六里過那勒豫泊舟於此為穿山犀牛二岩游西南三里透兩峯下南至穆窰村市肆西臨江滸穿岩在其南一里羣峯排列巖在峯半門西向扳崖石上抵門始西見江流橫其前洞直透山腹又見隔山回環後門外翠壁掩映乃由門上躋踞其中扄則東西兩門對闢上皆垂石駢柱凝結兩旁但其內西下東上故東透門髙出西門頂自外望之都無所見必入門始知為穿巖也兩門外俱削崖千丈矗立雲表而東門地勢既崇壁尤削趾尤峻所環對諸巖自門北迤邐東轉又南圍深谷若另闢一翠微境其下旋轉西去谷口崖石交錯不得窺下山過穆窑聞犀牛洞在騏驎村村依那勒東與穆窰三村鼎立乃東北三里至其村村人指洞在北山東峯上相去祗里許至其下不得路聞巖下伐木聲呼覓之不答時已過午雖與舟人期抵午返舟今即舟去不能顧也乃盤山東北隅循大道行道西北皆石峯二里一岐北轉有燒痕在焉先是騏驎村人謂抵山下燒痕處即登巖道余謂在是矣益前趨北入山夾兩旁峯崖攢叠中平遂有車道循之里餘道傍停車四五輛數牛布牧於麓樵者遍崖歷叩之俱不知有巖者蓋皆逺村樵牧以車載至此過此車路亦塞入一里夾且東轉四眺重崖懸絶西崖尤峻抵其北轉抵其東共二里環夾為塢四面回崖截嶂深叢翳之道遂窮出沒莽棘中索終不得路仍西南五里返至騏驎村大道旁前望隔隴有燒痕一圍亟趨之前至伐木聲處痕間有微徑石環叢隔故前不遽見今當在是矣益厲勇而前乃愈上愈逺西望南垂橫脊東突回峯豫皆已出其上獨一徑北躋二里路反逾頂北下翳不可行仍逾髙頂返下至燒痕間見石隙復有一道望東峽上其間徑正造南突孤崖下始與騏驎村人所指合凡三誤三返後得之日色漸下亟望崖上躋半里抵孤崖北是崖回聳高峯南從東轉西向若獨角中突犀牛擬稱以此崖北一脊北屬高峯與東崖轉處對脊上巨石危峙與獨角並而支其腋巨石又中裂豎穴嵌一石圭高丈許兩旁俱石夾上復覆之若剜空特置其間者圭石赭赤回别一山石色為尤異脊東下墜成窪深若回淵上削崖四合環轉無隙踰脊俯瞰淵底南崖下有洞北向門髙張內深不知所極四崖樹蔓䝉密淵底益盛崖旁有徑可循之至淵底翳不可前使芟除稍盡可達洞腹則竒邃盡發矣日巳墜乃逾脊西下由騏驎村北西二里抵那勒下舟二十八日放舟南行旋轉西北三里直逼雙峯石壁下再折東南五里小水自東南來入即穆窰也又西南一里過穿山西又一里西入兩山隙又五里江北岸山崖陡絶小峯如浮屠插其前山半綴一南向洞又六里界牌山蜿蜒江北西即太平境蓋江之北岸新寧太平以此山分界南岸俱屬新寧也又二里舟轉北向西岸列岫嵯峨一峯前突俗名為五虎出洞舟遂東轉已復西北抵北山下循之西向行共六里過安定堡北山盡南山復出亦西循之三里隨山北轉過花梨村又西北轉隨江北山二里轉而西隨江南山三里又暮行三里泊南岸晚夢村二十九日循南岸山二里北轉又三里轉而西又五里山開水繞百家之市倚江北岸曰䭾盧屬太平縣是日止行十里泊舟十月初一日循䭾盧西北五里北岸為左州界稍南南岸石峰復突又二里西北轉乃見北岸石峯三里西南入峯夾間十里西岸回崖雄削駢障江流南最高有三洞東啓極南一峯稍低上闢洞尤巨洞南崖石外跨自峰頂下插江潭崖南洞復透門出中崆峒交透舟行望之甚竒又南二里東岸石壁與之爭竒而峰壁合映江瀠其間更為勝絶又西南行六里已而東折則北岸雙崖髙穹崖半各有洞南向南岸磯嘴盤叠飛石凌空無不穿嵌透漏二里西南轉上銀甕灘灘始有巨石中橫如壩西五里西北盤東岸回崖二里抵北山下仍西南六里山開江曠一望廓然又五里而暮又二里泊捺利在江西岸屬新寧初二日西北三里抵江北危崖下南七里響源水自南來注聲如雷源發自江州水之西岸即江州屬新寧江州以此水分界水入江處有天然石壩絶江口髙十尺東西長十餘丈水逾壩墜江雖不甚髙而雪濺雷擊勢尤濶悍亦一竒觀也北岸為上果灣有巖西向臨石上北一里抵北山下又西北轉兩岸山復出二里為宋村村有八仙巖絶勝又八里西岸石崖叠出屢變竒詭盈望又五里北轉西岸一崖嶂天崖半洞裂雙穴東向如連環北大南小垂石外間通其內既而大者愈穹忽劃然中剜光自後透洞前上下皆翠崖危叠倒影江潭南有䭾槎村轉登山後聞可扳躋上又北一里東岸臨江皚然為銀山劈崕截山之半斑爛綴色與天光水影相為飛動覺陽朔畫山更遜一籌崖下有上下二洞門俱西向上洞尤空邃中懸石作大士形上嵌層壁下瀕回潭無從中躋其北紛竅甚多裂紋錯綴樹間吐納雲物獨含英潤一里轉而西遂止馱朴為明日陸行計自入新寧至此石山皆出巴豆樹蘇木二種樹殊小巴豆葉色丹映每隊聚重巒孤懸絶壁如楓葉著霜㸃絳翠屏之上蘇木則山坳平坡隨處俱生策如扁豆子長倍之繞幹結癭㸃㸃盤結同隨乳土人以子種成林收賈不至輒刈為薪又擇其高年幹細者光削之乳紋旋結朵朵作胡桃痕色尤蒼潤豫昔自天台覓萬年藤一逺僧攜此云出粵西蠻洞余疑為古樹竒根不知即蘇木叢條也䭾朴西至太平府陸四十里水倍之水源直通高平為安南地由龍州換小舟溯流四日可至太平人呼之為高夷聞龍州山崖更竒其地分水至思明府東換小舟可溯流四日至天龍洞過山半日即抵上思州州屬南寧府有十萬山山水西流為明江出龍州東流即出前八尺江初四日由䭾朴取道至太平南溯江八里為新鋪江從正南來陸路遂西南轉又十二里轉一山嘴乃循山南麓西向行回崖聨翩上壁極峻拔多玲瓏石二里路南復突一危峰遂西入山夾又一里南登媚娘嶺東南五里路側石窞一圓曰龍井下墜五六丈四圍大徑三丈俱純石環壁墜空綴磴下底甚平東北裂一門透門入內水聲潺潺路遂昏黑踐崖捫隙下忽深不可測久之光漸啓回見所入處一石柱細若碧笋中懸其間上下連屬旁有石板平度洞雖不宏竒奧窈窕得之路旁亦異也自䭾朴至此輒見岡陀盤旋四環中墜深者為井淺者為田上下異穴彼此共窞蓋他處水皆轉峽出必有一泄水門惟此地明泄澗甚少水皆從地中透去竅之直墜者下陷無底旁通者則底平可植五稼路旁大抵皆是惟龍井下陷猶有底故得墜玩焉西南出山四里抵壺關關在太平郡城北里許麗江西自龍州來抵關之西南折繞城南東轉復北抵關之東乃東北去關東西正當水束處若壺項然相距不及一里垣之設關於中為北門鎖鑰其南江流回曲壺腹間則郡城倚焉城中縱橫相距亦各一里東西南三面俱瀕江余以下午抵關留憩關左映霞菴青蓮山在郡城北二十里重巒北嶂天半其支南向東下者即媚娘嶺西下者為碧雲洞洞在壺關正西二里石峯突兀洞穿峯半門東向先從北麓上三折板東向透石隙曰天門得平臺焉洞門峙其上門峽而髙內南轉空隙深暗上透山頂引光一線空濛下光下有大士龕北向中坐像後有窞深陷燃炬燭之沈黑又一穴南去不知其底此下層也其上層隔窞之南復闢為門前列雙柱上平度兩盆曰寶盆先由坐像右壁穿小穴南下窞側由雙柱中抵寶盆下透門入始頗隘連進門兩重漸轉東上則穹然高張天光下迸一門南向出為通天竅歷級上出洞門外亦有臺甚平下瞰平壑與東向門無異由大士像左壁西穿小穴曲折入兩壁狹轉下伏為隘門透門進忽上盤如覆鐘凡進四門連盤而上者亦四五處乃出於大士像左壁稍北又西穿小穴漸北轉則岈然中通山影平透裂一門北向號曰盤窟此洞中勝也北門外崖石橫帶山腰東達天門西抵一飛崖下上覆下嵌崖不甚高上下俱絶壁中虛而橫帶者若平廊復榭無愧羣峯獻翠名北瞰深塢重巒前拱較東南二臺又作一觀由崖東扳石萼西望峯頂蓮瓣錯落中有一石東剜空明為蔓深石削不得扳仍從盤窟入出東臺仰眺洞南峯裂岐崖環一峽乃扳枝援隙上直歷峽峯攢合中復有東向洞內皆聳石攢空隙裂淵墜削不受趾瞰莫窺其底石塊投之聲歷歷不休下即大士龕中承受墜光處也至此洞外勝始盡初五日聞壺關東四里有白雲巖乃由郡城東渡江經歸龍村峒東抵石崖下穹崖高展下削如屏色瑩潔逾玉崖南峭壁半列洞四五大小不一皆西向南面一洞較大下復叠一洞不甚深昧而上洞中空外削望之窈窕竟不得扳憩再南半里有洞甚大亦西向前俱大石交支從石隙透門入窪敞可容三百人內無旁通竇洞北有小徑東上山夾兩旁聳石並立扳級而登逾山坳南亦有窪下陷木翳不能窺涘其北更起層峯西瞰江流城堞俱在足底再北直出白雲巖頂其坳中窪陷雖多然深莽密冒終不能下通巖半洞也此處巖洞特苦道路蕪阻若能巖外懸梯或叠磴中竇其委折竒勝當更出碧雲上遂西出歸龍南溯江岸三里抵金匱將軍兩山間金匱瞰江峙崕洞中空大容數百人茅棘湮塞亦莫覓入洞道祗三周其東南北三面又再越其頂對瞰江城若晰鬚眉於鏡中東即將軍山片崖立峯頭迎江有干城赳赳勢環郡四眺峯之特聳者此為最下渡江趨壺關山雨忽來暮色亦合矣初六日余欲走歸順由富州入雲南聞歸順為高平所阻道未決且從歸順行必假參戎馬牌方得前㑹庠友滕賔王肯畀書參戎道意遂留滯壺關菴中初八日有僧自
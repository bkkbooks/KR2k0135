body:
  text: 徐霞客遊記卷一上明徐宏祖撰遊天台山日記癸丑之三月晦自寧海出西門雲散日朗人意山光並有喜態三十里至梁隍山聞是地於菟夾道月傷數十人遂止宿焉四月初一日早雨行十五里路有岐馬首西向台山天色漸霽又十里抵松門嶺山峻路滑舍騎步行自奉化來雖越嶺數重皆循山麓至此迂回臨陟俱在山脊而雨後新晴泉聲山色往復創變翠叢中山鵑映發令人扳歷忘苦又十五里飯筯竹庵山頂隨處種麥從筯竹嶺南行則向國清大路適有國清僧雲峯同飯言此抵石梁山險路長行李不便不若以輕裝往而重擔向國清相待余然之令擔夫隨雲峯往國清余與蓮舟上人就石梁道行五里過筯竹嶺嶺旁多短松老幹屈曲根葉蒼秀俱吾閶門盆中物也又三十餘里抵彌陀庵上下高嶺深山荒寂恐藏虎故草木俱焚去泉轟風動路絶旅人菴在萬山凹中路荒且長適當其半可飯可宿初二日飯後雨始止越潦扳嶺溪石漸幽二十里暮抵天封寺卧念晨上峯頂以朗霽為緣連日晚霽並無曉晴及五更夢中聞明星滿天喜不成寐初三日晨起果日光燁燁決䇿上頂數里至華頂菴又三里為太白堂俱無可觀聞堂左下有黃經洞乃從小徑二里俯見一突石頗覺秀蔚至則一髮僧結菴於前恐風自洞來以石甃塞之矣大為嘆惋復上太白循路登絶頂荒草靡靡山高風烈草上結霜高寸許而四山回映琪花玉樹玲瓏彌望嶺角山花盛開頂上反不吐色蓋為高寒所勒耳仍下華頂菴過池邊小橋越三嶺溪回山合木石森麗一轉一竒殊慊所望二十里過上方廣至石梁禮佛曇花亭不暇細觀飛瀑下至下方廣仰視石梁飛瀑忽在天際聞斷橋珠簾尤勝僧言飯後行猶及往返遂由仙筏橋向山後越一嶺沿澗入八九里水瀑從石門㵼下旋轉三曲上層為斷橋兩石斜合水碎迸石間滙轉入潭中層兩石對峙如門水為門束勢甚怒下層潭口頗濶㵼處如閾水從凹中斜下三級俱高數丈各極神竒但循級而下為曲所遮不能望盡又里許為珠簾水水傾下處甚平濶其勢散緩滔滔汩汩豫赤足跳草莽中猱木緣崖蓮舟不能從暝色四下始返停足仙筏橋觀石梁卧虹飛瀑噴雪幾不欲卧初四日天山一碧如黛不暇晨餐即循仙筏上曇花亭石梁即在亭外梁濶尺餘長三丈架兩山凹間兩飛瀑從亭左來至橋乃合流下墜雷轟河隤百丈不止豫從梁上行下瞰深潭毛骨俱悚梁盡即為大石所隔不能達前山乃反過曇花入上方廣寺循寺前溪復至隔山大石上坐觀石梁為下寺僧促飯乃去飯後十五里抵萬年寺登藏閣閣兩重貯南北經兩藏寺前後多古杉悉三人圍鶴巢於上聲嘹嚦傳山谷間是日豫欲向桐柏宫覓瓊臺雙闕路多迷津遂謀向國清國清去萬年四十里中過龍王堂每下一嶺豫謂已在平地及下數重勢猶未止始悟華頂之高去天非逺日暮入國清與雲峯相見如遇故知與商探竒次第雲峯言名勝無如兩巖雖逺可以騎行先兩巖而後桃源抵桐柏則翠壁赤城可一覽收矣初五日有雨色不顧取寒明兩巖道由寺向西門覓騎騎至雨亦至五十里至步頭雨止騎去二里入山峯縈水映木秀石竒意甚樂之一溪從東陽來勢甚急大若曹娥四顧無筏負奴背而涉深過於膝移渡一澗幾一時三里至明巖明巖為寒山拾得隱身地兩山回曲志所謂八寸關也入關則四圍峭壁如城最後洞深數丈廣容數百人洞外左有兩巖皆在半壁右有石笋突聳上齊石壁相去一線青松紫蕊蓊蓯於上恰與左巖對可稱竒絶出八寸關復上一巖亦左向來時仰望如一隙及登其上明敞容數百人巖中一井曰仙人井淺而不可竭巖外一特石高數丈上跂立如兩人僧指為寒山拾得云入寺飯後雲隂潰散新月在天人在回崖頂上對之清光溢壁初六日凌晨出巖六七里至寒巖石壁直上如劈仰視空中洞穴甚多巖半亦有一洞濶八十步深百餘步平展明朗循巖右行從石隘仰登巖坳有兩石對聳下分上連為鵲橋亦可與方廣石梁爭竒但少飛瀑直下耳還飯僧舍覓筏渡溪循溪行山下一帶峭壁巉崖草木盤垂其上多海棠紫荆映蔭溪色香風來處玉蘭芳草隨地不絶已至一山寨石壁直插澗底澗深流駛旁臨無地壁上鑿孔以行孔中僅容半趾逼身而過神魄為動自寒巖十五里至步頭從小路向桃源桃源在護國寺旁寺已廢土人茫無知者隨雲峯莽中曲路行日已墮無投宿處乃復問至坪頭潭潭去步頭僅二十里今從小路反迂回三十餘里宿信桃源誤人也初七日自坪頭潭行曲路中三十餘里渡溪入山又四五里山口漸狹有館曰桃花塢循深潭而行潭水澄碧飛泉自上來注為鳴玉澗澗隨山轉人隨澗行兩旁山皆石骨攢巒夾翠涉目成賞大抵勝在寒明兩巖間澗窮路絶一瀑從山凹㵼下勢甚縱橫出飯館中循塢東南行越兩嶺尋所謂瓊臺雙闕竟無知者去數十里訪知在山頂與雲峯循路扳援始達其巔下視峭削環轉一如桃源而翠壁萬丈過之峯頭中斷即為雙闕雙闕所夾而環者即為瓊臺臺三面絶壁後轉即連雙闕豫在對闕日暮不及復登然勝已一日兼收遂下山從赤城後還國清已三十里矣初八日離國清從山後五里登赤城赤城山頂圓壁特起望之如城而石色微赤巖穴為僧舍凌雜盡掩天趣所謂玉京洞金錢池洗腸井俱無甚竒遊雁宕日記自初九日别台山初十日抵黃巖日已西出南門步行三十里宿八嶴十一日二十里登盤山嶺望雁山諸峯芙蓉插天片片撲人眉宇又二十里飯大荆驛南涉一溪見西峯上綴圓石奴輩指為兩頭陀余疑即老僧巖但不甚肖五里過章家樓始見老僧真面目袈衣秃頂宛然兀立高可百丈側又一小童傴僂於後自章家樓二里山半得石梁洞洞門東向門口一梁自頂斜插於地如飛虹下垂由梁側隙中層級而上高敞空豁坐頃之下山由右麓逾謝公嶺渡一澗循澗西行即靈峯道也轉入山腋兩壁峭立亘天危峯亂疊如削如攢如駢芝如怒笋如筆之卓如幞之欹洞有口如捲幕者潭有碧如澄靛者雙鸞五老之形聮肩接翼者里許抵靈峯寺循寺側登靈峯洞峯中空特立寺後側有隙可入由隙歷磴數十級直至窩頂則窅然平臺圓敞中有羅漢諸像坐玩至暝返寺十二日飯後從靈峯右址覓碧霄洞返舊路抵謝公嶺下南過響巖五里至淨明寺路口入覓水簾谷乃兩崖相夾水從崖頂飄下也出谷五里至靈巖寺絶壁四合摩天劈地曲折而入如另闢一世界寺居其中南向背為屏霞嶂嶂頂齊而色紫高數百丈濶亦稱之嶂之最南左為展旗峯右為天柱峯嶂之右腋介於天柱者先為龍鼻水龍鼻之穴從石罅直上略似靈峯洞而小穴內石色俱黃紫獨罅口石紋一縷青紺潤澤頗有鱗爪狀自頂貫入洞底垂下一端如鼻鼻端孔可容指水自內滴下注石盆此嶂右第一竒也西南為獨秀峯小於天柱高鋭不相下獨秀之下為卓筆高半獨秀鋭亦如之兩峯南凹轟然下㵼者小龍湫也隔龍湫與獨秀相對者玉女峯也頂有春花宛然插髻自此過雙鸞即極於天柱雙鸞止兩峯並起峯際有僧拜石袈裟傴僂肖矣由嶂之左腋介於展旗者先為安禪谷谷即屏霞之下巖東南為石屏風形如屏霞高濶各得其半正插屏霞盡處屏風頂有蟾蜍石與嶂側玉龜相向屏風南去展旗側褶中有徑直上磴級盡處石閾限之俯閾而窺下臨無地上嵌崆洞外有圓穴二側有長穴一光自穴中射入别有一境是為天聰洞則嶂左第一竒也鋭峯疊嶂左右環向巧變百出真天下竒觀而小龍湫下流經天柱展旗橋跨其上山門臨之橋外含珠巖在天柱之麓頂珠峯在展旗之上此又為靈巖之外觀也十三日出山門循麓而右一路崖壁參差流霞映采高而展者板嶂巖巖下危立而尖夾者為小剪刀峯更前重巖之上一峯亭亭插天為觀音巖巖側則馬鞍嶺橫亘於前鳥道盤折踰凹右轉溪流湯湯澗底石平如砥沿澗深入約去靈巖十餘里過常雲峯則大剪刀峯介立澗旁剪刀之北重巖陡起名連雲峯從此環繞回合巖窮矣龍湫之瀑轟然下搗潭中巖勢開張峭削水無所著騰空飄蕩頓令心目眩怖潭上有堂相傳為諾詎那觀泉之所堂後層級直上有亭翼然面瀑踞坐久之下飯菴中雨亷纎不止然余已神飛雁湖山頂遂冒雨至常雲峯由峯半道松洞外扳絶磴三里趨白雲菴人空菴圯一道人在草莽中見客至望望去再入一里有雲靜菴乃投宿焉道人清隱卧牀間數十年尚能與客談笑余見四山雲雨凄凄不能不為明晨憂也十四日尺忽晴朗乃強清隱徒為𨗳清隱謂湖中草滿已成蕪田徒復有他行但可送至峯頂豫意至頂湖可坐得於是人捉一杖躋攀深草中一步一喘數里始歷高巔四望白雲迷漫一色平鋪峯下諸峯朵朵僅露一頂日光映之如氷壺瑶畍不辨海陸然海中玉環一抹若可俯而拾也北瞰山凹壁立內石笋森森參差不一三面翠崖環繞更勝靈巖但谷幽境絶惟聞水聲潺潺莫辨何地望四面峯巒纍纍下伏如丘垤惟東峯昻然直上最東之常雲猶堪比肩道者告退指湖在西腋一峯尚須越三尖余從之及越一尖路已絶再越一尖而所登頂已在天半自念志云蕩在山頂龍湫之水即自蕩來今山勢漸下而上湫之澗却自東高峯發脈去此已隔二谷遂返而東望東峯之高者趨之蓮舟疲不能從由舊路下余與二奴東越二嶺人迹絶矣已而山愈高脊愈狹如行刀背又石片稜稜怒越每過一脊即一峭峯皆從刀劍隙中攀援而上如是者三但見境不容足安能容湖既而高峯盡處一石如劈向懼石鋒撩人至是且無鋒置足矣躊躇崖上不敢復向故道俯瞰南石壁下有一級遂脫奴足行縢四懸崖垂空先下一奴余次從意可得扳援之路及下僅容足無餘地望巖下斗深百丈欲謀復上而上巖亦嵌空三丈餘不能飛陟持布上試布為突石所勒忽中斷復續懸之竭力騰挽得復登山巖出險還雲靜菴日漸西主僕衣履俱敝尋湖之興衰矣别清隱復至龍湫則積雨之後怒濤傾注變幻極勢轟雷噴雪大倍於昨坐至山暝始出南行四里宿能仁寺十五日寺後覓方竹數握細如枝林中新篠大可徑寸柔不堪杖老柯斬伐殆盡矣遂從岐渡四十九盤遵海而南踰窰嶴嶺往樂清逰白嶽日記徽州府休寧縣丙寅歲余同潯陽叔翁於正月二十六日至徽之休寧出西門其溪自祁門縣來經白嶽循縣而南至梅口會郡溪入浙循溪而上二十里至南渡過橋依山麓十里至巖下已暮登山五里借廟中燈冒雪躡氷二里過天門里許入榔梅菴路經天門珠簾之勝俱不暇辨但聞樹間氷響錚錚入菴後大霰作潯陽與奴子俱後豫獨卧山房夜聽水聲如屋溜竟不成寐二十七日起視滿山氷花玉樹迷漫一色坐樓中適潯陽并奴至乃登太素宫宫北向元帝像乃百鳥銜泥所成色黧黑像成於宋殿新於嘉靖三十七年庭中碑文世廟御製也左右為王趙二神將殿俱雄麗背倚玉屏前臨香爐峯峯突起數十丈如覆鐘未遊台宕者或竒之出廟左至捨身崖轉而上為紫玉屏再西為紫霄崖俱危聳傑起再西為三姑峯五老峯文昌閣據其前五老比肩不甚峭削頗似筆架返榔梅循夜來路下天梯則石崖三面為圍上覆下嵌絶似行廊循嶺而行泉飛落其外為珠簾水嵌之深處為羅漢洞外開內伏深且十五里東南通南渡崖盡處為天門崖石中空飛突正如閶闔人出入其間門外喬楠中峙蟠青叢翠門內石崖一帶珠簾飛灑竒為第一返宿菴中訪五井橋巖之勝羽士汪伯化約明晨同行二十八日夢中聞人言大雪促奴起視彌山漫谷矣余強卧巳刻同伯化躡屐二里復抵文昌閣攬地天一色雖阻逰五井更益竒觀二十九日奴子報雲開日色浮林端矣急披衣起青天一色半月所未覩然寒威殊甚方促伯化共飯飯已大雪復至飛積盈尺偶步樓側則香爐峯正峙其前樓後出一羽士曰程振華者為豫談九井橋巖傅巖諸勝三十日雪甚兼霧濃咫尺不辨伯化攜酒至捨身崖飲睇元閣在崖側氷柱垂垂大者竟丈峯巒滅影近若香爐峯亦不能見二月初一日東方一縷雲開已而大朗潯陽以足裂留菴中豫急同伯化躡西天門而下十里過雙溪街山勢已開五里山復漸合溪環石映佳趣盎溢三里由溪口循小路入越一山二里至石橋巖橋側外巖高亘如紫霄巖下俱因巖為殿山石皆紫獨有一青石龍蜿蜒於內頭垂空尺餘水下滴曰龍涎泉頗如雁宕龍鼻水巖之右一山橫跨而中空即石橋也飛虹垂蝀下下空恰如半月坐其下隔山一岫特起拱對其上衆峯環峙較勝齊雲天門即天台石梁止一石架兩山間此以一山高架而中空其半更靈幻矣穿橋而入里許為內巖上有飛泉飄灑中有僧齋頗勝還飯於外巖覓𨗳循崖左下灌莽中兩山夾澗路棘雪迷行甚艱𨗳者勸豫趨傅巖不必向觀音巖豫恐不能兼碁盤龍井之勝不許行二里得澗一泓深碧無底亦龍井也又三里崖絶澗窮懸瀑忽自山凹挂下數丈亦此中竒境轉而上躋行山脊二里則棋盤石高峙山巔形如擎菌大且數圍登之積雪如玉回望傅巖岌嶪雲際由彼抵棋盤亦近悔不從𨗳者石旁有文殊菴竹石清映轉東而南二里越嶺二重山半得觀音巖禪院清整然無竒境尤悔覿面失傅巖也仍越嶺東下深坑石澗四合時有深潭大為淵小如臼皆云龍井不能别其孰為五孰為九凡三里石巖中石脈隱隱𨗳者指其一為青龍一為白龍豫笑頷之又亂崖間望見一石嵌空有水下注外有橫石跨之頗似天台石梁伯化以天且晚請速循澗覓大龍井忽遇僧自黃山來云出此即大溪行將何觀遂返里餘從别徑向漆樹園行巉石亂流間返照映深水一往幽麗三里躋其巔豫以為高埓齊雲及望之則文昌閣猶巍然也五老峯正對閣而起五老之東為獨聳寨循其凹而出曰西天門五老之西為展旗峯由其下而度曰芙蓉橋豫向出西天門今自芙蓉橋入也望三姑之旁猶殢日色遂先登則落照正在五老間歸菴已晚餐矣相與追述所歷始知大龍井正在大溪口足趾已及而為僧所阻亦數也遊黃山日記初二日自白嶽下山十里循麓而西抵南溪橋渡大溪循别溪依山北行十里兩山峭逼如門溪為之東越而下平疇頗廣二十里豬坑由小路登虎嶺路甚峻十里至巔五里越其麓北望黃山諸峯片片可掇又三里為古樓坳溪甚濶水漲無梁木片彌布一溪涉之甚難二里高橋初三日隨樵者行越嶺二重下而復上又越一重兩嶺俱峻曰雙嶺共十五里過江村二十里抵湯口香溪溫泉諸水所由出者折而入山沿溪漸上雪且沒趾五里抵祥符寺湯泉在隔溪遂赴池浴池前臨溪後倚壁三面石甃上環石如橋湯深三尺時凝寒未解湯氣鬱然水泡池底汩汩起氣本香冽黃貞父謂其不及盤山以湯口焦村孔道浴者太雜遝也浴畢返寺偕僧揮印登蓮花峰躡雪循澗以上澗水三轉下注而深泓者曰白龍潭再上而停涵石間者曰丹井井旁有石突起曰藥臼曰藥銚宛轉隨溪羣峯環聳木石掩映如是一里得菴僧印我他出不能登其堂堂中香爐及鐘鼓架俱天然古木根豫返寺宿初四日兀坐聽雪溜竟日初五日雲氣甚惡余強卧至午起揮印言慈光寺頗近令其徒引過湯池仰見一崖中懸鳥道兩旁泉㵼如練豫即從此扳躋上泉光雲氣繚繞衣裾已轉而右則茅菴上下磬韻香煙穿石而出即慈光寺也寺舊名硃砂菴比丘為豫言山頂諸淨室徑為雪封兩月今早遣人送糧山半雪沒腰而返余興大阻由大路二十里下山遂引被卧初六日天氣甚朗覔𨗳各攜笻上山過慈光寺從左上石峯環夾其中石級為積雪所平一望如玉棘木茸茸中仰羣峯盤結天都獨巍然上挺數里級愈峻雪愈深其隂處凍雪成氷堅滑不受趾豫獨前持杖鑿氷得一孔置前趾再鑿一孔以移後趾從行者俱循此法得度上至平岡則蓮花雲門諸峯爭竒競秀若為天都擁衛者由此而入絶巘危崖盡皆怪松懸結高者不盈丈低僅數寸平頂短鬛盤根虬幹愈短愈老愈小愈竒不意竒山中又有此竒品也松石交映間冉冉僧一羣從天而下俱合掌言阻雪中三月今以覔糧勉到此公等何由得上也且言我等前海諸菴俱已下山後海僧路尚未通惟蓮花洞可行耳已而從天都峯側攀而上透峯隙而下東轉即蓮花洞路也豫急於光明頂石笋矼之勝遂循蓮花峯而北上下數次至天門兩壁夾立肩摩高數十丈仰面而度隂森悚骨其內積雪更深鑿級上躋過此得平頂即所謂前海也由此更上一峯至天平矼矼之兀突獨聳者為光明頂由矼而下即所謂後海也蓋天平矼陽為前海隂為後海乃極高處四靣皆峻塢此獨若平地前海之前天都蓮花二峯最峻其陽屬徽之歙其隂屬寧之太平豫至天平矼欲望光明頂而上路已三十里腹甚枵遂入矼後一菴菴僧俱踞石向陽主僧曰智空見客色飢先以粥餉且曰新日太皎恐非老晴因指一僧謂豫曰公有餘力可先登光明頂而後中食則今日猶可抵石笋矼宿是僧處矣余如言登頂則天都蓮花並肩其前翠微三海環繞於後下瞰絶壁峭岫羅列塢中即丞相原也頂前一石伏而復起勢若中斷獨懸塢中上有怪松盤蓋余側身扳據其上而潯陽踞大頂相對各跨勝絶下入菴黃粱已熟飯後北向過一嶺躑躅菁莽中入一菴曰獅子林即智空所指宿處主僧霞光已待我菴前矣遂指菴北二峯曰公可先了此勝從之俯窺其隂則亂峯列岫爭竒並起循之西崖忽中斷架木連之上有松一株可扳引而度所謂接引崖也度崖穿石罅而上亂石危綴間構木為室其中亦可置足然不如踞石下窺更雄勝耳下崖循而東里許為石笋矼矼脊斜亘兩夾懸塢中亂峯森羅其西一面即接引崖所窺者矼側一峯突起多竒石怪松登之俯瞰壑中正與接引崖對峯回岫轉頓改前觀下峯則落照擁樹謂明晴可卜踴躍歸菴霞光設茶引登前樓西望碧痕一縷余疑山影僧謂山影夜望甚近此當是雲氣余默然知為雨兆也初七日四山霧合少頃菴之東北已開西南膩甚若以菴為界即獅子峯亦在時出時沒間晨餐後由接引崖踐雪下塢半一峯突起上有一松裂石而出巨幹高不及二尺而斜拖曲結蟠翠三丈餘其根穿石上下幾與峯等所謂擾龍松是也扳玩移時望獅子峯已出遂杖而西是峯在菴西南為案山二里躡其巔則三面拔立塢中其下森峯列岫自石笋接引兩塢迤邐至此環結又成一勝登眺間沉霧漸爽急由石笋矼北轉而下正昨日峯頭所望隂森徑也羣峯或上或下或巨或纎或直或欹與身穿繞而過俯窺輾顧步步生竒但壑深雪厚一步一悚行五里左峯腋一竇透明曰天窗又前峯旁一石突起作面壁狀則僧坐石也下五里徑稍夷循澗而行忽前澗亂石縱橫路為之塞越石久之一闕新崩片片欲墮始得路仰視峯頂黃痕一方中間緑字宛然可辨是謂天牌亦謂仙人榜又前鯉魚石又前白龍池共十里一茅庵出澗邊為松谷庵舊址再五里循溪東西行又過五水則松谷菴矣再循溪下溪邊香氣襲人則一梅亭梅正發山寒積雪至是始芳抵青龍潭一泓深碧更會兩溪比白龍池勢既雄壯而大石磊落奔流亂注逺近羣峯環拱亦佳境也還餐松谷往宿舊菴豫初至松谷疑已平地及是詢之須下嶺二重二十里方得平地至太平縣共三十五里云初八日擬尋石笋奧境竟為天奪濃霧迷漫抵獅子林風愈大霧亦愈厚余欲急趨煉丹臺遂轉西南三里為霧所迷偶得一菴入焉雨大至遂宿此初九日逾午少霽菴僧慈明甚誇西南一帶峯岫不減石笋矼有秃顱朝天達摩面壁諸名余拉潯陽蹈亂流至壑中北向即翠微諸巒南向即丹臺諸塢大抵可與獅峯競駕未得比肩石笋也雨踵至急返菴初十日晨雨如注午少止䇿杖二里過飛來峯此天平矼之西北嶺也其陽塢中峯壁森峭正與丹臺環繞二里抵臺一峯西垂頂頗平伏三面壁翠合沓前一小峯起中塢其外則翠微峯三海門蹄股拱峙登眺久之東南一里繞出天平矼下雨復大至急下天門兩崖隘肩崖額飛泉俱從人頂潑下出天門危崖懸疊路緣崖半比後海森峯峭壁又轉一境海螺石即在崖旁宛轉酷肖來時忽而不察今行雨中頗稔其異詢之始知已趨大悲菴宿悟空上人處十一日上百步雲梯梯磴插天足趾及腮而磴石傾側㟏岈兀兀欲下前時以雪掩其險至此骨意俱悚上雲梯即登蓮花峯道又下轉由峯側而入即文殊院蓮花洞道也以雨色不止乃下山入湯院復浴由湯口出二十里抵芳村十五里抵東潭溪漲不能渡而止黃山之流如松谷焦村俱北出太平即南流如湯口亦北轉太平入江惟湯口西有流至芳村而巨南趨巖鎮至府西北與績溪會遊武夷山日記建寧府崇安縣二月二十一日出崇安南門覓舟西北一溪自分水關東北一溪自溫嶺關合注縣南通郡省入海順流三十里見溪邊一峯橫欹一峯獨聳余詫而矚目則欹者幔亭峯聳者大王峯也峯南一溪東向而入大溪者即武夷溪也沖祐宮傍峯臨溪豫欲光抵九曲然後順流探歷遂舍宮不登逆流而進流甚駛舟子跣行溪間以挽舟第一曲右為幔亭峯大王峯左為獅子峯觀音巖而溪右之瀕水者曰水光石石上題刻殆遍二曲之右為鐵板嶂翰墨巖左為兜鍪峯而板嶂之旁崖壁峭立間有三孔作品字狀三曲右為會仙巖左為小藏峯大藏峯大藏壁立千仞崖端穴數孔亂插木板如杌一小舟斜架穴口木末號曰架壑舟四曲右為釣魚臺希真巖左為雞棲巖晏仙巖雞棲巖半有洞外隘中宏橫插木板天柱峯者五曲也文公書院正在大隱屏下抵六曲右為仙掌巖天遊峯左為晚對峯響聲巖回望隱屏天遊之間危梯飛閣懸其上不勝神往而舟以溜急不得進還泊曹家石登陸入雲穿石俱從亂崖中宛轉得路窩後即接笋峯峯駢附於大隱屏其腰橫兩截痕故曰接笋循其側石隘躋磴數層四山環翠中留隙地如掌者為茶洞洞口由西入口南為接笋峯口北為仙掌巖仙掌之東為天遊天遊之南為大隱屏諸峯上皆峭絶而下復攢湊外無磴道獨西峯一罅比天台之明巖為竒矯也從其中扳躋登隱屏至絶壁處懸大木為梯貼壁直竪雲間梯凡三接級共八十一級盡有鐵索橫繫山腰下鑿坎受足扳索轉峯而西夾壁中有岡介其間若埀尾鑿磴以登即隱屏頂也有亭有竹四面懸崖憑空下眺真仙凡敻隔仍下懸梯至茶洞仰視所登之處嶄嶄在雲漢隘口北崖即仙掌巖巖壁屹立雄展中有斑痕如人掌長盈丈者數十行循崖北上至巔落照侵松山光水曲交加入覽南轉行夾谷中谷盡忽透出峯頭三面壁立有亭踞其首即天遊峯矣是峯處九曲之中不臨溪而九曲之溪三面環之東望為大王峯而一曲至三曲之溪環之南望為更衣臺南之近者則大隱屏諸峯也四曲至六曲之溪環之西望為三教峯西之近者則天壺諸峯也七曲至九曲之溪環之惟北向無溪而山從水簾諸山層疊而來至此中懸其前之俯而瞰者即茶洞也自茶洞仰眺但見絶壁干霄泉從側間㵼下初不知其上有峯可憩其不臨溪而能盡九溪之勝此峯固應第一也立臺上望落日半規逺近峯巒青紫萬狀臺後為天遊觀亟辭去抵舟已昏黑矣二十二日登涯辭掌而西余所循者乃溪之右涯其隔溪則左涯也第七曲右為三仰峯天壺峯左為城高巖三仰之下為小桃源崩崖堆錯外成石門由門傴僂而入有一匝四山環繞中有平畦曲澗圍以蒼松翠竹雞聲人語俱在翠微中出門而西即為北廊巖巖頂即為天壺峯其對岸之城高巖矗然獨上四旁峭削如城巖頂有菴亦懸梯可登以隔溪不及也第八曲右為鼓樓巖鼓子巖左為大廩石海蚱石豫過鼓樓巖之西折而北行塢中扳陟峯頂兩石兀立如鼓鼓子巖也巖高亘亦如城巖下深凹一帶如廊架屋橫攔其內曰鼓子菴仰望巖上亂穴中多木板橫插轉巖後壁間一洞更深敞曰吳公洞梯毁不能登望三教峯而趨緣山越磴深木蓊蓯其上抵峯有亭綴其旁可東眺鼓子諸勝山頭三峯石骨挺然並矗從石罅間躡磴而升傍崖得一亭穿亭入石門兩崖夾峙壁立參天中通一線上下尺餘人行其間毛骨隂悚蓋三峯攢立此其兩峯之罅其側尚有兩罅無此整削下山轉至山後一峯與貓兒石對峙盤亘亦如鼓子為靈峯之白雲洞至峯頭從石罅中纍級而上兩壁夾立頗似黃山之天門級窮迤邐至巖下因巖架屋亦如鼓子登樓南望九曲上遊一洲中峙溪自西來分而環之至曲復合為一洲外兩山漸開九曲已盡是巖在九曲盡處重巖回疊地甚幽爽巖北盡處更有一巖尤竒上下皆絶壁壁間橫凹僅一線須伏身蛇行盤壁而度乃可入余即從壁凹行已而凹漸低壁漸危則傴僂就之愈低愈狹則膝行蛇伏至凹轉處上下僅懸七寸濶止尺五凹外壁深萬仞余匍匐以進胸背相摩盤旋久之得度其險巖果軒敞層疊有斧鑿置於中欲開道而未就也半晌返前巖更至後巖方搆新室亦幽敞可愛出向九曲溪則獅子巖在焉循溪而返隔溪觀八曲之人面石七曲之城高巖蔚然竒麗為之神飛復泊舟由雲窩入茶洞穹窿窕窈再至矣再不能去已由雲窩左轉入伏羲洞洞頗隂森左出大隱屛之陽即紫陽書院謁先生廟像順流鼓棹兩崖蒼翠如飛翻恨舟行之速已過天柱峯更衣臺泊舟四曲之南涯自御茶園登岸欲繞出金雞巖之上迷荆縈棘不得路乃從巖後大道東行兾有旁路可登大藏小藏諸峯復不得透出溪旁已在玉女峯下欲從此尋一線天傍徨無可問而舟泊金雞洞下逈不相聞乃沿溪覓路迤邐大藏小藏諸峯之麓一帶峭削高搴砂磧崩壅土人多植茶其上從茗柯中行下瞰深溪上仰危崖所謂仙學堂藏仙窟俱不暇辨已至架壑舟仰見虛舟宛然較前溪中所見更悉大藏之西其路漸窮向荆棘中捫壁而上還瞰大藏西巖亦架一舟但兩崖對峙不能至其地也忽一舟自二曲逆流而至急下山招之其人以舟來受亦逰客初至者約余返更衣臺同覽一線天虎嘯巖諸勝過余泊舟處並棹順流而下欲上幔亭問大王峯抵一曲之水光石約舟待溪口余復登涯步入至止止菴望菴後有徑可上趨之得一巖僧唄誦其中乃禪巖也登峯之路尚在止止菴西仍下菴前由轉登山二里許抵峯下從亂箐中尋登仙石石旁峯突起作仰企狀鶴模石在峯壁罅間霜翎朱頂裂紋如繪旁路窮有梯懸絶壁間躡而上搖搖欲墮梯窮得一巖則張仙遺蛻也巖在峯半覓徐仙巖皆石壁不可通下梯尋别道又不可得躡石則峭削無階投莽則深密莫辨傭夫在前得斷磴大呼得路余裂衣不顧趨就之復不能前日已西薄遂以手懸棘亂墜而下得道已在萬年宮右趨入宮甚森敞羽士迎言大王峯頂久不能到惟張巖梯在峯頂六梯及徐巖梯俱已朽壞徐仙蛻已移入會真廟矣出宮右轉過會真廟廟前大楓扶踈蔭數畝圍數十抱别羽士歸舟二十三日登陸覓換骨巖水簾洞諸勝命移舟十里候於赤石街豫乃入會真觀謁武彛君及徐仙遺蛻出廟循幔亭東麓北行二里見幔亭峯後三峯駢立異而問之三姑峯也換骨巖即在其旁望之趨登山里許飛流汩然下㵼俯瞰其下亦有危壁泉從壁半突出踈竹掩映殊有清韻然業已上登不及返顧遂從三姑又上半里抵換骨巖巖即幔亭峯後崖也巖前有菴從巖後懸梯兩層更登一巖巖不甚深而環繞山巔如疊嶂土人新以木板循巖為室曲直高下隨巖宛轉循巖隙扳升幾至幔亭之頂以路塞而止返至三姑峯麓繞出其後復從舊路下至前所瞰突泉處從此越嶺即水簾洞路從此而下即突泉壁也豫前從上瞰未盡其妙至是復造其下仰望突泉又在半壁之上傍引水為碓有梯架之鑿為溝以引泉豫循梯扳壁至突泉下其凹僅二丈上下俱危壁泉從上壁墮凹中復從凹中溢而下墮凹之上下四旁無處非水而中有一石突起可坐坐久之下壁循竹間路越嶺三重從山腰約行七里乃下塢穿石門而上半里即水簾洞危崖千仞上突下嵌泉從巖頂墮下巖既雄擴泉亦高散千條萬縷懸空傾㵼亦大觀也其巖高矗上突故巖下搆室數重而飛泉猶落檻外先在途聞睹閣寨頗竒道流指余仍舊路越山可至豫出石門愛塢溪之勝誤走赤石街道途人指從此度小橋而南亦可往從之登山入一隘兩山夾之內有巖有室題額乃杜轄巖土人訛為睹閣耳再入又得一巖有曲檻懸樓望赤石街甚近遂從舊道三里渡一溪又一里則赤石街大溪也下舟挂帆二十里返崇安遊廬山日記豫同兄雷門白夫八月十八日至九江易小舟沿江南入龍開河二十里泊李堰登陸五里過西林寺至東林寺寺當廬山之隂南面廬山北倚東林山山不甚高為廬外郭中有大溪自東而西驛路畍其間為九江之建昌孔道寺前臨溪入門為虎溪橋規模甚濶正殿夷燬右為三笑堂十九日出寺循山麓西南行五里越廣濟橋始舍官道沿溪東向行又二里溪回山合霧色霏霏如雨一人立溪口問之由此東上為天池大道南轉登石門為天池寺之側徑豫稔知石門之竒路險莫能上遂倩其人為𨗳令二兄徑至天池相待遂南渡小溪二重過報國寺從碧篠香靄中扳陟五里仰見濃霧中雙石屹立即石門也一路由石隙而入復有二石峯對峙路宛轉峯罅下瞰絶澗諸峯在鐵船峯旁俱從澗底矗聳直上離立咫尺爭雄競秀而層煙疊翠澄映四外其下噴雪奔雷耳目為之狂喜門內對峯倚壁都結層樓危闕徽人鄒昌明畢貫之新建精廬僧容成焚修其間從菴後小徑復出石門一重俱從石崖上上攀下躡磴窮則挽藤藤絶置木梯以上如是二里至獅子巖巖下有靜室越嶺路頗平再上里許得大道即自郡城南來者歷級而登殿已當前以霧故猶不辨逼之而朱楹綵棟則天池寺也蓋燬而新建者由右廡側登聚仙亭亭前一崖突出下臨無地曰文殊臺出寺由大道左登披霞亭亭側岐路東上山脊行三里由此再東二里為大林寺由此北折而西曰白鹿升仙臺北折而東曰佛手巖升仙臺三面壁立四旁多喬松高帝御製周顛仙廟碑在其頂石亭覆之製甚古佛手巖穹然軒峙深可五六丈巖端石岐橫出故名佛手循巖側菴右行崖石兩層突出深塢上平下仄訪仙臺遺址也臺後石上書竹林寺三字竹林為匡廬幻境可望而不可即臺前風雨中時時聞鐘梵聲故以此當之時方雲霧迷漫即塢中景亦如海上三山何論竹林還出佛手巖由大路東抵大林寺寺四面峯環前抱一溪溪樹大三人圍非檜非杉枝頭著子纍纍傳為寶樹來自西域向有二株為風雨拔去其一矣二十日晨霧收出天池趨文殊臺四壁萬仞俯視鐵船峯正可飛舄山北諸山伏如聚蟻匡湖洋洋山麓長江帶之逺及天際因再為石門遊三里度昨所過險處至則容成方持貝葉出迎喜甚𨗳豫歷覽諸峯上至神龍宮右折而下入神龍宮奔澗鳴雷松竹森蔭山峽中奧寂境也循舊路抵天池下從岐徑東南行十里升降於層峯幽澗無徑不竹無隂不松則金竹坪也諸峯隱護幽倍天池曠則遜之復南三里登蓮花峯側霧復大作是峯為天池案山在金竹坪則左翼也峯頂叢石嶙峋霧隙中時作窺人態以霧不及登越嶺東向二里至仰天坪因謀盡漢陽之勝漢陽為廬山最高頂此坪則為僧廬之最高者坪之隂水俱北流從九江其陽俱南流屬南康余疑坪去漢陽當不逺僧言中隔桃花峯尚有十里遙出寺霧漸解從山塢西南行循桃花峯東轉過晒谷越嶺南下復上則漢陽峯也先是遇一僧謂峯頂無可托宿宜投慧燈僧舍因指以路未至峯頂二里落照盈山遂如僧言東向越嶺轉而西南即漢陽峯之陽也一徑循山重嶂幽寂里許蓊然竹叢中得一龕有僧短髮覆額破衲赤足者即慧燈也方挑水磨腐竹內僧三四人衣履揖客皆慕燈逺來者復有赤腳短髮僧從崖間下問之乃雲南雞足山僧燈有徒結茅於內其僧歷懸崖訪之方返耳豫即拉一僧為𨗳扳援半里至其所石壁峭削懸梯以度一茒庵如慧燈龕僧夲山下民家亦以慕燈居此至是而上仰漢陽下俯絶壁與世敻隔矣暝色已合歸宿燈龕燈煮腐相餉指路之僧亦至燈半月一腐必自已出遍及其徒徒亦自至來僧其一也二十一日别燈從龕後小徑直躋漢陽峯扳茅拉棘二里至峯頂南瞰鄱湖水天浩蕩東瞻湖口西盼建昌諸山歷歷無不俯首失恃惟北面之桃花峰崢崢比肩然昂霄逼漢遜此一籌下山二里尋舊路向五老峯漢陽五老俱匡廬南面之山如兩角相向而犁頭尖界其中退於後故兩峯相望甚近而路必仍至金竹坪繞犁頭尖後出其左脅北轉始達五老峯自漢陽計之且三十里余始至嶺角望峯頂坦夷莫詳五老面目及至峯頂風高水絶寂無居者因遍歷五老峯始是山之隂一岡連屬陽則山從絶頂平剖列為五枝憑空下墜者萬仞外無重岡疊嶂之蔽際目甚寬然彼此相望則五峯排列自掩一覽不能兼收登一峯則兩旁無底峯峯竒不少讓真雄曠之極觀也仍下二里至嶺角北行山塢中里許入方廣寺為五老新剎僧知覺甚稔三疊之勝言道路極艱促余速行北去一里路窮渡澗隨澗東西行鳴流下注亂石兩山夾之叢竹修枝鬱蔥上下時時仰見飛石突綴其間轉入轉佳既而澗旁路亦窮從澗中亂石行圓者滑足尖者刺履如是三里得緑水潭一泓深碧怒流傾㵼於上流者噴雪停者育黛又里許為大緑水潭水勢至此將墮大倍之怒亦益甚潭前峭壁亂聳回互逼立下瞰無底但聞轟雷倒峽之聲心怖目眩泉不知從何墜去也於是澗中路亦窮乃西向登峯峯前石臺鵲起四瞰層壁隂森逼側泉為所蔽不得窺見必至對崖方能全收其勝爰循山岡從北東轉二里出對崖下瞰則一級二級三級之泉始依次悉見其塢中一壁有洞如門者二僧謬指為竹林寺門云頃之北風自湖口吹上寒生栗起急返舊路至緑水潭諦觀之上洞翕然下墜僧引入其中曰此亦竹林寺三門之一然洞本石罅夾起內橫通如十字南北通明西入似無底止出溯溪而行抵方廣已昏黑二十三日出寺南渡溪抵犁頭尖之陽東轉下山十里至楞伽院側遙望山左脅一瀑從空飛墜環映青紫夭矯滉漾亦一雄觀五里過棲賢寺山勢至此始就平以急於三峽澗未之入里許至三峽澗澗石夾立成峽怒流衝激而來為峽所束回奔倒湧轟振山谷橋懸兩崖石上俯瞰深峽中迸珠戞玉過橋從岐路東向越嶺趨白鹿洞路皆出五老峯之陽山田高下點錯民居橫歷若坡陀仰望排嶂者三里直入峯下為白鶴觀又東北行三里抵白鹿洞亦五老峯前一山塢也環山帶溪喬松錯落出洞由大道行為開先道蓋廬山形勢犁頭尖居中而少遜棲賢寺實中處焉五老左突下即白鹿洞右峙者則鶴鳴峯也開先寺當其前於是西向循山橫過白鶴棲賢之大道十五里經萬松寺陟一嶺而下山寺巍然南向者則開先寺也從殿後登樓眺瀑一縷埀埀尚在五里外半為山樹所翳傾㵼之勢不及楞伽道中所見惟雙劔嶄嶄衆峯間有芙蓉插天之態香爐一峯直山頭圓阜耳從樓側西下壑澗流鏗然㵼出峽口即瀑布下流也瀑布至此反隱不復見而峽水滙為龍潭澄映心目坐石久之四山暝色返宿殿西之鶴峯堂二十三日由寺後側徑登山越澗盤嶺宛轉山半隔峯復見一瀑並挂瀑布之東即馬尾泉也五里扳一尖峯絶頂為文殊臺孤峯拔起四望無倚頂有文殊塔對崖削立萬仞瀑布銀河飛落與臺僅隔一澗自巔至底光響俱徹不登此臺不悉此瀑之勝下臺循山岡西北溯溪即瀑布上流也一徑忽入山回谷抱則黃巖寺據雙劔峯下越澗再上得黃石巖巖石飛突平覆如砥巖側茅閣方丈幽雅出塵閣外修竹數竿拂羣峯而上與山花霜葉綴映峯隙鄱湖一點正當窗牖縱步溪石間觀斷崖夾壁之勝仍飯開先别去後遊黃山日記九月初三日出白嶽榔梅菴至桃源橋從小橋右下陡甚即舊向黃山路也七十里宿江村初四日十五里至湯口五里至湯寺浴於湯池扶杖望硃砂菴而登十里上黃泥岡向時雲裡諸峯漸漸透出亦漸漸落吾杖底轉入石門越天都之脅而下則天都蓮花二頂俱秀出天半路旁一岐東上乃昔所未至者趨而直上幾達天都側復北上行石罅中石峯片片夾起路宛轉石間塞者鑿之陡者級之斷者架木通之懸者植梯接之下瞰峭壑隂森楓松相間五色紛披粲若圖繡因念黃山當生平竒覽而有竒若此前未一探兹遊快且愧矣時僕夫俱阻險行後余亦少止乃一路景竒不覺引余獨往既登峯頭一菴翼然為文殊院亦余昔年欲登未登者左天都右蓮花背倚玉屏風兩峯秀色俱可手掔四顧竒峯錯列衆壑縱橫真黃山絶勝處非再至焉知其竒若此遇遊僧澄源至興甚湧時已過午奴輩適至立菴前指點兩峯菴僧謂天都雖近而無路蓮花可登而路遙祗宜分盼天都明日登蓮頂豫不從決意遊天都挾澄源奴子仍下峽路至天都側從流石蛇行而上牽草扳棘石塊叢起則歷塊石崖懸削則擾崖每至手足無可著處澄源必先登埀接每念上既如此下何以堪終亦不顧歷險數次遂達峯頂惟一石頂壁起猶數十丈澄源尋視其側得級挾余以登萬峯無不下伏猶蓮花與抗耳時濃霧半作半止每一陳至則對面不見眺蓮花諸峯多在霧中上天都至其前則霧徙後越右則霧出其左松猶有曲挺縱橫者柏雖大幹如臂無不平貼石上如苔蘚然山高風巨霧氣去來無定下盼羣峯時出為碧嶠時沒為銀海再眺山下則日光晶晶别一區宇也日漸暮遂前其足手向後據地坐而下脫至絶險處澄源併肩手相接度險下至山凹暝色已合復從峽度棧以上止文殊院初五日平明下天都峯凹中北下二里石壁岈然其下蓮花洞正與前坑石笋對峙一塢幽然别澄源下山至前岐路側向蓮花峯而趨一路沿危壁西行凡再降升將下百步雲梯有路可直躋蓮花峯既陟而磴絶疑而復下隔峯一僧高呼曰此正蓮花道也乃從石陂側度石隙徑小而峻峯頂皆巨石鼎峙中空如室從其中疊級直上級窮洞轉屈曲竒詭如上下樓閣中忘其峻出天表也一里得茒廬倚石罅中方徘徊欲升則前呼道之僧至矣僧號凌虛結茅於此者遂與把臂陟頂頂上一石懸隔二丈僧取梯以度其巔廓然四望空碧即天都俯首矣蓋是峯居黃山之中獨出諸峯上四面巖壁環聳遇朝陽霽色鮮映層發令人狂呌欲舞久之返茅菴凌虛出粥相餉啜一盂乃下至岐路側過大悲頂上天門三里至煉丹臺循臺㭰而下觀玉屏風三海門諸峯悉從深塢中壁立起其丹臺一岡中埀頗無竒峻惟瞰翠微之背塢中峯巒錯聳上下周映非此不盡瞻眺之竒還過天平矼下後海入智空菴别塢三里下獅子林趨石笋矼至向年所登尖峯上倚松而坐瞰塢中峯石回攢藻繢滿眼始覺匡廬石門或具一體或缺一面不若此之閎博富麗也久之上接引崖下眺塢中隂隂覺有異復至岡上尖峯側踐流石援棘草隨坑而下愈下愈深諸峯自相掩蔽不能一目竟也日暮返獅子林初六日别霞光從山坑向丞相原下七里至白沙嶺霞光復至因豫欲觀牌樓石恐白沙菴無指者追來為𨗳遂同上嶺指嶺右隔坡有石叢立下分上並即牌樓石也余欲逾坑溯澗直造其下僧謂棘迷絶必不能行若從坑直下丞相原不必復上此嶺若欲從仙燈而往不若即由此嶺東向豫從之循嶺脊行嶺橫亘天都蓮花之北狹甚旁不容足南北皆崇峯夾映嶺盡北下仰瞻右峯羅漢石圓頭秃頂儼然二僧也下至坑中逾澗以上共四里登仙燈洞洞南面正對天都之隂僧架閣連板於外而內猶穹然天趣未盡刋也復南下三里過丞相原山間一空地耳其菴頗整四顧無竒竟不入復南向循山腰行五里漸下澗中泉聲沸然從石間九級下㵼每級一下有潭淵碧所謂九龍潭也黃山無懸流飛瀑惟此耳又下五里過苦竹灘轉循太平縣路向東北行徐霞客遊記卷一上欽定四庫全書徐霞客遊記卷一下明徐宏祖撰遊九鯉湖日記興化府仙遊縣浙閩之遊舊矣豫志在蜀之峩眉粵之桂林及太華恆嶽諸山若羅浮衡嶽次也至越之五泄閩之九漈又次也然蜀廣關中母老道逺未能卒遊衡湘可以假道不必專遊計其近者莫若由江郎三石抵九漈遂以午節後一日期芳若叔啓行正楓亭荔枝新熟時也二十三日始過江山之青湖山漸合東支多危峯峭嶂西伏不起懸望東支盡處其南一峯特聳摩雲插天勢欲鶱騰問之即江郎山也望而趨二十里過石門街漸趨漸近忽裂而為二轉而為三已復半岐其首根直剖下迫之則又上鋭下斂若斷而復連者移步換形與雲同幻矣夫雁宕靈峯黃山石笋森立峭拔已為詭觀然俱在深谷中諸峯互相掩映反失其竒即縉雲鼎湖穹然獨起勢更偉峻但步虛山即峙於旁各不相降逺望若與為一不若此峯特出衆山之上自為變幻而各盡其竒也六月初七日抵興化府初八日出莆郡西門西北行五里登嶺四十里至莒溪降陟不啻數嶺矣莒溪即九漈下流過莒溪公館二里由石上步過溪又二里一側徑西向山坳北復有一磴可轉上山時山深日酷絶人行迷不知所往豫意鯉湖之水歷九漈而下上躋必有竒境遂趨石磴道芳叔與奴輩憚高陟皆以為誤頃之徑漸塞彼益以為誤而豫行益勵既而愈上愈高杳無所極烈日薰鑠豫亦自苦倦矣數里躋嶺頭以為絶頂也轉而西山之上高峯復有倍此者循山屈曲行三里平疇蕩蕩正似武陵誤入不復知在萬峯頂上也中道有亭西來為仙遊道東即余所行南過通仙橋越小嶺而下為公館為鐘鼓樓之蓬萊石則雷轟漈在焉澗在蓬萊石旁其底石平如礪水漫流石面雲如鋪縠少下而平者多窪其間圓穴為竈為臼為樽為井皆以丹名九仙之遺也平流至此忽下墮湖中如萬馬初發誠有雷霆之勢此第一漈之竒也九仙祠即峙其西前臨鯉湖湖不甚浩蕩而澄碧一泓於萬山之上圍青漾翠造物之醖靈亦異矣祠後有石鼓元珠古梅洞諸勝梅洞在祠側架大石而成者有罅成門透而上舊有九仙閣祠前後有九仙宫今俱圯當祠而隔湖下墜則二漈至九漈之水也豫循湖右行已至第三漈急與芳叔返曰今夕當淡神休力靜晤九仙勞心目以竒勝俟明日也返祠往蓬萊石跣足步澗中石瀨平曠清流輕淺十洲三島竟褰裳而涉也晚坐祠前新月正懸峯頂俯挹平湖神情俱朗靜中渢渢時觸雷漈聲是夜了祈夢例初九日辭九仙下窮九漈九漈去鯉湖且數里三漈而下久已道絶數月前莆田祭酒堯俞令陸善開復鳥道直通九漈出莒溪悔昨不由側徑溯漈而上乃迂從大道坐失此竒遂束裝改途竟出九漈瀑布為第二漈在湖之南正與九仙祠相對湖窮而水由此飛墮深峽峽石如劈兩崖壁立萬仞水初出湖為石所扼勢不得出怒從空墜飛噴衝激水石各極雄竒之致再下為第三漈之珠簾泉景與瀑布同右崖有亭曰觀瀾一石曰天然坐亦有亭覆之從此上下嶺澗盤折峽中峽壁上覆下寬珠簾之水從正面墜下玉筯之水從旁靄沸溢兩泉並懸峽壁下鐵障四圍上與天並玉龍雙舞下極潭際潭水深泓沉碧雖小於鯉湖而峻壁環鎖瀑流交映集竒撮勝惟此為最所謂第四漈也初至澗底芳叔急於出峽坐待峽口不復入豫獨緣澗石而進踞潭邊石上仰視雙瀑從空夭矯崖石上覆如甕口旭日正在崖端與頽波突浪掩暈流輝俯仰應接不能舍去循澗復下忽兩峽削起一水斜回澗右路窮左望有木板飛駕危磯斷磴間亂流而渡可以攀躋遂涉澗從左則五漈之石門矣兩崖至此壁湊欲合不合欲開不開下湧奔泉上礙雲影人緣陟其間如猿猱然隂風吹之凛凛欲墮蓋自四漈來山深路絶幽峭已極惟聞泉聲鳥語耳出五漈山勢漸開澗右危嶂屏列左則飛鳯峯回翔對之亂流繞其下或為澄潭或為倒峽若六漈之五星七漈之飛鳯八漈之棋盤石九漈之將軍巖皆次第得名矣然一帶雲蒸霞蔚得趣故在山水中豈必刻迹而求乎水乘峽展既得目恣其旁崩崖頽石斜插為巖橫架為室層疊成樓屈曲成洞懸則瀑環則流瀦則泉皆可坐可卧可倚可濯蔭竹木弄雲煙數里之間目不能移足不能前者竟日每歷一處見有别穴必穿巖通隙而入曲達旁疏不可一境窮也若水之或懸或渟或翼飛疊注即匡廬三疊雁宕龍湫各以一長擅勝未若此山微體皆具也出九漈沿澗依山轉東向五里始有耕雲樵石之家然見余輩至未有不驚訝者又五里至莒溪之石步出舊道初十日過蒜嶺驛至榆溪聞橫路驛西十里有石所山巖石最勝亦為九仙祈夢所閩有春遊石所秋逰鯉湖語雖未合其時然不可失之交臂也乘興遂行以橫路去此尚十五里乃宿榆溪十一日至波黎鋪即從小路為石所逰西向十五里越一小嶺又五里渡溪即石所南麓循麓西轉仰見峯頂叢崖如攢如劈西北行久之有樓傍山西向乃登山道也石蹬頗峻短衣歷級而上磴路曲折木石隂翳虬枝老藤盤結危石欹崖之上啼猿上下應答不絶忽有亭踞危石拔逈凌虛無與為對亭當山之半再折石級巍然直上級窮則飛巖簷覆埀半空再上兩折入石洞側門出即九仙閣軒敞雅潔左為僧廬俱倚山凌空可徙倚憑眺閣後五六峭峯離立高皆數十丈每峯各去二三尺峯罅石壁如削成路屈曲罅中可透漏各峯之頂松偃藤蜒縱目成勝僧供茗芳逸山所産也側徑下至埀巖路左更有一徑豫曰此必有異從之果一石洞嵌空立穿洞而下即至半山亭下山出橫路而返是逰也為日六十有三歷省二經縣十九府十一逰名山者三遊嵩山日記河南府登封縣余髫年蓄五嶽志而玄嶽出五嶽上慕尤切久擬歷襄鄖捫太華由劔閣連雲棧為峩嵋先𨗳而母老志移不得不先事太和猶屬有方之逰苐沿江曠日不若陸行舟返為時較速乃陸行汝鄧間路與陜汴略相當可以兼盡嵩華朝宗太嶽遂以癸亥仲春朔決䇿取嵩嶽道凡十九日抵河南鄭州之黃宗店由店由登石坡看聖僧池清泉一涵渟碧山半山下深澗交疊涸無滴水下坡行澗底隨香爐山曲折南行山形三尖攢立如覆鼎衆山環之秀色娟娟媚人澗底亂石一壑作紫玉色兩崖石壁宛轉色較縝潤想清流汪注時噴珠泄黛當更何如也十里登石佛嶺又五里入密縣界望嵩山尚在六十里外從岐路東南二十五里過密縣抵天仙院院祀天仙云黃帝之三女也白松在祠後中庭相傳三女蛻骨其下松大四人抱一本三幹鼎聳霄漢膚如凝脂潔逾傅粉蟠枝虬曲緑鬛舞風昂然玉立半空洵竒觀也周以石欄一軒臨北軒中題咏絶盛徘徊久之下觀滴水澗至此忽下跌一崖上覆水滴瀝其下還密仍抵西門三十五里入登封界曰耿店南向為石淙道乃稅駕焉二十日從小徑南行二十五里皆土岡亂壟久之得一溪渡溪南行岡脊中下瞰則石淙在望矣豫入自大梁平衍廣漠古稱陸海地以得泉為難泉以得石尤難近嵩始睹衆峯蜿蜒於是北流有京須諸溪南流有潁水然皆盤伏土磧中獨登封東南三十里為石淙乃嵩山東谷之流將下入於潁一路坡陀屈曲水皆行地中至此忽逢怒石石立崇岡山峽間有當關扼險之勢水沁入脅下從此水石融和綺變萬端繞水之兩崖則為鵠立為雁行踞中央者則為飲兕為卧虎低則嶼高則臺愈高則石之去水也愈逺乃又空其中而為窟為洞揆崖之隔以尋尺計竟水之過以數丈計水行其中石峙於上為態為色為膚為骨偹極妍麗不意黃茅白葦中頓令人一洗塵目也登隴西行十里為告成鎮古告成縣地測景臺在其北西北行二十五里為嶽廟入東華門時日已下舂豫心艷盧巖即從廟東北循山行越坡陀數重十里轉而入山得盧巖寺寺外數武即有流鏗然下墜石峽中兩旁峽色氤氲成霞溯流造寺後峽底矗崖環如半規上覆下削飛泉墮空而下舞綃曵練霏微散滿一谷可當武夷之水簾益此中以得水為竒而水復得石石復能助水不尼水又能令水飛行則比武夷為尤勝也徘徊其下僧梵音以茶點餉急返嶽廟已入夜二十一日晨謁嶽神出殿東向太室絶頂嵩當天地之中祀秩為五嶽首故稱嵩高與少室並峙下多洞窟故又名太室兩室相望如雙眉然少室嶙峋而太室雄麗稱尊儼然負扆自翠微以上連崖橫亘列者如屏展者如旗故更覺巖巖崇封始自上古漢武以嵩呼之異特加祀邑宋時逼近京畿典禮大偹至今絶頂猶傳鐵梁橋避暑寨之名當時之盛固可想見太室東南一攴曰黃蓋峯峯下即嶽廟規制宏壯庭中碑石森立皆宋遼以來者登嶽正道乃在萬歲峯下當太室正南豫昨趨盧巖時先過東峯道中見峯巒秀出中裂如門或指為金峯玉女溝從此亦有路登頂乃覓樵預期為𨗳今遂從此上近秀出處路漸折避之險絶不能徑越也北就土山一縷僅容扳躋約二十里遂越東峯已轉出裂門之上西度狹脊望絶頂行是日濃雲如潑墨余不為止至是嵐氣愈沉稍開則下瞰絶壁重崖如列綃削玉合則如行大海中五里抵天門上下皆石崖重疊路多積雪𨗳者指峻絶處為大鐵梁橋折而西又三里繞峯南下得登高巖凡巖幽者多不暢暢者又少回藏映帶之致此巖上倚層崖下臨絶壑洞門重巒擁護左右環倚臺嶂初入有洞岈然洞壁斜透穿行數武崖忽中斷五尺莫可著趾𨗳者故老樵狷捷如猿猴側身躍過對崖取木二枝橫架為閣道既度則巖穹然上覆中有乳泉丹竈石榻諸勝從巖側躋其上更得一臺三面懸絶壑中𨗳者曰下可瞰登封逺及箕潁時濃霧四塞都無所見出巖轉北二里得白鶴觀址址在山坪去險就夷孤松挺立有曠致又北上三里始躋絶頂有真武廟三楹側一井甚瑩曰御井宋真宗避暑所濬也飯真武廟中問下山道𨗳者曰正從萬歲峯抵麓二十里從西溝懸溜而下可省其半然路極險峻余色喜謂嵩無竒以無險耳亟從之䇿杖而前始猶依巖凌石披叢條以降既而從兩石峽溜中直下仰望夾崖逼天先是峯頂霧滴如雨至此漸開景亦漸竒然皆埀溝脫磴無論不能行且不能止愈下崖勢愈壯一峽窮復轉一峽吾目不使旁瞬吾足不容求息也如是十里始出峽抵平得正道過無極洞西越嶺趨草莽中五里得法皇寺寺有金蓮花為特産他處所無山雨忽來遂借榻僧寮其東石峯夾峙每月初上正從峽中出所稱嵩門待月也計豫所下之峽即在其上今坐對之祗覺雲氣出沒安知身自此中來也二十二日出山東行五里抵嵩陽宫廢址惟三將軍柏鬱然如山漢所封也大者圍七人中者五小者三柏之北有室三楹祠二程先生柏之西有舊殿石柱一大半沒於土上多宋人題名可辨者為范陽祖無擇上谷冦武仲及蘇才翁數人而已柏之西南雄碑傑然四面刻蛟螭甚精右則為唐碑裴逈撰文徐浩八分書也又東二里過崇福宫故址又名萬壽宫為宋宰相題點處又東北為啓母石大如數間崖側有一平石如砥又東八里還飯嶽廟看宋元碑西八里入登封縣西五里從小徑西北行又五里入會善寺茶榜在其西小軒內元刻也後有一石牌仆牆下為唐貞元戒壇記汝州刺史陸長源撰文河南陸郢書又西為戒壇廢址石上刻鏤極精工俱斷委草礫西南行五里出大路又十里至郭店折而西南為少林道五里入寺宿瑞光上人房二十三日雲氣俱盡入正殿後登南寨南寨者少室絶頂也高與太室等而峯巒峭拔負九鼎蓮花之名俯環其陽者為九乳峯蜿蜒東接太室其隂則少林寺在焉寺甚整麗庭中新舊碑森列成行俱完善夾墀二松高偉而整如有尺度少室橫峙於前仰不能見頂逰者如面牆而立輒謂少室以逺勝豫昨暮入寺即問少室道俱謂雪深道絶必毋往凡登山以晴朗為佳豫登太室雲氣彌漫或以為山靈見拒此山魁梧正須止露半面若少室工於掩映雖微雲豈宜點滓今則霽甚適逢其會烏可阻也乃從寺南渡澗登山六七里得二祖菴山至此忽截然土盡而石石崖下墜成坑坑半有泉突石飛下亦以珠簾名之豫䇿杖獨前愈下愈不得路久之乃達其巖雄拓不如盧巖而深峭過之巖下深潭泓碧僵雪四積再上至煉丹臺三面孤懸斜倚翠壁有亭曰小有天探幽之屐從未有抵此者過此皆從石脊仰扳直躋兩旁危崖萬仞石脊懸其間殆無寸土手與足代匱而後得升凡七里始躋大峯峯勢寬衍向之危石又截然忽盡為土從草棘中莽莽南上約五里遂凌南寨頂屏翳之土始盡南寨實少室北頂自少林言之為南寨云蓋其頂中裂橫界南北北頂若展屏南頂列戟峙其前相去僅尋丈中為深崖直下如剖兩崖夾中坑底特起一峯高出諸峯上所謂摘星臺也為少室中央絶頂與北崖離倚彼此斬絶不可度俯矚其下一絲相屬豫解衣從之登其上則南頂之九峯森立於前北頂之半壁橫障於後東西皆深坑俯不見底罡風乍至幾欲假翰飛去從南寨東北轉下土山忽見虎迹大如升草中行五六里得茅菴擊石炊所攜米為粥啜三四碗飢渴霍然去倩菴僧為龍潭道下一峯峯脊漸窄土石間出棘蔓翳之懸枝以行忽石削萬丈勢不可度轉上躋望峯勢蜿蜒處趨下而石削復如前往復不啻數里乃迂過一坳又五里而道出則龍潭溝也仰望前迷路處危崖欹石俱在萬仞峭壁上流泉噴薄其中崖石之隂森嶄嶻者俱散成霞綺峽夾澗轉兩崖靜室如蜂房燕壘凡五里一龍潭沈涵凝碧深不可規以丈又經二龍潭遂出峽宿少林寺二十四日從寺北西行過甘露臺又過初菴北四里上五乳峯上初祖洞洞深二丈濶殺之達摩九年面壁處也洞門下臨寺面對少室地無泉故無棲者下至初祖菴菴中供達摩影石石髙不及三丈白質黑章儼然畨僧立像中殿六祖手植柏大三人圍碑言自廣東置鉢中攜至者夾墀二松亞少林少林松柏俱修偉不似嶽廟偃仆盤曲此松亦然下至甘露臺土阜雄起上有藏經殿下臺歷殿三重碑碣散布目不暇接後為千佛殿崇麗罕匹出飯瑞光上人舍䇿騎趨登封道過轘轅嶺宿大屯二十五日西南行五十里山岡忽斷即伊關也伊水南來經其下深可浮數石舟伊闕連岡東西橫亘水上編木橋度之而西崖更危聳一山皆劈為崖滿崖鐫佛其上大洞數十高皆數十丈大洞外峭崖直入山頂頂俱刋小洞其內尺寸之處無不鐫佛望之不可數計洞左泉自山流下滙為方池餘㵼入伊川山高不及百丈而清流淙淙不絶為此地所希伊闕摩肩接轂為楚豫大道西北歷關陜余由此取西嶽道去遊太華山日記西安府華隂縣二月晦入潼關三十五里稅駕西嶽廟黃河從朔漠南下至潼關折而東關正當河山隘口北瞰河流南連華嶽惟此一線為東西大道以百雉鎖之舍此而北必渡黃河南必趨武關而華嶽以南峭壁層崖無可度者未入關百里外即見太華兀出雲表及入關反為龍岡所蔽行二十里忽仰見芙蓉片片已直造其下不特三峯秀絶而東西攢擁諸峯俱片峭層懸惟北面時有土岡至此盡脫山骨競發為極勝處三月初一日謁西嶽神登萬壽閣向西嶽南趨十五里入雲臺觀覓𨗳者於十方菴由谷出入兩崖壁立一溪中出玉泉院當其左循溪隨谷行十里為莎羅宫路始峻又十里為青柯坪路少坦五里過寥陽橋路遂絶攀鎖上千尺㠉再上百尺峽從崖左轉上老君犁溝過猢猻嶺去青柯五里有峯北懸深崖中三面絶壁則白雲峯也舍之南上蒼龍嶺過日月巖去犁溝又五里始上三峯足望東峯側而上謁玉女祠入迎陽洞道士李姓者留豫宿乃以餘晷上東峯昏返洞初二日從南峯北麓上峯頭懸南崖而下觀避靜處復上直躋峯直頂上有小孔道士指為仰天池旁有黑龍潭從西下復上西峯峯上石聳起有石片覆其上如荷葉旁有玉井甚深以閣掩其上不知何故還飯迎陽上東峯懸南崖而下一小臺峙絶壑中是棋盤臺别道士從舊徑下觀白雲峯聖母殿在焉下至莎羅坪暮色逼人急出谷黑行三里宿十方菴出青柯坪左上有杯渡菴毛女祠出莎羅坪右上有上方峯皆華之支峯也路俱峭削以日昏不及登初三日十五里入嶽廟西五里出華隂西門從小徑西南二十里入泓谷即華隂之西第三谷也兩崖參天而起夾立甚狹水奔流其間循澗南行倐而東折倐而西轉蓋山壁片削俱犬牙錯入行從牙罅中宛轉如江行調艙然二十里宿於木柸自嶽廟來四十五里矣初四日行十里山峪既窮遂上泓嶺十里躡其巔北望太華兀立天表東瞻一峯嵯峩特異土人云賽華山始悟西南三十里有少華即此山矣南下十里有溪從東南注西北為華陽川溯川東行十里南登秦嶺為華陽洛南界上下共五里又十里為黃螺鋪循溪東南下三十里宿楊氏城初五日行二十里出石門山始開又七里折而東南入隔凡谷西南二十里即洛陽縣谷東南三里越嶺行谷中十里出山則洛水自西而東即河南所渡之上流也渡洛復入嶺曰田家原五里下谷中有水自南來入洛溯之入十五里為景村山復開始見稻畦過此仍溯流入南谷南行五里至草樹溝山空日暮借宿山家自嶽廟至木柸俱西南行過華陽川則東南矣華陽而南溪漸大山漸開然對面之峯峥峥也下秦嶺至楊氏城兩崖忽開忽合一時互見又不比木柸峪中兩崖壁立有回曲無開合也初六日越嶺兩重凡二十五里飯塢底坌其西行道即向洛南者又東南十里入商州界去洛南七十餘里矣又二十五里上蒼龍嶺蜿蜒行嶺上兩溪屈曲夾之五里下嶺兩溪適合隨溪行老君谷中十里暮雨忽至投宿谷口初七日五里出谷大溪自西注東循之行十里龍駒寨寨東去武關九十里西向商州即陜省間道馬螺商貨不下潼關道中溪下板船可勝五石水自商州西至此經武關之南歷胡村至小江口入漢遂趨覓舟甫定雨大注終日不止舟不行初八日舟子以販鹽故久乃行雨後怒溪如奔馬兩山夾之曲折瀠洄轟雷入地之險與建溪無異已而雨復至午抵影石灘雨大作遂泊小影石灘初九日行四十里過龍關五十里北一溪來注則武關之流也其地北去武關四十里蓋商南境矣時浮雲已盡麗日乘空山嵐重疊競秀怒流送舟兩岸濃桃艷李泛光欲舞出坐船頭不覺欲仙也又八十里日尚未晡榜人以鹽易柴竹屢逗留夜宿山涯之下初十日五十里下蓮灘浪撲舟中沾囊濕篋二十里過百姓灘有峯突立溪右崖為水所摧岌岌欲墮出蜀西樓山峽少開已入南陽浙川境為秦豫界三十里過胡村四十里抵石廟灣登涯投店東南去均州上太和蓋一百三十里云遊太和山日記即武當山湖廣襄陽府均州十一日登仙猿嶺十里餘有枯溪小橋為鄖縣境乃河南湖廣界東五里有池一泓曰青泉上源不見所自來而下流淙淙地又屬浙川蓋二縣界址相錯依山溪曲折路經其間故也五里越一小嶺仍為鄖縣境嶺下有玉皇觀龍潭寺一溪滔滔自西南走東北蓋自鄖中來者渡溪南上九里岡經其脊而下為蟠桃嶺溯溪行塢中十里為葛九溝又十里登土地嶺嶺南則均州境桃李繽紛山花夾道幽艷非常山塢中居廬相望沿流稻畦高下鱗序不似山陜間矣但途中蹊徑狹行人稀且聞虎暴日方下舂竟至塢中曹家店十二日五里上火頭嶺下嶺隨流出峽四十里下行頭岡五十五里抵紅粉渡漢水汪然西來崖下蒼壁懸空清流繞面循漢東行抵均州靜樂宫當州之中踞城之半規製宏整停行李南城外計明晨登山十三日騎而南趨石道平敞三十里越一石梁有溪自西東注即太和下流入漢者越橋為迎恩宫西向前有碑大書第一山三字乃米襄陽筆書法飛動當亦第一又十里過草店襄陽來道亦至此合路漸西向過遇真宫越兩隘下入塢中從此西行數里為趨玉虛道南躋上嶺則走紫霄間道也登嶺自草店至此共十里為回龍觀望嶽頂青紫插天然相去尚五十里滿山喬木夾道密布上下如行緑幕中從此沿山行下而復上共二十里過太子坡又下入塢中有石梁跨溪是為九渡澗下流上為平臺十八盤即走紫霄登太和大道左入溪即溯九渡澗向瓊臺觀及八仙羅公院諸路也峻登十里則紫霄宫在焉紫霄前臨禹迹池背倚展旗峯層臺傑殿高敞特異入殿瞻謁由殿右上躋直造展旗峯之西峯畔有太子洞七星巖俱不暇問共五里過南巖之南天門舍之西度嶺謁榔仙祠祠與南巖對峙前有榔樹特大無寸膚赤幹聳立纎芽未發傍多榔梅樹亦高聳花色深淺如桃杏蒂垂絲作海棠狀梅與榔本山中兩種相傳玄帝插梅寄榔成此異種云共五里過虎頭巖又三里抵斜橋突峯懸崖屢屢而是徑多循峯隙上五里至三天門過朝天宫皆石級曲折上躋兩旁以鐵柱懸索由三天門而二天門一天門率取徑峯凹間懸級直上路雖陡峻而石級既整欄索鈎連不似華山懸空飛度也太和宫在三天門內日將晡竭力造金頂所謂天柱峯也山頂衆峯皆如覆鐘峙鼎離離攢立天柱中懸獨出衆峯之表四旁嶄絶峯頂平處縱橫止及尋丈中奉玄帝及四將爐案供具悉以金為之督以一千户一提點需索香金不啻禦奪豫入叩匆匆門已闔竟托宿太和宫十四日更衣上金頂瞻叩畢天宇澄朗下瞰諸峯近者鵠峙逺者羅列誠天真奧區也遂從三天門之右小徑下峽中此徑無級無索亂峯離立路穿其間逈覺幽勝三里餘抵蠟燭峯右泉涓涓溢出路旁下為蠟燭澗循澗右行三里餘峯隨山轉下見平丘中開為上瓊臺觀其旁榔梅數株大皆合抱花色浮空映山絢爛巖際地既幽絶景復殊異豫求榔梅實觀中道士禁不敢答既而曰此係禁物前有人攜出三四枚道流株連破家者數人余不信求之益力出畀數枚皆已黝爛且訂無令人知及趨中瓊臺豫復求之主觀仍謝無有因念由下瓊臺而出可往玉虛巖便失南巖紫霄奈何得一失二不若仍由舊徑上至路旁前溢處左越蠟燭峯去南巖應較近忽後有追呼者則中瓊臺小黃冠以師命促豫返主觀握手曰公渴求珍植幸得兩枚少慰公懷但一泄於人罪立至矣出而視之形侔金橘漉以蜂液金相玉質非凡品也珍謝别去復三里餘直造蠟燭峯凹中峯參差亷利人影中度兀兀欲動既度循崖宛轉連越數重峯頭土石往往隨地異色既而聞梵頌聲則仰見峯頂遙遙上懸已出朝天宫右矣仍上八里造南巖之南天門趨謁正殿右轉入殿後崇崖嵌空如懸廊復道蜿蜒山半下臨無際是名南巖又名紫霄巖為三十六巖之最天柱峯正當其面自巖還至殿左歷級塢中數抱松杉連隂挺秀塢中層臺孤懸高峯四眺名飛升臺暮返宫賄其小徒復得榔梅六枚再索之不可得矣十五日從宫左趨雷公洞洞左懸崖間豫欲返紫霄由太子巖歷不二菴抵五龍輿者謂紆曲不便不若由南巖下竹笆橋可覽滴水巖仙侶巖諸勝乃從北天門下一徑隂森滴水仙侶二巖在路左飛崖上突泉滴瀝於中中可容室皆祠真武至竹笆橋始有流泉聲然不隨澗行依山越嶺一路多突危巖間錯於亂蒨叢翠中時時放榔梅花映耀逺近過白雲仙龜諸巖共二十餘里循級直下澗底則青羊橋也澗即竹笆橋下流兩崖蓊蔥蔽日清流延回橋跨其上不知流之所去仰視碧落宛若甕口度橋直上攢天嶺五里抵五龍宫規製與紫霄南巖相伯仲殿後登山里許轉入塢中得自然菴已還至殿右折下塢中二里得凌虛巖巖倚重巖臨絶壑面對桃源洞諸山嘉木尤深密紫翠之色互映如圖畫為希夷習靜處前有傳經臺孤瞰壑中可與飛升作匹還過殿左登榔梅臺即下山至草店華山四面皆石壁故峯麓無喬枝異幹直至峯頂則松柏多合三人圍者松悉五鬛實大如蓮間有未墮者採食之鮮香殊絶太和四山環抱百里內密樹森植蔽日參天至近山數十里內則異杉老柏合三人抱者連絡山塢蓋國禁也嵩少之間平麓上至絶頂樵伐無遺獨三將軍柏巍然傑出耳山谷川原候同氣異豫出嵩少始見麥畦青至陜州杏始花栁色依依向人入潼關則驛路既平垂楊夾道梨李參差矣及轉入泓谷層冰積雪猶滿澗谷真春風所不度也過塢底岔復見杏花出龍駒寨桃雨栁煙迷離竟望忽憶日已清明不勝景物悴情遂自草店越二十四日浴佛後一日抵家以太和榔梅為老母壽閩遊日記崇禎改元之仲春發興為閩廣遊二十日始成行三月十一日抵江山之青湖為入閩登陸道十五里出石門街與江郎為面如故人再晤十五里至峽口已暮又行十五里宿山坑十二日二十里登仙霞嶺三十五里登丹楓嶺嶺南即福建界又七里西有路越嶺而來乃江西永豐道去永豐尚八十里循溪折而東八里至梨嶺麓四里登其巔前六里宿於九牧十三日三十五里過嶺飯於仙陽仙陽嶺不甚高而山鵑麗日頗可愛飯後得輿三十里抵浦城日未晡也時道路俱傳泉興海盜為梗宜由延平上永安余亦久蓄玉華之興遂覓延平舟十四日舟發四十里至觀前舟子省家早泊余遂過浮橋循溪左登金斗山石磴修整喬松艷草幽襲襟裾過三亭入玄帝宫由殿後登嶺兀兀中懸四山環拱重流帶之風煙欲暝步步惜别十五日辨色即行懸流鼓楫一百二十里泊水磯風雨徹旦溪喧如雷十六日六十里雙溪口與崇安水合又五十五里抵建寧郡雨不止十七日水漲數丈同舟俱閣不行上午得三板舟附之行四十里太平驛四十里大橫驛過如飛馬三十里黯淡灘水勢奔湧余昔逰鯉湖過此但見穹石崿峙舟穿其間初不謂險今則白波山立石悉沒形險倍昔時十里至延平十八日以輕裝出西門為玉華洞遊南渡溪令奴攜行囊由沙縣上水至永安相待豫陸行四十里渡沙溪而西將樂之水從西來沙縣之水從南來至此合流亦如延平之合建溪也南折入山六十里宿三連鋪乃甌寧南平順昌三縣界十九日五里越白沙嶺為順昌境又二十五里抵縣縣臨水際卲武之水從西來通光澤歸化之水從南來俱會城之東南隅隔水望城如溪堤之帶流也循水南行三十里至杜源忽雪片如掌十五里至將樂境乃楊龜山故里也又十五里為高灘鋪隂霾盡舒碧空如濯旭日耀芒羣峯積雪有如環玉閩中以雪為竒得之春末為尤竒村氓市媪俱曝日提爐而豫赤足騰踔乃大快也二十五里宿山澗渡之村家二十日渡山澗溯大溪南行兩山成門曰莒峽溪崖不受趾循山腰行十里出莒峽鋪山始開又十里入將樂出南關渡溪而南東折入山登滕嶺南三里為玉華洞先是過滕嶺即望東南兩峯聳立翠壁嶙峋逈與諸峯分形異色抵其麓一尾橫曵回護洞門門在山凹間不甚軒豁而森碧上交清流出其下不覺神湛骨冷山半有明臺菴洞後門所經豫時未飯復出道左登嶺石磴縈松透石三里青芙蓉頓開菴當其中飯於菴仍下至洞前門覓善𨗳者乃碎斫松節置竹簍中導者肩負之手提鐵落置松燃火燼輒益之初入歷級而下者數尺即流所從出也溯流屈曲度木板者數四倐隘倐穹倐上倐下石色或白或黃石骨或懸或竪惟荔枝柱風淚燭幔天帳逹摩渡江仙人田葡萄傘仙鼓仙鐘最肖沿流既窮懸級而上是稱九重樓遙望空濛忽曙色欲來所謂五更天也至此最竒恰與張公洞由暗而明者一致蓋洞門斜啓玄明映徹猶未覩天碧也從側嶺仰矚得洞門一隙直受圓明其洞口由高而墜含𢎞竒瑰亦與張公洞同苐張公森懸詭麗者俱羅於受明之處此洞炫巧爭竒遍布幽奧而闢户更拓兩洞同異正在伯仲間也拾級上達洞頂則穹崖削天左右若青玉頳膚實出張公所未偹下山即為田塍四山環鎖水出無路汩然中墜蓋即洞間之流此所從入也復登山半過明菴菴僧曰此山石骨稜厲透露處層層有削玉裁雲態苦為草樹所翳故逰者知洞而不知峯遂𨗳豫上拾鳥道下披蒙茸得星窟焉三面峭壁叢懸下墜數丈窟旁有野橘三株垂實纍纍從山腰右轉一二里忽兩山交脊處棘莽四塞中有石磴齒齒縈回於夾石間仰望峯頂一笋森森獨秀遂由洞後穹崖之上再歷石門下浴菴中宿焉二十一日仍至將樂南門取永安道二十四日始至永安舟奴猶未至二十五日坐待奴於永安旅舍市順昌酒浮白樓下忽呼聲不絶則延平奴也遂定明日早行計二十六日循城溯溪東南二十里轉而南二十五里登大泄嶺岧嶤行雲霧中如是十五里得平坂曰林田時方下午雨大竟止林田有兩溪自南來東渾而赤西則一川含緑至此合流二十七日溯赤溪行久之舍赤溪溯澄溪共二十里度坑源上下橋登馬山嶺轉上轉高霧亦轉重正如昨登大泄嶺時也五里透其巔為寧洋界下五里飯於嶺頭時旭日將中萬峯若引鏡照面回望上嶺已不可覩而下方衆岫駢列無不屐下獻形蓋馬山絶頂峯巒自相虧蔽至此始廓然為南標詢之土人寧洋未設縣時此猶屬永安今則嶺北水俱北者屬延平嶺南水俱南者屬漳州隨山奠川固當如此建置也其地南去寧洋三十里西為本郡之龍巖東為延平之大田云下山十里始從坑行度溪橋而南大溪遂東去踰嶺復隨西來小溪南行二十里抵寧洋東郭繞城北而西則前之大溪經城南來恰與小溪會始勝舟二十八日南下傳盜警舟不發者兩日四月初一日平明舟始前溪從山峽中懸流南下十餘里一峯突而西橫絶溪間水避而西復從東折勢如建瓴曰石㭰灘亂石叢立中開一門僅容舟舟從門墜高下丈餘餘勢屈曲復高下數丈較之黯淡諸灘大小雖懸殊險更倍之也衆舟至此俱鱗次以下每下一舟舟中人登岸共以纜前後倒曳之須時乃放過此山峽危逼復嶂插天曲折破壁而下直如劈翠穿雲三十里過館頭為漳平界一峯又東突流復環東西折曰溜水灘峯連嶂合飛濤一縷直舟從雲漢身挾龍湫矣已而山勢少開二十餘里為石壁灘其石自南而突與流相扼流不為却搗擊之勢險與石嘴溜水而三也下此有溪自東北來合再下夾溪復自東北來合溪流遂大勢亦平又東二十里則漳平縣也寧洋之溪懸溜迅急十倍建溪蓋浦城至閩安入海八百餘里寧洋至海澄入海止三百餘里程愈迫則流愈急况梨嶺下至延平不及五百里而延平上至馬嶺不及四百里而峻是二嶺之高伯仲也高等而入海則減轟雷入地之險宜咏於此初二日下華封舟行數里山勢復合重灘疊溜若建溪之太平黯淡者不勝數也六十里抵華封北溪至此皆從石脊懸瀉舟楫所不能過遂舍舟踰嶺凡水惟濫觴之始不能浮槎若既通而下流反阻者止黃河之三門集津舟不能上下然漢唐挽漕纜迹猶存未若華封自古及今竟無問津之時擬沿流窮其險處而居人惟知踰嶺無能為𨗳初三日登嶺十里至嶺巔則溪水復自西來下循山麓俯瞰祇一衣帶水耳又五里則隤然直下又二里抵溪舟行八十里至西溪西南陸行二十里即漳郡順流東南二十里為江東渡乃泉興東來驛道也又順流六十里則出海澄入海初四日輿行二十里入漳之北門訪叔司理署印南靖去郡三十里雨中出南門夜舟往南靖初五日曉始達南靖以溯流迂曲也溪自南平來至南靖六十里勢與西溪同其浩蕩經漳郡南門亦至海澄入海不知漳之得名兩溪誰執牛耳也後遊閩日記庚午春漳州司理叔促赴署余擬是年暫止遊屐而漳南之使為道叔祖念峩翁高年冒暑坐促於家遂以七月十七日啓行二十八日至龍遊覓得青湖舟去衢尚二十里泊於樟樹潭三十日過江山抵青湖舍舟登陸循溪覓勝得石崖於北渚崖臨回瀾澄潭潄其址隙綴茂樹石色青碧森森有芙蓉出水之態僧結檻依之豫踞坐石上有劉對豫者一見如故為豫言江山北二十里有左坑巖石竒詭探幽之屐不可不一過豫欣然返寓已下午不成行八月初一日冒雨行三十里一路望江郎片石咫尺不可見先擬登其下比至路口不果越山坑嶺宿寶安橋初二日登仙霞越小竿嶺近霧已收逺峯尚渺漫不可見又十里飯於二十八都其地東南有浮蓋山跨浙閩江西三省衢處信寧四府之境危峙仙霞梨嶺間為諸峯冠楓嶺埀西畢嶺東嶂梨嶺則其南案也怪石拏雲飛崖削翠豫每南過小竿北踰梨嶺遙瞻丰采輒為神往既飯興不能遏遍詢登山道一牧人言由丹楓嶺而上為大道而逺由二十八都溪橋之左越嶺經白花巖上道小而近豫聞白花巖益喜即迂道且趨之况其近也遂越橋南行數十步即由左小路登嶺三里下嶺折而南渡一溪又三里轉入南塢即浮蓋山北麓村也分溪錯嶺竹木清幽里號金竹云度木橋由業紙者籬門入取小級而登初皆田畦高疊漸漸直躋危崖又五里大石磊落棋置雲羅松竹與石爭隙已入勝地竹深石轉中峙一菴即白花巖也僧指其後山絶頂巒石甚竒菴之右岡環轉而左為裡山菴由裡山越高岡兩重轉下山之陽則大寺也右有犁尖頂左有石龍洞前瞰犁嶺可俯而挾矣豫乃從其右二里憩裡山菴裡山至大寺約七里路小而峻先躋一岡約二里岡勢北垂越其東塢下水皆東流即浦城界又南上一里越一岡循其左而上是謂獅峯霧重路塞舍之踰岡西下復轉南上二里又越一岡其岡左亦可上獅峯右即可登龍洞頂乃南向直下約二里抵大寺石痕竹影白花巖正得其具體而峯巒環列此真獨勝雨阻寺中者兩竟日初四日冒雨為龍洞遊同𨗳僧砍木通道扳亂磧而上露滃棘銛芾石籠崖獰惡如竒鬼穿簇透峽窈窕者益之詭而藏其嶮屼嵲者益之嶮而斂其高如是二里樹底睨峭萼扳踞其內右有夾壁離立僅尺上下如一似所謂一線天者不知其即通頂所由也乃爇火篝燈匍匐入一罅罅夾立而高亦如外之一線天苐外則頂開而明此則上合而暗初入其合處猶通竅一二深入則全黑矣其下水流沙底濡足而平中道有片石如舌上吐直豎夾中高僅三尺兩旁貼於洞壁洞既束肩石復當胸無可扳踐踰之甚艱再入兩壁愈夾肩不能容側身而進又有石片如前阻其隘口高更倍之豫不能登𨗳僧援之既登僧復不能下脫衣宛轉久之乃下豫猶側佇石上亦脫衣奮力僧從石下掖之遂得入其內壁少舒可平肩水較泓深所稱龍池也仰睇其上高不見頂而石龍從夾壁盡處懸崖直下洞中石色皆赭黃而此石獨白石理粗礪成鱗甲遂以龍神之挑燈遍燭而出石隘處上逼下礙入之自上懸身而墜其勢猶順出則自下側身以透胸與背既貼切於兩壁膝復不能屈伸石質刺膚前後莫可懸接每度一人急之愈固幾恐其與石為一也既出歡若更生而嵐氣忽澄登霄在望由明峽前行芟莽開棘不半里又得一洞洞皆大石膚疊如重樓復閣其中燥爽明透徘徊久之復上躋重崖二里登絶頂為浮蓋最高處踞石而坐西北霧頓開下視金竹里以東崩坑墜谷層層如碧玉輕綃逺近萬狀惟頂以南尚鬱伏未出循西嶺而下乃知此峯為浮蓋最東由此而西蜿蜒數峯再伏再起極於疊石菴乃為西隅再下為白花巖矣既連越二峯即裡山趨寺之第三岡也時豫每過一峯輒一峯開霽西峯諸石俱各為披露西峯盡又越兩峯峯俱有石層疊又一峯南向居中前聳二石一斜而尖是名犁頭尖石二石高聳數十丈堪為江郎支庶而下俱浮綴疊石數塊承以石盤如坐嵌空處俱可徙倚此峯南下一支石多嶙峋所稱雙筍石人攢列寺右者皆其𣲖也峯後散為五峯回環離立中藏一坪可廬亦高峯所罕得者又四越兩峯為浮蓋中頂皆石纍疊而成下者為盤上者為蓋或數石共肩一石或一石復平列數石上下俱成層臺雙闕浮蓋仙壇洵不誣稱矣其石高削無級不便扳躋登其巔羣峯盡出山頂之石四旁有苔如髮下垂柔緑浮煙娟然可愛西望疊石石仙諸勝尚隔三四峯日已西還飯寺中别之南下十里即大道已梨嶺之麓登嶺過九牧宿漁梁下街初五日下浦城舟行四日抵延平郡初十日復逆流上永溪泊榕溪其地為南平沙縣之中各去六十里先是浦城之水小而永安之流暴漲故順逆皆遲十一日舟曲隨山西南行亂石崢奔流懸迅二十里舟為石觸榜人以竹絲綿紙包木片掩而釘之止湧而已又十里溪右一山瞰溪如伏獅額有崖兩重閣臨其其上崖下圓石高數丈突立溪中於是折而東又十里月下上一灘泊於舊縣十二日山稍開西北二十里抵沙縣城南臨大溪雉堞及肩即溪崖也溪中多置大舟兩旁為輪關水以舂西十里南折山間右山石骨巉削而左山夾處有泉落凹隙如玉筯又西南二十里泊洋口其路通尤溪東有山曰里豐為一邑昨舟過伏獅崖望而見之今繞其西而南向十三日西南二十里漸入山又二十五里至雙口折而西北行五里至橫雙口溪右一水自北來至此合其北來之溪舟通巖前可七十里又五里入永安界曰新凌鋪十四日永安境中始聞猿聲南四十里為鞏川上大灘十里東南行忽望見溪右峯石突兀既而直逼其下則突兀者轉為參差為崩削俱盤亘壁立為峯為巖為屏為柱次第而見中一峯壁削到底或大書其上曰凌霄於是溪左之竒亦若起而爭勝者已舟折西北左溪之崖較詭異而更有出左溪上者則桃源澗也其峯排突溪南上逼層漢下瞰回溪峯底深裂流泉迸下仰其上曲檻飛欄遙帶不一爭停舟登焉循澗而入兩崖僅裂一罅竹影逼溪內得橋度澗再上有門曰長春圃亟趨之則溪南之峯前所仰眺者已在其北乃北上路旁一石方平如砥時暮色滿山路縱橫不可辨乃入大士殿得道人為𨗳隨之北即循崖經文昌閣轉越兩亭俱懸崖綴壁從此折入峭夾間其隙僅分一線上劈山巔逺透山北中不能容肩鑿之乃受纍級斜上直貫其中豫所見一線天數處武夷黃山浮蓋曾未見若此之大而逼逺而整者既而得天一方四峯攢列透隙而上一石方整曰棋枰中復得一臺一樹當空根盤於上有飛橋架兩崖間上下壁削懸空而度峯攢石裂岈然成洞曰環玉出洞復由棋枰側歷西塢而上得一井水甚甘冽躋峯北隅有亭甚豁苐北溪下繞反以逼仄不能俯瞰由此左下又有泉一泓滙為池以暮不及往乃南上絶頂一八角亭冠其上復從西路下山出倚雲關則石磴垂絶罅間一下百丈蓋是山四面斗削惟一線為暗磴百丈為明梯逰者以梯下而一線上始盡竒概舍此别無可階也還至大士殿昏黑不可出道人命徒碎木然火送之溪旁孤燈穿緑塢幾若隂房磷火道人云由長春圃二里有不塵館旁又有一百丈巖皆有勝可遊余頷之返舟促舟子夜行不可乃與奴輩併力刺舟幸灘無石月漸朗二鼓泊廢石梁下行二十里去永安止二里十五日抵城西橋下橋已毁而大溪自西來橋下之溪自南來依然余遊玉華時也繞城西而南溯南來之溪以去五十里至長倩溪出山右路循山左乃舍溪登嶺越嶺兩重西南過溪橋五里南過溪鳴橋又五里直凌西南山角以為已窮絶頂其上乃更復穹然不復上循山半而南紆折翠微間俯瞰山底溪回屈曲惟聞吼怒聲而深不見水蓋峻巒削岫錯立如交牙水潄其根上皆叢樹行者惟見翠葆浮空久之偶於樹隙稍露回湍渾赤如血又五里與赤溪遇又五里止於林田十六日沿山三里有峯自南直下峯東有小溪西為大溪俱北會林田而注於大煞嶺西者渡小溪循峯南上共五里至下橋逶迤南躋又八里得上橋一澗飛空懸橋而渡兩旁髙峯插天度橋路愈峻十里從山峽中直躋髙峯之南登嶺巔回視兩髙峯已在舄下計其崇峻大煞浮蓋當皆出其下南下三十五里抵寧洋縣十七日舟達華封十八日上午抵陸漸登山阪溪從右去以灘高石阻舟不能前也十里過山麓又五里跨華封絶頂溪從其下折而西去遙望西數里外灘石重疊水勢騰激至有一灘純石中斷而不見水者此峽中最險處自念前以雨阻不能達今奈何復失之乃北下三里得村一塢以為去溪不逺沿塢西行里許欲臨溪不得路始從蔗畦中下蔗窮又有蔓植者花如豆細莢未成復踐蔓行土流沙削不受屨方藉蔓為級未幾蔓窮皆荆棘藤刺叢不能入初側身投足不辨高下時時陷石坎挂樹杪既忽得一橫溪大道沿之西三里瞰溪咫尺溪聲震耳謂前望中斷之險必當其處時大道直西去通吳鎮羅埠覓下溪之路久不得見一小路伏叢棘中乃匍匐就之初猶有路影未幾下皆積葉高尺許蛛網翳之上則棘莽蒙密鉤髮懸股百計難脫比脫則懸澗注溪危石疊嵌而下石皆纍空間登其上始復見溪而石不受足轉墮深莽計不得前乃即從澗水中扳石踐流遂抵溪石上其石大如百間屋側立溪南溪北復有崩崖壅水水既南避巨石北激崩塊衝搗莫容躍隙而下下即升降懸絶倒湧逆捲崖為之傾舟安得通也踞大石坐又扳渡溪中突石而坐望前溪西去一㵼之勢險無踰此久之溯大溪踐亂石山轉處溪田層綴從之始得路循而西轉過所踞溪石二里許灘聲復沸如前則又一危磯也西二里得小路隨山脊直瞰溪而下始見前不可下之灘即在其上流而嶺頭所望純石中斷之灘即在其下流此觜中懸兩灘間非至此則兩灘幾隱矣踰嶺下舟明日抵漳州司理署後遊天台山日記壬申三月十四日自寧海發騎四十五里宿坌路口其東南十五里桑洲驛乃台郡道也西南十里松門嶺為入天台道十五日渡水母溪登松門嶺過王愛山共三十里飯於筯竹嶺菴其地為寧海天台界陟山岡三十餘里寂無人煙昔彌陀菴亦廢下一嶺衆山杳冥中得村家瀹茗飲石上又十餘里踰嶺入天封寺寺在華峯下為天台幽絶處郤騎同僧無餘上華頂寺宿淨因房月色明瑩其地去頂尚三里豫乘月獨上誤登東峯之望海尖西轉始得路至華頂歸寺已更餘矣十六日五鼓乘月上華頂觀日出衣履盡濕還炙衣寺中從寺右踰一嶺南下十里至分水嶺嶺西之水出石梁嶺東之水出天封循溪北轉水石漸幽又十里過上方廣寺抵曇花亭觀石梁竒麗若初識者十七日仍出分水嶺南十里登察嶺嶺甚高與華頂分南北界西下至龍王堂其地為諸道交會處南十里至寒風關又南下十里至銀地嶺有智者塔已廢左轉得大慈寺寺旁有石為智者拜經臺僧恆如為炊飯乃分行囊從國清下至縣豫與仲昭兄以輕裝東下高明寺寺為無量講師復建右有幽溪溪側諸勝曰圓通洞松風閣靈響巖十八日仲昭坐圓通洞寺僧導余探石筍之竒循溪東下抵螺溪溯溪北上兩崖削石夾立樹巔飛瀑紛紛踐石躡流七里山回溪墜已至石筍峯底仰面峯巒莫辨以右崖掩之也從崖側踰隙而下反出石筍之上始見一石矗立澗中澗水下倒其根懸而為瀑亦水石竒勝處也循溪北轉兩崖愈削下滙為潭是為螺螄潭上壁立而下淵深扳崖側懸藤踞石遙睇其內潭上石壁中劈為四岐若交衢然潭水下薄不能窺其涯涘最內兩涯之上一石橫嵌儼若飛梁梁內飛瀑自上墜潭中髙與石梁等四旁重崖回映可望而不可即非石梁所能齊也聞其上有仙人鞋在寒風闕之左可踰嶺而至雨驟不成行還憩松風閣二十日抵天台縣至四月十六日自鴈宕返乃盡天台以西之勝北七里至赤城麓仰視丹霞層亘浮屠標其巔兀立於重嵐攢翠間上一里至中巖巖中佛廬新整不復昔時凋敝時急於瓊臺雙闕不暇再躡上巖遂西越一嶺由小路七里出落馬橋又十五里西北至瀑布山莊登嶺五里上桐柏山越嶺而北得平疇一圍羣峯環繞若另闢一天桐柏宫正當其中惟中殿僅存夷齊二石像尚在右室雕琢甚古唐以前物也黃冠久無住此者羣農見逰客至俱停耕來訊遂挾一人為𨗳西三里越二小嶺下層崖中登瓊臺焉一峯突瞰重坑三面俱危崖回繞崖右之溪從西北萬山中直搗峯下是為百丈崖崖根澗水至瓊臺之足一泓深碧如黛是名百丈龍潭峯前復起一峯卓立如柱高與四圍之崖等即瓊臺也臺後倚百丈崖前即雙闕對峙層崖外繞旁絶附麗登臺者從北峯懸墜而下度凹脊處咫尺復扳枝仰陟而上俱在削石流沙間趾無所著也從臺端再攀歷南下有石突起窟其中為龕如琢削而成者曰仙人坐瓊臺竒在中懸絶壑積翠四繞雙闕亦其外繞中對峙之崖非由澗底再上不能登也憶豫二十年前同雲峯自桃源來溯其外澗入苐深窮其奧窟今始俯仰於崖端髙深俱無遺勝矣飯桐柏宫仍下麓南從小徑渡溪十里出天台關嶺之官道復南入小徑隙行十里路左一峯兀立若天柱問知為青山茁又溯南來之溪十里宿於坪頭潭之旅舍十七日由潭西南八里至江司陳氏渡溪左行又八里南折入山陟小嶺二重又六里重溪回合中忽石巖髙峙其南即寒巖東即明巖也今僮馳先炊飯明巖寺余輩遂南向寒巖路左俱懸崖盤列中有一洞岈然洞前石兔蹲伏口耳俱備路右即大溪縈繞中一石突出如擎蓋心頗異之既入寺向僧索龍鬚洞靈芝石即此也寒巖在寺後宏敞有餘玲瓏未足由洞右一穴上視鵲橋而出由舊路一里右入龍鬚洞路為莽棘所翳上躋里許如歷九霄其洞圓聳明豁洞口斜倚一石頗似鴈宕之石梁而梁頂有泉中灑與寶冠之芭蕉洞如出一冶下山仍舊路口東溯小溪南轉入明巖寺寺在巖中石崖四面環之止東面八寸關通一線寺後洞窈窕非一洞右有石笋特起雖不及靈巖之雄偉亦具體而微矣飯後由故道騎而馳三十里返坪頭潭又北二十五里過大溪即西從關嶺來者是為三茅又北五里越小澗二重直抵北山下入護國寺宿焉十八日晨急詣桃源桃源在護國寺東二里西去桐柏僅八里昨逰桐柏時留為還登萬年之道故先寒明及抵護國知其西有秀溪由此入萬年更可收九里坑之勝於是又另趨桃源初入澗口里許得金橋潭由此而上西山愈束翠壁穹崖層疊曲折一溪介其中溯之三折而溪窮瀑布數丈由左崖㵼溪中豫昔來瀑下路窮莫上仰視穹崖北峙溪左右雙環諸峯娟娟攢立嵐翠交流幾不能去今忽從右崖叢莽中尋得石徑層疊遂不及呼仲昭冒雨撥棘而上登級既盡復疊石橫棧度崖之左已出瀑上更溯之入直抵北巖下蹊蹬俱絶兩瀑自巖左右分道下遙睇巖左猶有遺磴從之則向有纍石為橋於左瀑之上者橋已中斷不能度睇瀑之上流從東北夾壁中來止容一線可踐流而入計其勝不若右巖之瀑乃還從大石間向西北上躋抵峽窟下得重潭甚厲四面俱直薄峽底無可緣陟苐從潭中西望見石峽之內復有石峽瀑布之上更懸瀑布皆從西北杳冥中來至此則繽紛亂墜於回崖削壁之上嵐光掩映石色飛動久之還出層瀑下仲昭以覓路未得方獨坐觀瀑遂同返護國聞桃源溪口亦有路登慈雲通元二寺入萬年路較近時以秀溪勝故飯後仍取秀溪道西行四里北折入溪溯流三里漸轉而東向是為九里坑坑窮一瀑破東崖下墜其上亂峯森立路無可上由西嶺躋繞出其北回瞰瀑背石門雙插內有龍潭在焉又東北上數里踰嶺山坪忽開五峯圍拱中得萬年寺去護國三十里矣萬年為天台西境正與天封對石梁當其中寺中古杉甚多飯於寺又西北三里逾寺後高嶺又向西升陟嶺角者十里乃至騰空山下牛牯嶺三里抵麓又西逾小嶺三重共十五里出會墅大道自南來望天姥山在內已越而過之以為會墅乃平地耳西北下三里漸成溪循之五里宿斑竹旅舍後遊雁宕日記余與仲昭兄遊天台為壬申三月至四月二十八日達廣巖再訪雁山覓騎出南門循方山十里折而西南行三十里踰秀嶺飯於巖前鋪五里為樂清界五里上盤山嶺西南雲霧中隱隱露芙蓉一簇雁山也十里鄭家嶺十里大荆驛渡石門澗新雨溪漲及馬腹五里宿於張家樓是為雁山之東外谷張氏盛時建樓以憩山遊之屐今旅肆寥落猶存其名二十九日西入山望老僧巖而趨二里過其麓又二里北渡溪上石梁洞仍還至溪旁西二里逾謝公嶺嶺以內為東內谷嶺下有溪自北來夾溪皆重巖怪峯突兀無寸土雕鏤百態北折渡溪百許入靈峯寺峯竒峭離立滿前寺後一峯獨聳中列一璺上透其頂名靈峯洞躡千級而上石臺重整洞中羅漢像俱更新下飯寺中同僧自照膽潭越溪左觀風洞洞僅半規風蓬蓬出射數步外遂以溪左歷探崖間諸洞還寺雨大至豫赤足持傘溯溪北上將抵真濟寺山深霧黑茫無所覩乃還過溪東入碧霄洞守愚上人精舍在焉豫覺其有異令僮還招仲昭亦踐流而至恨相見之晚薄暮返宿靈峯三十日冒雨循流西折二里一溪自西北來合其勢愈大渡溪而西溯而西北行三里入淨明寺雨益甚雲霧中仰見兩崖重巖夾立層疊而上莫辨層次衣履沾透益深窮西谷中有水簾谷維摩石室説法臺諸勝二里至響巖巖右有二洞飛瀑罩其外豫從榛莽中履險以登其洞一名龍王一名三台二洞之前有巖突出若露臺然可棧而通也出洞返眺響巖之上一石側耳附峯頭為聽詩叟又西二里入靈巖自靈峯西轉皆崇巖連嶂一開而為淨明一璺直入所稱一線天也再開而為靈巖疊嶂回環寺當其中五月初一日仲昭與豫同登天聰洞洞中東望圓洞二北望長洞一皆透漏通明苐峭石直下隔不可逾豫乃復下至寺中負梯破莽率僮踰别塢直抵圓洞下梯而登不及則斫木橫嵌夾石間踐木以升復不及則以繩引梯懸石隙之樹梯窮濟以木木窮濟以梯梯木俱窮則引繩揉樹遂入圓洞中呼仲昭相望而語復如法躡長洞而下巳日中矣西抵小龍湫之下欲尋劍泉不可得踞石磧而坐仰視回嶂逼天峭峰倒插飛流挂其中真若九天曳帛者西過小剪刀峯又過鐵板嶂嶂方展如屛高插層崖之上下開一隙如門惟雲氣出沒阻絶人迹又過觀音巖路漸西巖漸拓為犁尖復與常雲並峙常雲南下伏而復起為戴辰峯其伏處有凹曰馬鞍嶺內谷之東西分者以是嶺為界從靈巖至馬鞍嶺凡四里而崇巒嵽嵲應接不暇踰嶺日漸薄崦嵫二里西過大龍湫溪口又二里西南入宿能仁寺初二日從寺後塢覓方竹無佳者上有曇花菴頗幽寂出寺右觀燕尾泉即流自龍湫來者分二股落石間故名仍北溯流二里西入龍湫溪口更西二里由連雲嶂入大剪刀峯巍然立澗中兩崖石壁回合大龍湫之水從天下墜坐看不足亭前對龍湫後揖剪刀身在四山中也出連雲嶂踰華嚴嶺共二里入羅漢寺寺久廢卧雲師近新之卧雲年八十餘其相與飛來石羅漢相似開山巨手也豫邀師窮頂師許同上常雲而雁湖反在其西由石門寺為便時已下午以常雲期之後日遂與其徒西踰東嶺至西外谷共四里過石門寺廢址隨溪西下一里有溪自西來合即凌雲寶冠諸水也二水合而南入海乃更溯西來之溪宿於凌雲寺寺在含珠峯下孤峯插天忽裂而為二自頂至踵僅離咫尺中含一圓石如錢尤竒絶循溪北入石夾即梅雨潭也飛瀑自絶壁下激勢甚雄不似空濛雨色而已初三日仍東行三里溯溪北入石門停擔黃氏墓堂歷級北上雁湖頂道不甚峻直上二里向山漸伏海嶼來前愈上海輒逼足下又上四里遂踰山脊山自東北最高處迤邐西來散為四支皆易石而土四支之脊隱隱隆起其夾處滙而成窪者三每窪中復有脊南北橫貫中分為兩總計之不止六窪矣窪中積水成蕪青青彌望所稱雁湖也而水之分墮於南者或自石門或出凌雲之梅雨或為寶冠之飛瀑其北墮者則宕隂諸水也皆與大龍湫風馬牛無及云既踰岡南望大海北瞰南閣之溪皆逺近無蔽惟東峯尚高出雲表豫欲從西北别下寶冠重巖積莽莫可寄足復尋舊路下石門西過凌雲從含珠峯外二里依澗訪寶冠寺寺在西谷絶塢中已久廢其最深處石崖回合磴道俱絶一洞高懸崖足斜石倚門門分為二軒豁透爽飛泉中灑內多芭蕉頗似閩之美人蕉外則新籜高下漸已成林至洞聞瀑聲如雷而崖石回掩了不可得見乃下山涉溪回望洞之右脅崖卷成罅瀑從罅中直墜下搗於圓凹復躍出凹成溪去其髙亞龍湫較似雄勝故非宕山第二流也東出故道宿羅漢寺初四日早望常雲峯白雲濛翳然不為阻趣卧雲同上東踰華嚴二里由連雲嶂之左道松洞之右躋級西上共三里俯瞰剪刀峯已在屐底一里山回溪出龍湫上流也渡溪過白雲雲外二廬又北入雲靜庵庵廬與登山徑修整俱異昔時卧雲令其徒採筍炊飯既飯諸峯雲氣倐盡仲昭留坐庵中豫同卧雲直躋東峯又二里漸聞水聲則大龍湫從卷崖中㵼下水出絶頂之南常雲之北夾塢中即其源也溯水而上二里水聲漸微又二里踰山脊此脊北倚絶頂南出分為兩枝東枝為觀音巖西枝為常雲峯此其過脈處也正脊之東為吳家坑其峯之回列者近為鐵板嶂再繞為靈巖又再繞為淨明又再繞為靈峯外為謝公嶺而盡脊之西其坑即龍湫背其峯之回列者近為龍湫之對崖再繞為芙蓉峯又再繞為凌雲又再繞為寶冠上為李家山而止此雁山南面諸峯也而觀音常凌二峯正當其中已伏杖履下惟北峯若負扆然猶屏立於後北上二里一脊平峙狹如亘牆兩端昂起北頽然直下即南閣溪橫流界不若南面之環互矣豫從東巔躋西頂倐躑躅聲大起則駭鹿數十頭也其北一峯中剖若斧劈中則石筍參差亂崖森立深杳無底鹿皆奔聚其中想有隕塹者諸僧至復以石片擲之聲如裂帛半響始沉鹿益啼號不已從此再西則石脊中斷峯亦漸下西北瞰雁湖愈逺愈低豫二十年前探雁湖東覓高峯為斷崖所阻懸綆而下即此處也昔歷其西今東出其上無有遺憾矣返下雲靜菴循溪至大龍湫上下瞰湫頂龍潭圓轉夾崖間水從卷壁墜潭躍而下噴光怪不可迫視遂踰溪西上南出龍湫之對崖歷兩峯而南其嶺即石門之東羅漢之西南出為芙蓉峯又南下為東嶺者也芙蓉峯圓亘特立在羅漢寺西南隅既至其下始得路東達寺日已西仲昭亦先至矣初五日别卧雲出羅漢寺循溪一里至龍湫溪口凡四里踰馬鞍而下北望觀音巖下有石璺若門層裂非一仲昭已前向靈巖余挾一僮北抵峯下循樵西轉二里直抵觀音常雲之麓始知二峯上雖遙峙其下石壁連亘成城又循崖東躋里許出石璺之上叢木密隂不能下窺崖端盤石如擎蓋上平如砥下四面皆空坐其上久之復下循石璺而入層崖懸裂皆可捫而通也璺外一峯特起薄齊雲片圓頂拱袖高若老僧巖儼一小兒拱立出路隅居多吳氏有吳應嶽者留余餐豫挾之溯溪入即絶頂所望吳家坑溪也在鐵板觀音之間欲上溪左黃巖層洞崖在鐵板嶂西洞在巖左若上下二層者抵其下不得上出其上洞又在懸崖間無可下也乃循崖東行又得一石璺望其上層疊可入計非構木懸梯不能登從此下一小峯曰鶯嘴巖與吳别東過鐵板嶂下見其中石璺更大下若有洞流而成溪者亟溯流入抵洞下亂石窒塞而崖左有路直上鑿坎懸崖間垂藤可扳遂奮勇上衣礙則解衣杖礙則棄杖凡直上一崖復橫歷一崖如是者再又棧木為橋者再遂入石璺中石對峙如門中寬廣得纍級以升又入石門兩重仰睇其上石壁環立青天一圍中圓如井壁窮透入洞洞底日光透處有木梯猱升其上若樓閣然從閣左轉復得平墟後即鐵板嶂高列東西危崖環繞南面石璺下伏軒敞回合真仙靈所宅矣內有茅屋一楹虛無人居隙地上多茶樹故坎石置梯往來其間耳下至溪旁有居民遂越小剪刀峯而東二里入靈巖與仲昭會初六日挾靈巖僧為屏霞嶂之逰由龍鼻洞右扳石罅上半里得一洞甚竒又上半里崖穹路絶有梯倚崖端蓋燒炭者所遺緣梯出其上三巨石橫疊兩崖間內覆石成室跨其外者為仙橋其室空明幽敞蔽於重巖之側雖無鐵板嶂石門之竒瑰攢合而幽邃自成一天復透洞左上扳藤歷棧遂出屏霞嶂之中層蓋龍鼻頂也崖端亦寬塏可廬後嶂直倚霄漢嶂右有巖外覆飛泉落其前由右復扳躋崖石幾造嶂頂為削石所阻其側石隙一縷草木緣附可著足遂隨之崖間多修藤垂蔓各採而攜之當石削不受樹樹盡不受趾輒垂藤下如是西越石岡者五重降升不止數里始下臨絶澗即小龍湫上遊也其澗發源雁頂之東南右即鐵板左即屏霞二嶂墜為絶壑重崖虧蔽上下無徑非懸綆不能飛渡也入澗踐石隨流東行里許大石橫踞澗中水不能越穴石下搗兩旁峭壁皆陡立行者路絶乃縛木為梯升崖端復縋入前澗下流則橫石之下空然中空可樹十丈旗水從石後建瓴下注滙潭漾碧翛然沁人左右兩崖俱有洞高峙由此而前即龍湫下墜處也余兩次索劍泉寺僧輒云在龍湫上人力鮮達今仍杳然知淪沒已久欲從此橫下兩峯遂可由仙橋達石室乃斫木縛梯盤絶巘者數四俯視獨秀雙鸞諸峯近在屐底既逼仙橋隔崖中斷日已西疲甚乃返覓前轍復經屏霞側石室返寺擕囊過淨明投宿靈峯初七日溯寺前溪觀南碧霄洞軒爽無他竒又三里西轉望真濟寺在溪北塢中是溪西由斷崖破峽而來峽南峯為五馬朝天崢嶸尤甚兩旁逼仄石蹊內無居民行里許徑塞雲迷不可窮歷北過真濟寺寺僻居北谷逰屐不到寺右溯小溪三里登馬家山嶺路甚峻登巔望雁頂稜簇如蓮花狀北瞰南閣已在屐底飛舄而下四里餘得新菴弛擔於中溯南閣溪探宕隂諸勝南閣溪發源雁山西北之箬裊嶺去此三十餘里與永嘉分界由嶺而南可通芙蓉入樂清由嶺而西走楓林則入甌郡道也溪南即雁山之隂山勢崇拓竹木蓊茸不露南面􅏭嵲態溪北大山自箬裊迤邐而來皆層崖怪峯變換闔闢與雲霧爭幻至閣而止又一山北之溪自北閣來會俱東下石門潭門內平疇千畝居民皆以石門為户牖此閣所由名而南北則分以溪也南閣有章恭毅宅西入有石佛洞散水巖洞仙巖諸勝北閣有白巖寺舊址更西有王子晉仙橋為尤竒余冒雨窮南閣先經恭毅宅聚族甚盛溯溪五里過犁頭菴南即石佛洞以路蕪不能入西十里至莊塢夾溪居民皆葉姓散水巖在北塢中石崖橫亘飛瀑懸流崖左登嶺有小菴時暮雨土人留宿莊塢具言洞仙院之勝初八日雨未止西溯溪行三里山澗愈幽隨溪轉而北又二里隔溪小徑破雲磴而入東渡溪從之忽峯回溪轉深入谷中則煙巒歷亂峯從莊塢之後連亘至此又開一隙現此瑰異問之人曰此小纂厝也洞仙尚在其外大溪上流復出而渡溪里許有溪自東來入即洞仙塢溪矣渡大溪溯小溪東上其中峯巒茅舍與前無異洞仙即在其內崖倚峯北向層篁蔽之乃破莽躋石隙而入初甚隘最上漸寬仍南出莊塢東還犁頭菴終不得石佛洞道遂出過南閣訪王子晉仙橋在北閣底尚二十里念仲昭在新菴甚近還晤菴中日已晡竟不及為北閣逰東趨大荆而歸遊五臺山日記山西太原府五臺縣七月二十八日出都為五臺遊越八月初四日抵阜平南關山自唐縣來至唐河始密至黃葵漸開勢不甚穹窿矣從阜平西南過石梁西北諸峯復嵱嵷起循溪左北行八里小溪自西來注乃舍大溪溯西溪北轉山峽漸束又七里飯於太子鋪北行十五里溪聲忽止回顧右崖石壁數十仭中凹如削瓜直下上亦有凹乃瀑布所從溢者今天旱無瀑瀑痕猶在削凹間離澗二三尺泉從凹間細孔泛濫出下遂成流再上踰鞍子嶺嶺上四眺北塢頗開東北西北高峰對峙俱如仙掌插天惟直北一隙少殺復有逺山橫其外即龍泉關也去此尚四十里嶺下有水從西南來初隨之北行已而溪從東峽中去復踰一小嶺則大溪從西北來勢甚壯亦從東南峽中去當即與西南之溪合流出阜平北者豫初過阜平舍大溪而西以為西溪即龍泉之水也不謂西溪乃出鞍子嶺凹壁踰嶺而復與大溪之上流遇大溪則出自龍泉者溪有石梁曰萬年過之溯流望西北高峯而趨十里逼峯下為小山所掩反不覩嶙峋之勢轉北行向所望東北高峯瞻之愈出趨之愈近峭削之姿遙遙逐人二十里間勞於應接是峯名五巖寨又名吳王寨有老僧廬其上已而東北峯下溪流溢出與龍泉大溪會土人搆石梁於上非龍關道所經從橋左北行八里時遇崩崖矗立溪上又二里重城當隘口為龍泉關初五日進南關出東關北行十里路漸上山漸竒泉聲漸微既而石路陡絶兩崖危峯峭壁合沓攢竒山樹與石競麗錯綺不復升陟之煩也如是五里崖逼處復設石關二重又直上五里登長城嶺絶頂回望逺峯極高者亦伏足下兩旁近峯擁護惟南來一線有山隙徹目百里嶺之上巍樓雄峙即龍泉上關也關內古松一株枝聳葉茂秀拔干雲關之西即為山西五臺縣界下嶺甚平不及所上十之一十三里為舊路嶺已在平地有溪從西南來至此隨山向西北去行亦從之十里五臺水自西北來會合流注滹沱河乃循西北溪數里為天池莊北向塢中二十里過白頭菴村去南臺止二十里四顧山谷猶不可得其倣佛又西北二里路左為白雲寺由其前南折攀躋四里折上三里至千佛洞乃登臺間道又折而西行三里宿初六日風怒起滴水皆冰風止日出如火珠湧吐翠葉中循山半西南行四里踰嶺始望南臺在前再上為燈寺由此路漸峻十里登南臺絶頂有文殊舍利塔北面諸臺環列惟東南西南少有隙地正南古南臺在其下逺則盂縣諸山屏峙而東與龍泉爭雄接勢從臺右道而下途頗夷可騎循西嶺西北下十五里為金閣嶺又循山左西北下五里抵清涼石寺宇幽麗高下如圖畫有石為芝形縱橫各九步上可立四百人面平而下鋭屬於下石者無幾從西北歷棧拾級而上十二里抵馬跑泉泉在路隅山窩間石隙僅容半蹄水從中溢出窩亦平敞可寺而馬跑寺反在泉側一里外又平下八里宿獅子窠初七日西北行十里度化度橋一峯從中臺下兩旁流泉淙淙幽靚逈絶復度其右澗之橋循山西向而上路欹甚又十里登西臺之頂日映諸峯一一獻態呈竒其西面近則蔽魔巖逺則雁門關歷歷可俯而挈也閉魔巖在四十里外山皆陡崖盤亘層纍而上為此中竒處入叩佛龕即從臺北下三里為八功德水寺北面左為維摩閣閣下二石臺聳起閣架於上閣柱長短隨石參差有竟不用柱者其中為萬物閣佛俱金碧旃檀羅列輝映不啻萬尊前復有閣二重俱三層其周廬環閣亦三層中架復道往來空中當此萬山艱阻非神力不能運此從寺東北行五里至大道又十里至中臺望東臺南臺俱在五六十里外而南臺外之龍泉反若更近惟西臺北臺相與連屬時風清日麗山開列如鬚眉豫先趨臺之南登龍翻石其地亂石數萬湧起峯頭下臨絶塢中懸獨聳言是文殊放光攝影處從臺北直下者四里隂崖懸冰數百丈曰萬年冰其塢中亦有結廬者初寒無幾臺間冰雪種種而是聞雪下於七月二十七日正豫出都時也行四里北上澡浴池又北上十里宿於北臺北臺比諸臺尤峻豫乘日色周眺寺外及入寺日落而風大作初八日老僧石堂送豫歷指諸山曰北臺之下東臺西中臺中南臺北有塢曰臺灣此諸臺環列之概也其正東稍北有浮青特鋭者恆山也正西稍南有連嵐一抹者雁門也直南諸山南臺之外惟龍泉為獨雄直北俯內外二邊諸山如蓓蕾惟兹山之北護峭削層疊嵯峨之勢獨露一班此北臺歷覽之概也此去東臺四十餘里華嚴嶺在其中若探北嶽不若竟由嶺北下河省四十里登降余頷之别而東直下者八里平下者十二里抵華嚴嶺由北塢下十里始夷一澗自北一澗自西兩澗合而羣峯湊深壑中一壺天也循澗東北行二十里曰野子場南自白頭菴至此數十里內生天花菜出此則絶種矣由此兩崖屏列鼎峙雄峭萬狀如是者十里石崖懸絶中層閣傑起則懸空寺也石壁尤竒此謂北臺外護山不從此出幾不得臺山神理云遊恆山日記山西大同府渾源縣去北臺七十里山始豁然曰東底山臺山北盡處即屬繁峙界矣初九日出南山大溪從山中俱來者别而西去豫北馳平陸中望外界之山高不及臺山十之四其長繚繞如垣東帶平邢西接雁門橫而徑者十五里北抵山麓渡沙河即為沙河堡依山瞰流磚甃高整由堡西北七十里出小石口為大同西道直北六十里出北路口為大同東道豫從堡後登山東北數里至峽口有水自北而南即下注沙河者也循水入峽與流屈曲荒谷絶人數里義興寨數里朱家坊又數里至葫蘆嘴舍澗登山循嘴而上地復成塢溪流北行為渾源界又數里為土嶺去州尚六十里西南去沙河共五十矣遂止居民同姓家初十日循南來之澗北去三里有溪自西來合共東北折而去余溯西澗入又一澗自北來遂從其西登嶺道甚峻北向直上者六七里西轉又北躋而上者五六里登峯兩重造其巔名箭筸嶺自沙河登山涉澗盤旋山谷所值皆土魁荒阜不意至此忽躋穹窿然嶺南猶復阿蒙也一踰嶺北瞰東西峯連壁隤翠蜚丹流其盤空環映者皆石也而石又皆樹石之色一也而神理各分妍樹之色不一也而錯綜成合錦石得樹而嵯峨傾嵌者幕以藻繢而愈竒樹得石而平鋪倒蟠者緣以突兀而尤古如此十五里直下至坑底則奔泉一壑自南注北遂與之俱出塢口堡臨之村居頗盛皆植梅杏成林蔽麓既出谷復得平麓其北又有外界山環之長亦自東而西東去渾源州三十里而去應州七十里龍谷之臨外界高平逺近一如東底山之視沙河峽口諸山也於是沿山東向望谷之東山愈嶙嶒斗削問為龍山龍山之名舊著於山西而不知與恆嶽比肩至是既西涉其閫域又北覽其面目從不意中得之可當五臺桑榆之收矣東行十里為龍山大雲寺寺南面向山又東十里有大道往西北直抵恆山之麓遂折而從之去山麓尚十里望其山兩峯亘峙車騎絡繹破壁而出乃大同入倒馬紫荆大道也循之抵山下兩壁削立一澗中流透罅而入逼仄如無所向曲折上下俱成窈窕伊闕雙峙武夷九曲俱不足以擬之也時清流未泛行即溯澗不知何年兩崖俱鑿石坎大四五尺深及丈上下排列想水溢時插木為閣道者今廢已久僅存二木懸架高處猶棟梁之巨擘也三轉峽愈隘崖愈高西崖之半層樓高懸曲榭斜倚望之如蜃吐重臺者懸空寺也五臺北壑亦有懸空寺擬此未能具體仰之神飛鼓勇獨登入則樓閣高下檻路屈曲崖既矗削為天下巨觀而寺之點綴兼能盡勝依巖結搆而不為巖石纍者僅此僧寮位置適序凡客坐禪龕明窗暖榻尋丈之間肅然中雅既下又行峽中者三四轉則洞門豁然巒壑掩映若别有一天者又一里澗東有門榜三重高列阜上其下石級數百層承之則北嶽恆山廟之山門也去廟尚十里左右皆土山層疊嶽頂杳不可見止門側土人家為明日登頂計十一日風翳淨盡澄碧如洗策杖登嶽面東而上土岡淺阜無攀陟勞蓋山自龍泉來凡三重惟龍泉一重峭削在內而關以外則土脊平曠五臺一重雖崇峻而骨石聳拔俱在東底山一帶出谷之處其第三重自峽口入山而北西極龍山之頂東至恆嶽之陽亦皆藏鋒斂鍔一臨北面則峯峯陡削悉現巖巖本色一里轉北山皆煤炭不深鑿可得又一里土石皆赤有虬松離立道旁亭之曰望仙又三里崖石漸起松影篩隂名虎風口石路縈回始循崖乘峭而上三里有傑坊曰朔方第一山內則官廨厨井俱備坊右東向拾級上崖半為寢宫宫北為飛石窟相傳真定府恆山從此飛去再上則北嶽殿也上負絶壁下臨官廨殿下雲級插天廡門上下穹碑森立從殿右上有石窟倚而室之曰會仙臺臺中像羣仙環列無隙豫時欲躋危崖登絶頂還過嶽殿東望兩崖斷處中垂草莽者千尺為登頂間道遂解衣扳躡而登二里出危崖上仰眺絶頂猶傑然天半而滿山短樹蒙密槎牙枯竹但能鈎衣刺領扳踐輒斷折用力雖勤若墮洪濤汨汨不能出豫益鼓勇上久之棘盡始登其頂時日色澄麗俯瞰山北崩崖亂墜雜樹蒙翳是山土山無樹石山則有北向俱石故樹在北渾源州城一方即在山麓北瞰隔山一重蒼茫無際南惟龍泉西惟五臺青青與此作伍近則龍山西亘支峯東連若比肩連袂下扼沙漠者既而下西峯尋前入峽危崖俯瞰茫茫不敢下忽回首東顧有一人飄搖於上因復上其處問之指東南松柏間望而趨乃上時寢宫後危崖頂未幾果得徑南經松柏林先從頂上望松柏蔥青如蒜葉草莖至此則合抱參天虎風口之松柏不啻百倍之也從崖隙直下恰在寢宫之右即飛石窟也視豫前上隘中止隔崖一片耳下山五里由懸空寺危崖出又十五里至渾源州西關外徐霞客遊記卷一下

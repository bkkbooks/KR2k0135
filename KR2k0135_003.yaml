body:
  text: 徐霞客逰記卷三上明徐宏祖撰西南逰日記三廣西丁丑閏四月初八日分頋僕舟抵桂林予同靜聞從湘江南岸登涯為山角驛即黄沙也西南行大松夾道五里黄沙舖又二十里舍官道右入山西向大山行四里止山下牛頭岡初九日西五里至礲岩普順寺寺前門東向如橋出水約三十丈后門北向入水約十五丈泉自山后破石窟三級下故曰礲西二里小石山兀立路旁又三里張家村村后大山曰迴龍岩南五里上大衝衝西半里飯福夀菴西北上栁山三里宿獅子岩南清泉菴初十日南下二里至湘山寺寺在全州西門外半里登殿觀無量夀佛塔塔后有飛來石出寺由寺西泝羅江一里上捲雲閣閣西為盤石半嵌江中絶壁有蓮花一瓣凹入壁間白瓣黒崖又西一洞臨江泉由洞東裂石出曰玉龍泉復有一石峰髙䜿共十五里度石蜆岡差南為龍洞小山獨立江上門西向出洞而西抵橋度橋度水東自龍水出口山聳秀夾立十一日度橋西北行十里北入峽為山川口又十三里抵白竹江望西北鈎挂山甚峭特聞其上金寳頂甚竒遂自白竹橋朔江西北五里進峽口兩山壁立夾溪沿溪東北崖上行縁崖髙下屈曲十里出峽為南峒聞南洞北五里峒盡可由四川嶺達寳頂但路已没遂舍北道西渡溪上嶺嶺左腋有瀑布又十里至打狗凹宿興隆菴菴北髙嶺即金寳頂也十二日由菴西上沿崖北轉三下上又三度坳曲共三里踰土地坳西望新寧江已在山麓下山五里大竹坪坪北踰嶺共三里至大鼻山十三日從大鼻村後夾澗上一里飛瀑懸崖宛轉下修竹迴岩掩映即西扳嶺上約行一里至南來大道乃南從大源上此者又四里至角菴基伏身蛇行菴后叢竹中四里乃從右崖叢中上又二里行觀音竹叢中竹大如管多竹實如蓮肉大採笋置路隅識來徑竹中上二里至寳頂殿基日甫中四山俱出南峰近為鈎挂山石崖峭立東北向若削再南即打狗嶺再南為大㡌再南為南寳頂頂最髙與北相頡頏而基后絶頂更倍之復從竹叢中東北上一里至頂觀音竹更大笋腴羙然叢宻無由四望登樹踐枝終不暢眺忽竹浪中出大石如䑓梯躋其上羣山歴可縷數仍下山宿大鼻村十四日随溪西下四里為大源則大鼻西峡水與村後東峡水會橋於上曰潮橋橋西為大源村余往南頂則從橋東随澗南行里許度木橋澗忽東折入山路南出山隘澗復墜路東破峡出連搗三潭上方瀑長如布中凹瀑轉傾下圓整瀑匀成簾下二潭俱有圓石中立承水水堕潭作勢瀠迴尤異又三里度橋為桐初有水南自打狗嶺來會亦橋其上二水合而西南則觀音橋跨之大道從觀音橋西踰嶺出予從橋下随溪南一里水從西峡出路踰一嶺下墜深壑中四里至陳墓源瀑自東南山峡中騰躍出與東嶺溪合亦橋跨其會處大道與水俱南予度橋東躋嶺即湧瀑南嶺也二里平行嶺脊北望北寳頂巋然峡中水近自打狗南崖直逼其下南望新寧江流逺從巾子嶺横界南寳頂之西其西南有峰尖突正當陳墓水口已而路漸出其下二里南下嶺行凹中二里又踰小嶺里許至蘇家大坪坪側大瀑破山西向出勢甚雄下為大溪西北合陳墓源出口下午東南上一嶺誤東往大㡌嶺道乃西南轉六里出南寳頂道桃子坪問上梁宿處四里而是踰嶺東至新開田所有路南下覆草中復誤出其東歴險陂三里不辨所向已忽得一龕地名挂幡去上梁五里矣其處五里至快樂菴又十五里乃至南頂以暮雨遂歇龕十五日雨不止滯龕中闕十七日從定心橋下過脊處覓蓮瓣隙痕削崖宻附旁无餘徑乃從脊東隔峡望之痕雖岈然然上垂下削非可托廬架道處也乃上定心石過聖水涯再由捨身崖登飛錫絶頂返白雲菴十八日由東路下山一里餘路旁峭石分列石級出其間為天門門外聳石立路右上大書白雲洞天從此歴磴下危峭較勝西路四里經顯龍菴菴北向又東下南望隔山飛瀑自那拏山南腋下先從寳頂即窺見至此始睹崇隆若九天也又東下五里北渡一小溪溪竹中有寺寂然曰苦煉菴菴南向左右各一溪自後來繞而右溪較大橋横其上水從西南山腋壁下菴前東南度橋南上嶺其地竹甚大路始分東西岐從西下始見那义瀑北挂層崖苦煉溪亦透空懸壑與那义大小髙下勢相頡頏而苦煉近在對山路沿之同下朗朗見其搗壑勢其下山環成城瀑垂其中出西壁與那义東大溪合而東南去又見西峡中一瀑透山下連㵼九層雖練細然甚危長路乃東轉下共三里又一溪自西北來随而渡之始僅涓㣲漸下漸大遂成轟雷湧雪觀路循溪北東二里為大坪右渡溪入一村家村西上流為蓮花菴竹色叢鬰遂西南渡那义大溪溪東北出白沙江又西上嶺十三里抵望江踰嶺溯溪又十里為桐原山下五里随小車江南下又四里桐原大溪自西來與江合而南去度小車江口橋從水東上山随東江南路行峡江山上極險峻一小石山北面平剖江遶其南路遶其北東北又有小溪破峡成瀑凡東南四里始下至江涯稍上有溪自東北來入其北峰曰不住嶺十九日東南上嶺随江東四里下渉跳石江又上山三里出兩山峡口壩堰水甚巨曰上官壩壩外一望平疇直南抵裡山隈出峡水東南入湘路随峡右西南下一里抵白塘村後石山特立曰金鐘山下俱青石峭削西南度溪橋過棄雞嶺共八里出咸水則官道山棗驛也度橋西南行長松合抱夹道蔽天極似永明道十里石脂舖從小路東南折五里抵界首為全州興安界二十日溯湘江西五里出塔兒舖古松時斷續不及全州連雲接嶂也三十里至興安縣萬里橋橋下水遶北城西去兩岸甃石中流平而不廣即靈渠已為漓江矣湘漓分水處尚在東三里也由橋北溯靈渠北岸東行已復北折渡大溪則湘江夲流也上流堰不通舟既渡又東有小溪疏流若帯舟道從之蓋堰湘分水西注為漓又東濬湘支以達舟楫稍下復與江身合矣支流上跨以接龍橋橋南水灣為觀音閣去城東二里又東南五里則湘水南來直逼石崖下崖突立南向曰獅子寨循寨足溯溪東入東北七里踰羊牯嶺抵狀元峰下有迴龍菴二十一日菴東踰小山南一里至長冲東逼狀元峰麓又里許至草菴則狀元峰南一峰片挿曰小金峰峭削似過之二峰各有路皆草翳直東上二里抵狀元翠㣲間山削草合蛇路伏沉莽中漸東北轉三里直上踰嶺凹麻川遶其下麻川東大山横亘属灌陽界乃老龍脊也凹北峰下即入九龍殿之峽予從凹南直躋峰頂峰甚峭窄凡七起伏其南一里上狀元峰則亭亭獨立矣但北面九峰相連南走與小金尚隔二峰峭若中㫁不能飛渡故道必由麓更上小金頂也頂北第三峰西北石䑓如船首飛突凌空坐峰頂久之下返迴龍菴二十二日東行二里過九宫橋踰小嶺共二里至錦霄是為峽口麻川江自南來北出界首截江以渡江深沒股麻川至此破山出名七里峽下又破山出名五里峽錦霄在其中為陸行口過江溯東峽之溪入三里登山脊至九龍廟南北東皆崇山逼夾南麓即所溯溪之北麓溪聲甚厲下山過觀音閣支流分環閣四面惟南面石堰僅通水東西北則舟上下俱繞之惜閣小不稱閣東度石橋循分支西岸溯流一里至分水塘塘以巨石横絶中流南北連亘以㫁江身祗以小穴洩餘波由塘南分湘入漓塘之北即濬湘為支以通湘舟於觀音閣前者也遂刺舟南渡分漓口入分水廟西二里抵興安南門出城西三里抵三里橋橋跨靈渠上渠至此細流成涓石底嶙峋時巨舫鱗次以箔阻水俟水稍厚則去箔放舟二十三日橋西有金鼎山山為老龍脊由此至興安南轉海陽雖為史禄鑿山分漓水而橋下有石底水不滿尺終不能損其大脊也上一里至頂頂大止丈許惟南面羣巒紛叢嵐霧中若聚米若流火俯瞰其出没甚近下至三里橋西随靈渠西南去已而渠漸直南路益西路右山石叢立雨中迴眺共十里而已透金鼎所望亂山堆叠中穿根盤壑多迴曲無升降又三里為蘇一坪東有岐可達乳洞予先西趨嚴關共二里而出隘口東西兩石山駢峙路出其下若門中闢旁裂穴如圭梯厓入其中不甚敞空合如蓮瓣雨坐憩焉返由蘇一坪東南行一里溯靈渠東北上一溪東自乳洞夾注為清水乃東渡靈渠四里過大岩堰度堰東石橋轉入山南小石山分岐立路口洞岈然南向遂西向随溪入二里至董田巨村洞即在其北一里日薄不及登乃趨東山入隱山寺寺後有洞門南向髙懸水由下出西合乳洞北流水破西北山腹出大岩堰縳炬從寺右入洞扳石壁上石巉削圯仄下墜淵壁若裂深覓暗中水石无可著足乃出二十四日西二里至乳岩下洞中洞上洞雨中返寺二十五日東一里出山口支峰兀立處有菴草翳无人從菴左先循其上崖崖危草沒扳隙入轉崖之東則兩壁門裂内纔一線剖宛轉嵌漏上夾參天離合殆十層起下夾直墜澗底俱凭臨千尺夾半兩崖復有痕受足肩倚隔崖手扳石竅无墜隕懼直進五六丈夾始東轉出由支峰坳脊北望觀音岩在對崖亦幽削可喜昨從其前盤山轉惜未一至今不能更北也下山東南十七里至開洲為湘西岸南十三里宿唐滙田東有大山巋然出東界上者曰赤耳山二十六日南溯湘六里為太平堡東西山至是開成巨塢小石峰一帶駢立湘水東南十里飯廟角雙泉寺南二里東南岐入山又二里渡橋湘水有橋自此始循左山南四里一石峰特立水中曰海陽山有海龍菴在峰南石崖半菴為臨桂屬抵菴日已西乃下山自東麓二洞門繞北西入一洞龍母廟已圯即從流水中行轉南水遂成滙深没股菴下石崖壁立下臨深塘由塘南水中行東轉登山海陽山俱崆峒注水水門二南平西出甚急東旱門二下一二尺即水滙其中深者五六尺山南水塘有細流東源季陵亦下此則此山尚在過脊北水俱北流惟為湘源也漓源尚在海陽西西嶺角二十七日東望白面山南諸峭峰甚竒聞其上有讀書䑓遂東北四里渡雙溪橋又東一里尖峰在白面西望之趨及登嶺北坳望山下水反自北南去北皆山岡亘絶无容流處由棘中循崖南轉捫隙歴塊上峰腰一洞南向内西裂龕窟吐納日月以為即讀書岩矣但平入三四丈漸隘其下路復翳塞頗疑之出洞望洞東削崖萬丈挿霄臨淵上一石飛突无所承極似巨䑕下躍然无可捫乃裂棘扳條登梯懸石直至巨䑕崖下仰望巨䑕又有二小䑕下垂崖腰一線痕可著足下仍峭壁又東有巨擘一雙作接引狀手背拇指分合都辨至其處山腰痕絶不可前乃從舊路下至南麓詢耕者讀書岩尚在嶺坳西當從嶺西下不當東上也乃由麓西溯澗而北則前所望溪從洞中出讀書岩在澗上登之洞西向髙而不廣内垂柱檠蓋羅列異觀三丈後即北轉下隘不可俯視出過下水洞水即從讀書岩下石穴湧出水與口平苐見急湍湧流不見洞門也由海陽菴東過季陵循過脊西行二里為海陽堡堡前又分一支南下山與西山夾為兩界水始淙淙南出随水下一里則西谷中裂水破峽出又羅姑山與西嶺夾而成流者皆為漓水源矣越之西南七里循大澗嶺上行忽有水自東南下搗成澗路随之直墜澗底南越橋水自橋下復搗峽中路不能從乃踰嶺隤然直下共四里出山口又西南二里抵澗上西有銀燭山尖削特聳東南則石崖正阨水口也二十八日西南十里望西北五峰髙突頂平若䑓可奪五䑓之名西五里直抵五峰南則亂峰尖叠什百為伍横變側移殆難更僕數其陽即為榕村東南三十里有靈襟洞南二里有陽流岩云西五里過上橋橋下水東北自叢尖山南至此又西南穿石山腋共三里過廖村西北有山危峙為金山東叢角亭亭更覺層叠者龍山潭也又五里西穿石山峽則諸峰分峙叠出離立獻竒石峰下俱水滙不流深者尺許淺半之諸峰倒挿於中似青蓮出水各欲獨上初兩大峰夾道后又夾以兩鋭峰道俱叠水中取徑峰隙令人賞无專接但石皆亷利侔刄㦸不免雙足趼耳峰有稱者曰雷劈曰萬嵗其間逸名者甚多共二里始出水磴平疇十五里直抵兩山峽中山南北成門北山東垂石峰分岐起如削岐峰尤亭亭作掻首態崖半裂透明隙惟南眺光截一線少轉歩即失之南山又有石突綴其首人行於下者左右流盼又西為浮橋漓水北自皇澤灣至是極汪洋桂林省城東臨其上城之臨水者東北為東鎮門極南為浮橋門皆東面臨江自北隅南至浮橋共五門浮橋貫江而渡覓頋僕不得宿城中逆旅二十九日東出就日門從城下北行城上一山當面起石脚下挿江中路忽穿山透跨下南北岈然殆天闢關津也西則因山為城城以内即叠綵東隅穿洞出正下臨江潭盤山壁透腋入又為木龍洞洞亦自南穿北東開忩隙屢引天光外瀕江有路行者或内自洞行或外由江岸俱可北達出洞片石夾峙上屈曲架穹石色錯青紅似非夲山石質不知何處移架此洞北闢成崖綴以飛廊前臨大江後倚懸壁憩眺勝莫踰此循城溯江北一里過東鎮門又北過城東北隅為東江驛驛東向當皇澤灣南下衝出驛北望皇澤灣二紅船泊山下疑頋僕或在此舟趨問之則泊舟之山在松隂中乃虞山也其下大殿為舜祠祠後即韶音洞東臨江曰薫風亭沿江登山上薫風亭由亭西下謁舜殿從殿後入韶音洞洞西向髙二丈東透出約十丈洞東髙崖嶄絶小水滙其前幽潭嵌壁水自北塢南來石梁當洞駕其上曰接龍橋坐橋上還眺洞門崖壁更盡崢嶸之勢從此上躋宛轉石級間將至山頂一凈室忩楞西向戸榻洒然室斗大而潔乃與靜聞解衣凴几指㸃西山甚適因急欲覓頋僕下山南循故道入就日門門内南半里由伏波山下出桂水門南一里經行春至浮橋門始遇之五月初一日北抵靖江王府循王城北行登叠綵山山踞省城東北隅山門當兩峯間亂石層叠錯立浪紋花萼騰簇眩目上為佛殿殿後一洞屈曲穿山背門南向髙二丈深倍之北透小門忽轉而東闢洞前下瞰城東江水直潄其足洞内石門轉透處風從前洞扇入寒吹凌人土人稱為風洞石門北向當東轉之上仰見石板平庋上透圓竇若樓閣再駕予與靜聞分道趨而會層樓之上其處東復開隙垂乳列於西乃從圓竇中墜空下出後洞北躋磴上南越洞頂遂登絶巘則越王壇也是為桂山上皆石崿矗發一石峰前支起謂之四望山西一石峰髙與此峰並峰半有洞髙懸望之岈然中空亟下仍從風洞出寺由寺西坳中復登西峰峰半有洞東向透峰腹而西徑十餘丈髙十之四由其中望東西洞然惜絶頂地少側未能徹矚全勝耳是名干越山洞西墜壑下極險峻仍東下至寺有大道北透兩峰間抵麓西行里許又一洞倚山北向遂拾級以登其下先有一洞髙可丈五寛廣盤曲多垂柱界竅分岐土人以為馬廐散卧馬匹令人氣阻由西南躋級更上從洞門入透隙而西外裂重門内駕層洞既下西行見峰頂洞門西墜處危峽孤懸下有長垣環之仰眺不得端委則藩府别圃也北轉至北門門在兩山聳峽中門外兩旁山俱峭㧞即為華景寳積衆勝云折而東南出桂水門抵慶真觀北渡江入玩珠岩即伏波山東麓石壁下嵌重江裂隙兩層上縱下横縱者髙盤入頂无級可階横者下卧波上下石浮敞為䑓覆以欹石石柱下垂覆簷外直抵下石不接者僅寸名伏波試劍石後壁紅白紋若縷圓宕三暈恰當其首故曰玩珠䨇紋後内復裂隙直抵豎峽下垂柱之西石䑓中坼横石以渡更北穿旁竇下臨淵碧无底南入山腹有光西轉北透前門是其奥境矣但石色波光俱不若外岩玲瓏映徹也登涯由浮橋返寓按圗志以索桂林諸可逰者初二日東出浮橋門渡浮橋又東渡花橋循山北轉山峙花橋東北七星岩即倚焉岩西向下有佛夀寺寺左登山一亭翼然迎客曰摘星石崖横騫其上僅可容足然俯瞰城堞諸山甚暢亭左佛龕當岩之口入其内不知其為岩也推龕後扉入歴級上約三丈忽轉而西北豁然中開上穹下平多列笋懸柱爽朗通漏此上洞也為七星岩從其岩歴級下又入下洞為栖霞洞洞雄拓門亦西北向仰眺崇赫洞頂横裂一隙鯉自隙中懸躍下向首尾鱗䰄酷肖傍盤結幡蓋五色燦爛西北層䑓髙叠懸梯而上曰老君䑓由䑓北向洞若兩界西行髙䑓之上東循深壑之中由䑓上入一門直北至幽暗處垂石上穹无際下䧟成潭澒洞峭裂忽變夷為險返下䑓仍至洞底𨗳者攜松明前驅循䑓東壑中行始見䑓壁攅雲錯綺偹諸幻化觀直北入一天門石楹垂立僅度单人既入穹然髙逺左横列石欄下深黒杳不見底云獺子潭即老君䑓北下墜處至此髙深易位又成一境内又進兩天門路漸東北轉崖石詭變多所仿類𨗳者行急予強留諦視頋此失彼然予所欲覩者正不在種種規擬也又踰崖上東有潭淵黒如獺子宏廣更過之名龍江下與獺子潭通又北行東轉過紅白氊鳯凰戯水穿一門出忽見白光一圓内映沉碧遂東出後洞水自洞北環流南入洞中想下為龍江者小石梁跨其上宋相曾布帥桂時所為易名曾公岩蓋與栖霞一洞潜通兩門各擅耳予佇立橋上見澗中有浣汲者予詢水從西北來可溯入否其人謂水穴之上更西北可深入數里名勝較倍栖霞水穴則深淺莫揆惟寒辰肅月為可渉予即倩其人為𨗳其人歸取松明予随之出洞右得慶林觀期觀中炊以待遂同𨗳者入仍過紅白氊始由岐北向則佳偉殊麗繁錫嘉稱最深入遇潭淵杳當橋澗上流𨗳者阻進謂前炬數日鮮竟㳺屐抵此從无入者况當夏漲襄陵可甞不測乎乃返計自栖霞達曾公岩徑約二里復自岩口出入盤旋三里洞之觀止矣飯慶林觀望來時所見搔首峰即立其東從間道出其下則峰下西開一竅圃者廬之北復有岩洞叢羅遍曾公岩上下左右殆難數記也循七星南麓北向草莽中連入三洞計省春當在北可踰嶺達遂北循嶺坳微徑里半至山頂石骨崚嶒不容著足石隙少開處棘刺沉翳愈窮扳躋然片石布竒峰瓣分異逺望掩映愈披愈出令人心目勞遷又里半踰頂下復得鑿石之級級盡即省春岩岩三洞排列俱東北向最西者騫雲上飛有倒石下垂如枯槎老龍西入南轉洞漸黒惜无居人不能索炬入洞右旁通一竅以達中洞甚深難逺入洞前垂石亦作槎勢又透一門以達東洞東洞垂石愈繁洞亦旁裂中有清泉下注寒碧成潭由洞前循崖東行洞上聳石如人立獸蹲東則危崖亘空仰望如劈其下拖劍水瀠之即癸水也源發堯山抵山北麓西出葛老橋入漓水時予轉至山東隅仰見崖半裂層竅者三乃披莽隙梯懸累上既達一竅西通中竅中竅卑伏首不得伸從外横度有同䑓榭不由中奥竟達第三竅竅隙入後有一龕忩闢其前中懸玉柱柱左又著一龕圓頂平座前正與玉柱對予同靜聞分踞忩隙下臨危崖行道者仰望无不徘徊忘返二村樵仰睇乆之亦躋登謂中竅之上尚有一洞甚宏欲為予扳險上求予乃下倚松隂從二樵仰睇處反睇二樵在上懸枝索級終阻懸漢莫能階升也仍西入省春出西洞西又得二洞門北向再西者髙五丈内稍下西轉雖漸昏黒勢崇宏愈甚以无炬中阻左崖大書深刻五羙章乃張南軒筆惜无知者洞莫定其名或以為㑹仙岩弹丸岩岩壁宋莆田陳黼題則渚岩洞也洞之西拖劍水自東北直逼崖下崖愈穹削挿霄凭淵勢竭雄峻石梁跨水西渡已為七星山西北隅名弹丸山云由其西南渡葛老橋東望崖巓有洞髙穹上下都削峭南有一崖架廬亟東向登山山下一刹與夀佛寺七星觀南北鼎列南為七星觀東上即七星洞中為佛夀寺東上即棲霞洞北為此刹東上即朝雲岩也仰扳磴數百級入岩岩亦西向在栖霞北洞口髙懸内北轉尤穹危徽僧太虚駕閣洞口絶壁下瞰江城逺揖西山獨有勝概遂停宿因問上岩道太虚曰此岩髙聳雖予近在岩右曾无級可登約洞之南壁與此洞北底隔止丈許洞内可鑿空以通洞以外更无懸杙繅級處也凴欄北眺洞為石揜反不能近瞩惟洒髮向西山歴數諸峰耳西山自北而南極北為虞山稍南為東鎮門山再南為桂山之木龍風洞最南為伏波山此城東一支也虞山之西極北為華景山稍南為馬留山再南為隠山最南為侯山廣福王山此城西一支也伏波隠山中為獨秀其南對踞水口者為漓山穿山皆漓江以西故曰西山焉初三日追録逰記於岩閣薄暮返寓初四日北二里至靖江王懴壇入藩城北門門内池水一灣南遶獨秀北麓由池西南經獨秀西麓至靖藩精舍主僧為予言君欲登獨秀須先啓王期以十二日可登乃出藩城西穿榕樹門門北向大樹正跨其頂巨本虬根盤鬱閶闔昔為唐宋南門元時拓城於外門久塞嘉靖乙邜大將軍周於徳發壅閉而門之門之前滙水為大池後即門頂巨石叠級分東西上亦有兩大榕南向東西夾之上建關帝殿南面臨池甚為雄暢殿西下即大將軍幕府益西循城南一里西出武勝門北溯西江又一里達隠山山北倚馬留西接侯山四面有六洞環列東為朝陽洞寺在其下洞口東向下層通水上層北闢一門就石刻老君像今稱老君洞山北麓下為北牖洞洞東石池一方水溢麓下滙而不流外竇卑伏而内甚宏深前有菴由菴後披隙入洞圓整危朗後復上盤一龕左有一忩兩闢石柱旁列不通水竇其北崖之上為白雀洞在朝陽後洞西門北向入甚隘前有線隙横列上徹天光漸南漸下直通水又西為嘉蓮洞亦北向與白雀並列洞分東西两隙俱南向下墜洞内時開小穴彼此相望數丈輙合内墜淵黒亦抵水又西過一石隙西北有石平庋錯崿中絶勝瓊䑓乃南轉為夕陽洞西向洞口飛石中門為兩門左一側壑滙水由水竇東通於内右有曲穴北轉内甚萋暗下墜深潭蓋南北皆與水會焉又南轉西南山麓為南華洞洞南向勢漸下滙水當門可厲入深入則六洞同流五洞之底皆交連中絡惟北牖側另闢一水竇初不由洞中通云聞昔唐宋西江東瀠榕樹門隠山滙巨浸中是名西湖其時諸紀勝者俱云乗舟載酒入今則西江南下繁厥桑田无浩蕩觀予初至朝陽寺月印上人𨗳由殿後入東洞穿老君側出山北西過白雀嘉蓮皆北隅洞也南過西隅夕陽洞又南盡東轉過南華則南隅之洞也予欲從此渉水入月印謂秋冬水涸䖝蟄窮幽无所憚今漲甚深處莫測蛇龍窟宅其中老僧不敢𨗳請北㳺北牖乃東過西湖神廟北轉過朝陽踰隠山東北隅其處石片分列如張幙如裁雲如透月巧變紛綸潤以采澤不啻削芙蓉綴蛺蝶也又西入北牖菴予與靜聞分踞北牖洞西忩内外周覧久之出飯菴前松䕃下復抵南華遇一田叟曰此水竇旁通雖深淺疑迷予獨熟過其内君欲入明當炬𨗳佐前驅余強之即入曰松明未辦乃以旦朝期予遂南過武勝門及寧逺門渡橋而南西江走其下東分兩支入漓余東南循西江南分𣲖一里抵漓山山之東即漓江也從山西麓轉其北則漓水自北江水自西俱直搗山下山怒崖騰力扼其衝由磴上盤山腰得雉岩寺寺後躋石峽躡青蘿閣昏黒下宿岩寺初五日客序遷除遂成午節令頋僕入郭市蔬酒出坐雉岩亭以蒲酒雄黄自酧節况復散酒青蘿閣時方禁龍舟舟人各以小艇私櫂山下鼉鼓雷殷廻波䧟日既暮下山西入一洞洞在山足門西向髙穹中平上鐫樂盛洞三字出洞東循雉岩崖麓沿江東憩其東隅一石上自山巔下挿江底中剜穴透虚深二丈髙三丈若闢門然江流自北滙其中渉其南透崖以上為千手大士菴余濯足弄江抵暮上宿雉岩雉岩者統志以為即漓山在城南三里陽水南支經其北漓水南下經其東東有石門嵌江西有穹洞深入南有千手大士菴俱列其足雉岩寺髙懸山半北逆兩江頽浪飛檻綴崖倒影沉碧寺西為雉山亭南為雉山洞洞外即飛崖斗發裂隙迸峽直自巓下徹旁有懸龍矯變石色都異前大石平湧為蓮䑓䑓右根與後峽相接處下透小穴西向䑓隙摩崖登䑓則懸龍架峽正出其上昔有閣曰青蘿今移置䑓端登之不知其為䑓也然勝概麕集不以閣掩是山正對城南為城外第二重案山北一里曰象鼻山水月洞南三里曰崖頭凈瓶山荷葉洞俱東逼漓江而是山在中較髙志遂以此為漓山范成大又以象鼻山為漓山二山形頗相似但雉岩石門不若水月擴然巨觀故逰者拾級趨此然以予權之瀕江午向三山不特此二山相匹崖頭西北山脚石亦剜空嵌水跨成小門其離立江水衝合中三山俱可名漓也初六日南下山二里過南溪橋南溪之山髙峙橋東南溪來自西南直逼西麓繞山東北入漓去白龍洞在山椒門髙張西向臨溪下廣列崇殿仰望不知為洞由殿左透級上得旋空如層樓内有龕自然為一洞絶勝處從此北向東轉遂成昏黒先是買炬山僧僧謂洞内可竟達劉仙岩不必更出及篝火入中頗寛敞多岐先極其東隅上躋一隙余以為劉仙道也窮而无入又南下一窪支竇旁午予又以為劉仙道𨗳僧謂此䕶珠岩道嶮巇莫逾躑躅杳冥中不若出洞平行為便乃下山至橋望白龍北復有洞盤空予渴赴劉仙岩遂自橋東循山南東轉南面一崖層突彌聳將舍之忽山雨至奔憩岩下躋隙坐飛石上雨簾外窺内映乳幙飄飄有餐霞想久之雨止下岩轉其東至劉仙岩岩與白龍東西分向有觀在岩下由觀右登級先穿一門西入即踰其上復透門出得一岩東南向又左由透門之上再透而北亦開一岩岩前懸石甚壯當洞門為屏若垂簾然至岩周覧各竇詢與白龍潜通處竟不可得乃知白龍所通即避雨岩下竇𨗳僧所云䕶珠岩是也初七日由觀左登穿雲岩岩在上岩東南絶壁下亦東南向後與左右分穿三竇而左竇旁透洞前洞東為文昌祠由其前東過仙人足蹟蹟北更上即為仙蹟岩岩在穿雲東北上岩正東隅洞口亦東南向外甚危亮内乳柱倒垂界為兩重若堂皇之後屏列忩楞分内外室者洞後穿竇兩岐俱不甚深竒在玲瓏殫致返至觀南二里出十里舖舖在鬭雞西郡往平樂大道又東向岐路入一里北望穿山髙懸隔江空濛雨色中再前望崖頭北隅梳妝䑓下飛石嵌江剜成門闕逺望較水月似小與雉山石門形勢倫匹然急流湧其中蕩漾尤異共一里東至崖頭廟崖頭在雉山南漓江西合陽江於雉山又東會拖劍水及漓江支水於穿山奔流南下此山當其衝山不甚髙而屹立扼流有當熊勢北崖有䑓曰梳妝下即飛石懸嵌中剜成門處崖突波傾不能下瞰但見廻瀾層波觸石奮出蛩然送聲至座坐久之返廟中由其後入一洞門西南向穿門歴級下其後岈然通望一石肺乗空色正緑為荷葉洞穿葉底透山東北即通望口也漓江復瀠其下由葉前南下東轉深昧中勢穹然不及索炬入山東北隅石崖挿江山稱凈瓶以此須汎舟沿流觀之其上莫能窺也仍從大道十里舖經白龍洞北随溪探前望白龍左洞則𤣥岩也岩東向洞門高聳下峽由南腋東入上洞東登必由北奥俱崇深幽邃无炬不能遐歴洞前乳柱繽紛不减白龍上鐫𤣥岩字甚古出洞入寧逺門返寓初八日出安定門東轉北入支徑登劉岩山有菴在山麓後為劉岩洞洞西向東下淵黒由洞右躋危級上至明月洞洞髙綴危崖半門亦西向東入岈然然昏窈莫辨出洞下崖半循崖少北復一洞西向門紛綸髙懸僧伐木縱横洞前无由上躋乃梯登以上一石當門樹屏由左透隙則宛轉玲瓏踰石脊東下窿然直透山腹闢門東出外臨層崖内皆乳柱充隙徑竇迸裂北一徑髙穹下墜東轉亦有門東出暗不復下東西透豁然有脊有門中界之不若穿山叠綵中隠南峰諸洞廓然平通下望明皎内无餘奥也下山西過北門門西峰當面起削山為城循山北麓轉至城西北隅下下盤層石上削危城當即志所稱始安嶠也而北門在兩山夾中東西峰各峭𥪡起因依為門鎖鑰甚壯少憩盤崖上旋入北門南一里至桂嶺碑側西向瀕城復得一山為華景洞洞東向前對大池後所倚山則亦因為西城者洞前岩平朗上覆外敞後穿穴為門分為三南入者窪暗而邃西透之穴昔穿城外因為門今已甃石塞北轉者上出岩前遂西登城陴循南而升已從石萼叢錯中扳躋山頂頂即寳積山志稱寳積與華景相連上多詭石怪木然今又名卧龍山想以武侯祠易名耳下山二里抵寓初九日出文昌門乃東南門也正對南溪山南過石梁梁下即陽江北分𣲖東轉一里抵石山南麓三教菴菴後為古雲崖其山亦稱漓山粤人呼為象鼻山山東南隅亦有洞南向循崖東北抵漓江盤山溯江從石崖危嵌中得一洞北向曰南極洞出其前直至西北隅為象鼻岩水月貫其下飛崖自頂騰跨北挿中流東西俱髙剜成門陽江從城南西來流其中而合之漓上空明如月下復内外瀠波而挿江之崖下跨於水上属於山中垂外掀正作捲鼻勢水洞之南崖半又闢陸洞其崖亦自山頂東跨江畔中刓竅若長廊直透水洞上北踞竅口下瞰水洞適有漁舟泊洞中崖石間令棹予遶出洞外復穿入洞内水陸勝觀一時兼盡乃南行一里渡漓江東岸又二里抵穿山下山西與鬭雞山對鬭雞在劉仙岩南崖頭山北漓江西岸瀕江之山也東西夾漓怒冠鼓距兩山當合名鬭雞特東山遶明如圓鏡故更以穿山名之山之西又一峰危立初望竟為一山上有𥪡石抵其下始見𥪡石下剖直抵山根亭亭夾立山故以脆薄靈舉見竒土人名為荷葉山殊得之穿山北麓嘉熈拖劍水直潄崖脚循山之西南與漓合予始至其北隔不得渡望崖壁危懸洞門或明或暗紛紛錯列即渡亦不得上乃随溪南行隔水東眺則穿岩已轉不睹空明山側成峰尖若𥪡指矣又以小舟東渡出穿山南麓北面而登撥草尋磴一南向岩髙倚山半疑即穿岩乃其中乳柱中懸有曲折致東入漸窪黒水滙於中知非穿岩乃出由其西上躋始得崇岩廓然平達山腹徑山十餘丈髙闊俱五六丈徹望澄明一空障塞扳外崖東轉又開北向一洞列並穿岩而後不中通其東尚有三洞門下可望見至此則峭削絶徑而穿岩南口上復叠一洞後亦不透然内多重幃殆為穿岩架閣也仍東下滙水岩岩東復有南向洞内亦支竅西入隘黒无竒遂出西渡荷葉山下北過訾家洲乃渡浮橋而返初十日抵王城後門登懴壇訂主僧獨秀期更於十三日十一日出浮橋門過花橋門龍隠岩道為橋東之南崖乃來時所過夾道兩山北即七星南即龍隠至是始得其詳橋上南眺龍隠與月牙並列東崖苐月牙稍北度橋循山其路易通龍隠稍南須從橋下涉江上其大道則自山北端拱石南踰嶺坳循隠真而西又從怡雲北轉始達予欲并眺端拱石人自橋東直走嶺下南上平瞻石人又南下得一大塘塘北循山西轉崖石俱盤削飛突里餘抵山西南隅峰益嵯峨叠異中空外聳上若鵲橋度虚扳隙上登則怡雲亭廢址也由其上轉罅梯空穿石鍔以躋石片片懸綴側為透峽平為架橋如上竿轉塔无不曲拆匠意下至怡雲右即龍隠岩洞門西向髙穹廣衍頂石平覆洞右近口復垂柱環為層龕重洞接影深流此為最勝出岩仍從怡雲返花橋南沿西麓隨流歴磴半里入月牙岩岩西向南即龍隠此則級石成磴彼則㫁壁斗崖路殊通塞岩上環西缺其口内不甚深政以圓缺分明有同鈎月下照清泠亦幽境也出由街北過七星飡朝雲岩北度葛老橋覓屏風山或有以黄金岩告者謂去城東北五里乃貿貿東北趨三里遇負擔者指村北之山曰此即是至村問之仍不知也及抵山東麓則峭崖列嶂平展危懸已轉北麓得洞門如峽山頂髙穹兩崖濶五丈髙十餘丈初南向平入十丈之内少東南轉忽明月上開自下望之殆蜃市重樓矣從此髙躋又十餘丈抵明穴之口采嫩松以拭崖壁開蘚剔翳得程公岩三大字西有記文一則蓋鄱陽程公崇寧帥桂時所開志載屏風岩一名程公至此乃爽然自釋也遂西向歴級上登穴口其内岩頂之石層層下垂極為雄俊將至出穴處地少平北奥有大石幢盤叠至頂色碧形詭何設竒至此出穴而西山迴峽轉石骨森𥪡下即盤峰成窩窩底一洞北向覓徑西南下抵窩入洞洞不甚深即西踰窩出兩石峰駢枝並起一為石工剥蝕殆盡一猶亭亭孤立從石峰東更西南三里已出葛老橋西於是循朝雲七星西麓度花橋紛傳流警薄永郡省城戒嚴門已鍵亟馳過浮橋門尚半啓得返寓十二日西出麗澤門門外巨塘滙水水自西北城角馬留過脊處南抵振武門北入陽江石梁跨之曰凉水洞橋橋南北塘中蓮花盛放坐䕃橋樹下殆不能去予欲覓中隠山乃南至振武門西渡定西橋忽路右一山有洞砑然即北趨其下前有古寺拭碑讀之西山也洞門南向東又裂石自峰頂下跨成門乃捨洞趨之其門南北豁然亦如雉山象鼻但彼急流中貫異於此之外遶澄潭耳然外跨之石欹叠錯出尤露頴異遂先遶其東抵山北北向亦有洞穿洞而南横透山腹竟與南洞貫徹中有夾門垂柱不似他洞徹望竟目也出南洞洞左叠磴嵯峨循之北躋峰頂石皆峰崿攅簇中旋為平凹長若溝洫光滑特異下至南洞前始東入石門門乃片石下攅中門髙闢旁通衆竅故以小巧見竒望西峰石亦聳立從寺後西歴其上歴級南下峰鍔中西循大道三里聞木陵村有岩曰佛子遂從西北岐入二里石峰在侯山東麓洞門髙懸北抵岩下岩之東二洞南向最東者敞而不深稍西則洞門側裂外垂列乳中横一屏屏後深峽下墜屏東西俱有門可下由峽中北入其竅旁裂漸隘乃復出西上入大洞洞南下北上穹然髙透頗如程公以松枝拭右崖所題則宋呂愿中題中隠呂公洞詩也後署云假守洛陽呂叔恭㳺中隠山无名洞客有言此洞因君顯當以呂公名之因書五十六字鐫於壁始知佛子岩即中隠山呂公洞也由是北躋後穴内雲翼倒騫與洞俱上絶非逼隘觀穴口髙朗大過程公後穴也北出口石磴二道一東北下山麓予先從其下者北向之麓皆崆峒幔覆外有倒石界而為門為忩内蜿蜒旁通若行廊複道此下洞以幽竒勝既復上從西北磴復得一洞洞北入南穹擴然平朗頗似穿岩南一石聳立如臺上有石佛不知其所自來佛子岩所由名矣前有巨石柱如屏中峙東西界為兩門西竅廣正自下逺眺此竅直透北山東則偏隠无睹竅外循崖東轉又闢一門下臨中洞之上為關聖座仍由洞北東下穿中洞南出西循山又開南向一洞與中洞並列由其西扳磴上又有洞南向雨漬滑磴舍之下山東南半里飯木陵民家民謂西南侯山下有銅錢岩可透出前山北向趙家山亦有洞可深入又有陳搏岩頗竒予念諸岩不能徧歴侯山為衆峰冠其岩不可交臂失遂由中隠舊道西一里抵侯山廟廟後山麓漫衍蹈水披叢茫不得洞但見有級上躋鼓興登絶頂山前行者髙呼以日暮不可登乃遥望大道南削峰南轉有洞東北穹立望之趨南去里許抵其下洞髙倚山半前有瀦水滙潭潭上拾級扳荆遂入洞亂石堆洞門外外髙内深歴石級西南下直墜洞底水崖淵漠内望一石横突出下有仄崖嵌水裂隙受趾抵突石下畏仄崖峭滑乃出下山轉出其東南山背復有門滙水卒莫定其為何洞也其處西峰駢聳无侯山之髙峭抜過之暮歸急始留為後㳺二里南出大道路旁夾道之山上有竅東西透空與佛子穿岩正等亦不及入問途人前所入北向洞何名則架梯岩一名石鼓洞也紛傳城門已閉竭蹶東五里過木陵分岐處已夜又三里抵振武門將闔矣側身入始從容行街市中十三日入靖藩城過獨秀西菴主僧入内宮禮懴登峰約復移之他日乃出就日門過木龍南洞由其下渡江還望木龍下層復有洞濵江穿麓瀠流可愛上江東涯循流北半里入千佛閣前有大榕一株問所謂辰山者俱莫曉隨大路東北五里堯山在東屏風岩在南獨辰山茫然莫辨忽北望一山去不一里䂬然有洞洞口一石當門赭色斑爛彪炳有異問負芻者曰老虎山也余謂靜聞何不了此後覓辰山乃北一里抵山下望髙先登由洞口穿入其内天光自頂四射由下北透其腹再入重門支峽後裂層􅍥上層俱莫可度南向重門内扳崖上躋逐踐層樓徘徊未下忽一人來候洞前下問之曰洞名獅子一名黄鸝岩山前有三洞下曰平地中曰道士共此岩為三出洞見山頂石叢參錯循路上躋石片片氷稜鐵色下嶺石稜就夷棘道俱除前候者復趨上引予左入道士岩岩亦南向在黄鸝東稍下洞前壁左右各鐫詩拂讀詩序是山固即辰山也穿洞東側門出東向下山東北一里飯所候者家主人王姓慶宇字且訂予宿此乃束炬肩梯𨗳趨辰山北麓為青珠洞㳺洞北向裂峽上並山頂内界兩層始南入十丈許扳崖上稍西乃向北崖𥪡梯登北入峽中五丈餘透出横峽峽東西横亘上髙俱不見頂東行四五丈漸闢生光一大石柱中懸繞出柱西峽又南北裂南入臨洞底北出正臨洞門上洞門中列二柱界為一門兩忩延耀内射正當圓柱予詫為異𨗳者曰未也轉進横峽口又西行四五丈有竅南入甚隘悉去衣赤體伏地蛇行以進穴長三丈大僅如筒又曲折中又懸柱時從㳺兩人以炬先入次及予度稽一時過隘洞復穹然上崇下䧟俯躬南降垂乳紛列迴環左右逈與外别𨗳者曰未也又西踰一梁梁横南北若閾越梁西下石乳愈竒西窮復轉北上藻繢滿眼彌轉彌勝此洞與山南黄鸝岩正南北相當然一山皆空環峙分門者尚多也北向開洞門者三此為中東西二門俱淺東向開洞門者五北為髙穹中為三曲狗頭南為道士東峽和合小岩而三曲最深南向者三即平地道士黄鸝也志稱辰山有洞三級苐指其南耳惟西面予未之窮出青珠洞過北洞一東麓洞五循南入平地岩初入欹仄側身縁東隙而上内境既穹外光漸閟火炬已棄北隅暮色亦上乃出東北返王慶宇家十四日别慶宇東北三里過矮山山在堯山西漓水東北聳一枝如附拇指乃桂林石山最北首峰也山南崖削立下有白岩洞洞南向三竇旁通内垂石如蓮葉捲覆下多透漏其後少窪下輒復平曠轉西入數丈仍見南穴天光出洞東有菴于是東向溯小溪二里抵堯山西麓又二里為玉虚殿山迴成塢西向開洋由殿右轉入山後兩山夾澗南向溯澗半里踰澗東上登嶺角益東北上升降三四又二里始登堯山絶頂此中石峰森立間得此土山反以為異故堯山名特著山之東石峰叢合有溪盤遶其間當即大壩上流出廖家村西者也下山仍返西麓南度橋五里出堯山東南塢其南石峰森森東南一峰尤兀突益東南馳松篁間出林夾右轉石山而南即鐵峰山頗似獨秀下有岩洞不可入西南二里抵冷水塘小橋跨流急湧西南去一村依山逐澗亦幽棲之勝村南石峰如屏東西横亘從西嘴望之薄若竪指由其腋東轉南山之坳出山南大道直西馳共三里過萬洞寺則石山四開寨山兀立其中望寨山東崖穹然壁立而不睹其徑循山南抵西麓乃歴級北上當寨山西北隅崖開一罅上架横梁踰梁而入東貫山腹已在嵌室内遂托宿十五日曉起徧觀洞中其洞西北東南前後兩闢中通隘僅容一人由西麓上山腰透入飛石下旋躡其上卷石為橋以達洞門門西北向門内洞界為兩南北並列北洞後即通隘透腹處隘長三丈既入即寛闢為岩懸乳垂蓮紛綸左右東岩上下俱極崇削下亦有深洞路當山麓南轉始得東上既晨飡西北望黄金岩甚近亟趨之不復東尋下洞也下西麓過竹橋由村右西北行三里抵岩之陽山骨立路北下裂為洞南北交透前卑後峻後門之半石横架空中門界為二由洞内上躋北出駕梁之下俯視北麓拖劍水直嚙其下土人俱指此為黄金岩南下出洞西復有洞南向髙裂深入不透僅如重峽已從西麓北轉山西北垂亦有洞西向中穹不甚深透對面有東向一洞與此相向若門廡洞内分四支如十字東北二門外透而明西南二峽内入而黒然西北皆懸崖上奥東其所入南乃深潭也拖劍水在東峰北抵洞前轉北循山當洞有橋跨之橋内滙為池亦山叢水曲之奥出洞不知其名問汲水池中者曰此洞不知名上更有一洞可尋躋也亟披箐透崖上南北兩石屏並立起㣲徑界其中甚峻洞峙南屏後門亦東向不甚宏洞有舊鐫黄金岩三字可辨是洞始為黄金前乃其東峰之洞也出門左見北屏内峽有路上躋為夙莽而翳雨深蔓濕不堪置足予強登之南轉則上洞也門北向棘蔓交絡縷分之乃得入入則旁竇外通重樓三叠庋閣之石版纔蟬翼薄然无級罅可扳惟中洞之内旁竇玲瓏懸隙宛轉可穿而上苐甚隘層折難舒解衣蛇行遂出上層平庋閣上踞洞口飛石髙呼靜聞乃下迴望黄金岩西北麓諸洞尤多乃隨拖劍水遶出北麓又得北向洞二西向洞三遂西趨屏風山將渡拖劍水望屏風黄金兩山中又南界一山下有洞北向迂道從之洞亦旁分兩門一北向一東向西有級上躋再上級崩路削又有洞北向乃下抵西北隅則旁透中空之洞峽連闢與黄金西北同正西一洞穹巍層裂紛拏傑張此又以雄武見竒非尋常窈窕窟也問之土人知為飛石洞遂西渡石堰一里入程公岩北二里仍飯王慶宇家西再探道士諸洞過屏山西麓至是已四周其山入浮橋門浮橋共三十六舟云十九日始定陽朔舟二十一日日中乃行南過水月洞東又南雉山穿山鬭雞劉仙崖頭諸山皆從陸遍㳺者惟鬭雞未到今舟出其東麓崖頭有石門凈瓶勝舟隔洲以行不能近悉去省已十里崖頭之南江流浩然自放又東南二十里過龍門塘南岸有山嵯峨中峰最髙處南北透東五里横山岩突立江右又東南十里江右削崖屏立南五里至碧崖岩岩南石峰隔江排列横障南天上分危岫幾埓巫峰五老扼江使東江流嚙其北麓怒濤飜壁赤壁采石失厥雄麗崖間一石紋黒縷白章成泛海大士曰沉香堂其處南雖崇深極致北岸猶夷豁共五里下寸金灘南轉入山峽江自是左右皆石峰㠝岏爭竒炫詭入峽下斗米灘五里為南田站當桂陽朔界山遂轉峽為塢四面層圍僅受此村過南田山色暮合舟人夜棹不休江為山所泥佹東佹西盤峽透崖凡二十五里抵畫山月未起山隠空濛中又南五里為興平月從羣峰東隙出舟泊候曙漓江自桂林南來兩崖森壁迴峰中多洲渚分合无翻流之石直㵼之湍故舟行屈曲石穴間无妨夜棹苐月起稽時暗行明止未免悵悵二十二日早起月光破曉竒峰合棹南三里為螺螄岩一峰盤旋上轉峙江右興平水口山也又七里東南出水緑村山乃歛峰掩篷就寐南三十里則龍頭山復錚錚骨立而陽朔四圍直碧蓮玉笋攅成矣陽朔北自龍頭南抵鑑山二峰巍峙當漓江上下流中有掌平地乃東面瀕江以岸為城而南北属於兩山惟西面叠垣為雉城西山最近者為來仙洞石人牛洞龍洞諸山通省大道從之蓋陸從西水從東也其東南門鑑山下則南趨平樂水陸並道正南門亦西北轉通省道直南為南斗山延夀殿旁建文昌閣无徑他達正北即陽朔山層峰駢峙東接龍頭東西城俱属於南隅北則以山為障无城亦无門東北一門在北極宫下僅東通江水北抵儀安祠讀書岩然俱草塞罕人行雖東臨漓江開三門以取水上午抵城入正東門從文廟西入縣治蕪寂殊甚縣南半里有市橋橋下水西自龍洞入城出橋東即懸流注深壑壑大四五丈四面叢石盤突為龍潭但飛流下搗不見下流所溢潭東即城大江流城外蓋地穴潜通也橋南鑑山獨聳一名易山即南借以為城者東麓有鑑山寺倚山臨江通道置門即東南門也西麓則正南門余初抵北麓覓道上躋南東二面就崖為城惟北面在城内有微級久為莽棘翳没乃扳條捫隙直造峭壁下莽徑并絶復出其旁躡巉石盤旋半空終迷所向乃下時頋僕守舟期東南門外於是南經鑑山寺出東南門覓舟不得渡江東一里至白沙灣舟泊其南乃下舟白沙灣去城東南可二里民居盛於城有河泊所其南三峰列峙最東一峰曰白鶴山江南抵其脚曲而東北抱此一灣沙土雪潔其東南一溪南自二龍橋來北入江溪在南三峰之東逼白鶴西址出溪東又有數峰自南趨北界溪入江口最北者書童山也江以此乃東北逆轉二十三日從白沙依江東北行一里南渡江已出東界山之東江東北岸有髙峰矗四尖起障江南趨既渡陂塘髙下林木翛然有澄心寺可憩東一里過穆山村復渡江而東循四尖南麓趨出其東山開日曠竒致愈出前望東北又起一峰上分二岐東岐若僧㡌垂空西岐尤髙聳四尖東枝鋭若脱頴與二岐西岫建標絶頂各見雄振迴眺西南隔江下皆尖崖並削上懸雙岫此即書童之南東界羣峰所幻出隨江東五里出二岐東南踰嶺下為佛力司當江南轉處北去縣十里問之居人始知二岐西峰最髙者狀元峰乃仍踰前嶺北去西一里抵紅旗峒竟峒西北一里抵山下北上㫁磴間三里踰山坳乃東西峰分岐處西北度亂石重蔓直抵髙峰崖畔有洞東向門髙穹上懸竅兩重簷覆出无由得上洞前東向之峰即似僧㡌者其峰亦有一洞西與北山對懸壑隔莽竟不得達予必欲一登峰頂南北俱壁立絶磴從洞南縁峭梯險轉從峭壁南直抵崖半則穹然无片隙不復手足力所及遂下飯佛力肆居人蘇姓者謂此峰懸削曾无登路數年前峰側有古木一株其僕禱而登絙級備窮峻阨然止逹木所亦未造巔後遂問津者絶轍乃返白沙灣佛力司之南山益開拓内雖石峰離立外俱排山亘嶺桂林秀出雲峰南盡於此聞平樂以下四頋皆土山巉厲之石不挺於陸而藏於水山自此而頑水自此而險也二十四日由白沙截江渡南峰下循麓東南又轉一峰有岩髙張東向為田家洞即在白鶴山下軒朗平豁上繁垂乳白鶴東對書童山排闥而南内成長塢塢中舟行六十里可抵二龍橋出白鶴循北麓溯江三里入東南門肩炬由正南門出西北循大道向龍洞岩二里東越小橋有兩洞西向其南列者為龍躍岩地稍下門極危朗北洞地稍髙草塞門徑先入南洞東五丈層陟一臺臺右有竅深入出由洞北登龍洞岩爇炬入洞濶丈五髙一丈南崖半壁平亘如行廊入數丈洞乃南闢頂始髙後壁下方圓池各一深五六寸泉澄明如鏡屢斟輒滿池上蓮叠小龕俱無通道處由左壁窪䧟處伏地入漸入漸小穴僅巨管大蛇行南透五六丈始可屈伸已而遇旁裂龕得宛轉達躍龍後腋出洞東望龍洞南列峰閶闔重啓異之遂渡溪東行棘莽沮洳中共一里抵山下初入西向第一門髙穹如峽東入數丈北轉愈昏杳莫窮乃南轉得明穴西透西出洞門之上盖南上西向第二門也由其外更南上西向第三門洞東入成峽如初洞峽底迫仄峽上層叠有同閣殿入五丈下峽既盡上懸重門圓整擬剜琢苐峽壁峭削難階與靜聞索慮躋躡得上峽一層而最上層即懸亘莫能逹出洞前仰望洞頂又連啓兩門此又南上西向第四門第五門也兾其中下通峽内重門于是又過南上西向第六門仰睇懸崖倍髙削彌難扳即又過南上西向第七門見石紋層異突出者可置足竅入者可鈎指遂反躬上躡凌數十級抵洞門洞北又夾坳𥪡起髙五六丈始入上層其夾光膩无級計絶所扳予審視周夾雖无級罅而夾壁宛轉可以手撑足支不慮懸墜遂聳身從之如穿井皆横綳縱發不階級磴也既升夾脊其北復隤然成峽穿映明透知與前所望洞必有一通因騎牆坐上睇洞頂四達髙呼促靜聞久之至教之如前法登同從脊北下峽中峽底平曲折北進西上髙懸一門則第六門也不及上循峽更進轉西出第五門門有石龍下垂三四丈由龍側北循崖端得第四門穿門東入稍下次層中廓然四闢右向東轉深黒无窮左向西出即前第三門上層也如重門若剜琢處當在其内循崖窮之復隔一柱轉柱隙入門内另環一函不逺亦不透也自第三門上連闢四門初俱扳躋无路一入第七門宛轉俱達升陟重樓複閣間有莫公臣者徧題珠明洞云仍從第六門峽内西向扳崖上門雖髙張内外都无餘地不若四五二門外懸臺榭内叠樓楹也乃逾脊南下第七門門外循崖復南又得南下西向第八門洞亦成峽東上雖髙峙鮮所旁徹此山西向八洞惟南北二洞不交引中夾四洞最髙紛紜曲暢較他處一二洞勾連輒擅竒稱真霄壤矣下山循麓南半里路東西各一峰屏峙遂由南門抵市橋入龍潭菴莫姓者隨予至問㳺岩樂乎予艷稱珠明曰牛洞也數洞相連然不若李相公岩尤勝即在西門外不可失仰視日色尚髙亟出西門擕火炬從岐北行復西岐已繞此山東北兩面蓋即前屏峙路旁東峰也繞至西麓洞正西向西峰門右鐫閩人李杜記題為來仙洞入洞東行不甚髙夾南轉遂昏黒秉炬東南入乳竇初隘漸進愈宏放瓊葩雲葉繽紛上下東北轉成穹峽髙不見頂其垂突蹲裂種種開勝益深峽忽下墜淵昧不可以丈計炬火星散投之沈沈杳不得其底其左削崖不能受趾右乳柱紛綸忩戸歴歴隔崖探以炬内若行廊玲瓏似可逺達松光將盡乃由舊道出東入西門出東南門渡口桂林舟人已艤舟待遂入舟宿二十五日舟過水緑村北七里西岸一岩門甚髙敞東向臨江前垂石成龍曰蛟頭岩由岩右峽深入漸髙黒由岩左登前亘為臺後結一竇竇後深䧟成峽以无炬返時舟已先移待興平出洞循麓溯江半里達螺螄峰下繞峰東麓又二里及舟北過興平二里泊二十六日北五里抵畫山山横列江南岸江自北來至是西折山受嚙半剖為削崖石質錯綺成章舟人泊山脚晨飡予乃登其麓與靜聞選石踞勝崖半洞北向望之甚深髙下都无著足處返而登舟北上小散大散灘至鑼鼓灘共十里其山南岩竅有水中出縁突石飛下墜江勢同懸瀑粤中皆石峰㧞起水隨四注无待破壑騰空此瀑出崇竅尤竒絶又北八里過蘭州西北岸一峰純透初望之疑即龍門穿穴以道里計之始知另穿一峰前以夜棹失之耳又北三里為冠岩先是江東岸嶄崖丹碧煥映采艷畫山冠岩即在其北山上突崖層出麓穹一洞西向臨江水自中出外與江通棹舟入洞門甚髙内更宏朗悉懸乳柱惜流通之竇下伏无從逺溯久之棹舟出洞望隔江羣峰攅合憶前蘭州所見穿山當正對其面惜溪迴山轉并其峰亦莫能辨識頃之忽北見皎然一穴另懸江東峰半即近在半岩北亟登岸趨之期舟候南田站一里抵山腋踰嶺度明月在東南面絶崖不可扳反循崖北稍下則洞果南透其上甚薄上穹如合掌中罅北下俱巨石磊落南則削崖懸亘故登洞道必由北洞東皆旁門複室東北彌深仍轉洞西北隅又得一洞南北横貫北峰之麓透而不敞仍南出西北行平疇中其西隔江屏立者皆穹崖削壁陸路望之更覺崢嶸東則石峰離立後托崇巒共四里至南田入舟二十七日經横山碧崖諸勝无間昔㳺横山岩東向右腋有竇旁穿而南南復闢一洞甚宏有門有奥奥西上則深入昏冥奥之南墜皆嵌空透漏門在墜奥東廓然凭流與前門比肩立又西北過龍門塘南望横山岩西透頂峰雖似穿石无從上躋夜過新江口十里泊二十八日昧爽亟推篷已過崖頭山十里抵水月洞北城下入浮橋門二十九日入靖藩城訂獨秀期主僧辭甚遼逺予初擬再至省一登獨秀即往栁州至此失望悵怏三十日炎威莫支倦卧寓所六月初一日訛傳流㓂薄衡永藩城愈戒嚴予遂无意登獨秀獨秀山北面臨池西南二麓予俱已遶其下西岩亦曽再探惟東麓與絶頂未登其異於他峰者祗亭閣耳初二日同靜聞再為七星棲霞㳺由七星觀左入即登級為碧虚閣閣在摘星亭左昔㳺急於七星以為此軒閣无煩屐齒後累經其下上見岩石倒出異之至是遂先入仰望閣上為瓦所掩不見岩頂轉入𤣥武座後豁然透空髙跨頂上如梁類穿山月岩惜人坐閣内不見出閣後石垣外始見亂峰飛石森列掩映詢閣僧後山道何向曰須南自大岩庵乃出仍登摘星亭入七星前洞由閣後東上數十級得小坪石盤其中遂北轉透重門出門東壁外崖裂竅懸雲解衣上連躋重龕二層俱列户梳楞勢同垂握北下即棲霞洞盤空西向矣此山岩洞駢峙棲霞在北下透山之東西七星在中曲透西北出碧虚閣在南亦東西上透三穴並懸六門各異北又有朝雲髙峙兩岩皆西向此七星山西面之洞也洞凡五下棲霞南入大岩菴望碧虚岩後山石叢薄可由菴外東北登遂從菴右草坪中上共一里得坪一區小石峰環拱之秀薄層雲西即碧虚岩透明穴北即七星山頂與餘峰攅成斗列者覓小徑出東南坳中下山共一里得一岩東南向西下即曾公岩也曾公西又有洞在峰半扳莽上洞口亦東南向初由石峽入得平展處稍北轉外復有龕東列後則穿門西入内益崇空深轉杳不可睹下山出花橋東街此處岩洞駢峙者亦三曾公岩北下同列者又有二岩予昔㳺省春經此俱東南向此七星山東南之洞也洞凡五若北麓省春三岩會仙一洞旁又淺洞一俱於前日屐經者則七星北面之洞也洞凡五一山凡得十五洞云返寓於肆中得桂林故勝西事洱百粤風土記諸書按部考勝者竟兩日初五日讀清秀岩記即出西清門覓之門在西北隅城外削崖之半有洞西向出渡城濠壩西有二岐一循山北行即北門西來大道皆石峰突峙其北片片若削下開大洞西南向曰横洞一從山南入峽疑即清秀道遂南西行一里峽南北山俱中㫁開徑四交徑西北有洞南向覓道北入愈入愈深旁絶他竇峽危底平灣環以進莫測幽際出問行者曰黒洞也問清秀何在曰正西有山屏立峽中者下有牛角洞由北徑出峽有塘曰清塘西南瀕塘為下庄洞无所謂清秀者予意清塘當去清秀不逺遂北轉從大道出峽峽門東西崖俱有小洞无徑可登北出臨塘瀦水一泓浸山西北麓循之西路南嵌崖末北俯淵碧忽岐南上扳躋漸髙没磴仰望都无懸竅知非洞所在乃下出塘之西其南山迴塢轉别成一壑門殊杳然仍返過黒洞西向屏立峽中山一里抵屏東北即有洞斜騫門東北向南下漸窅昧為牛角洞出洞遶屏北而西轉出南麓屏南崖峭削色黄赭下有窪瀦水從山麓石崖出崖不甚髙中若崆峒即牛角洞南通穴至此墜成水窪也又東抵南峽門北入問清秀於途人其人曰惟北峽有清塘上有洞南與黒洞通此外无他洞乃悟清秀所托不必出北峽時已當午舍之南炊隠山西過西湖橋一里抵小石峰下峰片峭裂中介衆峰間南瀕陽江東北西三面俱短垣環之從西北隙踰垣披其東北抵小峰南麓峰雖小如蓮之間瓣列房半崖坪中有石髙丈許如犀一角獨聳後又盤空上片攅支削尤增竒幻搜剔久之出問其名曰秋兒庄西即陽江西來有叠堰可渡南即趙家山穆陵村中隠諸洞云循陽江北岸西一里為獅子岩西又聳一峰與獅岩夾有岩東向凭峭石之上中垂一柱旁楞裂正東瞰獅岩首北轉又一洞北向崇穹曰天慶岩由級南中亘壁界洞為兩入數丈兩峽復合其北峽之上重門複竅懸綴甚髙望不可扳登此可直通山南北出洞西北行石山叢薄間山俱林立圓聳從松隂石影中又北里許經石山西麓兩洞比肩西向捫棘入南洞進五六丈轉從北洞出仰望洞上飛崖片片欲舞為蝦笆山西有林木迴叢平疇陽江西環之王太守園也仍從雙洞南東北而登得石磴一里踰坳西扳石鍔上所扳石銛若劍㦸石㫁崖絶棘刺叢聚遂出舞空石上瞰北麓斗懸難下尋舊磴下西麓繞出其北東一里至宋家庄出牛角洞南北過北峽間北眺西峽半有洞岈然當即清秀暮色已迫趨入西清門初十日始出振武門取栁州道西五里過茶菴菴南小徑二里至琴潭岩岩東有村土人訛為陳搏予得桂勝方信儒記云得清秀玉乳琴潭荔枝四岩故首覓清秀幾及復失以下三洞无知者予疑陳搏即琴潭今抵其村覓一人為𨗳聞東南有七寳岩先趨之乃東南渡南溪上流共三里至李家村村南石峰西向巉突岩不深而峭蓋在南溪白龍洞正西向㳺白龍時西望羣山迴曲處也返陳搏村𨗳者負松明并梯至西趨小山南先觀水洞門南向水滙其内浸洞口洞中衍四旁皆水所際其左深入洞前左崖瀕水趾刻琴潭二大字即信儒筆洞左復開一門後與洞通中多列柱垂葩嵌空虚􅍥予既得琴潭知荔枝當不逺𨗳者篝火執炬請㳺幽洞徴幽洞何名果荔枝岩也出琴潭沿山左瀦塘行遶塘北轉而西至荔枝岩門東向不甚髙西進數丈循洞底右竅入其下穴有方池四旁甚峻再東南轉平入數十丈兩􅍥低隘右崖半一竅髙濶僅盈尺内洞平穹瀦水齊竅引首竅中東望其水廣邃中石龍蜿蜒右崕南崕石盆一方平庋水面不能深入也仍出至洞底少西進循右一竅入上峽東有石幢圓立繞出其後忽􅍥為兩層下穴少西轉輒止上穴以梯上躋内復列柱分楞穿楞少西遂下南峽中平入數十丈又南旋為龕龕外洞頂亦復龍形天嬌仍出洞底又循北竅入上峽則層壁紛垂懸蓮徹柱雜然凝綴大抵此洞以幽閟見竒而深入在右小竅側小石彈丸大多磊落痕稱荔以此出洞西北三里抵大道平塘街其西石峰峭甚夾立如門南峰山頂開穴達山腹予向尋錢岩過此神動今急問道知道旁油坊後轉東南至古廟可登乃曳杖過坊南无徑可入逡巡得蛇道伏草間隨山麓東行南轉將抵古廟見有路西上從之始捫級既乃梯崖崖窮陟峽棘蔓擁没髻頂鈎不能出久之抵叢石崖下其上分形設詭計透明之穴已與比肩乃横陟而北逾轉逾出峰頭俯瞰嵌崖削窟反在其下下有髙呼路悮指予下踐之級者隨其指下呼者為二牧翁云登崖道尚在古廟南遂從廟南歴級上西南轉出山坳間眺其南一峰枝起頂𥪡一石髙數丈予所見石峰綴立雁宕翔鸞龜峰靈芝及此地笋石駢發未有靈怪至此者度已出崖後遥瞻石壁下猶未見洞門日暮返宿平塘期明日𨗳㳺十一日從古廟南登山𨗳者斬棘以先共一里抵昨返步處石隙中登數步望見洞門西南向又扳石崖數步即入洞其門前向東北後向西南徹望通明後洞正對𥪡石峰𨗳者謂洞曰榜岩山曰楓木云下山過古廟南由田塍中渡西來小澗水自兩路口西塘迤邐東穿山麓即南溪發源也東南入石岩洞門西北向後門東北向中空洞旁裂後門右崖有臺架虚上又盤蓋隆起悉忩楞隠透出後洞北一里仍扺平塘街街北石峰㠝岏若屏東隅有崖東向曰社岩街西北尋銅錢岩即前所㳺架鼓岩也西二里經兩山峽峽北山巍然負扆下為廣福王廟峽南山東有岩門東向西出峽為西路口市肆盛列西北為義寧道予往栁州則從西南永福道路東有岩西向門甚紛紜多所像類西四里路右小峰如佛掌髙擎下合上岐於衆峰中尤異其南又駢峙兩山束成峽峽南之山東層裂兩岩上岩明透山後急南趨之祗下岩可入上岩懸叠莫登乃入下岩岩中列柱牽帷為峽為忩轉透其後亦横貫山腹予意由後竅西出可反躋上岩透處乃上下俱削旁絶階援仍東出洞前東北隅石頗坎坷披隙登上層則前後二門俱與下岩並列門内乳惟蓮柱左右環轉以達後門數丈之内紆折无竟前門一臺正對東北合掌峰凭後門龕牖遥瞩西南塢外之竒収攬都盡予所見粤中重樓之勝此為第一既下西向行又見重樓北麓復有岩北向此峽南之山也在峽北者西向亦有二洞層列洞門俱石色赭黄獨為標異但一出峽滙水直浸兩峽西中叠石堤亘水面旁皆巨浸无從渡水一登赭岩又聞有八字岩亦不能至由石道西行滙水中望西峰之東崖壁髙亘上懸三洞相去各二十丈俱東向駢列其在滙水西南與東峽南峰東西夾塘成滙遥睇崖端俱有微痕自南之北可上躋惟北洞嶄然懸絶不可階升遂循堤西草徑傍水而南已抵南洞下梯崖入洞門甚崇内崆峒宏峻規模逈别稍下一岐由右入西南轉漸窅昧莫規底止一岐由左入不五丈則一門西透山後一門北通中先西披後岩洞門髙與東埓上下俱懸崖斗巘遥望西對南山亦有洞若覆梁門廣中邃曰牛洞東向黯黒而不知其涯仍入内北上中洞洞亦北轉而東透探其北轉至洞門有石内􅍥架為兩層上叠閣倒向洞内下裂門嵌壁門即所望北洞也仍入中洞内東臨洞門門愈髙穹下則崖危路絶遂循南洞出由舊級下一里北出大道西循南山北麓行三里越一平坡其南北岩洞甚多不暇詳步南至通城墟又南一里為上岩後洞門北向前臨深塘入其内擴然崇宏峽分左右進右峽下墜為淵石壁東西夾峻不可下其底南眺沈沈壁西之崖迴覆淵上予所駐足下眺者壁東則絶壁之下駢通二穴若環橋連亘水通其中不知所往北則石壁自洞頂下挿淵底壁半裂柱成隙泉淙淙下注出右峽由左峽上入則蹲石當門中聳為臺臺上一柱支洞頂路從柱南北入内有石崖自洞北南突若塞門與洞南夾壁成罅路循崖南西出繞崖後外穹為門門下横閾而上多垂簷踞閾坐門外峽復峭峙兩旁多倒懸下攫之石若龍爪猿臂紛拏其門俯仰兩絶出洞循其東麓復開東向門内窪下滴水空聲轉南漸黒當即通後洞環橋水穴者洞南則上岩村村後叠石開徑曲折上為上岩前洞門東向髙齊後洞肩深折不及洞側有臺趾由臺直躋洞後迸竇成龕垂石如距有垂至地下離一線者有中懸四旁忽卷者有柱立輪囷其中者有爪攫分出其岐者其東南對山有泉源曰龍泉云下洞仍出後洞塘北西向入東來大道度髙橋共十五里至山蚤舖四旁雖土阜間出石峰尤屼突焉又三十里抵蘇橋為洛青江上流水始捨桂入栁去予遂與桂山别徐霞客逰記卷三上欽定四庫全書徐霞客逰記卷三下明徐宏祖撰西南逰日記四廣西六月十二日自蘇橋登洛容舟順流西南五十里過永福縣又八十五里泊新安舖十三日一百二十里扺洛容縣陸去栁州府五十里水須三日溯栁江乃至遂定騎為明日陸行計十四日出城南西二十里為髙嶺舖南寨山秀立其南乃南折登嶺共五里直抵南寨山西栁江逼其西崖舟人艤舟以渡有小溪自南寨破壑西注栁江曰山門冲江東西為洛容馬平界去治各二十五里登西岸瀕江南向行為馬鹿堡東望隔江南寨山分枝聳秀亭亭露竒又五里西向踰坳入則石峰夾道森立南峰曰羅山頂北向有洞斜騫開兩門仰眺無躋扳路西麓又有洞駢峙其北峰南面峭削尤異西二里小峰中峽立曰獨秀峰迴眺羅山西麓洞心異之遂從岐東南披宿草一里扺羅山西南角東轉循其南麓北望山半亦有洞南向髙少遜北巔而面背正相值轉山之東踰坳北入一坪中開其右峰北巨石數十丈斜叠起衣折古勁逼肖左崖之北雙門墜峽下内洞北向深削成淵底伏流澄澈兩旁俱削壁數十丈南進窅然莫窺其源北抵洞口壁亦嶄絶上有横石髙二尺如閾可坐瞰其底无能踰險下也北出峽門上有道直上西峰得石坊坊後有洞東向中甚髙平寛朗探其左北轉漸黒隘右則西上愈昏邃兾後有透明處久之不得出仍從石坊共二里轉山西麓先入一洞門西向左轉而西進黒不可捫右轉東下窮於水出洞又北即向大道所望洞洞門亦西向連叠兩重洞外一大石横卧當門峻不可踰北有隘側身以入為下洞中懸一石復界洞為兩南北列先從南門入稍窪下南壁峻裂非扳躋可及北崖有微隙正穿入北門内内亦下墜東入洞底水聲汩汩與南洞右轉之底下穴潜通由北門出仰視上層石如荷葉下覆虚懸徑絶上躋復從南門側左穿外竅得旁龕龕外有峽對峙相距尺半其上南即龕頂盡處北即覆葉端從峽中手扳足撐遂挺虚凌其上上層洞東入不深惟洞北裂崖成竇環柱通門石質態各各創變扳隙西透崖轉南向開二楹下跨重樓陽朔珠明外此為最出洞返獨秀蜂下西向大道馳五六里北望兩尖峰亭亭夾立南則羣峰森繞中有石綴出峰頭纎幻殊甚又西五六里栁江自南而北即郡城東繞之江也西渡江二里入栁郡郡三面距江故曰壺城江自北來復北折而去南環甚寛北夾束形正與壺等寓郡治西因靜聞病卧予亦數日不出十八日始出大南門渡江江之南稍西為馬鞍山而兩端並聳為郡案山稍東為屏風山形伏處方正東北為登臺山乃扼江北轉者也馬鞍西尖峰聳削曰立魚山山特起南復有山映之非近出其下不能辨立魚當賓州大道在城西南隅由山東北麓躡級盤崖上岩門東向踞山半門外右上復旁裂一龕若綴閣其左下拾級數層又另穴一竅雙峽夾壁髙穹直入皆門以外景也入岩張巨吻中寛夷整朗後通兩竅一南一北皆穿腹西入先由南竅進内忽窿然髙盤西復透一門踰閾出西臨絶壑遥睇西南羣峰開繞延甚廣由門右穿峽竅以下復有洞西向石柱中懸柱後穴即前洞所通北竅也門内左循岩壁上洞横南北勢愈髙盤頂有五穴乗空紛若列星其下東開一穴前逹僧棲置鍵不通行稍南西轉下峽復西透一門前亦下臨西壑門左轉入内亦下墜成峽直迸東底深峻不入下縁其上捫崖透腋又南出一門前一小峰枝起與大峰駢立成坳從其間扳崖梯石直躡立魚巔是洞透漏山腹東開門二西開門三南開門一頂懸頂裂復十餘穴真異境矣仍出前洞門右歴級南上少憩僧廬東瞰山下塘滙水一方内沁不知所去東所對即馬鞍西北麓為仙奕岩居人祗知馬鞍不復曉仙奕實无二岩也東南所對乃馬鞍西北枝峰峰有夀星岩岩後重岩迴復為馬鞍奥境非一覽可盡予欲候靜聞故并仙奕俱留為後㳺十九日留僕伴靜聞寓中予獨挈囊為融縣㳺出西南門得沙弓小舟同舟者欲明晨行竟宿沙際二十日上午始發舟循城西北溯栁江江之西鵝山亭亭獨立曠野中自栁郡西北兩岸山土石間出土山迤邐間忽石峰數十挺立成隊所異陽朔桂林者彼四頋石峰不受寸土此則如錐處囊中尤覺有脱頴異北二十里泊古陵堡二十一日過杉嶺江右尖峰突出共五十里抵栁城縣城西江道分為二自西來者慶逺江也其源一出天河縣為龍江一出貴州都匀司為烏泥江經忻城北入龍江合流至此自北來者懷逺江也其源一出貴州平越府一出黎平府流經懷逺融縣至此二江合為栁江所謂黔江也下經栁郡歴象州與鬱江合於潯今分潯州南寧太平三府為左江道以鬱江為左也分栁州慶逺思恩為右江道以黔江為右也然鬱江上流復自為左右二江則以雲南交水南盤江為右交趾廣源州麗江為左也二江合於南寧西合江鎮古左右二江指此今則以黔鬱分耳南盤自交水下田州至南寧合江鎮合麗江是為右江北盤自普安經忻城為都泥江入黔江經象州至潯郡合鬱亦為右江是南北二盤在廣右俱為右江但合非一地耳雲南志以為二盤分流千里至合江鎮合則誤以為南寧左右二江俱源自盤江不知南盤无闗於麗江北盤且不出合江鎮也下午自栁城北溯懷逺江入又十里抵舊縣二十二日暑雨時作僅行三十里二十三日西北十里過草墟江右崖壁峭秀又十里江左山崖迴亘内遥峰森列攅合天半於是舟反東北轉十五里扺沙弓融縣内江也江之西南即為羅城縣東界西望隔江羣峰滙聚處皆羅城道中所由也二十四日仍附原舟向和睦墟先是沙弓人謂明日乃和睦墟期墟散有融縣歸舟原舟亦往墟市米故仍附之行舟自沙弓西即東轉北一里有江來自西北舞陽江也内灘石甚險又北東九里扺和睦墟墟已散不得舟得一荷鹽歸者附囊與之行北二十里大道直北向縣而荷囊者家東梁西北遂同西北行二里上雞籠嶺西大山曰古東山山北東隅為東梁抵縣大道所經也越雞籠嶺三里抵其家去真仙岩尚十里餘去縣十五里二十五日北取真仙道過讀學岩岩有二門俱南向東西並列相去數丈外障駢崖中通横穴若複道行空蜃樓内朗垂蓮倒柱鈎連旁映軒爽可憩西有小石峰特起田間旁絶延附亦有門東向并越水畦入之初入覺峽逼无竒穿門西進罅迸十字西既通明南北俱裂竅土人架木竅間若欲為懸閣以居者又西循溪塍里許抵赤龍岩岩北向穹然山半洞前北突兩峰洞當其中髙曠宏邃底平而上窿門内石臺兩重界其間洞右列柱分楞别成欹室中洞直入數丈脊稍隆起成仙田中毎貯水更入漸窪暗聞内門束如竇止容平身入入則廓然通别竅恨不擕炬一竟其奥山前有溪自西來分兩𣲖東抵東梁北滙安靈潭為靈夀溪之上流云下山北越溪北山有洞駢列門南向雖髙穹側裂中乃下旋如墜螺門外右躋復飛嵌懸崖趣豐凭踞乃下此山正與赤龍南北對讀學則東西肩列北趨間道正由此山讀學兩峽中山東隅復開東向兩岩曰鐘洞曰鐘洞岩北岩淺峻若𥪡鐘剖其半南岩門髙層穴屢引上透无級入下洞當門巨柱中懸環轉无餘地遂下直北趨二里越一脊脊北為百步塘尖峰四列中間平壑一圍循山右轉又一里山分突三峰北向列西一峰山半洞門西向舍之中峰洞東向東峰洞西向先登東峰洞洞南北迸横峽斜竇有石自山巔下嵌峽底四面可繞而出次登中峰其洞北竅下裂上懸南牖石飛架其間上牖前突石臺憩卧甚適下直北徑百步塘三里越塘北小溪自古鼎來横涉之又大溪自南趨北即赤龍岩前水東過東梁至此二水合而北行一石梁横渡東西俱駢峰成峽溪流其中曰靈夀溪北一里滙為安靈潭神龍之所窟也又北里餘山當面横列洞門開張山半予疑真仙岩至矣至則路轉出其西麓遂東行環其北北復有洞不識中貫南洞否時望真仙岩山尚在北北即安靈溪水流入真仙後洞處予初未晤遂東循山麓出北轉一里與東梁大道會峰轉溪怒始見真仙前洞東北髙懸溪流從中北出前有大石梁二道越梁而西南向入洞洞門圓迥如半月髙穹中剜一山之半其内水陸平分北半髙崖平敞南半迴流中貫由北畔陸崖入數丈中壁横拓分二道壁之西有竅南入僧棲倚之壁之東南溯溪岸深入巨柱中懸上下綴旒紛鬱稍後則老君巍然鬚眉皓潔皆玉乳所幻結故又名老君洞其後則千門萬戸乳像愈極繽紛以无炬未及入下則溪滙為淵前趨峽壁激石轟雷其隔溪東崖南與老君對者溪上平聳為臺後倚危壁為下層北與僧棲對者層閣髙懸外復疏明為上層但非鵲橋不能渡遂出憩僧棲同僧參慧入市隨之北一里過下廓又北則大江在東即潭江北自懷逺大融南來者蔡邕江西自丹江橋遶老人岩至此東入江二水合流下廓旁道當其中北渡蔡邕橋入融南闗約二里城居甚寥落問老人岩道復從下廓北循蔡邕江西南行西抵一峰石勢叠聳迴削千仭老人岩當北溯溪岸予悮南入山峽峽乃老人岩南支與南山夾成者南峰北麓石磴盤山而上有僧方汲趨問之其上爲獨勝岩非老人岩也穿穴入内開一龕稍窪亦隙裂成楞但无光透耳獨勝北有鯉魚岩即古彈子岩聞乳柱甚豐不及往仍東北出下廓溯西北小溪抵老人岩山下下有洞東向舍之西向拾級上兩崖合束懸磴其間取道甚勝已透入一隘轉北上至岩之前門其岩一洞兩門前門東南向後門東北向石崖髙跨而東突洞徹其下前後相去不逺亦穿岩類惜前後俱障以佛廬遂令空明頓失從廬側轉入後岩仰見盤空之頂後岩僧樵未返門閉不得入留為後㳺下山出獨勝東峰披蔓草行二里暮抵真仙岩宿二十八日參慧束炬𨗳㳺真仙後暗洞始由天柱老君像後入溪之西崖陸洞也千柱層列衆竇競起前之崇宏雄曠忽為窈窕靈奥窮搜殆盡石下巨蛇横卧火燭之不見首尾踰之出入竟伏不動然此奥雖幽邃猶溪西一隅時時由隙東瞰溪流兾得一當終未能下涉既出迴頋溪竇内透天光對崖旁通明穴益神動不能已托參慧入市覓筏為必入水洞計參慧復爇炬引予由岩前左石下北入深穴穴雖幽深无乳柱幻空然下多龍脊盤錯交伏鱗爪宛然亦一竒也出洞參慧往覓舟予恐不能遽得不若躬往索之且以畢老人諸勝乃出洞北大道西望山峽間峰巒聳異内有劉公岩草深无𨗳仍從下廓先趨老人岩門東向西北竅深入漸暗聞秉炬以入徑甚逺從門左仍躋石峽抵上岩轉透後岩内結閣盡踞洞口閣前臨眺上下懸崖峭絶蔡邕江西來瀠其北麓自爲分合抵岩下北轉去大江當其前恍然如天表飛仙直北即香山遂下山截流渡江水淺不及膝溯江北行望其西江所以來處峰巒瑰異内有雞塲洞幾隨之西遇荷薪僧指香山在東北乃轉循北山東麓一里西登級抵香山廟廟虚无人東北至縣西門又南過下廓遇樵者令覓舟入真仙二人慨然許之先是予屢覓之居人俱云此地无筏而舟為陂阻无由入洞須數人負之趨不意此乃漫相許予心不以爲然竊計岩中有遺構可結桴浮水獨木不能自移還與參慧圖之抵岩參慧已歸亦覓舟不得惟覓人結桴爲便意與予適合二十九日晨促參慧覓結桴者未行昨所期樵者呼羣至問已入洞否予應以待舟樵者謂舟不能至若聨木為桴予軰水中挾之入正與舟等參慧即以覓人錢畀之遂羣負木入溪斬竹爲筏頃間桴就復以岩中大梯架其上更置木盆予踞坐盆中諸人前者引縴旁者挾篙後者肩聳遇深淵輒浮水引之遥不能引輒浮水挾之始由洞口溯流仰瞩洞頂益覺穹峻兩崖石壁劈翠夾瓊漸進漸異前望天光遥遥層門複穴交映左右既入重門兩旁俱有層竇盤空上嵌前後光明皎然彼此照耀挾桴者欲從中爇炬登崖以窮旁竅予令先溯流出後洞乃復浮水引桴抵洞門門西南向吸川飲壑溪破石而下桴爲石格不能入溪捨桴踐石出洞又􅒂然一天也溪石坎坷不受踵望左崖有懸級在伏莽中援莽蹠空上不數十步輒得溪徑四望平疇中圍衆峰環遶即予昔來横道北岩之東北隅也返登桴順流入洞中扃東向俱有穴可登而西崖穴髙難扳且前㳺暗洞彷彿近之東崖則穴競門紛曾未一歴遂爇炬東入其上垂乳環柱與老君坐後暗洞諸勝工力悉敵從其内穿隙透折多有旁穴星星上徹雲影知其東透山膚甚薄從其側宛轉北出已在老君對崖之下層因崖爲臺下臨溪流再出即爲對崖之上層上亦列柱縱横崖壁峻阻與此層无徑相達仍引桴下浮欲從溪中再上浮崖亦懸嵌无由上躋計取道當從洞前南轉抵東北山椒可入洞中非架飛梁不能上也乃絶流引桴還登東崖諸人釋桴歸去予亟呼其中一黠者攜餘炬𨗳㳺劉公洞北半里西向轉入小岐向山峽二里抵山下一洞在南山東向一洞北向北山中突峰又一洞東向方莫知適從忽聞牧者謦欬聲遥詢之北向髙騫者是披莽從之其人見予所攜炬一束笑謂入此洞須炬數枚乃可竟僅此將何從伏莽中石磴隠隠隨之躋洞門巨石前横從石隙入崖上大鐫西峰之岩四字爲寳祐三年李柱髙書前又有碑記二方其一不可讀其一為紹定元年太守劉繼祖重開此岩桂林司理參軍饒記并書始知名洞以此入洞先爇炬從其後右畔入乳柱環轉不數丈出又從其後左畔入數丈後愈轉愈廓玉笋左右森羅升降曲折杳不可窮紀恐火炬易盡竭蹶甞臠出不知蔗境更何如也西望北山中突洞石態秀出門若雙列中必相通趨其下崖懸无路𨗳者已去見予徘徊留眺復至引入南麓小洞内淺不通上岩上岩危嵌峰半遥望多姿近之了无警目且徑絶无援不得不却步及東行囘頋紛綸之致復標異撩人仍强𨗳者芟翳級石猿引以登予接之遂歴其上削壁層懸雖兩崖並列中不共貫外復淺竭興索而返東南抵真仙岩雨阻岩中數日七月初三日予出洞往覓對崖明竅徑東越洞前石梁循山南轉而西徑伏草中時不能見抵後山過脊竟不得西向登崖徑乃莽然躋山半覓之皆石崖嵯峨无竅可入度其處似過而南懸崖復下忽二農過其前詢之果尚在北也依所指西北上莽棘中果有一竅止容一身而下墜甚深俯瞰之深餘三丈即北崖僧棲對望處已聞搨碑僧笑語聲但崖峻下懸不能投虚墜眺視久之見左壁有𥪡隙雖直上无容足扳指處隙兩旁相去僅一尺五寸可臂綳足撐下乃左轉向隙轉處石皆下垂无上岐圓滑不受扳踐摩腹過既至隙中兩臂兩足若膠釘稍動即且溜脱下然即欲不動支撐久力竭勢必自溜不若乗其勢蹲股就之迨溜將及地輒猛力一撐遂免顛頓此法亦勢窮所生非學問可及也既下岩寛四丈中平下臨深溪前列層柱若䕶欄岩内四周環壁皆紛紜葳㽔非雕琢可殚前與西崖掩映後復得洞頂雙明竅從中遥頋溪出入處俱一望皎然収一洞全勝真仙爲天下第一此又真仙第一也岩右一石平突溪上由其側扳崖而北又連闢兩龕内俱明潔石壁危嵌色態交異如初墜處其前崖亦有一柱傍溪起中纎圓類指上抵洞頂復結幢絡蛟龍繞纎指下垂環而夭矯者數縷内近龕處復有石圓起三尺拍之聲若鐘其旁倒懸之石皆能傳響此皆溪東上層之崖也南與下層並峙崖相隔无幾中有石壁下挿溪根无能外渡稍内有隙南入皆倒垂龍形縱横交折兾其中通南崖尚有片石隔若鑿空取道於此從下層臺畔結浮橋渡老君坐後宛轉中通无假道於外免投空險真躋勝快事也時雖溜下計上躋无援隔溪呼僧棲中搨碑者乞其授索垂崖庶可挽之上搨者不識外轉道欲以長梯涉溪溪既難越梯長不及崖之半即越溪亦不能下徬徨久之擬候參慧歸覓道授索因午過猶未飯反覆環眺其下𥪡隙雖无可扳其側覆崖反有凹孔但上瞰不得見下可因躋聳身從之如鳥斯翼不覺透井出仍從莽中下山返飯真仙岩而卧初四日聞西南十里古鼎山有懸岩髙懸鐡旗新闢且可從真仙後溯靈後上流幾欲命屐為候搨所羈初六日搨事竣始探鐡旗岩晨飡即行過來時横列之北洞及南洞南過安靈潭西渡溪從岐西向山坳半里踰坳路漸大透山峽出共一里南越小橋即來時横涉小溪上源也橋南山半洞北向无竒循麓西至古鼎村問鐡旗岩居人指西北峰半半里抵峰之東南又西始見洞懸山半閣倚於前稍上得層級大木横偃級旁上叢木耳芝結其下予時急入岩不及細檢抵岩岩南向正與百步塘南山相對内亦无竒外勝頗饒鐡旗名以峰著非以洞著也因問僧龍岩所在僧初住山誤以沸水岩爲龍岩指予西南入龍岩實在東南古鼎村後山予不知從僧半里至沸水岩下穴東北向滿瀦水内聲硡峒東穴亦如之蓋其下皆中空故也予所聞龍岩在山半乃望髙上躋上岐兩峰中削千仭東西各有淺穴側罅終无危厓注水乃下東至古鼎村村後山南向開洞一髙峽上穹一圓竅並峙即從岐東上皆无峽中之水如所云龍岩者既下仍由村北舊路過小橋溪挾雨暴漲橋沒水底二尺杖傘以渡念小溪如此若靈夀石堰漲髙勢湧必難東渡遇土人取笋歸古鼎問之曰大溪誠難涉可踰嶺抵溪即隨溪北下止涉一小溪竟繞出老君洞左矣予聞之喜甚踰坳抵安靈西堰果水勢洶湧非揭厲所能及即隨溪左北行約里半近隔溪横列之南洞溪遂西轉又環西面一獨峯從其西麓北轉東向趨老君後洞靈夀大溪已東去惟西山夾中有小溪西來注之上有堰可涉循溪而東從左越坳下坳皆懸石層嵌藤刺冐之不覺䧟身沈頂手足失勢傾蕩洪濤中汩汩終无出理久之竟出坳脊俯扳棘滚崖出洞左蔬畦得達洞參慧已下㨗支扉矣呼啓扉者再得入洞若更生焉初七日别參慧入城訊舟初九日始得小舟過午舟發東南行巳轉西南共六十里泊沙弓初十日四十里爲羅岩村岩在江右層沓斑駁五色粲列南崖稍低石芝偃峰頂崖半匏剜一洞當有勝可尋惜來時以暑雨掩篷今去僅隔江遥睇耳又四十里栁城縣縣南二里江之東爲巒攔山削崖截江爲縣城南障西即峭峰叢立土人指爲筆架穿山者棹月順流瞬息二十里一山兀聳江東岸排列而南江亦隨之南折灘聲轟轟如殷雷爲倒催灘又南四十里抵栁州府泊南門城鼓猶初下也十一日早入寓靜聞未瘥頋僕亦病往返二十日兾其霍然同行加以頋僕尫弱尤甚爲之悵悵十三日出城南渡江循馬鞍山北麓西行折而南循其西麓由西南塢中登山草没石級濕滑不能投足仙奕岩在山半削崖下門西向正與立魚對祗隔山下平壑中一潭岩内逼如合掌深止丈餘岩右有石端聳上迸裂成紋參差不齊雖可登憩以爲黒肌赤脈分十八道可奕似未確岩左東南上又裂一岩形與仙奕等西南向其下東南抵坳中又迸一岩亦淺隘不足觀仙奕三岩齊列山半俱相伯仲而已西下山麓還望復得一岩亦西向正在中岩下岩前砥石如枰其北石窟成峽北透通明中開朗可憩出岩西盤一山嘴轉出東南山半有洞西南向登之洞門岈然中髙穹上出下深墜縱横成峽樓殿層叠雖不甚寛放固以危峻逼裂見竒入門有石突門右青踞若牛背復髙突一石圓若老人首先是立魚僧指其處有夀星岩必即此由突石左懸級下墜西出突石之下則下墮淵削上級虚懸皆峭裂不通行東入峽道中灣環以進忽天光上映仰睇若重樓空架兩崖上覆下嵌无由度虚上躋遥見光映處内門規列髙懸夾崖末外戸分透前山頂平若覆帷恨不牽綆一登下山東仰北山半復有門南向計其處當即前洞光映所通也下俱迴崖層亘稍東循崖西北上踰下崖抵中崖上崖卒懸絶不得上復從前道下更東循崖角西北登上崖沿崖西陟則洞前三面皆危壁倚空惟此一線盤崖可達前有平石如露臺内旋室方丈四壁俱環柱駢枝分布宻嵌西北内通一門下臨深峽果即前仰睇透空處也仍循崖端東南下南復有山鵲起從西麓仰眺山半懸崖穹拓黄斑赭影欲登无路循山南行得㣲徑從草中東上抵一門外雖穹然内僅如合掌无可深入望黄赭削立處已在其北崖嘴間隔不可盤陟復下至山麓再從莽中望崖登久之抵崖下崖危削數千尺上覆下嵌若垂空之雲亘接天半毎當平削處裂孔一方中多紛綸竒詭第瑣隘不能深入循崖北行上有飛突之崖升降石罅中如度凌虚檻榭披覽久之下山東出前峽踰畍峽石垣又東兩崖石皆巉嵌叢翠倚之共一里出馬鞍東麓得北來道截大道東一里爲郡東門對江渡於是瀕江南岸倚屏風山北麓東行里許抵登臺山江爲山扼轉北去路從山南繞東麓而北一里有山横列三峰其隂即王氏山房所倚予昔來自洛容從其北麓渡江者也山南有洞駢立南向岈然其山倒石虚懸内裂三峽外通三門宛轉迴合惜不甚深擴西峰之陽復有一岩南向皆赭赤之石中甚淺遂下西坡小徑北循西麓踰一岡竹塢蓊叢共一里餘東倚山麓西臨江坡坡上宻箐蔽空連麓交映道出其下行空翠中一里抵姚埠東門渡由村後南向登山入竹塢中筤簹萬箇俱碧玉森翔烟籠日透光影鮮凈清風來披洒滌煩慮已而上山石磴甚峻西南折穿榕樹根中又東上過一庋石片下石去地五六尺崖旁平􅍥出薄齊架板上爲王氏山房小樓三楹横洞前北臨絶壑勝贍遐眺樓後即洞洞髙不受樓揜曰東林洞洞後分東西竅南入西竅稍東轉黒隘不堪進東竅亦從南入轉東忽明踰東閾出巨石迸裂成兩罅北透者石叢而平臺中懸其東下隙則茅閣虚嵌削崖四旁聳石成雲非若他山透腹出一覽竭致也從洞東南躋嶺頂石磴危峻収望愈擴直南盡登臺久之下山渡舟適至由東門二里返寓十七日同靜聞及僕下潯州船以中元節無旅客故留滯數日十八日晨飡後放舟十里有小山在江左江稍東北曲小山東爲龍船山又西道爲夾道雙山乃北門陸路所出也又五里爲油閘江始東轉十五里乃轉而南南十里爲山門冲即向日洛容來渡江處江東爲南寨山西麓石崖迴返下嵌江流又南十里爲羅峒前有山兀突坪中罅裂其南上連下透如石門其巔一圓石突綴作一僧倚崖南向肩與崖齊頭顱上出又五里諸峰森叢江右由山門冲至此江稍西南轉又東五里轉而南一迴渚成涯曰犂冲山脉北自牛角尖下江流環其東南西三面中成盤涯宛似犂尖云忽北轉五里直抵牛角山下復轉東去灘聲如轟雷久之乃止懸流迴㵼一㵼數里曰横旋灘自犂沖北轉至此若破壁出東南下灘五里山漸開又東北二十五里至山江口洛青江自東北來注日已西遂泊十九日乗月放舟五鼓抵賓江有岩特立江左下削上突江因之西轉二十里至象州城在江東岸隔江即爲象山西二十里過大容堡遂西南行兩岸始廓然無山又東南十五里都泥江自西南來會江東北岸一小山北面分聳西岐為突兀東峰峭削尤甚正對都泥江入江口特建標以識都泥江者北盤之水發源楊林海子抵普安州由泗城下遷江歴賓州來賓出於此溯流舟至遷江止上流即土司蠻洞人不敢入水多懸流穿穴故鮮核其源流也又按慶逺忻城有烏泥江由縣北合龍江詢之土人咸謂忻城絶無北合龍江水口蓋即都泥南下遷江者且遷江忻城南北接壤烏泥都江音聲相亂實無二水也又東南二十五里東下大灘曰菱角灘又二十里泊瀧村二十日放舟五里下大鷺灘江右石峰復駢列出又南五里至武宣縣隔江西岸山卓立岐分引墜南下岩皆竒詭若垂首引項傴僂比肩各極怪異志謂縣西有仙人山南有仙岩山當即所望謂諸異峰也東南十里兩岸復曠然又二十五里爲勒馬堡過此即潯郡桂平界南十里兩岸山漸合又五里爲横石磯石自江右山麓横突江中返流倒湧遂極澒洞勢兩岸連山逼束至此爲入峽始又東南二十五里爲鎮峽堡又十里兩岸山勢益髙聳獨冠諸峰間出石峰懸峙江至是轉而東其南迴東轉處江左瞰流之石有大書鐫石傳為韓督憲留題云東北二十里小溪自北破壁出其内峻崖屈曲如夾堵牆又東即大藤度峽處南北兩岸俱有石突立江心昔有巨藤横架江上故南北兩山猺賊此追彼竄藉爲津衢韓公雍破賊㫁之因名㫁藤峽過㫁藤五里下弩灘遂南出峽口一水自東來注曰小江口合而西南下勢甚峻急蓋北自横石磯入峽南出弩灘其中山勢迴逼正如道州瀧江嚴州七里瀧但此峽相去六十里始入爲東西峽中轉爲南北絶无居廬叢木虧蔽兩旁悉猺童窟宅故得因勢展暴使刋木開道則亦丹崖釣臺勝概相麗矣西南循山下十五里抵潯州府日已暮泊北門二十二日留靜聞頋僕寓潯之南門覓担夫爲白石勾漏都嶠三山㳺從驛前南渡鬱江八里至車路江小水自東南西北入鬱郡舟上水可抵此又南三里為石橋村南望白石山與獨秀山各挺峙三十里外山道迂複實尚六十里而遥村南二里得迴石一壑清流中瀦石皆玲瓏迸裂爲蕪原生采更南滙潭益盛東有山自南抵北從其西漸升而南益迸穴平地下䧟爲峽爲井中悉叢石嵌淵水澄其下蓋地中二丈下皆伏流潛通石骨阻亘偶骨裂土迸則石出䧟成穴云又南二十七里抵姚村依山滙水真山中樂墅也渡小溪南踰嶺五里爲木角村村在白石山北麓去山尚十里炊宿山村舂舍間二十三日東南越嶺岐徑望白石趨其山峰攅崖絶東北突聳一峰爲獨秀孤懸峭削上齊白石頂若傍若離直剖其根崖石獨多赭赤色五里路漸没草間嶺半得一山家傍舍植芭蕉甚盛趨問白石道尚在西南由其左登山東向上南轉山脊五里度坳稍東即南折直抵山北麓獨秀已不可見惟危崖盤削下多平突之石盤亘叠出又作一態直上抵崖石下南出共二里爲三清岩岩西向横空大穴濶十餘丈髙二丈深及濶之半石特平慘即白石下洞也又南半里爲大寺後倚崖壁寺左水自半崖下滴曰圓珠池池無異按志山北有潄玉泉西事洱百粤風土記俱謂其泉暮聞寺中鐘鼓輒沸溢起止則寂然詫爲異及抵白石寺并潄玉名不知何况聞鐘泉沸非寺僧之蠢即著書附會之談也遂由池前南循崖壁行已東上入石峽峽兩峰中剖上摩層霄裂罅相距不及丈磴懸其中時有巨石當闗輒置梯以度連躋六梯始踰峽登坳坳南北猶重崖摩夾稍北轉循坳左行則虬木叢篁迷雲暗鳥身度霄漢上不知午日之中東嶂稍開始見獨秀東北立東南塢中又起一峰正與對峙髙殺三之一宛然蓮蕋中擎但四面爲諸峰所掩惟此得睹全體耳又北扳懸崖上木根絡石間爲梯為絙得受足縁躡已轉一壑磵自山頂西向墜峽絫搗潭穴峽南復懸梯上登宛轉三梯東行平岡間外則萬仭下削内即絶頂潄根之峽内外皆長松一道深碧間日影下墮臨風颺曳閃映萬端林盡鑿石成磴躋磴轉會仙岩岈然南向矣岩皆黄赤石上下開穿内漸湊合平慘無紛紜滴瀝與三清同而地位髙逈已窮極幽暢乃從岩右躡削崖凌絶頂崖雖危削盤阻處中有子石鵝卵大嵌突齒齒上露其半藉爲麗趾級不覺一里已湧出峰頭東向與獨秀對揖此峰正從潯郡來所望獨秀西白石絶頂獨秀四削如天柱非傅翰不能翔上此峰三面亦危崖特立惟南面開罅梯罅得躋頗似太華三峰上分仙掌下懸尺峽透險遮虚此真青柯嫡冡他未見其比即桂朔栁融諸峰非不干雲直上然石質青幻片片芙蓉攅合竅受躡痕受扳无難升陟此則一壁萬仭雖曲循隙竅何啻蹈空自奮也獨秀蓮蕋二峰爲此峰門戸其内環壑深塹蔽虧日月重岡間之人無至者久之下會仙歴三梯三里至峽坳之上峽南一石倚崖起下有線罅穿其中僅容側身進其上或連或缺既而漸下南轉出罅飛石上下懸嵌危不可躋返出石峽坳倚石側復有道上出石端危懸殊甚扳根引蔓僅躋其端透入石闕中即倚石西盡處與前崖夾成闕穿出闕南抵飛石南懸之上瞰前罅正在其下遂扳登倚石頂則一臺中懸四崖環峙上又連者如橋缺者可瞰如井下峽坳歴六梯一里西出峽又一里北返寺二十四日西向下山三里過周塘村倚山環池樹木森映南七里爲麻峒墟又二十五里宿中都峽二十五日南二十里下核桃嶺大溪自南來西折去即潯郡西繡江上流也發源自平山墟乃大容山西北水大容東西有兩繡江一南自廣東髙州北至北流縣合大容東南水經容縣注於鬱此容縣繡江也一即此水爲潯上流之繡江循溪三里涉流渡江水及腹爲横塘渡潯郡南界至此江南即鬱林地属梧州西北境由江南岸溯流踰嶺南五里過白堤亦深山奥境溯溪右南行八里得大寨村自白堤至此山迴谷轉夾塢成塘溪木連雲堤篁擁翠宛然避秦處也二十六日西南十五里過箬㡌山山稍開南見大容又五里為平山村東望大容在三十里外猶有層峰間之南十里轉峽西出為勒菜口於是山分兩界大容東北峙寒山雄倚西南排闥東南去中成大塢溪流南注為羅望江源十里過馮羅廟廟南峽愈開寒山南盡而大容東轉於是平疇擴望南有岐東涉羅望江循大容南麓過陸馬廟東四十里可出北流縣予取鬱林道南十里止松城墟二十七日十里抵鬱林州州西南一里南流江自東而西其流較羅望為大涯下泊舟鱗次上有堤内環為塘堤下卧石片片横列涯間紫泉在堤下石片中石南北夾成門罅横三尺濶二尺東横環而西缺其南水從底上隘瀦其中停泓者三尺上從南缺處流㵼去時見珠泡浮出水面泉之西有石梁曰南橋跨南流江橋北文昌閣當江流環轉中虚敞可眺為此中勝覽橋南為亷州大道予由岐溯江岸東行水月岩道也東北共二十三里踰山峽東下峽東石峰森森自北而南出峽循西土山東麓而北一村倚山東向又北一里半東轉得龍塘村村踞岡脊中其南水南流東去其北水北入水月洞由其東又北一里半直東抵石山中峰渡石橋而北則上岩西向穹覆山半上岩者水月洞南倚山憑虚之竅也石出自東北來南引而下一支中出者西瞰平蕪削崖懸竇層結皆不甚深而此層最下亦極擴環峰石皆青潤獨裂岩處色變赭赤石質尤窮極神詭尋丈之間穴穿蓋堰无不具足岩前架廬當門敞其上不使揜岩勝由岩右腋穿竅上復出一層如偏閣其左腋可環柱出柱側懸崖上躋轉出岩末復得岩西向自分左右兩重左重在下垂柱裂竅仰睇上即右重也然歴磴无階由外北躋始入右重閣綴絶壁與左層翼對增妍皆岩之中層也其上削崖絶頂尚虚懸一重級絶扳躋惟供矯首耳水月洞在上岩北地稍下龍塘水經石橋北過上岩乃東向搗入水月洞洞門亦西向路由其南水行路北相沿入水北透後洞出前後洞門一望通明水旁蹲石夾流兀突俱作獅象形洞頂垂石夭嬌交龍舞螭繽紛不一其水平流洞中无真仙岩之大兩崖亦失其深峭可褰裳涉溪崖右有一小水南自支洞出爲隂洞左則沿溪笋乳迴洞迴夾上亦裂門綴穴層閣之上又滙水一池爲竒此明洞以内勝也後門崖口列大柱數條自門頂合并倒懸洞内望之蜿蜒浮動此明洞以外勝也隂洞乃明洞旁穴中又分水陸流不甚大東南自牛隴又開一門穿山腹至此合明洞溯流南入半里洞漸沈黒崖益斗水益深結筏積炬屈曲約二里出牛隴此隂洞水中勝也從隂洞溯流始崖左嵌石下竇甚隘匍匐下穿引炬而前忽巋然上穹上下垂聳盤柱詭狀百出升降其中洞心駭目邃曲莫盡此隂洞陸中勝也是日予抵上岩已過午道流方扃戸出予坐崖下荔隂間久之道流罷釣歸即促其束炬爲水月㳺既入明洞篝火入隂洞道人不隨支流入由其側伏窪穿隙遍収隂洞陸崖勝中崇宏幽奥森羅衆詭凡五易炬出欲溯流窮水崖道人以无筏辭請别由牛隴探其後崖不必從中出也乃出明洞涉水窮左崖之深仰睇後洞諸垂虬舞龍石出飯上岩宿二十八日曳杖窮最上岩下憩右竅偏閣中既午循山而南至昨所度石橋橋側東折入峽中是山石峰三丈俱鋒稜巉削由東北走西南中支爲水月岩所托是峽則中支南支相夾者南支多峭崖裂竅予來時循其西麓詢之土人皆曰中不甚深今故從峽中轉其北得平窪一圍羣牛散寄其中知爲牛隴窮隴西北水滙成潭隂洞後門即東南臨潭上四旁皆陡石无路入必涉潭乃登洞甚虚敞隨水西入漸北轉石崖成峽水亦漸深昧與水月隂洞所見等雖未出其中兩端源流悉見可無煩暗中摸索也洞門右崖馬蹄痕莫紀其數疑即志所載天馬洞出洞益遵峽而北東西兩界峰石翔聳蔚然霞綺二支北盡處北支又突兀起與中支北麓對峙成峽下有三洞南向上蒸雲流電閃爍陸離東畔二門駢列雖懸乳繽紛俱不邃進西畔一門孤懸峰半洞門嵌空中忽淵墜深且數十丈宛轉内透極杳𣺌之勢但兩崖直削無級下降踞崖末望之飛鼠千百成羣見人蓬蓬内竄聲傳遥谷出洞望中支西北山嘴頗近以爲由此穿水月後洞抵上岩甚便趨一里至其下扳陟山崗則巨石飛聳中都蔓絡脚嵌沈淵底遥探洞外諸竒石杳不可見即溪流破壑出者亦盡没其跡仍出峽返上岩復至水月後洞睇望所陟路㫁處尚隔一峰嘴也二十九日由上岩過牛隴共三里出峽有兩岐直北循北支石峰東麓者爲北流大道東向踰嶺者爲間道乃從東岐二里抵塘岸墟墟爲陸川北境北轉即北流属二十里爲横卧村村北石山一支自北而南叢簇尖翠初望之以爲勾漏在是漸近路出其東南西望而行秀色飛映蓋此山在北流西十里勾漏尚在北流東十五里也自横林共東北十里抵北流縣縣當大容南面之中山脈由大容南下曰緑藍山水分東西流東流者為北溪循城東下登龍橋入繡江西流者即南流江源西南合水月洞水經鬱林南門西合羅望定川諸水南下亷州入海是縣實為南流源其曰北流者以繡江東自粤東髙州來至此始勝巨舟東過容縣界合洛桑渡水經容邑南門下藤縣北入鬱江去非謂北流源此也縣西十里為鬼門關東十里為勾漏山二石山分支聳秀東西對列而鬼門顛崖邃谷兩峰合立路經其中勝與勾漏實相伯仲予自横林北望即竒之不知為鬼門也至縣始悟已從東南越之過以不及經其下為恨出縣東門北出隘門抵北山下循南麓東行五里度溪橋入石山峽中南為望夫石即黄婆岩西垂之山也北則石峰透迤愈東石骨益瘦疑即獨秀岩所托今已失其迹峰東崖大書勾漏岩三字此東北二石峰俱東拱寳圭洞予東行峽中五里石山迴合中復突一峰勾漏菴正倚峰南麓其西隅即寳圭洞蓋庵頗整潔内堂三楹西則葛令也葛像綸巾朱履飄然欲生前庭佛桑盛放乃令人多覓竹束炬爲明晨㳺具道人欣然願前驅八月初一日先作寳圭行約道人肩炬篝火後至洞在菴北半里菴後先有兩岩一南向一西向望之俱淺寳圭更在其北漫流自西北東向直潄山足北陟之登山抵洞門門西向左開岩軒敞平臨西峰右則深入窪嵌下一石柱當門端石斜飛磴道由其側下至洞底交闢爲四岐由東入由南入者二岐俱深黒岐而虚明則一西向豁一北透焉西向豁者即正門所由入内與東岐黒穴對北透者乃偏門另啓正對南岐黒穴岐交於中成十字東岐之南頂側忽倒垂一葉平庋半空外與當門柱適對上下憑虚各數十丈卷舒懸綴薄齊蝉翼葉間復分開竅竇若眼之决眥由東岐南崖扳級上抵葉根垂蒂處盤旋蒂側出葉間踞孔坐其上久之復盤蒂下向北透岐岐中一乳倒垂長數丈水由其端涓涓下更北入峽中右則窪而北出爲下門左復稍髙北度叠成上閣閣前平臨西北亦有乳柱界其中此明洞西北二岐也道人負炬至爇火先入南室兩旁壁峽起髙而不廣入半里側皆裂竅垂柱少進忽下墜成淵由洞抵水深二丈水之深不知其幾也兩崖俱無可著足南眺其内窅黒莫竟促道人涉淵言水深曾無徒涉者促之覓筏則又云隘逼曽無以筏進者然則若何可入曰冬月水涸始可墜崖涉入何如曰内甚深能見明而不能見升也予聞之甚悵捫石投水中淵淵不遽及底旁燭之仰見左壁有旁通隙入則漸東無餘竅乃下返出四達處更入東穴初兩旁亦成峽壁下漸髙中闢如堂皇稍北而東徑遂窮比之南竅雖有穴宛轉深不及其半乃謀爲白沙洞㳺道人復肩炬束火從北透偏門下層出循山西北麓行始見其山前後兩峰駢立而中連峰西南突者即寳圭東北峙者乃白沙所伏白沙亦前後開洞前洞北向髙敞分爲三門兩旁峻懸中可俯級入後洞南向髙隘僅通一線前對寳圭背東即二峰中連脊也先經白沙後洞草沒無徑道人不之入北去一里東北轉遶山北麓南躋前洞入門即窪下數十級及底仰視門左右各有隙髙懸即所謂左右門也逆光流影豐照四徹然虚嵌莫得扳其處從洞中東轉頗崇宏漸窮漸黒予先遍探四面無深入路出促炬命導仍入其中以火四面燭旁無路也𨗳者忽從南壁下投炬蛇伏入竇髙不踰尺廣如之既入忽廓然盤空衆象羅列方瞻接不暇而崇宏四際復旁無餘隙透東轉南倐開倐合凡經四竇皆隘若束管薄僅透屏故極隘忘窘屢經不厭其煩也既而東崖之上大書丹砂二字南有岐入之不深出向西轉再南則天光四射後洞門在望矣𨗳者欲仍從前洞返予強之出後洞見寳圭後峰特爲當門屏乃西南披草棘出坳仍過寳圭北偏門將及菴東探清泉岩即前所經南向岩也還飯菴中下午探近山諸勝西南入黄婆岩黄婆岩者寳圭西南諸峰所裂岩也其山西自望夫石東來岩當其東北隅與寳圭東西對稍南遜岩門外極危聳黄崖綴其中岩頂峰石分岐發異惜内无深入竅西抵望夫山西麓環觀東西南三面鼎立諸峰巒岫無出黄婆一面者按其攅簇之勢疑即志所載巫山寨云已乃循黄婆東麓南抵東南隅石萼懸削片片飛雲綴空自外崖扳峭石上歴𥪡隙屢出層空達峰頂遂盡發其危嵌之態下山轉循南麓峭崕穹立石色雄赭乃東由營房横過勾漏菴過峰東南角蓋寳圭所托之峰南面駢立而中連西立一峰即菴後清泉岩所倚東立者與之比肩南向循峰東麓北行路左得一東向岩内頗深漸縮如牛角出洞又北清流一方淙淙自亂石中出上皆草石䝉茸莫辨其自來忽一少年至曰欲覓洞乎其上翳草中二洞相距數十丈可探入也予急扳棘踐刺覓之深蔓中洞門果穹然東向外爲蔓石擁蔽入洞即隤然下墜俯瞰之有溪自南而北貫其底崖勢峻立非扳縁可下四瞩其上南崖有墜而未盡者片石懸空若棧道架壁濶不盈咫而長竟墜處直達西崖但中棧有二柱駢立若樹栅㫁路外一柱已截去下存尺許可跨而過但其處益狹必以兩手握内柱外柱始得越臨深蹈險莫此爲甚過棧達西崖與洞門正隔溪相向明炬燭之崖之下深墜與外崖等上則垂列乳柱迴錯開闔疎楞窈窕深入猶徹外洞光乃出崖臨溪從深墜處投空下抵溪中仰視洞頂髙穹延照内映側棧凌虚尤増縹緲溪水深不及膝南從崖脚湧出北墜崖去即由此東出爲亂石泉源也從南崖溯流入穴極底垂覆水面距止尺遂衝沫過顙南入數丈望前有流光熠熠又南數丈洞復穹然髙盤轉而東西横貫上則東闢爲外門門髙聳與前所入門等勢時從人亦至乃令其以炬更前西向溯流洞宇宏放流益深濶又數丈石砥中流登石内望洞闢如廣厦淵潭四際其下以杖測水不竟其底不知更幾轉得抵寳圭南穴前所望深墜處也返步隨流仍抵東闢外門下從人將垂首及膝腰横炬匍匐北向低穴出予止之曰此門雖峻與先所入者無異不若扳空躋危竟登此門爲便遂扳崖出洞口門亦東向與所入門比肩特蔽於突石連蔓遂相頋不見洞外循左崖平出返眺門頂又上闢一重惜無躋級蓋北洞奥室内羅此洞外綴層樓所異者此耳遂一以北洞上登法而下崖半石隙蔓影中彷彿并北洞見之迨極下仰眺仍茫然失所睹矣乃自東南山角共一里入勾漏菴初二日録詩寳圭者竟日初三日飯勾漏即東北行由營房轉山之東南角過亂石透泉處徑草坡五里越坡一塘滙水環浸山谷度橋約二里堰塘愈大石峰至此東盡山北隙中露大容蜿蜒爲列屏又東十里水自西北大容來東南入繡江爲容鬱分界曰洛桑渡水頗急以藤横跨西崖上繫船於藤渡者引藤就進謝絶篙楫又東二十五里爲景清新橋則大容東峰巍然北臨若負扆又五里入容縣出城南門門外繡江自西而東西南合渭龍江北出藤渭龍源出天塘山北向石寨村始入繡江渡江南向十里宿古樓村初四日西南循大道盤都嶠而過蓋都嶠北俱削崖懸亘無級可階必繞出其南始可北向以登共五里過石寨村又一里抵石嘴舖舖東南八里有黄土岩不及登東度一橋始從岐北向上山循池東上五里抵南山寺古稱靈景寺大岩倚東崖門西向外欄髙垣中設蓮座雖云寺實岩也蓋都嶠北穹髙頂南分兩腋如垂臂直下下兠合成塢清塘一方當其中兩腋石崖皆重叠廻亘一岩前㫁復開一岩層穴之巔復環層穴外列多門如絳帷紫幄紛披競綴靈景爲東腋首岩最髙而大髙三丈五尺深五丈横濶十餘丈兩端稍低中穹如半月北有三岩皆西向差小三清則當分股兠合處岩之髙深横濶同靈景東有南向二室與西向岩易隅齊列其西有飛岩則南轉東向爲西腋戸迤邐南下與靈景分門對峙若兩廡此下層也三清上又列重門爲中層無縁陟道其上又啓一岩為上層是名寳蓋岩髙十五尺深二丈濶五六丈後倚峰頂地愈髙上獨當中幹平臨兩腋巔再上即中盤頂上午先抵靈景門外竹光旁映岩中霞幄髙張心樂其幽曠僧留午飡聞三清觀道者他出竟止寺中初五日由岩右北行歴西向三岩盤磴上入南向二岩共里半然後抵三清岩岩孤境寂樹拂空明又西歴東向虚岩仍返西向三岩間取道北上又里半沿躡崖末抵寳蓋岩下視中岩嵌入足底而下岩三清樹杪若浮空載之者岩左循崖躋石石迴亘如盤髻上突俱不中空雖峭削無容趾級而子石嵌崖一同白石絶頂可縁之上上一里遂凌頂乃知是山東西駢列惟三峰最髙皆北聳南俯此其最西者也迴睇最東層叠更多但不及此峻絶耳北又横突一峰為此峰北䕶即縣南望之趨者其北面峭削特甚西則旁挿一峰頗尖鋭為此峰附西北兩附間下開一門内環為峽乃北䕶山與西髙峰夾而成者峽中又突嶂中盤爲當門屏由屏東進峽南轉則東西兩髙峰交夾隙也迴谷甚深曲乃從舊道下至靈景岩飯石嘴舖北過石寨村東望峽門窈窕聞其内山半有竹簡岩遂東向峽門入一里抵當門屏下其南面裂垂罅削爲三崖西則下属北䕶峰與之並起東面危崖獨展與西髙峰麓相對成峽峽南堰水爲塘環滙南罅三崖下西踰小峰即椎立於南塘上一家結茅居之環户以竹致甚幽由北渡峽東上西峰北麓一里越嶺少下下又成峽細流南向直墜椎立小峰腋溯流北入澗壁萋森藤竹映其上菖蒲覆石嵌水根葉交加足之所扳知菖蒲不知爲石也縁澗上東南陟嶺共一里飛石二丈當道懸梯入則竹簡岩在其北兩岩並列門俱西北向軒然髙爽南有飛泉外墜岩下崖直達澗底計岩後即西髙峰絶頂當與三清岩胸背值若由此置磴可先登峰頂次第下諸岩也返至環塘西探南面裂罅罅兩相距五尺兩罅並起界崖爲三俱危懸絶峭仍東抵危崖獨展處循崖北行夾澗藤樹宻冐深緑空濛徑西飛崖千尺矗影撐空隔絶天地若不有此行止謂都嶠南北峭秀可一覽罄幾失此幽邃凡二里危崖北窮與塢西轉即當門屏北麓也較南麓三裂崖稍遜其峻亦環亘成城路乃捨塢東向復登嶺嶺乃西髙東北支北走属北䕶峰者踰嶺復開南北塢塢東乃中髙盤亘上亦有岩懸綴下與西髙夾爲此塢北更有重崖間之南則灣環以出不知所極既而南見兩三家倚西峰北麓居則石背村也時日已下逼抵縣尚二十里亟返出石寨村北過古樓村昏黒中抵繡江南涯叩昨來炊飯家宿焉初六日出容縣北門即西行已復北轉循大容東麓十里水自西北來東入繡江三渡溪循溪溯流行夾谷間五里爲石頭舖復亂流涉水山勢愈夾西折入三峽行透峽共五里山復開爲李村渡一橋更入幽阻盤折山峽間藤箐沈翳壑底溪流汩汩舉目不見天日五里躋嶺復盤折其上峽又五里山迴谷轉瀦水滿腹浸山下皆平隘不流左右滉漾真山棲佳勝處南出峽水遂西流爲水源蓋大容北下脈所盤夾而成者西北二里至同山墟山乃大開西轉仍見大容西峰穎出又五里止雞黍山北塢秦窑村地多大竹裂竹片大至尺許初七日西北七里踰長嶺始北望白石山在重峰外又八里爲平墟西羅江自南東北注源出大容西北至此始勝舟東兩日程出頭家寨下繡江云又十五里抵羅秀北三里將至盧塘道旁空樹一圓出地一尺五寸圍大五尺中貯水一泓水面上不盈圍者五六寸下浮出平地幾及尺澄碧流瑩杖抵之深不可測珠泡沸沸上發屢斟出之輒齊舊痕不與地平尤爲可異又二十里渡大水河抵陳村初八日西北八里上一嶺正西瞻獨秀下山二里爲陳冲已出獨秀東北正予昔登白石頂東望深塢中聚落也又三十五里至陳方墟宿初九日西十里渡鬱江返潯郡寓中兩病人比栁州時少有起色横州船以明晨早發遂攜嚢下舟候初十日未明發舟曉霞映紅從篷底窺之如行紫絲步障中三十里望白石山稜稜峙東南甚迫西北三十里泊鎮門十一日二十里為白沙又五里登涯向羅叢岩東北里許北望數峰叢平疇中南一小峰如立指中三四峰東西駢立再北一石峰稍低而横亘即羅叢所倚也由小徑四里透小石峰峽又三里北抵羅叢岩門南向索炬同𨗳者入洞頂髙處盤窩成蓋又倒石捲空上垂但無登處北入五六丈遂分東西内外洞西外洞亦南向擴然透明五六丈由西竇北入則西内洞矣其内時夾時開時髙盤時垂下覆頂平若幙裂隙成紋至石形之異有叠蓮綴空挺笋特立者隨處布置不專以乳柱見竒也計里許北過一隘西轉有峽北透天光時數炬更盡不復能由内返北躋後洞出穴北向僅可匍匐出洞已下北麓循麓東行過東北麓𨗳者指其上列竇曰此東洞後穴也予即欲從之入𨗳者曰無炬須仍由前洞攜炬出從之環其東麓麓東一峰髙踰此山竅穴離披𨗳者謂都無深入竇然其北有石一枝離立起不由此不得覩也復入東前洞縛炬南㳺乳石竒變與西内洞等而深止得半不若西屢轉愈擴也東崖上穴駢迸亟躋上則有門三穴聨翩北向而下無階級𨗳者謂從其内西向躋暗夾中有道可出然愈上愈隘不若仍出前洞也飯後𨗳者復肩炬爲水洞龍洞㳺水洞在山西南隅門亦南向中寛數畝潭水四際深不測其外淺處紫碧浮映日光所爍也洞左右俱有重崖迴環潭上可循行以入各抵崖北兩路旁絶上無岐穴不識水洞何所止出洞循西麓北轉東得龍洞洞在山西北西後洞西門亦北向中有水夾其上片石東西交成天生橋五丈以内又度一梁篝火入西穿石柱夾漸大南入可半里路窮下黒乃多燃炬照耀之亦有深潭一泓瀦水莫測其大更逾水洞投石沈沈亦止而不流也已而熄炬消熖南望隔潭深處杳杳光浮水面𨗳者神以爲光怪使然予謂穴影旁達𨗳者曰昔村人結筏窮之至其處輒不得穴安所得倒影予曰此地深伏雖去洞頂甚遥然由門南出計去水洞不逺或水洞之光由水中深映浮筏者但從上瞩不及晤光從水出耳若繫靈怪豈有自古不一息者哉乃復明炬出洞别𨗳者西南十里抵安禄營爲潯貴兩道蓋羅叢岩西北有崇山横亘其東北自潯之西山直西南接貴縣北山二山兩角髙張東西相距幾百四十里中間峯巒横叠翠環雲繞頗似大容大容爲鬱江南條山界繡鬱兩江間此山爲鬱江北條山亦界黔鬱兩江間貴縣之倚北山猶鬱林之於大容兩嶺潯州之倚西山猶容縣之於大容東峰皆西突聳兩角中則連亘焉苐大容東西八十里較近中有北流縣界其間兹山較逺而别無縣治惟安禄營爲中界耳十二日自安禄西南二十六里直抵石山下爲平碣營營東石峰峭立曰大岩山岩甚巨中容數千人南又突一小山上有平架石若横橋其下透明出小山西爲馬鞍山亦峭聳起皆平碣近峰也南望鋭峰若筆架若卓椎者在數里外望之趨三里度石橋又南十二里直抵衆遥峰西麓曰劈竹舖眺路左諸峰分岐競爽即貴縣東山也又西南十八里抵貴縣南門則大江在下靜聞與頋僕所附舟先泊南門久下船迫暮放舟乗月西行十五里而泊十三日行十里西抵西山南東南轉十里爲宋村由貴縣南至南山十里南山至宋村亦十里舟行屈曲水路倍之予先擬一至貴縣即往宿南山詰明從南山間道候舟詢之舟人既不得地名且云舟將連夜發遂不得行及發不過十餘里即泊今上午過宋村悔不從初所擬至此登舟也又四十五里夾江兩山起溯之入又乗月十五里泊香江驛十四日過烏司堡已十里爲横州界十五日掛帆三十五里抵横州南門猶上午也是日爲中秋節以行李及兩病人入南寧舟予獨入城傍江而東三里抵下渡渡南岸爲寳華山道道甚大共十里過䝉氏山庄又一里東向入山二里抵山下披叢入之寺尚在山半渡澗拾級又半里得寳華寺門西向寺旁無他勝問所謂山後瀑布僧謂墜自後嶺髙百丈峽爲叢木所翳行絶蹊徑望之無所睹惟從嶺而上可聞其聲耳予乃曳杖上嶺自巔至峽皆紛植蔽虧予直山頂風瀑怒聲不止瀑果不可見嶺南下五十里即靈山縣矣乃返寺宿十六日自寳華山下十里望東北鳳凰諸石峰在三十里外路逺不及徃遂西抵州由上渡渡江入南寧舟十七日舟西南行四十里抵陳步江内通小舟欽州塩俱從此出是日靜聞病轉劇十八日舟至是多西北行旁皆土山繚繞盖自入鬱江惟鳳凰山石崖駢立瞰江餘皆土阜耳又三十五里泊江西岸十九日平明行五里過火烟驛爲永淳縣界於是舟北轉歴十二磯磯在江右涯盤石横突江畔又四十里抵永淳南門二十日北繞永淳東旋西繞其北江㡬環城四隅矣於是始西北行共四十里過伶俐水五里泊二十一日西南五十里八尺江自西来入江發源自欽州通舟可抵上思州遂西泊黄花驛驛去南寧府尚五十里以下八月二十二日至九月二十日凡游南寧者皆脱去徐霞客遊記卷三下

body:
  text: 徐霞客遊記卷五上明徐宏祖撰西南遊日記七貴州戊寅年三月二十七日自南丹北鄙􅴂歹村易騎入重山中漸履無人之境五里踰山界嶺南丹下司界又北一里踰石隘是為艱坪嶺其石極嵯峨其樹極䝉密其路極﨑嶇黔粵之界以此而分南北之水亦由此而别然其水亦俱下都泥則石隘之脊乃自東而西度盡於巴鵝之境而多靈大脊猶在其東也北下一里就峽西行一里始有田塍又半里峽轉北塢始大開又北一里有村在西塢中曰由夷此中諸塢四靣皆高不知水從何出然由夷村南石壁下有洞東向細流自畦中淙淙入透山西而去固知大脊猶在東也至此南丹差騎辭去由夷人始許夫騎久乃不至促久之止以二夫負擔去余獨坐其欄從午至暮始得騎西北二里至山寨則寨人已送擔亦前去乃由其東上嶺越脊北下一里行壑中又北一里再越嶺脊下行峽中壑圓而峽長南北向皆有脊中亘無泄水之隙而北亘之脊石齒如鋸橫鋒竪鍔莫可投足時已昏黑躍馬而下此騎堪托死生也越脊直墜峽底踰所上數倍始知前之圓壑長峽猶在半山也峽底有流從南脊下溢遂滔滔成流隨之西向行共里許有村在南山麓擔夫已換去又騎而西半里擔夫又已去蓋村人恐余止其家故亟換之行而又無騎換騎夫不肯前豫强之暗行西北半里有溪自東而西橫堰其中左右淵深由堰上北度馬蹄得得險甚又西轉過一村半里由村西而北向踰嶺始與雙擔同行暗中呼聲相屬不辨其為石為影也共二上二下遂行田塍間共五里過一寨排門入居人頗盛半里復排一門出又行田塍中一里半叩門入舊司門以內茅舍俱閉莫為啓久之守一啓户者無茅無飯而臥上下二司者即豐寧司也瀕南界者分為下司與南丹接壤二司皆楊姓兄弟也而不相睦今上司為楊柚强而有制道路開治盜賊屏息下司為楊國賢地亂不能轄民皆摽掠三里之內靡非賊窟其東有七榜之地地寬而渥鴛鷔尤甚其叔楊雲道聚衆其中為亂首人莫敢入舊司者下司昔日司治也為上司所破國賢移居寨上按豐寧二司皆貴州都勻府屬其兄弟相賊而莫問豈羈縻之道固應然耶寨在南山之麓與舊司南北相對中隔一塢然亦無竒險也二十八日平明起雨霏霏下余令隨夫以鹽易米而炊余以刺索夫于南寨國賢避不出托言與上司不合不敢發夫止許護送者兩三人送出境余飯而待之送者亦不至乃雇夫分肩行李從舊司北向踰嶺共三里餘下至餓鬼橋有小水自東北注西南小石梁跨其上禦人者每每橫行于此又北二里踰嶺已為上司界下嶺二里有村在西塢而路東有楓木樹對之又東北踰嶺二里有村在東塢其前環山為壑中窪為田村倚東峯有石崖當村後路循西嶺與村隔壟相向始敢對之息肩又西北踰嶺二里轉而西南于是峽大開南北相向南山下村居甚稠北山則大路倚之西行五里路復西北踰嶺蓋此地大山在東北路俱緣其西南上雖有升降然俱上多下少逶迤以升者也又西北二里踰嶺路北有峰回亘層叠儼若天盤龍髻崖半有洞門西向數十家倚之路乃北轉又一里越其西岡北向下西岡者大山分支西突為盤髻峰其下橫岡西度者也西岡之北山又東西排闥北望西山一圓高插峰頭矗然倚天之柱其北石崖回㳫即上司治所托也東界土山即路所循而行者共北五里路與西界矗柱對又北二里忽山雨大至擔夫停擔各牽笠蔽雨余持傘亦蔽一挑忽有四人持鏢負弩懸劍櫜矢自後奔突而至兩人趨余傘下一人趨顧僕傘下一人趨一夫笠下皆勇壯凶獰似避雨又似夾持余甚恐問余何往余對以都勻問余求烟余對以不用久之雨不止而勢少殺余曰可行矣其人亦曰可去余以為將同往而前者及豫行而彼復止余益知其必非良人然入其吻而不下咽其心猶良也更北半里轉而西又一里餘有營當兩界夾中阜上壁壘新整由其下又西一里入上司南門有土垣環繞門內即宿鋪江西人自下司至此居舍中各半土半欄時雨過街濕余乘濕履遂由街北轉而西有巨塘滙其內西築堤為堰鶖為馳道甚整又北半里直抵囤山東麓北向入一門有石隙一縷在東麓下當其盡處鑿孔如盂深尺許可貯水一斗囤上下人俱以盎候而杓之蓋其水甘冽逈異他水余杓而嘗之果不虛也由此循囤麓轉入北峽峽中居人甚多皆頭目之為心膂寄者又編竹架囤于峽中由北峽西向行已入囤後有脊自西北連屬於囤乃囤之結蒂處也脊東峽中有洞倚囤麓其門北向甚隘而深有二人將上囤余問此洞深否云其洞不深上至囤半有大洞頗深而有水須以炬入由下仰眺囤上居舍纍纍惟司官所居三四層皆以瓦覆以堊飾囤險而居整反出南丹上也余乃隨其人拾級上囤其級甚峻而甃鑿開整竭蹶而上共半里折而東有樓三楹跨路間乃囤半之隘關也洞在中之後前為樓所蔽不可見有男婦各一炊中楹下二人指余入遂登囤去余索炬於炊者則楹後即豬欄馬棧踐之下洞洞門北向窪墜而下先是令一夫隨行至脊下不敢登豫乃獨上然囤上之形可以外瞭而見惟此洞為樓掩非身至不知也仍由舊路里餘返宿舍則已薄暮矣炊飯亦熟遂餐而臥二十九日由上司出南門仍渡門東小水􅘦之東北行一里躡土山而上四里踰土山西度之脊其西石峰突兀至此北盡踰脊西北行一里半嶺頭石脊復夾成隘門兩旁石骨嶙峋由隘西出轉而東北下半里下抵塢中又北一里復越土山西下脊是為上司獨山州界于是下嶺循東山行又二里有村在西山塢中為苴查村其處東西兩界皆土山中開大塢有水自北來界於塢中繞苴查之東乃西向破峽去循東界山溯水北向行又三里水分二支來一自西北一自東北如了字㑹於中枝山盡處西北者較大路溯東北行一里半始渡之于是中支山東麓得罈子窰村乃土官䝉氏之族也村北溪中在碎石時涸時溢又東渡之東北上岡頭共里許有土環遺址名曰關上而無居舍又東北一里水盡塢窮于是躡嶺其嶺甚峻三里北踰其脊隘中砥石如鋪兩旁有屼立峰是名雞公關其脉自獨山州西北繞州治東南過此又東南度六寨之東而下蠻王峰者也脊西南水下苴查而入都泥脊東北水由合江州下荔波而入龍江從脊東北眺則崇山蜿蜒列屏于前與此山遙對成兩界中夾大塢自西北向東南下山即轉北行一里抵塢轉東即有小水東南下又東一里踰陟岡阜忽有溪自西北注東南水于此復出為龍江上流矣渡溪東上于是升陟坡壠東北行塢中五里有數家之村在東北山下從其前復轉入西峽北一里過一脊始北向下嶺其下甚深半里抵其麓始知前所行俱在山上也又北行塢中一里半有大溪汪然自西峽層山中出東注而去亦由合江州而下荔波思恩者歷石壑而渡其北又緣西界支隴共里為羊角寨乃䝉氏之寨也在西山麓又北三里有小水自西坡東注涉之又北二里入獨山州之南隘門其州無城一土知州一明知州土官䝉姓所屬皆土人即苗仲明官多缺以經歷署篆所屬皆客户豫所主者江西南昌人黃南溪也其人忠厚長者家有樓可棲蓋是州雖無城而夾街樓房連屬俱有瓦蓋無復茅欄牛圈之陋矣三十日平明飯出獨山州北隘門西北向循西界山行六里有小水亦自西坡東注涉之北又二里北塢漸窮山脊自東界西度南轉乃路轉東北澗中小水北流渡澗循東界山峽間東北上又二里有水溢路旁石穴間甚冽其側有䝉氏修路碑從此扳石磴東北上嶺雨大至一里半北登嶺隘是嶺由東南度西北乃祖山從其東北分裂衆枝其直東而去者為黎平平崖之脊東南分支而下者為黎波羅城之𣲖西北分支而下者度此稍北即西轉南走而環于獨山之西度雞公嶺而南為蠻王多靈之𣲖獨山州南二十里有山尖起立于衆山之中是名獨山州之所以得名也又東北行山峽間乃下共二里有澗自東谷走深崖中兩崖石壁甚逼澗嵌其間甚深架石梁其上為深河橋過橋復躋崖而上登嶺而北有小水自東北㵼石崖而下涉之復升嶺共一里遂由峽中北行又二里乃下東北行下壑中有村在東山下由其前少轉西北共二里有溪自東北來渡之溯其西岸東北踰嶺二里一水自東北來一水自西北來東北者較大於西北于是涉西北水緣中支山而上東北三里而登其岡飯于岡上乃稍下又北踰嶺而下夾塢中共三里又上有溪自南峽北向下墜深潭中潭小而高此西北小溪之源也又北踰嶺一里半下渡深壑中有澗自西南峽中來至此南向西轉此東北小溪之源也涉之西南登嶺半里而上循嶺半西南行二里過兔場西出嘉坑關隨小水西下由夾中行五里兩夾山多石崖突兀路側有泉湧穴出又西二里水墜南峽去路踰北坳上有寨在東岡之巔由其西北度脊南北俱有窪中墜環塍為田直抵其底水皆自底西向透石穴者也又西踰嶺一里出隘口其上石骨稜峭皆作噓雲裂蕚之勢又西北下峽中一里轉而西半里西出峽是為獨山州與胡家司分界胡家司即都勻長官司于是山開南北洋中有大溪自北而南是為橫梁循溪東轉南半里抵南崖崖下有賣粉為餉者以鹽少許易而餐之隨溪南岸西行道路開整不復以蜀道為苦溪北有崇廟在高樹間人家田隴屢屢從斷岸而出共六里過塢裏村又西一里其水南曲乃西渡之從溪西岸南行半里為卭母村由村前西轉塢復東西開而其村重綴岡阜瓦舍高聳想亦胡家司之族目也西二里其水北曲復西渡之又西北一里其水西曲又北渡之從北岸懸崖西行一里半有水自西來㑹乃麥冲河也即溯河西行二里入麥冲堡南隘門而宿是晚雷雨大作徹夜不止四月初一日平明起雨漸止飯間聞其西有桃源洞相去五里須秉炬深入中多幡蓋纓絡之物覓主人𨗳之不得曰第往關上可西往也遂北向出隘門溯溪東岸行忽石壁湧起岸東勢極危削溪潄之南路溯之北咫尺間人倚穹崖下循迅𣲖神骨俱悚三里轉入東塢其北有小峰立路隅當麥冲河南下之衝有岩北向曰觀音洞又北半里曰麥冲關問所謂桃源洞者正在其直西大峯之半相望不出四里外關之東有真武閣南向正與觀音洞門對乃停行李於閣中覓火炬于僧將往探之途遇一老者曰此洞相去不逺但溪水方漲湍急不可渡雖有𨗳者不能為力而况漫試乎余乃廢然而返取行李西南越而下抵河東岸溯之北共一里溪自西北山腋來路從東北山腋上遂與麥冲河别當坡路潦跡間有泉泛泛從下溢起孔大如指以指探之皆沙土隨指而溷指去而復溢成孔乃氣機所動而水隨之非有定穴也一里轉上後峽遂向東入又一里峽更東去路復從北峽上其處石峰嶙峋度脊甚隘越隘北下塢中被壠盈塢小麥青青喬麥熟粉花翠浪從此遂不作粵西蕪態粵西獨不藝麥脊東西亂水交流猶俱下麥冲者又東一里轉而北有塢南北開洋其底甚平犂而為田此處已用牛耕不若六寨以南之用概橇矣波耕水耨盈盈其間水皆從崖坡㵼下而不見有澮濬之跡二里有村頗盛倚西峰下曰普林堡又北一里踰嶺而上石峰復度峽而下轉而東平行石嶺間一里東下盤窩中有小石峯圓如阜盤托而出路從之徑窩東入峽一里復北向嶺一里遂踰土脊之上此脊當為老龍之幹西自大小平伐來東過谷䝉包陽之間又東過此東南抵獨山州北又東為黎平平崖之脊而東抵興安南轉分水龍王廟者也越脊北下峽壁甚隘一里下行峽中有水透西南峽來入北隨峽去渡之傍澗西涯行有岐路溯水西南峽則包陽道通平浪平州六洞者也隨水東北行峽中又三里轉而東其峽漸開有村在南山間曰下石堡又北二里過一巨石橋澗從橋下西北墜深峽中而去路别之東北踰嶺升降二重又二里越嶺下則東南山塢大開大溪自西北破峽出湯湯東去是曰大馬尾河以暴漲難渡由溪南循山崖東行溪流直搗崖足一里東抵堡前觀諸渡者水湧平胸不勝望洋之恐坐久之乃解衣泅水而渡從北岸東向行水從東南峽去别之乃東北踰嶺而下共三里東渡小馬尾河復東北升嶺一里半越嶺脊東下一里半出山峽山乃大開成南北塢東西兩界列山環之大河湯湯流其間自北而南溯溪西岸循西界山北行一里路傍即有水自西峽南向入溪涉之又北二里有石梁跨一西來溪上度之從梁端循峽西入是為胡家司即都勻長官司也以名同本郡故别以姓稱又北一里有村在西山崖上曰黃家司乃其副也又北行田塍間五里度西橋又北半里入小西門是為都勻郡城宿逆旅主人家為沈姓亦江西人初二日晨起作書投都勻四尊張勉行四川人乃散步東入郡堂堂乃西向蟒山者又東上東山麓謁聖廟見有讀書廡東者問南臯鄒總憲戍都時遺跡曰有書院在東門外內問郡志其友歸取以示甚略而不詳即大小馬尾之水不書其發源并不書其所注其他可知載郡八景俱八寸三分帽子非此地確然特出之竒也此地西門大溪上有新架石梁壘石為九門甚整橫跨洪流乃不取此何耶都勻郡城東倚東山西瞰大溪有高岡自東山西盤而下臨溪塹溪自北來西轉而環其東城圓亘岡上南北各一門西有大小二門東門偏于山之南城後環東山之巔其上有樓可以舒眺郡西對蟒山為一郡最高之案郡治文廟俱向之其南峯旁聳有梵宇在其上須拾級五里而上以飯後雨作不及登謂之蟒者以峯頭有石脊蜿蜒如巨蛇今志改為龍山九龍洞在城東十里按一統志有都勻洞在都勻長官司東十里前門北向後門南向當即此洞今志稱為仙人洞二下注云一在城東一在城西殊覺憒憒水府廟在城北夢遇山大溪南下橫其前一小溪西自蟒山北直東來注下有白衣閣倚崖懸危壁上憑臨不測上有梵音洞西向為門洞無他致止云其中石佛自土中出者為異耳初三日下午自都勻起程二十里至文德宿初四日三十里麻哈州又十里乾溪宿初五日麻哈大堡又十里乾埧哨又十五里平越衛初六日歇平越初七日宿店初八日雇貴州夫行至崖頭宿初九日新添飯至楊寶宿初十日龍里宿十一日二十里至鼓角三十里至貴州十二日止貴州遊古佛寺十三日止貴州寓吳慎所家十四日晨飯于吳遂出司南門度西溪橋西南向行五里有溪自西谷來東注入南大溪有石梁跨其上曰太子橋此橋謂建文君得名然何以太子之也橋下水湧流兩崖石間衝突甚急南來大溪所不及也渡橋溯南來大溪又西南三里有一山南橫如列屛于前大溪由其東腋北出路從其西腋南進又南行峽間二里歷東山之嘴曰􅴂堰塘其西南有兩峰駢起其東即屏列山之側也又三里過雙駢東麓而出其南漸聞溪聲遙沸東望屏列之山南迸成峽溪形復自南來搗峽去即出其東北腋之上流矣第路循西界山椒溪沿東界峰麓溯行而猶未覿靣耳又南二里始見東溪汪然有村在東峰之下曰水邊寨又南三里曰大水溝有一二家在路側前有樹可憩焉又南漸升土阜遂東與大溪隔已從嶺上平行五里北望雙駢又三分成筆架形矣南行土山峽中又一里出峽循折而東則大溪自西南峽中來至此東轉抵東峯下乃折而北去有九鞏巨石梁南北架溪上是為華犵狫橋乃飯于橋南鋪肆中遂南向循東峯之西而行皆從土坡升陟路坦而寬九里見路出中岡路東水既東北墜峽下路西水復西北注坑去心異之稍上岡頭則路東密箐回環有一家當其中其門西臨大道有三四人憩石畔因倚杖同憩則此岡已為南北分水之脊矣蓋東西兩界俱層峰排闥而此岡中橫其間為過脉不峻而坦其南即水南下矣是云獨木嶺或曰頭目嶺昔金筑司在西界尖峰下而此為頭目所守處從嶺南下依東界石山行五里復升土嶺漸轉東南嶺頭有一窪中墜從其東又南向而上共二里乃下一里則有溪自西北峽中出至此東轉有石梁跨之是為青崖橋水從橋下東抵東界山乃東南注壑去經定番州而南下泗城界入都泥江者也于是又出嶺南矣度橋而南半里入青崖城之北門其城新建舊紆而東今折其東隅而西就尖峯之上城中頗有瓦樓闤闠焉是日晴霽竟日夜月復皎青崖屯屬貴州前衛而地則廣順州所轄北去省五十里南去定番州三十五里東北去龍里六十里西南去廣順州五十里有溪自西北老龍脊發源環城北東流南轉是貴省南鄙要害今添設總兵駐扎其內十五日昧爽出青崖南門由岐西向入山峽南遵大路為定番州道五里折而南又西南歷坡阜共五里有村在路北山下曰蓊樓木樹䝉密小水南流從西入山峽西山密樹深箐與貴陽四靣童山逈異自入貴省山皆童然無木而貴陽尤甚西北入峽三里遂西上陟嶺一里踰嶺西下半里有泉出路旁土中其冷徹骨南下㵼壑去又西下半里有澗自此峽來橫木橋于上其水南流去路西度之復北上嶺一里踰脊西有泉淙淙隨現隨伏西北行兩山夾中夾底平窪犁而為田而中不見水又西北半里抵西脊脊東復有泉淙淙亦隨現隨隱蓋此中南北兩界俱穹峰而東西各亘橫脊脊中水皆中墜不見窪底故窪底反燥而不瀦越西脊而下西北二里路北有懸泉一縷自山脊界石而下路南忽有泉聲淙淙成澗想透穴而出者半里轉而西行又半里得一村在北山下曰馬鈴寨路由寨前西向行忽見路南澗已成大溪隨之西半里又有大溪自西峽來二溪相遇遂合而東南注壑去此水經定番州與青崖之水合而下都泥者也于是溯西來大溪之北岸又西向行二里為水車壩壩北有土司盧姓者倚廬北峰下壩南有場在阜間川人結茅場側為居停焉壩乃自然石灘橫截澗水飛突其上而上流又有巨木橋架溪南北其溪乃自西廣順來廣順即金筑安撫司乃萬厯二十五年改為州添設流官由溪北岸溯流入為廣順州道由溪東岸踰嶺上為白雲山道隨溪東南下為定番州道乃飯於川人旅肆送火錢辭不受遂西南一里踰嶺又行嶺夾中一里半乃循山南轉半里又東轉入峽半里峽窮乃東南扳隘上其隘蘿木䝉密石骨逼仄半里踰其上又東南下截壑而過半里復東南上其嶺峻石密叢更甚半里又踰嶺南下隨塢南行一里是為八壘其中東西皆山南北成壑亦有溪坎墜成眢井而南北皆高水不旁泄者也直抵壑南則有峰橫截壑口西駢隘如閾東聨脊成嶺乃東向陟嶺上一里踰其脊是為永豐莊北嶺即白雲山西南度脊也乃南向下山又成東西塢有村在南山下與北嶺對是為永豐莊從塢中東向行二里得石磴北崖上遂北向而登半里轉而西半里又折而北皆密樹深叢石級迤邐有巨杉二株夾立磴旁大合三人抱西一株為火傷其頂乃建文君所手植也再折而西半里為白雲寺則建文君所開山也前後架閣兩重有泉一坎在後閣前楹下是為跪杓泉下北通閣下石竅不盈不涸取者必伏而杓故曰跪云神龍所供建文君者中通龍潭時有雙金鯉出沒云由閣西再北上半里為流米洞洞懸山頂危崖間其門南向深僅丈餘後有石龕可傍為榻其右有小穴云為米所從出流以供帝者而今無矣左有峽高迸而上透明忩中架橫板猶云建文帝所遺者皆神其跡者所托也洞前憑臨諸峰翠浪千層環擁回伏逺近皆出足下洞左搆閣祀建文帝遺像閣名潛龍勝跡像昔在佛閣今移置此乃巡方使胡平所建前瞰遙山右翼米洞而不掩洞門其後即山之絶頂逾而北開坪甚厰皆層篁聳木虧蔽日月列徑分區結靜廬數處而南京井當其中石脊平伏嶺頭中裂一隙南北橫不及三尺東西濶約五尺深尺許南北通竅不可測停水其間清冽異常而不减不溢靜室僧置瓢杓之豫初至見有巨魚戲水靣見人掉入竅去波湧紋激半晌乃定穴小魚大水停峯頂亦一異也以其側有南京僧結廬住靜故以南京名今易老僧乃北京者而泉名猶仍其舊也是日下午抵白雲菴主僧自然供餐後即𨗳余登潛龍閣憩流米洞命閣中僧𨗳余北踰脊觀南京井北京老僧迎客坐廬前萟地種蔬有蓬蒿菜黃花滿畦鶯粟花殷紅千葉簇朵甚巨而密豐艷不减丹藥也四望喬木環翳如在深壑不知在衆山之頂幽曠交擅亦山中一勝絶處也對談久之薄暮乃返自然已候于菴西復具餐啜茗移坐菴後石壁下是日自晨至暮清朗映徹無片翳之滓至晚隂雨四合不能于羣玉峯頭逄瑶池夜月為之悵然十六日夜聞風雨聲抵曉則風霏霏豫為之遲起飯後坐小忩待霽欲往探龍潭零雨不休再飯乃行仍從潛龍閣踰嶺至南京井從岐東北入深箐中聳木重崖上下窈渺穿㠋透壁非復人世共五里則西崖自峯頂下嵌深墜成峽中窪停水淵然深碧陷石腳而入不盈不涸真萬古潛淵千峯閟壑也其峽南北約五丈東西約丈五東崖低陷空下者約三丈西崖聳陷空下者十數丈水中深不可測而南透穴彌深蓋穿山透腹一峯中涵直西南透為南京井東南透為跪杓泉者也崖上喬幹密枝漫空籠罩又東北扳崖東南度壑皆窈渺之極壑東有遺茅一龕度木橋而入為兩年前匡廬僧住靜處今茅空人去將度木披之而山雨大作循舊徑返深藹問落翠紛紛衣履沾透再過南京井入北僧龕僧鑰扉往白雲惟雨中鶯粟脉脉對人空山嬌艷宛然桃花洞口逄也還踰潛龍閣自然已來候閣旁遂下菴瀹茗炙衣晚飱後雨少霽復令從𨗳由菴東登嶺角循之而北一里出其東隅近山皆伏其下遙山則青崖以來自龍里南下之支也稍北下深木中度石隙而上得一靜室其室三楹東向寥廓室前就石為臺綴以野花室中編竹繚户明潔可愛其處高懸萬木之上下瞰箐篁叢叠如韭畦㳫㳫隔以懸崖間以坑塹可望而不可陟故取道必迂從白雲蓋與潛龍閣後北坪諸靜室取道皆然更無他登之捷徑也此室曠而不雜幽而不閟呼吸通帝座寤寐絶人寰洵栖真之勝處也靜主號啓本滇人與一徒同栖而北坪則獨一老僧也白雲之後共十靜廬因安氏亂各出山去惟此兩廬有栖者十二廬旁各有坎泉供勺因知此山之頂皆中空醖水停而不流又一竒也晚白雲暮雨復至自然供茗爐旁篝燈夜話半晌乃臥十七日晨起已霽而寒悄頗甚先是重夾猶寒余以為隂風所致有日當解至是則日色皎然而寒氣如故始知此中夏不廢爐良有以也白雲山初名螺擁山以建文君望白雲而登為開山之祖遂以白雲名之一統志有螺擁之名謂山形如螺擁而不載建文遺跡時猶諱言之也土人訛其名為羅勇今山下有羅勇寨土人居羅勇而不知其為螺擁土人知白雲山而不知即螺擁山夷地無徴滄桑轉盼如此白雲山西為永豐北嶺即余來所踰嶺也東則自滇僧靜室而下即東隤頽然下對青崖皆為絶壑前則與南山夾而成塢即余東北來登級處也後則從山頂窮極窈渺北抵龍潭下為後塢即余來時所經嶺南之八壘者也此其近址也其逺者東抵青崖四十五里西抵廣順三十里東南由蓊貴抵定番州三十里北抵水車壩十五里白雲山中有元色白色諸猿每六六成行輪朝寺下據僧言如此余早晚止聞其聲又有菌甚美大者出龍潭後深箐仆木間玉質花腴朵徑尺即天花菜也又有小者名八擔紫土人呼為茅棗雲南甚多自青崖而西有司如之流其西又有馬鈴寨東溪其西又有水車壩西溪皆南流合于定番而皆自石洞中湧出至白雲南又有蓊貴鑼鼓洞水及撒崖水皆為白雲山腹下流皆合于定番州其南又有水埠龍在白雲南三十里有仙人洞其北五里又有金銀洞白牛崖其上流亦自洞湧出而南注于都泥江則此間水無非洞出者矣東南山脊蜿蜒自龍里西南分支南下回繞如屏直抵泗城界此即障都泥而南趨者其山回環而東中圍丹平平州諸司即麥冲橫梁諸水南透六洞而下都泥以此支環之也老龍之脊自廣順北東序上寨嶺東過頭目嶺又東北過龍里之南又東過貴定縣西南又東過新添衛之桫木寨乃東南轉環蟒山之南東過為普林北嶺又東抵獨山州北乃東趨黎平南境而東度沙泥北嶺以抵興安分水貴州東三里為油鑿關其水西流西十里為聖泉北嶺其水東流北十五里為老鴉關其水南流為山宅溪南三十里為華犵狫橋其水北流四靣之水南最大而西次之北穿城中又次之東為最微俱合于城南薛家洞東經襄陽橋東北抵望風臺從其東又稍北入老黃山東峽乃東搗重峽而去當與水橋諸水同下烏江者也十八日辭自然師下山一里半抵山麓西一里半有數家在南麓為永豐莊皆白雲寺中佃户也由其前西向尖峰峽中去是為廣順州道由其前西去南轉是為定番州道由其前北向踰嶺是為土地關道先是自然為余䇿所從曰由廣順安順西出普定其道近而兩順之間廣順知州柏兆福欲歸臨清安順土知州近為總府禁獄中苖蠻伏莽可慮不若西北由東基出平壩抵普安多行四十里而地僻苖馴可免意外余思由兩順亦須三日行走平壩路迂而行多亦三日可達普安遂不西行而北踰嶺其嶺即白雲山之西陲也共一里越其北有塢東北向東南界即白北龍潭之後西北界即南嶺所環轉北而東屬于龍潭東峰之下者其中平塢一壑南北長二里水亦中窪下墜兩旁多犂為田是名八壘北竟塢中乃北踰石嶺共半里下北渡獨木橋有塢自東北向西南是為乾溝橫度之北上半里是為土地關下關半里鑿石坎停細流一盂曰一碗水行者以口就而啜之又西向一里半出峽由其北循山東北轉為水車壩道由其西截塢直行一里半有村在北山下是為谷精從村西轉又截塢而下一里轉入山峽有溪自南而北即從北峽轉而東去是水車壩之上流也其流自廣順州東北老龍南谷來者渡之又西越山坡旋下泝西來小流入其流東注南來大溪即同之直向南去路溯溪南山峽逼仄時扳石上下二里餘乃西渡此水從其北西向又半里其北削崖高穹有洞上綴其門南向遂從其下西踰坳坳間石骨稜厲逼屬南山回視前溪在其下不知從何而出即水車壩水亦流自穴中者不知即指此水抑謂南來大溪也踰坳西稍下約一里有路交為十字其南北皆從山嶺上下有石磴逶迤乃廣順違貴省道也其東西即踰坳而西下峽中者從峽西下半里又聞水聲潺潺有水深自坑底東注坳下信乎即坳東透穴之水矣溯之山塢復開有村在西山下是為東基下寨從其前轉而東北則下寨山之北突也循之一里又西北轉則西界山純削為石而東界則土脊迤邐又北二里有村當北岡之上是為東基上寨寨中懸小支盡處皆瓦房非他苖寨所及由寨西北向半里有泉飛流注腋由寨東而出寨當其中小支左右皆崇岡峻峽寨後復環一塢良疇層倚焉皆此泉之所潤而透于東坳之下者也蜿蜒上躋者一里從嶺上復北踰頂者半里下至塢中望北峯夾立甚高其下有塢自西北來者即上寨後注腋之水從水車壩而南去者也其下有塢向東北墜者即塢中東分之水從華犵狫橋而北出者也其塢甚平中犂為田從田塍北上又東北升嶺半里踰峰頭而飯于是北望遙山開伏數里外石峯屏列俱不能與此山並峻矣北下甚坦半里路分兩岐一從東北行者為野鴨塘出平壩道遂從西北下山一里抵山下沿陂陀西行漸有小水俱從東北去二里復溯水入峽一里復陟嶺而上又二里遂西過野鴨塘有堡數十家在南山下其前有塘瀦水直逼北山然東西皆高不知從何而泄即所謂野鴨塘是也繞堡前西南行半里望西北山崖間有洞高穹其前隴復有洞伏于下乃呼擔夫少停行李路隅余獨從西嶺橫陟之半里遂陟下洞之上隴不甚高然四靣皆懸削不可下復稍西下山麓東向行遂得下洞洞門南向門下稍窪其左透崖東出另闢一門門東北向其後旋壑下陷四靣寬圓雖窪而不暗既上遂透東門而出稍下從峽中西陟上洞洞門東向前有壘石為垣後亦中窪而下然不甚深其上懸崖雖高中扄之玲瓏乳柱之夭矯反不若下洞也既出復從峽中下轉前隴之嘴而西又經下洞前則前麓皆水草沮洳東與野塘相連而此即其上流也忽聞水聲潺潺自下洞前石根透出歷沮洳之塢而東瀦于野塘者也又從西嶺下半里仍抵路隅呼擔與顧奴遂西緣山坳行西望三峰攢列外又有峯繞之心以為異又西四里有寨在南山下又繞其前循之左轉西南半里又踰一坳于是西行峽中其峽南北兩界排闥而前北即所望三峯攢列者但在其內下望反不可見南則有崖高削上有一石側垂石色獨白而狀如羊是為羊弔崖踰坳至此又一里矣其北崖中斷忽露頂上之峯盤穹矗竪是為唐帽山蓋即前望三峯至是又轉形變象耳按志唐帽在省城南八十里天生橋在金筑司北三十里今天生橋在唐帽東北三十里是天生橋去省反近而唐帽反逺不知當時何以分界也自然言建文君先駐唐帽後往白雲志言其處可以避兵亦幽閟之區矣又西一里餘有峽南向下是為猪槽堡路直西踰小脊而下三里則塢開南北路交十字于中乃橫截之渡一小水半里有堡在西山上曰栁家堡又北半里又有堡在北隴上于是循其右復西上嶺一里將及嶺坳有泉淙淙自土穴出其色乳白渾而不清踰嶺下共二里復塢開南北仍橫截之有澗在塢中其水甚小瀦而不流似亦北去者又西一里復上嶺其嶺南北石峯駢夾中通一坳甚逼一里越坳而西見西壑中堰水滿陂始以為東出而實不流之波也循之又西一里則大塢擴然西去陂堰橫障而北又北循之有村在北山之嘴曰狗場堡乃湯吏部之佃苖也村西平疇一塢為膏腴之壤欲投之宿村人勿納曰西去二里有村亦湯氏佃丁其中可宿乃復西循平疇北隴行一里餘有石峰界平塢中削骨擎空亦獨秀之峭而險者透北峽而西又半里復得一村入叩之其人閉户遁去又西得一堡强入其中茅茨陋甚而臨處與猪畜同穢蓋此地皆苖熟者雖為佃丁而習甚鄙令人反憶土蠻竹欄為上乘耳十九日昧爽促苖起作飯忽擔人亦呼之余心以為異謂從來懶不肯起今何以人呼亦呼也蓋此人名王貴為靖州太陽坪人先是三里抵藍澗彼同數人自後尾至告曰豫儕欲往慶逺苦此路不通迂路又太逺聞參府以兵送行故特來附帶余憐而納之途中即以供應共給之及抵慶逺彼已去及逰南山復遇之遂日日來候豫願隨往滇中余思自慶抵南丹有夫可送至貴州界恐無擔負欲納其一人因與之約曰豫此地尚無所用汝然既隨豫亦每日豫工價一分若遇負擔處每日豫工價三分半彼欲以二人從後聞其儕在南山洞中以絮塞牧牛童子口豫心疑之而王貴來言誘童子非伊乃同行者彼已另居于慶已請獨從隨至麻哈遂漸傲慢以凳傷豫足及抵貴州見豫欲另覓夫復作悔過狀甚堪憐豫復用之至是早起忽不見觀余所藏路費亦竟竊之去矣自豫行蠻洞中以數金藏鹽筒中不意日久為彼所窺乃不失于蠻烟虺毒之區而失之就擔遵塗之日徒有悵悵而已既明擔夫竊資已去無可奈何求苖子送出平壩不及三十里索價甚遁去不肯出蓋苖習素不送客豫求之他苖其人曰彼好意宿汝奈何以擔纍之須自負去二三里抵九家堡即有送者遍求之其語皆然豫無可奈何飯而束擔與顧僕共擡而前行由狗場西苖堡截塢堰南過一里踰嶺西下又過一苖堡益轉而南又踰一嶺半里乃西向下半里有溪汪然自南而北始為脊北第一流乃北合洛陽橋下水東經威清而下烏江者溪上舊有石橋已圯其東半涉水而渡其西半是為九家堡乃苖之熟者也至是已近午矣始雇得一夫擔而行復西北上隴六里有村在西山下曰二家堡從其東盤山嘴而北北界山逺闢曠然直東遙見高峰在四十里外者即志所云馬鞍山威清之山也路復循南山之北西向入峽二里出峽有村在南山下曰江清其處山塢大開平疇中拓東有石峰離立即與南山夾而為所從之峽者也由村東北向抵二石峯下其峰突屼南靣削崖回裂而無深洞西面有洞在峰半其門西向亟止苖子令停擔峰下豫先探其南靣無岩可入惟西南峰下細流汩汩向麓下竅中出遂從其上躋入洞洞頂甚平間有乳柱下垂若帷帶飄搖其內分為三層外層即洞門之前曠若堂皇中有圓石如堆旋而成者四五丈之內即陷空而下其下亦平整圓拓深約丈五而大倍之從其上下瞰亦頗光明蓋洞門之光既從上倒下而其底北裂成隙亦透明于外似可挨入而未及也是為下層下層之東其上復深入成洞與外層對第為下陷所隔不能竟達由外層南壁扳崖而上東透入腋列柱如門頗覺幽暗而玲瓏嵌空詭態百出披竅北下遂達中層則外層之光仍中射而入其內千柱繽紛萬竅靈幻左甚深入而窈窕莫窮前臨下層如在樓閣亦貴筑中所僅見者方扳陟不能去而苖夫在下呼促不已乃出洞而下從洞前北行升陟塍隴二里有東溪自西而東溯之西行有橋十餘鞏橫跨其上是為洛陽橋乃新構而成者橋下流甚大自安順州北流至此曲而東注威清又北合陸廣志所謂的澄河是矣度橋北又溯流而西抵水之北來東折處遂從岐北向溯小溪行始由溪東已涉堰由溪西已復西北踰岡五里抵銅鼓山塢南闢北界石峯聳立皆有洞或高或下隨峰而出西界則遙山自北而南蜿蜒如屏連裂三洞其門皆東向而南偏最高敞其前有數十家當其下即銅鼓寨也是洞名銅鼓洞按志銅鼓山在威清西四十五里以方隅道里計之似即此山然其地去平埧僅五里不平埧而威清何也其洞高懸峻裂內入不甚深而前多突聳之石環牖分門反覺窈窕其右重壁之上圓穴一規北向高穹扳崖登之其中上盤空頂下墜深穽土人架木鋪竹為墊儼然層閣頂東透明忩穽內復有穴自下層出入土人置扉穴前晚則驅牛馬數十頭藏其中正岩之後有裂竅西南入滴瀝垂其內不絶漸轉漸隘而暗似向無入者乃出時有一老者候豫洞前余欲并探北中洞老者曰此洞淺不足觀有南洞在高崖上且大路可由可一登之乃循洞麓西轉不數十步則峰南果有洞出崖端其門南向其下依崖而居者猶環之為廬乃從廬後躋級上洞門懸嵌彌高前壘石為垣若雉堞形內深五丈餘而無懸突之石擴然高朗其後窪陷而下者一二丈然俱靣陽而慘土人置廪盈其間其左腋裂竅北下漸狹而卑土人曰與東洞通想即垂瀝不絶處也亦以黑暗不暇入時顧僕與苗子擔前行已久豫恐其不之待遂下山循麓西上半里踰坳則顧僕與苗夫猶待于此其坳當西界蜿蜒屏列之中脊不甚高而石骨稜稜兩旁駢峙甚逼過隘西下塢中窪其西復有坳環屬蓋南北夾起危峯而東西又兩脊如屬垣窪中有小水牧者浸牛滿其中度窪半里又踰脊西下約一里有岐直下西塢者通平埧南上之道循嶺北越嶺角者為往平埧道乃西北上嶺者一里踰嶺角而北又北下者一里又踰嶺西北一里與大道值循大道稍北遂西度田塍共半里踰小橋入平壩東門半里轉而南乃停擔肆中是晚覓得安莊夫市小鯽佐酒時方過午坐肆樓作記平壩在東西兩山夾間而城倚西山麓城不甚雄峻而中街市人頗集魚肉不乏出西門數里有聖泉亦時涸時溢以迂道不及往二十日早餐隨擔夫出平埧南門循西山麓南行二里有石坊當道其南叢山橫列小溪向東峽去路轉西峽入三里又隨峽南轉又二里上石子嶺踰嶺為石子哨又七里過水橋屯又五里為中火鋪又二里西上坳從坳夾行一里為楊家關又西三里為王宋堡乃東轉四里為石佛洞洞門西向不深有九石佛甚古其處西抵大茅河為安酋界約五十里又南五里平塢間水分南北流是為老龍過脊又南五里為頭鋪又南二里西入山坳踰之出其西又南行三里過一堡又二里上隴入普定北門一岐自東北來者廣順道一岐自西北者大茅河諸關隘道普定城垣峻整街衢宏濶南半里有橋又南半里有層樓跨街市集甚盛二十一日出南門西南行十五里為楊家橋有堡為楊橋堡又南十里為中火鋪又南一里抵龍潭山下轉入西峽西八里有哨轉南七里為龍井鋪又南七里過啞泉大路從東南下山繞山南入安莊東門小路越嶺西而南下度小橋抵安莊西門安莊後倚北峯前瞰南隴而無南門惟東西兩門出入西門外多客肆余乃入憩焉遂入西門過伍徐二衛舍為言此間為安邦彥所荼毒殘害獨慘人人恨不洗其穴然以天兵臨之蕩平甚易而部院朱獨主撫以致天討不行而叛逆不戢今正月終猶以衆窺三㲼河以有偹而退三㲼河者又安莊西五十里一水西北自塢撒一水西南自老山中合併東北行故曰三㲼東經大茅陸廣烏江與安限為天塹者惟此今設總兵官駐其地時朱總督已斃輿尸還越而按君馮士晉為四川人余離貴省日亦親臨陸廣巡歷三坌將由安莊抵安南伍君曰按君此行亦將巡察要害分布士卒為勦除之計非與朱為比者不識然否普定衛城內即安順府所駐豫先聞安順止土知州而宦籍有知府節推至是始知所駐在普定也安莊衛城內即鎮寧州所駐其公署在南城內假公祠之東湫敝殊甚庭有古杉四株大合兩人抱豈亦國初之遺耶安南衛城內即永寧州所駐考一統志三衛三州舊各有分地衛俱在北州俱在南今州衛同城欲以文轄武實借武衛文也但各州之地俱半錯衛屯半淪苖孽似非當時舊境矣三衛之西為水西所苦其東又諸苖雜據惟中一道通行耳段公名時盛天啓四年任鎮寧道雲南普名勝叛踞阿迷州假統兵征之死于難故州人立祠祀之而招魂葬于望水亭之西今普名聲之子猶據阿迷州二十二日五鼓大雨達旦豫少憩逆旅下午霽獨南遵大路一里踰嶺由岐東下半里入雙明洞此處山皆回環成窪水皆下透穴地將抵洞忽塢中下裂成坑濶三尺長三丈深丈餘水從其東底溢出即從其下北去溢穴之處其上皆環塍為田水盈而不滲亦一竒也從此西轉則北山遂南削為崖西山亦削崖北屬之崖環西北二靣如城半規先抵北崖下崖根忽下嵌成洞其中貯水一塘淵碧深泓即外自裂坑中潛透而滙之者從崖外稍西即有一石自崖頂南跨而下其頂與崖並起而下闢為門高濶約俱丈五是為東門透門而西其內北崖愈穹西崖之環駕而屬者亦愈合西山之南復分土山一支掉臂而前與東門外崖夾坑而峙昔有結高垣壘石址架閣于上北與東門崖對以補東向之隙而今廢矣由東門又數十步抵西崖下其崖自南山北屬于北崖上皆削壁危合下則中闢而西通高濶俱三倍于東門是為西門此洞外之雙明也一門而中透已竒兩門而交映尤異其西門之外山復四環成窪高若列城水自東門外崖北淵泓間又透石根溢出西門之東其聲淙淙從西門北崖又透穴西出門之東西皆有小石梁跨之以北入洞水由橋下西行環窪中又透西山之下而去西門之下東映重門北環墜壑南倚南山石壁氤氲結為龕牖置大士像焉由其後透穴南入石竅玲瓏小而不擴深可十餘丈而止此門下南壁之竒也北接北崖石屏中峙與南壁夾而為門屏後則北山中空盤壑極其宏峻屛之左右皆有小石梁以分達之屏下水環石壑盤旋如帶此門下北壁之竒也北壁一屏南界為門北界為洞洞門南臨此屏中若樹塞遂東西亦分兩門南向水自東門下溢穴而出潄屏根而入則循屏東而駕為東橋而東門臨之又溢穴出西門下循屏西而架為西橋而西門臨之此又洞內之雙明也先從西門度橋入洞頂高十餘丈四旁平覆如幄而當門獨旋頂一規圓盤而起儼若寶蓋中穹其下有石臺中高而承之上有兩圓窪大如銅鼓以石擊之分清濁聲土人詫為一鐘一鼓云洞西北盤亘亦多垂柱裂隙俱回環不深東南裂隙下高逈亦如西門而掩映彌深水流其前瀠洄作態崆峒清泠各極其趣遂踰東橋仍出西門下由其前南向而上直躋崖根復有洞東向高濶俱三丈而深十丈洞後北轉遂上穹而黑然不甚深矣洞中乾朗有僧棲之而中置金仙像乃扣僧索筆携炬同下窮西門大士後小穴并録壁間詩返寓已暮徐霞客遊記卷五上欽定四庫全書徐霞客逰記卷五下明徐宏祖撰西南遊日記八貴州二十三日雇短夫遵大道南行二里從隴頭東望雙明西崖其下猶透明而東也洞中水西出流壑中從大道下復西入山麓再透再入凡三穿岩腹而後注于大溪蓋是中窪壑皆四靣山環水必透穴也又南踰阜四升降共四里有堡在南山嶺頭路從北嶺轉而西下又二里有草坊當路路左有茅鋪一家又西下升陟隴壑共七里得聚落一塢曰白水鋪已為中火鋪矣又西二里遙聞水聲轟轟從隴隙北望忽有水自東北山腋㵼崖而下搗入重淵但見其上橫白濶數丈翻空湧雪而不見其下截蓋為對崖所隔也復踰阜下半里遂臨其下流隨之湯湯西去還望東北懸流恨不能一抵其下擔夫曰是為白水河前有懸墜處比此更深豫恨不一當其境心猶歉歉隨流半里有巨石橋架水上是為白虹橋其橋南北橫跨下闢三門而水流甚濶每數丈輒從溪底翻崖噴雪滿溪皆如白鷺飛白水之名不誣矣度橋北又隨溪西行半里忽隴箐虧蔽復聞聲如雷余意又竒境至矣透隴隙南顧則路左一溪懸搗萬練飛空溪上石如蓮葉下覆中剜三門水由葉上漫頂而下如蛟綃萬幅橫罩門外直下者不可以丈數計搗珠崩玉飛沫反湧如烟霞騰空勢甚雄厲所謂珠簾鉤不捲匹練掛遙峯俱不足以擬其壯也蓋余所見瀑布高峻數倍者有之而從無此濶而大者但從其上側身下瞰不免神悚而擔夫曰前有望水亭可憩也瞻其亭猶在對崖之上遂從其側西南下復度峽南上共一里餘躋西崖之巔其亭乃覆茅所為蓋昔望水亭舊址今以按君道經恐其停眺故編茅為之耳其處正靣揖飛流奔騰噴薄之狀令人可望而不可即也停憩久之從亭南西轉澗乃環山轉峽東南去路乃循崖拾級西南下又升陟隴壑四里西上入塢有聚落一區在東山下曰雞公背土人指其東南峰上有洞西北向外門如竪而內可容衆有雞公焉以形似名也其洞東透前山而此塢在其後故曰背余聞之乃賈勇先登冀一入其內比登祗有一道西南上隨之迤邐扳躋竟無旁岐已一里登嶺頭矣是為雞公嶺坳中有佛宇問洞何在僧指在山下村南已越之而上矣擔夫亦至遂踰嶺西向下半里抵壑中又半里有堡在南隴曰太華哨又西上踰嶺而西又一里乃迤邐西南下甚深始望見西界遙峯自北而南屏立如障與此東界為夾互相頡頏中有溪流亦自北而南下嵌壑底望之而下一下三里從橋西度是為關嶺橋越橋即西向拾級上其上甚峻二里有觀音閣當道左閣下甃石池一方泉自其西透穴而出平流池中溢而東下是為馬跑泉乃關索公遺跡也閣南道右亦有泉出穴中是為啞泉人不得而嘗焉余勺馬跑甘冽次于惠而高山得此故自竒也但與啞泉相去不數步何良楛之異如此由閣南越一亭又西上者二里遂陟嶺脊是為關索嶺索為關公子隨蜀丞相諸葛南征開闢蠻道至此有廟肇自國初而大于王靖逺至今祀典不廢越嶺西下一里有大堡在平塢中曰關嶺鋪乃關嶺守禦所所在也計其地猶在山頂雖下未及三之一也至才過午夫辭去余憩肆中二十四日晨起以乏夫為慮忽有駝騎至尚餘其一遂倩之議至交水以筐囊裝馬上令之先行余飯而後行西南七里上北斗嶺一里西踰其脊有亭跨其上西望崇山列翠又自北屏列而南與東界復頡頏成夾夾中亦有小水南去從嶺西下二里抵夾塢中有聚落倚其麓是為北斗鋪關嶺為中界髙山而北斗乃其西陲二界髙嶺愈西愈高由鋪西截塢橫度二里乃西向拾級上迤邐峯頭五里踰一坳東眺關嶺已在足底有坊跨道曰安普封疆是為安莊哨自關嶺為鎮寧永寧分界而安莊衛之屯直抵盤江皆犬牙相錯非截然各判者又西上峯峽中三里崖木漸合曰安籠鋪又永寧屬按志有安籠箐山安籠箐關想即此問所謂安籠守禦所土人云在安南東南三日程此屬普州又非此矣按此地在昔為安氏西南盡境故今猶有安莊安籠安順安南諸名蓋安氏之地昔以盤江為西塹而今以三㲼為界三㲼以南盤江以東為中國奮衛者僅此耳由鋪西更南上一里踰嶺稍下有塢中窪又西半里則重峰夾坑下墜北去盤嶺側西度坑坳又半里復拾級上二里有菴跨道是為象鼻嶺由其西度脊甚狹南北俱削壁下而成坑其上濶僅五六尺如度堵又宛轉北躋再過一脊共三里陟嶺頭則此界最高處也東瞰關嶺西俯盤江以西兩界山俱若列屏于下如川字分行而擁之者嶺西又盤塢為坪結城其間是為查城即所謂鼎站也有查城驛屬南安鼎站為西界高山而白雲寺乃其西陲亦愈西愈高乃望之西北下共二里半而稅駕逆旅趙店江西人時駝騎猶放牧中途豫小酌肆中而返憩肆中其地為盤江以東老龍第一支南分之脊第二支為關嶺第三支為雞公背支南下形如川字而西支最高然其去俱不甚長不過各盡于都泥江以北其界都泥江北而走多靈者又從新添東南分支下都勻南環獨山州北又東南度雞公關而下者也其地東南為慕役長官司李姓東北為營頂長官司羅姓西北為沙營長官司沙姓時沙土官初故其妻即郎岱土酋之妹郎岱率衆攻之人民俱奔走於鼎站沙營東北為郎岱土酋東北與水西接界與安孽表裏為亂攻掠鄰境上官惟加銜餌不敢一問也按是嶺最高西為查城東為安籠箐皆絶頂回環而成猶在衆山之上也一統志永寧之安籠箐關正指此普安之安籠千户所在安南東南三日程者即與廣西之安隆長官司接界乃田州白隘所由之道在普安安籠千户所當作安隆與廣西同稱不當作安籠與永寧相溷也鼎站之峽從東北向西南其東南即大山之脊而查城倚其西北亦開一峽而去乃沙營土司道也其泉源亦自東北脊下穿站街而西南墜峽底西南峽脊亦環接無隙遂從其底穿山腹西去當西注盤江者矣二十五日自鼎站西南行一里餘有崖在路右上下各有洞洞門俱東南向而上洞尤空濶以高不及登路左壑泉已成澗隨之南半里山回壑盡脊當其前路乃上躋水則自其下入穴盤折二里踰坳脊是為梅子關越關而西路左有峽復墜坑而下東西徑一里而西復回環連脊路循其上平行而西復踰脊始下陟二里又盤塢中山西南轉二里復西北上一里是為黃土埧蓋鼎站之嶺至此中降又與西嶺對峙成峽有土山中突而連屬之其南北皆墜峽下中踞若埧然其云黃土埧者以此有數家倚西山而當其坳設巡司以稽察焉又上踰嶺脊共五里為白雲寺于是遂西南下迤邐四里途中扛擔絡繹車騎相望則臨安道母忠以欽取入京也司道無欽取之例其牌如此當必有說按母川人本鄉薦豈果有卓異特逹聖聰耶然聞阿迷之僭據未復而輿扛之紛紜實繁其才與操似俱可議也又至塢底西北上一里為新鋪由鋪西稍踰嶺頭遂直垂垂下五里過白基觀觀前奉真武後奉西方聖人中頗整潔時尚未午駝騎方放牧在後余乃入後殿就净几以所擕紙墨記連日路紀蓋以店肆雜㳫不若此之净而幽也僧檀波甚解人意時時以茶蔬米粥供下午有象過二大二小停寺前久之象奴下飲瀕去象輒跪後二足又跪前二足伏而後升既而駝騎亦過豫方草記甚酣不暇同往又久之雷聲殷殷天色以雲幕而暗辭檀波以微禮酬之固辭不受初余以為去盤江止五里耳至是而知駝騎所期舊城尚在盤江上五里亟為前趨乃西向直下三里有枯澗自東而西新搆小石梁跨之曰利濟橋越橋度澗南又西下半里則盤江沸然自北南注其峽不濶而甚深其流渾濁如黃河而甚急萬山之中衆流皆清而此獨濁不知何故余三見此流一在武宣入栁江亦甚濁一在三鎮北羅木渡則清一在此復濁想清乃壑時也循江東岸南行半里抵盤江橋橋以鐡索東西屬兩崖上為經以木板橫鋪之為緯東西兩崖相距不十五丈而高且三十丈水奔騰于下其深又不可測初以舟渡多溧溺之患壘石為橋亦多不能成崇禎四年今布政朱名家民雲南人時為亷憲命普安遊擊李芳先四川人以大鐡練維兩崖練數十餘條鋪板兩重其厚僅八寸濶八尺餘望之飄渺然踐之則屹然不動日過牛馬千百羣皆負重而趨者橋兩旁又高維鐵練為欄復以細練經緯為紋兩崖之端各有石獅二座高三四尺欄練俱自獅口出東西又各跨巨坊其東者題曰天塹雲航督部朱公所標也其西者題曰四字缺文傅宗龍時為監軍御史所標也傅又竪穹碑題曰小葛橋謂諸葛武侯以鐵為瀾滄橋數千百載乃復有此故云余按渡瀾滄為他人乃漢武故事而瀾滄亦無鐵橋鐵橋故址在麗江亦非諸葛所成者橋兩端碑刻祠宇甚盛時暮雨大至不及細觀度橋西已入新城門內矣左轉瞰橋為大願寺西北循崖上則新城所環也自建橋後增城置所為鎖鑰之要云聞舊城尚在嶺頭五里急冒雨竭蹶躋級而登一里半出北門又北行半里轉而西逶迤而上者二里雨乃漸霽新城內所上者峻城外所上者坦西踰坳循右峯北轉又半里則舊城懸嶺後岡頭矣入東門內有總府鎮焉其署與店舍無異早晚發號用喇叭聲亦不揚金鼓之聲無有也青崖總兵姓班三坌總兵姓商此間總兵姓胡添設雖多而勢不尊矣是夜宿張齊公家軍人也二十六日駝馬前發余飯而出舊城西門始俱西南行從嶺塢升降五里有一二家在南隴下為保定鋪從其側西上嶺漸陟隆崇三里忽有水自嶺峽下循峽而上峽中始多田塍蓋就水而成者時已插蒔矣又上二里是為凉水營由營西復從山塢逶迤而上漸上漸峻又五里遇駝馬方牧余先發將踰坳坐踰坳下石間少憩望所謂海馬嶂者欲以形似求之忽有人自坳出負罌汲水由余前走南岐去余先是望南崖回削有異而未見其岐至是亟隨之抵崖下則穹然巨洞其門北向其內陷空而下甚宏其人入汲于石隙間隨處而是皆自洞頂淙淙散空下墜土人少鑿坯承之水從洞左懸頂下者最盛下有石臺承之臺之側鑿以貯汲者洞從右下者最深內可容數百人而光明不閟然俱無旁隙别竅若堵墻而成者也出洞仍由舊路出大道登坳即海馬嶂有真武閣跨坳間余入憩閣間取筆禇記遊則駝馬前去久之乃行其內即為海馬鋪去城十里矣其處北兩日半程為小米馬場有堡城下臨盤江隔江即水西地南兩日程為乖場河水漲難渡即出􅖳之所也又西循南嶺而行見其塢皆北向墜然多中窪而外橫亘者連西又稍上二平脊共三里則北度而矗者其峰甚高是為廣山其上李芳先新結浮屠為文曲星蓋安南城東最高之巔也又西二里為茶菴其北有山欹突可畏作負隅之勢者舊名歪山今改名威山余望之有異而亟于趨城遂遵大路而西又三里復踰一阜又二里稅駕於安南城之東關外陳貢士家二十七日駝馬已發余後飯問知城東五里由茶菴而北有威山山間有洞從東透西又有水洞其中積水甚深其前正瞰衛城遙指其處雖在山巔然甚近也乃同顧僕循昨前道五里東抵茶菴遂由岐北向入山一里抵山左腋則威山之脉自北突而南南聳而北伏南削而北垂東西皆亘崖斜騫而南上從南麓復起一小峯亦如之入東峽又一里直抵山後則與東峰過脊處也由脊北下甚深而路蕪由脊西轉循山北峯之半西行路蕪而磴在循之行則北塢霾霧從塢中起瀰漫北峰咫尺不可見而南靣威山之北惟行處猶朗而巔亦漸為所籠西行半里磴乃南上拾級而登者半里則峰之北靣全為霧籠矣乃轉東北上則東崖斜騫之上也石脊甚狹由東北上西南如扳龍尾而升復見東南峰外澄霄麗日遙山如靛余所行之西北則瀰淪如海峯上峯下皆入混沌若以此脊為界者蓋脊之東南風所從來故夙霾净捲脊之西北風為脊障毒霧遂得以為窟穴豫夙願一北眺盤江從來處而每為峰掩至是適登北嶺而又為霧掩造化根株其不容人窺測如此扳脊半里有洞在頂崖之下其門東向上如合掌稍窪而下底寬四五丈中有佛龕僧榻遺飯猶存而僧不知何往兩旁頗有氤氲之龕其後直透而西門乃漸狹而低亦尖如合掌其門西徑山腹而出約七丈餘前後通望而下不見者以其高也出後門上下俱削崖叠石路緣崖西南去十餘丈復有洞西向門高不及丈而底甚平深與濶各二丈而洞後石縷繽紛不深而幻置佛座其中而前建虛堂已圯其前直瞰衛城若垂趾可及偶霧氣一吞忽漫無所覩不意海市蜃樓又在山阿城郭也然此特洞外者也由洞左旁竅東向入其門漸隘而黑扳石閾上其中坎砢欹嵌窪竇不一皆貯水滿中而不外溢洞頂滴瀝下注水池如雜珮繁絃鏗鏘逺近洞內漸轉東北勢似宏深淵墜既水池高下無可著足而無火炬遙燭惟從黑暗中聽其遙響而已余所見水洞頗多而獨此高懸衆峯之頂又瀦而不流無一滴外泄向所望以為獨石凌空而孰意其中乃函水之具耶出洞仍崖而北入明洞後門抵前洞從僧榻之左有旁龕可登扳而上之則有隙西透若忩而岐為兩其後復有洞門西向在崖路之上其門頗敞第透隙處雙楞逼仄祇可外窺不能穿之以出耳先是豫入前洞見崖間有鐫三明洞三字者從洞中直眺但見前後而不知旁觀更有此異也下洞由舊洞三里出茶菴適按君馮以專巡至從來直指巡方不踰關嶺盤江馮以特命再任故歷關隘至此耳時旌旗穿關踰坳瞻眺之空山生色第隨其後抵安南不免徒騎雜㳫五里之程久乃得至乃飲于陳氏肆中遂入東門西抵衛前轉南而出南門南向行嶺峽間共平上二里有脊自西北度東南度處東平為塍西忽墜坑深下有水自坑中唧唧出路隨之西循北崖下隨即所謂烏鳴關也烏鳴關在安南衛土人呼為老鴉關西向直下一里有茶菴跨路隅飛泉夾灑道間即前唧唧細流至此而奔騰矣菴下崖環峽仄極傾陷之勢又曲折下半里泉益溢道有穹碑題曰甘泉勝蹟其旁舊亦有亭已廢而遺址豐碑尚在言嘉靖間有僧施茶膳衆由嶺下汲泉甚艱一日疏地得之是言泉從僧發者余憶甘泉之名舊志有之而唧唧細流實溢于嶺上或僧疏引至此不為無功若神之如錫卓龍移則不然也又拾級西南下一里下抵峽口循西崖之口轉而西行北則石崖排空突屼上壓南則墜壑下盤丘垤縱橫皆犁為田雖升降已多猶平行山半也又西半里有泉自北崖裂隙間宛轉下注路經其前為架橋橫度泉落于橋內復從橋下㵼峽去坐橋上仰觀之崖隙欹曲泉如從雲葉間墮出或隱或現又瀑布一變格也循崖又西迤邐平上兩過南度之脊漸轉西北共五里為烏鳴鋪復西北下峽間一里餘有小水一自東峽來一自北峽來各有石梁跨之合于路左而東南去度兩石橋又西南上嶺一里從嶺頭過一哨有數十家夾道又從嶺上循北界大山西向行其南復平墜成壑下盤錯為田甚深其南遙山與北界環列者聳如展屏而北角獨尖竪而起環此壑而東度土脊一枝遙屬于北界大山所遇嶺頭夾哨處正其北屬之脊也余先日從海馬嶂西即遙從嶺隙見西峰繚繞而此峰獨方頂逈出如屏問騎夫江西坡即此峰否對曰尚在南余望其坳入處反在北心惑之至是始知其即東向分支之脊也路雖對之行而西坡實在其北循北嶺升降曲折皆在峰半行又西北二里西南二里直墜坡而下者二里緣嶺西轉者一里是為納溪鋪蓋在北崖南墜之下雖所下已多而猶然土山之脊也由鋪西望則東西山又分兩界有水經其中苐此兩界俱支盤隴錯不若關嶺之截然屏夾也復西南下一里半有水從東崖墜坑而出懸細若馬尾從其北路亦墜崖下又二里而抵塢中巨橋三門跨兩隴間水從東一門湧而北出其西二門皆下平為田豈水涸時耶其水自西南諸峽中各趨于橋之南墜峽而下經橋下北注而出于盤江上流豈納溪之名以此耶度橋復西北上嶺是曰江西坡以嶺在溪之西也路從夾岡中透壁盤旋而上一里出夾復拾級上一里得茅菴在坡之半又北上拾級半里抵嶺頭其北有峰夾塢尚高東望納溪鋪之綴東崖者高下正與此等于是又西向平陟嶺間二里挾南峯轉循其西又西向行半里則嶺上水多左右墜又東北下轉則一深塹甚逼自西南墜東北若劃山為二者度小石梁而西又西北踰嶺頭共一里而入西坡城之東南門是為有嘉城二十八日出西坡城之西北門復西向陟嶺盤折而上二里始升嶺頭其北嶺尚崇循其南而西又二里望西北一峰甚近而更聳有霧籠其首以為抵其下矣又西一里稍降而下忽有脊中度左右復中墜成峽分向而去其度脊濶僅二尺長亘二三丈而已為東西聨屬之蒂始知西坡一山正如一芝側出東西徑僅十里南北兩垂亦不過二三十里而此則其根蒂所接也度脊始上雲籠高峰又二里盤峰之南是為倪納鋪數十家後倚高峰南臨遙谷前所望方頂屏列之峰正亘其南指而詢之土人曰是為兔場營再南為新安二所新為新城所安為安籠所即與廣西安籠土司為界者由鋪之西半里有脊自山前塢中南度復起山一支繞于鋪前脊東西流水俱東南入納溪橋之上流者第脊西之流墜峽南搗甚逼又稍北循崇山而西半里有脊自南嶺橫亘而北中平而不高有堡樓峙脊間是為保家樓已為猓玀哨守之處其脊自西南屏列而來至此北度東起而為高峯即倪納後之霧籠者西亘而成石崖即與來脊排闥為夾塢者由脊北循石崖直西行夾塢之上是為三條嶺西四里石崖垂盡有洞高穹崖半其門南向橫拓而頂甚平又有一斜裂于西者其門亦南向而門之中有懸柱焉其前塢中水繞入西南峽路乃稍降復西上嶺坳共三里為芭蕉關數十家倚北山南突之坳間水繞突峯之南復北環關西而出過關則墜峽而下復與水遇是為普安東境之要害然止鋪舍夾路實無關也由其西降峽循水路北重崖層突多赭黑之色聞有所謂弔崖觀音者隨崖物色之二里見崖間一洞懸踞甚深其門南向而無路乃扳陟而登則洞門圓僅數尺平透直北十餘丈而漸黑似曽無行跡所入者乃返出洞口則滿地白骨不知是人是畜也仍扳崖下又西有路復北上崖間其下門多牛馬憩息之所汚穢盈前其上層有垂柱空其端而置以小石大士乃出人工非天然者復下循大路隨溪又西一里溪轉北向墜峽去于是復西陟坡阜共六里而至新興城自芭蕉關而來所降不多而上亦不逺其塢間溪猶出山上也入東門出西門亦殘破之餘也有碑為天啓四年都御史烏程閔公所復中有坐鎮守偹是晚按君宿此又西行嶺峽間二里連踰二嶺脊皆自南北度者忽西開一深壑中盤旋為田其水四靣環亘不知出處路循東峯西南降一里又轉東南上半里踰嶺脊而南乃西南下一里西抵塢中聞水聲淙淙甚急忽見一洞懸北崖之下其門南向而甚高溪水自南來北向入洞平鋪洞間深僅數寸而濶約二丈洞頂高穹者將十丈直北平入者十餘丈始西闢而有層坡東墜而有重峽內亘而有懸柱然漸昏黑不可扳陟矣此水當亦北透而下盤江者出洞徴洞名于土人對曰觀音洞徴其義以門上崖端有置大士像于其穴者也洞前溪由東南峽中來其峽底頗平大葉蒲叢生其間淬緑鍔于風前搖青萍於水上芃芃有光循之西南半里又西穿嶺隙間漸循坡躡脊二里有一二家在北峰下其前陷溪縱橫水由西南破壑去路由西北循嶺上一里出嶺頭是為藺家坡西南騁望環山屏列甚遙其中則峰巔簇簇盤伏深壑間皆若兒孫匍匐成行無與為抗從此乃西北下直降者二里有菴綴峯頭曰羅漢松以樹名也自踰新興西南嶺羣峰翠色茸茸山始多松然無喬枝巨本皆弱幹紏纒垂風拂霧無復吾土凌霄傲風之致也其前又西南開峽以峽中直下者三里轉而西平行者一里有城當坳間是曰板橋鋪城城當峽口仰眺兩界山凌空而起以為在深壑中矣不知其西猶墜坑下也路在城外西北隅而入宿城中之西門二十九日出板橋城之西門北折入大路遂拾級下有小水自右峽下注踰其左隨之行一里則大溪汪然自西南轉峽北注有巨石梁跨其上即所謂三板橋也今已易之石而鋪猶仍其名耳橋上下水皆濶獨橋下石峽中束流急傾湧其水西北自八納山發流經軟橋又西南轉重谷間至是北搗而去亦深山中一巨壑也越橋西溯溪北崕行溪由西南谷來路入西北峽去于是升降隴坳屢越岡阿四里直西山皆曠然平伏獨西南一石峯聳立路乃不從西平下反轉南仰躋半里盤石峯東南有石奮起路右首鋭而灣突肩齊而並聳是曰鸚哥嘴又西轉而下者一里半有鋪肆夾路曰革納鋪土音納俱作捺至是而始知所云捺溪倪捺皆納字也惟此題鋪名又從峽平行緣坡升降五里有哨舍夾路曰軟橋哨由哨西復墜峽下遙見有巨溪從西峽中懸迅東注下峽一里即與溪遇其溪轉向南峽去路從溪北溯溪循北山之麓西行二里有巨石梁南北跨溪上即所謂軟橋也余初疑冉姓者所成及讀真武廟前斷碑始知為軟想昔以篾為之今已易之石而猶仍其名耳度橋而南遂從溪南西向緣南崖而上其躋甚峻半里平眺溪北山俱純石而緑樹緣錯成文其中忽有一瀑飛墜自峰頂直掛峽底緣南崖西上愈上愈峻而北眺翠紋玉瀑步步回首不能去上二里峽底溪從西北而出嶺頭路向西南而上又一里過真武廟按君自新興而來越此前去由其西南行遂下塢中又西南共四里兩越小嶺而下有峽自東南達西北又兩界山排闥而成者其中頗平逺有聚落當其間曰舊普安按君飯于鋪館豫復先之而西北由塢中行東北界山逶迤繚繞不甚雄峻西南界山蹁躚離立復露森羅峽縱離逺然兩頭似俱連脊中平而無泄水之隙者又西三里有石峯中起分突塢間神宇界其下曰雙山觀按君自後來復越而前去又西一里則西脊回環于前遂塢窮谷盡塢底有塘一方滙環坡之麓四旁皆石峰森森繞塘亦多石片林立亦有突踞塘中者于是從塘西南上回坡一里登其脊又宛轉而行嶺頭嶺左右水俱分㵼深谷北出者當從軟橋水而入盤江上流南流者當從黃草壩而下盤江下流又西向從嶺頭升陟其上多中窪之宕大者盤壑為田小者墜穴為阱共五里為水塘鋪乃飯於廟間過鋪西下嶺逶迤山半又五里為高笠鋪南向行隴間踰一平嶺西南下又五里有小溪自北峽來石橋南跨之度其南北門街夾峙岡上踰岡南下始成市有街西去為雲南坡大道直南又一小溪自西南峽來石橋又南跨之橋南即為普安城州衛俱在其中按君已駐署中矣其城西半倚山脊東半下臨東溪南北二門正當西脊之東麓而東門則瀕溪焉南門外石橋則三溪合于北徑東門而西環城南又南去而注于水洞者北門外石橋第一橋即雲南坡之水繞城西北隅而為塹東下而與北溪合於城東第二橋即小溪自西北來者一統志所云目前山之水也第三橋即小溪自北來者一統志所云沙莊之水也三溪交㑹于城之東北合而南去是為三一溪經城南橋而入于水洞其城自天啓初為水西叛逆諸蠻應之攻圍一年而破後雲南臨安安南土官沙姓者奉調統兵來復至今瘡痍未復然是城文運為貴筑之首前有蔣都憲今有王宫詹名作逺非他衛可比州昔惟土官姓龍其居在八納山下統十二小土司今土官名子烈年尚少后設流官知州姓黃並治焉州東北七十里有八納其山高冠一州四靣皆石崖嶄絶非一徑盤旋而上約三十里龍土官司在其下其頂甚寬平有數水塘盈貯其上軟橋之水所由出也土人音以納為但而梵經有叭呾哆之音今老僧白雲南京人因稱叭呾山遂開大叢林而夷地逺隔尚未證果州南三十里有丹霞山其山當叢之上更起尖峰卓立于中西界有山一支西南自平夷衛屏列而北迤邐為雲南坡而東下結為州治西屏之中其最高處曰睡寺山正與丹霞東西相對其東界有山南自樂民所分支而北當丹霞山南十里西界屏列高山橫出一支東與東界連屬合併而北天矯叢㳫西突而起者結為丹霞山東北聳突而去者漸東走而為兔場營方頂之山而又東北度為安南衛脉其橫屬之支在丹霞山南十里者其下有洞曰山嵐洞其門北向水從洞中出北流為大溪經丹霞山之西大水塘塢中又北過趙官屯又東轉而與南板橋之水合由洞門溯其水入南行洞腹者半里其洞劃然上透中滙巨塘深不可測土人避冦以舟渡水而進其中另闢天地可容千人而丹霞則特拔衆山之上石峯峭立東北惟八納山與之齊抗八納以危擁為雄此峯以峭拔擅秀昔有𤣥帝宫天啓二年毁于蠻冦四年不昧師徽州人復鼎建每正二月間四方朝者駢集日以數百計僧又捐資置莊田環山之麓歲入榖三百石而嶺間則種豆為蔬嵗可得豆三十石以供四方但艱于汲水尋常汲之嶺畔往返三里皆峻級遇旱則往返十里而後得焉五月初一日余束裝寄逆旅主人符心華寓蘭溪人乃南抵普安北門外東向循城行先是駝騎議定自關嶺至交水至是豫欲往丹霞彼不能待計程退價余倉卒收行李其物仍為夫盜去窮途之中屢遭拐竊其何堪乎復隨溪南轉過東門又循而抵南門有石梁跨溪上越其南水從西崖向南谷路從東坡上南嶺西眺水抵南谷崖環壑絶遂注洞南入時急于丹霞不及西下二里竟南上嶺從嶺上行又二里踰嶺轉而西其兩旁山腋多下墜之穴蓋其地當水洞東南其下中空旁透下墜處皆透穴之通明者也又西南一里路右一峽下迸有岩西南向其上甚穹乃下探之東門有側竇如結龕門內窪下而中平無甚竒幻遂復上南行又一里踰嶺脊遂西南漸下行坡峽間一里過石亭壘址其南路分兩岐由東南者為新安二所黃草壩之徑由西南者則向丹霞而南通樂民所道也遂從西南下從嶺峽中平下者二里東顧峽坑墜處有水透崖南出余疑為水洞所泄之水而其勢頗小上流似不雄壯從其西遂西南墜坑而下一里抵壑中則有溪汪然自西而東注小石梁跨其上曰南板橋以别于北大道之三板橋也其下水則西自石洞出即承水洞之下流至是而復透山腹也水從橋東又合南峽一溪東向而去東北合軟橋下流出北板橋而東與盤江合其南峽之溪則自大水塘南山嵐洞來二溪一北一南皆透石洞而出亦竒矣越南板橋南一里溯南來溪入南峽轉而西行峽中又二里則有壩南北橫截溪上其流湧壩下注濶七八丈深丈餘絶似白水河上流之瀑但彼出天然而此則人堰者也壩北崖有石飛架路旁若鷁首掉虛而其石分竅連枝玲瓏上透嵌空凑合亦突崖之一竒也又西三里路緣北崖而上西越之而下共半里山回水轉其水又自南向北而來者其先東西之峽甚束至是峽之成南北者漸寬又循溪西崖南向行一里南踰一突觜則其南峽開而盤成大塢南望有石梁橫跨溪上半里度石梁而東遂東南上坡始與南來之溪别東上半里過一村又東半里轉而南稍下共半里踰小溪而上過趙官屯遂由屯村北畔東南入塢二里復上嶺一里轉峽處有水飛墜山腰循山觜又西轉而南半里隨峽東入又半里峽中有水自東峽出即飛瀑之上流也小石梁跨峽而南石碑剝落即丹霞山建橋記文也由橋南西向盤嶺為大水塘之道由橋東向溯水而入其下峽中箐樹䝉密水伏流于下惟見深緑一道迤邐谷底又東半里內塢復開中環為田而水流其間路循山南轉半里入竹樹間有一家倚山隈結廬下瞰壑中平疇而棲豫以為非登山道矣忽一人出呼豫由其前稍轉而東且𨗳豫東南登嶺乃下耕塢中去及豫躋半里復西入樵徑其人自塢中更高呼稍東遂得平道其處四山回合東北皆石山突屼而余所登西南土山則松隂寂歷松無挺拔之勢而偃仆盤曲雖小亦然遂藉松隂以手掬所携飯摶而食覺食淡之味更長也既而循坡南上者半里又入峽西上者一里又南踰坳脊間半里其坳兩旁石峰東西湧起而坳中則下陷成井灌木叢翳其間杳不可窺已循東峯之南又轉而東南盤嶺半里其兩旁石峯又南北湧起而峽中又下陷成窪又稍轉東北路成兩岐一由北踰峽一由東上峰余不知所從乃從東向而上者其兩旁石峯復南北湧起半里陟其間漸南轉又半里南向躋其坳則兩旁石峰又東西湧起越脊南始見西南一峯特聳形如天柱而有殿宇冠其上乃西南下窪間半里復南上岡脊回望所越之脊有小洞一規其門南向其西有石峯如展旗其東岡之上復起亂峯如湧髻而南岡則環脊而西遂矗然起丹霞之柱焉其中回窪下陷底平如鏡已展土為田第無滴水不堪插蒔由岡西向躋級登峰級緣峯西石崖其上甚峻已而崖間懸樹密䕃無復西日之爍直躋半里始及山門其門西北向而四周籠罩山頂時僧方種豆隴阪間門閉莫入久之一徒自下至號照塵啓門入余遂以香積供既而其師影修至遂憩余閣中而飲以茶蔬影修又不昧之徒也時不昧募緣安南影修留豫久駐且言其師在必不放余去以余乃其師之同鄉也豫謝其意許為暫留一日初二日甚晴霽余時徙倚四靣憑忩逺眺與影修相指㸃其北近山稍伏其下為趙官屯漸逺為普安城極逺而一峯危突者八納也相去已百里其南稍下而橫脊擁其後為山嵐洞極逺而遙遙隱隔者樂民所之南與亦佐縣為界者也其西墜峽而下為大水塘塢中自南而北山嵐洞之水北出南板橋者也隔溪則巨峯排列亦自南而北所謂睡寺山矣山西即亦資孔大道而嶺障不可見其東僅為度脊上堆盤髻之峯稍逺則駢岫叢㳫迤邐東北去為兔場營方頂山之脉者也山東南為歸順土司普安籠土司之屬與粵西土司同名越其東南為新安二所黃草壩諸處與泗城接界矣是日余草紀閣中影修屢設茶候供以雞葼菜藟漿花藤如婆婆針線斷其葉蒂輒有白漿溢出花蕊每一二十莖成一叢莖細如髮長半寸綴花懸蒂間花色如淡桃花連叢採之黃連頭皆山蔬之有風味者也初三日飯後辭影修影修送豫以茶醬粵西無醬貴州間有之而甚貴以鹽少故而是山始有醬食遂下山十里北過趙官屯十里東北過南板橋七里抵普安演武場由其西橫嶺西度一里望三一溪北來有崖當其南知洞在是矣遂下則洞門北向迎溪前有巨石坊題曰碧雲洞天始知是洞之名碧雲也土人以此為水洞以其上有佛者為乾洞洞前一巨石界立門中門分為二路由東下水由西入入洞之中則擴然無間水循洞西路循洞東分道同趨南向十餘丈漸昏黑矣忽轉而東水循洞北路循洞南其東遂穹然大闢遙望其內光影陸離波響騰沸而行處猶暗暗也蓋其洞可入處已分三層其外入之門為一層則明而較低其內闢之奧為一層則明而彌峻當內外轉接處為一層則暗而中坼稍束如門高穹如橋聳豁不如內層低垂不如外層而獨界其中內外回眺雙明逈然然從暗中向矚其頂又有一圓穴上透其上亦光明開闢若樓閣中函而無從騰空而上也東行暗中者五六丈而出則堂户宏崇若阿房未央四圍既拓而峻發彌甚水從東南隅下搗奧穴而去光從西北隅上透空明而入其內突水之石皆如踞獅泛鳬附壁之崖俱作垂旗矗柱蓋內奧之四隅西南為轉入之橋門西北為上透之明穴東南為入水之深竅而獨東北回環逈邃深處亦有穴高懸其前有眢窟下墜黑暗莫窺其底其上有側石環之若井欄然豈造物者恐人暗中失足耶由窟左循崖而南有一石脊自洞頂附壁直垂而下㾗隆起壁者僅五六寸而鱗甲宛然或巨或細是為懸龍脊儼有神物浮動之勢其下西臨流側石畦每每是為十八龍田由窟右循崖而東有一石㾗亦自洞頂附壁直垂而下細紋薄影是為蛇退皮果若遺蛻粘附之形其西扳隙而上則明忩所懸也其忩高懸二十丈峻壁峭立而多側㾗錯鍔緣之上躋則其門擴然亦北向而出縱橫各三丈餘外臨危坡上倚峭壁即在水洞之東但上下懸絶耳門內正對矗立之柱柱之西南即橋門中透之上層也余既躋明忩旋下觀懸龍蛇脫仍由䂬橋下出飯于洞門石上石乃所鐫詩碑遊人取以為臺以供飲饌其詩乃張渙沈思充者詩不甚佳而渙字極遒活可愛鐫碑欲垂久逺而為供飲之具將磨漶不保矣亟出紙筆録之仍入內洞欲一登䂬橋上層而崖壁懸峭三上三却再後仍登明忩東南援矗柱之腋透出柱南平視䂬橋之背甚坦而近但懸壁無㾗上下俱無扳踐咫尺難度于是復下而出洞日已下舂因解衣浴洞口溪石間半載夙垢以勝流浣濯之甚快也既而拂拭登途忽聞崖上歌笑聲疑洞中何忽有人回矚之乃明忩外東崖峭絶處似有人影冉冉余曰此山靈招我不可失也先是余聞水洞之上有梵龕及至索之無有從明忩外東眺層崖危聳心異之亦不見有扳緣之跡及出水洞覓路旁有小徑隱現伏草間又似上躋明忩者以為此間乃斷崖絶磴耳不意聞聲發閟亟回杖上躋始向明忩之下旋轉而東拾級數十層復躋危崖之根則裂竅成門其門亦北向內高二丈餘深亦如之左有旁穴前透多裂隙垂楞僧以石窒之為室右有峭峽後坼上頗氤氲盤結而峻不可登洞中有金仙三像一僧栖其間故遊者擕樽罍就酌于此非其聲余將茫茫返城不復知水洞之外復有此洞矣酌者僕從甚都想必王翰林子弟豫過眺而過之下山循溪溯流二里有大道即南門橋遂從南門入躡山坡北行城中荒敝甚草舍離離不復成行東下為州署門廨無一完者皆安酋叛時城破鞠為丘莽至今未復也出北門還抵逆旅是晚覓夫不得臥按君是早反轅矣初四日覓夫不得候于逆旅稍散步北寺惟有空樓層閣而寂無人焉乃搆而未就者還悶悶而臥初五日仍不得夫平明微雨既止而雲油然四布是日為端午市多鬻蒲艾者雄黃為此中所出然亦不見巨塊市有肉而無魚余悶坐逆旅囊中錢盡不能沽濁醪解愁回想昔年雉山之樂已分霄壤初六日夜雨逹旦夫仍不得既午遇金重甫者麻城人也賈而儒索觀豫諸公手卷為豫遍覓夫竟無至者初七日囊錢日罄而夫不可得日復一日不免悶悶是日金重甫言將往荆州余為作書寄式圍叔下午彼以酒資奉雖甚鮮而意自可歆初八日候夫雖有至者而惡主代為掯價即符也錢為所竊去力阻以去下午得騎亦重價定之無可奈何也余所遇惡人如衡陽劫盜狗場拐徒併此寓竊錢去者共三番矣此寓所竊初疑為騎夫後乃知為符主也人之無良如此夫劫盜拐徒無論如南寧梁冲宇寶檀僧矣併此人俱有害人之心豫以萬里一身脫其虎口亦幸初九日平明以行李付騎别金重甫乃行是早雲氣穠郁從普安北門外第一溪橋北循西峽入過稅司前漸轉西南皆溯小溪西岸行西山崇隆小瀑屢屢從山巔懸注南五里始西南登坡是為雲南坡初二里稍夷又一里半甚峻過一脊而西復上坳共一里為馬鞍嶺越而西遂循嶺西向西南行于是升降在嶺頭盤折皆西南俱不甚高深五里稍降塢中為坳子哨先是每處有打哨之苦此為第一哨今才奉憲禁并于一處過無問者又南越一坳大雨淋漓仍前升降大峯之西冒雨又十五里而至海子鋪山塢稍開頗大中有水塘即所謂海子也有小城在其南是為中火鋪普安草二哨俱于此并取哨錢過者苦焉先各哨分取今并取於此哨目止勒索駝馬擔夫見余輩亦不甚阻撓余乃入城飯于市復出南門南向登山五里遇駝馬方牧于山坡雨復大至余乃先行升降高下俱依東大山而南兩旁多眢井墜坑不辨水從何出又五里為大河鋪有水自鋪東平㵼坡下漫流峽中路隨之而南天乃大霽忽雲破峰露見西南有山甚高土人云為黑山雲氣籠罩時露一班直上與天齊望而趨五里大河之水已漸墜深塹似從西北坼峽去路東南緣嶺透峽東下則山環塢合間中窪為塘水滿其中而四靣皆高不知出處又東透坳下塢間又復窪而成塘與前雖有高下而瀦水莫泄同之又東緣南峯而轉越其東則東塢大開深盤逺錯千塍環壑于下度其地在丹霞山南山嵐洞西南余謂壑底水即北透山嵐者徴之土人云西峯下有入水洞水墜穴去不知所出從西峯稍下共五里是為何郎鋪越鋪南又上嶺仍依東嶺行回望雲籠高峯已在西北時出時沒興雲釀雨皆其所為雖山中雨候不齊而衆山惟瞻其馬首者循東嶺南下峽中有溪自南而來溯之行其東岸共五里路忽由水渡西岸而暴雨漲流深湧莫能越方欲解衣赴之忽東山之上有呼者戒莫渡招豫東上嶺行余從之遂從莽棘中上東嶺已得微道隨之南二里得北來大道果從東嶺上降者蓋涉溪者乃西道從嶺者乃東道水涸則從西水漲則從東也西流之中有一線深坑涸時橫板以渡兹漲沒無影非其人遙呼幾不免憑河之險矣從東嶺下一里則大道西瀕溪道中水漫數寸仍揭而溯之一里有石梁跨溪上其溪自西南抵東山之麓至是橫折而西從梁下抵西山之麓乃轉北去蓋其源發于西南火燒鋪西分水嶺按志分水嶺在普安西南百二十里即此北流經此又北抵黑山何郎之南不知所泄即土人亦莫能悉也石梁西麓有穴紛駢縱橫如亦字故名其地曰亦字孔今訛為亦資孔乃土音之溷也梁南半里即為亦字孔驛有城倚西山下而水繞其東焉比至雷雨大作宿于西門內周鋪記游太華山出省城西南二里下舟兩岸平疇夾水十里田盡萑葦滿澤舟行深緑間不復知為滇池巨流是為草海草間舟道甚狹遙望西山繞臂東出削崖排空則羅漢寺也又西十五里抵高嶢乃捨舟登陸高嶢者西山中遜處也南北山皆環而東出中獨西遜水亦逼之有數百家倚山臨水為迤西大道北上有傅園西上五里為碧雞關即大道臨安寧州者由高嶢南上為楊太史祠祠南至華亭太華盡于羅漢即碧雞山南突為重崖者蓋碧雞山自西北亘東南進耳諸峯由西南亘東北兩山相接即西山中遜處故大道從之上置關高嶢實當水埠焉南一里飯太史祠又南過一村乃西南上山共三里山半得華亭寺寺東向後倚危峯草海臨其前由寺南側門出循寺南西上南踰支隴入腋共二里東南升嶺嶺界華亭太華兩寺中而東突者南踰嶺西折入腋凑間上為危峯下盤深谷太華則高峙谷東與行處平對然路必窮極西腋後乃東轉出腋中懸流兩𣲖墜石窟幽峭險仄不行此徑不見也轉峽又東盤山嘴共一里俯瞰一寺在下壑乃太平寺也又南一里抵太華寺亦東向殿前夾墀皆山茶南一株尤巨異前廊南穿廡入閣東向瞰海然此處所望猶止及草海若濙濙浩蕩觀當更在羅漢寺南也遂出南側門稍南下循塢西入又東轉一里半南踰嶺嶺自西峰最高處東垂下有大道直上為登嶺道截之東南下復南轉遇石峰嶙峋南擁輒從其北東向墜土坑下共一里又西行叢石中一里復上躡崖端盤崖而南見南崖上下如峰房燕窩纍纍欲墜者皆羅漢寺南北菴也披石隙稍下一里抵北菴已出文殊岩上始得正道由此南下為羅漢寺正殿由此南上為朝天橋橋架斷崖間上下皆嵌崖此復嶄崖中墜橋渡而南即為靈官殿門北向臨橋由殿東側門下扳崖躡峻愈上愈竒而樓供純陽而殿供元帝而閣供玉皇而宫名抱一皆東向臨海嵌懸崖間每上數十丈得斗大平崖輒杙空駕隙成之故諸殿俱不崇巨而㸃雲綴石互為披映至此始擴然全收水海之勝南崖有亭前突北崖橫倚樓樓前高柏一株撐空漾翠並樓而坐如坐桅檣上不復有崖石下藉也抱一宫南削崖上杙木棧穿石穴棧懸崖樹穴透崖隙皆極險峭度隙有小樓粘石端寢龕炊灶皆具北菴景至此而極返下朝天橋謁羅漢正殿殿後崖高百仞崖南轉折間泉一方停崖麓乃朝天橋迸縫而下者曰勺冷泉南踰泉即東南折其上崖更崇列中止瀠坪一縷若腰帶下悉隤阪崩崖直插海底坪間梵宇仙宫雷神廟三佛殿夀佛殿關帝殿張仙祠真武宫次第連綴真武宫之上崖愈傑竦昔梁王避暑於此又名避暑臺為南菴盡處上即穴石小樓也更南則菴盡而崖不盡穹壁覆雲重崖拓而更合南絶壁下有漪蘭閣址還至正殿東向出山門凡八折下二里抵山麓有村氓數十家俱網為業村南即龍王堂前臨水海由其後南循南崖麓村盡波連崖勢愈出上已過漪蘭舊址南壁愈拓削一去五里黃石㾗掛壁下土人名為掛榜山再南則回崖突嘴巨石壘空嵌水折成壆南復分接屏壁雄峭不若前而兀特離竒又開異境三里下瞰海涯舟出沒石隙中有結茅南涯側者亟懸仄徑下得金線泉泉自西山透腹出外分三門大僅如盎中空洞悉巨石嵌仄不可入水由盎門出分注海海中細魚溯流入洞是名金線魚魚大不踰四寸中腴脂首尾金一縷如線為滇池珍味泉北半里有大石洞洞門東瞰大海即在大道下崖傾莫可墜必迂其南始得逶迤入即前所望石中小舟出沒處也門內石質玲透裂隙森柱俱當明處南入數丈輒暗覔炬更南洞愈崇拓共一里始轉而分東西向東上三丈止西入窈窕莫極懼火炬不給乃出上山返抱一宫問山頂黑龍池道須北向太華中乃南轉然池實在山南金線泉絶頂以此地崖崇石峻非扳援可至耳余輒從危崖歷隙上壁雖峭石峯多稜懸躍無不如意壁紋瓊葩瑶莖千容萬變皆目所未收素習者惟牡丹枝葉離披布滿石隙為此地絶遘乃結子垂垂外緑中紅又余地所未見土人以高逺莫知採鍳第曰山間野藥不辨何物也扳躋里餘遂躡巔則石蕚鱗鱗若出水青蓮平散竟地峰端漸側鍔而南惟西南一峯最高行峰頂四里凌其上為碧雞絶頂頂南石蕚駢叢南墜又起一突峰高少遜之乃南盡海口山也絶頂東下二里已臨金線泉之上乃於聳崖間觀黑龍池而下記滇中花木滇中花木皆竒而山茶山鵑為最山茶花大逾碗攢合成毬有分心卷邊軟枝者為第一省城推重者城外太華寺城中張石夫所居朵紅樓樓前一株挺立三丈餘一株盤垂幾及半畝垂者重枝密幹下覆及地所謂柔枝也又為分心大紅遂為滇城冠山鵑一花具五色花大如山茶聞一路迤西莫盛于大理永昌境花紅形與吾地同但家食時疑色不稱名至此則實有紅艷果不减花也記遊顔洞臨安府顔洞凡三為典史顔姓者所開名最著余一至滇省每飯未嘗忘巨鹿也遂由省中南過通海縣遊縣南之秀山上一里半為灝穹宫宫前巨山茶二株曰紅雲殿宫建自萬厯初距今才六十年山茶樹遂冠南土又南抵臨安府城南臨瀘江此江西自石屏州異龍湖來東北穿出顔洞而合郡衆水亦以此洞為泄水穴也于是覓一𨗳遊者于城東接待寺顔洞大道當循城而南度瀘江橋𨗳首從寺前隔江東北小路行遂不得渡瀘江東觀三溪㑹合處由寺北循塘岸東行塘東皆紅蓮覆地密不見水東北十五里度賽公橋水自西北來東南入瀘又五里上山為金雞哨哨南瀘江㑹諸水由此東入峽峽逼甚水傾東抵洞口尚里餘望洞頂石崖雙壁如門對峙洞正透其下重岡回夾之不可得見求土人𨗳入皆曰水漲流急此非遊時若兩月前水涸可不橋而入今即有橋亦不能况無橋耶橋非一處每洞中水深處輒架木以渡往例按君來遊架橋費且百金他費亦百金土人苦之乘普酋兵變託言洞東即阿迷境叛人嘗出沒此遂絶官長遊洞者余必欲一至洞門土人曰須渡江南岸隨峽入所謂瀘江橋大道也始悔為𨗳者誤乃舍水洞覓南明萬象二陸洞從稍東下坡復上山登頂東瞰峽江環峽東入洞門即在東峽下豫所登山處正與其上雙崖平對門猶為曲掩但見峭崖西向湧水東傾搗穴吞流之勢已無隱形矣東北三里踰嶺脊下山二里則極東石壁危聳如環半城下開洞門北向余知有異從之直下一里抵峽中又一里半抵東壁下稍南上洞門廓然上大書雲津洞蓋水洞中門也遊顔洞以雲津為竒從前門架橋入出後門約四五里暗中傍水行中忽闢門延景其上又絶壁為環故自竒絶余不能入其前洞而得之重崿絶巘間且但知萬象南明不復知有雲津也誠出于意外遂瞰洞而下洞底水從西南穴中來盤門內而東復入東南穴去余下臨水湄徑之水濶三丈洞高五六丈而東西當門透明處徑可二十丈但水所出入直逼外壁故非橋莫行出水西穴漸暗不可逺窺東為水穴處稍旁拓隔水眺之中垂列乳柱繽紛窈窕復上出洞外上眺東南北三靣俱環壁無可上仍西出舊道北上山東一里踰嶺已陟東壁回環上嶺塢中東向一里其地南北各起層峰石崖時突萬象洞即在北崖上乃𨗳者妄謂在南崖下直下者一里抵南崖一洞東向高四丈水從中湧出兩崖角起前對為峽水出洞破峽勢極雄壯蓋水洞後門也又東二里抵老鼠村問諸途人云萬象洞在西北嶺上即前所從下山處洞甚深歷降而下底與水洞通余欲更至洞門晚色已合去宿館尚十里念此三洞慕之數十年趨走萬里乃至而叛夷阻之陽侯隔之太陽促之𨗳人又誤之生平遊屐斯為最厄矣徐霞客逰記卷五下

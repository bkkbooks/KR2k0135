body:
  text: 徐霞客遊記卷十一上明徐宏祖撰西南遊日記十九雲南己卯五月初一日晨起店主人言自往尖山後叅府呉公屢令把總來候余不知其因已而呉公令把總持名帖道意余出觀街子因往晤潘㨗余㨗余宴買寳舎人留余同事余辭之入城謁恭府一見輙把臂入林欵禮頗至是日其子将反故鄉内簡拾行囊余辭之出初二日余止寓中雲嵐山即尖山師法界來顧州庠彦李虎變昆玉來頋李居綺羅初三日恭府來候宴已觀音寺天衣師令其徒來候余以叅府有前期辭之上午赴叅府招所陳多臘味以斷屠故也臘味中始食竹鼯下午别醉後過萬夀寺拜法界不在出西門半里過凌雲橋乂西半里由玉泉池南堰上西山麓則觀音寺在焉寺東向臨玉泉池寺南有古刹並列即玉泉寺矣天衣拜經觀音寺三年不出一見喜甚留予宿予辭以他日啜其豆漿粥而返已昏黒矣初四日叅府令門役以州志至方展卷而李君來候時微雨遂與之連騎由來鳯山東麓循之南六里抵綺羅入叩李君家綺羅志作矣羅其村頗盛西倚來鳯山南瞰水尾山當兩山夾凑間盖羅漢冲之水流經大洞長洞二小阜間北曲而注於平塢乃分為二流北為飲馬河而抵城東南為綺羅水而逼南山下又西逼來鳯東南麓乃南搗兩山夾間是村綰其谷口竹樹扶踈田壑紆錯亦一幽境云是夜宿李君家初五日晨飡後即從李君循南山之麓東向行先半里過水應寺又東二里兩踰南山北下之支有寺在東峽中北向峙即天應寺也其後即羅生主峯仰之甚峻志稱其條崗分布不誣也又東北上一北下之支隨之北下共一里崗東盡處竹木深密緑䕃襲人披映心目其前復起一圓阜立平疇中是為團山與此崗斷而復續崗東村廬連絡從竹中下一老人迎入其廬具臘肉火酒獻是日正端午而老人與李君有交遂入而哺之既午復東向循南山行半里其北復起一長阜如半月横扵前是為長洞山又東二里遂入山峽有溪中貫而出是為羅漢溪南北皆有村夾峙峽口由南村溯溪而東又二里越溪之北有大路倚北山下乃東踰嶺趨猛連者從其北塢中覓温泉其泉不熱而温流不急而平一大石突畦間水滙其旁淺不成浴東山有大洞温泉為八景之一即在其北嶺峽中與此隔一支嶺踰而北頗近而李君急於還家即𨗳余從大路西出二里過溪南村出峽口隨溪西行一里過一橋從溪南又西一里過長洞北麓北望大洞之阜夾溪而峙予浴趨之浴其温泉李君謂泉在東峽中其入尚逺遂强余還又西一里過團山北麓又西三里而還李君家初六日晨飯令顧僕擕臥具為楊廣哨之遊先是李君為予言此地東南由羅漢冲入二百里有滃吕山東南由羅生四十里有馬鹿塘皆有峰巒可觀乃先其近者計可從琉黄塘半箇山而轉也東三里從水應天應二寺之間南向上山愈上愈峻七里登其絶頂北瞰即天應寺懸其坑麓由州塢而北惟巃嵸山與之對峙焉西瞰則旁峽分趨若贅旒皆下墜於綺羅南向之峽有龍井出其下焉惟東眺則本峰頡頏而南眺則濃霧瀰淪若以山脊為界咫尺不可見于是南從嶺上盤峽俱行氤氲中茫若蹈海半里南下下二里餘山半復環一壑其脊自東南圍抱而西中藏圓塢有小水西去其内霧影稍開而雨色漸逼雖近睹其田塍而不免罹其沾濕矣復上南坡躡坡脊而南五里一岐隨脊而西南一岐墜坡而東北余漫從脊上直南已而路漸東下而窮二里有村倚東坡下披霧就詢之乃清水屯也屯人指予從坡北東下當得大路從之半里東北渉一坑甚深霧影中窺其東南旋壑下盤當時不知其所出何向後乃知其南界高峰反西自竹家屯而東突為陳播箕哨也復東北上坡半里見有路東向下輙隨之行不意馬鹿塘正道尚在其北霧漫不辨踉蹌東下一里有峽自北而南溪流貫之有田塍嵌其底而絶無人居塍中挿禾已遍亦無一人抵塍而路絶塍狹如絲以杖拄畦中東行抵溪而溪兩岸蒙翳不可渡復還依西坡南向一里得小徑渡溪東上一里路伏草間復若斷若續然其上甚峻三里東向登嶺頭復從嶺上東南再陟一嶺半里始見嶺北有岰自北南度中伏再起岰北有路自崩崖北嶺東行南亦有微路自崩崖南嶺東上而岰中獨無北交之路予遂循崖南路上東一里路為崩崖所墜復岐而南再陟南嶺半里復東行嶺脊二里始有南來之路偕之東北瞰崩崖下䧟東向成坑箐木深翳又東半里再陟東嶺嶺乃南去微徑始東北下坡曲折連下三里余以為将及北坑之底隨之出即馬鹿塘矣孰知一坡中環路岐而東西繞之未幾遂絶皆深茅叢棘坑嵌其下甚深余始從其南不得道轉而東復不得道往返躑躅遍索乆之復從南坡下得微徑下一里餘而東抵坑底則坑中有水潺潺自崩崖東南流坑兩旁俱峭崖密翳全無路影而坑底甚平水流亂礫間時有平沙瀠之遂隨之行或東或南仰眺甚逼而終絶路影三里稍開俯見瀠砂之上虎跡甚明累累如初印隨之又東南一里有小溪自西南來注有路影南縁之始舎坑而南陟坡一里越其上予意将越坡東下而路反從坡脊南行余心知其誤然其路漸大時亦漸暮以為從大道即不得馬鹿塘庻可得棲宿之所乃躡脊西馳二里見西峰頂有峰特倚如覆鐘大道從此分岐一自東南坡下而上一向西北峯頂而趨一從西南盤壑而行未審所從姑解所擕飯啖之予計上下二徑其去人必逺不若從盤壑者中行于是又東南三里遂墜坡而下漸聞人聲下里餘得茅二龕在峽間投之隘鄙不堪宿望南坡上有數龕乃下陟深坑扳峻而上共一里而入其龕則架竹為巢下畜牛豕而上托㸑臥儼與粤西無異屈指自南丹去此至今已十五閲月乃復遇之西陲其中數千里所不及也自登崩崖之脊即望見高黎貢南亘之支屏列扵東下有深峽而莫見龍川意嵌其下也又西南二十里下至所宿之坡下瞰南峽甚深即與高黎貢遥夾者意即南甸所托而龍江從此去也時霧黒莫辨方隅而村人不通漢語不能分柝微奥即徴其地名據云為鳯田總府莊南至羅卜思莊一日餘東北至馬鹿塘二十餘里然無確據夜以所擕米煮粥啜之而臥初七日隂雨飯後姑止不行已而村人言天且大霽余乃謀所行念馬鹿塘在東北硫黄塘在西北北山之脊昨已踰而來西山之脊尚未之陟不若舎馬鹿而踰西脊以趨硫黄塘且其地抵州之境以硫黄塘為正道遂從之土人指余從村後西北向大山行余悞由直北一里餘下渉一澗溯之北上坡一里又下渉澗其䖏一澗又溯之北上坡半里路復分岐一向北峽一向西峽皆盤其上坡余從其北峽者二里路漸湮已北下則其澗亦自西來横塹於前雖小而頗深籐箐䝉翳雨霧淋漓遂不能入乃復出至岐口轉向西峽一里路亦漸湮復出從岐口南渉其澗從澗南又得一岐西上其路甚微一里北踰一坡又北一里即崩崖西對之坡也其上皆墾崖而非通道躡之行一里上西頂頂高雲黒莫知所從計返下山二里轉南漸有徑下眺鳯田所宿處相距止二三里更南半里得大道西去遂從之西循北山行一里得耕者在坡下問之始知其上有小寨名擺圖即從楊廣哨入州正道矣乃亟西北上躡坡一里有二茅當峽坪間是為擺圖寨由寨後更躡峻而北半里登崗西望盤壑下開水田漠漠有溪流貫其中復有崇山外峙其南又起一崇山横接而南交接之中似有水中貫而去又北上一里半遂凌大脊北下廻峽中半里有村廬倚南坡為楊廣哨從此西北下峽底一里有小溪自東北墜西南其嵌甚深乃從昨所度崩崖南嶺分墜而成者渉之西北上渡一里而躋其脊余以為即從此縁脊上北大峯矣孰意猶中界之支也半里越脊又即北下峽底一里有大溪自北南墜皆從石崖中破壁而去此即清水朗東溪也水嵌峽底甚逼横獨木渡其上予舎木下渉水即西北上坡始循崖石繼躡隴脊一里轉而東北上又里餘躋峰頭由峯頭西盤半里隨峽北行其峽頗平行其中一里當其東西分峽處有村廬倚其中為陳播箕哨從哨北即西北下二里循南山而西一里有村廬當坡為竹家寨由寨東向北行寨後復起一峰有峽横其中路分為二循北峯直去為騰越南甸大道穿北峯南峽而西為硫黄塘道予舎大道從横峽西行半里忽墜峽西下其峽甚逼而下甚峻墜級歴坎與水争隘一里望見西峽自北而南一溪貫其中即綺羅村之水挾水尾山西峽而南山者溪西之山㟮屼南踞是為半箇山又西下半里直抵溪上有二塘在東崖之下乃温水之小者其北崖之下有數家居焉為硫黄塘村有橋架溪上余訊大塘之出硫黄䖏土人指在南峽中乃從橋南下流渉溪而西隨山西南行時風雨大至田塍􅉸隘余躑躅南行半里得徑又南一里則西山南迸南有峽注大溪遥望其峽中蒸騰之氣東西數䖏鬰然勃發如濃烟捲霧東瀕大溪西貫山峽先趨其近溪煙勢獨大者則一池大四五畝中窪如釡水貯扵中止及其半其色渾白從下沸騰作滚湧之状而勢更厲沸泡大如彈丸百枚齊躍而有聲其中高且尺餘亦異觀也時雨勢甚大持傘觀其上不敢以身試也其東大溪從南下環山南而西合於大盈西峽小溪從熱池南東注大溪小溪流水中亦有生氣勃勃而池中之水則止而不流與溪無與也溯小溪西上半里坡間煙勢更大見石坡平突東北開一穴如仰口而張其上齶其中下管如喉水與氣從中噴出如有爐槖鼓風煽熖於下水一沸躍一停伏作呼吸状躍出之勢風水交廹噴若發機聲如吼虎其高數尺墜澗下流猶熱若探湯或躍時風從中捲水輙旁射人於數尺外飛沫猶爍人靣也余欲俯窺喉中為水所射不能近其齦齶之上則硫黄環染之其東數歩鑿引水上覆一小茅中置桶養哨想有礦之地即有哨也又北上坡百歩坡間烟勢復大環崖之下平沙一圍中有孔數百沸水叢躍亦如數十人鼓煽於下者環沙四圍其水雖小而熱四旁之沙亦熱久立不能停足也其上烟湧處雖多而勢皆不及此三者有人将沙圓堆如覆釡亦引小水四週之雖有小氣而沙不熱以傘柄戳入深一二尺其中沙有磺色而亦無熱氣從戳孔出此皆人之釀黄者時雨勢不止見其上有路直臨西嶺知此為半箇山道遂凌雨躡崖其崖皆堆雲駢瓣㟏岈嵌空或下陷上連或旁通側裂人從其上行熱氣從下出皆迸削之餘骨崩墜之剥膚也所云半箇之稱豈以此耶躡崖半里從南循嶺西上一里漸隨峽轉南則其峽自南嶺頭墜中有水懸而為瀑作兩叠北下即峽水之上也又上半里遂西踰瀑布之上復從峽西更西南上一里漸轉而西半里見大道盤西崖墜處出南岰去小徑則西上峯頂漸轉北行盖此即半箇山之頂至此南下為岰入城之路當在其東北不應西去遂從小道西上半里隨峯東向北行二里乃西北下得竹塢村廬時雨盛避雨廬中就火沸湯㵸飯而食之即半箇山村也由村東下坡隨峽東行里餘與南來大道合隨西山北轉而行二里復陟東突之坡行坡峽中五里稍下又一里而綺羅村在東坡下矣時已薄暮遂舎入州大路東一里餘宿李虎變家煑竹鼯相待初八日大雨不成行坐李君齋頭作田署州期政四謡應李君命也初九日雨不止既午稍霽遂同李君眹騎由村西半里横陟半箇山南甸大路經南草塲半里西上嶺坡乃來鳯南度半箇山之脊也來鳯至是南降而下伏脊間中窪為平塘而不受水窪之西為金銀堆即南度之脊窪北半里有坪倚來鳯而南瞰半箇山乃昔王尚書驥駐營之處陟坪北有路横沿來鳯峯南西越金銀堆出芭蕉闗從此復轉騎循來鳯東峯而北八里還官店晩復雨十一日雨不止坐官店上午李君來下午雨少止濘甚躧泥往潘生家不遇以書促其為予買物亦不答潘生一桂雖青衿而走緬甸家多𬗟貨時倪按君命承差來覓碧玉潘甚苦之故屡避客十二日終日雨注不止予坐店中李生以期四謡私投署州田二府不答十三日雨時作時止而泥濘尤甚李生來邀予同往蘓𤣥玉寓觀玉蘓滇姓人也本青衿棄文就戎為呉叅府幕客先是一見顧余余亦目其有異非風塵中人也蘓有碧玉皆為簪但色太沉予擇四枝擕寓中後為李生强余還之十四日至十八日連雨不止坐寓中不能移一歩潘㨗余以倪院承差索碧玉寳石窘甚屢促不過余寓亦不敢以一物示人遺余翠生石二蘇答茶以方環叅戎惠贐更索其八闗并三宣六慰諸圖余一一抄録之數日無暇刻遂不知在雨中并在寓中也十九日晨雨少止覓擔夫既而雨復作上午止而行由東街始濘甚已而漸燥二里居廬乃盡乃坡行塍中半里連越二小橋皆自東南來又二里為雷打田有數家東向從其前轉而東行一里又過一小亭橋其流亦自東南向西北者又東一里抵東坡下停担於酒家問大洞温泉道土人指在東南山坳中此去尚有數里時天色已霽令擔夫與顧行待其家余循東山而南二里過土主廟廟倚山西向前二栢巨甚南二里路岐為二一南循山麓為黄坡道一東南上坡為趨温泉道乃從坡上者南一里登坡嘴西瞰山麓有泉西向溢扵下即黄之發源䖏也于是東轉有路頗大横越之就其東南小徑一里漸上坡折而東北睨温泉之峽當在其南尚隔一岸遂與之俱返一里下至茅塞之峽指予南去予從之横蹈峽中既漸得小徑半里忽有峽從足下下墜而西其上石崖駢突如門從其東又南半里踰坡而下其峽始大有水淙淙流其中田塍交瀠之即大洞村之後峽有大道從峽中東上又南下半里從之東半里上一坡大道東北上亦芹菜塘道乃從坡東南下半里及溪又東溯溪半里則溪流奔沸盤石中右一崖突而臨之崖下就石為池而温泉滙焉其池與溪同峽而水不闗溪流也崖石叠覆如累碁其下凑環三面成一小孔可容一人坐浴其後倒覆之石兩片下墜而中劃如所謂試劍石水從片夾中淙淙下注此温泉之源也孔之中水不甚熱正可著體但其上少一亭覆之不免風雨之慮耳時池上有婦十餘人共浴余恐其旁有石洞姑遍覓之不得乃還浴池中三里隨山之西嘴抵黄坡轉北一里過麓間溢水之上北三里乃入來時分岐䖏又西北五里至矣比坡之麓促擔夫行以晩辭遂止二十日晨起飯而登坡雨色復來平上二里峻上八里抵嶺頭又平上四里稍下一里過芹菜塘復東上坡半里而下半里過木厰又下二里過北下之峽又東上三里至坡脊平行脊間一里至永安哨又東南半里踰嶺脊而下一里有水自北而南路從之半里乃東越坡平行脊上三里至甘露寺飯從寺東下三里至赤土舖橋其下水自南而北即大盈江也一統志謂大盈之源出自赤土其言不謬橋東復上半里有四五家當坡岰為赤土舖舖東又上半里從嶺脊東南行一里有岐南去為猛栁道余仍東南三里乃東下又十里止橄㰖坡時纔午雨時止時下遂止不前二十一日平明起飯自橄欖坡東下五里抵龍川江西岸過廵檢司即下度橋西岸峻若堵墻乃循岸北向叠級始達橋橋東有閣登之可眺江流夭矯之勢又南向隨東岸行半里東向平上者一里餘始曲折峻上五里過茶房僧舎已無一人又峻上三里過竹笆舖又上七里飯於小歇塲又上五里過太平舖又平行入塢二里有水自北澗來渉之遂東上其上愈峻兩旁皆竹石深翳而風雨西來一天俱漫于是行雨浪中三里踰最高之嶺乃屢上屢下屢脊屢岰皆從密箐中行七里抵新安哨兩三家夾嶺頭皆以劈籐竹為業時衣透寒甚就其家燒薪烘之又二里抵分水闗有五六家當闗之東就火炙衣貰燒酒飲四五盃乃行天色大霽路磴俱慘乃知闗名分水實分隂晴也于是東向下者八里始就東行之脊又二里過蒲滿哨又平行嶺上東十五里宿於磨盤石之盧姓家有小房五六處頗潔二十二日平明飯而行其下甚峻曲折下者六里及嶺北之澗是嶺自蒲滿哨分支東突左右俱有深峽夾流來時從南峽之上行至此墜北峽之口過渉北澗又越北嶺東突之嘴共一里而過八灣東向平行坡間十二里抵江則怒流奔騰勢倍於來時矣乃坐巨樹下待舟觀洪流洶湧渡者紛紜不啻從壁上觀也候乆之渡而東上坡三里抵北山之麓循坡東行五里踰南下之嘴得一橋跨澗是為箐口于是渡澗入峽循澗南崖東向上二里過一碑即來時所見盤蛇谷碑也又東三里過一西來枯澗又二里南折而北乃踰其北突之嘴而東遂東南漸上其峽遂曲折掩蔽始不能西見髙黎貢峰矣又南六里抵楊栁灣而飯乃踰南來之峽溯東來之流上二里有橋跨澗西度從澗西溯箐上又一里為打板箐有數十家當澗西又東北四里過平度之脊即從冷水箐西度蒲縹又北過此夾蒲縹之水北出而入潞江者也是日熱甚得一䕃輙止而延颼數息樹邊不復問之逺近矣過脊東下一里止落馬厰時纔下午以熱甚擔夫不前也二十三日平明從落馬厰東行三里踰東突之山嘴而南又一里有一菴倚西山之上又南四里過石子哨始南下二里望有温泉在東山下乃從岐東南下二里轉而北渉北流之澗又半里東從石山之嘴得温泉焉其水温而不熱渾而不澄然無氣熖可浴浴乆之從澗東溯流二里抵蒲縹之東村蒲人縹人乃永昌九蠻中之二種以擔夫不肯前逗留乆之乃東二里上坡五里迤邐上峰頭又平行嶺夾一里稍東下有亭橋跨峽間風雨大至而擔夫尚後坐亭橋乆之過午始行又東南上坡踰坡一重轉而北又踰坡一重共六里過孔雀寺又東上坡五里直躡東峰南突之頂此頂自北而南從此平墜度為峽一崗西迤乃復起為崖度為蒲縹後山北去而夾蒲縹之澗南去而盡扳枝花者也又東一里稍上復盤一南突之嘴漸轉而北二里有公館踞崗頭乃北下一里止扵冷水舖箐時方下午以擔不能前遂止見邸榻旁有臥而呻吟者乃前途為刼盗所傷還臥於此被刼之處去此纔六里日纔過午盜即縱横可畏也二十四日雨復達旦但不甚大平明飯而行隨東行之箐上其北坡三里循嘴北轉二里漸下一里下至岰即昨被刼之商遇難處也其北叢山夾立穿其峽行三里再過一東突之坡其水始北下隨之北二里下至岰窪中乃東轉而上一里過岰子舖覓火把為芭蕉洞逰計又東半里過崗頭窪池遂轉北下三里越一坡脊過窪中滙水之崖崖石上挿而水蓄崖底四靣俱峻水無從出而甚渾由其南再越脊而下一里至芭蕉洞乃候火於洞門擔夫摘洞口黑菓來啖此真覆盆子也其色紅熟則黒而可食比前去時所鬻黄果形同而色異其熟亦異其功用當亦不同也黄者非覆盆覆盆補腎變白為黑則為此果無疑火至燃炬入洞始北向即轉東下四丈餘至向所入昏黒處即轉北向其下已平兩崖愈狹而愈高六七丈更寛崇一柱中懸大如覆鐘擊之聲鋐鋐然其䖏不特此懸石有聲即洞底頓足輙成應響盖其下亦空也又入五六丈兩崖石色有垂溜成白者以火燭之以手摩之石不潤而燥紋甚細而晶土人言二月間石發潤而紋愈皎茁謂之開花洞名石花以此石花名頗佳而志稱芭蕉不如方言之妙也更北路盡由西腋透隙入復小如門五丈有圓石三叠如幢盖下垂又如大芝菌而三級累之者從其下復轉而北其中復穹然宏聳又五六丈西北路盡洞分兩岐一南上環為曲室三丈而止一北入降為墜道七丈而止是洞曲折而旁竇不多宛轉而底平不汚故㳺者不畏深入使中有通明之處則更令人恍然矣出至向所入昏黑北轉處今已通明見直東又一岐入有柱中間之以餘炬入探其中亦穹然六七丈而止出從洞門外以餘炬入探西崖間小竇其竇北向懸壁間門甚隘中亦狹而深有氣撲人乃舎之出洞下百餘歩抵坑峽下觀水洞水洞者即此洞之下層也雖懸數丈寔當一所前中入有聲已知其下皆空矣洞前亦東向稍入曲而自北來與上洞同一格但水溢其中不能進也由此東折而北一里抵臥獅窩村飯於村婦家北三里過一村即東上堤為大海子隨海子南堤東行二里下堤又東一里為沙河橋其橋五鞏名衆安橋越橋東即從岐西北循山行二里過胡家坆為正統間指揮使胡琛墓墓有穹碑為王學士英所撰又一碑乃其子名誌者則王翰時撰之坟與吾家梧塍之壠文翰規制頗相似其頹蕪亦相似也其一時崇尚窮徼薄海萬里同風至荆棘銅駝又曠代無異可慨也更循山而北一里上一東盤之嘴于是循崗盤壠甃石引槽分九龍池之水南環坡畔以潤東塢之畦路隨槽堤而北遇有峽東出䖏則甃石架空渡水人與水俱行橋上而橋下之峽反涸也自是竹樹扶疎菓塢聨絡又三里抵龍泉門乃城之西南隅也城外山環寺出有澄塘滙其下是為九龍池由東堤行見山城圍繞間一泓清涵空人心目池北有亭閣臨波迎嵐掬翠㶑灔生輝有坐堤垂釣者得細魚如指亦有就䕃賣漿者惜擔夫急於稅駕遂同入城半里北抵法明寺仍憩㑹真樓而崔君亦至二十五日曉霽崔君來候余飡同入市買琥珀緑䖝又有頋生者崔之友也𨗳往碾玉家欲碾翠生石印池盃子不遇期明晨至二十六日崔頋同碾玉者來以翠生石畀之二印池一盃子碾價一兩五錢盖工價踰於買價矣以石重不便於行故强就之時囊中無銀以麗江銀盃一隻畀頋生易書刀三十柄餘付花工碾石是午工擕酒肴酌於北樓抵晩乃散二十七日坐㑹真樓作紀二十八日花工以解石來示二十九日坐㑹真樓上午往叩閃知愿将取其所留翰扎碑帖閃辭以明日還過潘蓮華家将入晤遇雞足安仁師與丘生同行萬里知已得之意外喜甚遂同予寓坐乆之予亦隨訪其寓下午乃還三十日晨飡後往拜潘即造閃知愿猶不出延入西亭相晤余以安仁逺來其素行不凡且賫有麗江雲薖全集來并求收覽閃公頷之予乃出六月初一日憩㑹真樓初二日出東門度弔橋遂隨之東行田塍中十里至河中村有石橋北來之水分而為二一由橋東南注一遶村西南曲越橋東一里其地中窪而沮洳又一里越崗而東半里抵東山之麓由岐東北二里過大官廟上山曲折甚峻二里半至哀牢寺寺西南向其上崖勢層叠而起即哀牢山也飯於寺由寺後沿上一里轉北行頂崖西半里轉東行頂崖北一里轉南行頂崖東頂崖者石屏高挿峰頭南北起兩角而中平玉泉二孔在平脊上孔如二大履並列中隔寸許而水皆滿而不溢其深尺餘所謂金井也今有樹碑其上者大書為玉泉按玉泉在山下大官廟前亦兩孔而中出比目魚此金井則在山頂有上下之别而碑者頋溷之何也又一碑樹北頂惡哀牢舊名易為安樂焉益無徴矣南一里至頂南一里東南下又一里西南下其處石崖層叠盖西北與哀牢寺平對俱沿崖而倚者也又南下一里為西來大路有茅菴三間倚路旁為茶菴由此東向循峽而入五里過一岰東一里度中窪之宕從嶺上二里盤北突之嘴其北峽底頗見田形于是東南下二里越一峽而東一里東上岡又里餘踰岰南行東上岡始望見南壑中窪其南有峰危聳中立即筆架山之北峯也其峰在郡城東南三十里外西自郡城望之四頂分尖北自此山臨之祗見北垂一峰如天柱從岡上東盤北峯三里降而下窪一里從西稍降始見東山漸豁山岡向東南下始聞水聲復西南下坑其下有田塍當坑底焉已暮欲投之宿乃西南下一里及坑底渡小水復西南半里投宿村家暮雨適來初三日雨不止飯而登途稍霽復南下坑底半里渡坑澗東南上坡一里得北來大路隨之南行岡脊三里其岡在垂塢中遂隨之下一里南行塢中又一里踰一小岰又一里稍下沿塢東行其塢始豁而南向去水從其西南瀕筆架山之北岡亦隨之南折一里踰一小岡而下即閃墓之虎砂也北望有塋當中坡之嘴乃渉壑而登之即閃太史夫人馬氏之塜從墓東半里踰小水抵閃莊莊房當村廬之西時守者他出止㓜童在余待乆之遂從村東問所謂落水坑者其言或逺或近不可方物有指在東北隅者趨之踰岡脊而北二里得一中窪之潭有水嵌其底而四面皆高周廻大百畝而水無從出從窪上循其北而東上坡又里餘其嶺從北而亘南東南接天生橋者為閃莊東障之山余時不知其為天生橋但求落水坑而不得惟望閃莊正東其山屏起下陷如有深穴意此中必有竒勝然已從土人之指而踰其北矣遇二人詢之無解語者遂從東嶺西南下仍抵窪潭之東得南趨之道乃隨之循東嶺而南二里見有峽東自屏山下䧟䖏出峽中無水而聞水聲甚沸乃下見有水西自壑底反東向騰躍而不見下流所出心竒之而不能解乃先溯旱峽遵北嶺東入二里抵下䧟䖏則石崖駢列中夾平底半里峽分兩岐一北向入者峽壁雙駢而底甚平中無滴水如抉塹而入而竟無路影一南向入者東壁甚雄峽底稍隆起而水與路影亦俱絶路則直東躡嶺而上予意在窮崖不在陟岵乃先趨北向峽中底平若嵌中俱茅塞一里再轉南向峽中披茅而入半里東崖突聳路輙縁西崖上俯瞰峽中其南忽平墜而下深嵌數丈東崖突聳之下有洞岈然西向而闢於坑底路從西崖陡下坑中遂莽而入洞洞門高數丈濶丈餘水痕尚濕乃自外入洞中者時雨甫過坑源不長已涸而無流入洞二丈中忽闇然下墜其深不測以石塊擲之乆而跫然若數十丈不止然有聲如止洞底有深如投水中固知其下有水而洞不盡水也出洞南眺其坑亦南夾不知窮極然或高或窪底亦無有平凖乃從舊路北出半里復從大路行峽底半里復隨北嶺小徑二里西抵聞水聲處其坡在閃墓正東二里踰横峽而南有寨數家乃西通山窠南通落水寨總道大道自山窠走天生橋出枯柯順寧即從此寨沿南嶺而入者予時尚不知所入嶺即天生橋也惟亟西下絶壑視西來騰躍之水一里抵壑之懸絶處則水忽透石穴下墜其石皆磊落倚伏故水從西來搗空投隙而赴之當亦東合天生橋之下者也其水即沈家莊西北嶺岰諸水環閃墓閃岡之前又東盤嘴始北曲而東入於此此所謂小落水坑也即土人所謂近者余求之而不得不意過而遇之時已過午遂南越一岡又西下一里仍南渡其水曲復西踰坡一里再至閃莊令顧奴瀹水飱飯既畢其守者一人歸詢所謂天生橋落水洞之道乃知落水有二洞小者近即先所遇者為本塢之水大者逺在東南十里之外乃山窠南道所經為合郡近城諸流又知天生橋非橋也即大落水洞透穴潛行而路乃踰山陟之其山即在正東三里外余隨其指先正東尋天生橋二里至横峽南嶺之寨将由大路入再執土人問之始知前平底峽中東上之坡為天生橋踰之即為枯柯者余乃不復入将南趨落水寨一老人頗解事知予志在山水曰是将求落水洞非求落水寨者此洞非予不能指若至落水寨而後廻則迂折多矣遂引余從寨之後東踰嶺莽蒼無路姑隨之行二里越嶺東下即見一溪西南自落水寨後破石門東出盤曲北來至此嶺東麓即搗入峽峽東即屏山下䧟之南峰與所踰之嶺夾成南北峽水從南入峽懸溜數丈滙為潭東崖忽迸而為門高十餘丈濶僅數尺西向峙潭上水從潭中東搗而入之崆峒不知作何狀也從西崖又縁崖石而北見峽中水雖東入而峽猶北通當即旱峽南或高或窪南出之峽由此亦可北趨西向旱洞固知兩洞南北各峙而洞在一峽中第北無水入而南吸大川耳其中當無不通故前投石有水聲而上以橋名也從西崖俯瞰乆之仍轉南出土老翁欲止予宿余謂日尚早遂别之遵南路可以達郡惟此處猶不得道盖沿大溪而南抵西山峽門即落水寨西越坡溯小溪而西上嶺盤筆架山之南即郡中通枯柯大道余乃西從之沿坡陟塢八里抵西坡下其山北盤為壑而南臨下嵌之澗又西盤西峯南嘴而上三里其上甚峻又平行峰頭二里予以為此筆架南峯矣而孰知尚東出之支也其西復下墜為坑與筆架猶隔一塢乃下渉其坑一里越坑西上始為筆架南垂有數十家倚南崖而居是為山窠當從投宿而路從樹底行不辨居址扳樹叢而上一里遂出村居之後意西路可折而轉既抵西復無還岐竟遵大路西北馳二里餘下渉一澗復西北上一坡二里越坡復下而渉澗共三里又上踰一坡西平向下二里出峽門已暮從昏黒中峻下二里西南渡一溪橋又西北從岐踰坡竟失路躑躅二里餘乃得一寨於坡間是為小寨叩居人遂停行李於側與牛圏為隣出槖中少米為粥以飱而臥初四日其家挿秧忙甚竟不為炊余知之即空腹行以為去城當不及三十里也及西行復逾坡兩重共八里有廬倚山西向而居始下見郡南川子隨坡西向平下五里越一西下小峽又上一西突之岡始逼近西川下瞰川中之水從坡西南環波脚東南抱流而入峽坡之南有堰障之此即清水闗沙河諸水合流而東南至此将入峽東向而入落水寨者也于是東北一里餘下至坡麓循嘴北轉半里始舎山而西北行平陸間二里餘西及大溪有巨木橋横其上西渡之西北復行川間屢過川中村落十六里而及城之東南隅度一小橋由城南西向行一里半入南門始索麵及饅頭扵市而飽飡焉下午返㑹真樓初五初六日憩㑹真樓初七日閃知愿來顧初八日知愿餽猪羊肉并酒米甚腆初九日閃太史招逰馬園園在龍泉門外期余晨往予先從法明寺過新建太翁祠祠尚未落成倚山東向其南即方忠愍公祠名政征麓川死於江上者亦東向正室三楹俱守者棲止於其中兩廡祀同難者俱傾倒像露坐焉出祠南出龍泉由池東堤上抵池南即折而西入峽半里園臨峽西坡上與龍泉寺相並園之北即峽底也西自九龍山後環夾而來有小水從峽東出僅如線而園中則陂池層滙北一池其地更高水從其底泛珠上溢其池淺而水獨澄映有光從此遂潺潺㵼外池外池中滿芰荷東岸舊有菜根亭乃馬玉麓所建者併中諸榭俱傾圯太史公新得而經始之建一亭於外池南岸北向臨流隔池則龍泉寺之殿閣參差岡其上浮屠倒浸波中而陂池罨映泉源沸漾更竒也盖後峽環夾甚深其水本大及至峽口此園當之峽中之水遂不由溪而沁入地中故溪流如線而從地旁溢如此池與九龍池其滔滔不舎者即後峽溪中之流也余至太史已招其弟知愿相待先同觀後池溢泉遂飯於池南新亭開宴亭中竟日洗盞更酌抵暮乃㪚初十日馬元中劉北有相繼而來皆不遇余往玉工家也隨答拜馬元中并拜俞禹俞錫二君皆沈太翁之婿前於知愿席相㑹而未及拜禹錫原籍蘇州其祖諱彦中辛丑進士中時猶李時彦後復姓俞名彦移居金陵大功坊後其祖父年俱壮閃太翁寓金陵時欲移家南來遂以季女字俞前年太翁沒俞來就婚擬明春偕返云時禹錫不在遂返㑹真十一日禹錫招宴候馬元中併其内叔閃孩識孩心同飲約同逰臥佛十二日禹錫饋兼金下午元中移酌㑹真樓拉禹錫同至雷風大作既暮乃别十三日禹錫以他事不及往臥佛予獨行東循太保山麓半里出仁夀門門西北倚太保山北麓城隨山西叠而上與龍泉同出城即有深澗從西山懸坑而下即太保山頂城後度脊所分之水也踰橋循西山直北半里有岐東北行平川中為紙房村間道其循山直北者乃逾嶺而西向清蒿壩通乾海子者予乃由間道二里北過紙房村又東一里出大道始為拱北門直向臥佛寺者又北一里越一東出小澗其北有廟踞岡頭乃離城五里之舎也大道中川而行尚在板橋孔道之西又北五里再過一廟在路之西其西有巨廟倚西山村落倚之所謂紅廟村也又北八里有一澗自西山東出踰之而北為郎義村村廬聨絡夾道甚長二里村始盡縁村西轉有水自北堰中來即龍王塘之下流也溯流沿波西北行三里有一卷門東向列路旁其北即深澗縁坡下乃由卷門西入縁南坡俯北澗西入半里聞壑北水聲甚沸其中深木叢箐掩蔽上下而路乃縁壑北轉不半里穿門北上則龍王祠巍然東向列其前與左皆盤壑䝉茸泉聲沸鳴乃由殿左投箐而下不百歩而泓泉由穴中溢東向而墜坑其北坑中又有水㵼樹根而出亦墜坑同去其下懸墜甚深而藤蘿垂蔓予披蔓渉壑求之抵下峽則隔於上凌上峽則隔於下盡叢枝懸空密蔓叠幙咫尺不能窺惟沸聲震耳而已乃從棘蔓中扳西北崖而上望雙岩上倚山頂謂此有路可達宛轉上下終不可得乃返殿前飯而仍在卷門遂北下度澗橋見橋北有岐縁澗西入而山頂雙岩正峙其西余從之始縁澗北半里遂登坡西上直上者三里抵雙岩之下路乃凌北岩之東逾岰而西北去余瞰支峰東北垂意臥佛當在其西北峰下遂西北逾支峯下坑盤峽遵北坡東行二里見有路自北坡東來復西北盤岰上疑以為此臥佛路當從下行不登山也欲東下其人言東下皆坑崖莫可行須仍轉而南予從之二里隨前東來之路下坡二里從坡麓得一村村之前即沿麓北行之大道也沿之北又五里稍西向入谷則臥佛寺環西谷中而谷前大路則西北上坡矣入谷即有池一圍當寺前其大不及九龍池而廻合更𦂳池東有一亭綰谷口由池北沿池入池盡其西有官房三楹臨其上北楹之下泉汩汩從砌石間溢入池中池甚清淺官房之西歴砌上即寺門也亦東向臨之其内高甍倚岩門為三卷亦東向卷中不楹而磚亦横鞏如橋卷外為簷以瓦覆石連属於洞門之上壁洞與鞏連為一室鞏高而洞低鞏不掩洞則此中之竒也其洞高丈餘而深入者二丈横濶三丈其上覆之石甚平西盡處北有門下嵌而入南有臺高四尺其上剜而入臺如胡床横列而剜有石像像曲肱臥臺上長三丈頭北而足南盖此洞横濶止三丈北一丈嵌為内洞之門南二丈猶不足以容之自漆以下則南穴洞壁而容其足其像昔乃天成者自鎮守内官鞏其前軒又加斧琢而貼之金今則宛然塑像失其真矣内洞門内西北隅透壁入門凹而下其内漸高以覓炬未入時鞏殿有擕酒三四生挾妓呼僧團飲其中予姑出殿從北廡廂樓下覓睡處且買米而炊焉北廡之西亦有洞高深俱丈五尺亦卷其門而南向於正殿之北隅其中則像山神䕶法者是夜臥寺中月明而興頗索十四日早飯於僧舎覓火炬入内洞初由洞門西向直入其中高四五丈深數丈稍分岐輙窮仍出從門内南向覓旁竇而上入二丈亦窮而出笑此洞之易窮有童子語於門外曰曽入上洞乎余今早暗中入幾墜危竇若穿洞而上須從南不可從北也予異其言乃益覓炬再入從南向旁竇得一小穴反東向上其穴圓如甑既上其穴竪而起亦圓如井從井中扳南崖則高而滑不可上乃出取板櫈為梯以升既上其口如井欄上隙横於井口之西復盤隙而北再透出一口則有峽東西横峙北向出峽則淵然下墜其深不可覩無級可梯故從其東透層穴而上南向下峽丈餘有洞仍西向入其下甚平高三四丈濶約丈五西入亦五六丈稍分為岐而止如北洞之直入者焉此洞之竒在南穿甑穴層上井口而復得直入之洞盖一洞而分内外兩重又分上下兩重又分南北兩重始覺其竒甚也既出仍從池左至谷口大路余時欲東訪金雞温泉當截大川東南向板橋姑隨大路北瞰之半里稍西北上坡見其路愈西上乃折而東從旁岐下坡一里其麓有一村從此由田塍隨小溪東南行二里度橋木平橋由溪東岸又東半里過一屯遂從田塍中小徑南行半里稍折而西復南就一小水隨之東下遂無路莽蒼行草畦間東南一里半始得北來小路隨之南又得西來大路循之又有溪自北而南有大木橋架其上度橋東遂南行二水俱西曲而合東折於板橋之南焉路南行塍中又二里半而出板橋街之中由街稍南過一小橋即沿小溪東上半里越溪上梗東南行二里漸逼東山過一村有小溪自東北流西南渉之從溪東岸東南二里直逼東山下復有村倚之從村南東向入有小舂踞岡上岡之東即有澗自古鼓山北峽來遶岡南西去有亭橋跨其上此大道也小徑即由北脊入峽盤岡東下遂溯溪岸東行一里有小橋平跨溪上乃南度之東上坡一里至金雞村其村居廬甚盛當木鼓山之東南麓村東有泉二池出石穴中一温一寒居人引温者滙於街中為池上覆以屋又有正屋三楹臨池之南庭中紫薇二大樹甚艷前有門若公館然乃市酒飡飯於市而後浴於池池四旁石甃水止而不甚流亦不甚熱不甚清尚在永平温泉之下而有館有門則同也從村後東南循峽上嶺數里有金雞村從村後直東上木鼔西南峯二十里有新建寳頂寺予俱不及登從村西南下三里北折度亭橋北隨溪西南行塍中五里西值大溪溪東有村傍之乃稍溯之北度大木橋而西行塍中又四里至見龍里其南有報功祠甚巨西向而祠樓則南面入其中祠空而樓亦空樓上止文昌一座當其中寺僧云昔有王靖逺諸公神位覓之不得也由此又十里入拱北門又二里而返㑹真令人往訊安仁已西往騰越矣十五日憩㑹真樓十六日憩㑹真樓往晤閃知愿還拜劉北有留飯即同往太保山麓書舘花木叢深頗覺幽閒乆之雨過適閃知愿送南園録并永昌志即留舘中劉北有留予遷寓其内余屢辭之至是見其幽雅許之以明日劉以鑰匙付余劉将赴省闈乃别還㑹真十七日閃知愿候宴其兄太史及其族叔孩識在焉深夜乃别十八日遷舘於山麓西南打索街即劉北有書舘也其舘外有賃居者以日用器進亦劉命也予獨坐舘中為抄南園漫録既而馬元中㐅覓續録至余因先抄續録且乗雨折庭中花上花挿木毬腰孔間輙活蕋亦吐花花上花者葉與枝似吾地木槿而花正紅一朶四瓣從心中抽出叠其上殷紅而開甚乆自春至秋猶開又以杜鵑魚子蘭蘭如真珠蘭而無蔓莖短葉圓有光抽穂細黄子叢其上如魚子不開而落幽韻同蘭小山茶分植其孔無不活者既午俞禹錫雨中來看且擕飡貰酒贈予詩有下喬之句謂㑹真樓高爽可收一川隂晴也予荅以幽栖解嘲五律謂便扵抄書也二十日抄書麓舘二十一日孩識來頋二十二日抄書麓舘二十三日晨大雨稍霽還拜孩識并謝劉北有下午赴孩識之招閃俞俱同宴深夜乃别二十四日絶粮知劉北有将赴省闈欲設酌招余余乃作書告之窘状二十五日新添乒術士挾一劉姓者至招逰九龍池遂泛池中亭子候劉擕酌不至予返寓抄書北隣花紅正熟枝壓牆南紅艷可愛摘而食之以當井李此間花紅結子甚𦂳生青熟紅不似吾郷熟輙黄也余鄉無紅色者花紅之名惟此地相稱耳下午劉以四品素肴饋劉北有以斗米牛肉饋二十六日至二十九日俱抄書麓舘俱有雨時作時止無一日晴也徐霞客逰記卷十一上欽定四庫全書徐霞客遊記卷十一下明徐宏祖撰西南逰日記二十雲南七月初一日至初三日抄書麓舘亦無竟日之晴先是俞禹錫有僕還鄉請為予帶家報予念浮沉之身恐家人已認為無定河邊物若書至家中知身尚在又恐身反不在也乃作書辭之至是晩間不得眠仍作一書擬明日寄之初四日送所寄家書至俞舘而俞往南城呉氏園余将返其童子𨗳予同往過南闗而西一里從南城北入其園有池有橋有亭在池中主人年甚少昆仲二人一見即留酌亭中薄暮與禹錫同别主人即呉麟徴之子新從四川父任歸者麟徴以鄉荐初作教昆陵陞南部故與俞遇今任四川建昌道矣初五日又絶糧余作書寄潘蓮華復省中呉方生潘父子以初八日赴公車且向潘索糧不及待往拜呉氏昆仲不遇即乗便出龍泉門為乾海子之逰由九龍池左循北坡西向上一里出寺後南瞰峽中馬家園即前日閃太史宴余其中者昔為馬業今售閃氏矣從此益西向上一里瞰其北峽乃太保新城所環其上者其西即寳盖山之頂今循其南岡而上也又迤邐上者三里始隨南峽盤坡入二里路北之樹森鬰而上路南之樹森鬱而下各有莊舎於其中北為薛莊南為馬莊樹皆梨柿諸果予夙聞馬元中有兄居此元中嘱余往逰且云家兄已相候乆矣至是問主人已歸城時日甫上午遂從其後趨乾海子道其處峯稍南曲其下峽中有深澗自西北環夾東出水聲驟沸即馬家園綰九龍南塢之上流也此處騰湧澗中外至塢口遂伏流不見南溢而下泛者為馬園内池北溢而下汎者為九龍泉池皆此水之伏而再出者也循澗北崖盤坡入一里北折入峽二里稍下就澗行其處東西崖石夾峙水騰躍其中路隨之而上盖已披寳盖山之西麓矣或渉水西或渉水東或渉水中而上北五里漸西其溪分兩道來由其中躡嶺西北上始望見由此而北分峽東下者為寳盖山之脊又東下而為太保由此而南分峽東下者為九龍南山之脊又東下為九龍岡此其中垂之短支從之迤邐上五里始越其脊下瞰脊西有峽下遶甚深水流其中沸甚此即沙河之上流也其西又有山一重横夾之乃為南下牛角闗之脊而此脊猶東向之旁枝也循北崖西行三里餘始西南墜壑下下三里始抵溪之東岸兩崖夾溪之石甚突兀溪流逗石底而下層叠騰湧而䝉箐籠罩之如玉龍踴躍於青絲歩障中志所謂溜鐘灘豈即此耶路縁東崖下北溯溪有小洞倚崖西瞰溪流入坐其間水乳滴瀝如貫珠下出復北溯溪三里有木橋跨西度其西上嶺遂與沙河上流别三里登南度之脊其脊中低南北皆高南即牛角闗之脉北高處為虎坡乃從西北度脉而來者路逆溯之循北嶺東坡而上又二里從嶺北西向穿岰是為虎坡此坡由北冲東蒲蠻寨嶺度脊西南下遶為北冲南峯南向逶迤東墜沙河之源西環乾海之塢南過此嶺稍伏而南聳牛角闗又伏而度脉分支西北掉尾者為蒲縹西嶺正支東峙松子山遶石甸東而南盡於姚闗者也過岰西即有坑西墜路循北坡西北行五里西下行峽中溯流躡澗三里再逾嶺又三里出嶺西始見西南下壑稍開有西峽自北而南與南峽合而西去有茅數龕嵌峽底曰鑼鼓寨于是盤東坡北向轉溯西峽上行西峽有山自北岰分支南亘環於東界之西路由其中直披北坳而入三里渉北來小水遂西盤其坳脊二里出峽南其西南盤壑復下開而路乃北向躡嶺曲折西北盤之而升二里登嶺頭遥望數十家倚西亘横峰下即大寨也乃西南盤層壑之上二里越岡西下又二里西南下至塢間渉北來小峽又西上半里是為大寨所居皆茅但不架欄其俗皆勤苦墾山五更輙起昏黒乃歸所墾皆磽瘠之地僅種燕麥蒿麥而已無稻田也予初買米装貯為入山之具而頋僕竟不之擕至是寨中俱不稻食煮大麥為飯余强嚙之而臥初六日天色隂沉飯麥由大寨後西渉一小峽即西上坡半里循西山北向而升二里坡東之峽駢束如門門以内水猶南流而坡峽俱平遂行峽中又北一里有岐逾西山之脊為瑪瑙坡道予時欲窮乾海子從峽中直北行徑漸翳水漸縮一里峽中累累為環珠小阜即度脉而為南亘西山此其平脊也半里過北即有坑北下由坑東循大山西北行又一里見西壑下嵌中圓如圍城而底甚平即乾海子矣路從東山西向環海子之北一里乃趨峽下東山即虎坡大脊之脉有岐東向踰脊為新開青江埧道入郡為近南下半里抵海子之北即有泉一圓在北麓間水淙淙由此成流出其東西麓間俱有茅倚坡臨海而居而西坡為盛又半里循麓而入西麓之茅其廬俱横重木於前出入皆踰之其人皆不解漢語見人輙去廬側小溪之成流者南流海子中海子大千畝中皆蕪草青青下乃草土浮結而成者亦有溪流貫其間第不可耕藝以其土不貯水行者足撼之數丈内俱動牛馬之就水草者祗可在涯涘間當其中央駐久輙䧟不能起故居廬亦俱瀕其四圍祗墾坡種麥而竟無就水為稻畦者其東南有峽乃兩山環凑而成水從此洩路亦從此達瑪瑙山然不能徑海中央而渡必由西南沿坡灣去于是倚西崖南行一里有澄池一圓在西崖下蕪海中其大徑丈餘而圓如鏡澄瑩甚深亦謂之龍潭在平蕪中而獨不為蕪翳又南一里過西南隅茅舎其廬亦多有路西北踰山云通後山去不知何所其南轉腋間有水從石崖下出流為小溪東注予初狎之欲從蕪間渉此水近水而蕪土交䧟四旁揺動遂復迂陟西灣盤石崖之上乃倚南山東向行一里有岐自東峽上南踰山脊為新開道由此而出瀾泥壩者余乃隨坡而下東峽半里則峽中横木為橋其下水淙淙北自海子菰蒲中流出破壁南墜峽甚逼仄故一木航之此水口之最為瀠結者度横木東復上坡半里陟其東岡由脊上東南行還頋海子之窩嵌其西北出峽之水墜其西南其下東南塢中平墜甚深中夾為箐叢木重翳而轟崖倒峽之聲不絶其前則東西兩界山又伸臂交舒闗峽南去海子峽橋之水屢懸崖㵼箐中南下西轉而出羅明壩焉于是循東山瞰西峽東南行一里轉而南下一里有路踰東嶺来隨西南下坡半里忽一廬踞坡西向而居其廬雖茅盖而簷高牖爽植木環之入而問其地則瑪瑙山也一主人衣冠而出揖而肅客則馬元康也余夙知有瑪瑙山以為枝屐所經亦可一寓目而不知為馬氏之居馬元中曽為余言其兄之待余余以為即九隆後之馬家莊而不知有瑪瑙山之舎元康一見即諦視曰即徐先生耶問何以知之曰五弟言之余望之乆矣盖元中應試省中先以書嘱元康者乃瑪瑙山非九隆後之馬家莊也元康即為投轄殺雞為黍見其二子深山杳靄之中疑無人跡而有此知已其遇仙耶其夢寐耶下午從廬西下坡峽中一里轉北下臨峽流上多危崕籐樹倒罨鑿崖迸石則瑪瑙嵌其中焉色有白有紅皆不甚大僅如拳此其蔓也隨之深入間得結𤓰之處大如升圓如毬中懸其宕而不粘扵石宕中有水養之其精瑩堅緻異於常蔓此瑪瑙之上品不可猝遇其常積而市扵人者皆鑿蔓所得也其拳大而堅者價每斤二錢更碎而次者每斤價一錢而已是山從海子峽口橋東南環而下此其西掉而北向處即大寨西山之西坡也峽口下流懸級為三瀑布皆在深箐危崖間雖相距咫尺但聞其聲而樹石擁蔽不能見其形况可至其處耶坐瑪瑙崖洞間有覆若堂皇有深若曲房其上皆垂幹虬枝倒交横絡但有氤氲之氣已無斧鑿之㾗不知其出自人工者元康命鑿崖工人停槌而垂箐覓樹蛾一筐乃箘之生於木上者其色黄白較木耳則有莖枝較雞葼則非土而木以是為異物也且謂余曰箐中三瀑以最北者為勝為崖崩路絶俱不得行當令僕人停鑿芟道異日乃可梯崖下瞰也因復上坡至其廬前乃指㸃四山審其形勢元康瀹茗命醴偹極山家清供視隔宵飯糲口不謂之仙不可也初七日雨與元康為橘中之樂棋子出雲南以永昌者為上而乆未見敵手元康為此中巨擘能以雙先讓余遂對壘者竟日初八日晨飯欲别而雨復至主人復投轄佈枰下午雨霽同其次君從廬右瞰溪懸樹下一里得古洞乃舊鑿瑪瑙而深入者髙四五尺濶三尺以巨木為橋圏支架於下若橋梁之鞏間尺餘輙支架之其入甚深有木朽而石壓者上透為明洞余不入而下仍懸樹一里墜澗底其奔湧之勢甚急而掛瀑處俱在其上下峽中各不得達仍扳枝上所扳之枝皆結異形怪果苔衣霧鬚䝉茸於上仍二里還廬舎元康更命其僕執殳前驅令次君督率之從來路上二里抵峽口橋東岡墜崖斬箐鑿級而下一里凴空及底則峽中之水倒側下墜兩崖𦂳束之其勢甚壮黔中白水之傾㵼無此之深騰陽滴水之懸注無此之巨勢既高逺峽復逼仄盪激怒狂非復常性散為碎沫倒噴滿壑雖在數十丈之上猶霏霏珠捲霰集滇中之瀑當以此為第一惜懸之九天蔽之九淵千百年莫之一睹予非元馬之力雖過此無以寓目也返元康廬挑燈夜酌復為余言此中幽勝其前峽下五里有峽底橋過之隨峽南出有水簾洞溯峽北入即三瀑之下層而水簾尤竒但路閟難覓明晨須同往探之此近勝也渡上江而西有石城挿天倚雪山之東人跡莫到中夜聞鼓樂聲土人謂之鬼城此逺勝也上江之東瑪瑙之北山環谷迸中有懸崖峯巒倒㧞石洞㟏岈是曰松坡而家庄在焉叔父玉麓構閣青蓮在石之阿今已云亡而季叔父大麓於此栖遲一日當聨騎而往此中道之勝也余聞之既喜此中之多竒又喜元康之能悉其竒而余之得聞此竒也地主山靈一時濟美中夜喜而不寐初九日晨起欲為上江之㳺元康有二騎一往西山未歸欲俟明日同行余謂㳺不必騎亦不必同惟指示之功勝於追逐余之欲行者正恐其同其不欲同者正慮其騎也元康固留予曰俟返途過此當再為一日停乃飯而下山元康命其幼子為水簾洞𨗳于是西下者五里及峽底始與峽口橋下下流遇盖歷三瀑而北迂四窠崖之下曲而至此乃平流也有橋跨其上度橋西北盤右嶺之嘴為爛泥埧道從橋左登左坡之半其上平衍有水一塘滙崗頭數十家倚南山而居為新安哨與右嶺盤坡之道隔峽相對也水簾洞在橋西南峽底倚右嶺之麓幽閟深阻絶無人行初隨流覽之傍右嶺西南行荒棘中三里不可得其水漸且出峽當前坳尖山之隩矣乃復轉廻環遍索得之絶壁下其去峽底橋不一里也但無路影深阻莫辨耳其崖南向前臨溪流削壁層累而上髙數丈其上洞門㟏岈重覆叠級雖不甚深而中皆旁通側透若飛甍複閣簷牖相仍有水散流於外垂簷而下自崖下望之若溜之分懸自洞中觀之若簾之外幕水簾之名最為宛肖洞石皆楞柱綢繆纓幡垂颺雖淺而得玲瓏之致但旁無側道可上必由垂簷叠覆之級冐溜衝波以施扳躋若從其側架梯連棧穿腋入洞以䏲簾之外垂祗中觀其飛洒而不外受其淋漓勝更十倍也崖間有懸幹虬枝為水所淋漓者其外皆結膚為石盖石膏日久凝胎而成即片葉絲柯皆隨形逐影如雪之凝如氷之裹小大成象中邊不嵌此又凝雪裹氷不能若是之勻且肖者予扵左腋洞外得一垂柯其大拱把其長丈餘其中樹幹已腐而石膚之結於外者厚可五分中空如巨竹之筒而無節擊之聲甚清越余不能全曳斷其三尺携之下并取枝葉之綢繆凝結者藏其中盖枝細葉薄易於損傷而筒厚可借以相䕶携之甚便也水簾西有一旱岩深亦止丈餘而穹覆危崖之下結體垂象紛若贅旒細若刻絲攅冰鏤玉千蕚並頭萬蕋攢頴有大僅如掌而笋乳紏纒不下千百者真刻楮雕棘所不能及余欲擊取而無由適馬郎擕斧至借而擊之以衣下承得數枚取其不損者二枚并石樹之筒托馬郎携歸瑪瑙山俟還取之遂仍出橋右與馬郎别乃循右坡西上里餘隔溪瞰新安哨而行大雨忽來少憩樹下又一里盤右坡之嘴轉而北行盖右坡自四窠崖頡頏西來至此下墜而崖石遂出有若芙蓉簇萼空中有若綉屏叠錦崖畔不一其態北盤三里又隨灣西轉一里又北盤其萼于是北向下峽中二里餘塢底有峽自東北來遂同盤為窪而西北出路乃挾西坡之麓隨之西轉其中沮洳踔䧟深濘豈爛泥壩之名以此耶西北出隘一里循東坡平行西瞰墜壑下環中有村廬一所為爛泥壩村路從其後分為二岐一西向下塢為上江道一北向盤坡為松坡道余取道松坡又直北一里挾東坡北嘴盤之東行半里越西峽而西北上一里盤其東突之崖又一里踰其北亘之脊由脊東北向隨坡一里路又分岐為二一直北隨脊平行者横松株阻絶以斷人行一轉東入腋者余姑隨之一里其坡東垂為脊脊間路復兩分一踰脊北去一隨脊東南下予乃傍之南下二里徑漸小而翳疑非通路下二里有三四人倚北坡而樵呼訊之知去松坡不逺乃西轉就峽平行里餘出峽口其西壑西開又西下里餘有村廬當中窩而居村中巨廬楊氏在北馬氏在南乃南趨之一翁方巾藜杖出迎為馬太麓元康長郎先已經此為言及翁訝元康不同來予為道前意翁方鑰茗而山雨大至俟其霽下午乃東躡坡上青蓮閣閣不大在石崖之下玉麓先生栖真處太麓招一僧止其中余甫至太麓即擕酒授餐遂不及覽崖間諸勝太麓年髙有道氣二子長讀書郡城𤣥真次隨侍山中為予言其處多岩洞亦有可深入者二三處但路未開闢當披荆入之地當山之翠微深崖墜壑尚在其下不覺其為幽閟亂峰小岫初環於上不覺其為孤髙盖崇山西北之支分為雙臂中環此窩南夾為門水從中出而高黎貢山又外障之真栖遯勝地買山而隠無過於此惟峽中無田米從麓上尚數里也初十日晨起霽色可挹遂由閣東竹塢遶石崖之左登其上其崖髙五六丈大四丈一石擎空四靣壁立而南突為岩其下嵌入厓頂平展如臺岡脊以北來環其後斷而復起其斷處亦環為峽遶崖左右而流泉瀠之種竹峽中嵐翠掩映道從之登昔玉麓構殿三楹在頂塑像未竟止有空梁落燕泥也已復下青蓮閣從閣側南透崖下其岩忽綳雲罨幙亭亭上覆而下臨復跫然無地轉其西岩亦如之第引水環流其前而斷北通之隘致下岩與上臺分為兩截余謂不若通北隘斷東路使青蓮閣中道由前岩之下從西北轉達於後峽仍自後峽上崖臺庻漸入佳境不分兩岐也既而太麓翁䇿杖擕晨飡至飡畢余以天色漸霽急於石城㳺太麓留探松坡石洞予以歸途期之太麓曰今日抵江邊已晩不必渡可覓土官早龍江家投宿彼自為登山指南不然其地皆夷寨無可通語者余識之遂行仍西南下至廬側渡塢中南出之水共西一里上循西坡北向行一里轉而披其西峽半里踰脊西下一里下至壑中其䖏忽盤窩夾谷自東北而透西南之門路循其南坡西行一里渉峽中小水同透門出乃西南隨坡下三里復盤坡西轉望見南塢中開下始有田有路從東南合即爛泥埧北來道也坡西南麓有數家倚坡南向是為某某仍下坡一里從村右度小橋是坡左右俱有小水從北峽來而村懸其中又西北開一峽其水較大亦東來合之㑹同南去由是望其西北而趨一里踰坡入之又渡一東北來小水即循北坡溯澗西北行二里西下渡塢中澗復西北上澗西之山又隨其支峽入二里再上盤西突之坡坡西有壑中盤由壑之北崖半里環陟其西脊約三里由脊西南下半里平行枯峽中一里有枯峽自北而來横陟之循北嶺之坡西行一里聞水聲淙淙數家倚西坡是為打郎入詢居人始知上江路在外峽西壑東北亦有路踰嶺此亦通府之道獨西北乃山之環脊無通途也乃隨西山之半南向出二里盤西山南嘴而西其前有路自峽底來合則東來正道也于是倚北崖西行西峽之上峽南盤壑屢開而水仍西注峽北西垂漸下石骨迸出行二里時上午暑甚余擇䕃臥石半晌乃西北下坡半里有澗自東來其水淙淙成流越之仍倚北坡西北行二里飯扵坡間又西北二里越西崗下其間坑塹旁午坡陀間錯木樹森羅二里路岐為兩一西南一西北予未知所從從西北者已而後一人至曰西南為猛頼渡江徑道此西北道乃曲而從猛淋者予欲轉其人曰既來一里不必轉即從猛淋往可也乃西北隨峽稍下二里有聚落倚東坡臨北壑是為猛淋此乃打郎西山南下西轉掉尾而北環為此壑其壑北向頗豁遥望有巨山在北横亘西下此北冲後山夾溪西行而盡於猛頼溪北王尚書寨嶺者也壑中水當北下北冲西溪其人指予從猛淋村後西南踰嶺行一里陟嶺頭踰而南下遂失路下一里其路自西來合稍東下度一小橋乃轉西南越坡二里則坡南大溪自東而西向注有路亦自溪北西來其路則沿波而上予所由路則墜崖而下于是合而西向半里沿崖半線路行其崖峭石凌空下臨絶壑其下奔流破峽倒影無地而路縁其間嵌壁而行半里稍下離崖足廻眺北崖上挿猶層城叠障也又西二里從崖足盤西南突嘴半里始見上江南塢其峽大開中嵌為平疇祗見峽底而不見江流有溪自西山東南横界平疇中直抵東山之麓而余所循之溪亦西南注之峽口波光四圍蕩漾其䖏不審即峽溪所滙抑上江之曲予又疑東南横界之流即為上江然其勢甚小不足以當之方疑而未定逾突嘴而西又半里轉而北隨北峽下一里從北峽西轉始見上江北塢雖平疇較小於南塢而北來江流盤折其中東峽又有溪西向入之其南流雖大而江流隨東山之麓為東山虧蔽惟當峽口僅露一斑不若此之全體俱現也又西向下者一里有十餘家倚南山北向而居問上江渡何在在其西北問早土官何在在西南二里乃北渡其溪溪水頗大而其上無橋僅横一木平於水靣兩接而渡之而木為水激撼揺不定水時湧躍其上雖跣足而渉足下不能自主危甚于是上西坡南向隨流行塍間一里稍折而南又一里入早氏之廬已暮始在其外室甚陋既而延入中堂主人始出揖猶以紅布纒手者訊予所從來予以馬氏對曰元康與我厚何不以一柬相示予出元康詩示之主人乃去纒首易巾服而出再揖遂具晩飡而臥其堂中十一日晨起龍江具飯言江外土人質野不馴見人輙避君欲逰石城其山在西北崇峽之上路由蠻邊入蠻邊亦予所轄當奉一檄令其火頭供應除道撥寨夫引至其䖏不然一時無栖托之所也予謝之復引予出廬前曠處指㸃而言曰東北一峯特聳西臨江左者為王尚書駐營之峯西北重峽之下一崗東突江右者是為蠻邊昔麓川叛酋思踞為巢其後重崖上為石城酋思恃以為險與王尚書夾江相拒者也此地昔為戰塲為賊窟今藉天子威靈民安地静所産豐盛逾於他所他處方苦旱此地之雨不絶他處甫挿蒔此中之新榖已登他處多盗賊此中夜不閉户敢謂窮邊非樂土乎第無髙人至止而今得之豈非山川之幸予謝不敢當時新榖新花一時並出而晩稻香風盈川被隴真邊境之休風而或指以為瘴亦此地之常耳既飯龍江欲俟余行予示之期返途再晤乃以其檄往出門溯江東岸北行二里時渡舟在西岸坐東涯樹下待之半晌舟來乃受之溯流稍北乃受駝騎此自北冲西來者渡舟為龍江之弟龍川所管祗駝騎各畀之錢而罄身之渡無畀錢者時龍川居江岸西與蠻邊之路隔一東下小溪渡夫余自蠻邊回必向溪南一晤龍川余許之乃從小溪北岸登涯即西北行于是渉上江之西矣此十五喧之中也循西山北二日為崩戞南二日為八灣崩戞北為紅毛野人八灣南為潞江安撫司昔時造橋西踰山心出壺瓶口至騰陽道尚在其南下流二十里其天生石崖可就為橋址者又在其下西北三里有溪自西峽出北渡之半里有聚落倚坡東向羅列是為蠻邊覓火頭不在其妻持檄覓一僧讀之延予坐坐欄上而具飡焉其僧即石城下層中臺寺僧各喧土人俱信服之今為取木延匠将開建大寺此僧甫下山與各喧火頭議開建之事言菴中無人勸余姑停此俟其明日歸然後由其菴方可覓石城也余從之坐欄上作紀下午浴於澗復登攔觀火頭家烹小豚祭先令一人從外望一人從内呼問可來曰來了如是者數十次以布曳路間渡入龕而酌之飯之勸亦如生人薄暮其子以酒肉來獻乃火酒也酌扵欄上風雨忽來雖欄無所蔽而川中藴熱即就欄而臥不暇移就其室也十二日火頭具飯延一舊土官同飡其人九十七歳矣以年高後改於早龍江者喧中人皆言其人質直而不害人為土官最久曽不作一風波有餽之者千錢之外輙不受當道屢物色之終莫得其過跡喧人感念之共宰一牛賣為贍老之資既飯以一人引余往中臺寺予欲其人覓引探石城不必由中臺其人言喧中俱不識石城路惟中臺僧識之且必由中臺往無他道也余不信復還遍徴之喧中其言合遂與同向中臺由村北溯溪西向入二里過上蠻邊漸入峽又西一里渉一水溝遂臨南澗倚北坡而行又一里北坡稍開有岐北去又西踰波過一水塘而北下峽中共二里一溪自北峽來架木為橋西度之橋之南又一溪自南峽西來與橋水合而出於蠻邊南大溪者既度橋西即北向上坡其坡峻甚濘甚䧟淖不能舉足因其中林木深閟牛畜蹂踐遂成䧟土扳陟甚難二里就小徑行叢木中三里復與大路合峻與濘愈甚又北上一里折而西南上峽中一里南踰其崗始見有茅菴當西崖之下其崖矗然壁立於後上叅霄漢乃入菴菴東向乃覆茅為之者其前積木甚巨一匠工斫之為殿材昨所晤老僧已返號滄海四川人即為具飯余告以欲登石城僧曰必俟明日今無及矣此路惟僧能𨗳之即喧中人亦莫知也余始信喧人之言不謬遂停其茅中十三日僧滄海具飯即執殳前驅余與頋僕亦曳杖從之從坪崗右腋仆樹上度而入其樹長二十餘丈大合抱横架崖壁下兩旁皆叢箐紏籐不可著足其下坎柯䝉蔽無路可通不得不假道於樹也過樹沿西崖石脚南向披叢棘頭不戴天足不踐地如蛇㳺伏莽狨過斷枝惟隨老僧僧扳亦扳僧掛亦掛僧匍匐亦匍匐二里過崇崖之下又南越一岡又東南下渉一箐共里餘乃南上坡踐積茅而横陟之其茅倒者厚尺餘竪者高丈餘亦仰不辨天俯不辨地又一里出南岡之上其路甚峻盖石城屏立遂從扳躋西向上者五里乃折而北上一里西北陟坎柯之石半里抵石城南垂之脚乃知此山非環轉之城其山則從其後雪山之脊東度南折中兠一峽南嵌而下至此南垂之脚乃峽中之門也其崖則從南折之脊横列一屏特聳而上峽則圍三缺一屏則界一為二皆不可謂之城也然峽之杳渺障於内屏之突兀臨於外此南垂屏峽之交正如黄河華嶽凑扼潼闗不可不謂險之極也從南垂脚盤其東脚而北為崖前壁正臨臺菴之上壁間有洞亦東向嵌髙深間登之縹緲雲端凴臨瓊閣所少者少髓無停穴耳盤其西脚而北為崖後壁正環墜峽之東削壘上壓淵塹下蟠萬木森空藤蘚交擁幽峭之甚循崖北行一里路分為二一東北上為躡崖頂者一西北為盤峽坳者乃先從峽半里陟其底底亦甚平森木皆浮空結翠絲日不容下墜當其中有木龍焉乃一巨樹也其下體形扁縱三尺横尺五自地而上髙二尺五寸即半摧半茂摧者在西北止存下莭茂者在東南聳幹而起其幹正圓圍如下體之半而高不啻十餘丈其所存下節並附之其圓亦如聳幹得下體之半而其中皆空外膚之圍抱而附於聳者其厚止寸餘中環空腹如桶而水盈焉桶中之水深二尺餘盖下将及於地而上低於外膚之邊者一寸有五其水不甚清想即樹之瀝也中有蝌蚪跳躍杓水而乾之則不見然底無旁穴不旋踵而水仍滿亦不見所自來及滿至膚邊下寸五輙止不溢若有所限之者其樹一名溪母樹又名水冬𤓰言其多水也土人言有心氣痛者至此飲之輙愈老僧前以砍木相基至亦取此水為飱而食樹之北有平岡自西而東属於石崖之峯即度岡之北有窪滙水是為馬鹿潭言馬鹿所栖飲者窪之北則兩崖對束如門潭水所從泄也循岡西上半里西大山之麓有坡一方巨木交枕雲日披空即老僧昔來所砍而欲卜基者寄宿之茅尚在其側由此西上可登上臺而路愈蔽乃返由前岐東北躡崖半里而凌其上南瞰下臺之菴如井底寸人豆馬蠕蠕下動此菴遂成一畫幅其頂正如堵墻南北雖遥而濶皆丈餘上下雖懸而址皆直立由其上東瞰上江如一線而東界極北之曹澗極南之牛角闗可一睫而盡惟西界之南北為本支所掩不能盡崩戞八灣之境也西眺雪山大脊可以平揖而問第深峽中嵌不能竟陟耳乃以老僧飯踞崖脊而飡之仍由舊徑下趨臺菴未至而雨為宻樹所翳不覺也既至而大雨僧復具飯下午雨止别僧下山宿於蠻邉火頭家以燒魚供火酒而臥十四日從蠻邊飯而行仍舊路東南一里宜東下悮循大路倚西山南行二里望渡處已在東北乃轉一里得東下之路遂陟坑從田塍東行一里至早龍川家時渡舟尚在江東岸龍川迎坐以待之其妻女即織絍於旁出火酒糟肉生者以供予但飲酒而已不能啖生也雨忽作忽止上午舟乃西過又候舟人飯當午乃發雨大作同渡者言猛頼東溪水暴漲横木沉水底不能著足徒渉之水且及胸過之甚難余初以路資空乏擬仍宿扵早龍江來一日至松坡二日至瑪瑙山皆可無煩杖頭即取所寄水簾洞石樹歸今聞此溪難渉且由溪北岸溯流而入由北冲逾嶺既免徒渉之險并得分流之脊於道雖稍逺然今日尚可逹歪瓦則両日可抵郡其行反速也遂從渡口東向截塢望峽入先由塢東行田塍間一里路為草擁草為雨偃幾無從覓幸一同渡者見予從此亦來同行令之前驅半里遂及峽口循峽北突峯南麓東向入溪流沸於下甚洶湧五里峽自北來有村在東山下曰猛崗路挾西山北轉上坡五里遂東盤崇峯之南椒又東十里有峽自東南來想即猛林所從來之小徑也于是折而西北上山坳二里聞大聲又一里山環谷合中得一坪四五家倚之南向而居曰歪瓦遂止宿十五日昧爽而炊平明飯而行雨中南陟東坡一里稍北下三里不得路乃西向扳茅躡坡二里登嶺而後得南來路又稍北循崖西復東行八里有峽自東來而大溪則自北峽來受其廻曲處藤木罩蔽惟見水勢騰躍於下路仍北轉􅘦之遂從深箐中行又二里稍下漸與溪逼又北五里峽復轉東路乃東溯之屢降而與溪㑹一路皆從溪右深箐仄崖間東北溯流又十五里始有溪自北峽出其水雖小而下有田縁之漸出箐矣又東五里又有水自西北峽來溪源遂岐為兩有橋度其北來者仍溯其東來者其下田愈闢路始無箐木之翳又五里北界之山中環為坪而土官居之南界之峽平拓為田而村落遶之此即所謂北冲也又東五里山箐復合是為箐口時纔下午前無宿店遂止是夕為中元去嵗在石屏其俗猶知祭先而此寂然矣十六日平明飯由箐口東稍下入峽二里有澗自東北來越之其大溪則自峽中東來猶在路之南從兩澗中支東上已復北倚中支南臨大溪且上且平七里稍下又一里下及溪溯水瀕溪而行又一里有木橋跨溪遂渡其南岸倚南崖東向行又里餘復渡橋行溪北岸由是兩崖夾澗澗之上屢有橋左右跨或度橋南或度橋北俱瀠澗倚坡且上且折又連度六橋共七里水分兩𣲖來一東南一東北俱成懸流橋不復能施遂從中坡躡峻盤垂磴而上曲折八里岡脊稍平有廬三楹横岡上曰茶菴土人又呼為蒲蠻寨而實無寨也一道流瀹茗於中余知前路無居廬乃出飯就之而啖又北上始臨北坑復臨南坑始披峽渉水後躡磴盤脊十里乃東登嶺坳至嶺頭雨勢滂沱隨流南下三里雨忽中止雲霾遥滌又二里隨西峽下墜峽穿箐路既䝉茸雨復連綿又五里從箐底踏波隨流出又南五里稍東踰一東障西突之坡從其南墜波直下者三里復隨峽倚東障之支南向行其西中壑稍開流漸成溪二里雨益大塗體沾足足滑不能定上嶮渉流隨起隨仆如是者三四里頭目既傷四肢受病一時無可如何雨少止又東南五里塢稍東曲乃截塢而度一橋橋下水雖洶湧渾濁其勢猶未大僅横木而渡至是從溪西隨西山行溪逼東障山去復踰坡墜箐向東南下五里又東南盤一坡下歴一箐又五里轉坡南腋間得臥佛寺已暮急入其厨索火炙衣炊湯啖所存擕飯深夜而臥其北樓十七日晨起絶糧計此去郡尚三十里不得已而空腹行仍再上岩殿再下池軒一憑眺之東南里許過一小室有二家當路為税司又南八里過龍王塘峽皆倚西山行又東南五里過郎義村村西有路踰嶺為清水壩打郎道又南二十里至郡城北通華門外即隨城北澗西上二里入仁夀門由新城街一里半過法明寺前西抵劉舘予初擬至乾海子一宿即還至是又十三日矣舘前老嫗以潘蓮華所留折儀并㑹真陶道所饋㸃畀余且謂閃知愿使人以書儀數次來候盖知愿往先塋恐余東返即留使相待也下午安仁來俞禹錫同閃來抵暮乃别十八日余臥未起馬元真同其從兄來候余訝其早曰即在北鄰而乆不知昨禹錫言始知之且知與老父約而不從松坡返能不使老父盼望耶余始知為太麓乃郎太麓雖言其長子讀書城中而不知即與劉舘並也禹錫邀飯暮乃返閃知愿使以知愿書儀并所留柬札來且為予作書與楊雲州十九日閃太史手書候叙既午乃赴之留欵西書舎小亭間出董太史一卷一册相示書畫皆佳又出大理蒼石屏置座間另覓鮮雞葼瀹湯以佐飯深夜乃歸舘知安仁所候閃序已得安仁将返命麗江矣二十日作書併翠生杯托安仁師齎送麗江木公二十一日命頋僕往瑪瑙山取石樹且以失約謝馬元康二十二日禹錫同閃知愿來寓坐竟日貰酒移肴為聨句之飲二十三日早馬元真邀飯以頋僕往瑪瑙山禹錫知予具飡無人故令元真邀余也先是自清水闗遇雨受寒受跌且受飢連日體甚不安欲以汗發之方赴市取藥而禹錫知予僕未歸再來邀予乃置藥而赴之遂痛飲入夜元真軰先去予竟臥禹錫齋禹錫襆被連榻且以新綿被覆予被褥俱麗甚予以醉後覺蒸蒸有汗意引被䝉靣汗出如雨遂藿然信乎挾纊之勝於藥石也二十四日還寓深夜而頋僕返以馬元康見予不返親往松坡詢踪跡故留待三日而後歸也二十五日閃太史以所作長歌贈余更餽之以贐其歌甚暢而字畫遒勁有法真可與石齋贈余七言歌並鐫為合璧也已而俞禹錫又使人來邀移寓余乃令頋僕以石樹往眎之相與抵掌為異已往謝太史之賜太史亦索觀遂從禹錫處送往觀之二十六日禹錫晨至寓邀予移往其齋予感其意從之比至而知愿歸即同往晤且與之别知此後以服闋事與太史俱有哭泣之哀不復見客也比出門太史復令人詢静聞名號寺名盖為静聞作銘已完将欲書以畀余也更謂余石甚竒恐致逺不便欲留之齋頭以挹清風予謂此石得天禄石渠之供甚幸但余石交不固何知愿曰此正所謂石交也遂置石而别仍還劉舘作紀竟日晩還宿於俞太史以静聞名來賜謂明日五更祭先不敢與外事也二十七日還劉舘移所未盡移者并以銀五錢畀禹錫買雞葼六斤濕甚禹錫為再蒸之且縫袋以貯焉乃為余定往順寕夫二十九日晨雨時作時止久之乃别禹錫出南門從大道南二里至夾路村居之街遂分路由東岐當平塢中南行西與沙河之道相望五里過神濟橋其南居廬連亘是為諸葛營諸葛之祠在焉又南有東岳廟亦東向又南五里為大樹墩亦多居廬村之北有小溪東南流村之南有小溪東北流合於村之東而東去此兩流即臥獅窩之水也又南三里有水自西沿南坡而東此乃坳子舖東注之水有小石橋跨其上越橋南上坡路分為三一西南向大山之麓一東南為石甸姚闗道一直東為養邑道于是直東行坡上三里有小溪自南而北其源當出於冷水箐于是下越一木橋復東上坡坡北有村倚之其地為三條溝由坡東東南下而復上三里越一岡有兩三家當岡頭為胡家坡越岡而東三里又下下盤為田有數家倚南嶺是為阿今過阿今復東上三里其南塢水遂分東西下又東五里飯又三里為養邑南有塢盤而為田北正對筆架山之南垂有數家當塢遂宿三十日店婦雞鳴起炊平明飯出店東南行稍下渡南來小溪即上坡東逾南轉即養邑東環之支也東逾坡而下又陟一小坡而東上坡遂行岡頭共五里路分二岐一東南者為西邑道一西北者為山河埧道先是問道多言由西邑踰芭蕉嶺達亦登有熱水從石盤中溢出其處有大道通順寧予欲從之而養邑店主言往西邑路近而山溪無橋今雨後水漲難渡當折而北由山河埧渡其下流仍由枯柯而達亦登為便至是見同行者俱不走西邑而走山河埧今亦從之遂西北西渉小塢二里升坡而東遂循永昌溪南崖行溪嵌崖底止見北崖削壁下嵌而不見水又東二里稍下有村倚北崖之東即落水寨也其南崖之夾溪為川者東突如踞獅水從其北出路從其南下半里遂由獅腋下降路甚逼仄半里抵獅麓又東半里有溪自南塢來有埧堰其上流有橋跨其下流度橋東行田塍間濘甚一里登塢東崗南行一里見塢西有瀑掛西崖歴西層而下注塢中南來之溪路隔對之東向入峽雨大至二里踰嶺頭有路西南來合又東三里度坑坳盤而東北行其下有流破石捜崖亦突而北注隨之一里乃東下越其流又東北上半里見東塢又有小水自東而西向與南來之溪合扵北崖下北崖純石聳起其上樹木䓤鬱而下則有穴伏而暗墜二水之所從入也又東向上嶺半里踰其脊行嶺頭半里始見東壑有田下盤其東復有山夾之路從嶺上轉而南行一里餘而下下半里其塢自南而北水亦經之度橋溯流而南二里南塢稍開是為五馬其西南壑中居廬頗多東坡上亦有四五家居路左坡南有一坑自東峽出有小水從其中注西南壑下坑渉其水之南溯之東上一里隨峽南轉而坑中水遂窮有脊自東而西度脊南復墜坑而下從脊東行轉坑東之崖其下亦嵌而成壑壑中亦有人家隠於深崖重箐之間但聞雞鳴舂响而已東坑既盡從其上陟塢升岡見岡南一峯特聳而卓立白露偏籠其半乃東來脊上石峯之層起者由其北穿坳而東共二里而抵坳中之脊有巨石當脊而中踞其高及丈大亦如之其上有孔深亦如之中貯水及其半不涸不盈正如哀牢金井之孔相似踞大石而飯土人即名此嶺為大石頭從石東下塢中道分為二一由東向踰岡者為大道稍迂而達大獵夷一由東南下峽者為㨗道稍近而抵小獵夷乃由峽中下二里行岡南之上又二里盤岡嘴而南路又分為二一由崖下循崖根南轉一由崖上躡崖端南曲乃從崖端南踰石隙而下一里仍從南坡東轉一里有四五家倚坡而居是為小獵夷余欲下坡問亦登道土人行人皆言下坡至江橋不可止宿亦無居停之家循江而南至亦登且五六十里時已不及而途無可宿必止於是時纔過午遂偕止而止幸主人楊姓者知江流之源委道路之曲折詢之無不歴歴可據且知溢盤温泉不在亦登而在雞飛乃止而作紀抵暮而臥徐霞客逰記卷十一下

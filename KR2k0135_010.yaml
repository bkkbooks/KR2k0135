body:
  text: 徐霞客遊記卷十上明徐宏祖撰西南遊日記十七雲南三月二十一日雞再鳴促主者炊起而候飯天明乃行雲氣猶勃勃也北向仍行溪西三里有亭橋跨溪上亭已半圮水沸橋下甚急是為四十里橋橋東有數家倚東崖下皆居停之店此地反為䝉化屬蓋橋西為趙州其山之西為䝉化橋東亦為䝉化其山之東為太和犬牙之錯如此至此始行溪東傍㸃蒼後麓行七里有數十家倚東山而廬夾路成巷是為合江鋪至是始望西北峽山橫裂有山中披為隙其南者余所從來峽也其北來者下江嘴所來漾濞峽也其西南下而去者二水合流而下順寧之峽也峽形雖遙分而溪流之㑹合尚深嵌西北峽中此鋪所見猶止南來一溪而已出鋪北東山餘支垂而西突路北踰之遂併南來溪亦不可見蓋餘支西盡之下即兩江㑹合處而路不由之也西北行坡嶺者四里始兩有小流自東北兩峽出既而盤曲西下一澗自東北峽來者差大有亭橋跨之亭已半圯是為亨水橋蓋蒼山西下之水此為最大亦西南合於南北二水交㑹處然則合江之稱實三流不止漾水濞水而已從橋西復西北踰一小嶺共一里始與漾水遇其水自漾濞來經此即南與天生橋之水合破西南山峽去經順寧泮山而下瀾滄江路溯其東北岸行五里有村居夾而成巷為金牛屯出北有小溪自東山出架石梁其上側有石碑拭而讀之乃羅近溪所題石門詩也題言石門近在橋左因矯首東望忽雲起迸坼露出青芙蓉兩片插天拔地駢立對峙其內崇巒叠映雲影出沒令人神躍亟呼顧僕與負僧而二人已前遙追之二里乃及方欲强其還而一僧旁伺問之即石門旁藥師寺僧也言門上有玉皇閣又有二洞明敞可居欣然願為居停主乃東向從小路導余五里抵山下過一村即藥師寺也遂停杖其中其僧名性嚴坐余小閣上摘蠶豆為餉時猶上午豫欲登山性嚴言玉皇閣躡峯而上十餘里且有二洞之勝須明晨為竟日游今無及也蓋性嚴山中事未完既送余返寺遂復去且以匙鑰置豫側豫時慕石門竒勝餐飯即扃其閣東南望石門而趨皆荒翳斷塍竟不擇道也二里見大溪自石門出溪北無路入乃下就溪中溪中多巨石多奔流亦無路入惟望石門近在咫尺上下壁凑駢削萬仞相距不踰二丈其頂萬端如一其根止容一水蓋本一山外屏直從其脊一刀中剖而成者故既難為陸陟復無從溯溪徘徊久之乃渡溪南反隨路西出久之得一徑東向復從以入將及下復渡渡溪北縛溪中木架巨石以渡知此道乃不乏行人甚喜過望益東逼門下叢篁覆道道分為二一東躡坡磴一南下溪口乃先降而就溪則溪水正從門中躍出有巨石當門扼流分為二道襲之而下北則漫石騰空作珠簾狀而勢甚雄南則嵌槽搗隙為懸霤形而勢甚束皆髙二丈餘兩旁石皆逼削無能上也乃復上就東岐躡磴已又分為二一北上躡坡一南凌溪石乃先就溪凌石其石大若萬斛之舟髙汛溪中其根四面俱湍波瀠激獨西北一徑懸磴而上下瞰即珠簾所從躍出之處上眺則石門兩崖劈雲削翠髙駢逼凑真竒觀也但門以內則石崩水涌路絶不通乃復上就北岐躡磴始猶藤箐䝉茸既乃石崖聳突半里路窮循崖南轉飛崖倒影上逼雙闕下臨絶壑即石門之根也雖猿扳鳥翥不能度而入矣久之從舊路返藥師寺二十二日晨起候飯性嚴束火負鐺摘豆裹米令僧僕分攜乃從寺後東向登山二里轉而南向循山腰上二里復隨峽轉東一里路分二岐一東上者為花椒菴石洞道一南上者一里而踰石門之上此石門之北崖也所登處已在門之內對瞰南崖崩削之狀門底轟沸之形種種神往獨所踞崖端危險不能返觀猶覺未能兩盡也東眺門以內峽仍逼束水自東南嵌底而來其正東有山一支巍然中懸恰對峽門而玉皇閣踞其上尚不能遙望得之蓋其內木石茸密非如外峯可以一覽盡耳于是緣岡脊東上一里南與峽别折而東北上半里坳間有頽垣遺構為玉峯寺廢址其後又有一廢址曰極樂菴從其後復轉向東南上半里再與東峽遇乃緣支峽東向行古木益深半里支峽東盡乃南度其上復北轉共二里而得玉皇閣閣南向石門而遙東臨峽壁而逼初創於朱史二道人今岌岌矣閣東有臺其下有洞為二道靜修處時二僧及僕俱燃火覓泉將為炊余不及覓洞先從閣援石獨上蓋遙望峽後大山上聳三峯者衆皆指為筆架峯謂即東南清碧溪後主峯豫前由四潭而上曽探其陽茲更欲一窮其隂以盡石門澗水之源竟不暇招同行者而同行僧僕亦不能從余遂賈勇直前二里山石既窮而土峯峻甚乃扳樹三里山樹亦盡漸陟其頂層纍而上登一頂復起一頂頂皆燒茅流土無復棘翳惟頂坳間時叢木一區棘翳隨之豫從嶺脊燒痕處行虎跡齒齒印沙土間連上數頂始造其極則猶然外峯也始知蒼山前後共峯兩重東峙者為正峯而形如筆架者最髙西環者南從筆架北從三塔分支西來臂合而前凑為石門但其中俱奔崖墜派不復開洋俱下盤夾箐水嵌其底木叢其上余從峯頭東瞰筆架山之下有水懸澗底其聲沸騰其形夭矯而上下俱為叢木遙罨不能得其全此即石門之源矣又從外嶺北行見其北又分支西下即漾濞驛北之嶺西盡於漾濞橋者也時日色正午開霽特甚東面內峯嶻嶪榆城即在東麓而間隔莫逾一以峯髙崖陡扳躋既難一以山劃兩重中箐深陷降陟不易聞此山北坳中有大堡白雲寺可躋內峯絶頂又南逾筆架乃東下清碧溪大堡之路當即從分支西下之嶺循度脊而上無此中塹之箐眺久之乃循舊跡下三里忽誤而墜西北支路絶崖欹無從懸墜竟不知玉皇閣所倚之支在南在北也方徘徊間雨復乘之忽聞南箐中有呼噪聲知玉皇閣在其下余亦漫呼之已遙相應而尚隔一箐盤箐之上腋二里始得石崖于是扳隙墜空始無流墜之恐而雨傾如注又一里而出玉皇閣之右炊飯已寒重沸湯而飯之閣左少下有兩巨石合掌而成一洞洞髙一丈下濶丈五而上合尖其深入約及數丈而底甚平其石質粗礪洞形亦無曲折之致取其通明而已洞前石崖上下危削古木倒盤霏煙攬翠俯掬轟流令人有杳然别天之想時雨已復霽由舊路轉北而下一里而得花椒菴石洞洞亦巨石所覆其下半叠石盤半庋空中空處浮出二三丈上下亦離丈餘而平皆如砥惟北粘下盤之上而東西南三面俱虛簷如浮舫今以碎石隨其簷而塞之祇留門西向而置佛於中其前架樓三楹而反無壁若以窒洞者室樓則洞與樓兩全其勝矣龕中器用俱備而寂無居人户亦設而不關余愧行腳不能留此為悵然而去乃西向平下一里即石門北頂北來之道向所由上者又北六里而返藥師二十三日晨起為性嚴作玉皇閣募緣疏因出紙請書余書而後朝食山雨忽作因停屐待之近午雨少殺余換草履性嚴披氈送之出藥師殿門即北行二里涉一枯澗其澗自東北山麓出下嵌甚深蒼山之後至此又西一里矣既渡西北上西紆之坡一里踰其上始見其西開一東西塢漾濞之水從其中東注之西向平下共二里山南有數十家當大路是為漾濞驛别送僧溪行西北田塍間三里北界山環而稍南扼水直逼南山下為磯頭村亦有數十家當磯之腋路南向盤之遂躡磯嘴而西半里雨止路轉北復開南北塢于是依東山西麓北行三里抵漾濞街居廬夾街有鐵鎖橋在街北上流一里而木架長橋即當街跨下流皆渡漾濞之水而木橋小路較近余乃就木橋東買蔬米即由此渡其中始覺湯湯西向又有一峽自西來是為永平道望大塢北去亦數里而分為二而永昌大道則從此而西始行塢中三里漸上又二里有數家夾道大坊跨之曰秀嶺連雲言登嶺之始也是為白木鋪由是循南坡西向上二里由坡間轉向南一里復轉向西于是回眺東之㸃蒼東北之鳳羽反愈近然所臨之峽則在南更西躡坡迤邐而上又四里有寺東向當坡嘴中懸是為捨茶寺就而飯由其後又西上路稍平其南臨東出之澗猶故也又二里有村當嶺脊是為橫嶺鋪鋪之西遂西躡交坑中又上三里而透嶺坳之脊其坳夾隘如門透其西即有坑北墜又有坑西流路隨西流者下二里路轉西南峽而水乃由北峽去始知由北流而東入漾别上流者又南二里其峽中平而水忽分南北始知其脉由此峽中自西而東度其上所踰夾隘乃既南而北突之峯非南來之脊也蓋由此而東下者為橫嶺而東盡於白木鋪由其南逶迤南去者東挾碧溪江西挾勝備水而盡於兩水交㑹處是其脉亦不甚長也從峽中南行半里轉西有小水東南墜峽來始成流西去又一里隨流南轉四里有水自東峽出其流始大而峽愈逼南出隘已昏黑稍上坡共二里有一二家倚西坡上投宿不得又南兩崖愈凑三里及之復渡溪東有數家倚東崖下是太平鋪乃宿其敝樓二十四日雞鳴具飯昧爽即行越澗傍西山而南其峽仍逼五里遵西山之崖漸上五里盤其南突之嘴遂挾北峯西行路轉於上溪轉於下又西十里有村倚北山坡峽間廬舍最盛是為打牛坪相傳諸葛丞相過此值立春打牛以示民者也又遵北坡隨峽流西下十里有山橫截其西潄橫截山之東麓太平鋪九渡河自東注之有數家當其交㑹之夾是為勝備村此北來之水即勝備江也盤村坡溯江而北半里乃陟亭橋渡江西崖崖峭甚半里又隔江與勝備村對又南一里有小峽自西來截之漸南上盤其東突之坡共七里又上而盤其南突之嘴水從其下西轉南折而破峽去路從其上挾北坡西下蓋其西有峽自西坳下墜而來又有山從峽南挾之俱東當突嘴之下與勝備合而破其南峽突嘴之路不能超峽而度其南挾之東垂故西折一里而下循其西坳又東折一里而上盤其東垂半里轉而南又有一小水自東垂南西峽來入乃捨其南去大流而溯其西來小流循東垂南崖西向入一里有村踞小流之北坡夾路成聚是為黃連堡始知此小流即雙橋河也飯於其處山雨忽至稍待復行漸轉西北行岡上二里其下峽直自北來乃下度峽中小橋而西從橋西即躡西坡而上二里稍平西向塢倚南峯復上坡二里西踰岡脊南北俱有寺南峯當脊而起其巔頗聳有閣罩其上以逺不及登從脊西遙望其南壑雜沓而下髙山無與為匹者當遙通阿祿司新牛街之境也其西壑亦雜沓而來其外逺山自北亘脊南去北支分而東向逶迤與此屬南抱為壑頗寬豁而坡陀層伏不成平塢西山亘脊之半有寺中懸縹眇雲嵐間即所謂萬松仙景也于是從嶺頭盤旋西北二里轉過西下之峽由其北乃陟西來之脊其脊南北俱有峽路從其中共二里西向稍下樹木深翳再下再過脊又八里有數十家倚北坡夾道而廬是為白土鋪又西入峽七里漸上漸逼西山山脊東垂南北墜壑甚深松翳愈密上下虧蔽有哨房在坡間曰松坡民哨而無居人此處松株獨茂彌山蔽谷更無他木聞其地茯苓甚多鮮喫如山藥坡名以松宜也其脊蓋自西嶺分支東度觀音山者第不知南北之水何下耳于是西上躡磴甚峻數十盤而登共五里有寺踞東懸之脊東向憑臨於松雲翠濤間是為萬松仙景寺後有閣曰松梵朱按君泰禎所題登之東眺甚豁蒼山雪色與松壑濤聲逺近交映也由其後再曲折上躋二里餘登嶺頭又一里餘西過一脊以為絶頂矣頂脊南北分墜之峽似猶東出者又西上一里躡南突之巔榜曰日升天頂又西一里穿峽而入有數家散處峽窪間俱以木皮為屋木枝為壁是為天頂鋪先是土人俱稱為天井豫以為在深壑中而不意反在萬山絶頂也問所謂井者亦竟無有嶺頭之廬以非常站所歇强之後可既止風雨交作寒氣逼人且無從市米得麵為餅而啖之卧二十五日昧爽起平明即行霧蔽山頂茫無可見西向稍下一里山峯簇立成窪窪中有小路北去有小道南流大道隨之南行峽中一里折而隨峽西下峽南已墜壑盤空窈然西出矣西下三里有哨房當坡而西向亦虛而無人其北又有一峽自東下與南峽㑹於坡前路盤坡而北渡坡北澗即隨北澗西下共四里過梅花哨于是南北兩界山漸開循北山又西四里度西垂之脊始全見其南北兩崖下墜之坑盤壑西出而西有巨壑焉沿支西下又八里抵西麓有寺當路北渡峽中小水從其西轉西北行田塍中二里有一塘積水東坡下挾其西而北又三里抵永平縣之東街其處東西兩界山相距八里北即其回環之兜南為其夾門之峽相距一十五里而銀龍江界其中當縣治東有橋跨其上其處即為市而無城其北有城堞略具乃守禦所而縣不在其中也銀龍橋之西又有橋名普濟橋橋下小水東南入銀龍江大道由縣治西沿西山而南至石洞村西西南入山余欲從石洞入湯泉當不沿西山而由中塢蓋溫泉當塢而出也乃從銀龍橋市蔬米即從橋東小路隨江而渡其下流由稅司前西行過一小澮即隨之南行塢中與大道之在西坡者相望而南也八里則溫泉當平疇之中前門後閣西廂為官房東廂則浴池在焉二方池各為一舍南客北女門有賣漿者不比他池在荒野也乃就其前買豌豆炊飯豫先酌而入浴其湯不熱而溫不停而流不深而淺可卧而浴既浴而飯出眺由其西向入峽不二里即花橋大道由其南向踰嶺為爐塘道余時聞有清淨寶臺山者在爐塘之西西由花橋抵沙木河大道入其路迂南由爐塘間道行其路捷余乃即從塢中南向行二里抵南山之麓有水自西峽來東注而入銀龍江峽口即花橋之水也度橋而南半里有寺倚南山而北向曰清真寺由其前東轉半里為後屯有小塢自南來又東截塢半里踰橋上坡東南躋一里轉而東陟其嶺一里從嶺上誤折而南二里踰山南下路絶二里由坑西轉又二里復轉而北仍出後屯小塢乃復上東坡半里有峽直東者為銅礦厰道東向踰岡坳者為門檻爐塘道乃折而從東南稍上踰岡半里東向隨峽而下者二里及峽底則深峽自北而南銀龍江搗壑而隨之路隨其西岸南行溪崖間雷雨大作行雨中十里而雨止有小溪西峽來架木橋渡之依南山東轉二里轉而南一里有數家踞西山之半東向臨江是為門檻村下跨江之橋為門檻橋宿於村家買米甚艱得半升以存米為粥留所買者為明日飯二十六日雞再鳴具飯平明隨江西岸行四里南至岔路有溪自西峽來東與銀龍江合數十家下綰溪口乃下涉其溪緣南山之北于是江東折於下路東折於上東向上者一里餘盤北突之坡而東于是江南折於下路亦南折於上南折處又有峽自東來入正與東折之江對或以為永平之界今僅止此其南折之峽已屬順寧矣循江西嶺南向漸下四里稍折西南下緣江岸已復南折二里出峽峽乃稍開始見田塍山行至是始有稻畦江流其間直南去與瀾滄江合路緣南坡上一里至嶺頭正隔江與東坡之廬對于是緣峽西入遂與江别其峽自西脊東下循北崖平坡入之四里降度峽南循南崖懸躋而上乃西南盤折二里餘踰北突之岡循南坡而西二里有坑北下橫陟之又西二里乃凌其南東度脊此脊之東水下爐塘而南從脊上即西南崇山髙穹上聳圓頂者為寶臺山其北崖復突而平墜者為登山間道其南垂紆繞而拖挾者為爐塘所依余初擬從間道行至是屢詢樵牧皆言間道稍捷而多岐中無行人莫可詢問不若從爐道稍迂而路闢以炭駝相接不乏行人也其岐即從脊間分脊西近峽南下其中居廬甚殷是為舊爐塘由其北度峽上即間道也由其東隨峽南下爐塘道也余乃南下坡一里至峽底半里度小橋隨澗西岸南行其澗甚狹中止通水道一縷兩旁時環畦如杯棬四里稍上陟西崖而下半里始有一旁峽自西北來南涉之又沿西崖漸上五里盤西崖而踰其南嘴乃見西峽甚深峽底爐煙板屋擾擾於內東南嵌於峽口者下厰西北綴於峽坳者上厰也緣峽口之外南向隨流下者往順寧之大道也豫從嶺上西轉見左崖有竅卑口豎喉其墜深黑即挖礦之舊穴也從其上西行二里越下厰抵上厰而坑又中間之分兩岐來一自東北一自西北而爐舍踞其中所出皆紅銅客商來販者四集肆多賣漿市肉者豫以將登寶臺仍齊食於肆由西峽溯流入一里居廬乃盡隨峽北轉峽甚深仄而止通一水得無他迷然山雨傾注如納大麓不免淋漓三里漸上又二里上愈峻見路有挑大根如三斗盎者以杖貫其中執而問之曰芭蕉根也以餉猪峻上二里果見芭蕉蔽崖有掘而偃者即挖根處也其處樹箐深窅山髙路僻幸有炭駝為指迷又上二里乃登其脊有路自東北徑脊而來者乃隨脊向西南去從之行脊上二里乃西南下見路左有峽西北出路遂分為兩岐而所望寶臺圓頂似在西南隔峯乃誤下從峽西南一里渡峽中支澗緣之西北轉一里盤北突之嘴復西南入峽中溯澗二里路漸湮見澗北有燒山者遙呼而問之始知為誤然不知山在何從路當何從惟聞隨水一語即奉為指南復東北還盤嘴處澗乃北轉遂緣坡北向下二里有一岐自東南來合即前分岐西北之正道也蓋寶臺正西南所誤之峽其南即度脊之自東西突者此寶臺東隅之來脉也而其路未開皆深崖峭壑為燒炭之窟以供爐塘所用峽中之流從其西北向流繞北崖而西出至西北隅始與竹瀝寨南來之路合故登山之道必自西北向東南而其東不能竟達也循東崖又北一里復隨澗西轉循北崖西行二里始望見南峽開有村聚倚南山之坡乃西下一里度澗橋緣其南崖西上又一里而抵其村是為阿牯寨乃寶臺門戶也由寨後南向登山三里至慧光寺其寺西向前臨一峽隔峽又有山環之而北而終不見寶臺蓋寶臺之頂髙穹於此寺東南而其正寺又在臺頂之南尚當從西南峽中盤入也時日猶下午僧固止遂留寺中二十七日飯慧光寺即南上五里登其西度之坳此坳乃寶臺之西支下而度此者其坳西餘支即北轉而環於慧光之前踰坳南見南山前轟與坳東橫亘之頂排闥兩重復成東西深峽南山髙與北頂並皆自東而西夾重峽於中而下不見底距瀾滄於外而南為之塹蓋南山自爐塘西南轉而西向溯瀾滄北岸而西行為寶臺南郛于是西距瀾滄之水東包沙木河流度江坡頂而北盡於沙木河瀾滄處此南山外郛之形也寶臺自爐塘西南亦轉而西向大脊中懸南面與南山對夾而為寶臺西面與西度北轉之支對夾而為慧光此寶臺中踞之勢也其內水兩重皆西轉而北出其外大水逆兜獨南流而東繞此諸流包絡之分也至是始得其真面目其山如環鉤其水如交臂山脉自羅均為鉤之根把博南丁當關為鉤幹之中正外與鉤端相對而江坡頂即鉤端將盡處寶臺乃鉤曲之轉折處也瀾滄江來自雲龍州為右臂東南抱而循山之外麓抵山東垂盡處而後去沙木河源從南從東峽為左臂西北抱而循山之內塢抵山西垂盡處而後出兩水一往一來一內一外一順一逆環於山麓而山之南支又中界之自北自南自東自西復自南而北為寶臺之護此又山水交瀠之概也從坳南于是東轉下臨南峽上倚北崖東向行山脊之南兩降兩上三里東至萬佛堂此即大寺之前院也踞寶臺南突之端其門西向而堂殿俱南闢前臨深峽之南則南山如屏髙穹如牆面其上多木蓮花樹極髙大花開如蓮有黃白藍紫數色瓣凡十二片每二月則未葉而花三月則花落而葉生矣絶頂有湧石塔髙二丈云自地涌出乃石筍也其南坳間又有一陜西老僧結茅二十年其地當南山奧阻曾無至者自萬佛堂望之平眺可達而下陟深峽上躋層崖竟日而後能往返焉由萬佛堂後北上不半里即大寺故址時川僧一葦同慧光寺翠峯來訪川僧了凡時了凡從靜室中暫移萬佛前樓豫同往晤之了凡因曳杖前引循北崖東向行盤磴陟坡路極幽峭兩過小靜室兩升降南下小峽深木古柯藤交竹密五里而得了凡靜室室南向與大殿基東西並列第此處東入已深其前南山並夾如故而右砂層叠不比大比之西曠矣其脉自直北圓穹之頂中垂而下至室前稍凹前復小起員阜下臨深峽之北而室則正臨其凹處橫結三楹幽敞兩備此寶臺奧境也一葦與了凡以同鄉故欲住靜山中了凡與之為禪語豫旁參之覺凡公禪學宏貫而心境未融葦公參悟精勤而宗㫖未徹然山窮水盡中亦不易得也了凡命其徒具齊飯後雨大至下午乃行共十五里還宿慧光寺二十八日平明飯而行三里北下至阿古寨由其西下又二里越東來澗緣北山之南崖西北上一里盤其西垂而北其下即阿古北二里越西突之坡仍循東坡西北行六里墜懸坡而下一里及澗仍隨澗東岸北行望見峽北有山橫亘於前路直望之而趨五里有一二家倚南山下其前始傍水為田又北二里直抵北山下其前始傍水為田又北二里抵北山下有峽自東而西中有一水沿北山而西注此即舊爐塘西來之道阿古寨之澗南來此與之合是為三岔溪舊爐塘指答者謂間道捷而難詢正指此也于是其峽轉為東西夾水合而西去路北涉之循北崖西行三里西降而出峽口其西乃開南北大峽蓋南自寶臺南峽來北下二里始為平川水與路俱去險就夷北行溪東三里有村倚東山下曰狗街子倚西山曰阿夷村東山乃博南大脊西盤西山乃寶臺南山北轉者也其山平展而北又四里而沙木河驛之西坡自丁當關西突於川之北與西界山凑川中水自沙潭亦逼西山之麓而北路乃涉水緣西崖之上行又三里北下及溪有橋跨溪其橋有亭上覆曰鳳鳴橋飯於橋西隨西山大路北行三里盤西山北突之嘴于是北塢稍闢田塍交布路盤嘴西行又一里為灣子村數家倚南山北麓當北突之腋故曰灣子由其西循峽南入一里峽窮復遵峽西之山曲折西向上躋三里陟嶺脊踞嶺東望東界即博南山其外有崇峯另起橫峙於五十里外者為瓦窑山乃永平北與雲龍州分界昔王磐據而為亂處西望則重崖層峽而瀾滄之流已嵌其底也由脊而東有菴橫跨坳中題曰普濟菴有僧施茶於此是即所謂江坡頂也蘭滄江自吐蕃嵯和哥甸南流經麗江蘭州之西大理雲龍州之東至此山下又東南經順寧雲州之東南下威逺車里為撾龍江入交趾至海由嶺南行一里即曲折下其勢甚陡為之字下者三里而及江岸即挨東崖下溯江北行又一里而至鐵鎖橋之東先臨流設關鞏石為門內倚東崖建武侯祠及稅局橋之西鞏關亦如之內倚西崖建樓臺並祀創樓者鞏關俱在橋南其北皆崖石巉削無路可援蓋東西兩界山在橋北者皆夾石倒壓江面在橋南者皆削土駢立江旁故取道俱南就土崖作之字上下而橋則架於其北土石相接處其橋濶於北盤江上鐵鎖焉而長則殺之橋下流皆渾濁但北盤有奔沸之形淜湃之勢似淺此則渾然逝淵然寂其深莫測不可以其狹束而以北盤為共擬也北盤橫經之練俱在板下此則下既有承上復髙綳兩崖中架兩端之楹間至橋中又斜墜而下綳之交絡如機之織綜之提焉五里至平坡鋪時日色尚可行而負僧苦於前遂止二十九日雞再鳴具餐平明行即曲折南上二里餘轉而西其山復土盡而石于是滄江東南從大峽去路隨小峽西向入西一里石崖矗夾有水自夾中墜先從左崖棧木橫空度即北向叠磴夾縫間或西或北曲折上躋甚峻兩崖夾石如劈中垂一霤水搗石而下磴倚壁而上人若破壁捫天水若爭道躍顙兩不相遜者夾中古木參霄虬枝懸磴水聲石色冷人心骨不復知有扳石之苦亦不知為經行之道也上二里有菴夾道有道者居之即所謂山達關也由其後又西上路分為二一渡水循南崖一直上循北崖共一里而合遂凌石峽上余以為山脊矣其內猶然平峽水淙淙由峽中來至是墜峽石東下其外甚峻其內甚平下墜如城四山回合於其上底圓整如鏡得良疇數千畝村廬錯落雞犬桑麻俱有靈氣不意危崖絶磴之上芙蓉蒂裏又現此竒境也至是而知平窪中環山頂之水交注窪中惟山達關一線墜空為水口武陵桃源王官盤谷皆所不及矣此為入滇第一勝以在路旁人反不覺也循窪東稍南上為水寨鋪二里踰一東坡之脊過脊南東南二面山皆下伏于是東望寶臺如蘭滄挾其南去南瞻蘭滄西岸羣峯雜沓已下闕自此至四月初九共缺十日其時當在永昌府入叩閃人望名仲儼乙丑庶吉士與徐石城同年以年家故往叩之並晤其弟知願名仲侗丙子解元四月初十日閃知願早令徐使來問夫而昨所定者竟不至徐復趨南關覓一夫至豫飯已久矣乃以衣書等物寄陶道上午出南門門外有小水自西而東弔橋跨其上即太保山南峽所出者南行五里有巨石梁跨深溪上其下水斷而不成流想即沙河之水也又南半里坡間樹色頗似吾鄉櫻株而不見火齊映樹一二家結棚樹下油碧輿五六肩乃婦人之游於林間者不能近辨其為何樹也又南半里有堤如城垣登其上則堤內堰水成塘西浸山麓東築堰髙丈餘隨東堰西南行二里堰盡山從堰西南環而下南轉行其前又二里有數十家倚西山下山復環其南是為卧獅窩蓋其西大山將南盡支乃東轉其南為卧獅峯乃西南坳中山形再跌而下其上峯石崖盤突儼然一狡猊之首其下峯頗長則卧形也余先望見大路在南坡之上初不知小路之西折而當獅崖盤突間候土人而問初一人曰此石花洞也再問一人曰此芭蕉洞也小路正從其下過石花即其后來之名耳蓋大路上南坡而小路西折而由此豫時欲從小路上而僕擔俱在後坐久之俟其至從村南過小橋有碑稱卧佛橋過橋即西折從小路上坡一里從坡坳間渡小水即仰見芭蕉洞在突崖之下蓋突崖乃獅首而洞則當其卧臍之間涉澗西上探洞洞門東向髙穹二丈正與筆架山遙對洞內丈餘即西北折而下其洞下雖峻而路頗夷下三丈漸暗聞秉炬入深里餘姑俟歸途攜炬以窮也出洞循崖西上一里過突崖下峽透脊而西半里度一窪脊以內乃中窪之峽水東挨突崖脊下搗其崖麓無穴以泄水沫淤濁然前所渡芭蕉洞前小水即其透崖瀝峽而出者水從上循嶺南轉一里踰南坡之脊始見脊南亦下墜成大窪而中無水豫從小道循西大山南行嶺間五里連踰二坡脊共二里降而下坡半里而得窪底鋪五六家在坑峽間其峽雖中窪而中無滴水隨窪西下一里直抵大山下復南行窪峽中二里又得東墜之脊一里又南上坡盤坡南離立圓峯取道峯隙而南一里轉峯腋始東南上盤而西南共里餘則南北兩支俱自北大山之西分枝東繞中夾成峽甚深路踰北支從其上西向入峽其南支則木叢其上箐墜其下雖甚深而不聞水聲西行二里乃西下箐中又一里有數家當箐底是為冷水箐乃飯於鬻腐者家于是西南隨箐上一里過一脊脊南始見羣山俱伏有逺山橫其西南路又踰岡西上一里登其南突之崖是為油革關舊址乃舊之設關而𣙜稅處今已無之其西即墜崖西下甚峻下二里漸平又二里西峽漸開有僧新結樓倚北山下施茶曰孔雀寺由寺西循山嘴南轉共一里踰嘴而西乃西北盤其餘支三里而得一亭橋橋跨兩峽間下有小澗自北而南已中涸無滴橋西踰坡西北下路旁多黃果即覆盆子也色黃酸甘可以解渴其西塢大開塢西大山一橫於西一橫於南而蒲縹村當西大山下其山南自南橫大山又東自油革關南下之支橫度為低脊而復起者其中水反自南而北抵羅岷而西入潞江焉共西下二里乃得引水之塍其中俱已插秧遍緑又西北二里過蒲縹之東村村之西有亭橋跨北注之溪曰吳氏輿梁又西半里宿於蒲縹之西村其地米價頗賤二十文可飽三四人十一日雞鳴起具飯昧爽行從村西即北向循西大山行隨溪而北漸髙而陟崖共八里為石子哨有數家倚西山之東北隅又北二里乃盤山西轉有峽自西而東合於枯飄北注之峽溯之依南山之北西入二里下陟南來峽口峽中所種俱紅花成畦今花已可採矣西一里陟西來峽口其上不多水亦無幾有十餘家當峽而居為落馬厰度峽北復依北山之南西入一里平上踰脊其脊自南而北度起為峽北之山而北盡於羅岷者也踰脊西行峽中甚平路南漸有澗形依南崖西下路行其北三里有數家倚北山而居有公館在焉為大坂鋪從其西下一里有亭橋跨澗涉澗南依南山之北西下二里有數家當南之峽為灣子橋有賣漿者連糟而啜之即豫地之酒釀也山至是環聳雜沓一澗自東來者即大坂之水一澗自南峽來者墜峽倒崖勢甚逼仄北下與東來之澗合而北去小木橋橫架其上度橋即依西山之東北行東山至是亦有水從其北峽西下三水合而北向破峽去東西兩崖夾成一線俱摩雲夾日溪嵌於下䝉箐沸石路緣於上鏖壁遮崖排石齒而北三里轉向西下石勢愈峻愈合西二里峽曲而南澗亦隨峽而曲路亦隨澗而曲半里復西盤半轉半里復西向緣崖行一里有碑倚南山之崖題曰古盤蛇谷此險真冠滇南也碑南漸下峽亦漸開又西二里乃北轉下坂復轉而西一里有木橋橫澗而北乃度循北崖西行一里踰南突之脊于是西谷大開水盤南壑路循北山又西平下三里北山西斷路乃隨坡南轉二里餘則江流已從西北嵌腳下逼東山南峽之山轉而南去矣乃南向下坡一里有二三家倚江岸而栖乃就瀹水以飯時渡舟在江南岸待久之乃至登舟後舟子還崖岸而飯久之不至下午始放渡而南土人言瘴癘甚毒必飲酒乃渡夏秋不可行豫正當夏孟亦但飯而不酒坐舟中櫂流甚久亦烏覩所云瘴母哉渡南涯暴雨忽來見涯西有樹甚巨而鬱葱如盤急趨其下其樹甚異本髙二丈大十圍有方石塔甃其間髙與幹等幹跨而絡之西北則幹密而石不露東南臨江則幹跨而石出幹與石連絡為一不可解矣亦窮崖一竒也已大風作而雨散復西向平行上坡望西北穹峯峻極西南駢崖東突其南崖有居廬當峯而踞即磨盤石也望之西行十里逼西山雨陳復來已虹見東山盤蛇谷上雨遂止從來言暴雨多瘴亦未見有異也稍折而南二里有村當山下曰八灣數家皆茅舍一人言此地熱不可栖當上山乃凉從村西隨山南轉一里過一峽口循峽西入南涉而踰一崖約一里遂從南崖西上其上甚峻曲折盤崖八里而上凌峯頭即所謂磨盤石也百家倚峯頭而居東臨絶壑下嵌甚深而其壑東南為大田禾芃芃焉其夜倚峯而栖月色當空此即髙黎貢山之東峯憶昔諸葛武侯王威寧驥之開疆方威逺之獨戰身死往事如看鏡浮生獨倚岩余為之慨然者久之十二日雞再鳴飯昧爽即行其處雖當峻峯之上而居廬甚盛有公館在村北潞江驛在其上山下東南成大川已插秧盈緑潞江沿東山東南去遂由磨盤石西南上仍峻甚二里踰其南峽之上其峽下嵌甚深自西東向峽底無餘隙惟聞水聲潺潺在深箐中峽深山亦甚峻藤木䝉蔽猿鼯晝號不絶峽北則路緣崖上隨峽西進上去山頂不一二里緣峽平行西四里有石洞南臨路崖深濶丈餘土人鑿石置山神碑於中又四里稍折而北上崖旋西西登臨峽之坡北峽之上至是始南垂一坡而南峽之下則有峽自南山夾底而出與東出之峽㑹成丁字而北向垂坡焉又西二里或陟山脊或緣峯南又三里有數家當東行分脊間是為蒲滿哨蓋山脊至是分支東行又突起稍髙其北又墜峽北下由此西望一尖峯當西復起其西北髙脊排穹始為南度大脊所謂髙黎貢山土人訛為髙良工山䝉氏僭封為西嶽者也其山又稱為崑崙岡以其髙大而言然正崑崙南下正支則方言亦未為無謂也由蒲滿哨西下一里西抵所望尖峯即躡級數轉而上兩旁削崖夾起中墜成路路由夾崖中曲折上升兩岸髙木蟠空根糾垂崖外其上竹樹茸密覆隂掛幕從其上行不復知在萬山之頂但如唐人所咏兩邊山木合終日子規啼情與境合也一里餘登其脊平行脊上又二里餘有數家倚北脊是為分水關村西有水沿北坡南下南轉西踰嶺脊磚砌鞏門跨度脊上其關甚古頂已中頽此即關之分水者于是西下峽稍轉而南即西上穿峽踰脊共五里度南橫之脊有數家是為新安哨由哨南復西轉或過山脊或蹈嶺夾屢上屢下十里為太平哨于是屢下屢平始無上陟之脊五里為小歇厰五里為竹笆鋪自過分水關雨陳時至至竹笆鋪始晴數家夾道成衢有賣鹿肉者豫買而炙脯于是直下三里為茶菴又西下五里及山麓坡間始盤塍為田其下即龍川江自北而南水不及潞江三分之一而奔墜甚沸西崖削壁橫江東則平坡環塍行塍間半里抵龍川江東岸溯江北行又半里有鐵鎖橋架江上其製兩頭懸練中穿板如織法一如蘭滄之鐵鎖橋而狹止得其半由橋西即躡級南上半里為龍關數十家當坡而居有稅司以𣙜負販者又西向平上四里宿於橄欖坡其坡自西山之脊東向層突百家當坡而居夾路成街踞山之半其處米價甚賤每二十文宿一宵飯兩餐又有夾包十三日平明飯而行由坡西登嶺西北上八里稍北踰北峽西上二里從嶺上平行一里從嶺頭轉北三里乃西南下峽中一里有四五家當峽而居為赤土鋪其村東與橄欖坡夾而為坳村西有亭橋架小澗上其水自南峽來搗北峽去橋名建安由橋西即南向上坡二里西南登脊又轉而西一里有菴施茶當脊北向而踞為甘露寺又西一里坡間水北向墜崖路越之西向下峽峽中有水自北而南又與上水分南北流乃從峽底溯水北入行峽底一里餘水分二道來皆細甚遂從西坡躡峻上一里北穿嶺夾半里透脊其脊自東北度西南脊以北即墜峽西下路從峽端北轉而西有數家倚北山之上為亂箭哨至是始飯於嶺哨而西向行稍下共二里有塢自南而北細流注其中從北而西出馬邑河又北上坡二里餘有二三家當山坡之南環堵圍南峽之坳甚遙雜植果樹於中為板厰由其西二里又西下半里峽坳有十餘家當坳而居為芹菜塘其前小水東北流村廬不多而皆有杜鵑燦爛血艷奪目若以為家植者豈深山野人有此異趣若以為山土所宜何他岡别隴杳然無遺也由村西復西上坡一里轉峽而平行頂上三里乃出西嶺之端下望其塢甚深而中平如砥良疇逺村交映其間其塢大而圓乃四面小山環圍而成者不比他川之沿溪成峽而已西向峻下者五里循峽東北折又折而西三里乃循東山北行其下稍平又二里有村當東山之麓為坡腳村有賣漿者出酒甚㫖以醋芹為案與同行崔姓者連啜二壺乃行西行平疇中一里有小水自南而北又西北二里有村田雷打田其東亦有小溪自南而北是溪東田窪間土皆黑墳土人芟其上層曝乾供㸑蓋煤堅而深入土下此柔而浮出土上而色則同也由村北又西三里有廬舍當坡塍間曰土鍋村村皆燒土為鍋者于是其西廬舍聨絡一里為東街又半里西交大街則十字為衢者也騰越州城之南門即當大街之北城南居市甚盛城中所無而此城又迤西所無乃稅駕於大街東黔府官舍時適過午也十四日早雨命顧僕覓潘秀才家投吳方生書上午雨止潘來顧下午余往顧而潘出乃返作紀寓中薄暮同行崔君挾過酌於市以竹實為供竹實大如松子肉圓如蓮肉土人煮熟以賣既乃投壺命酌月上而返氷輪皎然十五日晨往晤潘潘勸無出關上午潘餽酒肴下午店中老人亦來勸豫無行先是豫以阮玉灣書畀楊主人托其覓同行者主人唯唯至暮以潘酒招之共酌兄弟俱勸余毋即行謂炎瘴正毒奈何以不資輕擲也屈指八月王君將復來且入內同之入關最便余姑諾之是夜月甚皎而邸舍不便憑眺竟鬱鬱卧徐霞客遊記卷十上欽定四庫全書徐霞客遊記卷十下明徐宏祖撰西南遊日記十八雲南十六日晨起候主人飯欲為尖山之行其山在州城西北百里先是主人言其靈異慫恿豫行故謀先及之乃以竹箱衫氈寄楊主家挈輕囊與顧僕行從南門外循城西行半里過新橋巨石梁也橋下水自北合三流襟城西而南過此南流去余既過橋四望山勢回環先按方而定之當城之正東而頂平者為球山亂箭哨之來道踰其南脊當城之正西而尖聳者為雷鼓山南為龍光臺為緬箐道為水口西夾直北者為上干峩山去城北二十里直南者為來鳳山州治之脈從之北度又西突保祿閣為水口東夾城西南為水口束峽極緊墜空而下為趺水崖城東南東北俱有回塢而東北獨伏有髙山穹其外城西北一峯獨聳髙出衆峯為巃嵸山直南為筆峯為寶峯為擂鼓而盡於龍光臺從此西度南轉為猛蚌從此東度為上干峩低伏而東度南起為赤土山亂箭嶺南下西轉為羅生山支分極北者為球峙州東而北盡於馬邑村支分由西而北者為來鳳峙州南而西夾水口北與龍光對此州四面之山也其水一東南出羅生山北流經雷打田至城東北一東出亂箭哨北流西出馬邑村西南至城東北一出巃嵸山滀為海子流為髙河南至城東北三水合為一是為大盈江由城西而南過二橋墜峽下搗其深十丈濶三丈下為深潭破峽西南去經和尚屯又名大車江此州四面之水也其北二日抵界頭與上江對其南一日抵南甸與隴緬甸對其西一日半至古勇與茶山對其東一日半至分水關與永昌對八關自其西北斜抵東南西四關東四關遂分華夷之界此其四鄙之望也大盈江過河上屯合緬箐之水南入南甸為小梁河經南牙山又稱為南牙江西南入干崖雲籠山下名雲籠江沿至干崖北為安樂河折而西一百五十里為檳榔江至北蘇蠻界注金沙江入於緬一曰合于太公城此城乃緬甸界按緬甸金沙江不注源流志但稱其濶五里然言孟養之界者東至金沙江南至緬甸北至干崖則其江在干崖南緬甸北孟養東矣又按芒市長官司西南有青石山志言金沙江源出之而流入大盈江又言大車江自騰衝流經青石山下當亦流經而非發軔若發軔豈能即此大耶又按芒市西有麓川江源出峩昌蠻地流過緬地合大盈江南甸東南一百七十里有孟乃河源出龍川江而龍川江在騰越東實出峩昌蠻地南流至緬太公城合大盈江是麓川江與龍川江同出峩昌同流南甸南干崖西同入緬地同合大盈然二地實無二水豈麓川即龍川龍川即金沙一江而三名耶蓋麓川又名隴川龍與隴實相近必即其一無疑蓋峩昌蠻之水流至騰越東為龍川江至芒市西為麓川江以與麓川為界也其在司境實出青石山下以其下流為金沙江遂指為金沙之源而非源於山下可知又至干崖西南緬甸之北大盈江自北來合同而南流其勢始濶于是獨名金沙江而至太公城孟養之界實當其南流之西故指以為界非孟養之東又有一金沙南流干崖之西又有一金沙出青石山西流亦非大盈江既金沙而入緬龍川江又入緬而合大盈大盈所入之金沙即龍川下流龍川所合之大盈即共名金沙者也分而岐之名愈紊㑹而貫之脉自見矣此其二水所經也于是益知髙黎貢之脉南下芒市木邦而盡於海潞江之獨下海西可知矣按志又有大車湖在州南甚廣中有山如瓊浪中一㸃青今惟城北上干峩巃嵸山下有二海子城南並無瀦水豈洪流盡揚塵耶過新橋行半里有岐西北行者為烏沙尖山道有岐南下者為趺水河道余聞其勝甚乃南趨出竹塢中一里涉一東流小澗南上坡折而東約半里大石梁架大盈江上其橋東西跨新橋下流從橋南上坡不半里其水從左峽中透空平墜而下崖深十餘丈三面環壁水分三派飛騰中濶丈五左駢崖齊涌者濶四尺右嵌崖分趨者濶尺五蓋中如簾左如布右如柱勢極雄壯與安莊白水河齊觀但此崖更近而逼從西崖繞南崖平對而立飛沫倒捲屑玉騰珠遙灑人衣面白日間真如雨花雪片土人所稱久雨不晴者以此但雨字當易旱為是用雨字則叠牀架屋矣其水下墜深潭嵌流峽底因下蹈之有屋兩重在夾壑中乃王氏水舂也復上西崖其南一峯髙聳憑空掛瀑為龍光臺上建關帝殿回盼久之復下西崖其崖甚狹東即瀑流墜空西亦夾坑環屋俯視屋下坑底有流叠碓亦水舂也而當環坡間其西即南下緬箐大道不知水所從出細瞰之水從腳下透穴出南分為二一隨大道南注一復入巨石下入夾坑之屋為舂回眺崖北有峽一線深下五六丈駢峙北來濶僅一尺而髙不啻三丈餘水從其底透入前崖之腹而出其南計崖穴之上髙亦三丈餘南至出水之穴上連三四丈不識其下透之穴與上駢之峽從何而成天巧人工兩疑不能至此矣從崖上躡西峯一里有寺踞峯之東門東向為毗盧寺由其西二里直抵擂鼓尖峯下見有路直躡峯西上而路有二生指寶峯大道尚在北乃橫陟田間半里得大道隨而西上坡二里西抵擂鼓之北當西北從岐上而豫誤從西南一里躡峻一里漸轉南陟復向擂鼓行又一里心知其誤遂西踰嶺脊則望見寶峯殿閣在西北嶺半與此脊齊等而隔箐兩重其下甚深皆從西南嶺脊墜下計隨坡東下就大路復上與躡坡西上從峯脊轉下其路相比不若上之得以兼陟其頂也遂西南上甚峻一里直出擂鼓尖之西有路自尖南向來合同之西北度脊脊北路分為二一西北沿峯去一東北扳嶺行一里再踰頂陟脊其脊兩旁皆東西下乃飯於脊過北路復分為二如前然東北者猶非寶峯路尚隔一箐也乃復西北上頂一里躡其最髙處東俯州城東塢西俯峩隴南塢皆近夾此脊下而峩隴之西又有髙峯一重自此而南夾峩隴之塢南出緬箐而與大盈之江合而南去頂東南深樹密翳乃從西北下甚峻半里就夷又半里路交十字一從南直北者俱行其脊一從東箐中上橫過西北者出山腰知寶峯之寺在箐翳矣乃折而東下木葉覆叢條間甚峻而滑非扳枝足無粘陟一里轉殿角之右則三清殿也前有虛亭三楹東攬一川之勝而其下亭閣綴懸崖間隔箐回坡咫尺縹眇殿西廡為黃冠所栖豫置行囊令顧僕守其處乃由亭前東下道分為二一從右下危坡一從左轉深箐余先隨箐下半里右顧崖間一亭飛綴八角重楞髙倚懸崖之上乃參戎吳君新建以祀純陽者由亭左再下緣箐半里南轉仰見亭下之石一削千仞如蓮一瓣髙穹向空其南又豎一瓣駢附之皆純石無纎紋惟交附處中垂一線濶僅尺餘鑿級其中仰之真若天梯倒掛也北瓣之上大書奠髙山大川五字吳參戎筆其下新搆一軒跨路貌靈官於中南瓣側有尖突聳夾級為門其下則玉皇閣倚之環騰多土山獨是純石崖危穹夾箐之間覺耳目頓異玉皇閣南亦懸箐無路靈官軒北又鑿崖為梯嵌夾石間北下數丈有石坊當其前大書曰太極懸崖從此北度東下之箐再上北坡共里餘則寶峯寺當峯而踞髙與玉皇閣等而閣東向此寺南向寺東龍砂最微固不若玉皇閣當環箐之中央得一山之正也寺頗寥落有尼居之此昔之摩伽陀修道處他處皆釋盛於道而此獨反之已復下箐中躡太極崖過北瓣下從一線之級上級峻甚幾不能留趾幸兩崖逼束手撐之以登一上者八十級當純陽亭之南峽始曲折為梯又三十餘級而抵虛亭間豫擬眺月於此以擴未舒之觀因拭卓作紀令顧奴汲水太極下箐東以㸑二黃冠止之以飯飯余仍坐虛亭忽狂飈布雲逮暮而月色全翳邵道謂虛亭風急邀余卧其榻十七日余起見日麗山幽擬暫停憩其間以囊中存米作粥令顧僕入州寓取貴州緑紗將鬻以供杖頭而此地離州僅八里奴去不返抵下午腹餒甚胡道飯余既而奴至紗仍不攜來也十八日録紀於虛亭先夜有虎從山下嚙參戎馬參戎命軍士搜山覓虎四峯瞭視者呐聲相應兩箐搜覓者上下不一竟不得虎二十一日飯後别邵道下純陽閣東經太極崖其處若橫北箐而上半里而達寶峯寺余以南箐懸峭昨所未經乃從大路循玉皇閣下懸崖曲折下半里又度北箐之下峽從環岡大道復半里北上寶峯寺問道於尼尼引出殿左峯頭指山下核桃園直北為尖山道西北登嶺為打鷹山道聞打鷹山有北直僧新開其地頗異乃先趨打鷹于是東北下坡一里抵坡北又北一里餘有數家倚西山麓是為核桃園其西北有坳頗低乃寶峯之從北度脊者有大道西向之有小溪東注踰之直北一里餘乃西北登坡四里踰坡脊而西是名長坡又西半里乃轉而北挾西峯而循其北仍西行脊上其脊北下即酒店嶺之東度為筆巃嵸者南下即野猪坡之南出為鵝籠緬箐者蓋俱從分支之脊行也西五里嶺坳間路交十字乃西北橫陟之當從北躡坡誤從西行嶺之南二里遇樵者知為鬼甸道打鷹開寺處已在直北雙峯下然此時已不見雙峯亦不見路影乃躡棘披礫直上者三里露氣襲峯或合或開上又二里乃得亂坪小峯環合之中多回壑竹叢離布見有撐架數柱於北峯之下者從壑中趨之仍無路柱左有蓬一龕僧寶藏迎入其中言開山緣起因與豫遍覽形勢飯後霧稍開余欲行寶藏固留止一宿豫乃從其後山中垂處上其山乃中起之泡也其後復下大山自後回環之上起兩峯而中凹遙望之狀如馬鞍故又名馬鞍山土人言其上多鷹舊志名為集鷹山土音訛為打鷹云其山脉北自冠子坪南聳從頂上分二岐一峙西南一峙東北二峯之支如抱臂前環西南下者當壑右而伏過中復起小阜而為中案南墜而下復起一峯為前案東北下者當壑左而復結為東窪之鑰兩峯凹處正其環窩處前蹲一峯當窩中其脉復自東北峯降而中度宛如一珠之在盤中其前復起兩小阜如二乳之列於胸其脈即自中蹲之峯從左度右又從右前度而復起一阜於中與雙乳又成鼎足前列為中峯近案即南與中案並峙稍度而東又起一阜即北與東窪之鑰對夾故兩乳之前左右俱有窪中凹中峯之后左右亦有峽中扃其脉若甚平而一起一伏隱然可尋其兩峯之髙者左右皆環而止惟中之伏而起者一線前度其東為筆峯巃嵸南為寶峯龍光者皆是脉也土人言三十年前其上皆大木巨竹䝉蔽無隙中有龍潭四深莫能測足聲至則涌波而起人莫敢近後有牧羊者一雷而震斃羊五六百及牧者數人連日夜火大樹深篁燎無子遺而潭亦成陸今山下有出水之穴俱從山根分逗云山頂之石色赭赤而質輕浮狀如蜂房為浮沫結成者雖大至合抱而兩指可攜然其質仍堅真劫灰之餘也寶藏架廬在中峯之下前臨兩乳日後有擴而大者後可纍峯而上前可跨乳為鐘鼓之樓云今諸窪雖中凹而不受滴水東窪之上依石為窞有瀦水一方豈龍去而滄桑倐易獨留此一勺以為開山之供者耶寶藏本北直人自雞足寶臺來見尖山雖中懸而無重裹與其徒徑空覓山至此遂龕坐蓬處者二年州人皆為感動爭負木運竹先為結此一楹而尚未大就云徑空四川人剃髮於甘露寺從師覓山師獨坐空山徑空募化山下為燃一指開創此山俱異人也是晚宿龕中有一行腳僧亦留為僧剃地者乃余鄉張涇橋人蕭姓號無念名道明見之如見故人焉二十二日晨起宿霧淨盡寶藏先以㸃餉余與余周歷峯前憑臨而南為南甸其外有橫山前列則隴川後之界也近嵌麓西為鬼甸其外有重峯西擁則古勇前南下之支也下伏而東度為筆峯其外有髙嶺東穹則髙黎貢後聳之脉也惟北向則本山後屏焉然昨已登巔北眺知東北之豁處為龍川所合西北之叢處為尖山所懸而直北明光六厰之外皆野人之栖矣久之乃飯而别寶藏命其徒徑空前導從東北行皆未開之徑也始逾東環之臂即東北下雖無徑而頗坦三里有路循嶺北西去往鬼甸道蓋是山前後皆向鬼甸道也于是交之仍東下甚峻一里又有路自東南來西北逾嶺去此即州中趨冠子坪道蓋冠子坪從北南度穹起打鷹之頂自北望之不見雙峯如鞍祗覺層起如冠踰脊西下是為坪村所托有龍潭西涌乃鬼甸上流經鵝籠而南下者也余交其路仍東北下行莽棘中一里餘北向下傍西小峽漸有微徑徑右峽中亦有叢竹深藤東轉再踰一峽一里乃北行環岡上岡之西大山始有峽中盤岡之東始隨坡東下共二里抵麓則響水溝之峽在其東矣有溪自西峽出北涉之隨西山北行西山至是稍開有路西入之交其路而北一里稍下又有小水從西塢出是為王家壩又北半里遂與南來大路合又北一里有村在西山下至是中塢始開其塢南從酒店脊來北至此東西乃闢溪沿東麓北下村倚西山東向而路出其中又北里許有岐東北往界頭余循西山西北下度一小峽半里西轉其南谷為灣腰村其北塢為左所屯塢中始有田疇下闢而路從南山西向行一里有小水北流又西一里有結茅賣漿在南山下于是巨松錯立髙影深隂午日俱碧又西二里為馬站其北坡下頗有隔林之廬而當路左者止一家州來者皆飯焉其西始田塍環坡從田中西北行一里抵北山下稍西復北一里踰其坳有墟場為馬站街房其北山坡雜沓石齒髙下東岡與西山遂夾溪北注共三里有山橫於其前乃西隨之半里半透其坳其北則山開而下盤環谷溪從西山透南峽來繞壑北去固知透坳之山乃自南而西轉坳西一峯即西盡於溪者也盤壑而西北一里遂循溪東岸行其西岡松檜稠密飯於溪旁又北半里為丘坡其西則羣山中迸為峽有岐西入之為古勇道其東則谷口橫拓南北之水俱由之出焉乃北行田塍間二里屢踰其分流之水又北一里為順江村西山至是中斷復起其特聳頗厲是為三清山村多環石為垣連竹成隂者又北半里有水自西峽來東向而注是為順江有木梁跨其上順江村之東山塢東闢過橋復北上坡行竹徑中半里北下過乾海子一里北上坡有虛茅在坡北為順江街子復西北行坡坂間其坂西倚三清山東臨夾壑壑之東則江東山南下而橫止焉從此三清西亘江東東屏又成南北之塢行坂間三里北向稍下忽聞水聲則路東有溪反自南而北至是乃轉東去想順江之分流而至者蓋江東山之西已有兩江自北而來此流何以反北耶流既東路遂北盤東垂之坡二里是為雞茨坪踰坪北下一里復得平疇有賣漿者當路右東北行田塍間一里有江自西北注東南長木橋橫跨之是為西江東又有一江自東北注東南沿東山與西江並南行塢中是為東江既度西江橋遂北行江夾中一里而至固棟宿於新街其地直東與瓦甸對直西與雲峯對直北與熱水塘對直南與馬站對有新舊二街南為新北為舊二十三日命主人取園筍為晨供味與吾鄉同八九月間有香筍薰乾瓶貯味有香氣北一里過舊街買飛松一梆於劉姓者家飛松者一名狐實亦作梧實正如梧桐子而大倍之色味亦如梧而殼薄易剝生密樹中一見輒伐樹乃可得遲則樹即存而子俱飛去成空株矣故曰飛松惟巔塘關外野人境有之野人時以茶蠟黑魚飛松四種入關易鹽布其人無衣與裳惟以布一幅束其隂上體以被一方幃而裹之不復知有襟袖之屬也此野人即茶山之夷昔亦內屬今非王化所及矣然謂之紅毛則不然也又北二里橫岡後亘望之若東西交屬於兩界崇山不復知有兩江之嵌於兩旁也此岡即雅烏山南垂盡處東西二江皆從其兩腋南出疑即挨河而土人疑為雅烏耳陟岡而北又二里岡左漸突而成峯岡右漸嵌而為坑路漸踰坑傍峯而上于是坑兩旁皆峯復漸成峽循峽西峯行二里陟其北坳遂挾西峯之北而西向下二里路右有大栗樹一枝頗巨而火空其中路左則西江自西壑盤曲東來破峽而東南去于是出固棟西山之西北始下見盤壑西開江盤壑底而尖山兀然立其西南矣又西下一里隨江北岸西行二里始有村廬倚岡頭是為烏索其江反北向折而來路乃南下岡就之半里則長木橋橫架江上反自西而東度之橋東復有竹有廬從其側轉而西南則固棟西山與尖峯後大山圍環其南而江曲其北者也又西半里有村連竹甚盛半里從其村南西轉復行岡坂者二里岡頭巨松錯落村廬倚之半里西向下涉一坑又西南一里連過兩村又西向下涉一坑始及山麓遂西向上半里有小水注坡坂間就而滌體時日色停午解衣浣濯久之乃西南循小徑上一里轉而西始與東來路合時雷雨大至行草徑間一里稍西下涉一峽底于是巨木參霄偉藤䝉塢遂極幽峭之勢盤峽嘴而西一里又涉一峽底二峽皆在深木中有小水淙淙自北而南下注西來之溪合而東行北出者也陟峽之西崖有巨石突立崖右路由巨石之東北向上曲折躋樹䕃中髙崖滴翠深木篩金始知雨霽日來隂晴弄影不礙凌空之屐也上三里遂陟岡脊脊兩崖皆墜深涵碧聞水聲潺潺在其底而不辨其底也脊夾不及七尺而當其中復有鋪木以度者蓋脊兩旁皆土而中復有窞下陷故以木填之行脊上一里北復稍下又歷一南墜之峽半里乃西北上其上甚峻一里餘而飯稍夷轉南盤而北半里復曲折上峻愈甚一里稍夷循峯崖而轉其腰始望見尖峯在隔箐隴樹間而不知所循者亦一尖峯也北半里抵其峯西腋稍西下度一脊遂西上上皆懸崖削磴回顧前所盤脊東峯亦一峯復聳山頭尖峭亦堪尖山伯仲但尖山純石中懸而彼乃土峯前出耳兩峯之北復與西大山夾成深壑支條盤突箐樹䝉蔽如翠濤沈霧深深在下而莫窮端倪惟聞猿聲千百唱和其間而人莫至也崖頭就樹石鑿級為梯極似太華之蒼龍脊兩旁皆危石而石脊中垂濶僅尺許若龍之垂尾以度而級隨之但見層纍不盡而亦不能竟其端倪也梯凡三轉一里而至其頂東西長五丈南北濶半之中蓋玉皇閣前三楹奉白衣大士後三楹奉三教聖人頂平者如是而止其向皆東臨前峯之尖南北夾閣為側樓半懸空中北祠真武下臨北峽而兩頭懸榻以待客南祠山神下臨南峽而中敞為齊堂皆川僧法界所營搆蓋其上向雖有道而未開闢莫可栖托法界成之不及五年今復欲闢山麓為下殿故往州未返余愛其幽峻遂止東側樓守寺二僧一下山負米一供樵炊而已二十四日晨起看天色上霽四山俱露其翠微而山下甸中則平白氤氲如鋪絮又如潏波無分逺近皆若浮翠無根嵌銀連叠不知其下復有坡淵村塍之異也至如山外之山甸外之甸稍逺輒為嵐翠所掩無能拈出獨此時層層襯白一片內一片外搜根剔奧雖掩其下愈疏其上乃呼山僧與之指質逺近諸山一一表出因與懸南崖而下有崖前臨絶壑後倚峭壁中刓橫罅下平上覆恰如匡牀雖小而可憩可卧是名仙牀俯層峭之下巉覆纍纍無可扳循僧指其下有仙僧洞須從梯級下至第二層轉崖下墜乃可得之遂導而行其洞乃大石叠綴所成亂崖顛磴欲墜未墜迸處為罅覆處為洞穿處為門門不一竅洞不一層中缺寬平外支幽險若叠級架板亦可幽棲處也洞門東向腋中者為大入而南穿一峽排空而下南出峽門其門南臨絶壑上夾重崖有二木毬倒懸其前仰睇之其上垂藤自崖端懸空下丈餘即結為癭如瓠匏之綴於蔓者癭之端綴旁芽細枝上迎雨露茸出夭矯花葉不一狀亦有細子圓綴枝間者即山僧亦不能名之但曰寄生或曰木膽一絲下垂結體空中馭風吸露形似膽懸命隨空隨其取意亦不誣也余心識其異欲取之而髙懸數丈前即崩崖直墜計無可得但其前有髙樹自崖隙上聳若得梯橫度樹間緣柯而上以長竹為殳可鉤藤而截取之余乃識而行復隨導僧由梯級北下懸空之臺乃石脊一枝下嵌北壑三面盤空矯若龍首條岡回壑紆鬱其下與仙洞各綴梯級之旁若左右垂珥洞倚南崖以幽峭見竒臺踞北壑以憑臨為勝此峯前兩概也由峯後西南越脊而下更多幽境近法界新開小路下至小甸十里其坡有熱水塘亦法界新開者是午返寺同顧僕取斧縛竿負梯而往遂以前法升木取癭而崖髙峽墜木杪難於著力久而後得之一癭圓若葫蘆倒垂上大下小中環的頸一癭環若巨玦兩端圓凑而中空皆藤懸於上而枝發於下如玦者輕而鬆如葫蘆者堅而重余不兼收後行時止負堅者而走二十五日豫留二詩於山負木膽於肩從東大道下梯級一里東度過凹遂東南循前峯之腰又半里東度脊頂于是俱深木夾道曲折峻下者二里涉一南盤峽復東北上半里凌脊乃東行脊間左右皆夾壑甚深而重木翳之又半里度脊間鋪木脊兩旁甚狹而中復墜空故以木填而度之又東南半里復盤壑東北下二里至巨石之左遂涉南下之溪半里復東踰一岡又半里再涉一南下之溪東向稍上遂出箐東北行一里至下院分岐之路仍從向來之小路一里至浴流之所又半里越塢而得一村入問熱水塘道仍東北三里過烏索橋從橋西踰岡而北一里與大道合隨之西北循東山之麓行六里有岡自東山直對西峯而下驅江流潄西峯之麓而路亦因之與江遇已復踰岡北下北塢稍開有小水交流西注蒸氣鬱然而起即熱水塘也半里抵塘上有池而無屋雨霏霏撲人乃令顧僕守行囊於塘側北半里上坡觀其街子已散而無他物望南岡有村廬在坳脊間街子人指其上有川人李翁家可歇復南半里回覓之有閩人洪姓者向曽寓余鄉為導入同寓余乃出就塘畔招顧僕入出攜餐啖之而北探滇灘阿幸之興不能自已見日色尚早而雨止乃留熱水待出時浴并木膽寄李翁家菜園中仍西北行五里北上坡為左所蓋其分屯處也其處居廬甚盛又北八里直逼西大山東北垂復與江遇回顧尖山與前峯並峙中坳如馬鞍而左所之南復有峯之枝自西山突出橫亘其北故路必東北從烏索橋抵熱水又西北至此也此地正當尖山之北其北則西大山漸伏中遜而西為滇灘過脉處東大山直亘而南分墜西竄下突小山橫界於北為松山坡坡之北即阿幸北進之脉其西北髙峯浮出於橫坡之上則阿幸滇灘之間又中界之一峯所謂土瓜山也行江東岸一里復折而東北一里抵東山腋下山峯叢立處有兩三家倚東坡而栖是為松山從其前又北一里上北山西亘之坡一里躡坡脊從脊間行二里乃西北下半里有石屏西向立峯頭是為土主碑乃神之所托也從石西隨坡下涉江西上乃滇灘關道已茅塞不通惟茶山野人門從此出入負茶蠟紅藤飛松黑魚與松山固棟諸土人交易鹽布中國亦間有出者以多為所掠不甚往也其關昔有守者以不能安居多遁去不處今關廢而田蕪寂為狐兔之穴矣其隘亦紆坦不甚崇險去此三里已望而知之遂北下坡一道從塢間溯江東岸北行為度道捷徑一道沿東坡北上為托宿之所乃下半里渡東來小澗復上東坡北隨之行二里有四五家倚東山而居即托宿之所也其主人王姓者夫婦俱伐木山中未歸余將西度橋望西山下投宿聞其地江岸西廬乃土舍所托皆不納客納客者惟東岸王店方躊躇間一鋤於田者乃王之鄰謂其婦亦入山不識可徐待之否余乃還待於其門久之婦歸為汲水而炊二十六日凌晨起飯西下行田間半里抵江岸溯江北行有木橋跨江而西度之復溯江西岸北行一里北上坡半里折而東盤其東突之嘴半里復轉而北從坡上行西循峯腰東瞰江流塢底至此遂束而為峽隔峽瞻東山之崖崩石凌空巖巖上擁峽中之水北自阿幸厰北姊妹山發源南下南趨烏索而為固棟西江者也東西兩界山自姊妹山分支西下穹為滇灘東北峯而下為土瓜山東下穹為阿幸東山而南接雅烏東山之東北為明光南為南香甸第此山峻隔路仄難踰故行者避之北行西坡五里稍下有小澗自西而東涉之北上于是屢陟東突之坡再渡東流之澗八里西坪稍開然北瞻姊妹反茫不可見又北二里盤西山之嘴始復見姊妹山北倚而前壑之下爐煙氤氲厰廬在焉遂五里而至厰厰皆茅舍有大爐小爐其礦為紫色巨塊如辰砂之狀有一某姓者方將開爐見豫而留飯其龕中言其北姊妹山後即為野人出沒之地荒漠無人居而此中時為野人所擾每凌晨踰箐至雖不滿四五十人而藥箭甚毒中之無不斃者其妻與子俱沒於此現葬山前姊妹山出斑竹北去此三十里可望而盡不必登明光踰峻而過東去此四十里然徑仄無行者恐箐深蔓翳亦不可行乃遂出仍二十里下土瓜山又一里過江橋而東乃沿江南隨塢中捷徑二里抵西南坡下江潄坡而南路稍東踰東峽來小澗其澗西注於江即前涉土主碑坡北之流江之西亦有小澗自滇灘南來東注於江其處乃正流之㑹也復南上坡半里至石屏土主碑下與前來之道合又南越岡而下過松山及諸所二十里而入熱水塘李老家時猶下午遍觀熱水所泄其出甚異蓋塢中有小水自東峽中注而西者冷泉也小水之左右泉孔隨地而出其大如管噴竅而上作鼓沸狀滔滔有聲躍起水面者二三寸其熱如沸有數孔突出一處者有石窞中斜噴者其熱尤甚土人就其下流作一方池而露浴之余畏其熱不能下體僅踞池中石上拂拭之而已此冷泉南坡之熱水也其北倚東坡之下復有數處或出於砂孔或出於石窞其前亦作方池而熱亦如之兩池相望而溢孔不啻百也二十七日晨起飯而行仍取木膽肩負之由岡東南下峽一里復有煙氣鬱勃則熱水復溢塢中與冷水交流而西出峽其塢皆東大山之環壑也由其南復上坡里餘有坑自東山橫截而西若塹界之者其下亦水流淙淙隨坑東向上一里從坑墜處南渡其上蓋其東未渡處亦盤壑成坪有村倚東峯下路當其西南半里有岐一南行坡上一東向村間余意向東者乃村中路遂循東峯南行前望尖山甚近三里稍下見一塢橫前其西下即烏索之旁村其南踰即雅烏之西坳矣乃悟此為固棟道亟轉而東莽行坡坂間一里得南來大路乃知此為固棟向南香甸道從之漸東北上一里稍平東向半里復上坡平上者一里行峯頭稍轉而南半里即南雅烏之脊也從其上可南眺巃嵸山而北來之嶺從其北下墜為岰復起此坡東隨塢脊平行半里乃東北下抵岰東則有路西自岰中來者乃熱水塘正道當從墜坑東村之岐上今誤迂而南也于是又東下一里餘其下盤而為坪當北山之東山界頗開中無阡塍但豐草芃芃東北一峯東突嶻嶪前標即石房洞山也其後乃西北而屬於西山西山則自北而南如屏之列即自熱水塘之東而南度雅塢者也循西山又北下半里有小流東向而墜而路出其西北莫可問為何所已而遇一人執而詢之其人曰雅烏山村也亟馳去後乃知此為畏途行者俱不敢停趾而余貿貿焉自適也又北一里再踰一東突之坡一里登其岰中始覺東江之形自其南破雅烏東峽而去而猶不見江也北向東轉而下一里有峽自西北來即嶻嶪後西北之山與西界夾而成者中有小水隨峽東出有小木橋渡其上過而東遂循北山之麓始見南壑中東江盤曲向西南而破峽路從其北東行一里有岐東南下塢中截流渡舟乃東趨石洞之道有路東北挾嶻􅑖之峯而轉乃北趨南香甸道于是東北一里轉嶻嶪峯東遙眺其塢大開自北而南東西分兩界夾之西山多東突之尖東山有亘屏之勢塢北豁然遙達塢東則江東北嶂矗峙當夾惟東南一峽窈窕而入為陽橋石洞之徑西南一塢宛轉而注為東江穿峽之所先是豫望此嶻嶪之峯已覺其竒及環其麓仰見其盤亘之崖層聳叠上既東轉北向忽見層崖之上有洞東向欲一登而不見徑欲舍之又不能竟去遂令顧僕停行李守木膽於路側余竟仰扳而上其上甚削半里之後土削不能受足以指扳草根而登已而草根亦不能受指幸而及石石亦不堅踐之輒隕扳之亦隕間得一少粘者綳足掛指如平帖於壁不容移一步欲上既無援欲下亦無地生平所歷危境無逾於此蓋峭壁有之無此蘇土蘇土有之無此蘇石久之先試得其兩手兩足四處不摧之石然后懸空移一手隨懸空移一足一手足牢然後懸空又移一手足幸石不墜又手足無力欲自墜久之幸扳而上又橫帖而南過共半里乃抵其北崖稍循而下墜始南轉入洞洞門穹然如半月上覆上多倒垂之乳而中不甚深五丈之內後壁環擁下裂小門批隙而入丈餘即止無他竒也出洞仍循北崖西上難於橫帖之陟即隨峽上躋冀有路北迂而下久之不得半里踰坡之西復仰其上崖髙穹有洞當其下洞門南向益竭蹶從之半里入洞洞前有巨石當門門分為二先從其西者入門以內輒隨巨石之後東轉其夾成曲房透其東其中又旋為後室然亦丈餘而止不深入也旋從其東者出還眺巨石之上與洞頂之覆者尚餘丈餘門之東又環一石對之其石中懸如臺若置梯躡之所攬更竒也出洞循崖而北半里其下亦俱懸崖無路然皆草根綴遂坐而下墜以雙足向前以兩手反而後揣草根略逗其投空之勢順之一里下乃及其麓與顧僕見若更生也日將過午食攜飯於路隅即循西山北行三里而西山中遜又一里有村倚西山塢中又半里繞村之前而北遂與江遇蓋江之西曲處也其村西山後抱東江前揖而南北兩尖峯左右夾峙如旗鼓配合甚稱有小溪從後山流出傍村就水皆環塍為田是名喇哈寨亦山居之勝處也溯江而北半里度小溪東注之橋復上坡二里東北循北尖峯之東麓一里仰見尖峯之半有洞東向髙穹其門甚峻上及峯頂如簷覆飛空乳垂於外檻橫於內而其下甚削似無陟境蓋其路從北坡橫陟也余時亦以負荷未釋遂先趨厰又北一里渡一西來小澗有村廬叢接於江之西岸而礦爐滿布之是為南香甸乃投寓於李老家時甫過午也先是豫止存青蚨三十文攜之袖中計不能為界頭返城之用然猶可糴米為一日供逮石房洞扒山手足無主竟不知拋墮何所至是手無一文乃以褶襪裙三事懸於寓外冀售其一以為行資久之一人以二百文買紬裙去余欣然沽酒市肉令顧僕烹於寓余亟索飯乘晚探尖峯之洞乃從村西溯西來之溪半里涉其南從僰夷廬後迤邐南上坡一里遂造洞下洞內架廬三層皆五楹額其上曰雲岩寺始從其下層折而北升中層折而南升上層其中神像雜出然其前甚敞石乳自洞簷下垂於外長條短縷繽紛飄揚或中透而空明或交垂而反捲其狀甚異復極其北頂更穹盤而起乃因其勢上架一臺而臺之上又有龕西迸復因其勢上架一閣又從臺北循崖依坡盤空而升洞頂氤氲之氣收覽殆盡臺之北復迸一小龕南向更因其勢而架梯通之前列以小坊題曰水月中供白衣大士余從來嫌洞中置閣每掩洞勝惟此㸃綴得宜不惟無礙而更覺靈通不意殊方反得此神搆也時洞中道人尚在厰未歸雲磴不封乳房無扃憑憩久之恨不擕囊宿其內洞之南復有一門駢啓其上亦乳垂而其內髙廣俱不及三之一扳其上級復透小穴西入二丈後曲而南其中漸黑而有水中貯上有滴瀝聲而下無旁泄竇亦神瀵洞中所酌惟此其中穴更深迥但為水隔而黑不復涉而窮之乃下仍從北岩下循舊路二里返寓啜酒而卧不覺陶然二十八日晨起霧甚平明飯而為界頭之行其地在南香甸東南隔大山大江各一重由南香東北大厰踰山則髙壑重叠路小而近由南香東南陽橋礦踰東嶺則深峽平夷路大而遙時因霾黑小路莫行遂從土人趨楊橋道且可并攬所云石洞從村東度江橋其橋東西橫架於東江之上覆亭數楹由橋東即隨江東岸循東山南向行八里則有峽自東山出遂東轉而蹈之其峽北即東山至此南盡南即東嶺之轉西西矗於南香甸南為江東山北嶺者也開峽頗深而兩岸逼仄循北山東行望見峽內亂峯參差扼流躍穎亟趨之一里至其下忽見北崖中迸夾峙如門路乃不溯澗東上竟北轉入門蓋門左之崖石腳直插澗底路難外瀠故入而內繞耳由門以內仍東躡左崖之後一里踰亂峯之上蓋石峯三四逐隊分行與流相鏖獨存其骨耳循北峯攬澗南亂峯又東一里路復北轉蹈北峯之隙北下半里則峯北又開一峽自北而南與東來之峽㑹於北峯東突之下同穿亂峯之隙而西所謂北峯者從大厰分支西南下即南香甸東突之峯余今所行路其循南垂向東者也其東南垂亦至是而盡是山之西北有礦西臨南香甸者曰朝陽洞是山之東南有礦東臨是峽者曰陽橋陽橋之礦亦多挑運就煎煉於此則知南香乃衆礦所聚也隨峽北望其內山回壑闢有厰亦爐煙勃勃是為石洞厰所云石洞者大厰之脉至是分環西下者自南香東界而南至陽橋下從峽中又東度一峯突為虎砂而包其內東下者亦南走而東環之至東嶺而西轉穹為江東山北境繞為龍砂而包其外其水自石洞東南出合東嶺北下之水西注於亂峯與陽橋度峽水合流西注東江是石洞者衆山層裹中之一壑也從陽橋峽北望而見之峽中度脉而東雖無中界之脊而水則兩分焉豫時欲從峽趨石洞慮界頭前路難辨不若隨同行者去遂捨石洞從東峽溯流入三里東南上坡二里陟嶺巔是即所為陽橋東嶺矣踰嶺即南下一里復陟峽而上從嶺上南行二里就其東南坡而下二里越東流之壑復稍上二里越其南坡再下有岐下東大峽為同行者誤而南一里餘始知其誤乃莽陟坡而東北一里遇西來道偕之東陟塍一里餘則龍川東江之源滔滔南逝繫藤為橋於上以渡橋濶十四五丈以藤三四枝髙絡於兩崖於樹杪中懸而反下編竹於藤上略可置足兩旁亦橫竹為欄以夾之蓋凡橋鞏而中髙此橋反掛而中垂一舉足輒搖蕩不已必手揣旁枝然後可移止可度人不可度馬也從橋東遵塍上始有村廬夾路二里復東上坡由坡脊東行其坡甚平自東界雪山橫垂而西下者行其上三里直抵東山下是為界頭村其村倚東山而北夾廬成街而不見市集詢之知以旱故今日移街於西北江坡之間北與橋頭合街矣蓋此地旱即移街乃習俗也令顧僕買米而炊豫又西北下抵街子視其擾擾而已不睹有竒貨也既乃還飯於界頭其地已在龍川江之東當髙黎貢雪山西麓山勢正當穹窿處髙黎貢俗名崑崙岡故又稱為髙崙山其發脉自崑崙南下至姊妹山西南行者滇灘關南髙山東南行者繞小田大塘東至馬面關乃穹然髙聳橫架天半為雪山為山心為分水關又南而抵芒市始降而稍散其南北之髙穹者幾五百里云由芒市達木邦下為平坡直達緬甸而盡於海則信為崑崙正南之支也由界頭即從雪山西麓南行屢踰西突之坡十五里遙望羅古城倚東山坡間有寺臨之又南二里過磨石河又南二里越一山又踰一西突之岰又南二里過一小木橋又南一里南越一坡又循坡東轉二里抵東南峽口有山自東大山南環而峙於門大路踰坡而南上小徑就峽而西南乃就峽口出則前所過藤橋江亦自塢北來遂循其東岸而南三里始有村倚江岸乃傍村南行又一里宿瓦甸頻江東岸亦南北大塢也村塍連絡東向大山即雪山漸南與山心相近矣二十九日飯而平明臨江東岸行三里兩岸石峯交合水流峽間人踰崖上江為崖所束奔流若線而中甚淵深但峽中多沸水之石激流蕩波而漁者夾流置罾於石影間攬搖曳翠無論得魚與魚之肥否固自勝也半里越崖南下江亦出峽有石浮波面儼然一黿鼉隨水出也又南二里過上莊有山西突中夾塢成田村倚突峯之東江曲突峯之西而路循塢中踰脊而西南又一里復與江遇兩崖復成峽石之突峽迎流與罾之夾流曳翠亦復如前也一里江曲而西路從江之南亦曲而西截江北之塢于是北望隔江南下之山至是中分其東支已盡橫突而東即西峽之繞而下者其西支猶橫突西南即固棟兩江所合而南盤者兩支之中北遜成塢而灰窑厰臨其上焉是厰亦六厰之一所出礦重於他處昔封之而今復開則不及他處矣西一里復上一北突小岡有竹環坡結廬其中者是為苦竹岡越而南下共一里又越塢南上遂從坡上南行二里江隨西峯之嘴曲而東始艤舟而渡其西岸隨西山南行一里坡尾東掉路亦隨而東南踰之一里有一二家倚坡北向而居由其東更南上一里遂踰其東下之脊南行脊間二里復稍下有小峽自西而東其峽甚逼中有小水搗坑東出乃下半里稍西轉迎流行峽中有數家倚峽北是為曲石而峽之西其內反闢而成塢亦有村廬倚之則峽水之所從來也于是南截峽流又上坡行坡間二里有村當路左亦曲石之村廬也又南三里乃隨坡西轉始見坡南塢大開西行一里又南向峻下者一里及塢底有橋跨江亦鐵鎖交絡而覆亭於上者是為曲石橋從江南岸上坡西向由峽上二里餘復南向陟嶺二里登嶺頭有三四家當嶺而居是為酒店以賣漿得名也飯而行循嶺東南向二里下稍西轉復南行坡上又二里稍下陟一塢而上又南二里過陳揮使莊又南隨峽中行二里有隴環前峽折而自西來有峽直南躡其隴余乃隨衆從峽中西行半里漸西上又半里折而南上又半里南登隴脊始踰東度之脉于是南望前壑大開直南與羅生山相對其中成塢甚遙州城隱隱在三十里外東之球亦可全見惟西之寶峯又西北之集鷹皆為巃嵸南下之支所掩不得而見焉余先賈勇獨上踞草而坐久之後行者至謂其地前有盜自東山峽中來截路而劫促余並馳南下東望層峽重巒知有尋幽之境而行者惟恐不去之速也下二里望見澄波滙山麓余以為即上干峩清海子矣又峻下二里有村廬當海子北岸竹徑扶疏層巒環其後澄潭映其前路轉其東北隅有小水自峽間下注有賣漿之廬當其下入而少憩以所負木膽浸注峽泉間且問此海子即上干峩澄鏡池否其人漫應之但謂海中有魚有泛舟而捕者以時插秧止以供餐不遑出賣然憶志言下海子魚可捕上海子魚不可捕豈其言今不驗耶循海東峻麓行二里及海子南濵遇耕者再問之始知此乃下海子上海子所云澄鏡池者尚在村東北重山之上由此而上五里乃及之余不能從南二里越一澗有村連竹甚深是為中干峩村由村南又南下三里其村竹廬交映更遙是為下干峩村至是東坡之下闢為深塢而溪流南貫由是從村南稍西即轉南向隨坡上行一里漸南下俯瞰塢中溪流已有刺小舟而浮者既而南行二里有一二家倚坡灣而居與下干峩南北遙對從此東向隨坡上半里乃躡坡之東嘴從其上南轉則東嘴之下其崖甚峻數十家倚其麓而居竹樹䝉茸俯瞰若不可得而窺也南半里稍西復轉而南半里崖下居廬既盡忽見一大溪東向而橫於前乃透崖而出石穴者崖峻無路下墜沿崖端南行半里稍下見有徑下沿坡麓乃令顧僕守木膽於路隅余策杖墜麓循崖北轉又半里投叢木中則其下石穴交流土人以石堤堰水北注堤之上回流成潭脫四字尺堤之下噴壑成溪濶幾盈四五里泉之溢處俱從樹根石眼糾繆中出隂森沁骨掬而飲之腑臟透徹悔不擕木膽來一投而浸之既乃仍南沿崖麓半里至顧奴候處取木膽負而行又南二里下坡指豫東向踰梁三里抵東山下又有溪自東而西有梁北跨之是為迎鳳橋以其西有飛鳳山也過橋遂直趨而南二里再南踰一梁梁下水如線將絶則黃坡泉之向北而西轉者又南一里又南踰一梁其水亦將絶則飲馬河之向北而西轉者又南一里入騰越北門行城中二里出南門城中無市肆不若南關外之喧填也抵寓已下午下闕徐霞客遊記卷十下

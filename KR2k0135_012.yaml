body:
  text: 徐霞客逰記卷十二上明徐宏祖撰西南逰日記二十一雲南己卯八月初一日自小獵夷東下山獵夷者即石甸北松子山北曲之脈其脊度大石頭而北接天生橋其東垂之嶺與枯柯山東西相夾永昌之水出洞而南流其中開塢南北長四十里此其西界之嶺頭也有大小二獵夷寨大獵夷在北嶺小獵夷在南嶺相去五里皆枯柯之屬自大石頭分嶺為界東為順寧西為永昌至此已入順寧界八里矣然余憶永昌舊志枯柯阿思郎皆二十八寨之屬今詢土人業雖永昌之産而地實𨽻順寧豈順寧設流後畀之耶又憶一統志永昌志二者皆謂永昌之東入峽口出枯柯而東下瀾滄余按姚關圖説已疑之至是詢之土人攬其形勢然後知此水入峽口山透天生橋即東出阿思郎遂南經枯柯橋漸西南共四十里而下哈思凹即南流上灣甸合姚關水又南流下灣甸會猛多羅而路江之水北折而迎之合流南去此説余遍訪而得之獵夷主人楊姓者與目之所覩姚關圖所云皆合乃知統志與郡志之誤不淺也其流既西南合潞江則枯柯一川皆首尾環向永昌其地北至都魯凹南窩南至哈思凹皆屬永昌為是其界不當以大石頭嶺分當以枯柯嶺分也由嶺頭東南直下者三里始望見江水曲折南流川中又下三里乃抵江上有鐡鎖橋橫架江上其製一如龍江曲尺而較之狹其半其水自阿思郎東向出石崖洞而西南入哈思凹峽中者即永昌峽口山入洞之下流也按阿思郎在獵夷北二十里其北有南窩都魯凹則此塢極北之回環處也踰嶺而北其下即為滄江東向之曲乃知羅岷之山西南下者盡于筆架直南下者盡于峽口山東南挾滄江而東為都魯南窩北脊山從其東復分支焉一支瀕江而東一支直南而下即枯柯之東嶺也為此中分水之脊迤邐由灣甸都康而南界瀾滄潞江之中為孟定孟艮諸夷而直抵交趾者也其瀕江東去之支一包而南為右甸再包而南為順寧大猴焉是塢南北二凹相距四五十里甚狹而深瀕江兩岸俱田惟僰夷猓玀居之漢人反不敢居謂一入其地即發擺寒戰頭庝也故雖有膏腴而讓之夷人焉度橋沿江西岸西南至哈思凹共四十里而至亦登沿江東岸東南踰江入峽六十里而至雞飛初豫聞有熱水溢于石盤中盤復嵌于臺上皆天成者又一冷水流而環之其出亦異始以為在亦登問道亦登又以為在雞飛問道雞飛又以為瘴不可行又以為茅塞元路又以為其地去村遠絶無居人晚須路宿余囅然曰山川真脈余已得之一盤可無問也遂從東大路上坡向枯柯右甸道始稍北遂東上一里而平行西下岡三里有墟茅三四在岡頭是為枯柯新街又東一里有一樹立岡頭大合抱其木挺直其枝盤繞有膠淋漓于本上是為紫梗樹其膠即紫梗也初出小孔中亦桃膠之類而蟲蟻附集于外故多穢雜云坑岡左右俱有坑夾之北坑即從岡盤窟下南坑則自東峽而出于是南轉東盤北坑又半里轉東半里抵東峯下乃拾級上躋三里始登南突之嶺始望見南峽兩山壁夾自東而西從此西出則盤壑而注于江橋之南同赴哈思凹者乃知其山之度脊尚在嶺之東上不可亟問也此坡之上即為團壩營蓋土官之雄一方者即枯柯之夜郎矣于是循南峽而東躡又一里登嶺頭有一家隱路南其後竹樹夾路從樹中東行一里稍轉而北盤一南突之凹又東上盤坡而東有大樹踞路傍下臨西出之澗其樹南北大丈餘東西大七尺中為火焚盡成空窟僅皮膚四立厚二尺餘東西全在而南北俱缺如二門中髙丈餘如一亭子可坐可憩而其上枝葉旁覆猶青青也是所謂枯柯者里之所從得名豈以此耶由此又東二里折而北上一坡盤其南下之凹凹北有居廬東西夾峙而西廬茅簷竹徑倚雲臨壑尤有幽思其東有神宇踞坡間聞鯨音鼓賽出絶嶺間甚異之有一家踞路南藩門竹徑清楚可愛入問之曰此枯柯小街也距所上坡又二里矣于是又東沿北坡平上其南即西出深澗北乃崇山竹樹蒙蔽而村廬踞其端東向連絡不絶南望峽南之嶺與北峯相持西下而蕎地早穀墾遍山頭與雲影嵐光浮沉出沒亦甚異也北山之上雖髙而近為坡掩但循崖而行不辨其崇墜而南山則自東西墜而盡于江橋之南其東崇巘穹窿髙擁獨雄時夙霾蒙翳出沒無定此南山東上最髙之峯自北嶺東度再突而起者也沿之東行南瞰深壑北倚叢巘又東二里有岐一南下塢中為墾壑之道一北上叢嶺為廬坂之居而路由中東行南瞰下凹有水出穴間又東二里下瞰深壑有水一方倚北坡之上路即由之北向而上以有峽尚環而東也北上一里又轉而東屢盤北坳而東上坡屢上不止又七里而至中火鋪其坡南突最髙中臨南峽之上峽脊由其東南環而西下于坡之對崖南面復聳一峰髙籠雲霧間即前所望東畔穹窿之頂也自枯柯江橋東沿峽坡迤邐而上約三十里矣踞坡頭西瞰江橋峽中其水曲折西南下松子山北環之嶺東北而突為獵夷之嶺峽南穹窿之峯又南亘分支西繞橫截于江橋塢之南西至哈思凹凹之南復有小支自獵夷西南東突而出與橫截塢南之山湊西南駢峙如門門內之灣即為哈思凹門外又有重峰西障此即松子山南下之脊環石甸于西者也自此坡遙望之午霧忽開西南五十里歷歷可觀坡之東有瓦室三楹踞岡東南兩旁翼以茅屋即所謂中火鋪有守者賣腐于中遂就炊湯而飯及出戶則濃霧自西冒而東東下半里度一脊瞰其南北二峽環墜如穽而叢木深翳不見其底當由西下而分注江橋南北者也其脊甚狹度而東復上坡山雨倐至從雨中陟之得雨而霧反霽一里餘盤崖踰坳或循北峯或循南峯兩度過脊始東上沿北坡而東一里又陟一南突最髙之嶺有哨房一龕踞其上是為瓦房哨于是南臨南峽與峽南穹窿之頂平揖而對瞰矣至是雨止峯出復見峽南穹頂直南亘而去其分支西下者即橫截塢南之岡西與哈思凹相湊成門者也穹頂東環之脈尚從東度但其脊稍下反不及西頂之髙皆由此北坡最髙之頂東下曲而度者始辨都魯凹東所分之脊至此中突其分而西者為中火鋪枯柯寨之嶺曲而東降者度脊南轉西向而突為穹窿之頂此分水一正脈也由瓦房哨下半里復北度脊始見北峽坑墜為東北而下右甸之上流是北水之所分也而南水由西下南峽又東度兩脊穿兩夾嶺一里復盤南嶺之隂而上其處深木叢篁夾坡籠坳多盤北坑之上又一里南轉而凌其西下之坳始逾南峽之上流從其南陟岡東上始逾南度之脊此分水正脈所由度而西轉者也又東一里有草龕去北岡是為草房哨從其東又東北下一里稍轉而東南半里有脊又南度而東轉此右甸南環之嶺所由盤礴者也于是東向而下二里餘度一曲有小水北下或小溪小橋橫陟之又東逾一岡共下四里遂望見右甸城在東塢中有岐自東北坡去而大道循南峽東向平下二里南峽中始有村廬夾塢舂杵之聲相應又南三里遂出坡口乃更下一里而及坡麓路由田塍中東南行望見右甸之城中懸南坡之下甸中平疇一圍聚落頗盛四面山環不甚髙都魯凹東分之脈北橫一支直亘東去又南分一支南環右甸之東草房哨南度之脈東環右甸之南從甸南界東北轉與甸東界南環之支湊甸中之水東向而破其湊峽下錫鉛去甸中自成一洞天其地猶髙而甸乃員平非狹嵌故無熱藴之瘴居者無江橋毒瘴之畏而城廬相托焉由塍中行共四里入其北門暮宿街心之葛店初二日晨起霧色隂翳方覓飯而夫逃覓夫代行久之不得雨復至遂鬱鬱作記終日初三日雨復不已仍不得夫坐邸樓鬱然不樂作記竟日初四日早霧而晴顧僕及主人覓夫俱不足恃乃自行市中是日為本甸街子仍從北門內南轉岡脊為督捕同知公署署門東向其南即往南門街而東則曲向東門街皆為市之地也豫往來稠人中得二人一擔往順寧一駝往錫鉛皆期日中至葛寓豫乃返逮午往錫鉛駝騎先至遂倩之而往順寧者亦至已無及矣乃飯以駝騎行出東門循南坡東向半里涉東來之塢渡小溪東山岡漸折而東南行四里漸臨東塢東塢者右甸東南落水之塢尾也城北大甸圓而東南開此塢南北西三面之水皆合而趨之路臨其西坡于是南轉二里又涉二東北注之坑復依南麓東行二里上北突之嘴則甸東之山亦自北南環與嘴湊峽于是相對若門而甸由其中東注焉此甸中第一重東鎖之鑰亦為右甸東第一重東環南下之分支雖不峻而蜿蜒山頂地位實崇也踰嘴東稍下湊峽之外復開小塢而東水由其底路由其南坡之半又東二里有數家倚坡北向塢而廬過此東下有水自南峽出涉之上其東坡遂循坡之南峽東南上其東坡遂循坡之南峽東南上水流其岡北路由其岡南于是始不與水見又東南循岡三里盤一北下之坳而上岡頭是為玉壁嶺其嶺自南北突東西俱下分為坑有兩三家住峯頭時日尚高以前路無可止遂歇岡初五日平明起飯而行宿霧未收下其東坑涉之復東南上一里又循東來之峽而行夾岡之南東向四里度其北過之脊仍循峽東下行夾岡之南二里餘又稍下涉北出之水又循東來之峽而行夾岡之南東向二里復度其北過之脊于是行脊北東行之支東向行其上半里有兩三家夾道是為水塘哨由此東南行山峽間五里始墜坡而下其右又墜一峽東下其路左再隨崖東下者二里西臨右峽之上而路左忽墜一坑盤穽而下者二丈有水沉其底長二丈濶八尺而狹處僅二尺若琵琶然淵然下嵌左倚危壁右界片棧而外即峽之下盤者不知此水之何以獨止也由其南又半里而躡嘴下墜者半里左崖之端遂盡而右峽來環其前還望左崖盡處叢石盤崖儼如花簇而右崖西界大山亦懸駢削于重樹間幽異之甚由峽底又東南行一里其峽外束如門披門南出稍轉東而下坡半里有水自東曲折而西大木橫架其上南度之是為大橋橋下水即右甸下流東行南轉至是西折過橋又盤西崖南去已成湯湯之流而橋南沿流之峽皆隨之為田三四家倚橋南東坡之上有中火之館此右甸第二重東鎖之鑰亦為右甸第二重東環南下之分支與東南行大脊相對成峽夾溪南去者也由橋南即躡東南坡而上水由峽直南去路陟坡東南升一上者二里凌嶺頭西望峽溪之山稍南有破峽從西來者即水塘哨西下之水也其南來水一支亦至是東盡而有寨盤其上焉其又南一支嶙峋獨聳上出重巒是為杜偉山此乃右甸東南來之正脊是草房哨度脈至此更崇隆而起轉而直南去而東夾此溪其脊乃東南下老龍自雲州南下分瀾滄潞江之脊而直下交南者也所望處尚在寨盤頂之東北從此更夭矯南向夾溪漸上又二里而隔溪與寨盤之頂對又二里降坡南下穿坳而東見其東又墜為小坑路下而涉之一里又南踰東坡西環之坳又一里有數家倚東坡而居其東又有一溪自東北來環所廬之坡而注西峽西峽水自北南下與此水夾流而合于坡南此坡居廬頗盛是為小橋正西與杜偉山對遙望杜偉山自西北來至此南轉其挾臂而抱于西南者皆灣甸州之境水亦皆西南流其北峽與寨盤之頂夾而東出者皆順寧之境水皆東南流則此山真一方之望而為順寧灣甸之東西界者也飯于村家大雨復至久而後行由坡東下北來之溪小石梁跨之所謂小者以别于大溪之橋者也復東南上隔溪對杜偉山而南下瞰西峽之底二流相合盤壑南去此山為右甸東第三重東環南下之支分為錫鉛之脈者也南五里或穿嶺而左見嶺東近峽墜坑其遠峰又環峙而東或分而南穿嶺而右見嶺西近峽西溪盤底杜偉駢夾如是二里乃墜其南坡或盤壑西轉或躡坳東折或上或下又五里有三家當坳而廬是為兔威哨于是再上其東坡則東西壑皆可並睹矣西壑直逼西麓而長以杜偉西屏也東壑遙盤東谷其下叢沓而猶不見底其東北有橫浮一抹者此挾江而東南之嶺也其正東有分支南抱者此中垂而為順寧之脈也從嶺漸下或左或右嶺脊漸狹四里始望見東塢有溪亦盤折其底與西峽似而西界外山自杜偉頂南其勢漸伏又紆而南則東轉而環其前南界外山則直亘南向與東轉南環之嶺湊問東西峽水則合于錫鉛之前而東南當湊峙之峽而去問順寧之道則踰東界之嶺而行有道踰前山南環之嶺者為猛洞道從臘昔猛打渡江而至興隆厰者也于是從岡脊轉東行其脊甚狹又二里西峽之溪直逼南麓下而東峽溪亦近夾遂如堵牆上行又東二里又東南下者二里坡盡而錫鉛之聚落倚之此右甸東分支南下第三重之盡處也其前東西二溪交會有溫泉當其交會之北溪水淺而以木環其四周無金雞永平之房覆亦無騰越左所之石盤然當兩流交會之間而獨有此亦一竒也是日下午至駝騎稅駕逆旅先覓得一夫索價甚昂強從之乃南步公館即錫鉛驛也返飯于肆亟南由公館側浴于溫泉暮返而卧初六日晨起夫至將行以一飯包加其上輒棄之去遂不得行余乃散步東溪有大木橫其上為橋即順寧道也仍西上公館從其西南下西溪是為猛洞道有茅茨叢北岡上是為錫鉛街子得一夫索價亦昻且必欲明日行遂返邸作記初七日前棄擔去者復來乃飯而同之行從公館東向下涉東溪獨木橋遂東上坡半里行平坡上或穿坳而南或穿坳而北南北皆深坑而路中穿之東去二里餘沿南崖北轉半里穿西突之坳半里復東踰嶺而南半里又出南崖上于是見南壑大開壑中支條崩疊木樹茸蘢皆出其下而錫鉛南山其南又疊一支紆而東南下以開此壑所陟山東自東大山分支西突此岡為錫鉛東鎖鑰直西南逼湊南山水下其中甚束至此而始出東壑也瞰南倚北又二里見岡北亦嵌為東西塢聞水聲淙淙余以為即西下錫鉛東溪者而孰知從倚北之嶺已分脊此塢且東南下矣于是反倚坡北下共半里而涉其一橋度塢中水是為孟祐之西溪其水南出前塢與錫鉛之水合于孟祐之南所謂孟祐之河者也澗之東即居廬疊出有坡自北來懸其中一里東向躡其上當坡而居者甚盛又東轉再盤一坡共一里又有居廬當坡皆所謂孟祐村矣此右甸東分支南下第四重之盡處也于是又見一溪自東塢出環塢而前與西溪交南壑中南壑平開而南抵南山下錫鉛之水沿其北麓又破峽東南去東南開峽甚遙而溪流曲折其間直達雲州舊城焉由村東即循峽北入東塢一里東下度峽中橋其橋東西跨溪上上覆以亭橋內大水自東北透峽出橋外大水自東南透峽出過橋東向緣西垂之嶺上其上甚峻曲折梯危折而左則臨左峽折而右則臨右峽木蔭藤翳連幄牽翠髙下虧蔽左右疊換屢屢不已五里漸平則或沿左坡或沿右坡或陟中脊脊甚狹而左右下瞰者亦與前無異也又三里則從坡右稍下約一里陟脊凹而東又緣坡左上一里臨南坡之上于是回望孟祐錫鉛諸山層環疊繞山外復見山焉余初疑錫鉛西嶺頗伏何以猛洞之道不西由其凹而南陟其岑又疑灣甸之界既東出猛洞而猛洞以北杜偉以南其西又作何狀至是而遙見西嶺又有崇峯一重臂抱于西蓋枯柯東嶺老脊之南度者一由瓦房哨東度脊西南下其亘反高夾永昌之流而南下哈思凹凹之南其脈猶未盡故亦登溫板雞飛在此脊之西者猶順寧屬而其南即東與杜偉山自草房哨度脊者如椅之交環其臂其中皆叢沓之山直下東南而開峽底于猛洞西坳之伏處其西正開之始南降三十里而後及猛洞焉此正西遙望之所及者而正南則前夾之頂至是平等而猶不能瞰其外正北則本支自障之正東即其過脈分支之處第見南峽之猶自東北環來也又東上五里餘坡脊遂中夾為槽路由槽中行里餘透槽東出脊乃北轉其下右壑盤沓如初而左峽又墜南下之坑故路隨脊北轉焉又一里脊東有峰中突稍上有中火之館西向倚崖而峙顔曰金馬雄關前有兩家即所謂塘報也賣腐以供旅人之飯云既飯由館左又東半里轉而北透一坳其西峰即中火所倚者此其後過脈處與東峰夾成凹由其中北透半里即東轉峽過脈東峯之北東向下半里又臨北壑之上旋入夾槽中兩崖如剖中嵌僅通三尺而底甚平槽上叢木交蔽半里有倒而橫跨其上者連兩株皆如從橋下行又一里其跨者巨而低必傴伏而過焉槽南闕處猶時時見西墜之峽最後又見槽北之峽猶西墜也共二里稍東上踰脊南轉有架木為門踞嶺東者為白沙鋪哨此南度之脊也乃右甸東分支南下之第五重其脈獨長挾西分四支而抱于內又南度而東南行與右甸南杜偉山之脊西夾孟祐河而出于雲州舊城西又與第六重沿瀾滄南岸之脊東夾順寧河而出于雲州舊城東從此南度紆而西南折而東南下東突為順寧郡城又東南而盡于雲州舊城焉由哨門南向稍下輒聞水聲潺潺從西南迸峽下即東北墜坑去而路從其南東向下猶有夾槽墜其中二里出槽東行岡脊上于是見北壑之北則瀾滄南岸之山紆回東抱而南為老脊東之第六支屛亘于順寧河之東今謂之東山即志所稱某山也其脊南至雲州西南突者盡于新城西東北由茅家哨過脈而南者盡于雲州舊城所合二水東下而入瀾滄處南壑之南則即此白沙脊南度東轉為老脊之第五支屛亘于順寧城之西今謂之西山即志所謂某山也兩山夾塢東南去而順寧郡城踞其中西山下西北盤東山之坳為三臺山渡江大道東南塢盡之隙則雲州在焉此一川大概也而川中欹側不若永昌騰越之平展云從岡平行二里又稍下一里前有一峯中道而突穿其坳而上約一里有一二家倚坡東為望城關從東南壑中遂見郡城故也從此又迤邐下坡十里抵坡下東出大路兩度小橋上一坡二里入郡城新城之北門南過郡治前稍轉東街則市肆在焉又南踰一坡出東門半里而入龍泉寺寺亦東向其地名為舊城而實無城也是日寺中開講甫完僧俗擾擾豫入而停擔於內初八日晨起從殿後靜室往叩講師當其止靜未晤而出豫時欲趨雲州雲州有路可達蒙化念從此而往則雇夫尚艱不若仍返順寧可省兩日負戴乃以行李寄住持達周師以輕囊同僕行達師候飯上午乃出寺前東隨小溪下川中一里度亭橋循東界山麓南行三里稍上一西突之坡村廬夾道有普光寺傍東山西向又東南半里下涉一小澗仍南上坡居廬不絶已而其山東夾而入又有小水自東壑來渡之又東南踰一坡共五里大溪之水自西而東折有亭橋跨之其水湯湯大矣由橋南里餘漸西南上東突之坡上一里村廬夾道倚西山東向有長窑高倚西坡東下而西上為瓦罐窑由其南再越東突之脊一里東南下東出之峽一里又東南上而循西界山麓南行再下再上五里有一二家倚東突之坡坡間有小池一方曰鴨子塘又東南五里岡頭有村倚西岡東向是為象莊田其南稍折而下一里渡一澗其澗懸岡東下其西山環峽復東南上二里踰其南突之岡盤之而西南下二里抵西凹下折而循東上岡盤嘴而南六里有坊倚路左其上有村曰安樂村又東南四里稍下有村倚西坡東向為鹿塘自歸化橋渡溪右循西界山其南支峯東突溪流盤峽中至鹿塘其下壑盤而東田塍益盛村廬踞東西兩山甚繁而坡之鹿塘尤為最云時日才下午前無宿店止邸樓作紀初九日平明飯而行仍循西界山南行八里許西界山忽橫突而東大溪乃東北折入峽有小溪自西南山腋來合乃舍大溪由小溪南半里東度小溪石橋又南半里有村三四家倚南山東坳從南山躡西坳而上一里南踰東突之脊有茅屋三楹踞脊間為把邉關有二三家傍之居即西山之東突者而溪流則繞其東峽而南焉由關南下峽中半里透峽仍循西山行復東見溪流自其東破峽南出又下一里溪流西南來路東南臨其上兩盤西灣之峽又稍上共一里有村踞路右岡上又南一里稍下再盤西灣南踰小石東行之脊遂南行坡塍間一里又稍上東突之坡東南盤其嘴一里路分兩岐一東南下峽者為渡溪往新城道蓋新城道由溪東峽中行舊城道由溪西崖半行也時峽中溪橋已為水漲衝去須由翁溪涉溪而渡而水甚急不若由舊城東北渡橋迂道至新城雖繞路十里而免徒涉之艱時聞楊州尊已入簾去閃知願書亦不必投正可從舊城兼收之乃由溪西西南循山行復入坡塍一里東南上東突之坡又南二里有村倚西山嶺上為翁溪村村之南西界大山又環而東突東界山亦折而東向去中開東西塢大溪東盤塢底平疇夾之翁溪之村正東向而下臨塢中有路下涉塢中者即渡溪往新城道也由村南循東山南轉者即舊城道也乃循山東行一里復東南緣坡上北瞰塢中溪南逼坡腳瀠而東流路躡坡上甚峻二里東登嶺頭乃轉南行塢亦隨之南向破峽出路南行西坡一里大溪紆東南去路乃南下坡二里有數家分廬塢中是為順德堡堡南有山自西界橫度而東突大溪紆之路南由其度脊處穿坳而過半里抵坳南輒分峽下又一里有峽自南來蓋西大山由坳西直南去南抵舊城之後其東餘支又北轉如掉尾而中夾為塢其來頗深有村廬倚西坡上二峽合于前遂東向成流墜峽下路亦挾北坡東下隨之半里度峽中小橋其南則掉尾之交又橫度東突路復南向其度脊處穿坳而上一里踰岡坳南下有村在南塢大溪自馬鞍山西盤西界東突之嘴復東山南行塢東路循西麓南行塢西二里西界山之南復一支橫障而東又有數家倚南山廬間曲路隨山東轉溪亦隨塢東折一里盤其東突之嘴大溪亦直搗其下路與水俱抱之而南南壑頗開廬塍交錯黍禾彧茂半秀半熟間有刈者壑中諸廬函宗地名最大倚西山而居壑中一里及之由其前東南行塍間一里餘南從大溪西岸行二里東西兩界餘支交環于前而西支迥突為尤甚既東向環而至中復起一小尖若當門之標水由其東裂塹出路由其西踰坳上是為順寧雲州分界越脊南下則其南壑又大開波流雜沓于其間而遠山旁午或斜疊于南則西大脊自錫鉛南盤繞而東者或夭矯于東則東界分支沿瀾滄西岸度茅家哨而南盡于順江小水者此其外繞之崇峯也而近山則塢北西山之脈至此南盡于西為舊城東山之脈至此南盡于東為新城塢西則西大脊之中一峯從灣中東突直臨舊城之西塢南則西大脊東轉之支先夾一支為近案塢東則東界沿江之支又從東西轉直抱于新城之前為龍砂此其內逼之回巒也然猶近不見壑中諸水而祇見舊城廬落即在南岡一里及之亦數百家之所聚也飯于舊城東向下坡半里有大道沿坡西南去者興隆厰道也東北去者新城道也於是東北行田塍間半里有新牆一圍中建觀音閣甚整而功未就然規模雄麗亦此中所未覩也其處當壑之中兩水交會處目界四達於是始見孟祐河即繞其東順寧河即出其北遂共會於東北焉于是西向遙望有特出而臨于西者即大脊灣中東突之峯其北開一隙自西北來者孟祐河所從出也其南紆一隙向西南峽者興隆厰所從踰也有中界而垂于東者即沿江度茅家哨西環之支其北開一隙直上而夾茅家哨者新城所托之塢也其南迸一隙東疊而注于順江小水者諸流所滙之口也小憩閣中日色正午涼風悠然僧瀹茗為供已出圍牆北則順寧之水正出當門之塹循北崖東轉架亭橋其上名曰砥柱其水出橋東繞觀音閣後則孟祐河自西南來合之東去入水口峽者也渡橋即東北上坡是坡即順寧東山之支自瀾滄西岸迤邐而來其東南直下者過茅家哨此其西南分支者至此將盡結為馬鞍山東下之脈為新城而此其東南盡處也登坡一里下瞰二流既合盤曲壑底如玉龍曲折其北又有一坡東下即新舊兩城中界之砂夾水而逼于南山者稍下而上里餘又越其脊始望見新城在北峽之口倚西山東下之脈又三里稍下越一小橋又半里抵城之東南角循城北行又半里入雲州東門州中寥寥州署東向祇一街當其前南北相達而已至時日才過午遂止州治南逆旅初十日平明起飯出南門度一小坑即西南循西山坡而行二里漸折而沿其南坑之崖西向上二里餘南盤崖嘴此嘴東北起為峯頂分兩了即所謂馬鞍山也東南下為條岡直抵舊城溪而東逼東山界兩城之間為舊城龍砂新城虎砂者也此乃順寧東山之脈由三溝水西嶺過脊南下而盡于此者由此循峯西向北上又二里始平行峯西一里出馬鞍峯右是為馬鞍嶺有寺倚峯北向前有室三楹當嶺頭為茶房從嶺脊西向峻下二里始平又半里及山麓有澗自東北小峽來西注順寧河此已為順寧屬矣蓋雲州北界新城以馬鞍山舊城以函宗南小尖束水之坳其相距也甚近渡澗北上坡盤北山西麓行四里東西崖突夾順寧溪搗其中出路踰其東崖而入又北一里其坡西懸塢中是為花地其坡正與翁溪村東西遙對中墜為平塢則田塍與溪流交絡焉乃西北下坡半里及塢又有澗自東北小峽來西注順寧溪路從溪北西向行塢中三里餘將逼翁溪村之麓大溪自北峽出潄西麓而界之當從此涉溪上翁溪村出來時道見溪東有路隨北峽入遂從之又一里路漸荒又里餘墜崖而下及于溪即斷橋處也新城之道實由于此不由翁溪從束崖墜流間架橋以渡自橋為水汩乃取道翁溪以溪流平塢間可揭而涉也臨溪波湧不得渡乃復南還三里西渡翁溪溪濶而流漲雖當平處勢猶懸激抵其中流波及小腹足不能定每一移趾輒幾隨波蕩去半晌乃及西岸復由田塍間上坡一里西抵村下大路乃轉而北即來時道也循西山躡坡而上三里有岐自峽中來會即斷橋舊徑矣隨大路又六里過把邉關瀹湯而飯下塢東北一里度小橋又一里復與大溪遇溯其西崖北十里而至鹿塘時才過午以暑氣逼人遂停舊主人樓作紀十一日由鹿塘三十里過歸化橋從溪東循東山麓行五里入普光寺豫疑以為即東山寺也入而始知東山寺尚在北乃復隨大路三里抵南關坡下亭橋即從橋東小徑東北上坡又二里而東山寺倚東山西向正臨新城入寺拾級而上正殿前以樓為門而後有層閣閣之上層奉玉帝登之則西山之支絡郡堞之回盤可平揖而盡也下閣入其左廬有一僧曽于龍泉一晤者見余畹同飯而共坐前門樓乃知其僧為阿祿司西北山寺中僧也以聽講至龍泉而東山僧邀之飯者為豫言自少曽遍歷撾龍木邦阿瓦之地其言與舊城跛者新城客商所言歷歷皆合下午乃出寺一里度東橋入順寧東門覓夫未得山雨如注乃出南關一里再宿龍泉寺十二日飯于龍泉命顧僕入城覓夫于殿後靜室訪講師既見始知其即一葦也為余瀹茗炙餅出雞葼松子相餉坐間以黃慎軒翰卷相示蓋其行腳中所物色而得者下午不得夫乃遷寓入新城徐樓與蒙化妙藥師同候駝騎十三日與妙藥同寓候騎不至薄暮乃來遂與妙藥各定一騎帶行囊期明日行十四日晨起而飯駝騎以候取鹽價午始發即東下坡渡北來溪身以鐵索架橋亭于其上其制倣瀾滄橋者以孔道所因也渡橋東即北上坡循東山之麓北向而登是時駝騎一羣以遲發疾趨以賈勇隨之上不甚峻而屢過夾坑之脊三里從脊上西望望城關祗隔一峽也又北上兩過旁墜之脊三里忽隨坡西下轉一坳復一里越一西突之岡由其北下環山為塢有坪西向而拓豐禾被塍即西突之岡所抱而成者一里陟坪而北又下連越二小溪皆從東南腋中來下西峽者其處溪流縱橫蹊徑旁午而人家隱不可見從此復北上五里有二三家倚岡頭是為二十里哨登岡東北平行其脊一里復轉東向循岡北崖下又一里則有溪自東峽來豫初以為既登岡歷諸脊當即直上踰東大山不意又有此溪中間之既下乃溯流東入峽半里其水分峽出一西南自岡脊後一北自大嶺過脊處乃依南麓涉其岡後之流溯北澗之左復北向上即兩水中垂之坡也于是從叢林深翳中上二里踰一岡復循南崖之上行一里又穿坳而西臨西崖之上兩崖俱下盤深箐中翳叢木而西箐即順寧北塢大溪源所出矣又穿夾槽而上半里循西箐北崖上西北平行一里轉入北坳平透坳北一里其脊南之脊猶西墜也半里復入夾壁之槽平行槽中半里亦有上跨之樹又北一里稍髙有石脊橫槽底即度脈也此脊自羅岷山東天井鋪南度迤邐隨江西岸至此為順寧東山雲州北山而南盡于順江小水之口若羅岷大脊則自南窩東北折而南自草房哨而去矣已出夾槽東北墜坑而下一里即有水自東南腋飛墜下西北坑者路下循之與白沙哨之東下者同一胚胎又東北陟脊度脊再上共三里有四五家踞岡頭是為三溝水哨蓋岡之左右下墜之水分為三溝而北注瀾滄矣又東北下七里盤一岡嘴又下三里有一二家當路右是為塘報營又下三里過一村已昏黑又下二里而宿於髙簡槽店主老人梅姓頗能慰客特烹太華茶飲余十五日昧爽飯平明東北下坡坡兩旁夾深崖而坡中懸之所謂髙簡諸村廬又中踞其上二里轉坡北下峽中復轉東北循坡下四里始望見瀾滄江流下嵌峽底自西而東其隔峽三臺山猶為宿霧所籠咫尺難辨于是曲折北下者三里有一二家瀕江而居是為渡口瀾滄至此又自西東注其形之濶止半于潞江而水勢正濁而急甫聞擊汰聲舟適南來遂受之北渡時駝騎在後不能待也登北岸即曲折上二里躋坡頭轉而東行坡脊南瞰江流在足底北眺三臺山屏圍嶺北以為由此即層纍而升也又聞擊汰聲則渡舟始橫江南去而南岸之駝騎猶望之不見乃平行一里折而北向踰脊半里乃循東崕瞰西塢北向行二里始望見三臺村館在北山之半懸空屏峙以為賈勇可至又一里路盤東曲反漸而就降又二里下至壑底壑中澗分二道來一自西北一自東北合于三臺之麓而三臺則中懸之水由塢西而入瀾滄乃就小橋渡東北來澗約一里即從夾中上躋中懸之坡曲折上者甚峻六里始有數十家倚坡坪而居是為三臺山有公館焉又東北瞰東塢循西崖而上十二里躡南亘之脊其脊之東西塢猶南下者又躡磴三里有坊其岡頭為七碗亭者岡之東下臨深壑廬三間綴其上乃昔之茶菴今虛無人又上里餘盤突峯之東其峯中突而脊則從北下而度始曲而東起故突峯雖為絶頂其東下之塢猶南出云乃踞峯頭而飯時四山雲霧已開惟峯頭猶霏霏釀氤氲氣由峯北隨北行之脊下墜一里餘乃度脊東突是為過脈是山北從老君山南行經萬松嶺天井鋪度脊南下其東之橫嶺西之博南二脊皆繞斷於中惟此支則過此而南盡于泮山從其北臨西壑行再下再上三里有哨房當路亦虛無栖者又東北隨嶺脊下六里循東塢盤西嶺又下二里乃北度峽中小石橋其水從西峽來出橋而合于南峽北從阿祿司東注于新牛街入漾濞者也石橋之南其路東西兩岐東岐即余所從來道西岐乃四川僧新開欲上達于過脊者度橋即循北坡臨南壑東北上三里躡岡頭有百家倚岡而居是為阿祿司其地則西溪北轉南山東環有岡中突而垂其北司踞其突處其西面遙山崇列自北南紆即萬松天井南下之脊挾瀾滄江而南者其北面亂山雜沓中有一峯髙懸特出詢之土人云此即猛補者後山其側有寺而大路之所從者余識之再瀹湯而飯以待駝騎直至下午乃來以前無水草遂止而宿是夜為中秋先從順寧買胡餅一圓懷之為看月具而月為雲掩竟卧十六日昧爽飯而北行隨坡平下十里而下更峻五里至坡底東西二塢水來合而北去乃度東塢小橋沿東麓北行塢中隨水三里又一溪自東峽來度其亭橋是為猛家橋水由橋東破峽北出路由橋北踰岡而上其岡東綰溪口有數家踞其上從其北下復隨溪行西岸曲折盤塢十二里有百家踞岡頭東臨溪口為新牛街俱漢人居而地不開洋有公館在焉今以舊街巡司移此由其北西北下二里有小江自西而東即漾濞之下流也自合江鋪入蒙化境曲折南下又合勝偹江九渡雙橋之水至此而東抵猛補者乃南折而環泮山入瀾滄焉江水不及瀾滄三之一而渾濁同之以雨後故也方舟渡之登北岸即隨江東南行半里隨江東北轉遂循突坡而上二里登南突之坡下瞰隔江司與阿祿司溪出江之口對江流受之遂東入峽路從北山之半亦盤崖而從之半里有一家獨踞岡頭南臨江波而居頗整又東三里有削崖髙臨路半峭壁間有洞南向其色斑赭即阿祿司所望北面特出之峯此其西南隅之下層也又東四里有兩三家倚岡而居為馬王箐江流其前峽中後倚特出崇峯東望遙壑中開東北坳中有箐盤峽而下西與江流合而南去其東南兩峯對峙夾束如門而江流由此南出焉乃瀹湯而飯于村家由村東北上三里當特出崇峯之南其下江流峽中至此亦直南去又東北二里盤其東南之垂支有三五家踞岡上為猛補者亦哨寨之名也于是逼特出崇峯東南下矣其東下盤壑中回即東北桫松哨南箐之所下者其正南江流直去恰當兩門之中又從門隙遙見外層之山浮青遠映此乃瀾滄江畔公郎之境矣又東北盤崖麓而上二里而下半里忽澗北一崖中懸南向特立如獨秀之狀有僧隱菴結飛閣三重大路過其下時駝馬已前豫謂此竒境不可失乃循回磴披石關而陟之閣乃新構者下層之後有片峯中聳與後崖夾立中分一線而中層即覆之峰尖透出中層之上上層又疊中層而起其後皆就崖為壁而綴之以鐡鎖橫繫崖孔其前飛甍疊牖延吐煙雲實為勝地恨不畹被襆于此倚崖而卧月明也隱菴為瀹茗畹榻余恐駝騎前去匆匆辭之出此巖在特出崇峯東南峽中登其閣正南對雙突之門門外又見一逺峯中懸圓亘直上如天柱其地當與瀾滄近而不知為何所隱菴稱為鉢盂山亦漫以此巖相對名之耳又謂在江外亦不辨其在碧溪江名外抑在瀾滄外也由其東又上坡二里登東岡又東北迢遙而上八里而至桫松哨是哨乃東岡之脊西度而起為特出崇峯南盡于碧溪江東北岸為順寧東北盡處與蒙化分界者也以嶺上有桫松樹最大故名時駝騎方飯于此遂及之又隨脊東上四里轉而北登岡頭為舊牛街是日街子猶未散已行八十里矣此東來度脊之最髙處北望直抵漾濞其東之點蒼雄插天半南望則瓦屋突門之峯又從東分支西繞環壑于前西望則突出崇峯近聳西南江外橫嶺諸峯遙環西北亦一爽心快目之境矣于是北向隨嶺下二里盤崖轉東循脊北東行八里至舊巡司又東北下二里盤南壑之上有路分岐踰脊北下想北通漾濞者正路又東隨脊二里餘踰東嶺北下于是其峽北向墜即隨峽東坡東北行五里至瓦葫蘆有數十家倚之懸居環壑中坡東有小水一自西腋一自南腋交于前壑而北去則此瓦葫蘆者亦山叢水溢之源也夜宿邸樓月甚明恨無貰酒之侣悵悵而卧十七日昧爽飯而行即下東坡一里渡西來小水循北山而東半里南來小水與之合同破峽北去路亦隨之挾山北轉一里有亭橋跨其溪曰廣濟渡而東循東麓北行二里有峽自西山來合又北五里北壑稍開水走西北峽去又有一水自東峽來合其勢相埒即溯之入東行里餘有小橋架其上北渡東上半里溯溪北轉二里餘轉而東一里有數十家倚北山而居是為鼠街子峽至是東西亘溪流峽底路溯北崖北崖屢有小水挂峽而下路東盤之屢上屢下踰坡東降東峽稍開盤北崖之紆三里溪一自北來一自南墜乃折而溯北來之溪半里溪仍兩𣲖一西北來一東來乃折而從東來者三里稍隨一北曲之灣灣中有小水又東隨大道上或峻或平皆瞰南壑行五里乃踰嶺脊脊稍中凹乃東北自定西嶺分支西度為甸頭山又分兩支一支北轉挾洱水北出蒼山後一支南下亘為蒙化西夾之山而此其脊也脊東即見大塢自北而南其東界山與此脊排闥相對而北之甸頭山則中連而伏其外浮青髙擁者點蒼山也南之甸尾陽江中貫曲折下墜而與定邊接界焉蒙化郡城已東伏平川之中而不即東下也從嶺脊平行而南半里路從其南連盤二峯則南塢大開有數家倚南山下而峽中皆環塍為田又東一里乃北轉穿一東突峯後而透其坳半里至麓又下半里溯江北岸東行度三鞏石橋復東一里入蒙化西門半里稅駕冷泉菴即妙師栖靜處中有井甘冽為蒙化第一泉故以名菴十八日晨起令顧僕同妙師覓駝騎期明日行余亟飯出北門䇿其騎為天姥崖遊北二里由演武場後西北下五里過荷池西北三里則大溪自東曲而西流北涉之四里盤崖而北為蒙化天姥適中處又北二里過西山之灣又北二里有岐西向入峽其峽灣環西入內為土官左氏之世居天姥道由峽直度北去約三里居廬連絡始望見天姥寺在北塢之半回腋間又三里有一圓阜當盤灣之中如珠在盤而路縈其前又北三里循坡西北上一里而及山門是為天姥崖而實無崖也其寺東向殿宇在北僧房在南山門內有古坊曰雲隱寺按一統志龍宇圖山在城西北三十五里蒙氏龍伽獨自哀牢將其子細奴邏居其上築龍􅬗圖城自立為竒王號蒙舍詔今上有浮屠及雲隱寺始知天姥崖即雲隱寺而其山實名巄􅬗圖也其浮屠在寺北回岡上殿宇昔極整麗蓋土司家所為今不免寥落矣時日已下午急飯而歸渡大溪抵荷池已昏黑矣入城妙藥正篝燈相待飯而卧徐霞客逰記卷十二上欽定四庫全書徐霞客逰記卷十二下明徐宏祖撰西南逰日記二十二十九日妙藥以乳線贈余余以俞禹錫詩扇更作詩扇贈之駝騎至即飯而别妙藥送出北門仍二里過演武場東又北循東麓一里有岐分為二一直北隨大塢者為大理下關道一東向入峽踰山者為迷渡洱海道乃從迷渡者東向上五里涉西下之澗于是上躋坡二里得坪有數家在坪北曰阿兒村更躡坡上五里登坡頭平行岡脊而南度之此脊由東峯北度而下者其東與大山夾為坑北下西轉而入大川其西則平墜川南從其上俯瞰蒙城如一甌脫也又北倚坡再東上三里有三四家當脊而居為沙灘哨脊上有新建小菴頗潔又躡脊東上二里盤崖北轉忽北峽駢峙路穿其中即北來東度而南轉之脊也是為慶龍關透峽即隨峽東墜石骨嶙峋半里稍平是脊北自定西嶺南下東挾白崖迷渡之水為禮社江南由定邊縣東而下元江西界蒙化甸頭之水為陽江南由定邊縣西而下瀾滄乃景東威逺鎮沅諸郡州之脈所由度者也東向下者四里餘有數家居峽中是為石佛哨乃飯又二里有三四家在北坡曰桃園哨于是曲折行峽中隨水而出或東或北不二里輒與峽俱轉而皆在水左如是十里再北轉始望見峽口東達川中峽中小室纍纍各就水次其瓦俱白乃磨室也以水運機磨麥為麵甚潔白乃知迷渡川中饒稻更饒麥也又二里渡橋由溪右出峽隨山南轉半里乃東向截川而行其川甚平拓北有崇山屏列即白崖站也西北有攢峰橫亘而南即定西嶺南度之脊也兩髙之間有坳在西北即為定西嶺踰嶺而西為下關道從坳北轉為趙州道豫不得假道于彼而僅一涉禮社上流攬迷渡風景皆駝騎纍之也東行平堤三里有圍牆當路左踞川中方整而甚遙中無巨室乃景東衛貯糧之所是曰新城半里其墻東盡復行堤上三里有碑亭在路右乃大理倅王君署事景東而衛人立于此者又東半里有溪自北而南架木橋于上水與溪形俱不大此即禮社之源也自白崖定西嶺來南注定邊下元江合馬龍為臨安河下蓮花灘者也時川中方苦旱故水若衣帶從此望之川形如犁尖北拓而南斂東西兩界山亦北髙而南伏蓋定邊景東大道皆由此而東去又半里入迷渡之西門其墻不及新城之整而居廬甚盛是為舊城有巡司居之其地乃趙州洱海雲南縣蒙化分界買米于城出北門隨墻東轉一里有支峯自東南繞而北有小浮屠在其上盤其嘴入東塢中又一里其中又成一小壑曰海子有倚山北向而居者遂宿焉二十日平明飯而行又東一里入峽其中又成一小壑二里隨壑北轉漸上坡再上再平三里踰嶺頭遵岡北行又三里有村在西坡腋間為酒藥村又北循坡行其坡皆自東而西向下者條岡縷縷有小水界之皆西出迷渡者再下再上約十里有賣漿者廬岡頭曰飯店有村在東山下曰飯店村又北一岡二里坡西于是有山與東坡夾而成峽其小流南下而西注迷渡路乃從峽中溯之北二里轉而東北上二里陟而踰其坳此烏龍壩南來大脊至此東度南轉而峙為水目者也脊頗平坦南雖屢升降坡間而上實不多北下則平如兜不知其為南龍大脊余自二月十三日從鶴慶度大脊而西盤旋西南者半載餘乃復度此脊北返計離鄉三載陟大脊而東西度之不啻如織矣脊北平下半里即清華洞倚西山東向再入之其內黃潦盈瀦及于洞口余去年臘月十八日當雨後洞底雖濘而水不外盈可以深入兹方苦旱而水當洞門即外臺亦不能及其門內垂垂浸水中止此穿一隙其上亦透重光不如內頂之崇深也稍轉而北其上竇即黑暗而窮其下門俱為水沒無從入中洞也此洞昔以無炬不能深入然猶踐濘數十丈披其中透頂之局兹以水漲望門而止不知他日歸途經此得窮其藴藏否也出洞北行半里踰嶺即西向白崖大道仍舍之而北二里有池一方在西坡下其西南崖石嶙峋亦龍潭也又北一里過一村村北路右有墻一圍為楊土縣之宅又北一里即洱海衛城隅從西城外行半里過西門余昔所投宿處也又隨西而北半里抵北門外乃覓店而飯先是豫從途中見牧童手持一雞葼甚巨而鮮潔時雞葼已過時蓋最後者獨出而大也余市之至是瀹湯為飯甚適洱海往雞山道在九鼎梁王二山間豫昔所經者騎夫以家在蕎甸故強余迂此蓋洱海衛所環之塢甚大西倚大脊崇岡東南滙為青龍海子破峽而繞小雲南驛為水口其南即青華洞前所踰南坳其北即梁王山東下之支平伏而橫接東山者自洱海北望以為水從此泄而不知反為上流豫亦欲經此驗之于北行田塍間西瞻九鼎道登登緣坡在隔澗之外數里也六里抵梁王山東支之南有寺在其西腋南向臨川曰般若寺路乃東向踰岡一里有村廬倚西山而居曰品甸由其東一里再北上坡乃一堤也堤西北山回壑抱東南積水為海于時久旱半已涸矣從堤而東半里有廟倚堤而北懸海中為龍王祠又東半里轉北堤始盡復踰東突之坡一里復見西腋尚蟠海子支流平行嶺脊又北三里則東坡下墜遙接東山腋中有水盈盈則周官些海子也其北則平岡東度而屬于東山此海實青龍海子之源矣梁王之脈由此東度不特南環為洱城東山即蕎甸北賔川東大山崇窿為鐡索箐紅石崖者皆此脊繞蕎東而磅礴之余夙聞洱城北有米甸禾甸蕎甸之名且知青海子水經小雲南隨川北轉經胭脂壩合禾米諸甸水而北入金沙意此脊之北蕎甸水亦東北流至此乃知其獨西北出賔川者始悟此脊自闕山而盡于小雲南北界于蕎甸之東聳賔川東山而盡于紅石崖金沙江岸脊北盤壑是為蕎甸與禾米二甸名雖鼎列而水則分流焉從嶺上轉西北一里隨北塢下三里而至塢底直北開一塢其北崇山橫亘即斜騫于賔川之東而雄峙者西界大山即梁王山北下之支東界大山即周些北岡東度之脊所轉北而直接橫亘崇山者從嶺上觀之東西界僅與脊平至此而巖巖直上其所下深也塢中村廬纍落即所謂蕎甸度西南峽所出澗稍北上坡而止騎夫家二十一日平明飯而行騎夫命其子擔以隨才出門子以擔重復返再候其父飯仍以騎行則上午矣北向隨山之麓五里一村在川之東為海子村當川窪處而實無海也第東山有峽向之耳漸轉西北五里西山下復過一村又四里數十家倚西山而廬其前環堤積水曰馮翊村其北即崇山橫障之麓川中水始沿東山北流至是西轉潄北山而西西山又北突而扼之與北麓對峙為門水由其中西向破峽去路由其南西向踰入遂與水不復見蓋北突之嘴夾水不可行故從其南披隙以踰之也由馮翊村北一里至此坳麓乃向西盤崖歷壑山雨忽來傾盆倒峽浹地交流二里轉西南盤崖上又一里轉西北遂躡石坡一里升岡頭有岐西向踰坳者賔居道也北向陟岡者賔川道也乃北上半里登嶺頭于是西瞰大川正與賔居海東之山隔川遙對而川之南北尚為近山所掩不能全覩然峯北蕎甸之水已透峽西出盤折而北矣乃西北下山一里騎夫指北峰夾岡間為鐡城舊址昔土酋據之以為險者蓋梁王山北盡之支北則蕎甸水界為深塹南則從峯頂又墜一坑環之此岡懸其中西向特立亦如佛光寨恃險一女關之意也又下里餘北渡墜坑之水乃循東山北行又三里抵蕎水所出口其水分衍漫流而北隨之或行水中或行磧上或涉水左或涉水右茫無正路四里上東麓始有路北向循麓行六里望路西有鞏橋當川之中則大理由賔居來大道有聚落在橋西為周官營從其東直北三里一小坊在岡上過之始見賔川城又北一里過南薰橋入其南門行城中北過州治前一里出北門飯市肉以食北一里過小岡坊西北下坡一里抵川中澗其北有鞏橋五洞頗整以澗水僅一衣帶故不由橋而越澗又西北二里遂抵西山東突之嘴盤之北又二里有路自西南踰坳來合即余昔從梁王山來者其北有村廬倚西峯下是為紅帽村余昔來飯處也從村後西山北行四里西山開小峽于是路分為二遂西向入峽一里涉小澗北上一里登岡頭過一坊又西北行二里西南踰脊望見南山自西屏列而東是排沙北界之山西自海東東抵賔居南與大脊烏龍壩山並夾者土人稱為北山而觀音箐在其北塢其西北瀕洱海為魯擺山則三澗門所來之脊又東挾上下倉之水而北出拈花寺南橋下者也從岡頭又西北行三里稍下有水自西南來有亭橋北跨之為乾果橋北有數家倚岡余昔之所宿而今亦宿之乾果北有一尖峯東向而突亭亭臨上蓋西南自魯擺海東之脊分支東北上為上下倉觀音箐分界下為煉洞乾果二溪中垂亦雞中第一水口山也二十二日平明飯而行西北三里涉一小溪又上里許扺尖峯下循其東崖而北一里隨崖西轉遂出峯北于是北塢自西而東即雞山之水自煉洞而東下牛井街合賔川而北者也路隨南崖西向下二里有村在路旁上有坊曰金牛溢井土人指村北溪旁有石穴為金牛溢處而街則在其外又西盤峽陟坡二里下渡一小水復西北上再上再下五里登一岡頭皆自南北突者又二里稍下過廣甸流芳坊又北一里村廬相望即煉洞境矣南倚坡北瞰塢又二里過公館街又北一里過中溪莊又北上岡一里有茅舍纍纍為煉洞街子又北半里過煉法龍潭坊又北一里稍下過一橋有數家倚西山塢中前有水一塘其上有井小亭覆之即龍潭也不知煉法者為誰矣村北有巨樹一株根曲而出土上髙五六尺中空鞏而復倒入地中其下可通人行于是又西北二里踰一坡又西北一里過茶菴又西北下涉一坑一里涉坑復上乃循北山之環腋而西上一里餘瞰其南壑中環如規而底甚平又西上一里遂分兩岐北向踰嶺為雞山道乃北上行嶺頭二里復西折而下下二里有峽自西南來其底水破峽西北出即下倉海子水所由注牛井者有亭橋跨之是雞山東第二水口山也渡橋西復北上坡折而南盤西峽而北一里循峽西北上又一里有哨當嶺頭從此平行直南乃下倉道踰嶺北下一里則拈花寺東向倚西山居環壑中入而飯飯後雨至為少憩從寺左轉而西上一里踰一北突之嶺有坊曰佛臺仰止始全見雞山靣目頂聳西北尾掉東南髙懸天際令人神旺踰脊西下即轉而北一里下陟北墜之峽又半里西踰一北突之坳坳南岐有坊倚坡此白石崖東麓坊也余昔來未及見故從其西麓之坡折而東上過坳復西向循大路趨一里過白石崖西坊又西一里有岐稍下則雞山前峽之溪東向而入牛井街合賔川溪北向桑園而下金沙矣溪有小亭橋跨其上過橋北騎夫東轉北上而向沙址豫西向溯溪欲尋所謂河子孔者時水漲濁流奔湧以為不復可物色遇一嫗問之指在西南崖下而沿溪路絶水𣲖橫流荆棘交翳或涉流或踐莽西二里忽見一亭橋跨溪上其大倍于沙址下流者有路自北來越橋南即循南山東向出白石崖前乃登山官道始知沙址小橋乃捷徑而此橋即洗心橋也河子孔即在橋南石崖下其石橫卧二三丈水由其下北向溢出穴橫長如其石而髙不及三尺水之從中溢者甚清而溪中之自橋西來者渾濁如漿蓋橋以西水從二𣲖來一北來者瀑布峽中與悉檀龍潭二水所合一西來者桃花箐東下之流二𣲖共會橋西出橋東又會此孔中清水此雞山南澗之上流也于是隨北來大路上靈山一會坊二里至坊下即沙址西來路所合者其西南隔澗有寺踞坡麓為接待寺此古剎也在西第一支東盡之麓雞山諸剎山路未闢先有此寺自後來者居上而此剎頽矣時豫不知騎僕前後徘徊一里漸隨溪東岸而上其東峯下臨即東第三支回環之嶺新構塔基于其上中與大士閣中第二支相對成峽而路由其下者也又北一里盤坡稍上過報恩寺寺為東第三支山麓之首剎亦如接待之在西支之首惟中第二支為兩溪交會處夾尖無剎可托其上即大士閣中臨之而已從報恩西又北一里有橋西跨澗上渡橋循大士閣東麓北向上半里有岐西向盤嶺者大士閣大道也直北臨東溪西崖而入者悉檀龍潭道也聞駝騎已先向龍潭豫隨之一里又東度橋從澗東躡峻上其上趾相疊然巨松夾隴翠蔭飛流不復知有登陟之艱也又二里轉龍潭上半里而入悉檀寺時四長老俱不在惟純白出迎乃稅駕北樓回憶嵗初去此已半載餘矣二十三日雨浹日憩悉檀二十四日復雨憩悉檀二十五日雨仍浹日下午𢎞辨師自羅川中所諸莊回得吳方生三月念四日書𢎞辨設盒夜談二十六日中雨霽晚復連綿二十七日霽乃散步藏經閣觀丁香花其花嬌艷在秋海棠之間滇中甚多而雞山為盛甚折插御風毬時毬下小截為駝夫肩負而損與上截接處稍解余姑垂之牆隂以遂其性御風之意思其懸崖飄揚而名之也二十八日霽甚下午體吉自摩尼山回與摩尼長老復吾至素飱乃整夜談久之二十九日為𢎞辨師誕日設麵甚潔白平午浴于大池余先以久涉瘴地頭面四肢俱發疹塊纍纍叢膚理間左耳左足時時有蠕動狀半月前以為虱也索之無有至是知為風而苦于無藥兹湯池水深煎以藥草久浸而薰蒸之汗出如雨此治風妙法幸而值之知疾有瘳機矣下午艮一蘭宗來體師更以所録山中諸剎碑文相示且謀為余作揭轉報麗江九月初一日在悉檀上午與蘭宗艮一觀菊南樓下午别去初二日在悉檀作紀北樓是日體吉使人報麗府初三初四日作紀北樓初五日雨浹日買土參洗而烘之初六初七日浹日夜雨不休是日體吉邀坐南樓設茶餅飯出朱按君謝撫臺所書詩卷併本山大力本無野愚所存詩跋并程二遊詩畫圖章他山陳渾之恆之詩翰相玩半日初八日雨霽作紀北樓體吉以本無隨筆詩稿示初九日霽甚豫欲往大理取所寄衣囊并了蒼山洱海未了之興體吉來畹曰已著人特往麗江若去而麗江使人來是誑之也余以即來辭體吉曰寧俟其信至而後去余從之遂同和光師窮大覺來龍從寺西一里渡蘭那寺東南下水過迎祥石鐘西竺龍華其南臨中溪即萬夀寺也俱不入西北二里入大覺訪遍周遍周居片角莊月終乃歸遂出過鎖水閣從橋西上共一里至寂光東麓仍東過澗從澗東躡大覺後大脊北向上一里登其中岡東望即蘭那寺峽西望即水月菴後上煙霞室峽也又上一里再登一岡其岡西臨盤峽西北有瀑布懸崖而下其上靜廬臨之即栴檀林也東突一岡橫抱為蘭陀後脊岡後分峽東下即師子林前墜之壑也于是岐分嶺頭其東南來者乃蘭那寺西上之道東北去者為獅林道西北盤崖而上者為栴檀嶺也其西南來者即余從大覺來道也始辨是脊從其上望臺連聳三小峯南下脊兩旁西墜者南下為瀑布而出鎖水閣橋東墜者南下合獅林諸水而出蘭那寺東是東下之源即中支與東支分界之始不可不辨也余時欲東至獅林而忽見瀑布垂綃乃昔登雞山得未曽見姑先西北上于是愈上愈峻路愈狹曲折作之字而北者二里乃西盤望臺南嘴此脊下度為大覺正脊而東折其尾為龍華西竺石鐘迎祥諸寺又龍橫為大龍潭南為悉檀前案而盡于其下此脊當雞山之中其脈正而雄望臺初湧處連貫三珠故其下當結大覺為一山首剎其垂端之石鐘亦為開山第一古迹焉然有欲以此山作一支者如是則不得以塔基為前三距之一而以此支代之但此支實短而中縮西之大士閣東之塔院實交峙于前與西支之傳衣寺嶺鼎足前列故論支當以寂光前引之岡為中塔基上擁之迹為東而此脈之中縮者不與論剎當以大覺中懸為首而西之寂光乃其輔翼東之悉檀另主東盟而此寺之環拱者獨尊故支為中條附庸而寺為中條冠冕此寺為中條重而中條不能重寺也嘴之西有亂礫垂峽由此北盤峽上路出栴檀嶺之上為羅漢壁道由此度峽西下為栴檀中靜室道而瀑布則層懸其下反不得見再度峽西崖隨之南下一里轉東岐得一新闢小室問瀑布何在其僧朴而好事曰此間有三瀑布東箐者最上而小西峽者中懸而長下塢者水大而短惟中懸為第一勝此時最可觀而春冬則無有此所以昔時不聞也老僧牽衣畹待瀹茗豫急于觀瀑僧為導西下峻級半里越級灣之西有小水垂崖前墜為壑而路由其上南盤而下又半里即見壑東危崖盤聳其上一瀑垂空倒峽飛噴迢遙下及壑底髙百丈餘搖嵐曳石浮動煙雲雖其勢小于玉龍閣前峽口瀑而峽口內嵌于兩崖之腋觀者不能對峽直眺而旁覷倒瞰不能竟其全體此瀑髙飛于穹崖之首觀者隔崖平揖而自顙及趾靡有所遺故其跌蕩之勢飄搖之形宛轉若有餘騰躍若不及為粉碎于空虛為貫珠于掌上舞霓裳而骨節皆靈掩鮫綃而丰神獨迥不由此幾失山中第一勝矣由對峽再盤西嘴入野和靜室門內有室三楹甚爽兩旁夾室亦幽潔其門東南向以九重崖為龍即以本支栴檀嶺為虎其前近山皆伏而逺者又以賔川東山并梁王山為龍虎中夾益開展無前直底小雲南東水盤諸嶺焉蓋雞山諸剎及靜室俱南向以東西二支為龍虎而西支之南有木香坪山最髙而前鞏亦為虎翼故藉之為勝者此視之為祟者亦此獨此室之內不與衆同而此山亦伏而不見他處不能也野和為克新之徒尚居寂光以其徒知空居此年少而文為詩雖未工而志甚切以其師叔見曉寄詩相示并已稿請正且具餐焉問克新向所居精舍尚在西一里而克新亦在寂光乃不西往復從瀑布上東盤望臺之南二里從其東脅見一靜室其僧為一宗已獅林西境矣室之東有水噴小峽中南下涉之又東即體吉靜室其上為標月靜室其中峽所噴小水即下為蘭那東澗者此其源頭也其上去大脊已不甚遙而崖間無道道由望臺可上至是已越中支之頂而御東支矣由此而東半里入白雲靜室為念佛堂白雲不在觀其靈泉不出于脅而出于脊不出于崖外而出于崖中不出于穴孔而出于穴頂其懸也似有所從來而不見其墜也似不假灌輸而不竭何前不遽出必待結廬之後何後中不止而獨擅諸源之先謂之非功德水可乎較之萬物閣岩下之瀦穴霄壤異矣又東一里入野愚靜室是為大靜室浹談半晌西南下一里飯于影空靜室與别已半載一見把臂乃飯而去從其西峽下半里至蘭宗靜室蓋獅林中脊自念佛堂中垂而下中為影空下為蘭宗兩靜室而中突一岩間之一踞岩端一倚岩腳兩崖俱墜峽環之岩峙東西峽中南擁如屛東屏之上有水上墜灑空而下罩于嵌壁之外是為水簾西屏之側有色旁映傅粉成金焕乎層崖之上是為翠壁水簾之下樹皆掩側有斜騫如翅有旁臥如虬獨有體側而橫生者衆枝皆圓而此獨扁衆材皆奮而此獨橫亦一竒也蘭宗遙從竹間望余至即趨迎留宿時沈莘野已東遊乃翁偶不在廬余欲候晤遂從之和光欲下山因命顧僕與俱恐山廬無餘被憐其寒也奴請匙鑰余并箱篚者與之以一時解縛不便也奴去蘭宗即曳杖導余再觀水簾翠壁側樹諸勝既暮乃還其廬是日為重陽晴爽既甚而夜月當中峯之上碧落如水恍然羣玉山頭也初十日晨起問沈翁猶未歸蘭宗具飯更作餅食豫取紙為獅林四竒詩畀之水簾翠壁側樹靈泉見顧僕不至豫心怏怏即辭蘭宗下才下見一僧倉皇至蘭宗尚隨行訊其來何以故曰悉檀長老命來候相公者余知僕逋矣再詢之曰長老見尊使負包囊往大理詢和光疑其未奉相公命故使余來告余故知其逃也非大理也遂别蘭宗同僧亟下五里過蘭那寺前幻住菴東又下三里過東西兩澗會處抵悉檀已午啓篋而視所有盡去體吉𢎞辨欲為豫急發二寺僧往追豫止之謂追或不及及亦不能強之必來亦聽其去而已矣但離鄉三載一主一僕形影相依一旦棄豫于萬里之外何其忍也十一日豫心忡忡體吉恐余憂悴命其姪并純白陪余散行藏經樓諸處有圓通菴僧妙行者閲藏樓前瀹茗設果純白以象黃數珠見示象黃生于象肚下大如白果取得之製為數珠百千中不能得一其象亦象中之王也坐樓前池上徴迦葉事取藏經中與雞足相涉者摘一二段録之始知經言迦葉守衣入定有四石山來合即其事也亦未嘗有雞足名又知迦葉亦有三惟迦葉波名為摩訶迦葉摩訶大也餘皆小迦葉耳是晚鶴慶史仲文適自省來史乃公子省試下第歸而登山自遣十二日妙行來約余往遊華嚴謂華嚴老僧野池乃月輪之徒不可不一晤向以坐關龕中以未接顔色為悵昔豫以嵗首過華嚴其徒俱出無從物色余時時悼月公無後至是亟飯而行和光亦從西一里踰東中界溪即為迎祥寺于是涉中支界矣又一里南踰鎖水閣下流登坡于是涉中支脊矣西北溯脊一里過息隂軒又循瀑布上流西北行里餘渡北來之溪于是去中支陟西支界矣又北一里西涉一峽溪再上一西來小支之嘴登之西北行一里又西渡亭橋橋下水為華嚴前界水上下俱有橋而此其下流之渡橋內峽中有池水流而不溷亦龍潭類也由溪南向西北行于是陟西支脊矣半里入華嚴寺寺東向踞西支大脊之北創自月潭至月輪而光大之為雞山首剎慈聖太后賜藏貯之後燬于火野池復建野池年七十餘歷侍山中諸名宿今老而不忘先德以少未恭學掩關靜閲孜孜不倦亦可取也聞余有修葺雞山志之意以所録清涼通傳假余其意亦善下午將别史君聞余在亦追隨至余恐途已晚遂别之從别路先返以史有輿騎也出寺西北由上流度橋四里連東北踰三澗而至其東界之支即聖峯燃燈之支垂也又一里東下至其盡處有寺中懸為天竺寺其北澗自仰髙亭峽中下其南澗又從西支東谷屢墜而下者夾聖峯之支東盡于此王十嶽遊記以聖峯為中支誤矣由其垂渡北峽小橋于是又陟中支之西界循北麓而來半里兩過南下小水乃首傳寺前左右流也其南峽中始闢為畦有廬中央是為大覺菜圃從其左北轉半里踰支脊連橫過法華千佛靈源三菴是皆中脊下垂處半里北踰鎖水閣下流即大覺寺矣仍東隨大路一里過西竺寺前上圓通菴觀燈籠花樹其樹葉細如豆瓣根大如匏瓠花開大如山茱萸中紅而尖蒂俱緑似燈垂垂豫從永昌劉館見其樹未見其花也此菴為妙行舊居畹瀹茗乃去一里由迎祥寺北渡澗仍去中界而入東支界溯水而北過龍泉菴五華菴今名小龍潭乃悉檀大龍潭之上流大龍潭已涸為深壑乃小龍潭猶滙為下流余屢欲探之至是強二僧索之五華後崕見水流淙淙分注悉檀之右而坡道上躋不見其處二僧以日暮勸返比還寺門且閉矣十三日史君為悉檀書巨匾蓋此君夙以臨池擅名而詩亦不俗復相與劇談既午輿人催就道史懇余同由九重崖橫獅林栴檀而西宿羅漢壁明日同一登絶頂作别余從之遂由悉檀東上坡半里過天池靜室六里而過河南止足師靜室更北上一里直躡危崖下是為德充靜室德充為復吾髙足復吾與史君有鄉曲之好故令其徒引遊此室而自從西路上羅漢壁具飯于西來寺以為下榻此室當九重崖之中為九重崖最髙處室乃新構而潔其後危崖之半有洞中懸可緣木而上余昔聞之不意追隨首及于此余仰眺叢木森霄其上似有洞門倣佛時史君方停憩不前余即躡險以登初雖無徑既得引水之木隨之西行半里又仰眺洞當在上復躡險以登初亦無徑半里既抵岩下見一木倚崖直立少斫級䀶以受趾遂猱木升崖凡數懸其級始及木端而石級亦如之皆危甚足之力手之力亦半無所寄所謂慿虛御風而實慿無所慿御無所御也洞門正南向上下皆削壁中嵌一門髙五丈濶與深亦如之而旁無餘隙中有水自頂飛灑貯之可供一人餐憩之亦僅受一人榻第無餘隙恐不免風雨之逼然臨之無前近則木香坪之嶺已伏于下逺則五龍壩之障正橫于其南排沙觀音箐諸山層層中錯各獻其底裡而無餘藴焉久之聞室中呼聲乃下又隨引水木而東過一棧觀水所從出處乃一巨石下甫出即刳木引之西注此最上層之水也其下一二丈又出一水則復吾之徒引入靜室其下又出一水則一衲引之連出三級皆一峽坳雖穴異而脈必潛通其旁分而支引者舉岩中皆藉之矣既下室中啜茶果復繼以餅餌乃隨下層引水之木西一里入一衲軒延眺久之又茶而行西一里過向所從登頂之坡橫而西路漸隘或盤坡嘴或過峽坳皆亂礫垂沓而中無滴水故其地不能結廬遂成莽徑二里餘峽坳中有一巨木橫偃若橋又西二里乃踐坡轉嘴而上過野愚靜室又半里上至白雲靜室白雲固畹以日暮而去白雲隨過體吉靜室而别西半里過一宗靜室傍水又躡坡半里踰望臺南突之脊于是暝色已來月光漸耀一里餘兩過望臺西坳之水又一里南盤栴檀嶺乃西過羅漢壁東垂皆乘月而行也又稍盤嘴而上半里為慧心靜室此幻空碧雲寺前南突之坡也余昔與慧燈别于會燈寺訪之不值今已半載餘乃乘月叩扉出茗酌于月中甚適此地去復吾先期下榻處尚三里而由此西下度箐暗不可行慧心乃曳杖為指迷半里度而上又半里登坡與碧雲大路合見月復如前慧心乃别去又西一里過一靜室乃盤嘴北向躡坡則復吾使人遍呼山頭矣又一里入西來寺寺僧明空他出其弟三空余向所就餐者聞之自其靜室來迎復吾知吾輩喜粥為炊粥以供久不得此且當行陟之後吸之明月之中不啻仙掌金莖矣十四日三空先具小食饅後繼以黃黍之糕乃小米所蒸而柔軟勝于糯粉者乳酪椒油葼油梅醋雜沓而陳不豐而有風致蓋史君乃厥兄明空有約而來以下闕徐霞客逰記卷十二下

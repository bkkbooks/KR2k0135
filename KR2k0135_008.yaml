body:
  text: 徐霞客逰記卷八上明徐宏祖撰西南逰日記十三雲南戊寅十二月初一日在官莊茶房時顧行病已少瘥而孱弱殊甚尚不能行欲候活佛寺僧心法來同向黑鹽井迂路兩日往姚安府以此路差可行不必待街子也初二日初三日初四日在茶房悟空日日化米以供食而顧行孱弱如故心法亦不至初五日前上雷應諸蜀僧返諸僧待明日馬街隨街往爐頭出大姚余仍欲隨之而病者不能霍然為之怏怏馬街在西溪東坡上南去元謀縣二十五里北去黃瓜園三十五里東至雷應山箐口十里西至溪西坡五里當大塢適中處東西抵山共徑十五里南抵山逾江共徑一百三十里平塢之最遙者也其東南有聚廬曰官莊為黔府莊田茶房即在馬街坡北元謀縣在馬頭山西七里馬街南二十五里其直南三十五里為臘坪與廣通接界直北九十五里為金沙江渡江北十五里為薑驛與黎溪接界直東六十里為墟靈驛東嶺頭與和曲州接界直西四十里為西嶺與大姚縣接界其地北遙與會川衛直對南遙與新化州直對東遙與嵩明州直對西遙與大姚縣直對東界大山即墟靈驛與雷應山也南自大麥地直北抵金沙江南岸橫亘二百里平障天半西界山層疊錯出亦皆自南而北縣治之支南自楚雄府定逺縣東來分支結為縣治其餘支西繞者由縣西直北十五里西溪之口而止是為第一層又一支南自定逺縣西分支來與縣西之支同夾而北至西溪口東支已盡此支更夾之而北至扁擔浪而止是為第二層又一支西自定逺西與姚安府東界分支東來與扁擔浪之支同夾而北中界苴林後水所謂西尖界嶺也又一支西自姚安府東北分支東來與西尖界嶺同夾而北中界爐頭溪水即所謂爐頭西亂石岡也又一支定逺縣西北妙峰山分支東來與亂石岡同夾而北中界河底之水即所謂舌獨木橋西山也諸山皆束夾川流北出或合西溪或出苴榷而下金沙故自縣以北其西界諸山一支既盡一支重出若鱗次而北抵金沙焉其東界水皆小惟墟靈驛一支較大南出馬頭山之南經縣治東而北與西溪合自是以北溪東之村又倚東界山之麓甚多官莊之北十里為環州馹又十里為能海閙村濵溪東岸即活佛所生處離寺二十五里其村有木棉樹大合五六抱縣境木棉樹最多此更為大又十五里為黃瓜園溪西之村倚西界之山麓亦甚多西坡下村與官莊對峙北十五里為五富村又十里為苴寧村又北踰嶺二十里為扁擔浪於是北夾西溪盡於金沙焉西界諸山俱自定逺夾流分支東北而盡於金沙江其西北又有大山方頂矗峙於北與金沙北岸蜀滇交會之嶺駢擁天半從塢中北向遙望若二眉髙列於塢口焉余初以為俱江北之山及抵金沙江上而後知江從二山之中自北而南環東山於其北界西山於其西始知此方頂之山猶在金沙之南也其山一名方山象形一名畨山以地因其音之相近而名之其地猶大姚縣屬在縣東北一四十里苴𣙜之境東臨金沙江是此山又從西北北勝州界環突東南界金沙於外抱三姚於中與此西界回合而對峙為門户者也金沙巡司乃金江南曲之極處自此再東過白馬口普渡河北口即從烏蒙山之西轉而北下烏蒙馬湖巡司之西其江自北來故雲南之西北界亦隨之而西北出以抵北勝麗江焉初六日早雲氣少翳諸蜀僧始欲逰街子俟下午渡溪而宿明晨隨街子歸人同踰嶺既晨餐或有言宜即日行者悟空以余行有伴辭不去而顧僕又以懨懨不能速隨諸僧後雖行心為沖沖出茶房西一里半渡西溪溪從此西曲從其南岸隨之又一里餘抵西山下溪折而北又從其西崖傍山麓隨之又北一里餘有村當路北遂由其南西向入峽半里涉枯澗乃躡坡上其坡突石皆金沙灼灼如雲母堆疊而黃映有光時日色漸開躡其上如身在祥雲金粟中也一上二里踰其頂望其西又闢一界有尖山獨聳路出其間乃望之而趨西向漸下三里抵塢中有水自南峽中來至此繞塢東北去其水不深而濶路北有數十家倚河東岸由其南渡河而西其處木箕有髙一丈餘者云兩三年不凋有枯澗自西來其中皆流沙沒足其兩旁俱回崖亘壁夾持而來底無滴水而沙間白質皚皚如嚴霜結沫非鹽而從地出疑雪而非天降則硝之類也路當從澗底直入諸僧之前驅者誤從南坡躡嶺上上一里見其路愈南而西尖在西知其誤乃與僧西北望澗底扳崖下墜一里復循底西行見壁崖上懸金丸纍纍如彈貫叢枝一墜數百扳視之即廣右所見顛茄也志云枝中冇白漿毒甚土人鍊為弩藥著物立斃行澗底二里其底轉自西北來路乃從西南躡嶺一里半盤嶺頭西出又一里半西南下坡其處開壑灣環而北涉壑底而西不見有水半里循西坑入見石峽中有水潺潺其峽甚逼水亦甚微一里其峽有自南流而出者下就涉之其流之側有窞如半匏仰東崖下涵水一盂不流不竭亦瀦水之靜而有常不與流俱汩者也涉細流西上踰坡半里有植木為坊者上書黔府官莊坡西下半里有數家在坡北其壑亦灣環而北中有田塍數十畦想即石硤之上流得水如線遂開此畦所謂黔府莊田是也時諸僧未及攜餐令其徒北向夷家覓火余輩隨大路繞其南而西一里又有木坊在西坡書亦如前則其西界也從此西下又涉一枯澗遂西上嶺其上甚峻僧乞火至而不泉莫能為炊上嶺二里盤峽而西又半里轉而南半里一坪北向環窪中亦無水余乃出所攜飯分啖之隨坪稍南半里復西上其上愈峻二里登岡頭以為踰嶺矣而不知其上乃東垂之脊也望西尖尚在其北隔一深坑甚遙西尖又有南北二橫山亘其兩頭又自成一界焉從脊向西行其上二里半又南轉峽上循而環之又西北上再陟峻嶺二里登岡頭又以為踰嶺矣而其上又東垂之脊也又從脊西向行于是脊兩旁皆深墜成南北壑壑蟠空於下脊端突起於外西接橫亘之界樹叢石錯風影颯颯動人疑是畏途時肩擔者以陟峻難前顧僕以體弱不進余隨諸僧後屢求其少待與俱每至一嶺輒坐待久之比至諸僧復前彼二人復後余心惴惴既恐二人之久遲於後又恐諸僧之速去於前屢前留之又後促之不勝惶迫愈覺其上不已也從脊行三里復從嶺西上一里遂陟橫亘南山之北巔其巔與中突之尖南北相對其巔有石疊垣橫界是為元謀東界大姚西界即武定姚安二府所分壤處也路由其間登嶺之絶處則有盤石當頂于是從南橫之巔南向陟其脊東瞰元謀西瞰爐頭兩界俱從屐底分塢焉南行脊上二里西向下二里路側漸墜成峽石坎纍纍而尚無滴水歷石坡直下一里抵峽中峽西又有回岡兩重自東北而蟠向西南于是陟峽盤岡再踰坡兩重共七里乃西南下嶺一里始及其麓其塢乃南北大開中有溪界之望見溪西有大聚落是為爐頭時諸僧已飢且日暮急於問邸遂投東麓下草盧宿初七日土人言自爐頭往獨木橋路止四十里不及官莊來三之一余信之諸僧先飯而去余俟病僕同行是早雲翳如昨西望爐頭大村行半里渡一北流溪又西一里餘直抵西界山麓又有一溪頗大自南峽中來渡之北上崖即爐頭大村也其溪環村之前轉而北去爐頭村聚頗盛皆瓦房樓居與元謀來諸村逈别其西復有斜倚循其東麓西南溯流行三里踰一東突之坡乃南下半里涉塢一里又南陟坡而上其坡自西而東突與北坡南向環成中塢溪流北坡前田塍環錯於內陟南坡一里見溪東又盤曲成田倚東山為塢由坡西南行一里下坡溪自北而南乃橫涉之登其西崖則見所涉之北其溪復自北來有支流自北峽來者小水也從崖西行已復踰溪之南岸溯溪上溪在其北峽有數家倚其南岡從其中西行二里北峽兩崖對竦石突如門其北石崖半有流環其腰土人架木度流引之南崖沸流懸度於上亦竒境也路循南崖之腰盤崖西下又半里則其溪又自南而北南北俱削崖峙門東西又危坡夾塹境竒道險渡溪又西上坡半里躡坡南復踰溪之北崖溯溪上西二里一峯危突溪西溪身自其南環峽而出支溪自其北塹壑而下有岐西渡支溪直躡西峰者小路也自支溪之東崖陟坡循峽而北入者大道也從大道北上坡半里由坡峽平行一里隨峽折而北路緣塹木叢路旁幽箐深崖令人有鳥道羊腸之想一里餘峽漸從下而髙路稍由髙而下兩遇之遂西涉峽中細流復從峽西躡峻西上即盤而北乃知是為中懸之岡其西復有峽流自北來無所陟之峽即會於岡前緣岡北上一里左右顧瞰其下皆峽而流貫其中斯岡又貫二流之中始覺西尖之嶺峰隆泉縮不若此之隨地逢源也從岡脊北向以漸上躋亦以漸轉西二里登岡之首望其岡猶自西峰東突而下者蓋山脊自西南來至此既穹南山一重即從其北峽中度而北再起中峰又亘為此山一重即從其北嶺環支而東又亘為北山一重恰如川字條支東南走而所上者是其中支也從岡首又西向平行二里直抵其西中峰最髙之下乃循其峰之東崖西南上一里半是為亂石岡遂凌其峰之崖下瞰南崖之底即其中度處也峽中之水遂東西分焉由嶺崖最髙處西轉而下逶迤曲折下四里復從岡上西北行忽見岡左右復成溪而夾之其溪流分大小平行岡上二里即從其端下西渡大溪由河西上坡稍轉而北半里從北峽轉西遂向西塢入於是溯西來大溪之北循北山西行矣二里半有村在溪南倚南山之坡北山亦至是南突路遂從所突峽中上乃踞峽石而飯又一里盤其南崖從崖轉西又一里踰其西坳乃西下坡半里抵坡之西麓其西復開成塢半里路循溪北之山又有村倚溪南之麓與前倚溪南之坡者皆所謂夷村也西行三里一溪自南峽來路亦隨之南轉稍下渡西來小水從南坡西上二里踰其岰而西北下一里下至壑中其壑南向而大山環其北又有小水東南流當亦下大溪者而大溪盤其東南峽中不見也渡小水又西上一里透西岰出始見西塢大開大溪貫其中自西而東抵所透岰南破其峽壁東去其峽逼束甚隘回顧不能見西下坡半里抵塢中遵溪北塢西行半里過一小村又西一里忽塢塍間甃磚為衢半里繞大村之前又西半里抵村側新橋而止是為大舌甸村其塢夾溪為田塢環而田甚闢其村倚山為衢村巨而家甚古蓋李氏之世居也村後一山橫擁於北又一山三峰遞下斜突於西南有小流自其峽中出由村西而南入大溪架橋其上西踰之遂循斜突南峰下西南行二里抵其西垂則大溪自其南直搗其麓乃踰堰東向其麓為水所嚙石崖逼削幾無置足處歷堰之西上流停洄自南而北路從其西轉而南入峽又行南峽一里餘則有石梁一鞏東西跨溪上是為獨木橋路從橋西直南上坡其踰橋而東者乃往省大道是橋昔以獨木為之今易以石有碑名之曰躡雲而人呼猶仍其舊焉橋側有梅一株枝叢而幹甚古瓣細而花甚密緑蒂朱蕾氷魂粉眼恍見吾鄉故人不若滇省所見皆帶葉紅花盡失其雪滿山中月明林下之意也乃折一枝少憩橋端仍由其西上南坡隨坡西轉蓋是溪又從西塢來至是北轉而踰石堰是坡當其轉處其南又開東西大塢溪流貫之路溯溪之北崖循北山西行一里有聚落倚北山下是為獨木橋村有寺當村之中門南向村無旅店有北京僧接衆於中乃入宿初八日晨起寒甚顧僕復病余亦苦於行止行一里遂憩水井屯寺中初九日出寺一里半過某家莊半里轉南半里倉屯橋二里半洄峽口轉西五里王家橋有小水北來五里孚衆橋有西北西南二小水西上山十里至脊轉南半里廟山營西下半里廟前打哨西下二里有岐轉北岰一里復西隨平峽北二里又西下二里至峽底西平行一里半復於峽北上一里轉北凹而西又北半里過一峽脊又北下半里又北度一峽底又西上坡一里轉而北又一里轉而西下一里至脊間又西二里餘乃下脊一里餘抵其北曰小犵老橋始有田有池又西四里抵西山下有村轉南一里西過一小岰又半里西南過新壩屯又西半里過新壩橋又西一里轉而南二里盤西山嘴轉而西北一里餘入大姚東門半里過縣前又西南去街歇初十日早寒甚出北門半里經南門轉而西南上坡一里有橋跨溪上曰南門橋志曰承恩過橋南上坡一里登坡倚西山南行三里其塢自南來有塔在塢東北山上乃沿西山南下半里抵塢底又半里見有水貫塢中石梁跨其上是名土橋即姚安水從西南峽中來向東北峽去橋北為大姚橋南為定逺蓋以是水為界也從橋南上坡有村為定逺屯入峽漸上一里東轉半里上坡半里由坡南轉一里是為賴山哨於是南下一里抵東南坡頭有岐南行者為姚安府路有海子在其東東行者為赤草峰路踰坡東下一里為赤草峰北村由村轉南溯溪行一里度橋而南半里隨赤草峰街子南行一里乃東上山一里半踰嶺東南下其東又有塢自南而北甚遙下坡半里由西山東麓南行二里村落傍溪左右皆為犵老村此定逺所屬又東一里半始傍西水岸南行半里東渡小橋遂由東麓南行二里至鹿家村後遂東上山山半有岐路從岐入峽半里渡溪東北上一里至妙峰山德雲寺寺門西向南望煙蘿後有夢菴亭後五里碧峰菴十一日待師未歸藏宗昶慧大師西方合論十二日飯仍西下山二里南行二里隨塢西轉二里有橋跨溪上曰梁橋度其北即犵老村盡處也其水自南來入路從村西上嶺一里半踰岰西行嶺上半里有大道從西南下誤從坡上直西半里乃改從岐西南行半里漸下轉南又一里乃南下半里抵峽中隨峽南去半里有大路隨東峽來小水隨之西半里入南峽一里有池在峽中又一里半峽分兩岐從西南者倚東嶺平上一里南踰岰由岰轉而西始見西塢大開西南有海子頗大其南有塔倚西山下即所謂白塔也乃西南下坡二里有村在坡下曰破寺屯于是從岐直西小路一里渡溪稍西南半里有一屯當溪中山繞其北其前有止水由其西坡上南行一里是為海子北堤由堤西小路行半里抵西坡下是為海口村轉南隨西山東麓行名息夷村海子三里海子西南盡有路直抵大山下半里為髙土官家由其西南入峽中上坡一里半有神廟當坡峽間又上半里活佛寺臨其後其西大山名龍鳳山又名廣木山寺號龍華僧號寂空是日下午寂空留止後軒東廂其後有深峽下懸峽外即危峰髙峙庭中藥欄花砌甚幽牆外古梅一株甚盛下臨深箐外映重巒是夜先訂寂空明晨欲早行求為早膳白塔尚在寺東南後支岡上岡東有白塔海子其南西山下又有陽片海子其東又有子鳩海子府城南又有大壩雙海子與息夷村共五海子十三日昧爽飯已久待遂飯而下山二里仍出土官家後遂轉南行一里過格香橋有小水自活佛寺後峽中來者此峽正與白塔之岡中格而對峙又南二里有岡自西界東突而出路盤其東垂則又一海子滙其東南從海子北堤東向行半里隨堤南轉一里半抵海子東南盡處遂東南行四里有岡又自西而東突是謂龍岡衛盤岡東皆大聚半里過聚東行一里復南二里曲度乾底復南二里則西山一峰復突其南遂漸抵東山則南北成兩界焉又南五里而入姚安府北門歇青蓮菴青蓮碑記曰東煙蘿西金秀南青蛉北曲折姚安府南隨峽上一百四十里鎮南州東踰大山一百四十里定逺縣西踰小坡一百二十里北隨大塢下一百二十里白鹽井姚安東西兩界皆大山夾抱郡城當其南西界最闢直北二十里兩界以漸而束各有支中錯如門户焉中有小水西自鎮南州界北來至郡北屢堰為湖下流透北峽之門而出所謂青蛉川也十四日飯於青蓮日色已髙循城南一里半為觀音寺轉北過西門共一里抵舊西門二里半抵西麓是為古寺山以有古寺在山之東半也即志所稱祥龜寺也二里踰頂下其西環塢北口則羊片湖在焉西下一里半行塢中一里半有坊當塢中曰羊片屯西過半里轉南半里又西南半里抵小山之麓從其南塢西入一里半又西上一里半有岐焉西北者入山樵木所經西南盤嶺者大道也盤嶺上一里半踰其頂為當波院而實無寺宇乃南來之脊北度而東為古佛寺大山及大姚西界諸山也于是西南下二里有小水南流隨之南入箐又東一里半轉而西一里半峽始開稍北盤岰一里復西南下坡三里峽中溪自南而北注有橋跨之度橋遂循西山南向溯水行二里飯於村家又南向行二里餘其峽自西來轉水亦從之于是折而入是名觀音箐箐中止容一水西溯之入二里有觀音堂其前堰水甚泓徹其側石亦㟏岈又西三里乃南上山甚峻二里陟其脊乃東南下一里抵峽中遂循坡西南下二里抵聚景橋橋上有亭橋下水乃西來小流也過橋三里是為彌興居集頗盛又南半里轉西一里餘有公館神廟在岡上由其前西南半里轉而西于是連踰三坡下陟三峽共九重有村懸西坡上是為孫家灣宿十五日昧爽飯而行霜寒殊甚南上坡溯小流入五里盤一坡坡下有洞甚束其東北人家曰尾苴村稍西輒南是為龍馬箐三里有哨當澗東坡上為龍馬哨有哨無人山壑幽阻溪環石隘樹木深密一路梅花幽香時度又南一里隨峽轉西一里有一峽自南來甚深隘一峽自西來仍循北山行西來峽上一里出峽乃成塢焉西向平下一里有村當其西為大苴村西行二里扺西山下遂西上坡循西峽行二里下渡澗中小水即西上嶺甚峻三里半踰嶺頭西行脊上或南峽上又臨北峽再平再上三里餘則盤西嶺之東北轉二里踰其脊此最髙處也東望煙蘿東界尖山在錢章關者隱隱連妙峰而西界南突之山亦見惟其北活佛寺大山反為孫家灣後山所隔不可見又西二里當西突之處有人守哨是為老虎關哨稍西下半里行坡間一里半為打金莊牌界又西一里半踰坡又西上一里半是為絶頂有公館東南之峽至是始窮其脈自南天申堂後直北分支而來東度老虎關而北于是西向稍下半里度一坡半里踰其巔從巔西行一里遂西望四十里外層山一重西繞又髙峰一帶南環者皆大脊也其東有小脊二重內隔外有逺峰二抹西浮不知為點蒼為雞足也于是西下頗坦五里下至峽中為五里坡有水自南而北小石梁跨之度而西盤西山南峽入一里又躡坡而上一里凌其巔一里半稍下平行嶺上二里餘西向下有溪自西南來北向去石梁跨之是為普昌河西上坡半里為巡司半里復上一山脊由脊西行四里乃下一里而抵普淜十六日由普淜西北行二里渡一水一里又渡一水乃西上坡二里踰坡上一里脊上平行三里為金雞廟又西二里為界坊乃姚州小雲界又西行嶺上五里至水盆哨乃西北稍下即見南界水亦西流出鼻忩敞而下元江矣乃隨北山臨南峽西行二里山坑南墜峽路隨西脊過有村當脊間是為水盆鋪蓋老龍自西南來從此脊北度峙為一峰其東南又折而南為水盆鋪惟中央一線南流下元江云鋪西北上有關帝廟就而作紀聽顧僕同行李先去久之乃隨大道西二里則嶺北山下亦下墜成西向之峽于是循南峽之頂西徑峽北所起尖山是為青山至是其西橫拖而去于是循南峽之頂西行二里忽見路北墜峽西去路由其峽南嶺脊行於是與峽北之尖山又對夾分流西注雲南而北下金沙矣始知大脊自九鼎南下至洱海衛城青華洞度東又聳而南為水目山其南又東轉為華山即雲南川南兜之山也從天華東北轉數起而為沫滂東嶺又東過公館而為水盆鋪北聳為青山其形東突而西垂川中故自打金莊嶺之僅為北尖峰而至此又橫夾而西然是山西北二支皆非大脊也大脊即從東南水盆哨過脈遂東南迤邐於天申南又東至沙橋站分脊焉所過水盆哨鋪之南間相去不過二里忽度其脊南又度其脊北至由峽南嶺稍上稍下西南二里是為公館當其頂又西下西上再從嶺脊西行八里脊自西南來至此稍突而北乃轉而北緣之二里又西南下始追及前行行李於是遂出山之西崖見其西塢大開於是直下五里及麓為沫滂鋪西截塢八里有二石梁東西跨其下皆涸而川水實由之北注又西二里過大水堰塘堰稍北復西十里抵西山下為小雲南驛宿十七日昧爽飯詢水目寺在其南遂由岐隨山之東麓南行盤入其西南塢中共五里有水自山後破峽南出即洱海衛青海子之流也是為練場村村在水西度橋西即復沿山而南一里半為溫泉其穴西向待浴婦經兩時乃浴仍南沿西麓半里又盤其山之南塢入有溪自塢東出即水目之流也始見水目山髙峙於西溯水西入見其西又大開南北之塢橫截其間五里抵西山麓有村甚大曰冉家屯由其後西上山於是有溪流夾村矣西上踰一嶺二里稍下涉一澗其澗自南而北溯之南上山間茶花盛開又二里餘為水目寺余誤從其南大路幾踰嶺遇樵者轉而東北下半里入玉皇閣又下觀倒影又下過普賢寺又下遇行李於靈光寺遂置於寺中樓上慧然乃西至舊寺訪無住方在上新建住靜處不值舊寺有井有大香樟有木犬有風井有塔由其後上無影菴飯於妙忍老僧靜室暮過觀音閣觀淵公碑乃天開十六年楚州趙祐撰者十八日住無住處午過徽僧戒月靜室飯下午觀慧然新樓花卉十九日早雨雪無住苦留因就火僵卧上午雨雪倐開再飯由山前東北下五里下山過一村北向二里踰一坡又二里過一小海子其北岡上有數家曰酒藥村一里越之乃陟塢循東山北行五里即青海子之西南涯也遂與小雲南來之大道遇于是由青海子西涯西北向行八里則南山再突而北瀕於海路或盤之或踰之又五里為狗村鋪坊名瑞禾館名清華其處北向洱海衛城八里西向白崖城站四十里余從西路四里觀青華洞洞北有路西過嶺此白崖道洞南有塢南過脊此滅渡道豫出洞循西山仍北行六里入衛城南門顧僕亦至出西門宿二十日飯而行猶寒甚而天復霽由西門北向循西山行五里抵一村其北有水自西峽出遂隨之入一里餘稍陟坡一里餘有村在澗西曰四平坡北轉五里渡溪橋又北上三里為九鼎山寺又二里陟其巔飯下午從東北下三里過北溪橋仍合大路則循梁幕山西麓西北溯流入五里梁王村北八里松子哨行半里溪西去路北上半里踰嶺又東北下者五里則溪復自西來又有一小溪自幕山北麓來與之合乃涉其交會處是為雲賔之界又東二里為自北關已暮又東二里半度澗橋之北又東半里轉北一里半為山岡鋪宿二十一日平明行大塢中北向十里其西為賔居又北五里有小水出田間又北三里有澗自西峽出隨之北二里為火頭基連西北渡二溪又北五里總府莊又北三里賔川州在東坡上東倚大山西臨溪流然去溪尚里許其濵溪東岸者曰大羅城令行李先去余草紀西崖上望州北有岡自東界突而西其北又有岡自西界突而東交錯於塢中為州下流之鑰溪至此始曲折瀠之始得見其形焉又北三里半踰東突之岡則見有村當其北麓是名紅帽村溪自東南瀠東突之岡西轉而瀠於村之前其前又開大塢北去仍循西山北行五里漸轉而西於是岐分為二東北隨流遵大塢直去者由牛井街通浪滄衛道西北從小塢踰嶺者由江果往雞足道初由山岡北望以為東界大山之北嶺即雞足而川中之水當西轉出瀾滄江至是始知賔川之流乃北出金沙江所謂浪滄衛而非瀾滄江也其東界大山乃自梁王山北轉夾賔川之東而北抵金沙非大脊也從小塢西二里踰西界之脊始見雞足在西其髙與東界並然東界尤屏亘與雷應同橫穹半壁云從脊上南望其南五德山橫亘半天即前洱海衛所望九鼎西髙擁之山其上有雪處也至是又東西橫峙其東又聳幕山所謂梁王山也二山中凹稍低即松子哨度脊而北處也從嶺西行三里稍北下有溪自西而東注於賔川大溪駕梁其上覆以亭是為江果村在溪北岸其流與火頭基等時日甫下午前向東洞上三十五里中無托宿遂止二十二日昧爽由江果村飯溯溪北岸西行其溪自西峽中來乃出於雞山南支之外五福之北者洱海東山之流也四里登嶺而北寒風刺骨幸旭日將出惟恐其遲盤嶺而北一里半見嶺北又開東西塢有水從其中自西而東注於賔川大溪即從牛井街出者此塢名牛井有上下諸村其水自雞足峽中來所謂盆子孔之下流也於是西向漸下一里半而抵塢中又西一里過塢中村後有坊曰金牛溢井標勝也土人指溪北岡頭有井在石穴間云是昔年牛從井出處也又西二里復踰岡陟峽蓋其山皆自南突北瀕溪而止溪東流瀠之一開而為煉洞再開而為牛井此其中突而界之者盤峽而上迤邐西北再平再上五里越嶺而復得塢稍下一里半有坊在坡曰廣甸流芳又一里半復過一村後此亦煉洞之最東南村也又北二里有村夾道有公館在村頭東北俯溪是為煉洞之中村其北二里復上嶺二里越之而北有坊曰煉法龍潭始知其地有蟄龍有煉師此煉洞所由名也又北二里村聚髙懸中有水一池池西有亭覆井即所謂龍潭也深四五尺大亦如之不隘不涸前瀕於塘土人浣於塘而汲於井此雞山外壑也登山者至是以為入山之始焉其村有親迎者鼓吹填街余不顧而過遂西北登嶺五里有菴當嶺是為茶菴又西北上一里半路分為二一由嶺直西為海東道一循峽直北為雞山道遂北循之稍下三里而問飯發筐中無有蓋為居停所留也又北下一里有溪自西南峽中出其峽回合甚窅蓋雞足南峽之山所泄餘波也有橋亭跨兩崖間又北一里中壑稍開是為拈花寺寺東北向余餒甚入索飯於僧隨寺北西轉三里踰岡之脊是為見佛臺由是西北下一里又陟一北下之峽又西踰一北下之脊始見脊西有塢北墜塢北始逼雞山之麓蓋雞山西北突而東南塢界其中至此塢轉東北峽路盤其東南支乃谷之綰會處也西一里見有坊當道左跨南山側知其內有奧異訊之牧者曰其上有白石崖須東南踰坡一里乃得余乃令行李從大道先向雞山獨返步尋之曲折東南上果一里得危崖於松箐之間崖間有洞洞前有佛宇門北向為僧鎖鑰而去不得入乃從其西踰窒徑之棘以入遍逰洞閣中又扳其西崖探閣外之洞見其前可以透植木而出乃從之下一里仍至大路又西北二里下至塢中渡溪是為洗心橋雞山南峽之水西自桃花箐南自盒子孔出者皆由此而東出峽東南由煉洞牛井而合於賔川者也溪北雞山之麓有村頗盛北倚於山是為沙址村此雞山之南麓也於是始迫雞山有上無下矣從村後西循山麓轉而北入峽中緣中條而上一里大坊跨路為靈山一會坊乃按君宋所建者於是岡兩旁皆澗水泠泠喬松落落北上盤岡二里有岐東北者隨峽西北者踰嶺踰嶺者西峽上二里有瀑布隨峽者東峽上二里有龍潭瀑之北即為大覺潭之北即為悉檀余先皆不知之見東峽有龍潭坊遂從之盤磴數十折而上覺深窅險峻然不見所謂龍潭也踰一板橋見塢北有寺詢之知其內為悉檀前即龍潭今為壑矣時余期行李于大覺遂西三里過西竺龍華而入宿於大覺二十三日飯於大覺即東過悉檀悉檀為雞山最東叢林後倚九重崖前臨黑龍潭而前則回龍兩層環之先是省中諸君或稱息潭或稱雪潭至是而後知其皆非也𢎞辨安仁二師迎飯於方丈即請移館余以大覺遍周以足疾期晤於是欲少須之乃還過大覺西上一里入寂光寺住持者留點此中諸大剎惟此七佛殿左右兩旁俱闢禪堂方丈與大覺悉檀並麗又稍西半里為水月積行二菴皆其師遍周所遺也二十四日入晤遍周方留欵而𢎞辨安仁來顧即懇移寓遂同過其寺以靜聞骨懸之寺中古梅間而入問仙陀純白何在則方監建塔基在其上也先是余在唐大來處遇二僧欣然以瘞骨事相訂及入山見兩山排闥東為水口而獨無一塔為山中欠事至是知仙陀督塔上而未知建於何所𢎞辨指其處正在回龍環顧間與余意合飯後遂東南二里登塔基晤仙陀二十五日自悉檀北上經無息無我二菴一里過大乘菴有小水二派一自幻住東一自蘭陀東俱南向而會於此為悉檀西派者也從二水之中躡坡上二里餘東為幻住今為寧福寺西岡為蘭陀幻住東水即野愚師靜室東峽所下與九重崖為界者幻住西水即與艮一蘭陀寺夾塢之水上自莘野靜室發源於念佛堂而為獅子林中峽之水也循東岡幻住傍北向一里而得靜室即天香者時中無人入詢莘野廬小沙彌指在盤崖杳靄間當危崖之西乃從其後躡崖上穿林轉磴俱在深翠中蓋其地無喬松惟雜木繽紛而疊路其間又一景矣數十曲幾一里東躡岡即野愚廬西緣崖度峽即莘野廬道于是西向傍崖橫陟半里有一靜室髙懸峽中户扄莫入是為悉檀寺庫頭所結由其前西下蘭陀寺躡其后而上又半里而得莘野靜室時知莘野在尼牟山而其父沈翁在室及至而其門亦扄知翁别有所過莫可問遂從其左上又得一靜室主僧亦出有徒在詢之則其師為蘭宗也又問沈翁何在曰在伊室問室何扄曰偶出當亦不逺余亦還以省中所寄書畀之其徒曰恐再下無覓處不若留此代致也從之又從左峽過珠簾翠壁躡臺入一室則影空所棲者影空不在乃從其左橫轉而東一里入野愚靜室所謂大靜室也有堂三楹橫其前下臨絶壁其堂忩楞疏朗如浮坐雲端可稱幽爽室中諸老宿具在野愚出迎余入詢則蘭宗影空及羅漢壁慧心諸靜侣也是日野愚設供招諸靜侣遂留余飯飯後見余攜書篋因取篋中書各傳觀之蘭宗獨津津不置蓋曽雲遊過吾地而潛心文教者既乃取道由林中西向羅漢壁從念佛堂下過林翳不知竟平行而西共一里半有龕在磐石上入問道從其西南半里踰一突嘴即所謂望臺也此支下墜即結為大覺寺者望臺之西山勢內遜下圍成峽而旃檀林之靜室倚之峽西又有脈一支自山尖前拖而下是為旃檀嶺即西與羅漢壁分界者是脈下墜即為中支而寂光首傳寺倚之前度息隂軒東轉而盡於大士閣者也由望臺平行而西又二里半而過此嶺嶺之西石崖漸出髙擁於後乃折而北上半里得碧雲寺寺乃北京師諸徒所建香火雜沓以慕師而來者衆也師所栖真武閣尚在後崖懸嵌處乃從寺後取道宛轉上之半里入閣參叩男女滿閣中而不見師余見閣東有臺頗幽獨探之一老僧方濯足其上余心知為師也拱而待之師即躍而起把臂呼同聲相應同氣相求且詮解之手持二襪未穿且指其胸曰余為此中忙甚襪垢二十年未滌方持襪示余而男婦聞湧至膜拜不休臺小莫容則分畨迭換師與語言人人殊及念佛修果娓娓不竭時以道逺余先辭出見崖石有路可躡復扳援其上轉而東得一峽上緣有龕可坐梯險登之復下碧雲菴適慧心在以返悉檀路遙留余住宿主寺者以無被難之蓋其地髙寒也余乃亟下南向二里過白雲寺已暮色欲合從其北傍中支腋行路漸平而濶二里過首傳寺暗中不能物色又東南一里餘過寂光一里過大覺又東一里過西竺與大道别行松林間茫不可見又二里過悉檀前幾從龍潭外下回見燈影乃轉覓抵其門則十方堂已早閉不肯啓叩左側門乃得入宿焉二十六日晨起飯𢎞辨言今日豎塔心為吉日可同往一看幸定地一處即可為靜聞入塔余喜甚𢎞辨引前由籠潭東二里過龍砂內支其腋間一穴在塔基北半里其脈自塔基分派處中懸而下先有三塔皆本無髙弟也最南一塔即仙陀純白之師師本嵩明籍仙陀純白向亦中表皆師之甥後隨披剃又為師弟師歸西方在本無之前本公為擇地於此而又自為之記余謂辨公乞其南為靜聞穴辨公請廣擇之又有本公塔在嶺北惟所命余以其穴近仙陀之師為便議遂定靜聞是日入窆二十七日此下冇缺文余見前路漸翳而支間有迹可躡石而上遂北上扳陟之屢懸峻梯空從白石間作猴升一里半則兩崖前突皆純石撑霄拔壑而起自下望之若建標空中自上凌之復有一線連脊又如瓊臺中懸雙闕並倚也後即為橫脊大脊披叢莽而上有大道東西橫山脊即東自雞坪關山西上而達於絶頂者因昔年運磚造城絶頂開此以通驢馬余乃返從其東半里凌重崖而上然其處上平下嵌俯瞰莫可見不若點頭峰之突聳而出可以一覽全收也其脊兩旁皆古木深翳通道於中有開處下瞰山後其東北又峙山一圍如箕南向所謂摩尼山也即此山餘脈所結者其西北橫拖之支所謂後趾也即南聳而起為絶頂者故絶頂自南壑望之如展旗西立羅漢幾層之脊則如展旗東立自此脊望之則如展旗南立後趾之脊則如展旗北立此一山大勢也若桃花箐過脊又在絶頂西南峽中南起為木香坪之嶺東亘為禾字孔之脊與南羅漢壁點頭峰南北峙為兩界此在三距西南支之外乃對山而非雞足矣若南條老脊自木香而南走烏龍壩羅漢壁點頭峰又其東出之支非老幹矣山後即為羅川地北至南衙皆鄧川屬與賔川以此山脊為界故絶頂即屬鄧川而曹溪華首猶𨽻賔川焉若東北之摩尼則北勝浪滄之所轄此又以山之東麓雞坪山為界者也從脊直北眺雪山一指豎立天外若隱若現此在麗江境內尚隔一鶴慶府於其中而雪山之東金沙江實透腋南注但其處逼夾僅丈餘不可得而望也由脊南西行再降再起五里有路自南而上者此羅漢壁東旃檀嶺道也交脊而北去者此循後趾北下鶴慶道也交脊而東北下者此羅川道也隨脊而西者絶頂道也於是再上再紆而北又二里餘而抵絶頂之下其北崖雪䀶皚皚不知何日所積也又南上半里入其南門門外墜壑而下者猢猻梯出洞佛殿道由北門出陟後脊轉而西南下者束身峽出禮佛殿臺華首門會銅佛殿道而猢猻梯在東南由脊上束身峽在西由霤中此登頂二險而從脊來者獨無之入門即迦葉殿此舊土主廟基也舊迦葉殿在山半嵗丁丑張按君謂絶頂不可不奉迦葉遂捐資建此而移土主於殿左其前之天長閣則天啓七年所建今易名多寶樓後又有善雨亭亦張按君所建今貌其像於中後西川倪按君易名西腳蘧廬語意大含譏諷殿亭四圍築城環之復四面架樓為門南曰雲觀指雲南縣昔有彩雲之異也東曰日觀則泰山日觀之義北曰雪觀指麗江府雪山也西曰海觀則蒼山洱海所在也張君於萬山絶頂興此大役而沐府亦伺其意移中和山銅殿運致之蓋以和在省城東而銅乃西方之屬能尅木故去彼移此有造流言以阻之者謂雞山為麗府之脈麗江公亦姓木忌金將移師雞山今先殺其首事僧矣余在黔聞之謂其説甚謬麗北雞南聞雞之脈自麗來不聞自雞來姓與地各不相涉何尅之有及至此而見銅殿具堆積迦葉殿中止無地以豎尚候沐府相度非有阻也但一城之內天長以後為河南僧所主前新建之迦葉殿又為陜西僧所主以張按君同鄉故沐府亦以銅殿屬之今兩僧無道氣不免事事參商非山門之福也余一入山即聞陜西河南二僧名及抵絶頂將暮見陜西僧之叔在迦葉殿遂以行李置之其姪明空尚在羅漢壁西來寺由殿側入天長閣蓋陜西僧以銅殿具支絶迦葉殿後正門毋令從中出入也河南僧居多寶樓下留余晚供觀其意殊憤憤於是皆腹誹之還至土主廟中寒甚陜僧爇火供果為余談其姪明空前募銅殿事甚悉今現在西來可一顧也余唯唯二十八日晨起寒甚亟披衣從南樓觀日出已皎然上升矣晨餐後即録碑文於天長善雨之間指僵有張憲副二碑最長獨不及録還飯迦葉殿仍從北門出門外岡脊之上多賣漿瀹粉者脊之西皆削崖下覆豈即向所謂捨身崖者耶北由脊上行者一里乃折而西下過一敝閣乃南下束身峽巨石雙迸中澑成坑路由中下兩崖逼束而下墜甚峻宛轉峽中旁無餘地所謂束身也下半里得小坪伏虎菴倚之菴南向從其前多賣香草者其草生於山脊循捨身崖東南轉為曹溪華首之道繞菴西轉盤絶壁之上是為禮佛臺太子過玄關余乃先過禮佛臺有亭在臺東亦中圮臺峙其前石叢起中懸絶壑之上北瞰危崖倒插於深壑中乃絶頂之北盡處也其下即為桃花箐但突不能俯窺耳其東南壑中則放光寺在焉其西隔塢相對者木香坪也是臺當絶頂西北隅懸絶處凌虛倒影若浮舟之駕壑為一山勝處而亭既傾敝不容無慨臺之北崖壁倒懸磴道斬絶而西崖之瞰壑中者萼瓣上迸若蒂斯啓遙向無路乃棧木橫崖端飛虬接翼於層巒之上遂分蒂而蹈如入藥房中空外透欲分欲合穿其奧窟正當佛臺之下乃外石之附內石而成者上連下迸裂透兩端側身而進披隙而出復登南臺之上仍東過伏虎循岩跨壁盤其壑頂仰視矗崖忽忽欲墮而孰知即向所振衣躡履於其上者耶東南傍崖者一里餘有室倚崖曰曹溪菴以其側有水一泓在矗崖之下引流墜壑為衆派之源有似宗門法脈也稍下路分為二正道東南循崖平去小徑西下危坡余睇放光在西南壑便疑從此小徑是西循之一里餘轉而北踰一嘴已盤禮佛臺之下其西北乃桃花箐路而東南壑底終無下處乃從舊路返二里出循崖正道過入功德水於是崖路愈逼仄線底緣嵌絶壁上仰眺祗覺崇崇隆隆而不見其頂下瞰祗覺窅窅冥冥而莫晰其根如懸一幅萬仞蒼崖圖而綴身其間不辨身在何際也東一里崖勢上飛髙穹如簷覆環其下如户閾形其內壁立如掩扉蓋其石齒齒皆墮而不盡墮之餘所謂華首門也其髙二十丈其上穹覆者又不知幾幾蓋即絶頂觀海門下危崖也門之下倚壁為亭兩旁建小磚塔襄之即經所稱迦葉受衣入定處待六十百千嵗以付彌勒者也天台王十嶽士性憲副詩偈鐫壁間而倪按院大書石狀竒絶四字橫鐫而朱丹之其效矉耶黥面耶在束身書石狀大竒在袈裟書石狀又竒在兜率峽口書石狀始竒各換一字山靈何罪而受此耶又半里矗崖東盡石脊下垂有寺倚其東是為銅佛殿今扁其門曰傳燈寺蓋即絶頂東突由猢猻梯下墜為此再下即迦葉寺而為西南支發脈者寺東向大路自下而來抵寺前分兩岐由其北峽登寺後猢猻梯為絶頂前門道余昨從上所瞰者由寺前循崖西轉過華首門上束身峽為絶頂後門道余茲下所從來者蓋寺北為峽寺西為崖寺後猢猻梯由絶頂垂脊而下乃崖之所東盡而峽之所南環者也寺北有石峰突踞峽中有菴倚其上是為袈裟石余初不知其袈裟石也望之有異遂不入銅佛殿而登此石至則菴僧迎余坐石上石紋離披作兩疊䀶而上有員孔僧指其紋為迦葉袈裟指其孔為迦葉卓錫之迹即無遺迹然其處回崖外繞墜壑中盤此石綴崖瞰壑固自竒也僧瀹米花為獻甚潤枯腸余時欲下放光聖峰諸寺而不能忘情於猢猻梯遂循石右上半里升梯梯乃自然石級有疊磴䀶可以銜趾而䀶間石芒齒齒著足甚艱脊左瞰即華首矗崖之上右瞰即袈裟墜壑之端其齒齒之石華首乃垂而下此梯乃錯而上者然質則同也上半里數折而梯盡仍從峽上問去頂逈絶乃返步下梯由銅佛殿北東下峽中一里橫盤峽底有菴當其中所謂兜率菴也已半傾其後即絶頂與漢壁分支前突處菴前峽復深墜循菴橫度由左崖下半里崖根有窪內嵌前有巨樹流蔭并鶴峋居士詩碑其前峽遂深蟠路從其上又分為兩循右峽中西南下者為迦葉寺聖峰寺兩支大道循左崖下東向行者為西來寺碧雲寺羅漢壁間道余時身隨西峽下而一步一回眺未嘗不神飛羅漢壁間也下半里為仰髙亭在懸峽中因圮未入既下又半里出峽為迦葉寺其門東向中亦髙敞此古迦葉殿近因頂有新構遂稱此為寺云入謁尊者從其前南向循峽而下其路峻而大兩丐者覆松為棚曲折夾道數十折一里餘而至會燈寺寺門南向入謁而出東下半里有岐西去者放光寺道也然日晨不及行遂不西向而東趨其路坦而大一里為聖峰寺寺東向踞分支之上前有巨坊後有傑閣其勢甚雄拓閣祀玉皇今皆以玉皇閣稱之從此北瞻西來寺髙綴層崖之上屏霞亘壁飄渺天半其景甚異出寺東隨隴行二里過白雲寺又從其右東行一里半過慧林菴則左右兩溪合於前而隴盡遂渡其左峽東過大覺寺蔬園一里從息隂後踰中支之脊從千佛閣前觀街子街子者惟臘底集山中為朝山之節昔在石鐘寺前今移此以近大覺為諸寺之中也由街子東半里過西竺寺又二里餘入悉檀具餐後知沈公莘野乃翁來叩尚留待寺間急下樓而沈公至各道傾慕之意時已暮寺中具池湯候浴遂與四長老及沈公就浴池中池以磚甃長丈五濶入尺湯深四尺炊從隔壁釡中竟日乃就浴者先從池外挽水滌身然後入池坐水中浸一時復出池外擦而滌之再浸再擦浸時不一動恐垢落池中也余自三里盤浴後入滇祗澡於溫泉如此番之浴遇亦罕矣徐霞客逰記卷八上欽定四庫全書徐霞客逰記卷八下明徐宏祖撰西南逰日記十四雲南二十九日飯於悉檀同沈公及體極之姪同遊街子余市鞋顧僕市帽遇大覺遍周亦出遊欲拉與俱余辭嵗朝往祝蓋以其屆七旬也既午沈公先别去余食市麵一甌一里餘從大乘菴上幻住一里入幻住見其額為福寧寺問道而出猶不知其為幻住寺也由其右過峽西北行一里而入蘭陀寺寺南向由正殿入其東樓艮一師出迎問殿前所卧石碑曰先師所撰迦葉事迹記也昔豎華首門亭中潘按君建絶頂觀風臺當事者曳之頂將磨鐫新記艮一師聞而往止之得免以華首路峻不得下因紆道置此余欲録之其碑兩面鐫字而前半篇在下艮一指壁間挂軸云此即其文從碑謄寫而出者余因低懸其軸以案就録之艮一供齋沈公亦至齋後余度文長不能竟令顧僕下取卧具令沈公先上其廬當明日往叩也逮暮録猶未竟顧僕以卧具至遂卧蘭陀禪榻顧僕傳𢎞辨安仁語曰明日是除夕幸爾主早返寺毋令人懸望也余聞之為悽然者久之三十日早起盥櫛而莘野至相見甚慰同飯於蘭陀余仍録碑完而莘野已去遂由寺循脊北上其道較夷一里轉而東一里出莘野廬前小靜室又半里而入莘野樓則沈公在而莘野未還沈公為具食莘野適至遂燕其樓父子復躬為執㸑煨芋煮蔬甚樂也莘野懇令顧僕取卧具於蘭陀曰同是天涯何必以常住靜室為分余從之遂停寢其樓之北楹其樓東南向前瞰重壑左右抱兩峰甚舒而稱樓前以杪松連皮為欄製朴而雅樓忩疏楞潔靜度除夕於萬峰深處此一宵勝人間千百宵薄暮憑忩前瞰星辰燁燁下垂塢底火光逺近紛拿皆朝山者徹夜熒然不絶與瑶池月下又一觀矣己卯正月初一日在雞山獅子林莘野靜室是早天氣澄徹旭日當前余平明起禮佛而飯乃上隱空蘭宗二靜室又過野愚靜室野愚已下蘭宗處遂從上徑平行而西入念佛堂是為白雲師禪棲之所獅林開創首處也先是有大力師者苦行清修與蘭宗先結靜其下後白雲結此廬與之同棲乃獅林最中亦最髙處其地初無泉以地髙不能刳木以引二師積行神通忽一日白雲從龕後龍脊中垂間攙石得泉其事甚異而莫之傳余入龕見石脊中峙為崖崖左有穴一龕髙二尺深廣亦如之穴外石倒垂如簷泉從簷內循簷下注簷內穴頂中空而水不從空處溢簷外崖石峭削而水不從削處墜倒注於簷如貫珠垂玉穴底滙方池一函旁皆菖蒲茸茸白雲折梅花浸其間清泠映人心目余扳崖得之以為竒因詢此龍脊中垂非比兩腋何以泉從其隆處破石而出白雲言昔年剜石得之至今不絶余益竒之後遇蘭宗始徴其詳乃知天人供養之事佛無誑語而昔之所稱卓錫虎跨於此得其徵矣龕前編柏為欄茸翠環繞若短屏回合階前繡墩草獨髙員如疊跏趺其上蒲團錦茵皆不如也龕甚隘前結松棚方供佛禮懴白雲迎余茶點且指余曰此西尚有二靜室可娛乞可延憩當瀹山蔬以待也余從之西過竹間見二僧坐木根曝背一引余西入一室其室三楹乃新闢者前甃石為臺勢甚開整佛龕花供皆極精嚴而不見靜主詢之曰白雲龕禮懴司鼓者是余謂此僧甚朴何以有此乃從其側又上一龕額曰標月而門亦扄乃返過白雲而飯始知其西之精廬即悉檀體極師所結而司鼓僧乃其守者飯後又從念佛堂東上躡二龕其一最髙幾及嶺脊但其後純崖無路其前則旋崖層疊路宛轉循之就崖成臺倚樹為磴山光懸繞真如躡鷲嶺而上也龕前一突石當中亦環倚為臺其龕額曰雪屋為程還筆號二遊昆明人有才藝而門亦扄蓋皆白雲禮懴諸靜侣也又東稍下再入野愚靜室猶未返因循其東扳東峽峽自頂下墜若與九重崖為分塹者頂上危岩疊疊峽東亘岩一支南向而下即悉檀寺所倚之支也其東即九重崖靜室而隔此峰峽障不可見余昔自一衲登頂從其東扳岩隙直上惟此未及經行乃扳險陟之路漸窮抵峽中則東峰石壁峻絶峽下隤壑崩懸計其路尚在其下甚深乃返從來徑過簾泉翠壁下再入蘭宗廬知蘭宗與野愚俱在玄明精舍往從之玄明者寂光之裔孫也其廬新結與蘭宗東西相望在念佛堂之下莘野山樓之上余先屢過其旁翠條掩映俱不能覺從蘭宗之徒指點得之則小閣疏楞雲明雪朗致極清雅閣名雨花為野愚筆諸靜侣方坐嘯其中余至共為清談瀹茗日既昃野愚輩乃上探白雲余乃下憩莘野樓薄暮蘭宗復來與談山中諸蘭若緣起併古德遺疏日暮不能竟初二日飯於莘野即再過蘭宗欲竟所徵而蘭宗不在愛玄明雨花閣精潔再過之仍瀹茗劇談遂扶笻西一里過望臺嶺此嶺在獅林之西蓋與栴檀為界者亦自嶺脊南向而下即大覺寺所倚之岡也自獅林西陟其嶺即可望見絶頂西懸故以望名與其西一嶺又夾壑為塢諸靜室緣之層纍而下是為栴檀嶺先是雞山靜室祗分三處中為獅子林西為羅漢壁東為九重崖而是嶺在獅林漢壁之間下近於寂光故寂光諸裔遂開建諸廬遂繼三而為四焉蓋其諸廬在峽間東為望嶺西為栴檀嶺此嶺又與羅漢壁為界者自嶺脊南向而下即寂光寺所倚之支也是為中支蓋羅漢壁之東回崖自嶺脊分隤南下既結寂光由其前又南度東轉為觀音閣息隂軒峙為瀑布東嶺于是又度脊而南為牟尼菴又前突為中嶺若建標於中而大士閣倚其端龍潭瀑布二水口交其下一山之脈絡皆以茲為綰轂云踰望臺嶺西三里由諸廬上盤壑而西三里又盤嶺而南而北轉一里北崖皆插天盤雲如列霞綃而西皆所謂羅漢壁也東自栴檀嶺西至仰髙亭峽倒插於衆壑之上當其東垂之摺者幻空師結廬處也真武閣倚壁足其下曲徑縱橫石級層疊師因分箐為籬點石為臺就閣而憩焉其下諸徒闢為叢林今名碧雲者也余前已訪幻空返憶閣間有陳郡侯詩未録因再過録之師復欵談甚久出果餉之榻間閣兩旁俱有靜室旁通皆其徒所棲而無路達西來寺路必仍下碧雲由山門西盤崖坡又一里半北上半里抵壁足則陜西僧明空所結菴也今名西來寺北京陜西河南三僧俱以地名今京陜之名幾並重以余品之明空猶俗僧也其名之重以張代巡鳳翮同鄉命其住持絶頂迦葉殿而沐府又以中和山銅殿移而畀之故聲譽赫然然在頂而與河南僧不協在西來而惟知欵接朝山男婦其識見猶是碧雲諸徒流等不可望幻空後塵也然其寺後倚絶壁雲幕霞標屏擁天際巍峭大觀此為第一寺西有萬佛閣石壁下有泉一方嵌崖倚壁深四五尺濶如之瀦水中涵不盈不涸萬峰之上純石之間滙此一脈固竒但不能如白雲龕之有感而出垂空而下為神異耳觀其水色不甚澄徹寺中所餐俱遙引之西峽之上固知其益不如白雲也寺東有三空靜室亦倚絶壁三空與明空俱陜人為師兄弟然三空頗超脫有道氣留余飯其廬已下午矣自西來寺東至此石壁尤竦峭寺旁崖迸裂成洞其中崆洞僧悉以逰騎填駐其中不可攔入深為悵恨又有峽自頂剖窪而下若雲門劍壁嵌隙於中亦為偉觀僧取薪於頂俱自此隙投崖下留為捷徑不能藉為勝概也既飯復自寺西循崖而去二里崖盡而為峽即仰髙亭之上也先是余由絶頂經此下遂從大道入迦葉寺不及從旁岐東趨羅漢壁然自迦葉寺回眺崖端一徑如線䀶衆竇如雲蓋心甚異之故不憚其晚以補所未竟然其上崖石雖飛嵌空懸皆如華首之類無可深入者乃返從西來碧雲二寺前東過栴檀仍入獅林至白雲龕下尋玄明精舍悮入其旁又得一龕則翠月師之廬也前環疏竹右結松蓋為亭亦蕭雅有致乃少憩之遂還宿莘野樓已暮矣初三日晨起飯荷行李將下悉檀蘭宗來邀欲竟山中未竟之旨余乃過其廬為具盒具餐遍徵山中故迹既午有念誠師造其廬亦欲邀過一飯蘭宗乃輟所炊同余過念誠路經珠簾翠壁下復徙倚久之蓋蘭宗所結廬之東有石崖傍峽而起髙數十丈其下嵌壁而入水自崖外飛懸垂空灑壁歷亂縱橫皆如明珠貫索余因排簾入嵌壁中外望蘭宗諸人如隔霧牽綃其前樹影花枝俱飛魂逐魄極掩映之妙崖之西畔有緑苔上翳若絢綵鋪絨翠色欲滴此又化工之點染非石非嵐另成幻相者也崖旁山木合沓瓊枝瑶幹連幄成隂雜花成綵蘭宗指一木曰此扁樹曾他見乎蓋古木一株自根橫卧丈餘始直聳而起橫卧處不員而扁若側石偃路旁髙三尺而厚不及尺余初疑以為石也至是循視其端乃信以為樹蓋石借草為色木借石為形皆非故質矣東半里飯於念誠廬别蘭宗南向下之字行半里又入義軒廬義軒大覺之派新搆靜於此乃獅林之東南極處也其上為念誠廬最上為大靜室即野愚所栖是為東支莘野樓為西南極處其上為玄明精舍最上為體極所搆新廬是為西支而珠簾之崖當峽之中傍峽者為蘭宗廬其上為隱空廬最上為念佛堂即白雲師之廬也是為中支其間徑轉崖分綴一室即有一室之妙其盤旋回結各各成境正如巨蓮一朵瓣分千片而片片自成一界各無欠缺也從義軒廬又南向之字下一里餘過天香靜室天香幻住菴僧也其年九十余初上覓莘野廬首過此問道者又南一里過幻住菴其西即蘭陀寺也分隴對衡獅林之水界於左右而合於其下焉又南下一里餘二水始合渡之即為大乘菴由澗南東向循之半里水折而南復踰澗東南下一里過無我無息二菴其下即為小龍潭五花菴已在悉檀寺右廊之外而岡隴間隔復踰澗南過迎祥寺乃東向隨澗行一里抵寺西虎砂即前暗中模索處也其支自蘭陀南來至迎祥轉而東橫亘於悉檀寺之前東接內突龍砂兜黑龍潭於內為悉檀寺第一重案其內則障獅林之水東向龍潭其外則界栴檀之水合於龍潭下流而脈遂止於此焉于是又北踰澗半里入悉檀寺與𢎞辨諸上人相見若并州故鄉焉前同莘野乃翁由寺入獅林時寺前杏花初放各折一枝攜之上既下則寺前桃亦繽紛前之杏色愈淺而繁後之桃靨更新而艷五日之間芳菲乃爾暏春色之來天地益感浮雲之變古今也初四日飯於悉檀即攜杖西過迎祥石鍾二寺共二里於石鍾西竺之前踰澗而南即前山所來大道也余前自報恩寺後渡溪分道誤循龍潭溪而上不及過大士閣出此而行李從北來顧僕言大士閣後有瀑甚竒從此下不逺從之即踰脊脊甚狹而平脊南即瀑布所下之峽脊北即石橋所下之澗脊西自息隂軒來過此南突而為牟尼菴盡於大士閣者也脊南大路從東南循嶺觀瀑亭倚之瀑布從西南透峽玉龍閣跨之由觀瀑亭對崖瞰瀑布從玉龍閣下隤墜崖懸練深百餘丈直注峽底峽逼箐深俯視不能及其麓然踞亭俯仰絶頂浮嵐中懸九天絶崖隤雪下嵌九地兼之霽色澄映花光浮動覺此身非復人間天台石梁庶幾又向曇花亭上來也時神飛玉龍閣遂不及南下問大士閣之勝於是仍返脊南循峽端共一里陟瀑布之上登玉龍其閣跨瀑布上流當兩山峽口乃西支與中支二大距湊拍處水自羅漢華嚴來至此隤空下搗此一閣正如石梁之橫翠鵲橋之飛空惜無居人但覺杳然有花落水流之想樓為楊冷照師孔所題與觀瀑亭俱為蔣賔川爾第所建有一碑卧樓板偃踞而録之遂沿中支一里西上息隂軒從其左北踰澗又北半里入大覺寺叩遍周老師師為無心法嗣今年屆七帙齒德兩髙為山中之耆宿余前與之期以新旦往祝而獅林遲下又空手而前殊覺怏怏師留餐於東軒軒中水由亭沼中射空而上沼不大中置一石盆盆中植一錫管水自管倒騰空中其髙將三丈玉䀶一縷自下上噴隨風飛灑散作空花前觀之甚竒即疑雖管植沼中必與沼水無涉况既能倒射三丈何以不出三丈外此必别有一水其髙與此並彼之下從此墜故此之上從此止其伏機當在沼底非沼之所能為也至此問之果軒左有崖髙三丈餘水從崖墜以錫管承之承處髙三丈故倒射而出亦如之管從地中伏行數十丈始向沼心豎起其管氣一絲不旁泄故激發如此耳既飯録碑於西軒軒中山茶甚開余前已見之至是折一枝别遍周西半里過橋又北上坡一里入寂光寺寺住持先從遍周東軒同餐至此未返余録碑未竟暝色將合攜紙已罄乃返悉檀又從大覺東一探龍華西竺二寺日暮不能詳也初五日暫憩悉檀寺莘野乃翁沈君具柬邀余同悉檀諸禪侣以初六日供齋獅林是日遂不出初六日悉檀四長老飯後即約赴沈君齋沈君亦以獻嵗周花甲余乃録除夕下榻四詩為祝仍五里至天香廬側又躡峻二里而登莘野樓則白雲翠月玄明諸侣皆在進餐後遂同四長老遍探林中諸靜室宛轉翠微間天氣明媚茶花鮮嬌雲關翠隙無所不到先過隱空為留盒茗過蘭宗野愚俱下山過玄明啜茗傳松實過白雲啜茗傳茶實茶實大如芡實中冇白肉如榛分兩片而長入口冇一陳涼味甚異即吾地之茗實而此獨可食聞感通者最佳不易得也聞冇油者棘口過體極靜廬又預備茶盒以待下午仍飯於莘野樓四長老強余騎從西垂下二里過蘭陀寺西從其前東轉仍由幻住前下坡四里歸悉檀初七日晨起大覺遍周令其徒折柬來招余將赴之適艮一蘭宗至又有本寺復吾師自摩尼寺至野愚師又至遂供齋本剎下午野愚蘭宗由塔盤往大士閣余赴遍周之招小食後腹果甚遂乘間往寂光録前所未竟碑仍飯於大覺而還悉檀宿初八日飯後四長老候往本無塔院蓋先期以是日祭掃也余從之由寺左龍潭東下一里又過一東腋水南行半里則龍砂內支自東而西突與中支大士閣之峰夾持於悉檀之前其勢甚緊悉檀左右前後諸水俱由此出路由嶺坳南度余由𢎞辨莘野特西探其嶺隔峽西眺中支南突至此而盡大士閣倚其下乃天然鎖鑰為悉檀而設者也仍還由大路循東嶺而南半里為靜聞瘞骨處乃登拜之又南一里則龍砂外支又自東嶺分突而西與西支傳衣之峰對亦夾持於悉檀之前其勢甚雄大士閣東龍潭諸水閣西瀑布諸水悉由此而出此嶺為一山之龍砂而在悉檀為尤近即雞足前三距中之東南支也其脈自絶頂東亘屏立空中為羅漢壁獅子林點頭峰九重崖後脊中支由羅漢壁下垂而止於大士閣東支由九重崖東南環為此嶺若臂之內抱先分一層為內砂與中支大士閣對又紆此層為外砂與西支傳衣後峰對其勢自東而西突其度脊少坳如馬鞍昔以馬鞍嶺名之余初入雞山抵大覺四顧山勢重重回合叢林靜室處處中懸無不恰稱獨此處欠一塔為山中缺陷及至悉檀遙顧此峰尤竒以為焉得阿育王大現神通於八萬四千中分一靈光於此既晤𢎞辨問仙陀何在曰在塔盤問塔盤何在則正指此山也時尚未豎塔心不能遙矚自後則瞻顧如對矣人謂雞山前伸三距惟西支長而中東二支俱短非也中支不短不能獨懸於中令外支環拱西支固長然其勢較低蓋虎砂正欲其低也若東支之所謂短者自其環抱下墜處言之則短自其橫脊後擁處言之則更長而崇非西支之可並也蓋西支繚繞而卑虎砂也而即以為前案東支夭矯而尊龍砂也而兼以為後屏皆天造地設自然之竒擬議所不及者也塔盤當峰頭在馬鞍中岰之西有大路在馬鞍之間則東南下雞坪關者有岐路在馬鞍之東則東北向本無塔院者時塔盤工作百餘人而峰頭無水其東峰有水甚東以中岰不能西達乃豎木柱數排於岰中架橋其上以接之柱髙四丈餘架木為溝橫接松杪昔聞霄漢鵲橋以渡水也今反為水渡抑更竒矣由岰東向循峰則雞山大脊之南盡處也其前復開大陽分支環抱又成一向可謂靈山面面竒矣共二里登謁本無塔塔甚偉三塔並峙中奉本公舍利左右則諸弟子普同二塔也左為塔院可憩可栖諸靜侣及三番僧皆助祭余則享餕焉時同祭者四長老外則白雲復吾沈公及莘野諸後裔俱集若蘭宗艮一則本公雁行故不至云祭後仙陀純白又攜祭品往祭馬鞍嶺北三塔遂及靜聞下午還過塔盤即仙陀謝其祭靜聞也初九日晨餐後余即攜杖西行三里過息隂軒軒在中支之脊大覺寺之前案也為本無師靜攝處額為僉憲馮元成時可所書其前有三岐從左渡澗趨大覺寂光從右渡澗趨傳衣下接待從後直上則分渡右澗或由慧林而上聖峰或陟西支而抵華嚴焉余乃先半里從右渡轉而東上南嶺半里盤其東崖之上即瀑布之西峰也於是循之南行東瞻中支之大士閣在其下東支之塔盤嶺對其上平行三里乃東轉隨坡下一里則傳衣寺東向倚山之半其北先有止止菴默菴真語所建傳衣大機禪師之友也又南為淨雲徹雲直炳所建又南有彌陀員通八角三菴皆連附於傳衣寺者而八角之名最著以昔有八角亭今改創矣八角開創於嘉靖間為吉空上人所建其南即為傳衣寺寺基開爽規模宏拓前有大坊題曰竹林清隱乃直指毛堪蘇州毛具茨也所命頗不稱上又一直指大標所題古松詩止署曰白嶽古松當坊前本大三圍乃龍鱗非五鬛也山間巨松皆五鬛聳幹參天而老龍鱗頗無大者遂以糾拏見竒幹丈五以上輒四面橫枝而出枝大侔於幹其端又倒垂斜攫尾大不掉幹幾分裂今築臺擁幹髙六七尺又植木支其橫枝僅免於裂亦幸矣由梯登臺四面橫枝倒懸於外或自中躍起或自巔垂揚其紛糾翔舞之態不一而足與天台翥鳳其一類耶坊聫曰花為傳心開錦繡松知護法作虬龍為王元翰聚洲筆門聫曰峰影遙看雲蓋結松濤靜聽海潮生為羅汝坊近溪筆差可人意然羅聨濤潮二字連用不免疊床之病何不以聲字易濤字乎寺昔為圓信菴嘉靖間李中溪元陽為大機禪師宏創成寺其徒印光孫法界戒律一如大機萬厯辛丑元日燬於火法界復鼎建之視昔有加先是余過止止菴一病僧留飯坐久之見其方淅米乃去飯於淨雲僧覺心遂入參寺中入其西藏經閣閣前山茶樹小而花甚盛為折兩枝而出乃東北下峽中一里有垣圍一區濬山為池畜金魚於中結茅龕於上者亦傳衣僧也雲影山光以一泓印之不覺潭影空心又東北下半里抵峽廬則瀑布之下流也去瀑布已一曲昔從瀑上瞰不見其底今從峽底涉亦不見其瀑峽西有草廬菜畦則猶傳衣之荒圃也峽中水至是如引絲反不如懸瀑之勢巨矣渡澗東上坡一里至大道則大士閣之側也閣倚中支南突之半其前有坊有樓歷級甚峻後為閣飛甍疊棟上供大士左右各有樓其製亦敞乃萬厯丙午直指沈公所建選老僧拙愚者居之是曰三摩寺余録碑閣下忽一僧殷勤欵曲問之乃拙公之徒虛宇也虛宇又為蘭宗之派今拙公沒虛宇當事昨野愚蘭宗宿此想先道余故虛宇一見惓惓且留宿余以日暮碑長許之令顧僕返悉檀余下榻於西樓奧室初十日晨起盥櫛而顧僕至言𢎞辨師遣僧往麗江已行蓋為余前茅者余乃候飯即從寺右大道北上二里陟中支之脊有菴踞其上曰牟尼菴其前松影桃花恍有異致菴後即觀瀑亭回瞰瀑布真有觀不足之意仍溯中支二里過息隂軒從其後直西一里又南下渡澗西行已在大覺寺蔬圃之南矣蓋大覺蔬圃當中支之後中支至是自北東轉其西有二流交會即瀑布之上流也一自羅漢壁東南下一自華嚴東北流二水之交中夾一支其上為慧林菴乃西南支東出之旁派聖峰白雲寺所倚者也華嚴之路又從圃東渡其下流乃從澗南溯之西上一里半漸踰支脊其南復有一澗與西支東走之脊隔又從其澗北溯之西上一里餘見脊上有冢三四後有軒樓遺構與冢俱頽此脊乃西支餘派直送而出無有環護宜其然也由塜西復下峽其峽復有二在南者自西支法照寺南發源東下經華嚴寺北至此而與北澗合在北者自西支法照寺北發源東下經毗盧寺北至此而與南澗合二水之交中夾一支為華嚴寺北向之案亦西南支東出之旁派毗盧祝國二寺所倚者也涉北澗有二岐隨澗西行者為祝國毗盧道由支端登脊而上溯南澗之北西行者為華嚴道余乃登脊瞰南澗行一里有亭橋橫跨澗上乃華嚴藉為下流之鑰也渡橋始為西南本支又西半里而得華嚴寺寺當西南支之脊東北向九層崖而峙地逈向異又山中一勝也蓋雞山中東二支及絶頂諸剎皆東南二向曾無北拱者惟此寺回看返照北大山諸林剎歷歷倒湧亦覺改觀規模甚整與傳衣伯仲嘉靖間南都占德月堂開建其徒月輪以講演名萬厯初聖母賜藏後遭回祿今雖重建紺宇依然而法範寂寥矣寺東有路東行山脊乃直達傳衣者由寺前峽上西行半里復有亭橋橫跨澗上即東橋上流也寺左右各有橋有亭山中之所僅見過橋又陟其北向餘支躡岡半里旋岡脊過盧寺寺前為祝國寺俱東南向踞岡寺北有澗東下即前所涉之北澗也又由其南崖溯之西上一里半有寺踞岡脊是為法照寺蓋西南支自銅佛殿下南墜至此東轉寺當轉摺處又東抽一支以為毗盧祝國之脈而橫亘於華嚴之前者也是為西南餘支之第一法照之北又分一岡相夾無住菴倚之即下為頽冢之支是為西南餘支之第二屢有路直北踰岡度峽而橫去皆向聖峰會燈之大道者余欲析其分支之原遂從峽中溯之而上於是南捨法照北繞無住之後峽路漸翳叢箐橫柯遂成幽閴然已漸逼絶頂之下矣時路無行人隨一桃花箐村氓行一里北循峽中又一里北躡墜脊又一里遂踰脊而行乃西見木香坪之前山外擁華首門之絶頂髙懸桃花箐之過腋西環而此脊上自銅佛殿下抵法照寺轉而東去界此脊西一壑另成一境則放光寺所倚也踰脊更西北盤壑上行又一里半而得大路已直逼華首門下崖矣其路東自聖峰來西由放光出桃花箐抵鄧川州為大道余西隨之半里而放光寺在焉其寺南向後倚絶壁前臨盤壑以桃花箐為右關以西南首支為左護其地雖在三距之外而實當絶之下發光鍾異良有以也余初自曹溪菴華首門下瞰之見其寺沈沈直墜壑底以為光從窅間中上騰乃鼯栖虺伏之窟及至而猶然在萬壑盤拱之上而上眺華首則一削萬仭橫拓甚濶其間雖有翠紋煙縷若繡䀶然疑無可披陟孰知其上乃西自曹溪菴東連銅佛殿固自有凌雲之路橫緣於華首之前也然當身歷華首時止仰上崖之穹崇不覺下壁之峻拔至是而上下又合為一幅其巍廓又何如也然則雞山雖不乏層崖如華首羅漢九重諸處其境界固髙而雄傑之觀莫以踰此矣寺前以大坊為門門下石金剛二座鏤刻甚異狰獰之狀恍與煙雲同活其內為前樓樓之前有巨石峙於左髙丈五而大如之上擎下削搆亭於上蔣賔川題曰四壁無然其北面正可仰瞻華首而獨為樓脊所障四壁之中獨翳此絶勝一面不為無憾寺建於嘉靖間陜西僧員惺所搆萬厯初燬而復興李元陽有碑範銅而鐫之然鐫字不能無訛其後嗣歸空更建毗盧閣閣成而神廟賜藏余録銅碑殿中甚暗而腹亦餒時主僧俱出止一小沙彌在余畀之青蚨乃藝竹為炬煮蔬為供既飯東遵大路一里踰垂支之脊又一里盤墜峽之上得分岐焉一過峽直東者為聖峰路一躡嶺北上者為會燈路始為登頂正道余乃北躡上嶺數曲而至會燈寺寺南向昔為廓然師靜室今其嗣創為寺由寺西更轉而北上復數曲一里餘而過迦葉寺寺東向此古迦葉殿也今張按君建迦葉殿於絶頂因改此為寺由其前北向入峽其峽乃西自絶頂東自羅漢壁兩崖相夾而成中垂磴道少上有坊為羅李二先生遊處羅為近溪先生汝芳李為見羅先生材皆江西人同為司道逰此又上有亭為仰髙亭中有碑為萬厯間按君周懋相所立紀登山及景仰二先生意周亦江西人也余前過此見亭中頽不及録其文而去故此來先録之風撼兩崖間寒凛倍於他所文長字冗手屢為風所僵録竟日色西傾望其上兜率菴即前所從下而其東橫緣之路出羅漢壁者前又曾抵此而返頂頭未了之事非可以餘晷盡也乃返步下仍過迦葉寺前見有岐東下壑中其壑底一菴在聖峰北者必補處菴也乃取道峽中隨壑下蓋緣脊下經會燈者為正道隨壑東下趨補處者為間道下二里過補處菴亦稍荒落恐日暮不入由其前渡峽澗南遂上坡過聖峰寺寺東向前有大坊由坊外東行里餘岡脊甚狹南北俱深坑逼之度脊又東里餘有寺新搆當坡之中垂是為白雲寺余欲窮此支盡處遂東下行南澗之上二里則慧林菴踞坡盡處緣菴前轉下北澗渡之始陟中支行北澗與南澗乃合於路南其東即大覺蔬圃矣東半里過蔬圃北又東一里過息隂軒南又東一里過瀑布北遂去中支北涉西竺寺澗而行中東二支盤壑中矣又二里薄暮入悉檀寺十一日飯後覺左足拇指不良為皮鞋所窘也而復吾亦訂余莫出姑停憩一日余從之𢎞辨安仁出其師所著書見示𢎞辨更以紙帖墨刻相畀且言遍周師以青蚨相贐余作柬謝之甫令顧僕持去而大覺僧復路遇持來余姑納之笥上午赴復吾招出茶果皆異品有本山參以蜜炙為脯又有孩兒參頗具人形皆山中産又有桂子又有海棠子皆所未見者大抵迤西果品吾地所有者皆有惟栗差小而棗無肉松子胡桃花椒皆其所出惟龍眼荔枝市中亦無菌之類雞葼之外有白生香菌白生生於木如半覃形不圓而薄脆而不堅黔中謂之八擔柴味不及此此間石蜜最佳白若凝脂視之有肥膩之色而一種香氣甚異因過安仁齋中觀蘭蘭品最多有所謂雪蘭花白玉蘭花緑最上虎頭蘭最大紅舌白舌以心中一點如舌乃吐最易開其葉皆濶寸五分長二尺而柔花一穗有二十餘朵長二尺五者花朵大二三寸瓣濶共五六分此家蘭也其野生者一穗一花與吾地無異而葉更細香亦清逺其地亦重牡丹悉檀無山茶而多牡丹元宵前蕊已大如雞卵矣十二日四長老期上九重崖赴一衲軒供一衲軒為木公所建守僧歲支寺中粟百石故每嵗首具供一次以雨不能行飯後坐齋頭抵午而霽乃相拉上崖始由寺左半里上𢎞辨靜室基旁又西半里過天柱靜室旁又北躋一里半橫陟峽箐始與一西來路合遂東盤峽上半里其北又下墜一峽大路陟峽而踰東北嶺乃北下後川向羅川之道小路扳脊西北上乃九重崖之東道其路甚峻即余前所上者第此時隂晴未定西南望木香坪一帶積雪峥嶸照耀山谷使人心目融徹與前之麗日澄空又轉一光明法界矣一里餘抵河南師靜室路過其外問而知之雨色復來余别衆靜侣令先上一衲軒而獨往探之師為河南人至山即栖此廬而曾未旁出余前從九重崖登頂不知而過其上後從獅林欲橫過野愚東點頭峰下又不得路躊躇至今恰得所懷比入廬見師人言其獨栖而見其一室三侣人言其不語而見其條答有序人言其不出而見其把臂入林亦非塊然者九重崖靜室得師可與獅林羅漢壁鼎足矣坐少定一衲僧來邀雨陳大至既而雪霏師挽留稍霽乃别躡蹬半里有大道自西上橫陟之遂入一衲軒崔中靜主大定拙明輩皆供餐絡繹逮暮不休雨雪時作四長老以騎送余自大道西下其道從點頭峰下橫盤脊峽時嵐霧在下深崖峭壑茫不可辨二里與獅林道合已在幻住菴之後而與大覺塔院隔峽相對矣至此始勝騎從幻住前下山又四里而入悉檀篝燈作楊趙州書十三日晨起飯即以楊趙州書畀顧僕令往致楊君余追憶日記於東樓下午雲淨天皎十四日早寒以東樓背日余移硯於藏經閣前桃花下就暄為記上午妙宗師以雞葼茶果餉師亦檢藏其處也是日晴霽如故逮晚余忽病嗽十五日余以嗽故卧遲遲午方起日中雲集逮晚而翳余欲索燈卧𢎞辨諸長老邀過西樓觀燈燈乃閩中紗圍者佐以柑皮小燈或挂樹間或浮水面皆有熒熒明星意樓下採青松毛鋪藉為茵席去桌趺坐前各設盒果注茶為玩初清茶中鹽茶次蜜茶本堂諸靜侣環坐滿堂而外客與十方諸僧不與焉余因憶昔年三里龍燈一靜一閙粵西滇南方之異也梵宇官衙寓之異也惟佳節與旅魂無異為黯然而起則殿角明蟾忽破雲露魂矣十六日晨餐後復移硯就暄於藏經閣前桃花下日色時翳下午返東樓嗽猶未已抵暮復雲開得月十七日作記東樓雨色時作十八日濃雲密布既而開霽抵暮顧僕返自趙州十九日飯後晴霽殊甚遂移卧具由悉檀而東越大乘東澗一里上脊即迎祥寺從其南上寺後半里為石鐘寺又後為員通極樂二菴極樂之右即西竺西竺之後即龍華從龍華前西過大路已在西竺之上去石鐘又一里矣龍華之北坡上即大覺寺龍華西臨澗又有一寺前與石鐘同東南向從其後渡澗即彼岸橋下流即息隂軒已為中支之脊矣從軒左北向上過觀音閣為千佛寺其前即昔之街子正當中脊今為墟矣復北渡澗從大覺側西北上寺僧流入謝之仍過澗橋上有屋額曰彼岸同登其水從望臺嶺東下界於寂光大覺之間者顔龍華至此又一里矣過橋復躡中支上半里中脊為水月菴脊之東腋為寂光脊之西腋為首傳僧淨方年九十矣留而未入由寺右盤一嘴東覷一菴桃花嫣然松影歷亂趨之即積行菴也其菴在水月之西首傳之北僧覺融留飯後乃從菴左東上轉而西北登脊從中支脊上二里有靜室當脊是曰煙霞室克心之徒本和所居由其西分岐上羅漢壁由其東盤峽上栴檀嶺嶺從峽西中路北向作之字上一里得克心靜室克心者用周之徒昔住持寂光今新構此退休其地當垂脊之左東向稍帶南又以西支外禾字孔大山為虎砂以點頭峰為龍砂龍近而虎逺又與獅林之砂異其東有中和靜室亦其徒也為鬱荼所焚今中和往省矣克心留余點茶稠疊久之别已下午遂從石上小徑峻極令其徒偕上半里得西來大路隨之東上又半里陟栴檀嶺脊向西南行經煙霞室漸轉東南為水月寂光由其前又西南一里盤一嘴有廬在嘴上余三過鑰門不得入其下即白雲寺所托也又西半里再盤突嘴而上即慧心靜室慧心為幻空徒始從野愚處會之前曾過悉檀來叩故入叩之方禪誦會燈菴其徒供茶而去後即碧雲寺不入從其側又盤嘴兩重二里北上西來寺西經印雪樓前又西循諸絶壁行一里為一真蘭若其上覆石平飛又西半里崖盡而成峽其峽即峰頂與羅漢壁夾峙而成者上自兜率宫下抵羅李二先生坊兩壁夾成中溜路當其中溜之半崖腳內嵌前聳巨木有舊碑刻峋鶴詩乃題羅漢壁者中橫一岐由其上陟溜半里過玄廟又半里過兜率宫已暮而宫圯無居人又上一里叩銅佛殿入而栖焉即所謂傳燈寺也前過時朝山之履相錯余不及入茲寂然久之得一戶老僧啓户宿二十日晨起欲録寺中古碑寒甚留寺下山録遂置行具寺中寺中地俱大理石所鋪蓋以登絶頂二道俱從寺而分還必從之也出寺將北由袈裟石上念猢猻梯前已躡之登其崖端而下束身峽向雖從之下猶未及仰升茲不若由南上北下庶交覽無偏乃從寺右循崖西行遂過華首門而西崖石上下俱峭甚路緣其間止通一線下瞰則放光寺正在其底上眺則峯頂之捨身崖即其端而莫能竟也共西一里有岐懸崖側余以為下放光道又念層崖間何能垂隙下少下有水出崖側樹根間刳木盛之是為八功德水刳木之外無餘地水即飛灑重崖細不能見也路盡仍上即前西來入大道處有草龕倚崖間一河南僧習靜其中就此也又西半里稍上又半里為曹溪菴菴止三楹倚崖門扄無人其水較八功德稍大其後危崖稍前如玦余扳石直躋崖下東望左崖前抱處忽離立成峰員若卓錐而北並崖頂若即若離移步他轉即為崖頂所掩不可辨惟此處則可盡其離裏之妙而惜乎舊曽纍址今已成棘人莫能登蓋雞山無拔地之峰此一見真如閃影也又西半里餘過束身峽下轉而南過伏虎菴又南過禮佛菴共一里再登禮臺臺南懸桃花箐過脈之上正與木香坪夾箐相對西俯桃花箐東俯放光寺如在重淵之下余從臺端墜石穴而入西透窟而出復有聳石攢隙成臺其下皆危崖萬仭棧木以通即所謂太子過玄關也過棧即臺後禮佛龕昔由以入穴今由窟以出棧其憑眺雖同然前則香客駢趾今則諸菴皆扄寂無一人皆身與灝靈同其遊衍而已棧西沿崖端北轉有路可循因披之而西遂過桃花箐之上共一里路窮乃樵徑也仍返過伏虎菴由束身峽上峽勢逼束半里透其上是為文殊堂始聞有老僧持誦聲路由其前躡脊乃余前東自頂來者見其後有小徑亦躡脊西去余從之蓋文殊堂脊處乃脊之岰從東復聳而起者即絶頂之造而為城者也從西復聳而起者桃花箐之度而首峙者也西一里叢木蒙茸雪䀶連亘遂造其極蓋其山自桃花箐北度即靈空髙峙此其首也其脊北垂而下二十里而盡於大石頭所謂後距也其橫亘而東者至文殊堂後少亘而東伏又東而後起為絶頂又東而稍下遂為羅漢栴檀嶺獅子林以後之脊又東而突為點頭峰環為九重崖之脊皆迤邐如屏於是掉尾而南轉墜為塔基馬鞍嶺則雞山之門户矣垂脊而東直下為雞坪關則雞山之脛足矣故山北之水北向而出於大石東山西之水其南發於西洱海之北者由和光橋西發於河底橋者由南北衙皆會於大石之下東環牟尼山之北與賔川之流共北下金沙大江焉始知南龍大脈自麗江之西界東走為文筆峰是為劍川麗江界抵麗東南邱塘關南轉為朝霞洞是為劍川鶴慶界又直南而抵腰龍洞山是為鶴慶鄧川州界又南過西山灣抵西洱海之北轉而東是為鄧川太和界抵海東隅於是正支則遵海而南為青山太和賔川州界又東南峙為烏龍壩山為趙州小雲南界遂東度為九鼎又南抵於清華洞又東度而達於水目焉分支由海東隅北峙為木香坪之山從桃花塢北度是為賔川鄧川界是雞足雖附於大支而猶正脊也登此直北望雪山茫不可見惟西北有山一帶自北而南者雪䀶皚皚即腰龍洞南北衙西倚之山也其下麥畦浮翠直逼雞山之麓是為羅川若一琵琶蟠地雖在三十里下而黛色欲襲人衣四顧他麓皆平楚蒼蒼也西南洱海是日獨潏蕩如浮杯在掌蓋前日見雪山而不見海今見海而不見雪山所謂隂晴衆壑殊出沒之不可定如此此峰之西盡處也東還一里過文殊堂後脊於是脊南皆危崖凌空所謂捨身崖也愈東愈甚余凌其端瞰之其下即束身峽東抵曹溪後東峰向躋其下今臨其上東峰一片自崖底並立而上相距丈餘而中有一脈連屬若拇指然可墜坳上其巔也余扳躡從之顧僕不能至時罡風橫厲欲捲人擲向空中余手粘足踞幸不為捨身者幾希矣又共一里入頂城門實西門也入多寶樓河南僧不在其徒以菉豆粥芝麻鹽為餉余再録善雨亭中未竟之碑下午其徒復引余觀其師退休靜室其室在城北二里即前所登西峰之北岰也路由文殊堂脊北向稍下循西行當北垂之腋室三楹北向環拱亦稱蓋雞山回合之妙俱在南當山北者僅有此亦幽峻之奧區也其左稍下有池二方上下連滙水不多亦不竭頂城所供皆取給焉還抵城北竟從城外趨南門不及入迦葉前殿由門前東向懸石隙下一里有殿三楹東向額曰萬山拱勝而户亦扄由其前下墜級甚峻將抵猢猻梯遇一人乃悉檀僧令來候余者以麗江有使來邀也遂同下共一里而至銅佛殿余初擬宿此以候者至乃取行李五里過碧雲寺前直下五里過白雲寺由寺北度一小澗又東五里過首傳寺後時已昏黑又三里過寂光寺西候者腰間出一石如栗擊火附艾拾枯枝燃之遵中支三里叩息隂軒門出火炬為𨗳又一里餘踰瀑布東脊而北又三里而至悉檀𢎞辨師引麗府通事見以生白公招柬來致相與期遲一日行徐霞客逰記卷八下

body:
  text: 徐霞客遊記地理類九遊記之屬提要臣等謹案徐霞客遊記十二卷明徐宏祖撰宏祖江隂人霞客其字也少負竒氣年三十即出遊擕一襆被遍厯東南佳山水自吳越之閩之楚北至齊魯燕冀嵩雒登華山而歸旋復由閩之粵又由終南背走峩眉訪恆山又南過大渡河至黎雅尋金沙江從瀾滄北尋盤江復出石門關數千里逺涉絶徼而還所至輒為文以志遊蹟沒後手稿散逸其友季夢良求得之而中多闕失宜興史氏亦有抄本而訛異尤甚此則楊名時所重加編訂者凡十二卷卷各分上下第一卷自天台鴈蕩以及五臺恆華各為一篇第二卷以下皆西南遊記凡二十五篇首浙江江西一篇次湖廣一篇次廣西六篇次貴州一篇次雲南十有六篇其所缺者一篇而已自古名山大澤秩祀所先但以表望封圻未聞品題名勝逮典午而後遊蹟始盛六朝文士無不託興烟巒於是範水模山攴笻蠟屐人稱泉石之癖家有吟賞之章史冊所載若謝靈運居名山志遊名山志戴祚西征記郭緣生述征記姚最述行記之類雖權輿有自而簡冊無多尚未有纍牘連篇都為一集者宏祖耽竒嗜僻刻意逺遊足跡既鋭於搜尋毫素尤勤於摹寫遊記之夥遂莫過於斯編雖足跡所經排日紀載未嘗有意於為文然以耳目所親見聞較確且黔滇荒逺輿志多疏此書於山川脈絡剖晰詳明尤為有資證據洵山經之别乘而地記之外篇存兹一體固亦有足備考校者焉乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀徐霞客遊記序己丑仲夏將赴淮浦舟中無事展卷外舅劉南開先生所抄徐霞客遊記抵寓後既終卷念其平生胼胝竭蹶歷數萬里衝風雨觸寒暑者垂三十年其所自記遊蹟計日按程鑿鑿可稽文詞繁委為道所親歷不失質實詳密之體而形容物態摹繪清景時復雅麗自賞足移人情既可自怡恱復堪供持贈者也因手録而存之凡兩閲月而畢曰是殆負邁俗不羈之志狂而不知取裁者歟觀其意趣所寄往往出於釋老仙佛亦性質之近使然而其為人之竒倔豪宕於斯概見未沒也古之殫心於天地文理之學以成名者冥搜閟奧曠覽幽遐每出於踪跡瑰異之士自非有好竒之癖亦孰蹈絶險赴窮荒疲敝精力以為之哉若其足以禆助聞見正於學者不無補也今觀國風二雅所陳禹貢職方所記以及地理河渠諸志皆詳山川風土以為農田水利施政立教因時制宜之具其間蟲魚草木之産兼資多識聖教不廢兹非其足相發明證佐者歟切而言之深山大澤流峙終古皆天地法象示人之至教本人生所應窮歷特以手足之力有限百年之期若瞬勢弗能親至而目見得斯書也茍力所可至境所適逢固可展卷披對按所已經者以為程而所未能至者亦可以心知其概如涉其境焉夫子亟稱原泉曾氏風雩詠歸蓋造物與遊所以涵泳天機陶寫胸次案頭置此如朝夕晤名山水於几席間詎非仁知養心之善物耶抑尤有足以警心者霞客之遊也升降於危崖絶壑搜探於蛇龍窟宅亘古人跡未到之區不惜捐軀命多方竭慮以赴之期於必造其域必窮其奧而後止學者之於道也若覃思鼓勇亦如霞客之於山水則亦何深之不窮何逺之不届且入焉而安曾無犯難傾生之虞味焉而腴非有饑渴疲􅉵之困其為高深富美奚啻於洞壑泉石之竒岱華江河之大哉有志者可以觀此而興矣豫既喜其書之不為無益且以其足為入道喻也爰為之序以自朂焉康熙己丑秋仲江隂凝齊楊名時識徐霞客遊記序

body:
  text: 徐霞客遊記卷二上明徐宏祖撰西南遊日記一浙江江西余久擬西南遊遷延二載老至不能待遂以崇禎九年九月十九日為萬里遐征計束裝未就適杜若叔至飲至子夜乘醉放舟天未明抵錫邑同行者為靜聞師十月初二日舟至餘杭登陸沿苕溪北岸行二十里度馬橋為餘杭臨安界其北可達徑山西十七里至石錦亭亭北西去於潛徽郡道也余從臨安道於亭南西去二里抵臨安西出關過皇潭循山西南行共十六里為下墟橋橋南可直新嶺間道二十里抵新城新嶺甚險無托宿處乃從迂道逾橋溯溪西上二里宿全張之白玉庵僧意餘杭人也聞余負游癖深夜篝燈瀹茗為談游日本事甚悉初四日西二里過一橋折而南六里上乾塢嶺嶺甚坦東西各崇山峻嶺獨此峽中夷南北流分入苕與浙其山過東忽矗天而起曰五尖山循其西麓西南十二里石梁跨澗曰趙安橋由橋北西溯澗沿三九山北麓入后葉塢又西十三里為鉢盂橋水西自龍門龕出橋下龕有四仙傳道嶺在橋西四里乃於濳境從橋北轉東南里餘東即三九洞山峙其西環塢一區皆石峰嶙峋黑逾點漆丹楓翠竹間如錯綺水穿壁而下濯石為雪時凌寒絶溜而黑崖白峽處處如著懸瀑二里度橋至洞山東麓洞山者自龍門龕南迤邐東來其石稜鋭紋疊東南山半開二洞正瞰橋下豫同靜聞西向躡山沿小澗而上石皆峽蹲壑透清流潄之淙淙有聲夾澗兩旁石片踴出田畦中竹樹穿石而出再上忽一大石當澗立方重不作透漏態而細紋密皺智索鏤工竹林有庵曰靈隱庵后危壁空起聳翠成疊屏屏南即明洞如軒斯啓外五柱穿列正如四明分窗但四明石色劣下不能若此列柱連卷也中一柱上不至簷簷垂一石欲下而下不及柱相對不接者不及尺柱旁一樹高撐至簷端輒遜而反曲翠色拂簷而上再南即幽洞兩洞並啓為石壁所介壁輕紅若桃花入幽洞洞口高懸內若浮橋之覆空其中空洞無底人呼輒傳響不絶二十丈之後忽南北洞分水陸陸者拾級而北如登閣殿入三十丈轉南又闢一小閣其水洞南入一轉即仙田成畦塍界分明水滿其中初無涸溢從塍上曲折入約二十丈忽水聲潺潺乃透入小門見一溪南來至此下墜宛轉無底又過一峽透小門旁無緣徑短衣去襪溯水躡流又三十丈石俱倒垂若蓮花平沙隘門忽束忽敞正如荆溪入則石洞既盡滙水一方又不知滙者何來墜者何出也出洞溯南來之溪二里止太平橋祠中初五日南二里上馬嶺里許達其巔嶺以北屬新城水亦出新城嶺南則屬於潜縣在其西北五十里水由應渚埠出分水縣下馬嶺南十里過兊口橋岐分南北北達於潜可四十里南則應渚埠道也兊口之水源於於濳馬嶺之水東來合而南出路隨之八里過板橋橋下水自西塢來與前水合溯水西走路可達於濳及昌化又南八里止於唐家拱南去應渚埠尚二里原無市肆擔夫以應渚舟下桐廬必北曲經此遂上溪畔久之得桐廬舟蓋應渚埠為於濳南界溪之南即𨽻分水於濳之水北經玉澗橋昌化之水西自麻㲼埠俱㑹於應渚而水勢始大顧玉澗橋而上已不勝舟麻㲼埠而上小舟直抵昌化於潜水固不敵昌化也下舟東南行十里為分水縣縣在溪之西分水原止一水東南去其西山陸行八十里通淳安豫初欲從陸為王奴遁去乃就水道反向東南焉初八日抵蘭溪與靜聞為金華三洞遊金華之山橫峙東西陽臨郡城浦江在北西垂盡處為蘭溪東則義烏也婺水東南從永康經郡之南門而西北抵蘭溪與衢江合豫將登陸行見溪中一舟溯流而東遂附之水流沙岸中四山俱逺丹楓踈密映疊尤佳仰瞻北山兀突天表若負扆立顧背之東南行問三洞何在曰在北始悟三洞不必至郡若陸行便可中道入也六十里抵金華西門外初九日即循城西北行高下隴岡十里至羅店主人悉具北山之半為鹿田寺其東下者南峙為芙蓉峰西下者南結三洞洞之西即蘭溪界豫欲由三洞返蘭溪恐東有别勝遂望芙蓉峰而趨自店東北五里得智者寺寺在芙蓉峰西北山南麓首剎也今已凋落殿中止餘一碑乃宋陸務觀為智大師建殿撰字即其手書碑隂又鐫務觀與大師手牘數首楷碑行牘具有風致恨無榻工不能得一通為快寺東庵曰芙蓉有路可登芙蓉峰見峰高不及北山半舍之仍由寺西北登嶺升陟五里得清隱庵由北塢登楊家山繞其西山峽中北透而上則北山絶頂上倚於后前列楊家山中開平塢竹石充隙者朱淮督山墅也東北石纍纍蹲伏平莽中曰石浪為黃初平叱石處石上即鹿田寺鬬雞岩在其東二里過山橋東下一里兩峰夾澗峰石片片排空作雞冠怒起狀溪流奔躍其下聞岩東下數里為赤松宮乃郡城東門所入道芙蓉峰東坑也巖北即北山頂頂有棋盤石扳榛莽而上約二里始到石前有平臺疊塊後聳中列室一楹有澗泠泠從山頂下溯流再躋則石硤成門水從門出門上更得平壑所稱西玉壺也聞其東尚有東玉壺皆山頭出水之壑西玉壺之水南下者歷棋盤石而潜溢三洞北下則從裏水源出蘭溪北東玉壺之南下者水由赤松宮出金華東下者出義烏北下者出浦江凡一郡分流此其脊矣玉壺一名盤泉分聳於上者稱三望尖文之曰金星峰總所謂北山也下返鹿田寺僧以久不至方分路遙呼山谷響應入寺浴而卧初十日拉寺僧束炬從朱墅後西行一里北登嶺約里許一石聳出峰頭由石畔循山而東可達玉壺踰峰而北即朝真洞洞開高峰之上西向穹然下臨深壑壑中廬舍歷落即下雙龍洞外居人也蓋北山自玉壺西來中支至此而盡後復生一支西走蘭溪其層分而南者一環為龍洞塢再環為講堂塢三環為玲瓏巖塢而金華之界於是乎盡玲瓏巖之西又一環而為鈕坑再環為白坑三環為水源洞而崇崖巨壑亦於是乎盡後支層繞中支中支西盡頽然下墜初闢為朝真中墜為氷壺最下及谷底為雙龍所謂三洞也洞門俱西向層纍而下各去里許山勢嶄絶俯瞰仰眺各不相及而洞中水實層注朝真洞門軒豁內洞稍窪而下秉炬深入左有一隙如夾室宛轉隨之夾窮有水滴瀝不休而隙底仍燥不知水從何去也出夾室直窮洞底則巨石高下仰眺愈窮扳石隙下墜復得巨夾忽有光一縷自天而下洞頂高盤千尺石隙一規宛如半月出內洞其左復有兩洞下洞所入無幾上洞宛轉亦如夾室右有懸穴下窺想即內洞深邃處出洞仍從突石峰頭南下折而西北得冰壺洞洞門仰如張吻先投杖垂炬而下不見其底乃扳隙倚空入忽聞水聲轟然秉炬從之則洞之中央一瀑從空下墜冰花玉雪從黑暗處耀成潔采水穴石中莫稔所去乃依炬四窮其深陷逾朝真而屈曲少遜出洞直下里許則為雙龍洞洞闢兩門一南向一西向俱為外洞軒曠宏塏如穹厦高搴閶闔四啓非復曲房夾室觀流水自洞後穿內門西出徑外洞去俯水所出處低覆僅一尺五寸余借一浴盆於洞口潘姥家解衣赤身伏盆中推盆而進進隘五六丈穹然高廣一石板平架洞中離地數尺大數十丈薄僅寸左則石乳下垂綺窗翠幕橫列洞中溯水再進水竇愈伏無容入矣循溪南出羅店踰嶺歷塢北入東轉去雙龍約五里又上山半里為講堂洞亦有二門一西北向一西南向軒爽高潔可居可憩其澗涸而不流渡澗西踰第二嶺塢逼嶺下而澗中有水淙淙北來又渡而西循嶺北上外隘中轉是名玲瓏巖去講堂西又六里矣轉而西踰其嶺為蘭溪界下嶺為鈕坑又踰一嶺曰思山祠去玲瓏巖又六里日已將入問洞源寺道曰十里或曰五里亟下嶺循澗南趨五里至白坑又西踰石塔嶺嶺後高峰之北即洞源寺從此嶺穿徑而上僅里許而正道在山前下洞旁蓋此地亦有三洞下水洞中紫雲上曰上洞其地總以水源名故一寺而或名水源或名上洞而寺與水源洞異地時昏黑不辨山路竟循大道下山徑路分錯久不得寺遙望一燈隱隱急投之則水舂也其人曰此地即水源由此北過洪橋循右嶺而上可三里即上洞寺依其言得至强寄宿焉十一日不及晨餐與靜聞從寺後躡磴北上覓白雲洞踰嶺而北嶺凹忽下窪如盂磬披莽從之一洞岈然下墜深黑疑即白雲仰問樵者曰此洞窗也白雲在北乃復上北行兩山夾中又環成一窪大且百丈深數十丈螺旋而下中無滴水倘置水其中即仙遊鯉湖矣然山頂四環無一隙瀉者僅見此又下從峽西轉則為白雲洞洞門北向門頂一石橫裂梁架於上入洞仰窺所稱鵲橋者非耶轉而左漸下漸黑有門穹然內似甚深外有石屛遙峙黑暗中以杖探地而入數十步洞倍寬廣第無燈炬四顧無所睹返步出抵穹門初入黑甚者至是歷歷可見乃轉屏出洞踰嶺還飯而出寺循舊路西下二里至洪橋未度從橋左居人後上紫雲洞門西向中垂柱四五界為數重瓊窗翠幄處處皆是亦敞亦奧膚色俱勝洞北一奧宛轉邃深亦以無炬返下度洪橋循澗而東越石梁水源洞即在其側洞門南向正跨澗上洞口垂石繽紛中一柱自下屬上若擎之而起其上嵌空紛綸復闢一竇幻作海蜃狀洞中上下分二層下即澗水所出隘束之上層由洞門躡磴上入漸下下則空廣愈無極但聞水聲亦以無炬不及窮出坐洞口擎柱內觀石態古幻始與靜聞别洞源而去循西嶺出塢又西南十五里達蘭溪南關飯而登舟刺行五里泊橫山頭十五日西入常山溪口過花椒山懸帆正拂赭崖自時兩山緑橘丹楓珍苞映日雖霜旦嚴辰有同暄藻十六日午抵常山縣登岸募夫十七日五十餘里至東津橋其水自北山南流山高聳在玉山縣北三十里外蓋自草坪北渡即西峙此曰三清山度橋西五里由玉山東門入而東津橋之水繞南而西至此已勝舟時已下午無長舟可附得小舠至府二十里而暮榜人乘月鼓棹八十里泊廣信之南門郡西二十里有石橋瀕流下流又有九股松一本九分參霄競秀俱不及覽十八日至鉛山河口初擬由廣信北游靈山且聞其地北山寺叢林甚盛阻病創而止西南下三十里有峰圓亘曰仙來山舟過時卧未起及經二十里潭至馬鞍山下回望見之已不及登矣自仙來至雷打石凡二十里石山介溪左右俱如伏牛覆釡不特形絶崆峒並無波皺文至纎土寸莖亦不能受或山斷沙回霜痕樹色出村廬石隙中又二十里過旁羅南望鵝峰峭削天際此豫昔年假道分水關趨幔亭處又二十里抵河口一水自東南分水關經鉛山縣至此入大溪兩溪合始通大舟十九日下貴溪舟二十里西至叫岩瀕溪石崖盤突下插深潭竇橫開其上回亘峰腰穿穴內徹如行廓閣道窗楞户牖都辦崖上大書漁翁隱次云崖右循磴而上列石縱橫穿石隙而繞其後一徑成蹊衆峰環亘壑回峯易居人多截塢為池種魚鱗鱗投問之地已屬興安其前對之山圓亘而起曰團雞石嶺嶺前即叫岩寺也叫岩前臨大溪漁隱崖當岩左突出又一崖翼其右右崖之前一圓峰兀立溪中曰印山寺後岩石中虛兩旁回突庋以一軒為叫岩岩為寺蔽景之佳曠在漁隱不在此也西十里抵弋陽界有山方峙溪右若列屏而整上有梵宇惜以棹急失之又三十里西南望孤峰插犬際心艷之又十里至弋陽遂以行李托靜聞督舟去豫與顧僕留旅舍為明日龜岩之行二十日雨中過西南門遇一龜岩人欲歸依之三里渡大溪俱從山岡行淋漓十里望龜岩杳不可睹忽路左一峰疑即夜來插天際者詢之為羊角嶠去龜峰尚五里比至遙望一峰中剖如門已而門之南忽岐出片石如圭即天柱峰也及抵其處路復南去轉而東入先過一堰堰南滙水曰放生池池水兩浸崖足循池北崖鑿石成棧即展旗峯也上危壁而下澄潭潭盡竹色樹嵐掩映一壑兩崖飛瀑交注既入忽見南崖最高處一竅通明若耳之附顱疑白雲所凝最近而知為石隙時雨甚濕衣抵方丈貫心上人急解衣代更爇火就炙二十一日雨漸收衆峯俱出惟東南絶頂尚有雲氣貫心出方丈中庭指㸃諸勝正南獨高者為寨頂頂石如鸚口名鸚口峯又名老人峯上特出一圓頂從下望之如老僧南向袈娑宛然名為老人者以此上振衣臺平視則其峰漸分為二由雙劒下窺則頂若一葉綴起其北下之脊一起而為羅漢再起為鸚鵡三起為淨瓶為北下最高脊四起最北為觀音峰亦峭此為中支北與展旗峰對楠木殿因之從南頂而西最峭削者為龜峰三石攢立峰頭與雙劒並峙峰下裂隙分南北者為一線天東西者為摩尼洞其後即為四聲谷從其側一呼則聲傳宛轉凡四蓋以峯東水簾谷石崖回環其上故也峯東最高者即寨頂西之最近者為含龜峰其下即寨頂含龜分脊處而龜峯雙劒峭於上為含龜所掩故其隙或顯或合合則并成一障時亦陡露空明昨疑為白雲耳又西為雙劒峯與龜峯並立分脊之西南龜峯三剖其下而上併雙劒同本而兩岐其頂其南大書壁立萬仞四字欵氏剝落相傳朱晦庵也此二峯為西南過脊之中東北與香合峯為對而舊寺之向因之從西而北聨障於左者即含龜峯峰下即振衣臺平石中懸屏下乃道登摩尼一線天者也次為明星峯北接雙鰲南聨含龜在正西峯為最高又次為雙鰲峯峯北下插澄潭即入谷所經放生池南涯也此三峯環峙谷西而寨頂之脉西北盡此從南頂而東最回環者為城垜峯圍屏峯此為東南層繞之后西北與雙鰲為對從東而北嶙嶙右列為轎頂峰象牙峯獅子峯比肩谷東而寨頂之脉東北轉於此乃又從北而駢立為案平列者香合幻起者靈芝即方丈靜室所向最高而欹張者展旗峯東昂西下南北壁立南插澄潭即入谷之鑿棧於下者此三峯排拱谷北而寨頂之脉東北盡於此此皆谷之內者也展旗北為天柱峯即昨遙望開岐如圭者旁為犬子峯獅子南為卓筆峰圍屏峰南深壑中有棋盤石寨頂東南有朝帽峰峯獨高孤立寨頂後豫從弋陽東舟中遙見者即此近為諸峯所掩又寨頂朝帽間則有接引峯寨頂西又有畫筆峯蓋寨頂北下者既為羅漢諸峯其南回西繞列成屏嶂反出龜峯之後者此是也岩上有泉名水簾洞此則谷之外者也其谷四靣峯攢自成洞窟惟西向一峽兩崖壁立水從中出路亦從之其南從龜峯之下東從獅子峯之側北從香合天柱間皆踰峰躋隙而後得度真霄壤中一靈勝哉谷中觀音峯一支自寨頂北墜谷分為兩西則方丈靜室所托最後為摩尼洞振衣臺之路東則榛莽深翳豫曳杖披棘而入直抵圍屏城垜之下仰視虎搏羊諸石使芟夷蕪蔓道置級益進必有深美奈何任亂石茂棘阻絶奧區出循獅子峯北踰嶺南轉所謂轎頂象牙諸峰從其外西向視之中懸一峰如卓筆不經此不見也衆峰之麓俱石岡高亘其東又有石峰一支自寨頂環而西北與轎頂象牙諸峰又環成一谷豫從石岡直南徹谷底復阻石棘而出因西踰象牙獅子間脊欹削幾不容足回瞰內谷真别有天地矣此谷東第一外谷也復循外嶺東行南轉二里為棋盤石一大石穹立谷中平如砥其西南即朝帽峰西北即寨頂蓋圍屏峰之後也其外峰一支又成一谷但其山參差環立不復如內俱石崖削成者此第二之東外谷也寨頂朝帽之度脊處一石高數十丈南向立即接引峰也豫於棋盤石俯見從此可躋絶頂披棘直窮嶺下則懸削無階仍從故道至獅子峯轉經香合峯登靈芝峰望天柱犬子兩峯植立北谷中蓋展旗峰獨峙於北又環成一谷此北外谷也從展旗西南直東上其頂東南眺朝帽峰左又分立一石有同接引而接引則蔽不可見南靣龜峰雙劒俱成一壁回環無復寸隙下峰從夾棧西出循放生池南行出雙鰲明星含龜後東視三峰背俱垂土可升舍之南東入即水簾徑踰龜峰雙劒為下振衣谷中道又舍而南有路東上知為登寨頂道從之上二里西視龜峰雙劒已在足下始知已出水簾上下視谷中三靣回環如玦惟北靣正對龜峰雙劒其西有隙可通然掩映不見所從此第一南外谷也循崖端再上已而舍北從南見東南岡上亂石湧起有若雙芝駢發盤大莖斂下復並蒂中穿孔其上飛舞變幻賞不周接又上一里登一頂復舍南從北穿石隙而上轉而東南行其頂更穹然也其東北復起一頂兩頂夾而成峽東南自過脊始而西北溢於水簾山遂中斷為兩而過脊之度其東南者一石如梁橫兩頂間梁盡而雄崖削起决無登理踞脊上回瞰南谷崩隤直下深不見底但見東西對崖懸嵐倒翠不知何途之入此第二南外谷也久之覓路欲返忽見峽北頂有級下達自峽中直上者因諦審峽南石上復有級同之始知其道不從脊而從峽也想寨為昔人盤踞故梯險鑿空今路為草沒而石蹟未泐遂循級北下峽底復自峽扳級北上一里東登最高處竟與朝帽接引連袂比肩朝帽四靣孤懸必無可登而接引之界於其中者已立懸脊之上兩旁俱突石錯塊不特下不能上上亦不可下其北下之脊即棋盤石南下之谷當朝帽南來山脉所環而成者亦不知入自何途此為第三南外谷也獨西外無谷乃絶頂之北東分為圍屏城垜西分為鸚口然其異下仰則穹然見竒上瞰反窅絶難盡也時日暮急返豫已目勞懷竭飛騰而下不自知其足之前也四里下山東向入至雙劒龜峰下有徑可入水簾昏黑難辨遂踰嶺息方丈二十二日踰振衣臺上至龜峰下再穿一線天而東北過四聲谷谷壁一隙東南向內皆大石纍庋可西北出其西北為摩尼洞正下窺方丈平揖觀音諸峰遂下嶺西南循外谷入水簾洞其處三靣環崖回亘自天北對龜劒二峯泉從崖東飄灑下墜為此中絶勝蓋龜峰巒嶂之竒雁宕所無但詘水觀耳此谷獨飛珠捲雪在深谷尤異但其洞雖泉對而窪伏崖末為恨顧其危崖四合已可名洞不必以一窟標舉也時朔風舞泉游漾乘空聲影俱異霽色忽開日采耀崖射水光麗鑠眸低徊不能去久之飯於寺而别仍從崖棧西出十里排前又西二十里至留口暮涉其溪溪西即貴溪境自排前至留口回望龜岩祇見朝帽峰作一羊角插天與弋陽東向望不纎毫差别苐此見一石人旁立亭亭為異二十三日西行八里將至貴溪城忽見溪南一橋架兩山間問之為仙人橋隔溪不可至西趨二里入城覓靜聞於逆旅同出西南門經張真人墓碑乃趙松雪奉敕撰書者一里越小橋東向溪溪流直逼五靣峯下此溪發源江湖山自花橋而下即通舟楫西北六十里至羅塘又二十里至此入溪為通閩間道其所北輸皆楮炭適有炭舟艤溪畔呼之渡渡溪東一里由五靣峯西北入其山俱石崖盤峙中剖而開並夾而起逺近離立不一抵穹岩下拾級而上得一臺綴兩崖如掌其南下級直垂澗底其西上則山巔豫先扳磴里許至絶頂則南瞰西華東瞰夾壁西瞰南溪北瞰城邑皆在指顧間以山雨忽來急下山從前磴南下一線天即從峰頂中剖而下者是為直峽峽至中間忽轉而東穿復得橫峽上下壁立東盡出塢而南望兩崖穹崖盤竇往往而是直抵西華豫已從五靣峰穩視舍之仍轉出一線天北踰嶺二里東轉入小隱岩岩上穹下遜裂成平竅東西環轉南連北豁可廬而憩岩後有宋洪駒父宣和年間書豫久知有徐仙岩遍問不可得聞有峩眉山在小隱東南三里遂由羅塘大道過一嶺北轉入山竹樹深蒨岩石高穹雨大至飯於岩中問仙橋道曰間道循山而東穿塢北去四里可至從之路甚荒忽久之踰一山忽見䂬然高駕者甚近及下谷茫不可得既直抵其下一石高跨峯凹上環如卷中闢成門靣平整如臺豫先至橋下仰視頂高穹不啻數十丈及登步其上修廣平直駕虹役鵲之巧不逮也從其西二里將抵象山問徐仙岩終不可得忽一老翁曰屋後南入即是舊稱徐岩今為朝真宮路荒沒非明晨不可覓豫以明晨將發遂強靜聞南望山峽而入始猶有徑入漸滅兩崖深極不顧莽棘直窮其底石峽盡處隘不容足乃象山東第三塢望其西又有一塢入不得路問知路尚在西乃得入則高崖盤亘中有深岩外垂飛瀑乃象山東第二谷即徐仙岩也循暗路出南登象山兩崖前突中塢不深而峻從崖右登仰止亭亭高懸崖際嵌空環映仰危峯而俯幽壑令人徙倚忘返守祠者以昏黑恐無舟渡遂扶豫二里至中坊渡隔溪呼舟俟既渡乃别里餘入南關抵肆宿二十四日仍渡西南門大溪南十里新田鋪山勢漸開正值西華山之南回望諸岩兀突俱併成一山祗有高下無復剖裂痕三十里過馬鞍山復入山谷四里踰嶺下宿申命地為上清入山始境主人為豫言南去上清二十五里西去仙岩止二十里不若即此向仙岩而後上清便又言仙岩之西十五里有馬祖岩不若竟赴馬祖轉而由仙岩扺龍虎以盡上清為更便豫善其計分靜聞待於上清而豫與顧僕西去二十五日趨而西二十里過香爐峰峰危亘三疊南靣直剖下中一凹佛廬其上雨不及登其西即安仁界於是又涉饒郡地八里過新岩足不知岩之在上也從東峽穿而北入有岩橫亘於西飛瀑交灑於上復探其南南岩有户掩竹間出躋其上高敞盤亘但無宛轉穿漏致此即新岩非舊岩也西趨下山一里入山峽峽口巨石磊落高下盤峙深樹古藤密䝉其上其內崖東西並峙北連南豁豁即峽口連者其底也馬祖岩在東崖之半即新岩背豫由岩下仰視欄栅憑虛以為殊勝及冒雨登岩則穢息不可近蓋為業僧畜塒所且拒客不納時衣已雨透强栖右龕側二十六日仍從北連處下轉上西崖直趨而南路斷處即來時峽口上也崖壁峻立不可下瞰忽有洞透腹西出既越洞分兩道一道循崖而北兩崖並夾遂成一線一線中東崖下復裂而為岩清幽可托岩外之崖與對崖下墜百仞上插千尺不合者盈咫而中亦橫裂邃若重樓惟極北豁然以為可通外境而豁處天光上闢懸險愈深削崖穹壁阻絶上下復還至洞門分道處仰見上層飛石平出然高不可扳從其南道轉峯側而上則飛閣危懸又闢一境覓路下不得仍穿洞出崖端覓路下峽口又不得仍循崖抵北連處下出峽口四里過南嶺遙望東靣亂山灑翠駢聳其北者為排衙石欹側其南者為仙岩最秀而近瞰嶺下一石尖插平疇四靣削起者為碣石下嶺即見大溪自東來直逼嶺足其溪發源瀘溪由上清而下乃從溪北溯流東南行四里至碣石下仰望穹然雖漸展而濶然削立愈甚有孤柱分霄狀下有碣石村是為安仁東南界渡溪南為瀝水山復𨽻貴溪矣又東五里直抵排衙石西為魚塘地東臨大溪下脫遊仙岩上清記約一頁二十七日蔡坊渡溪東一里龍虎觀觀後一里水簾洞南出山十七里曰石岡山金溪縣東界也入撫州境又八里宿孔坊二十八日五十里下一嶺為五里橋東南入金溪城南十里至大塘山二十九日西南七十里扺建昌東門十一月初二日出建昌南城西二十里至麻姑山足上二里半山亭又一里噴雪亭麻姑以水勝而詘於峯巒半山亭之上有水橫騫如卧龍蜿蜒上至噴雪則懸瀑落峰間一若匹練下垂一若玉筋分瀉分瀉者交瀠石隙珠絡縱橫亦不止於兩但逺眺則成兩瀑耳既墜仍合為一復如臥龍斜騫出峽去但上之懸墜止二百尺不能與雁宕匡廬爭勝再上五級連注可名五泄五泄各不相見各自爭竒其中兩潭甚深螺轉環連雪英四出此可一目而盡為少遜耳再半里上至龍門橋兩崖夾立泉搗中堅不敢下視架橋俯瞰於上又變容與為雄壯觀龍門而上溪平山繞自成洞天不復知身在高山上也又半里為麻姑壇仙都觀左有大夫松已死右有通海井西上嶺十里逾篾竹嶺為丹霞洞又上一里王仙嶺最高西下左坳中宿華嚴庵初三日仍出篾竹嶺由西坳中南上越兩山東南共五里為飛爐峰南為軍峰北接麻姑東瞰盱江西極芙蓉蓋在五老峯西陽華峰西北云初四日東出建昌過太平橋南循溪五六里西折出從姑南上天柱峯山頂兩石並起如雙髻北向登其岩前曰飛鰲峰其後飛突而出下有方池曰玉冷泉從東上天際亭亭後鑿石梯而上一洞口隘如斗蛇伏乃入中高穹而寬天柱之南隅也仍下石級西沿崖登天柱鼇峯間有臺一掌上眺層崖下臨絶壁竹拂石門樹懸崖隙為雲臺岩從其上西穿峰峽架木崖間曰雙玉樓再西一石欲墮未墮兩峽並起上下離立曰一線天此鼇峯北隅也一線既盡峽轉而北有平石二片方圓各異橫􅍥峽內曰趺跏石此二峯者從天柱西鼇峯北又起二峯高殺於鼇峯天柱而以麗得竒者也其東一峯即南與鼇峯夾成一線又與西峯夾庋趺跏者西峯之西又有片石橫架成臺其東西俱可趺跏云從趺跏石北踐一動石梯東峯而上其頂南架梁於一線出鼇峯巔東鑿級以躋遂凌天柱之表北瞰郡城西瞻麻嶠時天霽氣清縷烟纎雲游目盡徹從趺跏峽中北下天柱之北穹崖下臨片石夾立天柱北裂一隙上有懸臺可躡曰滴水岩東下又得穹崖一重為竹影庵從其南扳石而登曰梅花岩石隙東向則天柱東隅下層也飛鼇之西有斗母閣閣側有一石曰蟾蜍下嵌成窩而上突為臺則又鼇峯西隅下層也初五日東南四十里為硝石南溪東溪至此合南來者為新城溪舟扺新城尚六十里東溪四十里至五福又陸三十里至杉關為江閩分界度東溪橋而南為鐵仙岩山俱純石北半嶄削為崖屏立田疇間由崖隙而上兩崖間瀦水成溪崖插溪底鑿棧以入又一水自東來注亦純石插底隘不容足架梁南渡又轉一橋西渡大溪遂躡山峽而上則飛岩高穹東向而出僧憑岩結閣種竹於外頗幽敞出度峽橋見有石級西上因躡之盤旋山頂兩度過脊皆深壑斷峽回亘縱橫下山二里仍宿硝石東溪橋之南初六日聞覺海寺勝南趨二里則南溪之左也寺亦古其前即鐵仙岩以西之第二重也蓋自硝石來其山皆塊石堆簇南則交互盤錯斬若截堵峰峰皆然以鐵仙為中西則突而峙於南溪之左東則兩突而止於止止岩之東再東則山轉而南矣入覺海見山在其前乃循崖以登崖之西下瞰南溪涓涓北流時有小舟自新城來既南行崖盡有峽東下蓋南北兩崖對峙成峽其度脊處反在西瀕溪之上豫見其峽深沈遂躡山級東南直登其巔東西兩臺最高自西而東路盡莫前下瞰亂壑縱橫峽形屈曲枝分滙水成潭分曹疊瀉疑即所云金龜湖也而二峯東下無路但見東峽有水有徑疑即鐵仙仍從舊路下至溪東兩崖對峽處即從崖下東入峽中漸下漸濕遂東北三里至小港口水自韓公橋而來渡之入山東北三里大石岩五里韓公橋三里雙同槽南二里紫雲岩西一里渡溪為夫子岩返出紫雲一里至響石岩又登嶺一里至竺岫初七日東南六十里與南溪遇東為觀音崖西為山居院兩崖束溪門以內澄潭甚深三里入新城北門出而西西南二十五里宿石瓶岡下脫一日初九日從草堂左循崖南下路甚微削伏深草中直下三里東南一溪自簫曲峯後與外層巨山夾而成峽巨山即閩界其東北度而為簫曲西北度而為應感峯㑹仙峯兩腋溪流夾而西去簫曲南溪之上為板鋪渡溪東南上嶺一里則平轉山腰又南二里直上山頂二里南下而東上至應感岩岩西向巨壑矗削環成一窩置室於中自下望之直憑虛綴壁也從崖側躡登里許至岩頂以為諸峯莫高於此既登而后知㑹仙岧岧更上也應感二峯連起東屬於大山過脊甚峭脊北之水出板鋪脊南之水即西出㑹仙峯北自應感登㑹仙岩南下三里過脊南水復南上則㑹仙北屬大山脊也脊東之水西出㑹仙之南其南又有大山東北入於感應後之大山夾此水西去其中塢落為九坊乃新城五十一都地對㑹仙之山名迷陽洞山南即邵武建寧縣其大山東南為泰寧其西南為建昌之廣昌自過脊至㑹仙望之甚近而連踰四峯皆峭削四下四上又四里而登㑹仙絶頂則東界大山俱出其下無論簫曲應感矣自㑹仙西至南豐百里東南抵建寧縣亦百里其界有側家斜在迷陽洞南為大山寥絶處初十日由㑹仙岩西下十里過溪即應感西南來溪也又十里為下埔應感溪自東而西㑹仙溪自南而北俱㑹於下埔北去自下埔而上懸崖瀑布隨處而是亦俱㑹於下埔西南十里至章村山始大開有水自南而北源自建寧縣邱家嶺去章村南十五里又五十五里始抵建寧云由章村西南三十里宿梅源十一日西五里至漈上塢平疇一環四山繞壑以為平地矣已而流忽下墜循級愈下遂成一瀑名漈山竈又五十里抵南豐出其西盱江自西南繞城東北而北下西五里一溪自北來度其橋軍峯溪自西來溯之行數家列溪上曰三江口十二日渡軍峯溪從左路上路漸微六七里入山口越二嶺約三里詢知正道在南從三江渡溪已誤也蓋其嶺西北為吳坑東南為東坑去三江已十里乃南轉下一坑復得土人指上嶺共五里止後阿上二里一小廟當道岐出廟西北平循山半陰崖行又二里至一山過脊處南北俱有道西向登嶺道獨仄躡之登一峯即轉入山峽峽有溪自西而東東口破壁下綰口一峯西南半壁直傾至底石骨如削鐵路在其對崖循峽陰西入自過脊至此共二千七百步一石飛突南崖俯瞰溪日光溪影俱為浮動溪中大石屹立西盡峽兩崖逼束成門水從門中墜壁下瀠洄大石而出蓋軍峯東溪源也飛突崖下架一橋渡澗而北登嶺半里山回水聚得岐路入龍塘庵西有龍潭路棘不可入庵左渡小溪直上嶺六百步循崖而西屢有飛澗從山巔墜下路橫越澗流者五六次下復成一溪又九百步得橫木棧崖又二里直轉軍峯北仰望峯頂猶天外一石澗自峯頂懸而下此北溪之源也渡溪二百步上一嶺始與北來大路合自此西上一里至北嶺度脊處其西下為宜黃道東即所來大道也自此南上鑿磴疊級次第問出蹈空而上道極修廣愈上愈高風氣寒厲與㑹仙異自分道處至絶頂悉直上無曲墜共四千三百步抵軍峰巔下望五六尖峯自西南片片來乃閩中來源也其南圓亘者為著棋峯亭亭削刻非他峯所及蓋自南豐來從車盤嶺南靣上不及北道之闢然經著棋峯棧石轉崖度西峽中躡磴扳隙路甚竒險豫從此道望見之恨不親歷十三日北下十里至嶺脊岐路處舍東北二道從西下里半得混元觀則軍峯北下觀也地已屬撫郡宜黃縣聞山南車盤來道亦有下觀云循山北下兩山排列水瀉其中五里至澗底軍峯直北水也又一水自西南來乃軍峯西壑水至此㑹循水東北五里過袈裟石石綰兩澗口聚落在其外曰墟上又魚牙山之水亦自西南來㑹與大溪合西轉下宜黃墟上即東北岐溯一小溪十里至東源東上三里登板嶺嶺水西流入宜東南流入豐東北流亦入宜蓋軍峯北下脊也度嶺東竟塢一里水東出峽下墜深坑從北岐一徑五里至下村又北二里水入山谷中兩山隘束路縈山半曰十八排即七星坑也凡十里水破峽而出又一里山開水轉度小橋而西曰楓林十四日即從小橋溯小溪北上五里入南灣坳逾分水嶺為南源即小溪源也五里至八角莊有水東下北二里登黃沙嶺下巾兒漈水亦東下北溯一小水三里上欄門平行李家嶺一里始下一里為磁龜又東北踰嶺下溪自東南下深坑路不能從東下三里山少開東逾一嶺二里曰乘龍坳水亦南下復東上二里曰鵝腰嶺平行二里下一里曰鉏原先是下磁龜以為平地至此歷級東下共十里至歪排始知磁龜猶在衆山上也歪排以上多墜峽奔崖之流但為居民造楮濯水成滓失飛練懸珠之勢然鉏原小水已如此不知磁龜以東諸東南注壑者其竒勝更當何如也出歪排其南山塢始開水亦南下又東十三里則盱江自南而北日方下午不得舟十五日右江左山北行三十六里則從姑在望入郡之南門十八日西循麻姑故道三十里逾朱君嶺復循山半行深竹密樹彌山布谷紅葉朱英綴映沈緑中曰鞋山五里入石坪山環一谷隨水峽而入復登嶺五里踏嶺頭即芙蓉峯東過脊也脊二重南下六七里有龍潭古剎在深坑中道小不及下度脊而西即芙蓉山自南而北高亘衆山之上循山東北上里許山開一塢東北向是為芙蓉庵十九日從庵左小徑直躋一里出峯上又平行一里登三仙石為芙蓉最高處東眺黃仙峯已不能比肩南眺軍峯直欲競峻芙蓉之南冇陳峯山在十里內高殺於芙蓉峭削似之憑眺逾時從峯北小徑西下里許與石坪西來大道合下五里北轉始有高篁叢木西下上四里登揭燭尖西南下二里為南坑有澗自東南來圍山繞谷平滙一壑隨水數轉出里許一水自北至二水合而南出路因之西九里高峯逼西又合一南來水與俱北遂渡港口橋循左麓而北五里抵上坪水注北去路西折上杉木嶺二十里宿車上二十日乘月西行即與大溪遇想即墟上之溪自南而北者發源軍峯經坑隂至此已而溪復西南下路折西北山中十里則大溪復自東南來渡之東行五里又一溪自西南循宜黃城東而北軍峯溪與之㑹再北又一小溪自城北來入三水合經獅子岩下遂北下臨川云乃與靜聞出宜黃北過豐樂橋上獅子岩岩回盤兩層兀立三溪合流處又西北二里入山得仙岩高峙錦屏上穹下通其西垂忽透壁為門穿石而入則衆山內閟若另一世界是岩甚薄南靣壁立北靣穹覆其穿透多隙正如䖍之通天岩岩之最竒者乃返出縣南循南來溪西南行二十里過玉泉山下山屏立路右若負扆乂南隨大溪三里一小溪自西來注即石䂬下流也始舍大溪溯小溪西折入三里得石䂬寺寺北有矗崖立溪上半自山頂平剖下南峯尤突兀與之對峙為門石䂬嶺正中懸其間寺倚嶺東麓仰望之祗見峯頂立石巍然不知其中空也是晚宿寺中二十一日急登䂬是峯東西橫跨若飛梁天半較貴溪石橋軒大三倍從寺西眺祗得其端由寺北轉入峽中南向登仰見竹影浮揚一峯中穿高度雲末透石入南瞰亂峯攢挺溪聲山色另作光響非復人世出橋南還眺飛梁之上石痕橫疊疑有綴廬嵌室無路可登正徘徊間一山鶴冲飛而去響傳疏竹間益令人留戀是橋之南其內石裂兩層自下而上離合尺許由隙扳躋欲達其上層而從上垂綆可引入中層云下䂬由小路五里抵玉泉山下山甚峻屏立溪西北上半俱削壁僧疊級鑿崖架廬峰側一峰懸上三靣憑空後復下隔深峽離大山之右崖丈許登眺久之返抵北門旅次已昏黑二十二日西北三十里至陳坊北度小木橋沿小溪入五里由回龍洞入山隘抵曹山寺環峯四闢平疇一圍水流其間亦此中一洞天也二十三日西四十里至朱碧街去樂安尚三十里二十四日西南三十里至大坪寺東轉入華蓋山二里為一天門又躡級上一里為舊一天門有二小溪合於石屋之上從此行峻坂中七里至二天門兩度脊東北繞三峯之隂共七里而登華蓋頂謁三仙焉華蓋三峯並列而中峯稍遜西為著棋東為華蓋路由西峯而登其陽甚削故取道於此華蓋之上諸道房簇繞仙殿無餘地可舒眺登著棋縱目四覽其北正與相山對西南則中華山與頡頏東與南各翼以崇嶂然皆不能與華蓋抗也是山在崇仁南一百二十里東去宜黃亦一百二十里西去樂安三十里西南一百里至永豐東南至寧都則二百里焉余自建昌宜取道磁龜則直西而至自宜黃則取道石䂬從雲封寺亦直西而至今由朱碧則迂而北環而西轉東向入山取道雖迂五十里而得北游曹山洞石可無憾矣仍下三天門西南十二里出大陂溪中亂石平鋪水碎飛其上望之如冰玉二十五日為長至日早寒殊甚西南十五里溪邊一橫石臨流與靜聞踞其上不知溪流之即在其下及起回顧溪流汨汨透石出始知為架壑石也豫道樂安聞城西十里有天生橋欣然欲往今路已南不及西向幸得此石雖溪石庳細已見天生石梁一班南十五里抵流坑又西八里宿烏江溪南之茶園二十六日候舟逆旅度溪橋北上㑹仙峰其峯在大溪北黃漠溪之西蓋兩溪交㑹是山獨峙其下流與雪華山東西夾黃漠溪之口者高聳兀突倍於雪華南靣石骨嶙峋於此中獨為峻拔其西南則豁然溪流放注永豐境由溪北從東小徑西上五里至㑹仙峯更西北上一里石尤巑岏上多鵑花紅艷但不甚高亦冬深殊景也下山舟尚不行復止宿豫自常山來所經縣治無不通舟惟金溪樂安通舟之流俱在四五十里外二十七日舟發烏江經永豐出吉水恩江十二月初二日抵吉安郡初十日登中華山上下俱十里十一日游洞雲十二日循中華而南十里登分水嶺逾嶺東五里為帶源由帶源隨水東行出水口峽水東去路南入山六里過羅源橋復與帶水遇蓋其水出峽東行循山南轉至此度橋而北山始大開又五里宿水北十五日由水北五里度瀘溪橋為夏朗滯張氏西園數日十八日由夏朗西西華山之東小徑北五里西轉循西華北十里至永和其北涯有道可徑往青原登山隨山東北行五里入兩山間又一里有溪轉峽而出渡溪南轉石山當户清澗抱壑青原寺西向而峙初入時不過東西兩山夾也至北塢轉入而南始覺水石清逈岩壑瀠泗及登塔院下瞰寺基更覺中洋開整四山凑合其塢內外兩重外建書院內峙香阜若天造地設者是寺久為書院僧本寂竭力興復改院為寺鄒南臯郭青螺欲兩存之本寂力持不可始遷書院於外塢寂為豫言如此寺前一溪由寺東南深壑中來前滙翠屏下翠屏為水所蝕山骨嶙峋層疊聳出老樹懸綴其上浸影清流景色萬狀寺左循流上峽甚峻而塢曲曲折入十里扺黃鮎嶺入口回鎖極隘但知有寺不知寺後有此深塢也余自翠屏下循流扳澗宛轉其間莫測所極覺水舂菜圃種種俱有異致日漸西乃登山由五笑亭返寺出山度溪橋從山南五里越而西西北十五里度贑江暮烟橫渚不辨江城燈火又三里宿郡北白鷺洲二十五日入永新舟二十六日十里至神岡山下乃西入小江又西二十五里曰三江口安福江自西北來而西南來者永新江也舟溯西南行至是始有灘又十五里泊橫江渡去吉安郡五十里二十七日二十里廖仙岩至是始有山南岸為泰和界北俱廬陵境也自此舟轉北行十里永陽廬陵大市也在江之北然江之南岸猶十里而始屬泰和以舟曲而北耳又三十里泊止陽渡二十八日二十里至敖城始南轉揚帆五里上黃壩灘復北折入兩山間五里枕頭石轉而西三里上黃牛灘十八灘從此始灘之上為分絲潭潭水深碧崖束如門至此始有夾峙之崖激湍之石又十七里經畫角灘抵坪上則廬陵永新交壤處二十九日二十五里至還古望溪南大山橫亘下有二小峯拔地起問舟人大曰義山無竒小曰梅田有洞在山麓豫夙慕梅田之勝急登岸令僕隨舟候於永新豫同靜聞由還古南行五里至梅田山下峯皆叢石聳疊無纎土䝉翳其間真亭亭出水蓮也東向者三洞北向者一洞惟東北一角山石完善東南洞盡處與西北諸靣俱為燼灰者鐵削火淬大喪玲瓏之質東向第一洞在穹崖下一突石障洞側洞門穹然髙可十數丈入洞後頂忽盤空起四圍俱削壁下垂如懸帛萬丈牽綃回幄上復嵌空成閣中仰一竅直徹山頂恨無十丈梯凌空置身其間也由此北入左右俱有旋室透門伏獸垂幢不可枚舉而正洞垂門五重第三重有柱中擎界門為兩正門在西偏直透洞光東偏則旁門暗中由别隙入至第四門而合再進扺第五門約已半里而洞門穹直光猶遙矚至此路忽轉西向入入一門幽黑漫無所睹但聞傳響鏗鍧比明處更𢎞逺欲出索炬燭之既返步所睹比入時更顯垂乳列柱繽然滿前矣洞之南不十步又得一洞亦直北入最後左轉亦幽暗其瑰異宏麗少遜第一洞既出見洞之西壁一隙岈然側身入門高五六尺濶僅尺半上下方正如從繩潔矩而檻桔成形宛然琢削其內石色與外洞較異圓竇側隙曲折玲瓏悉可蝸旋猿掛入有風蓬蓬然出自內深室中而昏黑無所見乃蛇退而出出洞又南不十步再得第三洞則穹然兩門一東向一南向中皆穹朗初直北入既而轉右轉處一石柱潔白如削玉上垂為寶蓋綃圍珠絡形多瑰異從此東折漸昏黑兩旁壁益狹上甚高惜無炬不能燭其頂下則伏者漸低不容身而出自是而南凌空之石俱厄於大斧烈熖乃從山下轉而北見聳削之勝四顧都無徑路過東東北折而西遇一人引入後洞洞在山北甫入亦有一竅上透山頂入其內高穹明敞當洞之中一石柱斜騫作槎丫狀曰石樹下有石棋盤最內西轉云可通前洞而出時連游四洞日已下舂既不及覔炬再入而洞外石片嶙峋覺空中浮動益無暇俯抉幽閟遂與靜聞由石瓣中踏隙上上至半下瞰諸懸石若削若綴度日暮無覔炊處亟下山山之西北隅慘受焚削與東西同歎西過一澗十里至大道西嶺角西南行五里扺永新東關時豫舟逆流上且多迂回尚未至縣乃入游城中抵暮出舟適泊浮橋下永新東二十里高山曰義山橫亘而南為泰和龍泉界西四十里高山曰禾山為茶陵州界南嶺最高者曰七溪嶺去城五十里乃通永寧龍泉道永新之溪西自麻田來麻田去城二十里一水自路江南向至一水自永新北向至合於麻田三十日出城南溯溪行七里小溪南自七溪嶺來入又西三里大溪西南破壁去道自西北沿山入三里越草墅嶺為楓樹復與大溪遇西北越合口嶺八里至黃楊山境始大開溯溪而西七里宿李田山鄉寒寂徹曉不聞一爆竹聲北望岩嶠甚壯問之即禾山也聞其地西去路江二十里北由禾山趨武功一百二十里計令靜聞先待於路江丁丑正月初一日余直北入山升陟五里越一小溪又五里北抵後堂寺越小嶺始見平疇水田漠漠隨東流北行五里西北轉溯溪入山溪乃禾山東北流聚甚大余自永城西行未見有大水南入溪者當由東入永新下流也北過青堂嶺西下復得平疇一塢曰十二都西都溯溪入龍門坑溪水從山峽中破石崖下搗連泄三四潭最下一潭深碧如黛其上兩崖石俱飛突相向入其內復得平疇是為禾山寺寺南對禾山之五老峯背倚者乃禾山兆支復起之山也蓋禾山乃寺西主山而五老其南起之峯最為聳特兩山夾凹中有羅漢洞豫急於武功不及為羅漢五老遊遂北登十里坳越嶺北下山復成塢曰鐵徑復從其北越一嶺下五里更得平疇曰嚴堂五里上雞公坳一名雙頂嶺甚高嶺南之水出鐵徑北水則出陳山雞公以北即安福境下嶺五里扺陳山東西俱崇山峻嶺夾峙上則虧蔽天日下則奔墜峭削深奧非復人境初二日北向行南來之水從東破山去又有北來水合而東路即溯流北上五里宛轉至嶺上東轉北度嶺脊曰常衝嶺西一峯為喬家山石勢嵯峨頂有若屏列若人立者諸山之中此為翹楚北下三里一石崖兀突溪左上皆純石橫竪水從峯根墜空而下者數十丈但路右行崖畔叢茅䝉茸不能下窺徒聞搗空振谷聲下此始見山峽中田塍環壑又二里抵盧子壠一溪自西南一溪自東南山峽與常衝之溪合而北壠北一岡橫障溪使西走溪乃環岡復北遂西北流路始舍溪北過岡又五里下至平疇山始大開成南北兩界而盧子壠之溪復自西轉而東遂成大溪東由洋溪與平田之溪合乃渡溪北行三里至妙山復入山峽三里至泥坡嶺麓五里北越嶺而下又得平疇一壑曰十八都又二里有大溪亦自西而東乃源從錢山洞北至此者平田橋跨之度橋北上相公嶺從此迢遙直上五里有路從東來合又直上十里盤陟嶺頭日炙如釡渴不得水久之聞路下淙淙聲覓莽間一竇出泉掬飲之山凹得居落為門家坊坊西一峯甚峻即相公嶺所望而登者正東北與香爐峯對峙為武功南案初三日坊北三里轉而西復循山向北始東見大溪來自香爐峯麓是為湘吉灣下嶺連越兩山脊二里抵何家坊路從西塢下者乃錢山之道路從北凹上者乃九龍之道而正道則溯大溪東從夾中行二里渡溪循南崖一里三仙行宮在溪北從此漸陟崇崖二里直造香爐峰麓其崖坳時有細流懸掛北下大溪去仰見峯頭雲影漸朗亟上躋忽零雨飄灑三里至集岩雨遂沾衣乃入集雲觀少憩觀南倚香爐北向武功前則大溪由東塢來西經湘吉灣而去雨少止倩一道流送至山頂冒雨半里度老水橋復循武功南麓行上牛心嶺五里過棋盤石雨漸大道流還所畀送資棄行囊去蓋棋盤有道直北上五里經石柱風洞又五里徑達山頂此集雲登山大道也由小徑循深壑而東乃觀音崖道余欲兼而收之直從山頂小徑趨九龍而道流欲仍下集雲從何家坊大道上故不合而去豫遂從小徑冒雨東行山支直從山頂隤壑而下凸者為岡凹者為峽路循其腰遇岡則躋其上遇峽則俯而下由棋盤經第二峽一石高十餘丈竪峯側勢態娉婷其內峽突石叢樹望之甚異而石滑草塞無可著足循路東過峽者三其岡下由澗底橫度而南直接香爐之東水遂分東西流西由集雲出平田東即觀音崖下江口皆安福東北溪也于是又過兩峽北望峽內樹木䝉茸石崖竒詭時見崖上白練如瀑而怪無飛動之勢審視之俱僵凍成冰也共五里抵觀音崖一名白法庵在武功東南隅其地幽僻深奧初為山牛野獸窩僧白雲鼎建禪廬其徒隱之擴大之殿前廣池一方亦高山所難覯者前有尖峰曰箕山乃香爐東又起一尖也庵前後竹樹甚盛前大路直下江口後即登山東路也雨止由庵東躋其後直上五里抵山頂茅庵三石卷殿即在其上而濃露彌漫咫尺不辨道者引入叩禮返宿茅庵武功山東西橫若列屏正南為香爐峰香爐西即門家坊尖峯東即箕峯三峰俱峭削而香爐高懸獨聳並列武功南若櫺門然其頂有路四達由正南者自風洞石柱下至棋盤集雲經相公嶺出平田十八都為大道余所從入山者也由東南者自觀音崖下至江口達安福由東北者二里出雷打石又一里即為萍鄉界下至山口達萍鄉由西北者自九龍抵攸縣由西南者自九龍下錢山抵茶陵州為四境云初四日霧影忽開忽合從正道下覓風洞石柱直下者三里逺見香爐峯時出時沒半山猶濃霧如故遂乘未雨返山頂先往九龍沿山脊西行初猶彌漫已漸開三里下度一脊忽沈霧中望見中峯北矗崖嶄柱直下插谷底號曰千丈崖百崖聳峙回環高下不一隤而北下為門為閾為嶂為臺皆密樹平鋪霧猶時時籠罩身至其側輒復開朗標異蓋武功屛立東西與中共起三峯而中峯最高純石南靣僅見突兀而北則極懸崖回崿之竒使不由此而由正道幾謂武功無竒勝矣西三里過中峯之西連度二脊狹僅尺五至是南北俱石崖而北猶嶄削環突多竒脊上雙崖重剖如門下隤至重壑由此通道而下可盡北崖諸勝惜山高路絶無能至者又西復下而上為西峯峰與東峯無異而石骨嶙嶒則少遜中峯又五里過野猪窪西峯盡處石崖突出下容四五人曰二仙洞聞其上尚有金雞洞未入於是山分兩攴路行其中西下四里至九龍寺寺當武功之西垂崇山至此忽開塢成圍中有平壑水西出峽橋墜崖而下乃神廟時與觀音崖東西並建觀音開爽下臨九龍幽奧中敞形勝固不若九龍端密也若以地勢論九龍雖下於頂其高反在觀音崖之上出寺西越溪口橋溪從南下西越一嶺又過一小溪二溪合而南墜谷中溪墜於東路墜於西俱垂南直下五里為紫竹林僧寮倚危湍修竹間幽爽兼得亦精藍之最精者從山上北望猶在重霧中漸下漸開破壁飛流倒峽懸湍十里而至靈臺或從溪左或從溪右屢循流揭渡總在轟雷倒雪中行但澗崖危聳竹樹翳密懸墜不能下窺及下而渡澗又復平流處矣出峽抵盧臺始有平疇一壑亂流交湧畦間芒鞋沾濕夾溪四五家環堵離立遂托宿初五日東南越嶺行五里下至平疇是為大陂居民數家自成一壑一小溪自東北來乃何家坊之流也盧臺之溪自北來又有沙盤頭之溪自西北來合而南出陳錢口兩山如門路亦隨之出口即十八都平田東向大洋也大陂之水自北而出陳錢上陂之水自西而至車江二水合而東經錢山下平田者也路由車江循西溪五里至上陂復入仙渡溪南上門樓嶺五里越嶺復與溪㑹過平塢二里一峯當溪之中南北各有一溪瀠峯前而合是為月溪上流路從峯之南溪入南有石蘭衝頗突兀又三里登祝高嶺平行二里東南下二里過洞北西南登一小山石色潤而形巉由石隙下窺一窟四環有門當隙中內為庵後為石城洞洞外石崖四亘崖有隙東向庵即倚之庵北向洞在其左門東北向循級而下頗似陽羡張公洞門而大過之洞中高穹與張公並而深廣倍之其中一岡橫間內外分兩重外重有巨石分列門口如臺當臺之中兩石笋聳立而起其左右列者北崖有巨柱矗立大倍於笋而色甚古朴從石底高擎上屬洞頂旁有隙可環柱轉柱根湧起處有石環捧若植之盤中者其旁有攴洞曲而北再進又有一大柱下若蓮花圍疊成柱上如寶幢擎蓋屬頂旁亦有隙可循轉柱之左另環一竅支洞益穹因索炬不可得遂止初六日由洞門南越一嶺可五里其處西為西雲山東為佛子嶺之西垂望見東靣一山中剖如門意路且南向無由得一迫視又二里至樹林忽度橋轉而東一里正取道斷山間乃即東向洋溪大道也蓋自祝高嶺而南山分東西兩界中開大洋直南抵湯渡自斷山之東山又分南北二界中開大洋東抵洋溪而武功南靣與石門山之北彼此相對中又橫界祝高至兒坡一層遂分南北二大洋北洋西自上陂合陳錢口之水由錢山平田㑹於洋溪南洋西自斷山至路口水始東下合石門東麓盧子壠之水由塘前而㑹於洋溪二溪合流曰洋坌始勝舟而入安福初望斷山甚逼削及入之無竒也是名錯了坳入坳東南三里至午口南上嶺山峽片石森立色黑質秀如英石又二里一小峰特立而尖土人號曰夫子地東逾一嶺五里為銅坑坑南直上黑霧中五里忽聞溪聲喧沸已循危崖峭壁上行霧中下瞰皆峭石駢立溪上沈黑逼仄不能詳也已而竹影當前犬聲出户遂得石門寺問石門之竒尚在山頂五里而遙㑹雨大作因留寺初七日天雖霽露未晞日高乃上山逮下山日已過午以不及至梁上遂由舊路下至銅坑北向十里宿路口劉氏宅初八日西南向石門西北麓行即向所入夫子地處也五里小流自銅坑北麓西北注山峽間忽亂石蜿蜒中一石橫澗上流淙淙透其下玲瓏若雲片偃卧但流微梁伏似園亭中物巧而不巨耳又五里逾岡而得大澗一峯兀立澗北為洞仙岩踰澗南循西麓行其西即祝高南下之大洋也南為永新界五里與大路合又五里一大澗東自牢芳坳來坳在禾山純頂西北與石門南來之峯連列者渡之而南即為梁上復南五里連踰東來二澗過青塘墅又二里宿西塘初九日復南行西踰一北來之澗即前東來之澗轉而南者七里至湯渡始與大溪遇此溪發源祝高南合南下所經諸澗盤旋西山麓至此東轉始勝舟又五里至橋上其處有元陽觀元陽洞洞外列三門內可深入以不知竟失之道左渡溪踰山十里隨大溪東入峽又二里為龍山數家倚溪上循溪東去崖石飛突如蹲獅跳虎高瞰其上路出其下灘石激湧殊為壯觀三里峽漸開出峽南北廓然又二里溪轉而南高穹獨出與除夕李田所望無異始知牢芳嶺之東又分一支起為禾山而禾山又西環一支至高石坳也禾山西南有溪南下至此與龍江大溪合而南去路亦隨之五里渡龍田溪循溪南岸東向行又六里至路江與靜聞㑹初十日由路江循西來小水二十里為橋頭分兩道直西向者往茶陵道也渡溪西南向則艻子樹下道于是從西南道十里至界頭嶺為分界處蓋崇山南自崖子壠東峙為午家山東行者分永寧永新南北界北轉者至月嶺伏為塘石為茶陵永新界下嶺水即西流聞黃雩仙在其南遂迂道南入山十里南越一溪即黃雩下流也踰仙宮嶺下五里望南山高插天際者即午家山乃永寧茶陵界也北與仙宮夾而成塢中一峯自西而來至此始卓立下即黃雩廟廟南有澗奔湧不見上流察之則一竅伏卓峯之下亂波沸湧流出遂成滔滔之勢遊竟仍北出仙宮嶺十里與界頭之道合又一溪自西而東發源崖子壠在黃雩西北重山中渡溪北五里復得一溪亦向東去渡溪橋即為艻子樹下始見大溪自東南注西北小舟鱗次其下至高壠而更大艻子樹名昔有之今無矣徐霞客遊記卷二上欽定四庫全書徐霞客遊記卷二下明徐宏祖撰西南遊日記二湖廣十一日分靜聞舟從艻子樹順流至衡州期以衡之青草橋塔下豫同顧僕從陸探茶陵攸縣之勝順流西行八里越兩岡至蟠龍庵庵前道分為兩一小溪北自龍頭山來過溪直西去是為巫江乃茶陵大道隨山順流轉南去是為小江口乃雲嶁山道小江口即蟠龍巫江二溪北自龍頭至此南入黃雩大溪者雲嶁山在茶陵東五十里沙江之上其山深峭神廟中僧孤舟開山建剎孤舟故虎來寺攫僧去僧徒星散豺虎晝遊人無入者每從人問津俱戒莫入且雨霧沈霾莫為引道豫不為阻從蟠龍小路南沿小溪二里復與大溪遇渡溪南入山雨沈沈益甚西南三里大溪復自北來直逼山下盤曲山峽兩旁石崖水嚙成磯沿大溪二里至沙江即雲嶁溪入大溪處道遇一人持蓋將逺出見問雲嶁道即曰入此山非多人不可豫為君前驅因隨抵其家為余覓三人各持械具火冒雨入初循溪口東入一里一小溪自西峽透隙出望其石崖層亘外束如門導者曰此虎窟也樵採從未有入者遂溯雲嶁大溪宛轉二里溪底石峙如平臺中剖一道水由石間下甚為麗觀于是上山轉山嘴而下得平疇一壑曰和尚園四靣重峯環合平疇盡約一里復踰一小山循前溪上流曲折峽中一里抵雲嶁寺山深霧黑絶無一人而大雨促行遂同𨗳者出至溪口遇一舟附之順流下時衣履沾濕得舟甚適買薪炊粥炙衣無暇遑問兩旁崖石也山溪迂曲下午登舟四十里暮舟子宵征三十餘里泊東江口十二日聞靈岩在茶陵南十五里乃出城南渡酃水東南行陂陀上下五里得平疇曰歐江有溪東南來溯之行霧中望東山石甚兀突心異之又五里抵沙陂溪上亘圓頂如疊磨其內穹崖裂洞曰學堂岩再東山峽盤亘中曰石梁梁在㑹仙寨東谷其谷亂崖分亘攢列成塢兩轉而石梁東西橫列下開一竇由梁下北望别有天地透梁入梁上復開崖一層由東坡上直透梁中止登之如踐重樓又東一里乃北峽中一里得碧泉岩對獅岩俱南向又東踰嶺下北轉則為靈岩岩東向深數十丈高四丈自㑹仙岩至此山皆不甚高俱石崖盤亘堆環成壑為玦為門為岩為洞往往而是但石質粗而色赤無通漏潤澤觀惟石梁橫跨下復穹然此中八景為第一十三日返至茶陵南關外經大西門尋紫雲雲陽諸勝西向九里抵山麓曰沙江鋪大江至此直逼山下鋪西為攸縣安仁大道南登紫雲山上一里山半真武殿上則觀音庵俱北瞰來水詢雲陽道庵僧曰雲陽山西去此十里頂為老君岩雲陽仙在其東峰腋去頂三里雲陽仙之麓為赤松壇去雲陽仙亦三里紫雲乃雲陽東北盡處而赤松為雲陽正東麓由紫雲之北西順江岸三里為洪山廟乃登頂北道由紫雲南循山麓西四里即赤松壇則登頂東道也去頂各十里而近今觀音庵側西小徑二里可達羅漢洞庵亦有間道登頂不必下紫雲也豫從之由真武殿側西北度兩小坳一澗從西北來則紫雲與羅漢後山夾成者水北入大江紫雲為所界斷渡澗即羅漢庵庵東向余急於登頂從庵後西向登山濃霧翳山半不顧扳躋直上三里踰峯脊兩重霧漸開又上二里則峯脊冰塊盈柯大小依枝遇風雨輒墜時嵐霧悉消山之南與東二靣歷歷可睹酃江自東南黃雩江自西北盤曲甚逺始知雲陽之峯俱自西南走東北排列數重紫雲其北第一重也羅漢庵後豫所由躋者第二重也雲陽仙第三重也老君岩在其上為絶頂所謂七十一峯第一峯也頂峯在南余所登峯在北徑路迷絶西南望峯頂中隔一塢絶頂尚霾沈霧中俯瞰過脊處在峯足里許其上隔山竹樹一壑兩乳回環掩映疑即雲陽仙雖無徑急直墜下度脊上二里踰一小坳入雲陽仙庵庵北向登頂道由左畔上可五里至老君岩庵後有大石飛纍駕空竹樹懸綴石間五雷池澄碧迥異層岩上突無可扳陟且黑霧密翳其上辨晰甚難蓋余所登道當風無樹故冰僅隨枝堆積此庵中山峯環夾竹樹䝉茸縈霧成冰玲瓏滿樹每朔風一振鏗然傾地如頽玉山有積高二三尺者途為之阻通頂處更難登陟因問赤松壇而僧楚音訛為石洞豫貪石洞之竒遂舍登頂東下山路側澗流瀉石間僧指為子房煉丹池仙人指跡諸勝余笑頷之直下三里抵赤松壇始知赤松非石洞殿前特古松一株無他勝十四日濃霧四合無復登頂望循山麓北行踰小澗二重共四里過紫雲麓又六里抵洪山廟風雨暴至市薪煨榾柮者竟日廟後有大道南登絶頂時廟下泊數艘俱苦石尤不能順流下屢招豫為明日行豫猶不能恝然雲陽頂也十五日泊舟將放招豫速下舟豫見四山霧舒雲泄遂决䇿登山由廟後南向登三里一高峯北峙道分兩岐豫初岐東南疑由羅漢峽向雲陽仙非徑造老君岩者乃復轉西南岐不一里陟高峯西峽顧僕南見峽頂若石梁東西架豫瞻眺不及及西上嶺側大江已環其西大道乃西北下者遂望嶺頭南躋上嶺頭冰葉紛披雖無徑著迹豫意得石梁勝亦可以少慰升嶺遍覓無有飛架石苐見是嶺脊東南橫屬高頂其為登頂道無疑遂東南度脊仰首直上又一里再踰脊下瞰脊南雲陽仙已在屐底蓋是脊東西橫亘西為絶頂北盡境東即屬前登雲陽第二重嶺也于是始得道更南向上冰雪峰接行冰花玉樹中一里連過兩峯始陟最高頂從峯脊南下又一里復過兩峯有十字微路界峯坳南上復登山頂東西俱由山半下然脊北頂雖極高純土無石脊南峯較下而東靣石崖高穹峯笋森立乃從南嶺東扳崖踞石瞰塢中茅龕意即老君岩靜室因上已盡勝不必下時欲探秦人洞乃從西路行山隂冰棘縈阻舉足甚艱不二里道絶四顧皆茅茨僵凍舉首投足上下觸困兼茅中時有偃宕疑為虎穴山下復重霧四沈瞰眺莫燭計難再下復望山巔上凍滑草附隨躋輒墮念嶺峻草開可脫虎口益鼓勇直上二里復得頂北望前所西下脊又隔二峯矣又南一里再下二峯忽亂石排空片片攢刃交㦸霧盛風急從中溜足直下强扳崖踞坐益自豪既下石峰坳中復得十字路西向下嶺二里草叢中時有細路又二里路微而石樹䝉翳又二里則石懸樹密路益絶蓋始路踰嶺而西聞茶陵人自東來燒木為炭至此輒返過此崖窮樹深上者不能下下者亦不復上遂與顧僕掛石投崖懸藤倒柯墜空者數層漸聞水聲終不識去人境逺近已而露影一閃露出層峯夾谷樹色深茂又見谷口兩重外平塢可矚乃益撥叢歷級既而下一懸崖忽得枯澗可踐石行澗翳草中不辨水石為力甚艱三里下一瀑崖微見路影時隱現草間又一里澗從崖間破峽出兩峽劈峙北尤斗峭始得道從南崖踰嶺出又一里遇北來大道一村居曰窰裏蓋雲陽西塢也其地東北轉洪山廟五里而遙南去秦人洞十五里遂南循山峽行踰一小嶺五里上棗核嶺嶺俱雲陽西向度而北轉成峽者十一里渡澗澗乃南自龍頭嶺下出上清洞依西麓溯澗南上半里為絡絲潭深碧無底兩崖多疊石又半里復渡澗依東麓登山是處東為雲陽之南峯西為大嶺大嶺高並雲陽龍頭嶺其過脊也其東南盡西嶺東北抵麻葉洞西北峙五鳳樓西南為古爽冲一溪自大嶺東北來者乃洪碧山之水一溪自龍頭嶺北下者乃大嶺雲陽過脊之水二水合北出把匕龍頭嶺水南下者合秦人洞水出大羅埠越龍頭二里得平疇曰東嶺塢塢內水田平衍村居稠密東即雲陽西即大嶺北即龍頭嶺過脊南為東嶺回環余始至以為平地及下東嶺而後知在衆山上也循塢東一里宿新庵十六日南行一里登東嶺即從嶺上西行嶺頭多漩窩成潭如釡之仰釡底俱有穴直下為井深或不見底是為九十九井山下俱石骨崆峒上透一竅輒水搗成井井雖枯眢無水然亦以九十九竒也又西一里西南谷中四山環繞亦成仰釡釡底有澗澗東西皆秦人洞也灌莽中直下二里至其處澗由西洞出入東洞澗橫界釡中東西長半里中流先搗入一穴旋透穴東出即自石峽中行峽南北俱石崖壁立夾成橫槽水由槽中抵東洞南向倒入洞口洞有兩門北向水先分入小門透峽下傾人不能從稍東南入大門者從衆石中漫流勢較平但洞內水滙成潭深浸洞兩崖旁無餘隙可入循崖則路斷從水則苦無浮槎惟小門水入峽後亦旁通大洞流可揭厲入其隙宛轉分徹如軒楞别啓返矚倒入之勢甚竒西洞洞門東穹按東高少殺水由洞後東向出亦較淺可涉入洞五六丈上嵌圓頂四圍飛石架空兩重如􅍥懸閣得二丈梯可度上其下再入水亦成潭深並東洞不能入出西洞踰嶺二里南抵塢下東洞水東向湧出山麓亦如黃雩之出石下也土人環石為陂壅成巨潭以灌山塍水南流出谷路從其東北上嶺共三里仍達東嶺塢十七日仍由新庵北下龍頭嶺共五里至絡絲潭下先是余按志有秦人三洞上洞惟石門不可入豫既得東西兩洞無從覓所謂上洞者土人曰絡絲潭北有上清潭門甚隘水由中出人不能入入即有竒勝此洞與麻葉洞俱神龍蟄處非惟難入亦不敢入也余聞之益喜甚既過絡絲潭不渡澗即依西麓下蓋渡澗為東麓雲陽之西也棗核故道不渡澗為西麓大嶺洪碧之東也出把匕道北半里至上清潭洞即在路之下澗之上門東向夾如合掌水由洞出有三派自洞後者滙而不流由洞左者乃洞南旁竇出甚急逾洞左急流即當伏水入導者止供炬無肯為前驅者余解衣伏水蛇行以進石隙低而隘水沒大半必身伏水中手擎炬平出水上乃得入西入二丈隙始高裂丈餘南北橫裂者亦三丈然都無入處惟直西一竇濶一尺五寸高二尺水沒其中者如所濶隙餘水靣僅得尺之半計匐匍水中必口鼻俱濡水且以炬探之貼隙頂入猶半為水漬時顧僕守衣洞外若泅水入誰為遞炬者身可由水炬豈能由水耶况秦人洞水雖沒股膝溫然可近此水獨寒而洞當風口颼颼尤厲風兼水逼火復阻道舍之出爇火洞門久之復循西麓隨水北已在棗核嶺西矣去上清三里得麻葉洞洞在麻葉灣西大嶺南洪碧東即雲陽棗核之支北則棗核西垂也大嶺東轉正束澗下流夾峙如門當門一石峯聳突曰將軍嶺澗搗其西而棗核一支西至此盡澗西有石崖南向東瞰澗中大嶺一支亦東至此盡回崖之下開一隙淺不能入崖前有小溪自西而東入大澗循小溪至崖西亂石間水窮於下竅啓於上即麻葉洞洞口南向僅斗大在石隙中轉折數級下初覓導亦俱以炬應無敢導者且曰此中有神龍竒鬼非符術不能服最後以重資覓一人將脫衣問余乃儒者非法士驚出曰余以為大師故縱膽入豈能身狥汝耶余乃寄行李前村與顧僕各持數炬入村民隨至洞口者數十人皆莫能從豫兩人乃以足先入歷級轉竇遞炬下數轉達洞底洞稍寬可側身舒首乃以炬前向其東西裂隙俱無入處其北一穴低僅尺濶等下甚平燥先以炬後蛇伏進背腹摩貼足後聳乃度此內洞第一關內裂隙既高東西橫亘然亦無入處又度第二關低隘與前齊規進法亦如之既入內層亦橫裂西南裂者不甚深其東北裂處上一石坳忽又縱裂起上穹下狹高不見頂至此石坳殊形膚理頓易片竅俱欲生動其西北之峽漸入漸束內夾一縫不能容炬轉從東南峽仍下一坳其底砂石平鋪如澗底潔溜乾燥鮮水峽東南盡處亂石矗駕疊成樓臺由其隙皆可扳躋上其上石竇一縷直徹洞頂光由隙中下射宛如鉤月澗底南通覆石低壓高僅尺許此必前通洞外澗所從入者由層石下北循澗底入隘低甚與外二關相似稍從其西攀上一石隙北轉而東若度鞍歷嶠兩壁石色石質光瑩欲滴垂柱倒蓮紋同雕刻東下一級復值澗底已轉入隘關內闢成一弄濶二丈高殺其五尺覆石平如布幄北池坦底半里許下有一石􅍥出為榻楞邊明辨上則蓮英下垂連接成幃四圍垂幔大與榻並中圓透盤空上穹為頂其後西壁玉柱圓竪大小不一而色皆瑩素紋絶刻鏤弄中第一竒也又直北半里洞分上下兩層澗底東北去上洞登自西北時所齎火炬已去其七恐迷歸路遂割竒返抵透光處炬裁盡洞外守視者又增數十人見豫兩人皆額禮稱異且曰久待不出疑墮異吻余各謝之然此洞入處多隘其中美勝豫所見洞俱莫及不知土人何畏入乃爾乃取行李前村隨澗北十里抵大道又西十里宿黃石鋪去茶陵西已四十里鋪南即大嶺北峙峰石俱嶙峋插空西南一峯尤甚名五鳳樓去十里而近即安仁道余早臥不及詢明發登途知已無及黃石西北三十里為高暑山又有小暑山俱在攸縣東疑即司空山也二山之西高峯漸伏茶陵江北曲經高暑南麓而西攸水在山北是山界茶攸兩江云十八日西北五十里抵攸縣十九日西南四十五里下太平寺嶺則大江在其下隔江即芒洲也候舟不得宿泊舟間二十日上午始得舟順流西北向山峽行二十五里大鵝灘十五里過下埠下四鄉灘險甚過此山始開江乃西向二十五里北下橫道灘又十五里宿宿子坪民舍二十一日四鼓舟人乘月促下舟二十里雷家埠出湘江又東北十五里抵衡山縣出望嶽門三里越桐木嶺始有大松立路側又二里石陂橋松始夾道五里過九龍泉又五里師姑橋夾路松盡山隴始開乃見祝融峯北峙五里入山復得松又五里路北有子抱母松又五里過司馬橋入謁嶽廟問水簾洞在山東北隅非逐山道遂東出嶽市東北三里有小溪自嶽東高峯來入小徑三里上山峽即望見水簾布石崖下二里造其處乃瀑之瀉於澗者非洞也下山又東北二里登山循峽踰一隘中峯回水繞為九真洞亦山峽間瀑也在紫蓋峯下踰山而北尚有洞亦山塢漸近湘潭境余見日將暮遂出山十里宿嶽廟二十二日力疾登山由嶽廟西渡將軍橋嶽廟東西皆澗北入山一里為紫雲洞亦無洞山前一岡當户環成耳由此上嶺一里大石後度一脊里許路南有鐵佛寺寺後躋級一里路兩旁俱細竹䝉茸上嶺得丹霞寺從寺側北上由絡絲潭北下一嶺又循絡絲上流之澗一里為寶善堂其處澗從東西兩壑來堂有大石如壁西澗環石下出玉板橋與東澗合而南寶善界兩澗之中去嶽廟已五里堂後躡磴一里又循西澗嶺東平行二里為半雲庵庵後渡澗西躡級直上二里上一峯為茶庵又直上三里踰一峯得半山庵路甚峻由半山庵丹霞側北上竹樹交映青翠滴衣竹中聞泉聲淙淙自半雲踰澗全不與水遇以為山高無水至是聞之殊快時欲登頂過諸寺俱不入由丹霞上三里為湘南寺又二里南天門平行東向二里分路南一里飛來船講經臺轉至舊路又東下半里北度脊西北上三里抵上封寺寺東有虎跑泉西有卓錫泉凡住寺三日二十六日至觀音崖再上祝融㑹仙橋由不語崖西下八里路分南北北二里九龍坪仍轉路口南一里茅坪東南由山半行四里渡亂澗至大坪分路東南上南天門道豫乃從西南小路直上四里為老龍池在嶺坳嶺外多净室西南至側刀之西雷祖之東東二里上側刀峯平行頂上二里下山頂度脊甚狹行赤帝峰北一里繞其東乃南由坳中東行一里轉出天柱東遂南下五里過獅子山與大路合由岐路西入福嚴寺二十七日由寺西循天柱南一里又西上二里越南分脊北轉循天柱西一里上西來脊遂由脊上西南行循華蓋東轉出其南麓西三里復循華蓋西北下風雨大至北過一小坪復上嶺共一里轉西行嶺脊上連度三脊或循嶺北或循嶺南共三里復上嶺直上二里為觀音峯峰北樹中行三里雨始止沈霧益甚西南下一里得觀音庵又下一里為羅漢臺有路自北塢至者即南溝來道復南上三里度二脊既踰高頂南下一里得叢木一丘曰雲霧堂又南下一里為東來大路遂西下又一里半至澗度橋而西至方廣寺蓋大嶺之南石廩峰分支西下為蓮花諸峯北則雲霧頂分支西下為泉室天台諸峯夾而成塢寺居其中水口西去環鎖甚隘亦一勝地也寺西有洗衲池補衣石在澗旁度水口橋即北上山三里得三台寺蓋泉室峯又西起高頂突為天台峰西垂一支環轉而南若大尾之掉幾東接其南下之支南靣水僅成峽內環一塢如玦在高原之上與方廣方稱上下二竒仍返宿方廣二十八日出補衲臺沿澗西行五里石樹瀠溪岩影溪聲澄滌胸目又二里隔溪前山有峽自東南來與方廣水合流西去路遂北向登崖崖下石樹愈密澗在深壑中有黑白黃三龍潭兩崖峭削路折而上聞聲而已不能見也已平行山半共三里過鵝公嘴得龍潭寺寺天台西峯下南為雙髻峰蓋天台雙髻夾而西來以成龍潭潭北上即寺寺西為獅子峯尖削特立天台以西峯至此盡其南隔溪即雙髻峯而蓮花以西峯亦至此盡過九龍猶平行山半五里自獅子峯南繞其西下山又五里為跡橋而衡嶽西面之山始盡橋東去龍潭十里西去湘鄉界四十里西北去白高三十里南至衡陽界孟公坳五里自馬跡橋南渡一澗澗即方廣九龍水去白高者東南行四里又越小橋一里上一低坳不知其界頭也過坳五里有水自東北山間懸崖下高數十仞曰小響水塘亦衡嶽餘波也又二里有水自北山懸崖飛瀉為大響水塘濶大過前崖而水分兩級轉下峽間初見上級後見下級故覺其不及前崖飛流直下也前即寧水南出沙河下衡郡草橋由寧水橋五里過國清亭踰小嶺為穆家洞洞回環圓整水自東南環東北乃石廩峯西南峽中水山環如水而東附於衡山之西經洞二里復南踰一嶺二里為陶朱下洞洞甚隘水直西出路又南入峽二里復踰嶺為陶朱中洞水亦西出又南二里上嶺坳甚隘為陶朱三洞敞於前二洞而不及穆洞之回環二里又踰嶺為界江江之西曰大海嶺溯水南行一里上一坳至傍塘即隨水東南行五里抵黑山又五里水口兩山逼凑水由其內破壁入一里水始出峽路亦夷又一里為橫口傍塘黑山之水南下岣嶁之水西南來至此合北望岣嶁白石諸峯甚近南去衡郡五十里二十九日沿溪南行踰大小犂坪共五里復與溪遇循溪東南下十里越溪又五里入排衝排衝者山岡自黑山西之談碧嶺東南至青山分為兩支俱西北轉兩岡排列夾為長塢至青山坳凡五里塢始窮乃踰坳而南十里下望日坳至黃沙灣則蒸江自西南來路隨江東南下又五里抵衡郡之草橋覓靜聞暮得之緑竹庵瑞光上人處庵在北門外華嚴松羅諸庵間八庵聯絡俱幽靜明潔唄誦之聲相聞乃桂藩焚修地二月初一日由庵東南踰小嶺至湘江溯江至蒸水入湘處渡江登東岸東南行六里復西五里從丁家渡渡江已在郡南門外登崖上回雁峯峰不甚高東臨湘水北瞰郡城俱在足下雁峯寺籠罩峰頂無餘隙仍出北門登石鼓山山在臨蒸驛後湘江流其南蒸江北繞山由其間東突成峰前有禹碑亭後為崇業堂再上宣聖殿中峙焉殿後高閣甚暢曰大觀樓平視衡城與回雁南北相對蒸湘夾其左右俯出窗楞下近而萬家烟市三水帆檣逺極於嶽雲嶺木亦為披映雖書院宏偉不及吉安白鷺乃地為名賢樂育之區兼滕王黃鶴諸勝非白鷺所得侔矣樓後為七賢祠最後為生生閣閣東向下瞰蒸湘合流於前未水北入二里外與大觀東西易向大觀踞山頂收南北西三靣之竒此則東盡二江合流之勝者也又東為合江亭址稍下臨流愈近下樓過青草橋東北二里入緑竹庵來雁塔者衡州下流第二重水口山也石鼓從郡城東北特起垂江為第一重雁塔又峙於蒸水東耒水北為第二重南瀕江與石鼓夾峙蒸水左右初二日至初六日俱阻雨庵中初七日靜聞同顧僕定永州船豫循麓東入桂花園乃桂藩新構慶桂堂地前列丹桂三株皆聳幹參天接隂蔽日其北寶珠茶五株高大亞之鬱森殊匹又東為桃花源西自華嚴天母二庵來南北俱高岡夾峙中層疊為池池兩傍依岡分塢皆梵宮紺宇諸藩閹亭榭錯出其間桃花源上即桃花冲乃嶺坳也其南最高處結亭曰停雲從亭北逾桃花冲坳東復岡夾成池越池而上即來雁塔塔前為雙練塘西對石鼓返眺蒸湘交㑹亦甚勝因促僧登塔歷五層四眺諸峯北惟衡嶽最高次則西之雨母山又次則西北大海嶺餘皆岡壟高下無甚崢嶸而東南二靣豁然無際湘水自回雁北注城東至石鼓合蒸東轉經塔下東合耒水北去三水曲折不及長江一望無盡而紆回殊足戀也歸庵晤靜聞知舟行期二日後初八日入郡出城南一里由回雁麓一里入花藥山山不甚高即回雁西轉回環下府城者諸峯如開翅舒翼四拱成塢有寺當其中若在城郭內𢎞敞為一方冠初九日移行李舟中雨不止舟泊不行初十日僅行舟五里泊水府廟十一日二十五里南上鈎欄灘衡南首灘也西二十五里為車江折而東南二十里為新塘站又二里泊新塘上流之對涯二鼓中盜囊洗僅脫身顧僕被重創十二日賴靜聞於㷊餘中拔得衣被數件體得蔽時劫舟已沈鍋具焚沒無餘靜聞沒水取得一鐵銚漉取江底濕米煮粥遍食諸難者余三人因附土人舟返衡府舟頗大篙師僅一人抵鐵樓門已五鼓十三日入城投金祥甫欲假遊資於桂藩金其書記也日復一日竟不得要領二十日出步柴埠門外途遇折寶珠茶者花大瓣密其紅映日又見千葉緋桃含包大如鐘皆桃花冲物也余擬往觀之二十二日同靜聞出瞻嶽門越草橋過緑竹庵桃花歷亂入桂花園則寶珠盛放花巨如盤殷紅密瓣萬朵浮圍翠之上真大觀不復知身在窘難中也望隔溪塢內桃花竹色映帶生姿中有閣臨流亭新其巔循級入登山踞亭為之憮然二十六日金鬮㑹得百金貸豫二十金㑹桂藩復有所捐助靜聞不能無望豫議先往道州留靜聞候坐郡中待余還同西行三月初三日下午風雨作舟子遷延晚始移泊南門埠初四日下午過汊江抵雲集潭去前日被盜處不逺初五日平明發舟風頗利十里過前日畏途沈舟猶在也四里過香爐山上有灘頗高又二十五里過桂陽河口桂陽河自南岸入湘舂水出道州舂陵山巋水出寧逺九疑山經桂陽西境合流至此入湘為常寧縣界由河口入抵桂陽尚三百里又四里止瓦洲夾初六日二十里過白坊驛又西南三十里為常寧水口水從東岸入湘亦如桂陽河口水較小常寧縣治猶在江之東南也西十五里泊糧船埠初七日西南十五里至河洲驛此地湘江東岸為常寧界西岸為永之祁陽界皆平陵擴然岡阜逺疊三十里過大鋪兩岸俱祁陽屬上九州灘又三十里至歸陽驛初八日西七十五里泊石壩裏初九日五十餘里下午抵祁陽余病不能登昨豫將至白水驛力疾西望一橫山如列屏至是舟溯流而西又北轉已出是山之陽蓋祁山也山在湘江北縣在湘江西祁水南相距十五里上流則湘自南來循城東抵山南轉祁水西自邵陽來東入湘遂並東曲去初十日舟以候客未發余念浯溪勝不可不登乃沿江南五里渡之東已在浯溪下溪由東西入湘流甚細溪北三崖駢峙西臨湘江中崖最高顔魯公所書中興頌高鐫崖壁前有亭下臨湘水崖巔巉石簇立如芙蓉叢萼余病怯不能登臥崖邊石上仰觀久之舟至又行二十里過新婦塘江北岸一石娉婷立岩端矯首作西望狀下有小鮮曰竹魚極腴八九月重一二斤他處所無又十里泊舟滴水崖崖在江南岸危岩亘空十一日六十五里扺七里灘十二日二十里過冷水灘舟循東岸行隔江聚落俱在石崖上瀕江石骨嶙峋直插水底闤闠之址以石不以土人從崖隙拾級以登真山水中窟宅也忽南風大作薄暮稍殺舟乃行五里已暮乘月行五里抵區河十三日四十里至湘口關湘江自西南瀟江自東南合於其前豫舟由瀟入十里為永郡西門之浮橋已一舟從後來豫移附其中蓋以明日向道州者下午舟過浮橋泊小西門隔江望西岸石甚森幻中一溪自西來注石梁跨其上心異之循城而北西越浮橋則浮橋西岸異石張吸土人問愚溪橋即浮橋南畔溪上跨石者是鉆鉧潭則直西半里路旁嵌溪者是始知潭即愚溪上流潭從西橋從南也乃遵通衢直西去路左人家隙中時見小溪流石間半里過桞子祠祠南向臨溪再西抵茶庵溪自南來沿石東轉轉處石勢尤森特但亦溪灣一曲耳無所謂潭也求小丘小石潭俱無能識者是水發源永州南百里之鴉山有冉染二名桞子易之以愚按文求小丘當即茶庵也庵去潭西數十步叢丘之上為此中鼎剎求西山亦無知者後讀芝山碑謂芝山即西山亦非也芝山逺在北當即柳子祠後圓峯高頂今為護珠庵者是聞庵間有柳子崖則為西山信矣余覓道其間西北登山崖已蕪竟不得道乃西南繞茶庵前復東返桞子祠前渡溪南越一岡東轉出愚溪橋橋兩端架瀟江之上即前所望異石也因搜踞石窟上下穿眺尤幻橋內一庵曰圓通北向俯溪有竹木勝時舟在隔江城下以舟子遲待豫乃返十四日晨過浮橋西見一長者叩以永州最勝曰溯江南二里瀕江為朝陽岩北隨江轉入山岡亦二里為芝山岩無得而三也豫乃先北趨芝山循江西岸半里至劉侍御山房由其側北入山越一嶺又北踰山岡登其山見山之西北湘水在北稍逺近則一小水從西來東南則瀟水在其東瀟江東岸有塔臨江與此山夾瀟為永水口蓋此即西山北走之支北盡瀟湘合流處當即桞子所記萬石山郡人則稱為芝山云越嶺北從嶺上東轉前望樹色合隂石崖矗奮知異境到矣即下崖腳仰望有庵倚之路繞其北而上乃舍庵上趨則崖石聳透固竒而兩旁亂石森立上下起伏如蓮萼芝房中房外簇隨地而是小徑由其間上至崖頂穿一石關入有室南向繞其南西穿石隙而入仍從西峽下至崖腳一路竹木扶疏玉蘭鋪雪入崖下庵庵北一小閣可憩南結精廬倚之門在其左僧從內啓扉入小庭側竇穿臥隙而上崖石穿然一亭綴石末四窗空明花籜間發若置身盆石窈窕中出返至浮橋聞直西四十里有寺曰石門山最勝渴登朝陽岩不及往分令顧僕從橋東溯湘放舟南上豫從橋西仍過愚溪橋溯瀟西岸南行一里大道西南折道州道也由岐徑東南一里則一山怒而𥪡石奔與江鬬踰其上東俯入石關內飛石浮雲旁下瞰瀟水即朝陽岩矣岩後通前豁上覆重崖絶壑臨其下憩倚於中烟帆逺近與溪雲山鳥相出沒遊目所及勝常迭供甫定而山谷傳響舟人已放舟於下促下舟余不顧崖北有石磴直下緣江急從之磴西倚危崖澄江東逼盡處忽有洞岈然高濶共四丈亦東靣江溪流自中噴玉出水洞也洞口少入即南轉平整軒潔大江當其門內界流泉與上岩高下擅竒入五六丈即滙流滿洞洞西轉而黑計可揭進無炬乃出其北更有一岩覆結竒雲踵插淵黛土人橫棧架板若閣道仍從石磴透出岩後凌絶頂佛廬插其上舟人促不已乃下舟溯江漸東折七里至香爐山尖鋭若髻石骨攢簇獨峙江西岸時見佳植綴搖下午過金牛灘上有金牛嶺嶺北峯尖削南則橫突三峯江流直搗其脅至是舟始南泊廟下舟行已五十里陸路止二十里先是聞永州南二十里有淡岩不意舟帆竟日岩猶在前也計明晨過其下舟人執不肯待余念陸近水逺不若聽舟去從陸躡之十五日五里至岩北亟登涯期舟於雙牌雙牌者郡南五十里鋪也郡南二十五里為岩北陸至此與江合陸即南入山又二十五里至雙牌水道則東迂溯江至雙牌又六十里計舟一日僅抵此余不難負病追躡也岩背東北臨江從其南二里西向入山岩俱怒湧作攫人狀已望見西峯前突西峯聳石尤異及登之官舍半頽先是西峯之陽望見洞門高張至是路從其側出上見石崖攢舞環玦東向下則中空成岩容數百人下平上穹明奧幽爽無逼仄昏昧苦北洞底亦有垂石環轉覆楞分內外者巨石磊砢界道石上多宋人題刻黃山谷最愛此丘謂為此中第一岩東穿腋竅上有門上通叢石間東瞰官舍後回谷岩西南又闢一門踰門出其右石壁穹然僧寮倚之西眺山下平疇桑麻布壤中有進賢江發源自龍洞洞去永城西南七十里江東來直逼山麓北入瀟江側又有水洞去此二里秉炬可深入從僧寮循岩南東行過前所望洞門高張處門雖峻中夾不廣內亦不能上達後岩也仍冒雨東出臨江江迢迢在數里外淡山南即崇山排亘支分東走故江道東曲避之乃舍江南行七里至木排鋪又南踰小嶺三里為陽江江不能勝舟西南自大小葉江來至此二十餘里東注瀟其北則西嶺橫亘南則曹祖山張家冲諸峯駢立於前又南七里直抵張家冲東麓曰陳皮鋪又南三里踰嶺望西山層墜下時見石骨標異舉竒已復靈凑一區衆竅併幻亟西披之則片石層層盡若雞距龍爪下蹲於地又如絲瓜之囊筋縷外貫而中悉透空但上下為蔓棘阻纒無從扳躋隨之南見旁有隙土新剃者輒捫入然每至純石即復不剃問之路旁荷鋤者曰是乃和尚嶺皆石山也其西大山曰七十雷因指路隅一庵後更勝從之則大道直出石壁下忽石屏插起上多透明隙形備生躍清泉一泓下穿雲根出有庵在其南問之僧則出水崖也仰見崖後石勢駢􅓜側有路一線皆其剃地徑也賈勇從之其上石皆如臥龍翥鳳出水青蓮萼􅓜瓣裂轉至出水崖後覺茹吐一區包裹􅓜沓而窈窕無竟蓋其處西亘七十二雷大山叢嶺南列惟東北下臨官道又出水崖障其東北復屏和尚嶺四靣外同錯綺其中怪石層朋采艷奪目余乃透數峽進東北屏崖之巔有石高䂬若天門上開不可慰即䂬石西南即出水崖內壑一潭澄石隙中三靣削壁下嵌不見其底若爬梳沙蔓令石與水接武陵漁當為移棹余歷選山棲佳勝此為第一而九疑尤溪村口稍次云搜剔久之始下由庵側南二里得大道一溪自西南山凹來過溪東南一里復與瀟江遇溯江西南三里抵雙牌舟適至下舟西南豁然若可逺達舟反向南山入瀧蓋瀟水南自青口合沱水即入山峽中是曰瀧口北行七十里皆連山駢峽虧蔽天日且水傾瀉直中下所謂瀧也中瀧有麻潭驛南四十里屬道北三十里屬零陵時風色甚利薄暮乘風驅舟舟灘捲浪如雷五里入瀧又五里泊橫口自永州至雙牌陸五十里水倍之雙牌至道州水陸俱由瀧中行無他道故瀧中七十里止有順逆分無水陸異出瀧至道州又陸徑水曲矣十六日二十里為麻潭驛零陵界盡南即道州境自入瀧來山勢逼來石灘懸亘山鵑盛開皆在水涯岸側不作漫山布谷觀映碧流丹尤覺有異二十里至吳壘鋪西南山稍遜舟反東轉又五里復南又十里山勢愈逼束為瀧口又五里泊將軍灘灘有峯立瀧口若當關然溯流出瀧劃然另闢區宇是夜明月徹夕入春僅見十七日山開水曲五里至青口一水東自山峽出寧逺道也此水最大即瀟水一水平曠中南來者即道州道也此為沱水水小弱乃舍瀟南溯沱又五里為泥江口水西通營陽舟上羅坪三日程當即營水矣又三十里抵道州登南城回眺州城南憑江水東南西三門俱瀕江蓋沱水自江華掩遨二水自永明俱合於州西南十五里外東北抵城西南隅繞南門至東門復東南去若彎弓而城臨其背十八日過城東半里有小橋即涍泉入江處泉流甚微橋側有石突立江濱狀如永州愚溪橋透漏聳削過之分岐空腹隙可穿竇入所謂五如石也中一石擊之幽亮為響石按元次山道州詩題石有五如窊樽而窊樽莫覔屢詢於人有云在報恩寺舍之出州西門南折過翼雲橋有二岐從西二十五里為濓溪祠又十里為月岩從南為十里鋪又六十里為永明縣十里鋪側有華岩岩下間道可出濓溪祠余欲兼收之遂從南行大道兩旁分植喬松如南嶽道中密過之有松自下分柯五六枝􅓜挺競秀此中特見他處所無也聞自州至永明松夾道者且七十里州西南皆岡坡高下道因之四顧崇山開逺惟西北一山最高較近則月岩後所倚大山也至十里鋪東從小徑北半里為華岩洞門北向小水自洞下出由洞入止聞水聲東轉三丈餘復南下則穹然深暗聞其內一炬可盡行急不及覓炬遂北向小徑行山俱小而峭或孤峙或兩或三石骨嶙峋草木搖揚其上曲折升降如在崩雲頽浪中而西北崇峯時從山隙瞻一靣五里橫過山蹊四五重度一小石橋又踰嶺得西道從之二里又北入小徑共四里轉出平疇則道州西來大道也前一里扺濓溪祠祠北向環山不臨水前擴然容萬馬乃元公所生也濓溪則自祠西豸山麓北注乃西一里過豸山北渡濓溪溪自月岩來至此為豸山東障乃北走又東至州西入沱水從溪北西溯五里抵達村西南入山路旁一峯甚圓鋭出其南從此亂峯漸多為錐為指為列屏俱環映大山東牽引成蔓五里南轉入亂山腋又三里西越嶺望見正西一山白烟一抹橫其腰即月岩上層透空處也蓋高山西立若齊天不可階東下三級得此山中空上䂬下闢重門光徹前巒遙睇之如白雲浮動耳又二里抵月岩山下從東麓拾級上先入下岩岩東向中空上合高環成梁下望如於菟張吻目光牙血宛然令人畏栗復從岩上遍歷諸勝即月岩宿十九日仍過所望岩如白烟處分岐東南行穿小石山腋宛轉羣隊中八里出山渡大溪東南十里至武田再東半里即永明大道橫過大道南一里半大溪湯湯介於前為永明掩遨二水渡江東南行六里得板道甚大南隨板道十里止板寮二十日東南從小徑一里出江華大道南為火燒鋪在州南三十里而逺又五里為營上則中江華道州設營兵以守者後有小尖峰倚之東數里外高峯屼起為楊桞塘屏亘而南九疑當在其東矣南八里有溪自西而東石巉然橫臥澗中清流潄之不减包園石壑南十二里至伽祐鋪去江華十里由鋪南直下一徑可通浪石寺東南轉從嶺上行共七里至江華城西出城南東南一里為麻拐岩又名回龍庵由庵沿江岸南行半里水分二道來一自東山谷中者其水較大即沱水也一自南來者可通小舟發源自上武堡堡南即為廣西賀縣界大小二江合於麻拐岩之南大江東源錦田所澗流二百餘里舟行三四日可至小江南自上武堡舟溯流僅到白馬營可五十里然入江之口即積石為方堰置中流橫遏江舟不得上下堰內另置小舟外有橋橫板以渡白馬營東大山曰吳望山有秦洞甚竒惜未至又南始至上武堡堡東大山曰冬冷山二山之水合出白馬營為小江上流乃沿南來小江岸西行三里宿浪石寺二十一日欲往蓮花洞候引導者久之得一人由寺西遵大路行南去山盡即上武堡西踰大佛凹為富川道凹去江華西十里聞踰凹西二十里為崇柏即永明界又西二十五里過枇杷所在永明東南三十里為廣西富川界更西南三十里即富川縣治云遂七里直抵大佛嶺下先是南路一岩若雲楞嵌垂豫意蓮花在是而岩尚在路北大嶺麓乃從北岐小徑入不半里至洞下導者取枯竹一大捆縛為六大炬分肩以入出復探路左洞披棘以進還飯浪石已過午乃循舊路抵麻拐岩西合江口南渡小江堰外橋東南三里至重元觀寺南里許入獅子洞出返麻拐岩北登嶺直北行已過東門外矣又北踰嶺渡沱水北宿江渡二十二日循東山東北行十里為蠟樹營由此漸循山東轉五里過鼇頭北麓又十里過馬岡原自鼇頭至是皆循山北東向行山南悉猺人居東十里逾虎版石為分村東渡兩大溪共十里於是東登嶺先抵南靣崇山至是北亦有山橫列路遂東向兩山間升陟岡坳十里抵孟坳橋西彭家村二十三日東一里南列山已盡轉而西列路循之南轉五里抵塘村坳其東又有峯卓錐立㦸亦自南趨北與西靣之山若排闥直南遙望處中𥪡一峯如當門之標望之神動惟恐道不出其下南七里東度一橋小溪甚急踰橋則大溪南自九疑北出青口即瀟水上流也北望小溪入江口有衆舟艤其側渡大溪東南十二里直逼東界亂峯下南六里至掩口營始與寧逺南來之道合北去寧逺三十里掩口之南東西排岫橫障至此凑合成門向所望當門之標已列其東岫首而西障東垂亦𥪡一峯若插屏若攢指若亘垣與東岫競勝二里出凑門之下水亦從中南出其下平疇擴然東西成壑路從西峯南轉西向行又三里至路亭二十四日西五里為太平營由此西北入山多亂峯環岫蓋掩口東峰排列為劒㦸此處諸岫如攢隊合圍中環成洞穿一隙入如另闢城垣山不甚高而窈窕回合夾道皆宛轉之洞卓立之峯崆峒之石噴雪驚濤之初漲如是十里至聖殿聖殿者舜陵也豫初從岐路望之見頽垣一二楹路復蕪沒竟從其東踰嶺北北二里問耕夫已過聖殿抵斜岩矣遂西靣登山則穹岩東向高張甚宏敞洞門石峯中峙門界為兩飛泉傾布其上岩右垂石縱橫岩底有泉懸空下或從石端直注或依石竇斜噴衆隙亂流顧盼交射更一竒也下復開一岩深下亦極宏峻然不能逺透岩之左上層復開一岩圓整高朗若樓閣乘虛正對洞門中峙峯兩瀑懸簾其前為外岩最麗處下有池瀦水一方不見所出復無盈溢池北一門復開即左岩下層也由其內墜級下為深入道明宗上人曰此間勝迹君當先了書字飛龍二岩惟三分石逺不可到還以餘晷入洞為秉炬遊不妨深夜也豫乃先探二岩明宗為導出斜岩稍北折而南下馬蹄石其隂巉石嵯峨疊雲聳翠益南過永福寺故址礎石猶偉已犁為田又南過一溪即瀟江上流西轉共三里入書字岩岩不甚深後有垂石夭矯岩外鐫玉琯岩三𨽻字宋人李挺祖筆岩右鐫九疑山三大字為宋嘉定六年知道州軍事莆田方信儒筆側又𨽻刻漢蔡雍九疑山銘乃宋淳祐六年郡守潼川李襲之屬郡人李挺祖書襲之既新其宮因鐫銘於側以存曩蹟後人固鄙執岩有巨書遂以書字名岩反失玉琯之實蓋此地為九疑中峯故鐫題於此余坐玉琯中因求導人往三分石者土人謂去此五十里俱猺窟中必且得猺人為導然中無障棲攜火露宿乃可已而重購得一人乃平地猺劉姓者期以晴爽乃往遂返過馬蹄石東入飛龍岩岩從山半陷下內亦寬廣如斜岩外層之南岩中有石坡中懸但無宛轉致返斜岩明宗出七火炬與顧僕分攜爇火前導始由岩左下層循隙歷磴下水自岩頂飛注與人爭級級盡路舒水亦無有東向入洞忽平廣既而石田鱗次水滿其中從塍上行下遂墜成深壑石田上有石池由池涉水乃楊梅洞道舍之仍下洞底涉一溪水自西而東流入洞內截流之後循洞右行路復平曠洞愈宏濶有巨柱端𥪡中央直近洞頂東復有一小石侍立其側又東為弔空石一柱自頂下垂空半止其端反卷而大又東有天柱石蓮花于是過爛泥河即前涉下流河底泥靡陷深及膝步少緩沈不得拔乃循洞左行左壁崖片楞垂上飛為蓋下􅍥為臺中凹為牀為龕南眺一方柱自洞底屏列上躋其東亦一柱與之並起更高巨端有一石旁坐石蓮上為大士座由此西下可北繞大士座後前爛泥河水亦繞大士座下西來至此南折去洞亦南轉愈極宏崇水深艱渡遊者至此例止余强明宗渡水水深逾膝然無爛泥河濘甚既渡南向行水流於東水循其西四顧石柱參差高者千尺低亦丈許以數十紀俱光耀如凝脂曰雪洞又前曰風洞前又當南下渡河明宗謂從無抵此者故前過大士座輒抽炬篁插路為志若再入前逼深潭後迷岐竇寧不為歸途慟耶時余不借已為蕢跣一足行先令顧僕攜一䩫備壞者以渡河水深竟私置大士座下遂不能前返約所入已三里餘聞其水潛出廣東連州恐亦臆論大抵入瀟之流然所進周通正無底也還過初渡第一河上石田北入楊梅洞先由石田涉石地地兩崖石峽如門池水滿浸涉亦逾膝然其下石底坦齊旁無寸土入峽門大石橫其隘透隘入復得平洞寬夷豐博北皆飛石平鋪若樓閣有隙下窺則石僅板薄下復穹然成洞水從下層奔注入即爛泥諸河上源也洞中産彈丸圓石四靣紋痕蝟毛起楊梅之名以此此洞所入水即岩外四山窪注地中者此塢東為簫韶峰西即斜岩南為聖殿西嶺北為馬蹄石皆廓高裏降有同釡底四靣水俱潜注苐不見所入隙耳出洞已薄暮臥岩中終夜瀑雨宣聲兩不能辨詰朝起視則隂雨霏霏也二十五日靜息岩中寒甚閒出觀瀑亟反煨榾柮以竟日此岩之瀑非若他處懸崖下俱從覆石之底穿竇下注懸於左岩上洞前者二瀑最壯其右崖窪洞上者一瀑數竅小於左瀑出自懸石之端者一出石底之竇欹噴者二二十六日雨仍不止下午往聖殿仍由來道逾嶺稍東轉出簫韶峯北簫韶自南而北屏峙斜岩前上分兩岐北盡為舜陵陵前環繞數峯正中者上岐為三稍西者頂有石獨聳陵有二大樹夾道大四人圍廟僧呼為珠樹結實大如指去殼可食兩旁巨杉亦有大四人圍者尋丈以上即分岐高聳冒雨返斜岩二十七日雨止急飯踰馬蹄石嶺抵玉琯岩南覓所期劉猺猺以雲霧未盡已他往同居一人於山中甚熟諳惜患創不能導為余言由此東行五十里有三石參天水分三處俗呼舜公石即三分石也路已湮由此南行三十里有孤崖如髻盤突山頂俗謂之舜毋石有徑可達下即為蒲江過嶺即為麻江麻江口舟可達錦田且以所摘新茗獻返過永福故址址南溪流甚急雖西下瀟江而東南北三靣皆豫所經尚未覩來處乃溯流尋之則故址之南石崖側懸水由下出崖不及水者三尺其下甚深不能入也是日仍觀瀑炙薪岩中雲氣漸開心目舒逸因為永南諸洞殿最道州月岩第一九疑斜岩第二江華蓮花洞第三獅岩第四永州朝陽岩第五淡岩第六江華大佛嶺側岩第七九疑玉琯岩第八道州華岩第九月岩南嶺水洞第十九疑飛龍岩第十一又聞道州長田有中朗洞勝不及到二十八日仍過玉琯南覓導猺肩火炬前行東上楊子嶺二里上有石人立而起山皆盤突東南折行嶺坳中三里曰茅窩皆竒石下深窩有石崖嵌削千尺四靣交流搗入岩洞是名九龜進岩岩西向疑永福南透崖出者即此水也又東南二里越嶺為蟠龍洞水口又登嶺一里為清水潭其東下嶺韭菜原道也余東南二里渡牛頭江江水東自紫金原來江兩崖路俱峭削上下扳援甚艱渡江即東南上半邊山其東北高山為紫金原山外即藍山縣境其西南高山為空寮原空寮原前山有白石痕一幅上自山頂下至山麓若懸帛然再南為香爐山山在玉琯岩南三十里三分石西北二十里高亞三分石頂有澄潭廣三畝中石筍兩枝亭亭出水靣三丈餘疑志所稱天湖也由半邊山頂行五里屢度山脊下少上多共東南五里出鼇頭山先是沈霧不開半邊鼇頭諸山亦近望不及身至始出至是南眺三分石不知所在頃之雲忽澄明瞥然閃影高峯頂與江山縣江郎山相似一為浙源一為瀟源但江郎高矗山半此懸萬峯絶頂為異耳半邊鼇頭兩山東北與紫金夾牛頭江西南與空寮香爐夾為瀟源江乃兩水中脊二水合於玉琯東南西下魯觀與蒲江合始勝如葉舟出大洋焉沿鼇頭東嶺半行二里始下三里下至瀾泥河始得水野炊已下午其瀾泥河東五里踰嶺下三里為高梁原𨽻藍山西境嶺乃藍山寧逺分界處在三分石東豫往三分石下瀾泥河即與高梁原分道折而西南行又上一嶺山花紅紫鬭色余於鼇頭山始見山鵑蘭花至是又有紫花二種一種大花如山茶小者與山鵑等艷色可愛枯樹間蒸菌黃白厚大如盤豫袖摘夜至三分石穿箐烘之香正如香菌又山木干霄有獨木最貴楠次之又有壽杉葉扁同側柏柏儔也巨者圍可五人高約數十丈瀟源水畔渡河處倒橫一楠修可齊眉長可三四十步凡上下嶺共五里抵瀟源水水東南從三分石來經香爐山東北出魯觀者乃絶流南渡即上三分石嶺麓嶺削不容足細徑伏深箐中俯首穿箐上即兩手挽之以移足時箐猶宿霧淋漓首不得舒又不能平行其下惟垂空繘練資如是八里路漸平又南行嶺上五里濃雲仍翳望頂莫辨而晚色漸合遂除箐依松得掌大地山高無水有火不成炊命導猺砍大木積焚之箘箐圍火為度宵計既暝吼風大作飛火星舞空中火焰流徙倐忽奔突數丈初謂竒觀既而雨勢乘風傘不能蔽幸火威猛烈足以敵之五鼓雨盛火亦奪魄矣二十九日天明漸霽仰見三分石露影在咫尺間憑饑冲濕而南又下山二里始知尚隔一峯也度坳中脊復南上三里始有巨石盤崖昨升降處皆峻土無塊石為導猺誤出其南南一里東眺矗頂已可周摩之為霧所埋對靣無所睹道窮磴絶忽山雨大注頂踵莫不沾濡乃返過巨石崖始見有線道俱伏箐中大雨不可上遂返至夜來依火處擬從直北舊路下就溪炊米又誤出其西竟失道久之得微澗炊澗中已當午下抵澗則五澗縱橫交㑹一處蓋皆三分石西南北三靣水也向所渡東來一溪尚在最北溯流東一里至來時所渡處始涉而北人謂三分石下水一出廣東一出廣西一下九疑為瀟水出湖廣豫至此乃知為石分三岐耳其東北合北與西諸水即五澗交㑹處出大洋為瀟江源直東者自高梁原為白田江東十五里經臨江所又東二十里至藍山縣治為巋水源東南者自高梁原東南十五里之大橋下錦田西至江華為沱水源而三分石水初不出兩粵也且其南有錦田水橫流為楚越界聞錦田東有石魚嶺為廣東連州水至此始東南流入東粵耳乃從舊道下至牛頭江日已暮命導猺從間道趨韭菜原以自此而南絶無一寮而此原有高山猺居也初升猶土山既東下聞水聲出深壑中暗捫危級下又一里過兩獨木橋見火光熒熒伏畦旁乃猺人捕蛙者已而茅寮在前呼之一人秉炬出迎歸托宿焉三十日平明行始見所謂韭菜原在高山底若釡西越一山二里出清水潭遂循故道返斜岩仍出宿路亭是夕始睹落照四月初一日從路亭東北岐隨簫韶水西岸行三里西望掩口東兩山峽已出其下平疇矣于是東山漸豁路因溪東轉溪兩旁石盤錯競敵水奔束其中隘處如門即架木其上以度度而循溪南岸行共七里抵下觀下觀西有溪自南繞下觀而東石梁鎖其下流水出橋下東合簫韶水其南一溪又自應龍橋來㑹三水合勝舟北可二十里至寧逺過下觀始與簫韶水别路轉東南向南望下觀後千峯萬巘亭亭若竹竿玉立中有最高鋭者名吳尖山下有岩窈窕當不減斜岩內有尤村洞外有東角潭俱此中甚竒處恨未滯杖履其中搜剔竒閟也東南二里大溪南自尤村洞來橋跨其上即應龍橋也亦稱通濟橋已度橋遂南入亂峯中乃吳尖東派二里上地寶坪坳四際皆竒峯曲折獅象龍蛇之石夾路起與人爭道共六里飯山口峒名雖山口實瑶房錦幄桃源鹿門不辦此幽竒邃詭也南出山口踰嶺共三里忽兩峯夾道競險爭高刻摹詭態極其變幻峯下小溪南向憩溪橋遇儒冠者王璇峯家尤村內欲挽豫還其處為吳尖主人豫期以異日過峽南始有容土負塊山又五里踰嶺抵大吉墅石峯復夾道起路東一峯下嵌空玲瓏逆懸嵌裂蜃雲不足喻其巧余望之神怦怦動亟分荆入皆竇空通漏上盤腋轉莫可窮詰西峯懸削不少雌遜路出兩峯中透隘南始豁然山開曰路園下石峰至是始盡東西俱盤坂崇巒南二里出大道又南五里宿界頭鋪為寧逺藍山界其西大山曰滿雲山當是紫金原之背其攴東北行界遂因之初二日東南行問所謂石柱山俱莫知所在共五里過嶺至總管廟遙望正東有聳尖卓立者不辨為樹為石又東南五里至顔家橋始辨為石峰也橋下水東北流去過橋東南踰一小嶺大道南十五里至藍山豫東折取臨武道五里過寶林寺讀寺前護龍橋碑云寶林山脈由北柱來乃悟向所望疑樹峰即志稱石柱碑所指北柱也東過護龍橋橋下水南流洶湧即顔家橋溪委曲至者隨溪東走北瞻石柱峯倩削如碧玉簮兩旁石崖兀突露竒然較之尤溪山口峯此裁得其一體耳又二里至下灣田大樹峙路隅上枝分聳下盤曲偃蹇大七圍旋窩錯節間俱受水若洗頭盆亦妖也又東路出臥石中溪始折南向藍山路乃東二里一橫道自西南貫東北即藍山趨桂陽道又東沿白帝山南十里抵雷家嶺初三日大溪自藍山曲而東至循溪東行已而溪南折路舍溪東踰嶺共五里大溪復自南來曰許家渡渡而東一里溪北向入峽路南入山十五里至心田鋪鋪南徑道開闢小溪來自朱禾鋪北向去自此路西大山由藍山南南向排列澄溪帶之路東石峯聳秀亦南向排列喬松䕃其上置道於中三里一亭供倦旅憩臥二十里飯朱禾鋪為藍山臨武界一里度永濟橋水東流抵東山麓折而北入巋水又南四里為江山嶺則南龍大脊水遂分楚粵云嶺西十五里曰水頭志謂武水出西山下鸕鷀石當即其處過脊即東南循水行四里至東村東南一里踰嶺下行塢中路旁喬松合抱夾立三里出兩石山口又四里達墊江鋪南去臨武尚十里初四日聞墊江東北十五里有龍洞甚竒遂由小徑行四里出臨武北向桂陽舟大道一里即渡溪越捱岡嶺復從小徑西北入山共五里抵石門蔣氏蔣氏居後洞在山半翠微間洞門東南向一入即見百柱千門懸列其中俯窪以下則洞外層也從東上穿入列柱復回環成洞如委房深閣無不徹明達隙八窗掩映從所歷洞無此開望宏麗屈折殫工者時蔣氏導遊還取火炬余貪竒獨先至意炬入處當在下洞外層後及炬至導者從左洞後穿隙西入連入石門數重已轉出外洞之後下層之上乃北踰石限穿隘進即下石池中水澄明不流兩崖俱穹壁列柱池水深三四尺中有石梗臥水底水浮其上僅尺許踐梗行褰裳可涉十步之外臥梗又橫若限限外池益大水益深水底白石龍首頂橫脊尾拖池中逼崖側又前二三步圓石大如斗崿插水中不出水者亦尺許密依龍側真頷下物也珠旁又一石大倍珠中凹如臼靣平水曰珠盤然與珠並列未嘗盛珠也由此而前水深五六尺無梗絶涉西望水洞宏廣若五畝池四旁石崖攢突參錯而下泥水不得去洵異境也其西北似有隙更深恨無槎可航還從舊路出經左洞下回望窪洞外層紛綸窈窕乃獨下洞底環洞四旁轉出列柱後洞雖不深通而芝田蓮帷上下重布既無內二洞亦自成一竒也此洞品第固當在月岩上下山返墊江南十里抵臨武初五日出臨武南三里過迎榜橋橋南即掛榜山余初過不之覺從其南東上嶺共七里過深井坪又南二里路從右下是謂鳳頭岩即宋王淮錫稱秀岩者洞門東北向度橋以入出洞下抵石溪溪流自橋即伏流石間復透隙瀠崖破洞東入此洞即王記所云下渡溪水其入無窮處也苐王所記從上洞而下此則水更由外崖入豫抵水洞口深不能渡聞隨水入洞二丈即見天光五丈即透壁出山之東是山如天生橋水達其下僅三五丈往連州大道正度其上但高廣度者不覺耳豫登巔東瞰深壑下環峽流東注近俱峭石森立灌莽翳之不特不能下亦不能窺王記所云其入無窮者臆說也還度迎榜橋回瞻掛榜處石壁一幃色黃白成章剖峯平列但少方整耳遂宿臨武生祠中初六日出東門東南四十里至鳳集鋪為臨武宜章東西界又二十里抵梅田白沙巡司初七日司東渡武溪東北三十里為芹菜坪南有石峯分突下層崖承之色班赭雜黑極似武夷一體此處四山俱青崿巉岏獨此有異又五里過隘口循塔山北垂覓小徑轉入山坳曰艮岩寺向西南岩向西北岩口有池一方僧鳳岩所煮金剛笋供粥下午至宜章城南三星橋過橋則市肆夾道商旅雜遝為南下廣東之大道路循城而東已乃北十里牛斤洞在青岑山東北麓更北一里至野石鋪其北石峯嵌空層踞路左即為野石岩投宿岩下村家欲從舍後上岩須自其中舍後門出豫乃從南畔亂石中扳崖踰石入先登一岩其門岈然內有透頂隙不甚深仰視門左有磴埋草間亟披棘上西南行石徑中復得石門如合掌內雖隘稍深右裂旁竅上亦透天光而東壁半一圓竅透光如鏡出峽門西北隨磴上則穹崖削立上有疊石分霄下成展嶂以薄暮乃下聞中室牖內有呼客聲謂客探岩曽見仙詩否余以所歷對曰未也穹崖之東峽門之上尚有路可登明日當再窮之且為豫言高雲山乃衆山頂路由黃岑嶺而上宜章八景有黃岑滴翠白水流虹二勝在其下不可失也初八日復登岩上由穹崖東叢鬱之下果得路上數步亂石縱橫路復莫辨乃扳踰石崿上俱嵌空决裂有大石高聳於外夾成石坪掩映愈勝還至失道處見一石穴即在所踰石下匍匐入其內㟏岈起裂列穴旁通宛轉透石坪下皆明朗可穿前越其上兹又達其底然終不得洞中詩下岩南從舊路抵牛斤洞北西越山峽出峽共五里循青岑南麓行西三里轉一岡始與南來大道合北上曲折嶺二里直躋嶺坳西即白水流虹章水上源也水自高雲山南經黃岑峒由此出峽布流懸石下土人即稱此嶺曰黃岑然黃岑山尚北峙此其南下支踰嶺西北半里即溯白水上流行黃岑山危峙東北陽環成洞大溪橫貫之溯溪西行三里仍北轉溯溪一里乃舍溪登嶺溪在嶺南聞溯行三十里可抵黃茅嶺乃北上一里西下塢中是為藏經樓高山四繞小澗瀠門寺甚整潔昔為貯藏所近被賊焚劫經移高雲矣由寺左登坪頭嶺直上二里踰嶺塢甚幽山幃疊翠衆壑爭流修篁一丘叢木交映中一靜室出焉半里塢窮復溯澗北上嶺里許嶺已及巔水仍不絶此坪頭而上第二嶺也水自上塢透峽下路循峽入平行半里渡澗東北上嶺澗東自黃岑山後來平流塢中石坪殷紅清泉素潤色侔濯錦出峽下瀉珠鳴玉韻重木翳之杳不可窺於是繞靜室西南下注出藏經嶺南為大章之源也嶺不甚高半里漸盤出黃岑北山鵑鮮麗光彩耀人此坪頭第三嶺也過一坪又東北上第四嶺里許踰其脊嶺西石峯突如獅踞為將軍山踰嶺北下行深樹中共二里得高雲寺寺倚翠微猶踞萬峯頂上也以憊極日未暮止焉初九日東北􅓜木中下山五里抵山麓坦山村村側北上虎頭嶺嶺東坳中澗水瀉大石崖下懸簾曳布亦此中僅見踰坳溯流北行塢中踰嶺下共四里有溪自西而東渡之又一溪自北來入溯溪北行峽中二里為大竹峒水自西來想為黃茅嶺餘波也東踰大竹嶺嶺為大竹山南下脊上少下多東向直下二里為吳溪東一里度橋北上小分嶺亦上少下多二里下至仙人場有水頗大北自山峒透峽而東一峯當關扼之水激石南折峰剖其西巖巖矗扆以為下必有洞壑可憩絶流以渡竟無人居東北十二里出良田又北十里至萬嵗橋初十日二十里至郴州州東百餘里山下有泉方圓十餘里其旁石壁峭立泉深莫測是為鈷鉧潭不稱大觀柳子厚有愛斯名移稱永郡耳十一日午後下小舟東北由蘇仙橋下順流西北去六十里達郴口則郴江自東南耒水自正東二水合流勢始大耒水出桂陽縣南五里耒山下西北至興寧縣勝小舟又三十里至江東市勝大舟又五十里乃至此江口諸峯俱石崖盤立寸土絶麗志稱曹王寨山極險峻暮不及登舟人夜鼓棹三十里抵黃泥鋪雨至而泊豫從篷底窺之外若橋門心異之因起視則一大石室下也寬踰數間屋下滙為潭四舟俱泊其內岩外雨聲山色不意夢中多此竒境四鼓雨止乃行昧爽達程口十二日晨炊程口肆中程口者志所稱程鄉水也地屬興寧水發源茶陵酃縣界舟溯入皆興寧西境進有鐘原山土人誇為名山又進則小舟尚可三日程踰高腳嶺則茶陵道矣程鄉水西入未江時煤炭大舟鱗次水淺不能發上午得小煤船附之行程口西北重岩若剖夾立江岸兩涯純石盤亘錯突色間赭黑環轉一如武夷如此四十里又二十里過永興縣十五里為觀音岩岩在江北岸西南下瞰江中石崖騰空上覆下裂如剖半瓜其足疊閣兩層閣前有洞臨流中容數人由閣西懸梯直上上接崖頂透隙上一龕嵌覆頂下中祠大士岩下一石獅橫臥江心下舟又五里至森口大溪自南來乃桂陽州龍渡以東諸水東北合白豹水至此入耒江又北五里泊桞州灘永興以北山始無回崖突石觀十三日六十五里過上堡市地為耒陽境北過江登直釣岩岩前有真武殿觀音閣東向迎江洞門瞰江南向當門石柱中垂界為二若連環然其內空濶平整右隅裂一竅歷磴上别有邃室左隅由大洞深入石竅忽盤空起東迸一竅欹納天光內又盤空起透頂直上天光一圓下徹其中直是井底窺天也下午九十里抵耒陽縣江經城東直北去山至此盡開十四日順流北一百二十里至新城市為耒陽衡陽分界乘月隨流六十里泊相公灘十五日一百二十里至前溪渡陸路抵府止三十里水倍之渡西岸遂登陸西行十二里已暮十六日二十里渡湘江已在衡州南關外抵金寓靜聞宿花藥未歸及歸桂藩助金事尚未就十七日定廣右舟十八日舟人以同伴未至改期二十日早發十九日靜聞同祥甫齎王所助遊資來二十日冒雨登舟靜聞往謝桂藩追至南關外别祥甫舟即行三十里泊東陽渡江漲濁湘流又作一觀二十一日五十里將抵松柏忽衡友劉明宇使使追豫晤别乃與靜聞登涯逆之而劉不至宿山頂茅庵二十二日聞劉已舟往松柏匍匐雨中二十里别劉松柏肆中時所附廣右舟計竟日力當止於常寧河口乃遍覔漁舟為夜抵白坊計二鼓雨止月出已抵白坊驛念再行三十里可及舟適見二舟泊下流余漫呼顧行得應聲始知舟猶待豫於此也乃過舟二十三日北行二十里過大魚塘見兩舟被劫哭甚哀于是同行兩舫人謝豫曰昨不同君暮亦當至此始舟子以候豫故大為衆詬至是甚見德色共六十里泊河州驛二十四日歸陽驛二十五日小河口二十六日觀音灘二十七日祁陽縣余乃同靜聞出祁陽東北一里憩甘泉寺泉一方當寺前坡下味極淡冽似惠泉殿前有吾郡宋鄒浩甘泉銘碑張南軒從郡中蔣氏得之跋而鐫此鄒大書張小楷可稱二絶寺前山第二層之東盤成一窩則九蓮庵也邑人陳尚書重建藏經閣中供高皇帝像唐包巾丹窄衣眉如臥蠶中不斷疏鬚傑張陳氏得之內府者九蓮庵山南盡前有大池乃甘泉南下東繞注於湘入湘處為瀟湘橋橋北一峯突起竒石靈幻湘江欲南至此東折去祁江從北至此南向入湘乃三水交㑹中也峯頂曰瀟湘廟廟後崿裂瓣簇石態多竒二十八日水漲舟泊竟不成行二十九日昧爽放舟曉色蒸霞層嵐開藻既而火輪湧出金光騰耀中直從舟尾射豫枕隙泰嶽日觀不謂得之臥遊也過二十四磯泊黃陽鋪閏四月初一日冷水灣初二日湘口關自冷水灣來山開天曠界大騁江兩岸瞰水之石出沒屢變但有所遇靡不霽心綴目蓋入祁陽境石質竒石色潤過祁陽突兀之勢以次漸露至此隨地湧立及入湘口則聳突盤亘者變為峭𥪡回翔矣初三日放舟入湘口于是别瀟專向湘瀟即豫前入永州道與湘交㑹此二水一東南一西南界其中者為芝山北盡兩流夾之尖若龍尾下垂因其脊無石中砥故挫之必鋭而後已由湘口上多西北之曲灘聲愈多石崖愈竒凡四十里有駢立東岸者與江左平剖之崖夾江對峙如五老比肩愈見竒峭西轉五里過軍家埠又南轉一山中剖平插江右其下雲根蒼黯倒浸重波時落日正銜山外舟過江東忽峯間片穴通明若鈎月與日並懸旋即隱蔽乃去軍家埠五里泊初四日東過掛榜岩岩平削江北下嵌水靣其上石若磨崖色間黃白逺逾臨武南行三十里抵石溪驛已屬東安界有東江自南北注湘石梁跨其口水發源零陵南舟由橋下南溯十五里為零陵境又二十五里為東江橋上有小河三支通筏而已按志永水出永山在永州西南九十里北入湘即此水無疑也石溪之西有山突兀石崖下插江中一隙北向如重門懸峽山之後頂為獅子洞洞門東南向不甚高敞穿石窟下一里可透出臨江門峽惜時方水溢臨江處既沒浸中洞復無炬入遂返又五里泊白沙洲其對岸石壁臨江黃白粲然充壁崖北山巔又起一崖西北向有庵倚之隔江不能往也初五日十五里上磨盤灘兩岸山始峻峭崖突北岸者飛瀑掛其腋間雖以雨壯觀要為不斷之流又五里為兵書峽西岰亦有瀑如練又五里為沈香崖崖斜疊成紋高迥處疊紋忽裂中吐兩枝望之木形黝色上有大樹一株正當崖頂更有上崖一重內峙庵嵌其間層峰聳翠下挈遙江真異境也過崖泊羅埠初六日江漲才掛帆行五里初七日西六里兩山門裂遂分楚粵界又南三十里上金華灘灘東石崖當衝轟流嶄壁高下兩絶險勝一時又西十里止廟頭初八日放舟南行二十里為黃沙鋪粵舟可直抵桂林余欲盡全州諸山遂止此從陸為粵遊始徐霞客遊記卷二下

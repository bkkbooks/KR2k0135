body:
  text: 徐霞客逰記卷七上明徐宏祖撰西南逰日記十一雲南戊寅年十月初二日余欲西行往期阮仁吾所倩擔夫遇其姪玉灣穆聲詢候甚篤下午仁吾以擔夫楊秀雇約至余期以五日後再往晉寧還即啓行仁吾贐以番帨香扇初三日欲往晉寧與唐元鶴州守大來隱君作别方生言二君日日念君今日按君還省二君必至省謁見無中途相左也盍少待之乃入候玉灣并視楊勝寰知麗江相望已久既而玉灣來顧寓中知按君調兵欲征阿迷然兵未發而路人皆知之賊黨益猖狂於江川澄江之境矣玉灣謂豫海口有石城妙髙相近有别墅往已買山欲營構為勝地請備車馬同行一觀豫辭以晉寧之行不容遲因拖西期久也又云𬗟甸不可不一逰請以騰莊人為導豫頷之初四日束裝欲早往晉寧皆言薄暮舟乃發不若再飯而行已而玉灣餽榼酒與吳君共酌之下午由羊市直南六里抵南埧下渡舟既暮乃行是晚西南鬪風舟行二十里至海夾口泊五鼓乃發棹昧爽抵湖南涯北墟口乃觀音山之東南瀕海處其涯有溫泉焉舟人有登浴者余畏風寒不及浴也於是挂帆向東南行二十里至安江村梳櫛於飯肆仍南四里過一小橋即西村四通橋分注之水為歸化晉寧分界處又南四里入晉寧州北門皆昔來暗中所行道也至是始見其田疇廣闢城樓雄壯焉入門門禁過往者蓋防迷不靖也既見大來各道相思飯而入叩州尊相念更切於是遂宴於署夜寢於下道供帳極其鮮整初五初六初七日手談內署邀張調治黃從月黃沂水禹甸與唐君大來更次相陪夜宴必盡醉乃已初八日飲後與黃沂水出西門稍北過楊城堡即所謂古土城也其西北為明惠夫人廟祀晉寧州刺史李毅女夫人功見一統志有元碑首句云夫人姓楊氏名娘李毅之女也既曰李女又曰姓楊何謬之甚耶豈夫人之夫楊姓耶然辭不達甚矣人傳其內猶存肉身外加髤焉故大倍於人余不信沂水云昔年鼠傷其足露骨焉不妄也是日州幕傅良夫來拜餽以榼酒傅江西德化人初九日豫病嗽欲發汗遂卧下道初十日嗽不止仍卧下道唐君晨夕至榻前邀諸友來視極其眷戀十一日余起復入內署蓋州治無事晨邀以入深暮而出是日傅幕復有餽下午傅之戚薑廷材來薑金溪人十二日唐州尊饋新製長褶綿被豫入謝併往拜薑於傅署遇學師趙因詣趙齋遇楊學師交拜焉詢趙師陸涼有何君巢阿否趙陸涼州人故詢之趙言陸涼無之當是浪穹人然同宦於浙中相善趙君升任於此過池州問六安何州君已丁艱歸矣四月初至鎮逺其所主之家即何所先主者是其歸已的但余聞前一僧言貴州水發時城中被難者有一浙江鹽官槓二十餘俱遭漂沒但不知其姓以趙君先主鎮逺期計之似當其時心甚惴惴無可質問也十三日州尊赴楊貢生酌張調治以騎邀遊金砂寺以其莊田在其西麓也出西門直西行田塍中路甚坦其塢即南自河澗鋪直北而出者至此乃大開洋北極於滇池焉西界山東突而瀕塢者為牧羊山北突而最髙者為望鶴山其北走之餘脈為天城又西為金砂則散而瀕海者也東界山西突而屏城南者為玉案山北峙而最髙者為盤龍山其環北之正脊為羅藏山則結頂而中峙者也州治倚東界之麓大堡河澗會流於西界之麓北出四通橋分為兩流一直北下滇海一東繞州北入歸化界由安江村入滇海徑塢西行三里上溪堤大石梁跨溪上為四通橋由橋西直上坡為昆陽道西北由岐一里半為天女城上有天城門遺址古石兩疊如雕刻亭簷狀昔李毅之女秀代父領鎮時築城於此故名城阜斷而復起西北瀕湖者其山長繞為黃洞山西南並天城而夾峙者其山圓聳為金砂山此皆土山斷續南附於大山者也金砂之西則滇海南潄而入直逼大山金砂之南則望鶴山髙擁而北瞰為西界大山北隅之最其西即將軍山聳崕突立與望鶴駢峙而出第望鶴則北臨金砂天城將軍則北臨滇海耳黃洞山之西有洲西橫海中居廬環集其上是為河泊所乃海子中之蝸居也今已無河泊官而海子中渡船猶泊焉其處正西與昆陽對截塢西渡止二十里陸從將軍山繞湖之南其路倍之由天女城盤金砂山北夾又一里半而入金砂寺寺門北向盤龍蓮峯師所建也寺頗寂寞由寺後拾級而上為玉皇閣又上為真武殿俱軒敞而北向瞻湖得海天空濶之勢山之西麓則連村倚曲民居聚焉入調治山樓飯而登山憑眺寺中下步田畦水曲觀其家人築場收榖戴月入城皎潔如畫而寒悄逼人還飯下道不候唐君而卧十四日在州署十五日在署夜酌而散復出訪黃沂水其家寂然花隂歷亂惟聞犬聲還步街中恰遇之黃乃呼酒踞下道門當月而酌中夜乃散十六日余欲别而行唐君言使人往省召歌童自是連日在州署十九日夜月皎而早陰霾二十二十一日皆倐雨倐霽二十二日唐君為豫作瘞靜聞骨記三易稿而後成已乃具酌演優招楊趙學博及唐大來黃沂水昆仲同宴以餞二十三日唐君又遺棉襖夾褲具厚贐焉大來為余作書文甚多且寄閃次公書亦以青蚨贐乃入謝唐君定於明早行二十四日街鼓未絶唐君令人來言天色陰寒釀雨請俟稍霽而行豫謝之及起風色凄其令人有黯然消魂意令庖人速作飯余出别大來時豫欲從海口安寧返省完省訪南隅諸勝從西北富民觀螳螂川下流而取道武定以往雞足乃以行李之重者囑大來令人另齎往省而豫得輕具西行焉方抵大來宅報晉寧公已至下道亟同大來及黃氏昆仲還道中晉寧公復具於道秣馬於門時天色復朗觥數行登騎從西門三里度四通橋從大道直西向行半里西上坡從其西峽轉而西南上一里半直躡望鶴嶺西岰又西下陟一澗稍北即瀕滇池之涯共五里循南山北麓而西有石聳起峰頭北向指滇池有􅋵戈介胄之狀曰石將軍亦石峰之特為巉峭者其西北有廟是為石魚廟其西南又有山西突亞於將軍者即石魚山也又西二里海水中石突叢叢為牛戀石涯上村與鄉俱以牛戀名又循峽而南二里踰平坡南下有水一塘直侵南山之足曰三尖塘塘南山巒髙列塘北度脊平衍脊之北即滇池牛戀塘水不北泄而東破山腋始知望鶴之脈自西來不自南來也從塘北西向􅘦塢入其塢自西而東即塘水之上流也三里塢西盡處有三峯排列其南最髙者即南山之再起者也其中一峯則自南峯之西繞峽而北峙為中峯焉北峯則瀕滇池而東度為石將軍望鶴山之脈矣中峯之東有村當塢曰三尖村晉寧村落止此西沿中峯而上一里與南峯對峽之中復阻水為塘不能如東塘之大而地則髙矣又平上而西一里踰中峰之脊從脊上西南直行為新興道踰脊西北下即滇池南涯為昆陽道而晉寧昆陽以是脊為界焉於是昆陽新舊治俱在一望直下半里沿滇池南山隴半西行二里有村在北崕之下滇池之水環其前曰赤洞裏亦池濱聚落之大者而田則不能成壑焉又西由村後踰崖南上既而西下三里有村在南山北麓盤其嘴而西於是西峽中開自南而北與西界山對夾成塢其脊南自新興界分支北下西一支直走而為新舊縣治而北盡於舊寨村東一支即赤洞裏之後山濱池而止東界短西界長中開平塢為田一小水貫其中亦自南而北入滇池即志所稱渠濫川也由東嘴截塢而西正與新城對而大道必折而南盤東界之嘴以入三里始西歷塢徑塢三里隨西界之麓北出一里半為昆陽新城又北一里半為昆陽舊城於是當滇池西南轉摺處矣舊城有街衢闤堵而無城新城有樓櫓雉堞而無民廬乃三四年前舊治經寇故卜築新邑而市舍猶仍舊貫也舊治街自南而北西倚山坡東瞰湖涘至巳日昃亟飯於市此州有天酒泉普照寺以無竒不及停屐遂北行四里稍上踰一東突之岰其山自西界橫突而出東懸滇海中路踰其岰中而北下其北滇海復嵌塢西入其突出之峯逺眺若中浮水面而其西實連綴於西界者也乃西轉陟一塢共四里又北向循滇池西崖山麓行五里有小峰傍麓東突南北皆湖山環抱之數十家倚峯而居為舊寨村由西北過一塢其塢始自西而東塢北有山一𣲖亦自西而東直瞰滇海中北二里抵山下直躡山北上一里從崩崖始轉東向山半行又一里從東嶺盤而北其嶺南北東三面俱懸滇海中正東與羅藏隔塢對此地杳僻隔絶行者為畏途焉嶺北又有山一支從水涯之北亦自西而東直瞰滇海中與此嶺南北遙對滇海驅納其中外若環窩中駢束户為海口南嶺北下之處峻削殊甚豫慮日暮驅馬直下二里復循塢西入二里西踰一岰由岰而下其西山塢環開中為平疇滇池之流出海就峽中貫成河是為螳螂川二里有村倚塢中南山下過之行平疇間西北四里直抵川上有聚成衢濵川之南曰茶埠墩即所謂海口街也有公館在焉監察御史按臨必躬詣其地為一省水利所係耳先是唐晉寧謂豫海口無宿處可往柴厰莫土官鹽肆中宿余問其處尚相去六七里日已暮且所謂海門龍王廟者反在其東二里又聞阮玉灣言石城之勝亦在斯地將晉訪焉遂不復前覓旅肆投宿二十五日令二騎返晉寧余飯而躡屩北抵川上望川北石崖矗空川流直嚙其下問所謂石城者土人皆莫之知惟東指龍王堂在盈盈一水間乃溯川南岸東向從之二里南岸山亦突而臨川水返舍北而逼南南崖崩嵌盤沓北崖則開繞而受民舍焉是為海門村與南崖相隔一水不半里中有洲浮其吭間東向滇海極吞吐之勢峙其上者為龍王堂時渡舟在村北呼之莫應余扳南崖水窟與水石相為容與忘其身之所如也久之北涯村人以舟至遂坐登龍王堂堂當川流之中東臨海靣時有賽神者浮舟而至而中無廟祝後有重樓則阮祥吾所構也廟中碑頗多皆成𢎞以後撫按相度水利開濬海口免於泛濫以成瀕海諸良田者故巡方者以此為首務云出廟渡北岸居廬頗集其北向所倚之山有二重第一重橫突而西多石而西垂最高即矗削而瀕於江之北岸者第二重橫突而東多土而東繞最逺即錯出而盡為池之北墟者二重層疊村後蓋北自觀音山盤礴而盡於此村氓俱阮氏莊佃余向詢阮玉灣新置石城之勝土人莫解謂阮氏有墳在東岸誤指至此村人始有言石城在里仁村正與茶埠墩對從此有小徑向山後峽中西行三里可至豫乃不東向阮墳而西覓里仁焉即由村後北踰第一重石峰之脊北向下路旁多錯立之石北亦開塢而中無細流一里隨塢西轉已在川北岸矗削石峰之後蓋峰南潄逼川流故取道於峰北耳其內桃樹株被隴連壑想其蒸霞噴焰時令人笑武陵天台為爝火矣西一里過桃林則西塢大開始見田疇交塍溪流霍霍有村落西懸北山之下知即為里仁村矣蓋其塢正南矗立石山西盡於此塢瀕於川亦有一村臨之曰海口村與茶埠墩隔川相對有渡舟焉其塢之東北踰坡塢之西北循峽皆有路六十里而抵省會而里仁村當塢中之北山下半里抵村之東見流泉交道山崖間樹木叢蔭上有神宇蓋龍泉出其下也東塢以無泉故皆成蕪壤西塢以有泉故廣闢良疇由村西盤山而北西塢甚深其塢自北峽而出直南而抵海口村村西所循之山其上多蹲突之石下多空洞之崖有一竅二門西向而出者豫覺其異而詢之土人石城尚在塢西嶺上其下亦有龍泉焉可遵之而上共北半里乃西下截塢而度有一溪亦自北而南中乾無水涉溪西上共半里水聲㶁㶁則龍泉溢西山樹根下瀦為小潭分㵼東南去由潭西上嶺半里則嶺頭峰石湧起有若卓錐者有若夾門者有若芝擎而為臺有若雲卧而成郭者於是循石之隙盤坡而上墜壑而下其頂中窪石皆環而為城東靣者巑岏森透西靣者穹覆壁立南靣則余之踰脊而下者北面則有石窟曲折若離若合間一石墜空當關下覆成門而出入由之圍壑之中底平而無水可以結廬是所謂石城也透北門而出其石更分枝簇蕚石皆青質黑章亷利稜削與他山迥異有牧童二人復引豫循崖東轉復入一石隊中又得圍崖一區惟東面受客如門其中有趺坐之龕架板之牀皆天成者出門稍南回顧門側有洞岈然急轉披之其洞透空而入復出於圍崖之內始覺由門入不若由洞入更竒也計圍崖之後即由石城中望所謂東靣巑岏處矣出洞仰眺洞上石峯層沓有一老猓玀披獸皮前來引余相與扳躋其上衆臺錯立環中窪而峙其東東眺海門明鏡漾空西俯窪底翠瓣可數而隔崖西峯穹覆之上攢擁尤髙乃下峰復度南脊轉造西峰則穹覆上崖復有後層分列其中開峽東墜危坑而下其後則土山髙擁負扆於上聳立之石或上覆平板或中剖斜楞崖脅有二小穴如鼻孔蜜漬淋漓其下乃崖蜂所巢也兩牧童言三月前土人以火薰蜂取蜜蜂已久去今乃復成巢矣童子競以草塞孔蜂輒翁翁然作銅鼓聲憑覽久之乃循墜坑之北東向懸崕而下經東石門之外猶令人一步一回首也先是從里仁村望北山峰頂聳石一叢不及晉寧將軍峰之偉然及抵其處而閣闢曲折層沓玲瓏幻界莫測鍾秀特異信乎靈境之不可以外象求也蓋是峰西倚大山此其一支東竄峰頂中凹石骨內露不比他山之以表暴見竒者第其上無飛流涵瑩之波中鮮翦棘梯崕之道不免為兔狐所窟耳老猓玀言此石隙土最冝茶味逈出他處今阮氏已買得之將造菴結廬招靜侣以開勝壤豈君即其人耶余不應而去信乎買山而居無過此者下山仍過塢東一里經里仁村東南一里抵螳螂川之北西望海口有渡可往茶埠而東眺瀕川石崕聳削先從茶埠隔川北望於巑岏嵌突中見白垣一方若有新茅結其上者今雖崖石掩互不露其影而水石交錯髙深嵌空其中煞有竒勝遂東向從之抵崖下崖根插水有亂石瀠之扳陟水石間沿崖南再東忽見石上有䀶躡崖直上扳躋峻甚挂石懸崕之迹俱倒影水中方下見為竒又忽聞罄咳聲落頭上雖仰望不可見知新茅所建不逺矣再穿下覆之石則白垣正在其上一道者方鑿崕填路迎余入坐茅中其茅僅逾方丈明窗淨壁中無供像亦無爨具蓋初落成而猶未栖息其間者道人吳姓即西村海口人向以賈逰於外今歸而結靜於此可謂得所托矣坐茅中上下左右皆危崕綴影而澄川漾碧於前逺峯環翠於外隔川茶埠村廬繚繞煙樹堤花若獻影鏡中而川中鳬舫賈帆魚罾渡艇出沒波紋間棹影濯浮嵐櫓聲搖半壁恍然如坐畫屏之上也既下仍西半里問渡於海口村南渡茶埠街入飯於主家已過午矣茶埠有舟隨流十里往柴厰載鹽渡滇池余不能待遂從村西遵川堤行其自茶埠西達平定隨川之南崖而築之蓋川水北依北岸大山而西其南岸山勢層疊中多小塢故築堤障川堤之南屢有小水自南峽出亦隨堤下注從堤上西行川形漸狹川流漸迅七里有村廬倚堤北下臨川堤間有亭有碑即所謂柴厰也按舊碑謂之漢厰莫土官鹽肆在焉至此川迅石多漸不容舟川漸隨山西北轉矣堤隨之又西北七里水北向逼山入峽路西向度塢登坡又二里數家踞坡上曰平定哨時日色尚髙土人言前途無宿店遂止二十六日雞再鳴飯而出店即北向循西山而行三里曙色漸啓見有岐自西南來者有岐自東北來者而中道則直北逾岰蓋西界老山至此度脈而東特起一峯當關中突障扼川流東曲而盤之流為所扼稍東遜遂破峽北西向墜級爭趨所謂石龍埧也此山曰九子山實海口下流當關之鍵平定哨在其南大營莊在其東石龍埧在其北山不甚髙大員阜特立故自為雄耳山巔有石九枚髙逾於人駢立峯頭土人為建九子母廟蓋以山為石母也余時心知正道在中疑東北之岐為便道且可一瞰江流遂從之一里抵大營莊則川流轟然在下舟不能從水陸不能從峽必仍還大路踰岰乃得於是返迹從峯西逾嶺北下共二里有小水自西南峽來度之復西上逾坡則坡北峽中螳川之水自九子母山之東破峽北出轉而西繞山北而墜峽峽中石又橫阻而層閡之水橫衝直搗或跨石之頂或竄石之脅湧過一層復騰躍一層半里間連墜五六級此石龍埧也此水之不能通舟皆以此石為梗昔治水者多燔石鑿級不能成功土人言鑿而輒長未必然也石級既盡峽亦北轉路從峽西山上隨之北行下瞰級盡處峽中有水一方獨清瀦土人指為青魚塘言塘中青魚大而多按志昆陽平定鄉小山下有三洞泉出滙而為潭中有青魚大魚俗呼隨龍魚豈即此耶北二里峽稍開有村在其下為青魚塘村北二里西北躡一嶺此嶺最髙始東見觀音山與羅漢寺碧雞山兩峯東峙又北見遙山一重橫亘衆山之北西盡處特聳一峰最髙為筆架山其西又另起一峯與之駢立則老龍之龍山也東盡處分峙雙岫亦最髙為進耳山其南岰稍伏而豁則大道之碧雞關也兩最髙之間有尖峯獨鋭透穎於橫嶺之南是為龍馬山其下則沙河之水所自來也惟西向諸山稍伏而豁大道之往迤西者從之而老脊反自伏處南度始由一里踰其巔又西北下一里則螳川之水自嶺之北麓環而西又轉而南嶺西有村瀕川而居置渡川上是曰武趣河昆陽西畍止此過渡即安寧州界武趣之河繞村南曲復轉西峽去路渡河即西北上坡連越土壠二重共五里北下有水一塘在東塢中北二里有水一塘在西塢中又北一里半有村在路東又北一里半坡乃北盡坡北始開東西大塢下坡西向行塢中二里有水東北自北界橫亘中尖峰下來是為沙河其流頗大石梁東西跨之河從梁下南去螳川之水自武趣西峽轉而北來二水合於梁南半里遂西北至安寧州城之南於是北向經城東而北下焉過沙河橋又西北一里則省中大道自東北來螳大川自城南來俱會於城東有巨石梁東西跨川上勢甚雄過梁即安寧城入東門闤闠頗集乃沽飲於市為溫泉浴計飲畢忽風雨交至始持傘從南街西行已而知道祿裱大道乃返至東門內從東街北行半里過州前從其東復轉北半里有廟門東向額曰靈泉余以為三潮聖水也入之有巨井在門左其上纍木橫架為梁欄上置轆轤以汲乃鹽井也其水鹽苦而渾濁殊甚有監者一日兩汲而煎焉安寧一州每日夜煎鹽千五百斤城內鹽井四城外鹽井二十四每井大者煎六十斤小者煎四十斤皆以桶擔汲而煎於冡也又西轉過城隍廟而北共半里出北門風雨凄凄路無行人余興不為止冒雨直前隨螳川西岸而北三里半有村聚在西麓後有廟東向臨之余不入又北二里半大路盤山西北轉有岐下坡隨川直北行余乃下從岐一里半有舟子艤舟渡上川東岸雨止復循東麓而北抵北嶺下川為嶺扼西向盤壑去路乃北向陟嶺嶺頗峻一里踰嶺北一里下其北塢有小水自東北來西注於川橫木橋度之共一里西北上坡有村當坡之北路從其側一里踰坡而北再下再上共三里西瞰螳川之流已在崖下而崖端有亭忽從足底湧起俯瞰而異之亟捨路西向下入亭中見亭後石骨片片如青芙蓉涌出其北復有一亭下乃架木而成者瞰其下則中空如井有懸級在井中可以宛轉下墜余心知溫泉道尚在北而此竒不可失遂從級墜井下其級或鑿石或嵌木或纍梯共三轉每轉約二十級共六十級而至井底井孔大僅圍四尺其深下垂及底約四五丈井底平拓旁裂多門西向臨螳川者為正門南向者為旁門旁門有屏斜障屏間裂竅四五若窗楞户牖交透疊映土人因號之曰七竅通天七竅者謂其下之多門通天者謂其上之獨貫也旁門之南崖壁巉削屏列川上其下洞門另闢駢開三四處皆不甚深透然川潄於前崖屏於上而洞門纍纍益助北洞之勝再南崖石轉突處有一巨石下墜崖側迎流界道有題為醒石者為冷然筆石北危崖之上有大書虛明洞三字者髙不能爥其為何人筆其上南崖有石橫斜作垂手狀其下亦有洞西向頗大而中拓然無嵌空透漏之妙虛明二字非北洞不足以當之虛明大書之下又有刻聽泉二字者字甚古拙為燕泉筆又其側有此處不可不飲為升菴筆而刻不佳不若中洞門右有此處不可不醉為冷然筆刻法精妙遂覺後來居上又聽泉二字上刻醒石詩一絶標曰薑思睿而醒石上亦刻之標曰譜明譜明不知何人然一詩而何以二標豈譜明乃薑之别字耶此處泉石幽倩洞壑玲瓏真考槃之勝地惜無一人棲止大洞之左穹崖南盡復有一洞見煙自中出亟入之其洞狹而深洞門一柱中懸界為二竅有猓玀赤身織草履於中煙其所炊也洞南崖盡即前南來之塢下而再上處也時顧僕留待北洞余復循崕沿眺而北北洞之右崖復北盡遂躡坡東上仍出崖端南來大道半里有庵當左下瞰西崖之下廬舍駢集即溫泉在是矣庵北有一亭髙綴東峰之半額曰冷然當溫泉之上標以御風之名楊君可謂冷暖自知矣由亭前躡石西下石骨稜厲余愛其石扳之下墜則溫池在焉滙於石崖下東倚崖石西去螳川數十步池之南有室三楹北臨池上池分內外外固清瑩內更澄徹而浴者多就外池內池有石髙下不一俱沉水中色如緑玉映水光艷燁然余所見溫泉滇南最多此水實為第一池室後當東崕之上有佛閣三楹額曰暖照南坡之上官宇三楹額曰振衣千仭皆為土人鎖鑰不得入浴既散步見買漿及柿者以浴熱買柿啖之因問知虛明之南尚有雲濤洞川之西岸曹溪寺旁有聖水相去皆三里皆反在其南可􅘦螳川而遊也蓋溫池之西濵螳川東岸夾廬成衢隨之而北百里而達富民川東岸山最髙者為筆架峰即在溫池東北志所謂岱晟山也川西岸山最髙者為龍山曹溪寺在東隴之半志所謂蔥山也二山夾螳川而北流而蔥山則老脊之東盤者矣余時抵川上欲先覓曹溪聖水而渡舟在川西岸候之不至遂南半里過虛明諸洞下南抵崖處坡曲為塢宜仍循川岸而南以無路遂上昔來大路隅由小岐盤西崖而南亦再下再上一里半一村在坡南曰沈家莊老婦指雲濤洞尚在南坡外又南涉塢半里登坡路絶不知洞所在西望隔川有居甚稠其上有寺當即曹溪有村童拾薪川邊遙呼而問所謂雲濤洞者其童口傳手指以川隔皆不能辨望見南坡之下有石崖一叢漫趨之至其下仰視石隙叢竹娟娟上有朱扉不掩登之則磴道逶邐軒亭幽寂餘花殘墨狼藉溪間雲牖石牀離披洞口軒後有洞門下嵌上有層樓橫跨皆西向先登其樓中供觀音及仙像香几燈案皆以樹根為之多竒古者其南卧室一楹米盎書簏猶宛然在內而苔衣蘿網封埋已久寂然徑行不辨何人所構何因而廢也下樓入洞初入若室一楹側有一窞下陷窈黑其北又裂一門透裂入有小竅斜通於外見竹影竄入其內即墮黑而下南下杳不知其所底北眺一隘亦有一牖上透第透甚微光不能燭以手捫隘以足投空時時兩無所著又時時兩有所礙既至其底忽望西南有光燦然轉一隘始見其光自西北頂隙透入其處底亦平而上復穹焉髙盤倐然有影掠隙光而過心異之呼顧僕聞答聲正在透光之隙其所過影即其影也復轉入暗底隙隘崕懸無由著足然而機關漸熟升躋甚易覺明處之魂悸不若暗中之膽壯也再上一層則上牖微光亦漸定中生朗其旁原有細級宛轉崖間或頽或在但初不能見耳出洞仍由前軒出扉外見右崖有石刻一方外為棘刺結成窠網遙不能見余計不能去竟踐而入之巾履俱為鈎卸又以布縳頭護網始得讀之乃知是菴為天啓丙寅州人朱化孚所構朱壬辰進士其樓閣軒亭俱有名額住山僧亦有名有詩未久而化成空谷遺構徒存祗增慨耳既下至川岸若一航渡之即西上曹溪時不得舟仍北三里至溫泉就舟而渡登西岸􅘦川南行望川東虛明崕洞若即若離杳然在落花流水之外南一里又見川東一崖排突亦如虛明其下亦有多洞迸裂門俱向西有大書其上曰青龍洞曰九曲龍宫者隔川望之不覺神往土人言此二洞甚深篝火以入可四五里俱中黑無透明處此洞即在沈家莊北余前從虛明沿川岸來即可得也誤從其上行崕端而不知深為悵悵然南之雲濤北之虛明既已兩窮此洞已去而復得之對崕亦意外之遇也又南一里抵川西村聚從其後西上山轉而南又西上共一里遂入曹溪寺寺門東向古剎也余初欲入寺覓聖泉見殿之東西各有巨碑為楊太史升庵所著拂讀之知寺中有優曇花樹諸勝因覓紙録碑遂不及問水是晚炊於僧寮宿於殿右二十七日晨起寒甚昨録碑未竟僧為具餐乃飯而竟之寺中讀書二生以此碑不能句來問余為解示二生因引觀優曇樹在殿前東北隅二門外坡間今已築之牆版中其髙三丈餘大一人抱而葉甚大下有嫩枝旁叢聞開花當六月伏中色白而淡黃大如蓮而瓣長香甚烈而無實余摘數葉置囊中遂同二生由香積北下坡循凹而北一里半觀聖泉泉從山坡大樹根下南向而出前以石環為月池大丈餘瀦水深五六寸餘波淙淙由東南坡間㵼去余至當上午早潮已過午潮未至此正當縮時而其流亦不絶第潮時更涌而大耳二生言穴中時有二蟾蜍出入兹未潮故不之見即碑所云金􅖚號曰泉神者矣月池南有亭新構扁曰問潮亭前巡方使關中張鳯翮為之記二生又引余由亭西上坡西北緣嶺上半里登水月菴庵東北向乃蔥山之東北凹中矣菴潔而幽為鄉紳王姓者所建庭中水一方大僅踰尺乃建菴後劚地而出者菴前有深池泉不能蓄也既復下至聖泉還至曹溪北坡凹二生别而上寺余乃從岐下山一里抵昨村後上山處由村後南行半里又東望東川回曲中石崖半懸飛樓霞擁即雲濤洞也川水已從東蟠曲路由循西山南向下因其山塢自南而轉也一里始循南山而東二里則其川自塢北曲而南與路遇既過又循東山溯溪轉而北一里乃東向涉南山之北一里乃轉東南行一里南涉一西來之峽又南上坡一里與前來溫泉渡西大道合始純南行六里入北城門見二女郎辮髮雙垂肩後執紈扇嫣然在前一老婦隨之携牲盒紙錠將掃墓郊外此間重十月朝祭掃家貧不及者至月終亦補行之纎足姣好南中所見殆無踰此入城一里半飯於東關乃出踰巨石梁遵大道東北行半里有小溪自東塢來溯之行從橋南東去三里半上坡又一里踰東安哨嶺嶺不甚峻東北從橫亘大山分隴西南下為安寧東第一護城之砂者也過嶺東下始見沙河之水自東北來隨其塢東入過站摩村共十五里為始甸鋪又四里為龍馬山屼屼北透橫亘大山之南路繞其前而東又四里始與沙河上流之溪遇有三鞏石梁東跨其上是曰大橋其水自東北進耳二尖峯西棋盤山南峽來西南至安寧城東南入於螳川者也又半里東上坡宿髙視橋村二十八日平明東行一里半上坡為安寧東界由此即為昆明地坡陀髙下升涉不一以漸而上八里其塢自雙尖後進耳山來路遂由南隴上又二里山岰間有聚廬當尖是為碧雞關蓋進耳之山峙於北羅漢之頂峙於南此其中間度脊之處南北又各起一峯夾峙以在碧雞山之北故名碧雞關東西與金馬遙對者也關之東向東南下為髙嶢乃草海西岸山水交集處渡海者從之向西北下為赤家鼻官道之由海堤者從之余時欲逰進耳遂西北下坡半里循西山北行二里有村在西山之麓是為赤家鼻大道由其前北去乃西折而入村村倚山而廬有池瀦坡側大不踰五尺村人皆仰給焉中復有魚有垂釣其上者亦龍潭之淺者也由池南上坡嶺道甚峻半里登岡上稍北而曲有坊當道則進耳山門外坊也其寺尚隔一坑由坊西望見寺後大山環於上此岡繞於前內夾深坑旋轉而入若耳內之孔寺中臨孔上盤朵邊以進取名之義非身履此岡不見其親切也進坊西向沿坑入半里有岐西踰大山之岰而入寺之路則沿坑南轉盤崕半里而西上入寺中寺門東向登其殿頗軒爽似額端不似耳中也方丈在殿北有樓三楹在殿南樓臨還坑遙覽滇海如太華之一碧萬頃而此深逺矣入方丈有辛貢士伯敏者迎欵殷勤僧寶印欲具餐辛揮去令其徒陳履惇陳履溫二陳甲戍進士履忠弟及其弟出見為供肉食復引去登殿南眺海樓坐談久之余欲趨棋盤問道於寶印言由坊東下山自赤鼻山寶珠寺上為正道路且三十里由此寺北西踰大山之岰路半之但空山多岐路無從覓耳乃同辛君導余從殿後出北至岰下東來岐路始别去余西上半里踰岰半里西北稍下一里涉中窪窪西復有大山南北橫峙與東界進耳後雙尖并岰北之巔東西夾成中窪由窪西復循西山之東北行一里循嶺北轉而西稍下一里渡峽西上其西復有大山南北橫峙遂西向橫躡之一里半登其岡見西南隨塢有路上踰其脊將趨之有負芻者來曰棋盤路在北不在西也乃循西山之東又北行其路甚微若斷若續二里從西山北岰透脊西出始望見三家村在西塢中村西盤峙一峯自北而南如屏髙擁即棋盤山也其脈北自妙髙寺三華山西南來復聳此峰分支西度為溫泉之筆架山分支南下為始甸後之龍馬山南環東亘即為所踰之脊而南度為進耳碧雞者也脊北山復橫列東北至寶珠赤鼻而止為三家村東界護山余昔來自金馬以東即遙望西界山橫如屏其頂復有中懸如覆釡髙出其上者即此棋盤峰也而不知尚在重壑之內外更有斯峯護之洵西峯之領袖也從岰西轉循東山北崖半里乃西下一里行壑中有水北流西涉之半里抵三家村其村倚棋盤東麓路當從村北西上乃誤由村南度脊處循峽西南上竟不得路扳躡峽中三里登一岡有庵三楹踞坪間後倚絶頂其前東瞰滇中乃髮僧玄禪與僧裕庵新建者玄禪有內功夜坐峰頭曉露濕衣無所退怖庵中四壁未就不以為意也日已昃迎余瀹茗煮粥抵暮乃别西上躋峯一里陟其巔又西向平行頂上一里有寺東北向則棋盤寺也已入夜啜茗就榻二十九日凌晨起僧為余炊余乃獨躡寺後絶頂曉露甚重衣領沾透頂間無髙松巨木叢草亦不甚深茂髙寒故也頂頗平逈西南石崖矗突性平直而中實可劈為板省中取石皆於此遙負之西北塢中有大壑回環下有水二方村廬踞其上其水分青白色其西南峽中水則循龍馬山東而去當即沙河之源矣東南即三家之流是頂亦三面分水之處第一入滇池兩入螳川皆一𣲖耳下山飯於寺乃同寺僧出寺門東三十步觀棋盤石石一方橫卧嶺頭中界棋盤紋縱橫各九十道其北卧石上大書玉案晴嵐四字乃碧潭陳賢筆南有二石平􅍥中夾為穴下墜甚深僧指為仙洞昔有牧子墜羊其中遂以石填塞之僧言此山之腹皆空洞但不得其門而入耳穴側亦有陳賢詩碑已剝不可讀乃還寺録昆明令汪從龍詩碑仍令幼僧導之峰西南觀鑿石之崖其崖上下兩層鑿成大窟如厦屋其石色青緑者則膩而實黃白者則粗而剛其崖間中嵌青緑色者兩層如帶圍各髙丈餘故鑿者依而穴之其板有方有長方者大徑五六尺長者長徑二三丈皆薄一二寸其平如鋸無纎毫凹凸真良材也還從寺前東向下一里過新庵之左直下者一里半過三家村之左渡澗又一里半東踰石山之岰石山乃東界北走之脈至此復突一峯遂北盡焉從岰東墜崖而下漸成一坑隨之行三里為寶珠寺未至寺其西墜峽處坑水潰而為瀑懸崕三級下深可十五丈但水細如絡絲不如匹練也寶珠寺東向倚山之半亦幽亦敞由其前墜坡直下五里抵山麓為石鼻山聚落甚盛蓋當草海之西碧雞關大道即出其下也由村轉北一里半東北與大道合於是東向湖堤二里半有村當堤之衝曰夏家窑過此遂遵堤行湖中堤南北皆水窪堤界其間與西子蘇堤無異蓋其窪即草海之餘南連於滇池北抵於黃土坡西抵赤鼻山之麓東抵會城其中支條錯繞或斷或續或出或沒其瀕北者志又謂之西湖其實即草海也東行堤上一里半復有岡有橋有栖舍界水中央半里復遵堤上東行湖中遙顧四圍山色掩映重波間青蒲偃水髙栁縈堤天然絶勝但堤有栁而無花橋有一二而無二六不免令人轉憶西陵耳又東二里湖堤既盡乃隨港堤東北二里為沐府魚池又一里半抵小西門飯於肆東過閘橋濱濠南而東一里入城南舊寓問吳方生則已隔晚向晉寧矣已而見唐大來寄來行李書畫俱以隔晚先至獨方生則我來彼去為之悵悵乃計復為作書令顧僕往晉寧謝唐君别方生并向大來索陶不退書陶名涏有詩翰聲向官於浙前大來欲為作書聞其已故乃止適寓中令有髙土官從姚安來知其猶在皆虛傳如眉公也故復顧僕往大來索書徐霞客逰記卷七上欽定四庫全書徐霞客逰記卷七下明徐宏祖撰西南遊日記十二雲南十一月初一日晨起先作書令顧僕往投阮玉灣索其導遊緬甸書乃作晉寧諸柬須其返命即令往南埧候渡下午顧僕去豫欲入城拜阮仁吾令其促所定負擔人為西行計適阮穆聲來顧已而玉灣以書來期定於明日晤其齋中余遂不及入城初二日晨起豫欲自仁吾處次第拜穆聲至玉灣來邀甚急余遂從其使先過之則穆聲已先在坐延於內齋欵洽殊甚既午曰今日總府宴撫按當入內一看即出故特延穆聲奉陪并令二幼子出侍飲果去而即返洗盞更酌已而報撫按已至玉灣復去囑穆聲必欵豫多飲須其出而别余不能待薄暮托穆聲代别而返初三日晨往仁吾處令促負擔人即從其北宅拜穆聲留晨餐引入內亭觀所得竒石其亭名竹在余詢其故曰父沒時宅為他人有後復業惟竹在耳亭前紅梅盛開此中梅俱葉而花全非吾鄉本色惟一株傍亭簷摘去其葉始露面目猶故人之免胄相見也石在亭前池中髙八尺闊半之玲瓏透漏不瘦不肥前後俱無斧鑿䀶太湖之絶品也云三年前從螺山絶頂覓得以八十餘人舁至其石浮卧頂上不經摧鑿而下真神物之有待者余昔以避雨山頂遍卧石隙烏覩有此類哉下午過周恭先遇於南門內正挽一友同來顧知金公趾為余作送靜聞骨詩相與同往叩之則金在其莊不相值公趾名初麟字頗肖董宗伯風流公子也善歌知聲律家有歌童聲妓祖科甲父偉鄉薦在昔曽任江西萬安令公趾素好客某奏劾錢士晉軍門名在疏中黜青襟其友留至其家割雞為餉肴多烹牛雜脯而甚精潔其家乃教門舉家用牛不用豕也其友馬姓字雲客尋甸府人父以鄉科任沅州守卒於任雲客其長子也文雅藴藉有幽人墨士之風是晚篝燈論文雲客出所著拾芥軒集相訂遂把盞深夜恭先别去豫宿其齋中窗外紅梅一株盛放此間皆紅梅白者不植中夜獨起相對恍似羅浮魂夢間初四日留晨餐恭先復至對奕兩局又留飯過午乃出城以為顧僕將反也及抵寓則方生儼然在樓問何以來曰昨從晉寧得君書即騎而來送君騎尚在當遲一日復往晉寧問昔何以往曰往新興便道過晉寧看君耳問顧僕何在曰尚留晉寧候渡始知方生往新興以許郡尊考滿求雷太史左右之於巡方使君也雷名躍龍以禮侍丁憂於家巡方使為倪於義四川人初五日方生為余作永昌潘氏父子書父名嗣魁丙子科第十名子名世澄丙子科解元騰越潘秀才書名一桂又為余求許郡尊作書通李永昌永昌太守李還素又為豫求范復蘇名醫士江西人作書通楊賓川賔川牧楊大賔黔人原籍冝興其展轉為豫謀勝豫自為謀也下午顧僕自晉寧返得唐大來索陶不退書阮仁吾所促負擔人亦至初六日造别阮玉灣穆聲索其所作送靜聞骨詩乃出叩任君任君大來妹壻大來母夫人在其家併往起居之任固留飯余乃趨别馬雲客不值留詩而還過土主廟觀菩提樹樹在正殿陛庭間甬道之西其大四五抱幹上竦而枝盤覆葉長二三寸似枇杷而光土人言花白而帶淡黃色瓣如蓮長亦二三寸每朵十二瓣遇閏歲則添一瓣以一花之微而按天行之數不但泉之能應刻而物之能測象如此亦竒矣土人每以社日羣至樹下灼艾代炙言炙樹即同炙身病應炙而解此固誕妄而樹膚為之瘢靨無餘焉出廟飯於任返寓周恭先以金公趾所書詩及贐至又以馬雲客詩扇至阮玉灣以詩册并贐至其弟鏳亦使人餽贐焉逮暮金公趾自莊還來晤知余欲從笻竹往曰余輩明晨當相送笻竹為桞亭余謝之曰母作是念君在夢鄉中余已飛屐峰頭不能待也是晚許郡尊與李永昌書亦至惟范復蘇書未至也初七日晨索飯欲行范君至即為作楊賔川書余遂别方生循城南濠西行二里過小西門又西北沿城一里轉而北半里為大西門外有文昌宫桂香閣峙其右頗壯又西半里出外隘門有岐向西北者富民正道向正西者為笻竹寺道乃從正西傍山坡南行五里其坡西盡村聚駢集是為黃土坡坡西則大塢自北而南以達滇海者也西行塢塍中二里有溪自西北注而南石梁橫其上是即海源寺側穴涌而出之水遂為省西之第一流云又西一里半有小山自西山橫突而出反自南環北路從其北嘴上一里半西達山下有峽東向循之西上是為笻竹由峽內越澗西南上是為圓照由峽外循山嘴北行是為海源有一婦騎而前一男子隨而行者云亦欲往笻竹隨之誤越澗南上圓照至而後知非笻竹也圓照寺門東向層臺髙敞殿宇亦𢎞而閴寂無人還下峽仍踰澗北令行李往候於海源余從峽內入一里半澗分兩道來一自南峽一自北峽二流交會處有坡中懸其西於是渡南峽之澗即躡坡西北上漸轉而西一里半入笻竹寺寺髙懸於玉案山之北垂門東向斜倚所踞之坪不甚端稱而羣峰環拱林壑縈沓亦幽邃之境也入寺見殿左庖膾喧雜騎來之婦亦在焉余即入登藏經閣望閣後有靜室三楹頗幽潔而環墻回隔不見所入門因徘徊下閣一人迎而問曰君豈霞客耶問何以知之曰前從吳方翁案徵其所作詩詩題中見之知與丰標不異也問其為誰則嚴姓名姒祖號築居嚴冡宰清之孫也為人沉毅有骨淡泊明志與姪讀書於此所望墻圍中靜室即其栖托之所留余入懇停一宿余感其意命顧僕往海源置行李余同嚴君入殿左方丈問所謂禾木亭者主僧不在鎖鑰甚固復遇一段君亦識余言在晉寧相晤亦忘其誰何矣段言為金公趾期會於此金當即至三人同步殿右循階坡而西北則寺後上崖復有坪一方其北崖環前抱與南環稱此舊笻竹開山之址也後為僧塋有三塔皆元時者三塔各有碑猶可讀還寺公趾與友兩三輩至時嚴君拉余飯頃之住持體空至其僧敦厚篤摰有道行者為余言今日諸酒肉漢混䀨寺中明晨當齋潔以請遂出前騎來婦坐正殿東廂始知其婦為妓而稱觴者公趾拉余及築居飲於殿東廂坐客各歌然後此婦歌歌不及公趾也既而段去豫與築居亦别而入息陰軒逮暮公趾與客復携酒榼就軒中飲此婦亦至飛斚徹歌二鼓乃别去余就寢寢以紙為帳即嚴君之榻也另一榻亦紙帳是其姪者嚴君携襆被就焉既寢嚴君猶秉燭獨坐觀余石齋詩帖并諸公手書余夢魂間聞其哦三詩贈余余寢􅍄不能辨也初八日同嚴君至方丈叩體空由南側門入幽徑逰禾木亭亭當坡間林巒環映東對峽隙滇池一杯浮白於前境窅有雲林筆意亭以茅覆窗楞明靜中有蘭二本各大叢合抱一為春蘭止透二挺一為冬笋花發十穗穗長二尺一穗二十餘花花大如萱其色赭班而形則與蘭無異葉比建蘭濶而柔磅礴四垂穗長出葉上而花大枝重亦交垂於旁其香馥滿亭中開亭而入如到衆香國中三人各當窗一隙踞窗檻坐侍者進茶乃太華之精者茶冽而蘭幽一時清供得未曽有禾木者山中特産之木形不甚大而獨此山有之故取以為名相仍已久而體空新整之然目前亦未睹其木也體空曰此亭幽曠可供披覽側有小軒可以下榻君留此過歲亦空山勝事久之公趾輩來拉就殿東廂共餐鼎食入息陰軒飯嚴君書所哦三詩贈余余亦作一詩為别出殿别公趾則行李前去為體空邀轉不容行余往懇之執袖不舍公趾築居前為致辭曰唐晉寧日演劇集賔欲留名賢君不為止若可止余輩亦先之矣師曰君寧淡不羶不為晉寧留此老僧所以敢留也余曰師意既如此余當從雞山回為師停數日蓋余初意欲從金沙江往雅州參峨嵋滇中人謂此路久塞不可行必仍歸省假道於黔而出遵義余不信與吳方生别方生執𥚑黯然曰君去矣余歸何日後會何日何不由黔入蜀再圖一良晤余口不答而心不能自已至是見體空誠切遂翻然有不由金沙之意築居公趾輩交口曰善師乃聽别出山門師逺送下坡指對山小路曰踰此可入海源上洞較山下行近既别一里半下至峽中令肩行李者踰南澗仍來路出峽往海源寺余同顧僕踰北澗循澗北入即由岐東向躡嶺一里踰嶺東稍東下半里折而北又半里已遙見上洞在北嶺與妙髙相並而東則踐危石巉磴而下下險即由山半轉而北行半里有大道東向自海源上坡從之西北上半里嶺石森立如雲湧出再北遂得上洞洞門東向髙穹軒逈其內深六七丈濶與髙亦如之頂穹成蓋底平如砥四壁圍轉無嵌空透漏之狀惟洞後有石中突髙丈餘有隙宛轉踰之而入洞壁亦嵌而下墜深入各二丈餘底遂窅黑余墜隙而下見有小水自後壁滴瀝而下至底而水不見黑處亦漸明有樵者見余入駐外洞待之候出乃去洞中多野鴿俱巢洞頂見人飛擾不定土人設機取之稍北共半里而得中洞門亦東向深濶髙俱不及上洞三之一四壁亦圍轉無他岐惟門左旁列一柱又有二孔外透為異耳余從洞前望往妙髙大路自海源由山下村落盤西山北嘴而西上洞前有如線之路從嶺北踰岰而西即從嶺頭行可省降陟之煩乃令顧僕下山招海源行李余即從洞嶺北行期會於妙髙洞北路若斷若續緣西山之半其下皆村聚倚山之麓大路隨之余行嶺半一里有路自下村直上西北從之一里踰嶺西峰頭有水一塘在窪中由塘北西下一里山復環成髙塢自南而北塢口石峯東峙嶙峋飛舞踞衆壑之交石峯北又有塢自西而東西塢重壑層疊有大山臨之其下路交而成蹊望之行半里北下至石山之西又半里西抵西塢之底路當從西塢北崖緣峽而上余誤從西塢南崖躡坡而登一里踰嶺脊而西即見西北層岡之上有佛重峙知即妙髙而下有深峽間隔路反折而西南已覺其誤循之行一里以為當截峽北渡便可折而入寺乃墜峽西北下半里涉底復扳峽西北上以為寺在岡脊矣而何以無路又半里登脊則猶然寺前環峽之岡與寺尚隔一坑也岡上一塔正與寺門對復從其東北下坑半里由坑底再上北崖則猶然前塢底緣崕處也北上半里岡頭有茶庵當道為富民大路菴側有坊沿峽南循坡半入半里至妙髙寺寺東向前臨重峽後倚三峰所謂三華峰也三尖髙擁攢而成塢寺當其中髙而不覺其亢幽而不覺其閴亦勝地也正殿左右俱有官舍以當富民武定之孔道土人言妙髙正殿有辟塵木故境不生塵無從辨也瞻眺久之出待行李於茶庵側久之乃從坡下上詢途人往沙朗道或云仍下坡自普擊大道而去省中通行之路也其路迂而易行或云更上坡自牛圈哨分岐而入此間間達之路也其路近而難知余曰既上豈可復下遂遵大道上坡三里逶迤踰嶺頭即循嶺北西向盤崖行又二里有小石峰自嶺北來與南峰屬數家當其間曰牛圈哨東西之水從此分矣從哨西直下則大道之出永定橋者余乃飯而從嶺脊北向行一里稍下涉壑即從壑北上坡緣坡東北上回望壑底西墜成峽北走甚深路東北逾坡其東猶下滇池之峽也又一里半從嶺頭逾岰而北一里再逾一西突之岰其北遂仍出西峽上於是東沿山脊行又北一里半西瞰有村當峽底是為陡坡其峽逼仄而深陡此村居之最險者嶺上隨嶺東轉半里有路自東岰間透而直西遂墜西峽下此陡坡通省之道乃遵之東上半里踰岰東於是南沿山脊行又東半里稍東北下峽中半里有水一池瀦路南曰清水塘在度脊之半塘北遂下墜成坑隨之北下一里過峽底有東來大道度峽西北上此即自省會走富民間道也隨之復從峽西傍西山北行二里又轉而西遇負薪者指北向從岐下峽中行半里至其底即清水塘之下流也從峽西緣坡麓行細徑斷續亂崕崩隤二里半踰澗緣東麓又北一里乃出峽口於是北塢大闢南北遙望而東界老脊與西界巨峯夾而成塢始從畦塍北行一里有溪頗巨自塢北來轉而西去余所從南來之水亦入之同入西南峽中路北渡之一里有村聚倚西山之麓髙下層疊是為沙朗入叩居停皆辭不納以非大路故非昆明之習俗也最後入一老人家強主之竟不為覓米而炊初九日自覓米具炊余散步村北遙晰此塢東北自牧養北梁王山西支分界東界雖大脊而山不甚髙西界雖環支而西北有石崖山最雄峻又南為沙朗西山又南為天生橋而南屬於陡坡東崖之山其山東西兩界既夾成大塢而南北亦環轉連屬其中水亦發於龍潭合南北峽而成溪西注於富民螳螂然不能竟達也從塢西南入峽搗入山洞其洞深黑莫測穿山西出與陡坡之澗合洞上之山間道從之所謂天生橋也然人從其上行不知其下有洞亦不知洞之西透山之中空而為橋惟沙朗人耕牧於此故有斯名然亦皆謂洞不可入有狼虎有妖祟勸余由村後踰山西上不必向水洞迂折余不從既飯南循坡麓行一里半與溪遇遂同入西峽其峽南北山壁夾而成路由溪北沿北山之麓入一里仰見北崖之上石壁盤突其間駢列多門東一門髙懸危瞰勢獨雄豁磴迹甚微棘翳崖崩莫可著足乃令顧僕并行李俟於下余獨扳躍而上久之躋洞東又見一門側迸余以為必中通大洞遂從其側倒懸入大洞門其門南向甚穹洞內層纍北上深十餘丈濶半之內無旁竇即前外見側迸之門不中達也出洞欲東上側門念西洞尚多既下欲再探西洞望水洞更異遂直從洞下西趨水洞又半里西峽既盡山環於上洞闢於下水從東來逼南崕搗西洞入路從其北墜岡下余令肩夫守行李於岡上與顧僕入洞洞東向髙十餘丈濶半之始涉水從其南崖入水潄其北崖而環之入五六丈水環北崖路環南崖俱西轉仰見南崖之上層覆疊出突為危臺結為虛樓皆在數丈之上氤氲閣闢與雲氣同為吞吐從其下循之西入北崖尚明水潄之南崖漸暗路隨之西五六丈南崖西盡水從北崖直搗西崖下西崖遂下嵌成潭水嗚嗚其中作衝激聲遂循西折去路乃涉水循東崖北向隨之時洞轉而北髙穹愈甚延納餘朗若明若昧又五六丈水潄北崖復西轉余亦復涉西崖於是水再環北崖路再環南崖竟昏黑不可辨但聞水聲潺潺又五六丈復西遇水其水漸深既上不可見而下又不可測乃出出復四渡水而上岡聞岡上有人聲則沙朗人之耕隴者見余入洞與負行李人耦語待之為余言水之西出即陡坡北峽山之上度即天生橋間道所從如前之所標記者始恨不携炬竟西從洞中出也言富民有老虎洞在大溪之上不可失余謝之乃西上躡嶺一里半登其脊是為天生橋脊南石峯嶙峋髙聳而出其脈自陡坡東度脊而北間道循其東垂陡坡之澗界其西麓至此又跨洞而北屬於沙朗後西山水從其下穿腹西出路從其上度脊西行脊西瞰即陡坡澗水直走而北至此西折脊上之路亦盤壑西墜益信出水之洞即在其下心懸懸欲一探之西行山半者一里見有岐直下岐底遂令顧僕同負囊者由大道直前余獨下趨峽中半里抵峽底􅘦水東行一里折而南則後洞龎然西向其髙濶亦如前洞水從其中涌騰而出西與南來之澗合而北去余􅘦流入洞二丈後仰睇洞頂上層復裂通於門外門之上若橋之橫於前其上復流光內映第髙穹之極下層石影氤氲若浮雲之上承明旭也洞中流初平散而不深隨之深入數丈忽有突石中踞浮於水面其內則淵然深滙旁礴崕根不能􅘦入矣洞頂亦有石倒騫以髙甚反不覺其夭矯其門直而逈而深入而猶朗朗且以上層倒射之光直徹於內也出洞還顧洞門上其左懸崖甚峭上復闢成一門當即內透之隙乃涉澗之西遙審崕間層疊之䀶孰可著足孰可倒扳孰可以宛轉達孰可以騰躍上乃復涉澗抵崖一依所審法試之半晌遂及上層外門更廓然髙穹也入其內為龕為窩為臺為榭俱浮空內向內俯洞底波濤破峽如玉龍負舟與洞頂之垂幄懸帔昔仰望之而隱隱者兹如纓絡隨身幢幡覆影矣與躡雲駕鶴又何異乎坐久之聽洞底波聲忽如宏鐘忽作細響為之神移及下層崖懸級一時不得腠理扳挂甚久有男婦十餘人自陡坡來隔澗停睇逮余下問何所事余告以逰山兩男子亦儒者問其上何有余告以景不可盡言恐前行者漸逺不復與言遂隨水少北轉而西行峽中一里漸上北坡緣坡西行三里峽塢漸開又四里塢愈開其北崖踰山南下者即沙朗後山所來道其南坡有聚落倚南山者是為頭村路至此始由塢渡溪溪上橫木為橋其水即陡坡并天生橋洞中所出西流而注於螳螂川者也從溪南隨流行一里過頭村之西沿流一里半復上坡西行二里再下塢中半里路旁有賣漿者倚南坡而居則顧僕與行李俱在遂入飯又西盤南山之嘴一里為二村村之西有塢北出橫陟而過之半里復上坡隨南山而西上倚危崖下逼奔湍五里有村在溪北為三村至是南界山橫突而北北界山環三村之西又突而南塢口始西窒焉路由溪南躋北突之坡而上一里半抵峯頭其峯北瞰三村溪而下溪由三村西橫嚙北峯之麓破峽西出峽深嵌逼束止容水不容人故路踰其嶺而過為羅鬼嶺東西分富民昆明之界焉過嶺西下四里連過上下羅鬼兩村則三村之流已破峽西出界兩村之中而西又有一溪自北塢來與三村溪合併西去路隨之行溪南二里抵西崖下其水稍曲而南橫木梁渡之有村倚北山曰阿夷沖又從其西一里半踰一坡又一里暗中得一村亦倚北山是為大哨覓宿肆不得又半里乃從西村得之初十日雞鳴起飯出門猶不辨色西南行塍中一里半南過一石橋即阿夷沖溪所出也溪向西北流路渡橋南去半里又一水自東南峽中來較小於阿夷沖溪即志所云洞溪之流也二流各西入螳螂川度木橋一里餘得大溪湯湯即螳螂川也自南峽中出東北直抵大哨西乃轉北去而入金沙江有巨石梁跨川上其下分五鞏上有亭其東西兩崖各有聚成衢是為橋頭過橋西北一里即富民縣治由橋西溯川南行七里為河上洞先是有老僧居此人以老和尚洞呼之故沙朗村人誤呼為老虎洞及抵洞見有刻為河上洞者蓋前任縣令以洞臨溪流取河上公之義而易之甫過橋余問得其道而顧僕與負囊者已先向縣治余聽其前獨沿川岸溯流去一里西南入峽又三里隨峽轉而南皆瀕川岸行又二里見路直躡山西上余疑之而路甚大姑從之一里遇樵者始知山上為胡家山道乃土寨也乃復下瀕川而南一里路又南上山覘其旁路皆翳復隨之躡山南上愈上愈峻一里直登嶺脊而不見洞其脊自西峯最髙處橫突而東與東峰壁夾川流祗通一線者也蓋西岸之山南自安寧聖泉西龍山分支傳送而來至此聳為危嶂屏壓川流又東北墜為此脊以橫扼之東岸之山東自牛圈哨嶺分支傳送而來至此亦聳為危嶂屏壓川流又西與此脊對而挾持之登此脊而見脊南山勢崩墜夾川如線川自南來下嵌其底不得自由惟有衝躍脊南之路復墜淵而下以為此下必無通衢而墜路若此必因洞而闢徑折隨之下則樹影偃密石崖虧蔽悄非人境下墜一里路直逼髙峰西南下其峰崩削如壓危影兀兀欲墜路轉其夾岰間石削不容趾鑿孔懸之影倒奔湍間猶窅然九淵也至是余知其去路甚逺已非洞之所麗而受其險峭徘徊不忍去忽聞上有咳聲如落自九天已而一人下見余愕然問何以獨踞此余告以尋洞曰洞在隔嶺之北何以逾此余問此路何往曰沿溪躡峭四十里而抵羅墓此路之幽閴更非他境所擬矣雖不得洞而覘此竒峭亦一快也返躋一里復北上脊見脊之東有洞南向然去川甚逺知非河上洞而髙攬南山憑臨絶壑亦超然有雲外想遂披棘扳崖入之其洞雖不甚深而上覆下平倒插青冥呼吸日月此為最矣憑憩久之仍踰脊北下一里抵麓得前所見翳路瞰川崖而南半里即橫脊之東垂也前悮入南洞在脊南絶頂此洞在脊北窮峽洞門東向與東峯夾束螳川深嵌峽底洞前惟當午一露日光洞內之幽阻可知也洞內南半穹然北半仰石外突偃石之上與洞頂或綴或離其前又竪石一枝從地內湧起踞洞之前若湧塔然此洞左之概也穹入之內崆洞窈窕頂髙五六丈多翺翔卷舒之勢五丈之內右轉南入又五丈而窅然西穹閴黑莫辨矣此洞右之概也余雖未窮其奧已覺幽竒莫過次第滇中諸洞當與清華清溪二洞相伯仲而惜乎逺既莫聞近復荒翳桃花流水不出人間雲影苔䀶自成歲月而已出洞隨川西岸遵故道七里至橋頭又北一里入富民縣南門出北門無城堞惟土牆環堵而已時顧僕不知待何所余踉蹌而前又二里有溪自西南山峽出其勢甚遙其流亦頗大有梁南北跨之北上坡又五里飯於石關哨踰岰北下日色甚麗照耀林壑西有大山曰白泥塘其山南北橫聳如屏插天土人言東下極削而西頗夷其上水池一方可鑿可廬也山東之水即由石關哨北麓而東去共二里涉之即緣東支邐迤北上八里又踰其岰岰不甚峻田塍疊疊環其上村居亦夾峙是為二十里鋪又四里為沒官莊又三里為者切關其處塢徑旁達聚三流焉一出自西南峽中者最大即白泥塘山後之流也有石梁跨其上梁南居廬即者切關也越梁西北上一里復過一村廬又一小水自西峽來又一小水自西北峽來過村廬之西北有平橋跨西峽所出溪上渡其北遂西北上嶺盤曲而上者三里有佛宇三楹本坊跨道曰滇西鎖鑰又西上一里餘當山之頂有堡焉居廬亦盛為小甸堡有歇肆在西隘門外遂投之宿十一日自小甸堡至武定府歇季夢良曰此後共缺十九日詢其從逰之僕云武定府有獅子山叢林甚盛僧亦敬客留憩數日遍閲武定諸名勝後至元謀縣登雷應山見活佛為作碑記窮金沙江由是出官莊經三姚三姚大姚縣姚安府姚州而逹雞足此其大略也余由十二月記憶之其在武定元謀間無疑矣夫霞客往矣其僕猶在文之所缺者從而考之是僕足當霞之遺獻云徐霞客逰記卷七下

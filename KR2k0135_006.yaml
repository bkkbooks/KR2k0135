body:
  text: 徐霞客逰記卷六上明徐宏祖撰西南逰日記九雲南戊寅八月初七日作書投署府何别駕求廣西府志是日其誕辰書未達入閲其堂四境圖見盤江自其南界西半入境東北從東界之北而去不標地名旡從知其何界也初八日何收書欲相見是日雨豫不往初九日豫令顧僕辭何促其志大雨不止初十日何言覓志旡印就者已命殺青矣午霽始見黃菊大開菊惟黃色不大又有西番菊廣西府西界大山髙列如屛直亘南去曰草子山西界即大麻子嶺從大龜來者東界峻逼而西界層叠北有一石山森羅于中連絡兩界曰發果山東支南下者結為郡治西支橫屬西界者有小水從穴湧出甚巨是為瀘源經西門大橋而為矣邦池之源者也通海從穴湧出此海亦從穴湧出然此南山復橫截仍入太守塘山穴中為尤異也廣福僧言此水入穴即從竹園村北龍潭出未知果否恐龍自是錫岡北塢水此未必合出也矣邦池俗名海子又曰龍甸此濾江非廣中瀘江也瀘江在南而此水亦竊其名不知何故矣邦池之南復有逺山東西橫屬則此中亦一南北中窪之坑而水則去來皆透於穴矣此郡山之最逺者也發果山員若貫珠橫列郡後東下一支曰奇鶴峯則學宫所托西下一支曰鐵龍峯則萬壽寺所倚而郡城當其中環處城之東北亦有一小石峯在其中曰秀山上多突石前可瞰湖後可攬翠城南瀕湖復突三峯東即廣福曰靈龜山中峯最小曰文筆峯建塔於上而西峯橫若翠屛焉即名翠屛此郡山之近者也秀山前有伏波將軍廟後殿為伏波像前殿為郡守張繼孟祠張扶風人以甲科守此壬申為普酋困城岌岌矣張奮不顧身固保城隍普莫能破城賴以完先是張夢伏波示以方略既退賊親涖息宰河招撫焉賊稱為舍命王云新寺即萬壽寺當發果西垂之南其後山石嶙峋為滇中所無其寺南向後倚峭峰前臨遙海亦此中勝處前有玉皇閣東為城隍廟俱在城外瀘源洞在城西北四里新寺後山西盡環塢西北其中亂峯雜沓綴以小石岫皆削瓣駢枝標青㸃翠北環西轉而瀘源之水湧于下穴瀘源之洞闢于層崖有三洞焉上洞東南向前有亭下洞南向在上洞西五十步皆在前山之南崖後洞在後山之北㟠其上如眢井從井北墜穴而下二十步底界而成脊一穴東北下而小一穴東南下而廓此三洞之分向也其中所入皆甚深秉炬穿隘屢起屢伏乳柱紛錯不可窮詰焉十一日大霽上午出西門過城隍廟玉皇閣前西一里轉新寺西峯之嘴而北又北一里抵山下歷級遊上洞望洞西有寺殿兩重入憩而㵸水為餐因由寺西觀水洞還寺中索炬始知為洞有三皆須火深入下午强索得炬而火為顧僕所滅遍覓不可得遙望一村在隔水之南漲莫能達遂不得為深入計聊一趨後洞得披其外扄還入下洞探其中門而已仍從舊路歸北入新寺抵暮而返十二日坐寓待志擬一至即行晚謂顧僕曰志訂就當即來候也余初意廣西郡人必悉盤江所出遍徵之終無諳者其不知者反謂西轉彌勒固屬顛倒其知者第謂東北注羅平經黃草壩下即莫解所從矣問所謂東南下廣南出田州亦似揣摩之言靡有確據也此地至黃草壩又東北四五日程余欲從之以此淹留日久迤西之行不可遲姑留為歸途之便廣西府鸚鵡最多皆三鄉縣所出然止翠毛丹喙無五色之異三鄉縣乃甲寅蕭守所城維摩州州有流官祗居郡城不往州治二處皆藉何天衢守之以與普拒廣福寺在郡城東二里吉雙鄉在矣邦池之東南與之對而彌勒州在郡西九十里一統志乃注寺在彌勒東九十里鄉為彌勒屬何耶豈當時郡無附郭三州各抵其前為界故以屬之彌勒耶然今大麻子哨西何以又有分界之址也十三日中夜聞雷聲達旦而雨余欲行屢矣而日復一日待之若河清焉自省至臨安皆南行自臨安抵石屛州皆西北自臨安抵阿迷皆東北自阿迷抵彌勒皆北行自彌勒抵廣西府皆東北十四日再令顧僕促志余束裝以待乍雨乍霽上午得回音仍欲留至明晨云乃攜行李出西門入玉皇閣閣頗宏麗中乃銅像兩廡所塑羣仙像極有生氣正殿四壁畫亦精工遂過萬壽寺飯後登寺左鐵龍峯之脊石骨稜稜皆龍鱗象角也志又稱為天馬峯以其形似也下還寺中見右廡北有停柩焉詢之乃吾鄉徽郡遊公柩也遊諱大勳任廣西三府征普時遊率兵屯郡南海梢以防冦之衝突四年四月普兵忽乘之竟沒於陳今其子現居其地不得歸故停柩寺中余為慨然是晚李如玉楊善居諸君作醮寺中屢承齊餉僧千松亦少解人意是晚月頗朗十五日余入城探遊君之子令顧僕往促何君上午出西門遊城隍廟既返寺寺中男婦進香者接踵有吳爾錫者亦以進香至同楊善居索余文各攜之去約抵暮馳還下午何命堂書送志及程儀至余作書謝之是晚為中秋而暗雲密布大風忽吼僧設茶於正殿啜之而卧十六日雨意霏霏不能阻余行色而吳楊文未至令顧僕往索之既飯楊君攜酒一樽侑以油餅熏鳬乃酌酒而攜鳬餅以行從玉皇閣後循鐵龍東麓而北一里登北山而上一里踰其坳即發果山之脊也志又謂之九華山蓋東峯之南下者為奇鶴為學宫所倚西峯之南下者為鐵龍為萬壽寺之脉中環而南突於城中者為鍾秀山其實一山也從嶺上平行又北三里始見瀘源洞在西而山脊則東自東界大山橫度而西屬於西界為郡城後倚然瀘源之水穿其西穴而出亦不得為過脉也從嶺北行又五里而稍下有哨在塢之南岡曰平沙哨郡城北之鎖鑰也其東即紫薇之後脉猶屛列未盡其西則連峯蜿蜒北自師宗南下為阿盧山界塢中之水而中透瀘源者也由哨前北行塢中六里有溪自北而南小石梁跨之是為矣各橋溪水發源於東西兩界分支處由梁下西注南轉塢窮而南入穴出瀘源之上流也又北六里有村在西山之半溪峽自東北來路由西北上山一里躡嶺而上二里遂踰西界之脊瞰西塢行塢中水浸成壑有村在其下其西復有連山自北而南與此界又相持成峽焉從嶺上又北四里乃西北下西峽中一里抵麓復循東麓北行十五里復有連㟠屬兩界之間有數家倚其上是為中火鋪有公館焉按志師宗南四十里有額勒哨當即此矣飯仍北行峽中其內石峯四五離立崢崢峽西自有溪北下路從峽東行兩界山復相持而北塢中皆荒茅沮洳直抵師宗寂無片椽矣聞昔亦有村落自普與夷出沒莫禁民皆避去遂成荒徑廣西李翁為余言師宗南四十里無一人皆因普亂民不安居龜山督府今亦有普兵出沒路南之道一梗不通一城之外皆危境云龜山為秦土官寨其山最高為彌勒東西山分脉處其西北即屬陸涼西屬路南為兩州間道向設督捕城今漸廢弛秦土官為昻土往官所殺昻復為普所虜今普兵時出沒其地人不敢行路南澄江者反南迂彌勒從北而向革泥關蓋自廣西郡城外皆普氏所懾服即城北諸村小民稍溫飽輒坐沠其資以供違即全家虜掠而去小民寧流離四方不敢一鳴之有司以有司不能保其命而普之生殺立見也北行二十里經塢而西從塢中度一橋有小水自南而北涉之轉而西北行暝色已合顧僕後余從一老人一童子前行躑躅昏黑中余高聲呼顧僕老人輒搖手禁止恐匪人聞聲而出也循坡涉坳十里有一尖峯當坳中穿其腋復西北行路甚濘溪水交流路幾不辨後不知顧僕趨何所前不知師宗在何處莽然隨老人行而老人究不識師宗之逺近也老人初言不能抵師宗隨路有村可止至是還叩之老人曰余昔經此已十四年前此村居不意一變久之漸聞犬吠聲隱隱知去人境不逺矣過尖山共五里下涉一小溪登坡遂得師宗城焉抵東門門已閉而外無人居循城東北隅有草茅數家俱己熟寢老人仍同童子去余止而謀宿莫啓戶者心惶惶念顧僕負囊山荒路寂泥濘天黑不知何以行且不知從何行久之見暗中一影亟呼而得之而後喜可知也既而見前一家有火趨扣其門始固辭余候之久乃啓戶入客㵸湯煮楊君所貽粉糕啖之甘如飴也濯足藉草而卧中夜復聞雨聲主人言今早有人自府來言平沙有賊人截路君何以行余曰無之曰可徴君之福也即此地外五里尖山之下時有賊出沒土人未晚即不敢行何幸而昏夜過之師宗在南山峽間東北與西南俱有山環夾其塢縱橫而開洋不整亦不大水從東南環其北而西去亦不大也城雖磚甃而甚卑城外居民寥寥皆草廬而不見一瓦其地哨守之兵亦俱何天衢所轄城西有通元洞去城二里又有透石靈泉俱不及遊十七日晨雨飯而行泥深及膝出門即仆北行一里有水自東南塢來西向注峽而去有石橋跨之為緑生橋過橋行塢中一里北上坡遵坡行八里東山始北斷成峽水自峽中西出有寨當峽而峙不知其名余從西坡北下則峽水西流所經也坡下亦有茅數家為往來居停之所是曰大河口河不甚巨而兩旁沮洳特甚有石梁跨之與緑生同水勢亦相似過橋北行度塢北復有山自東北橫亘西南一里陟其坡循之東向行三里越坡東下塢中沮洳有小水自北而南入大河溪上流有四五人索哨錢於此因架木為小橋以渡水見余不索哨而乞造橋之犒余畀以二文各交口稱謝既渡半里余隨車路東行諸人哄然大呼余還顧則以羅平大道宜向東北余東為悮故也亟還從東北半里復上坡東行皆荒坡遙隴夙霧逺迷重茅四塞十五里東踰岡始望見東北岡上有寨一屯其前即環山成窪中有盤壑水繞其底而成田塍四顧皆高不知水所從出從岡東下一里越塢中細流其塢與流皆自南而北即東通盤壑者又東上一里循盤壑之南脊行與所望北岡之寨正隔塢相對矣又踰東岡稍下一里則盤壑之東有峽穿隴而至其峽自東南大山破壁而至者峽兩崖皆亘壁其上或中剖而成峽或上覆而成梁一塢之中倐斷倐續水亦自東南流穿盤壑但壑中不知何泄時余從中梁而度水流其下不知其為梁也望南北峽中水一從梁洞出一從梁洞入乃從梁東選石踞勝瞰峽而坐睇其下如連環夾壁明暗不一曲折透空但峽峭壁削無從下穿其穴又東愈塢相錯再上再下八里盤嶺再上至是宿霧盡開北有削崖近峙南有崇嶺遙穹取道其間橫陟嶺脊始逼北崖旋向南嶺二里復踰髙脊北轉東下二里有茅當兩峯峽間前植哨竿空而無人是曰張飛哨山中最幽險處也又東下三里懸壑深閴草木䝉密泥濘及膝名偏頭哨哨不居廬路口止有一人懸刀植鎗而索錢余不之與而過此哨之南即南穹崇嶺羅平賊首阿吉所窟處為中道最險故何兵哨守焉又名新哨而師宗界止此矣過哨又東上嶺嶺更峻石骨稜厲二里躋其巔為羅平師宗之分界亦東西二山之分界也嶺重山復上下六十里險峻為迤東之冠焉其山蓋南自額勒度脉分支北下結成崇嶺北度此脊而為白蠟東龍而東盡於河底盤江交㑹處者也從嶺上東向平行其間多墜壑成穽小者為眢井大者為盤窪皆叢木其中密不可窺而峯頭亦多樹多石不若師宗皆土山茅脊也平行脊上五里路左有場宿火樹間為中火鋪乃羅平師宗適中之地當午土人亦有擔具攜炊賣飯於此而既過時輒去余不及矣乃冷餐所攜飯又東一里漸下又一里南向下叢中路在箐石間泥濘彌甚一里遂架木為棧嵌石隙中非懸崖沿壁而或斷或續每每平鋪當道想其下皆石孔眢井故用木補填之也又東下一里始出峽口回顧西壑崇嶺高懸皆叢箐密翳中有人聲想其夷人之居而外不能見東眺則南界山岡平亘北界則崇峯屛立相持而東循北坡東行三里復北上坡直抵北界峯腰緣之三里峯盡東下有塢縱橫一塢從北峽來一塢從東峽來一塢從西峽來一塢向東南去時雨色復來路復泥濘計至羅平尚四十里行不能及聞此中有營房一所可宿欲投之四顧茫無所見祗從大道北轉入峽遂緣峽東小嶺而上一里忽遇五六人持矛挾刃而至顧余曰行不及州矣余問營房何在曰已過可宿乎曰可遂挾余還蓋此輩即營兵乃送地方巡官過嶺而返者仍一里下山抵塢中乃向東塢入半里抵小峯之下南向扳峯而上浚滑不可著足半里登其巔則營房在焉營中茅舍如蝸上漏下濕人畜雜處其人猶沾沾謂余公貴人使不遇余輩而前無可托宿奈何雖營卑隘猶勝夷居十倍也余頷之索水炊粥峯頭水甚艱以一掬濯足而已十八日平明雨色霏霏余謂自初一漾田晴後半月無雨恰中秋之夕在萬壽寺狂風釀雨當復有半月之陰營兵曰不然余羅平自月初即雨並無一日之晴蓋與師宗隔一山而山之西今始雨山之東雨已久甚乃此地之常非偶然也余不信飯後下山飯以笋為案笋出山箐深處八月正其時也濘滑更甚於昨而濃霧充塞較昨亦更甚一里抵昨所入塢中東北上一里過昨所返轅處又一里踰山之岡或東或北盤旋嶺八里稍下有泉一縷出路左石穴中其石高四尺形如虎頭下層若舌之吐而上有一孔如喉水從喉中溢出垂石端而下墜喉孔員而平僅容一拳盡臂探之大小如一亦石穴之最奇者余時右足為泥汚以足向舌下就下墜水濯之行未幾右足忽痛不止余思其故而不得曰此靈泉而以濯足山靈罪我矣請以佛氏懴法解之如果神之所為祈十步內痛止及十步而痛忽止余行山中不喜語怪此事余所親驗而識之者不敢自諱以沒山靈也從此漸東下五里抵一盤壑中有小水自北而南四圍山如環堵此中窪之底也豈南流亦透穴而去者耶又上東岡二里踰岡又東下一里行塢中者三里有小水自西北向東南至是始遇明流之澗有小橋跨之既度澗從東南去路復東上岡三里踰岡之東始見東塢大開自南而北東界則遙峯森峭志稱羅莊山駢立東南西界則崇巘巍峩志稱白蠟山屛峙西北東北又有一山土人稱為東龍山橫排於西界缺處而猶逺不睹羅平城近莫見興哆囉也興哆囉即在山下以嶺峻不能下瞰耳又東稍下者二里峻下者一里遂抵塢中則興哆囉茅舍數間倚西山東麓焉轉而北行塢中其塢西傍白蠟東瞻羅莊南去甚遙則羅莊自西界老脊分支而東環處也塢中時有土岡自西界東走又有石峯自東界西突路依西界北行遙望東界遙峰下峭峰離立分行競穎復見粵西靣目蓋此叢立之峯西南始於此東北盡於道州磅礴數千里為西南奇勝而此又其西南之極云過興哆囉北一重土岡東走即有一重小水隨之想土岡之東有溪北注以受此諸水數涉水踰岡北五里望西山高處有寨聚居頗衆又北二里有池在東岡之下又北二里有池在西岡之下皆岡塢環轉中窪而成者又北三里有水成溪自西而東向注甚急一石梁跨之為魯夷橋橋下水東南數里入穴中越橋北始有夾路之居又北半里又有水自西而東注其水不及魯夷之半即從上流分來亦東里餘而滅亦一石橋跨之二水同出於西門外白蠟山麓龍潭中分流城東南而各墜地穴亦一竒也橋之南始有盈禾之塍又北半里入羅平南門半里轉東一里出東門停憩於楊店是日為東門之市既至而日影中露市猶未散因飯於肆觀於市市新榛子薰雞葼還楊店而雨濛濛復至楊壻江渭濵者荆州人贅此三載矣頗讀書知青烏術詢以盤江曲折能隨口而對似有可據者先是余過南門橋有一老者巾服而踞橋坐見余過拉之俱坐余知其土人因訊以盤江彼茫然也彼又執一人代訊其人謂由澄江返天上可笑也渭濱言盤江南自廣西府流東北師宗界入羅平之東南隅羅莊山外抵八達夷寨㑹江底河經巴澤河格巴吉興隆那貢至霸樓為霸樓江遂東南下田州不北至黃土壩亦不至普安州第壩樓諸處與普安界亦相交錯是南盤亦經普安之東南界特未嘗與東北之北盤合耳羅平在曲靖府東南二百餘里舊名羅雄亦土州也萬厯十三年土酋者繼榮作亂都御史劉世㑹奉命征討臨元道文作率萬人由師宗進夾攻平之改為羅平明年繼榮目把董仲文等復叛羈知州何倓文作以計出之復率兵由師宗進討平之今遂為迤東要地羅平州城西倚白蠟山下東南六十里為羅莊山東北西十里為束龍山有水自白蠟山麓龍潭出名魯夷河東環城南出魯夷橋而東入地穴其北有分流小水亦如之此內界之水也其西有蛇床河自州西南環州東北抵河底河俱在白蠟束龍二山外其東南有盤江自師宗東北入境東南抵八達俱在羅莊山外此外界之水也州城磚甃頗整州治在東門內俱民惟東門外頗成闤闠西南二門為賊首官霸阿吉二冦不時劫掠民不能居白蠟山在城西南十餘里頂髙十餘里其麓即在西門外二里上有尖峯南自偏頭寨北抵州西北為磨盤山過脉而東又起為束龍山者也此山雖晴霽之極亦有白雲一縷橫亘其腰如帶圍為州中一景束龍山在城東北四十里者繼榮叛時結營其上為巢窟官兵攻圍久之內潰而破今其上尚有二隘門羅莊山在城東南六十里其山參差森列下多卓錐拔笋之岫粵西石山之發軔也羅平州東至廣南八達界二百里西南至師宗州偏頭哨六十里南至師宗州烏魯河界八十五里西南至陸凉蛇床河界一百里西北至舊越州界發郎九十里北至亦佐縣桃源界一百二十里東北至亦佐縣黃草壩二百里羅平州正西與滇省對正東與廣西思恩府對正北與平夷衛對正南與廣西府永安哨對十九日坐雨逆旅閲廣西府志下午有伍左李三生來拜二十日二十一日並雨阻逆旅二十二日早仍雨將午乃霽浣衣且補紉之下午入東門仍出南門登門外二橋觀魯夷河詢之土人始知其西出白蠟山麓龍潭仍東入地穴者也還入南門上城行抵西門望白蠟山麓相去僅三里外有土岡一層回之魯夷發源即從其麓透穴而出者也稍北即東轉經北門其西北則磨盤山峙焉為州城來脉城東北隅滙水一塘其下始有禾畦即東門接壤矣其城乃東西長而南北狹者也二十三日晨起雲陰四布飯而后行其街從北去居民頗盛一里出北隘門有岐直北過嶺者為發郎道其嶺即自西界磨盤山轉而東行者板橋大道從嶺南東轉東北向行十里有村在北山之下曰發近德其處南開大塢西南即白蠟東南即大堡營山大堡營之南一支西轉卓起一峯特立於是村之南為正案其南則石峯參差遙列即昨與哆囉所望東南界山也又東屢有小水南去渡之東五里有石峯突兀當關北界即磨盤東轉之山南界即大堡山諸石峯相凑成峽而石峯當其中若蹲虎然由其東南腋行南界石山森森成隊南去而路漸東北上五里出當關峯之東其東垂有石立上有斜騫之勢曰金雞獨立也又東一里有一洞門在南小峯下時雨陳復來避入其中飯又東三里東上峽脊其脊即磨盤山東走脉至此又度而南為大堡營東山者也一里踰脊之東其上有岐南去不知往何夷寨脊東環窪東塢有小水北下注東南塢中稻禾盈塍有數家倚北峯下曰沒奈德東峯下有古殿二重時雨勢大至趨避久之乃隨水下東南峽峽逼路下兩旁山勢仍覺當人靣而起東行峽中二里有水自峽南洞穴出與峽水同東注又一里有小石梁跨溪踰之從溪南東行一里溪北注峽路東踰岡一里餘有塢自西北來環而南其中田禾芃彧村落高下東二里有數十家夾路曰山馬夷亦重山中一聚落也于是又東北一里有石峯髙亘踰其南坡抵峯下又東南一里有塘在山塢五六家傍塢而栖曰挨澤村又東北二里為三板橋數家當山之岡其橋尚在岡下時雷雨大至遂止於岡頭上寨二十四日主人炊飯甚早平日即行雨色霏霏路滑殊甚下坡即有小石梁其下水亦不大自西而東注乃出於西北石穴而復入東北穴中者其橋非板而石而猶仍其舊名橋南復過一寨乃東北行坡間二里有岐當峽從東北者乃入寨道從直東者為大道從之直東一里登岡上其北有塢在北大山下即寨聚所托中有芃芃焉岡南小石峯排立岡頭自東而西遂與北山環峙為峽入峽東行四里踰脊北上半里入其坳其北四峯環合中有平塢經之而北西峯尤突兀焉北半里又穿坳半里復由峽中上一里直抵北巨峯下其峯聳亘危削如屛北障其西有塢下墜北去其中箐深霧黑望之杳然路從峯南東轉遂與南峯凑峽甚逼披隙而東半里其東四山攢合峯高峽逼叢木䝉密亦幽險之境也遂循南峯之東南向入塢半里乃東南上半里踰岡脊而東其東有塢東下路從岡頭南向行一里復出南坳其坳東西兩峯從岡脊起路出其側復東向行三里始稍降而復上升降曲折多循北嶺行與南山相持成塢六里路從塢而東又五里稍上踰坳南北峽始開再南盤北嶺之南三里始見路旁餘薪㸑灰知為中火之地從其東一里下峽始得石路迤邐南向平下二里俯見南塢甚杳循北嶺東向行一里忽聞溪聲沸然又南下抵塢中一溪自東而西有石梁跨之溪中水頗大而甚急四顧山回谷密毫無片隙不知東北之從何來不知西南之從何泄當亦自出入於竅穴中者欲候行人問之因坐飯橋上久之不得過者乃南越橋行仰見橋南有岐躡峰直上又有大道則溯溪而東時溪漲路淹扳南峯之麓行念自金雞山東上一路所上者少而下者無幾此溪雖流塢中猶是山巔之水也東一里循南峯東麓轉而南隔塢東望溪自東北峽中破崖而出其內甚逼路舍之南半里復循南峯南麓轉而西向入塢一里塢窮遂西上嶺一里踰嶺頭始見有路自北來合并由嶺上南去此即橋南直躋之岐踰高嶺而下者較此為徑直云由嶺南行西瞰塢甚深而箐密泉沸亦不辨其從何流也又南二里轉而東循北嶺南崖東向行亦與南山下夾成塢下瞰深密與西塢同東五里其塢漸與西塢並始知山從東環塢乃西下者又東向踰岡東北一里度一脊其脊東西度從其東復上嶺一里則嶺東有塢南北闢乃北轉循西山行塢上一里塢窮從塢北平轉踰東嶺之東共二里有數家在路北坡間曰界頭寨以羅平村落東止於此也又東行岡上二里再上嶺一里踰之而東則東有深峽下嵌惟聞水聲洶湧而不見水從嶺上轉而南行東瞰東界山麓石崖懸峭時突於松梢箐影中而不知西界所行之下其崖更聳也南行一里始沿崖南下又一里仰見路西之峯亦變而為穹崖峭壁極危峻之勢焉從此瞰東崖之下江流轉曲西南破壁去隔江有茅兩三㸃倚崖而居乃東向拾級直下一里瞰江甚近而猶未至也轉而北始見西崖矗立插天與東崖隔江對峙其崖乃上下二層向行其上止見上崖而不得下見亦不得下達故必迂而南乃得拾級云北徑矗崖下半里下瀕江流破崖忽湧勢若萬馬之馳蓋當暴漲時也其水發源於師宗西南龍擴北合陸凉諸水為蛇床河由龍甸及羅平舊州乃東北至伊澤過束龍山後轉東南抵此即西南入峽又二百里而㑹八達盤江者也羅平普安以此江為界亦遂為滇東黔西分界焉有舟在江東頻呼之莫為出渡者薄暮雨止始有一人出曰江漲難渡須多人摻舟乃可不過乘急為索錢計耳又久之以五人剗舟來復不近崖以一涉水而上索錢盈壑乃以舟受已昏黑矣雨復淋漓截流東渡登崖入旅店店主他出其妻黠而惡不止乘急過索且恐是馮文所記地羊寨中一流人幸不為所中耳二十五日其婦平明始覓炊遲遲得餐雨時作時止出門即東上嶺蓋其江自北而南兩崖夾壁惟此西崖有一線可下東崖有片隙可廬其南有山橫列江折而西向入峽有小水自東峽來注故西崖之南江勒而無餘地東崖之南曲轉而存小塍過此江乃知步雄之地西南隨此江其界更逺南抵廣南其界即盤江此統志所云東入普安州境也步雄屬貴州普安州盤旋東北共三里踰嶺頭遂與南山成南北兩界峽中深逼自東而西路循北山嶺南行自西而東又五里則北山忽斷如中剖者下陷如深坑底有細流沿石底自北而㵼於南峽路乃轉北而下歷懸石披仄崿下抵石底踐流稍南復扳石隙上躋東崖由石底北望斷崖中剖對夾如一線並起各千仭業翠披雲飛流濺沫真幽險之極觀逼仄之異境也既上復循北嶺東行五里稍降行塢中二里于是路南復有峯突起不沿南塢忽穿北坳矣時零雨間作路無人行既而風馳雨驟兩人者勃率於深山僻徑中覺樹影溪聲俱有靈幻之氣又三里度東脊稍轉而南復踰岡而上二里一岐東南一岐直北顧奴前馳從東南者又穿山腋間二里忽見數十家倚北塢間余覺有異趨問之則大路尚在北大山後此乃山中别聚見人倀倀間有解語者問其名曰坡頭甸問去黃草壩曰尚五十里問北出大路若干里曰不一里蓋其後有大山北列最高抱此甸而南若隔絶人境者隨其指踰嶺之西北腋果一里而得大道遂從之緣大山之北而上直躋者二里望北塢甚深而闢霾開樹杪每佇視之惟見其中叢茅盤谷閴無片塍半椽也盤大山之東又上半里忽見有峽東墜稍東南降半里平行大山東南支又見其西復有峽南墜已與大山東西隔隴矣降陟嶺塢十里有兩三家居北岡之上曰栁樹欲止而炊湯以飯而雨勢不止詢去黃草壩不及遂留止焉其人皆漢語居停之老陳姓甚貧而能重客一見輒煨榾柮以燎濕衣余浣汚而炙之雖食無鹽卧無草甚樂也二十六日平明起炊飯風霾飄雨余仍就火久之乃行降坡循塢其塢猶西下者東三里塢窮有小水自北塢來橫渡之復東上坡宛轉嶺坳五里有場在北坡下由其東又五里踰岡而下塢忽東西大開其西南岡脊甚平而東北若深墜南北皆巨山而南山勢尤崇黑霧間時露巖巖氣色塢中無巨流亦無田塍居人一望皆深茅充塞路本正東去有岐南向崇山之腋顧奴前馳從之一里南竟塢將陟山坡上余覺其悮復返轍而北從大路東行披茅履濕三里東竟塢有峰中峙塢東塢從東北墜而下路從東南陟而上二里南穿山腋又東半里踰其東坳俯見東山南向列下界為峽其中泉聲轟轟想為南流者從嶺上轉南半里踰其西坳又俯見西山南向列下界為峽其中泉聲轟轟想亦南流者蓋其東西皆有層巒夾谷而是山中懸其間遂從其西沿嶺南下二里有小水自東崖橫注西谷遂踞其上濯足而飯既飯從塢上南行隔塢見西峰髙柯叢蔓䝉密無纎隙南二里塢將盡聞伐木聲則掄材取薪者從其南漸北焉又南一里下至塢中則塢乃度脊雖不甚中髙而北靣反下脊南峽南下甚逼中滿田禾透峽而出遂盤一壑豐禾成塍有小水自東北峽下注南有尖峰中突水從其西南墜去路從其東北踰嶺一里半涉壑一里半登嶺又東俯有峽南下其中水聲甚急歷級直下一里抵塢底東峽水西南注遂橫涉之稍南又東峽一水自東而西注復橫涉之二水遂合流南行路從澗東而南二里出峽有巨石峯突立東南水從塢中直南去塢中田塍鱗次黃雲被隴西瞻步雄止隔一嶺路從塢東上嶺轉突峯之南一里有數家倚北岡上是曰沙澗村始知前所出塢為沙澗也由其前東下而復上又東南踰一岡而下共一里餘有溪自北而南較前諸流為大其上有石梁跨之過梁復東上坡一里岡頭石齒縈泥滑濘亷利偹諸艱楚一里東下又東南轉踰一岡一里透峽出始見東小山南懸塢中其上室廬纍纍是為黃草壩乃東行田塍間一里遂徑塢而東有水自北塢來石坡橫截之坡東隙則叠石齊坡水冒其上南㵼而下其水小於西石梁之水然皆自北而南抵巴吉而入盤江者也自沙澗至此諸水俱清徹可愛非復潢汙渾濁之比豈滇黔分界而水即殊狀耶此處有石瀨而復甃堰以補其缺東上即為黃草壩營聚壩之得名豈以此耶時樵者俱浣濯壩上亦就濯之汚衣垢膝為之頓易乃東上坡循堵垣而東有街橫縈岡南然皆草房卑舍不甚整闢其北峯頂即土司黃氏之居在焉乃入息於吳氏之家吳漢人男婦俱重客蔬醴俱偹云二十七日晨起雨猶不止既而霽泥濘猶甚姑少憩一日詢盤江曲折為明日行計乃匡坐作記薄暮復雨中夜彌甚衣被俱沾透焉二十八日晨雨不止衣濕難行俟炙衣而起終日雨涔涔也是日此處馬場人集頗盛市中所出者無他異物惟黃蠟與細笋為多乃煨笋煮肉竟日守雨黃草壩土司黃姓加御司銜乃普安十二營長官之屬十二營以歸順為首而錢賦之數則推黃草壩土地之逺則推步雄焉黃草壩東十五里為馬鼻河又東五十里抵龍光乃廣西右江分界西二十里為步雄又西五十里抵江底乃雲南羅平州分界南三十里為安障又南四十里抵巴吉乃雲南廣南府分界北三十里為豐塘又西二十里抵碧峒乃雲南亦佐縣分界東西南三靣與兩異省錯壤去普安二百二十里其地田塍中闢道路四達人民頗集可建一縣而土司恐奪其權州官恐分其利莫為舉者黃草壩東南由龍光笋口者恐板屯壩樓已上俱安龍土司地其土官自天啓初為部人所殺泗城以孫代署之八蠟者鄉俱泗城州地下田州乃昔年大道自安龍無土官泗城代署廣南以兵爭之據其大半道路不通實由於此按盤江自八達與羅平分界巴澤河格巴吉興隆那貢已上俱安隆土司地今俱為廣南有抵壩樓遂下八蠟者鄉又有一水自東北來合土人以為即安南衛北盤江恐非是安南北盤合膽寒羅運白水河之流已東南下都泥由泗城東北界經那永順出羅木渡下遷江則此東北來之水自是泗城西北界山箐所出其非北盤可知也于是遂為右江再下又有廣南富州之水自者格亦安隆土司屬今為廣南據者葛閬歷裏俱泗城地來合而下田州此水即志所稱南旺諸溪也二水一出泗城西北一出廣南之東皆右江之支而非右江之源其源惟北盤足以當之各不相紊也按雲南抵廣西間道有三一在臨安府之東由阿迷州維摩州本州昔置乾􅗂倒馬坡石天井阿九抹甲等哨東通廣南每哨撥陸凉衛百户一員軍兵十五名民兵十五名把守後州治湮沒哨悉廢弛見有府志可考抵廣南富州入廣西歸順下雷而出䭾伏下南寧此余初從左江取道至歸順而阻於交夷者也是為南路一在平越府之南由獨山州豐寧上下司入廣西南丹河池州出慶逺此余後從羅木渡取道而入黔滇者也是為北路一在普安之南羅平之東由黃草壩即此安隆壩之下田州出南寧者余初徘徊於田州界上人皆不可行而候無同侣竟不得行者也是為中路中路為南盤入粵之㑹然此三路今在阻塞南阻於阿迷之普富州之李沉見廣西小記歸順之交夷中阻於廣之蠶食田州之狂信北阻於下司之草竊八寨之伏莽既宦轍之不敢入亦啇旅之莫能從惟東路由沅靖而越沙泥多黎人之恐州為今人所趨然懷逺沙泥亦多黎人之恐且迂涉湖南又多歷一省矣黃草壩東百五十里為安籠所又東為新城所皆南與粵西之安隆泗城接壤然在黔曰籠在粵曰隆一音而各異字一處而各異其名何也豈兩名本同一字傳寫之異耶按安莊之東大路所經亦有安籠箐山與安籠所相距四百里乃逺者同而近者異又何耶大抵黔中多籠字粵中多用隆字如隆安縣之類故各從其地而不知地之相近其取名必非二也黃草壩著名黔西而居聚闤闠俱不及羅平州羅平著名迤東而居聚闤闠又不及廣西府此府州營堡之異也聞澄江府湖山最勝而居聚闤闠亦讓廣西府臨安府為滇中首郡而今為普氏所殘凋敝未復人民雖多居聚雖逺而光景止與廣西府同也迤東之縣通海為最盛迤東之州石屛為最盛迤東之堡聚寶秀為最盛皆以免於普禍也縣以江川為最凋州以師宗為最敝堡聚以南莊諸處為最慘皆為普所蹂躙也若步雄之龍儂爭代黃草壩之被閧於龍沙沙乃步雄龍氏之嶽安隆土司之紛爭於岑儂岑為廣西泗城儂為廣西府今廣南勢大安隆之地為占去八九矣土司縻爛人民乃其本性而紊極朝廷之封疆不可長也諸夷種之苦於土司縻爛真是痛心疾首第勢為所壓生死惟命耳非真有戀主思舊之心牢不可破也其所以樂於反側者不過遺孽煽動其人不習漢語而素昵夷風故勾引為易而遺孽亦非果有殷之頑田橫之客也第跳梁伏莽之奸藉口愚衆以行其狡猾耳所度諸山之險逺以羅平師宗界偏頭哨為最其次則通海之津通關其險峻雖同而無此荒寂再次則阿迷州之中道嶺沈家墳處其深杳雖同而無此崇隘又次則步雄之江底東嶺其曲折雖同而無此逼削若溪渡之餘莫如江底崖削九天塹嵌九地盤江朋圃之渡皆莫及焉粵西之山有純石者有間石者各自分行獨挺不相混雜滇南之山皆土峯繚繞間有綴石亦十不一二故環窪為多黔南之山則介於二者之間獨以逼聳見奇滇山惟多土故多壅流成海而流多渾濁惟撫仙湖最清粵山惟石故多穿穴之流而水悉澄清而黔流亦介於二者之間二十九日晨雨霏霏既飯辭主人行從街東南去半里繞東峰之南而北入其塢竚而回睇始見其前大塢開於南羣山叢突小石峯或朝或拱參立前塢中而遙望塢外南山橫亘最雄猶半與雲氣相氤氲此即巴吉之東障盤江而南趨者也塢中復四靣開塢西則沙澗所從來之道東則馬鼻河所從出之峽南則東西諸水所下巴吉之區北則今所入豐塘之路也計其地北與慶逺境為對南與富州為對西與楊林為對東與安籠所為對其遙對者直東則粵西之慶逺直北則四川之重慶矣入北塢又半里其西峯盤崖削石巖巖獨異其中有小水南來溯之北又二里循東峯北上踰脊稍降陟塢復上始見東塢焉共二里再上北坳轉而西坳中有水自西來出坳下墜東塢坳上豐禾被隴透之而西沿北嶺上西向行二里稍降陟北塢一里復西北上二里踰北坳從嶺脊西北行途中忽雨忽霽大抵雨多於日也稍降復盤涉其西坡岡左右時有大窪旋峽共五里踰西坳而下又三里抵塢中聞水聲淙淙然四山回合方疑水從何出又西北一里忽見塢中坎中墜如井此水之所入者矣從塢右半里又西北陟嶺半里透脊而出于是稍降從長峽中行西北三里復稍上始知此峽亦中窪而無下泄之道者也飯於路旁石上出嶺之西始見西塢中盤內皆嘉禾芃芃北有小山綰塢口廬舍懸其上曰豐塘東西南皆回峯環之水從西南二塢交注其間北向墜峽由塢東南降嶺循塢南盤南山北麓共二里北與綰口廬舍隔塢相對見路旁有岐南向入山疑為分岐之處過而復還始登見其內道頗大以為是再上路分為二西者既漸小南者又盤南山又疑為非往復數四莫可從問而塢北居廬相距二里餘往返既遙見南山有牧者急趨就之隔峰間壑不能即至忽有負木三人從前嶺下問之乃知其非隨之二里北出大路其人言分岐之處尚在嶺西此處南岐乃南塢小路之入山者大路在西塢入也然此去已不及黃泥河止可從碧峒托宿矣乃西向入塢有小水自西來路踰坡西上下而復陟三里踰坳坳不高而接兩山之間為南山過北之脊東水下豐塘西水合西西北流俱入馬鼻者脊西遙開塢直去循北嶺又西二里岐始西分沿北嶺西向出塢為普安州道橫度塢南陟嶺南上為亦佐道遂南度塢路漸微深茅覆水曲磴欹坡無非行潦緣之南上坡一里西南盤嶺角始望見北界遙山橫亘蜿蜒天末此即亦字孔西南東轉之脊從丹霞山東南迤邐環狗場歸順二營以走安籠所北界普安南北板橋諸水入北盤南界黃草壩馬鼻河諸水入南盤者也又西南入峽一里餘復南躋嶺巔一里得石磴由脊南轉其脊茅深路曲非此石道余復疑其悮矣循磴西下復轉而南曲折一里抵山麓其麓復開大塢西去塢雖大皆荒茅盤結絶無禾塍人煙于是隨山麓西行三里塢直西去路西南截塢行塢東北界巨嶺森削中環一􅊤員匝合沓令人有四靣芙蓉之想惟暝色欲合山雨復來而路絶茅深不知人煙何處不勝惴惴又西南一里穿峽脊而過其脊中平而夾甚逼出其西長峽西去南北兩界夾之甚遙其中一望荒茅而路復若斷若續上則重茅偃雨下則停潦盈蹊時昏黑逼人惟暗中躑躅三里忽聞犬聲繼聞人語在路南計已出峽口然已不辨為峽為坡亦不辨南向從何入又半里大道似從西北而人聲在南從莽中橫赴之遂陷棘刺中久之又半里乃得石徑入寨門則門閉久矣聽其舂聲遙號呼之有應者久之有詢者又久之見有火影出又久之聞啓內隘門聲始得啓外門入即隨火入舂者家炊粥浣足雖擁青茅而卧猶幸得其所矣既定問其地名即碧峒也為亦佐東北界問紅板橋何在即在此北峯之麓為黃草壩西界與此蓋南北隔一塢云徐霞客逰記卷六上欽定四庫全書徐霞客逰記卷六下明徐宏祖撰西南逰日記十雲南九月初一日雨達旦不休起觀兩界山已出峽口碧峒在西南山下其北山岡上即紅板橋為貴州界復去黔而入滇高枕一宵矣就火炊飯欲行主人言此去黃泥河二十里水漲舟莫能渡須少需之蓋是河東岸無居廬先有去者亦俱返候于此余見雨勢不止憚於往返乃掃剔片地拭木版為几匡坐敝茅中冷則與夷婦同就濕熖一茅之中東半畜馬西半主人之榻榻前就煨濕薪以㸑㸑北即所置几地也與榻相隔止一火夜則鋪茅以卧日則傍火隱几雨雖時止而簷低外濘不能舉首辨羣山也初二日雨仍達旦主人言今日漲愈甚舟益難渡明日為街子貴州為場雲南為街子廣西為墟候渡者多彼舟不得不至即豫亦同行也余不得已復從之匡坐如昨日就火煨粥日三啜焉枯腸為潤當午雨少止忽聞西嶺喊聲寨中長幼俱遙應而馳詢之則豺狼來負羊也幸救者傷而未死夫日中而凶獸當道余夜行叢薄中而徼幸無恐能忘高天厚地之靈佑哉碧峒在亦佐縣東百里蓋滇南勝境之界山南走東轉包明月所之南橫過為火燒鋪南山按滇南勝境乃分界山也而老脊尚在其東火燒鋪西嶺余前過明月所即平夷所詢土人言其水南下亦佐則明月所東火燒鋪西乃為分水之脊即轉為火燒亦字孔之南山東走而北轉經樂民所北繞歸順狗場之間而東南下安籠所入廣西泗城州境又東過思恩府北東峙為大明山而盡於潯州為黔鬱二江之界其滇南勝境之南所度火燒鋪南山者其峽中尚有明月水出焉界從其口東度兩分而已老脊從此分為兩支正支東由亦字孔南東北繞樂民所北而轉安籠所下泗城州旁一支南下東轉而黔滇之界因之南抵北峒又南至於江底又南盡於南盤之北焉是黔界越老脊之西南不以老脊為界而以南支為界也若以老脊則樂民所狗場營黃草壩俱當屬滇以老脊東行而黔隘小故裒滇益黔以補不足碧峒北與新城遙對南與栁樹遙對此地又滇凸而東者碧峒寨有民哨其西為民寨即余所栖者自黃草壩至此米價最賤一升止三四文而已初三日子夜寒甚昧爽起雨仍不止既飯出寨門路當從小岐南上山悮西從大石徑行初有塢西北去以為狗場道隨石徑西南轉二里東界石山南去塢轉而西隨之二里峽中禾遂盈壠望北山岸畔有四五家懸坡上相去尚一里而塢南絶遂乃莽蒼橫涉其塢而西北一里抵北山村麓有兩人耕於其下亟趨而問之尚隔一小溪其人輒牽牛避去余為停趾遂告以問道意其人始指曰往黃泥河應從來處此誤矣再問以悮在何處其人不告去乃返行泥塍間路倏斷倏續二里餘至前轉塢處猶疑以為當從南峽入方惆悵無路忽見塢邊一牧馬者呼之即碧峒居停主人也問何以至此蓋黃泥河之道即從碧峒後東南踰嶺乃轉西峽正與此峽東界石山南北相隔但茅塞無路故必由碧峒始得通行遂復二里餘返至碧峒西南傍其寨門東南踰嶺而下一里東南徑塢半里復上又半里又東南踰一嶺有峽自南西墜而路則直西出坳半里始下又半里抵西峽中遂由峽西行屢陟岡窪三里有石峰踞峽之中為當關之標由其北踰脊而下時密雲釀雨見細箐縈崖深杳叵測直豺虎之窟也惴惴西下一里度壑又二里忽有水自北峽出下嵌壑中繞東南而注是為黃泥河其河僅比瀘江水不濶而深不渾而急其源發於樂民所明月所經狗場至此東南與蛇場河即蛇床河同下江底而入盤江者也時有小舟艤西稍待之得渡遂西上坡一里半逾嶺坳有岐自東南峽底來為入小寨而抵板橋者乃知板橋亦四達之區也又西出峽見羣峰中圍一壑而北峯獨稍開即黃泥河所環共一里餘抵聚落中是日為市時已散將盡入肆覓飯主人婦以地濘天雨勸留莫前問馬場尚四十里度不能前遂停杖焉黃泥河聚落頗盛然皆草房其地四靣環山而北即河繞其後復東南帶之西又一小溪自西南峽來北注黃泥其中多盤塢環流土膏豐沃為一方之冠亦佐之米俱自此馬駝肩負而去前擬移縣於此至今稱為新縣而名亦佐為舊縣云初四日晨起雨止而四山雲氣勃勃飯而行西半里度一木橋其下溪流自南而北即西小溪也又西上坡轉而南溯流半里入西峽又半里轉而北其處又有北峽西峽二流之交焉于是隨北峽溪又溯流半里乃西上山時東峰雲氣稍開乃賈勇上躋仰見西嶺最高上皆夾坡削箐雲氣罩其頂不能悉上躋二里漸入濃霧中遂從峯頭穿峽上箐深霾黑咫尺不可見又一里陟其頂平行嶺上又二里乃下下一里及西塢陟塢而西一里度一小橋橋下水北流乃南向西轉一里有岐交其南北南乃入牛場村道有小峯駢立村隱其下焉北乃趨狗場營者又西半里乃西上山其坡峻且滑無石級可循有泥坎陷足升之極艱二里陟峯頭又平行峰頭一里越其巔時濃霧成雨深茅交道四顧迷漫如海得峯頭一樹如擎蓋下有列石如錯屛乃就樹踞石而憩止聞颼飀滴瀝之聲而目睫茫如也又西北平行一里下眺嶺西深墜而下而杳不可見嶺峙而上而出沒無常已從北下始有石磴陡墜箐木叢水共一里半陟塢而西亦中窪之宕也半里又踰西坳出其壑乃大開路乃稍平尖峰旁立若為讓道者西向平行塢中一里半有水橫瀦於前以為溪也涉之不流乃壑底中窪之坑蓄而成溪者又西二里復有一溪北流甚急波漲水深涉之沒股焉又西一里乃飯於峽坡之下既飯遂西入竹峽崇峰回合紆夾髙下深篁密箐䝉密不容旁入祗中通一路石徑逶迤如披重雲而穿密幄也其竹大可為管瀰漫山谷杳不可窮從來所入竹徑無此深密者其處名竹園箐自黃泥河西抵馬場人人捆負家家獻客皆此物也客但出鹽㵸之耳其中坡陀屢更三里踰峽南下其壑中開又為霧障止聞隔坡人語聲然不辨其山形谷勢矣南行壑中一里轉而西半里又越一坳又半里徑峽而西抵危坡下復西向躋磴上于是密箐仍縈夾壁懸峽間其陡削雖殊而深杳一如前也扳涉三里西踰嶺頭竹箐既盡循山南轉皆從嶺上行路東則屛峙而上路西則深墜而下然皆深霧所翳不能窮晰也南向平陟嶺上者三里轉而西行嶺脊者一里其脊南北俱深墜而下第霧漫莫悉端倪既而傍北嶺行北屛峙而南深墜又二里雨復大至適得羊場四五家當嶺頭遂入宿焉其家竹牀竹戶煨𣔻餉筍竟忘風雨之苦也初五日夜雨仍達旦不休飯而行遂向南稍下已漸轉西兩旁多中窪下陷之穴或深墜無底或瀦水成塘或枯底叢箐不一而足然路猶時時陟岡踰嶺下少上多也十里見路北有深箐有岐從箐中升合併西去有聚落當嶺頭是曰水槽其處聚落頗盛夾道成衢乃狗場營安籠所桃花大道所出但岡頭無田其上皆耕崖鋤隴祇堪種粟想稻畦在深坑中霧翳不見也升陟嶺頭又四五里是曰水井其聚落與水槽同由其西一里半始歷級磴而下遙望西塢甚深下箐中一里由峽底西行二里復踰坡而上一里稍下坡西塢中塢不深而回峯四闢霧倏開合日色山光逺近迭換亦山中幻景也既復西向踰嶺三里見嶺西窪中有水成塘乃循峯西北行積下一里而入亦佐縣東門城磚甃而城外草舍三四家城中亦俱草舍求瓦房寥寥也一里炊於縣前飯後半里出西門乃西北行計其地猶羣峯之頂但四山霧塞上下莫辨耳從嶺頭西北行二里乃西向歷峻級而下時霧影亦開遂見西塢中懸東界所下之山與西界崇峰並夾南北中闢深壑而拐澤河自北而南徑其中焉其形勢雖見而河流猶深嵌不可窺西山崇列如屛而南額尤髙雲氣尚平抹其頂不令盡露西山之南復起一山斜障而東此則障拐澤而東南合蛇床者也盤折西下三里抵坡而磴盡復西北行坡間一里踰岡再下有數家茅舍在焉然猶未瀕河流也又西半里涉一東來小水乃抵河岸溯之北又涉一東北來小水約半里有渡舟當崩崖下渡之是河發源於平彜衛及白水鋪以東滇南勝境以西皆注焉其勢半於江底而兩倍於黃泥河急流傾洞南奔東轉與蛇床合而東南㑹黃泥河水而為江底河者也亦佐羅平南北東西二處俱以此為界西登涯涯岸崩頽扳躋而上遂西向陟嶺時暮色將至始以為既渡即有托宿處而荒崖峻扳絶無一人登登不已暮雨復來五里遇一人趨渡甚急問之曰此無托宿處雞場雖遙亟趨猶可及也乃冒雨竭蹶轉向西南上五里踰坳而西乃轉北行峽中稍降二里而得數家之聚焉亟投煨𣔻暮色已合而雨復徹夜初六日晨起雨止四山猶氤氲不出既飯稍西下渡窪復西北上漸露昨所望屛列崇峯在西南而路盤其東北二里踰一岡坪間有墟地一方則雞場是也從坳北稍下又得數家之聚焉問之亦雞場也蓋昨所宿者為雞場東村此則雞場西村矣從村北行其峽西墜處有石峯屼立路從其北踰脊稍東轉而北陟塢共三里遂西北踰嶺盤折石磴西北上二里而其巔則夙霧頓開日景焕發東瞻羣峰吐穎衆壑盤空皆昨所從冥漠中度之者越嶺西下一里抵盤壑中見秋花懸隙細流縈磴遂成一幽異之境西一里有山橫披壑西透其西北腋似有耕雲樵石之栖在西峯後循其東南塢則大路所從去也乃隨塢南轉塢東西山分兩界余以為塢中水將南流而不意亦俱中窪之穴也南行三里復踰脊而上遂西轉盤橫披之南脊焉一里循橫披南崖而西其處山脊凑合岡峽縱橫而森石尤多娟麗又西一里有岐自東南峽來合同之又西一里乃轉北下于是西向山遙豁而路則循山西北向行矣四里復北向踰岡轉而西下望西北塢中有石壁下嵌不辨其底已而降行塢中一里餘又直造其下則亦中窪之峽也由其南又西行兩陟岡塢共三里始涉一南流小水自渡拐澤河至此俱行嶺上未見勺水又西踰一岡一里南望江南一峯西闢洞門高懸其門有木橫列而下隔一峽遙睇無路遂不及迂入又半里又涉一南流小水西踰一岡共二里而抵桃源村其村百家之聚與水槽相似倚北山而居前有深塢羅平之道自塢中東南來北東西三面俱㑹其水南墜入崖洞而南泄於蛇場江故知拐澤西岸崇山猶非南行大脊也村多木皮覆屋以代茅時日己午就村舍㵸湯餐飯而濕木難燃久之乃西向行渡西北峽石山小水一里陟西塢而上又一里踰岡而西見西塢自西而東其南有小山蜿蜒亦自西而東界之其山時露石骨崢崢然猶未見溪流也塢中雖漩窪成塘或滙成流或瀦濁水皆似止而不行者又西一里踰岡西下有村當塢倚南崖而居繞村西行始見塢中溪行曲折且聞溪聲潺湲矣由其北溯之西行又一里見塢中又有一村當塢而居始見溪水自西來從其村西環其村北又繞其東其村中懸其北曲中一溪而三靣環之南倚南山之崖北置木橋以渡其水不甚大而清徹不汩為清水􅗂云蓋發源於西山之回坎坡經此而東出於桃源始南去者也又西一里復過一村其村始在塢北又西一里經一村曰小板村有稅司在焉蓋羅平北境為桃花駝鹽之間道也又西二里始踰坡涉澗屢有小水自北峽來南注於清水􅗂路截而踰之也北峽中男婦二十餘人各捆負竹筍而出蓋土人羣而入箐採歸淡薰為乾以待鬻者又西二里直逼西山之麓有村倚之為回窞坡清水溝中居民夾塢至此而止以塢中有水可耕也由此西南半里過一小橋其水自西北沿山而來即清水溝上流之源矣度之即西上嶺嶺頭有索哨者不之與而過躡嶺一里半西陟嶺脊是脊始為分水之處乃北自白水鋪西直南度此回環西南而峙為大龜以分十八寨永安哨江底河諸𣲖者也而羅平之界亦至是而止焉踰脊西漸轉而西行塢中其塢東西直亘而南北兩界遙夾之南山卑伏而北山高聳暮雲復勃勃籠北峯上流泉亦屢屢自北注南第南山之麓似有墜澗橫其北然不辨其為東為西以意度之以為必西流矣塢中皆荒茅斷隴寂無人煙西行六里其西有山橫列塢口塢始墜而西下有茅舍兩三家依塢而栖路乃踰塢循北山而西半里有茅亭一龕當路旁南與茅舍對想亦哨守之處也又西一里稍下有小水成溪自北峽來小石梁跨之其水南注塢口而去既度梁即隨西山南向隨流半里轉而西上嶺暮色合矣又上一里而馬場之聚當嶺頭所投宿者乃新至之家百無一具時日暮不暇他徙煨濕薪卧濕草枕中就枕而已初七日晨起雲氣氤氲飯而行有索哨者還宿處解囊示批而去於是西北隨坡平下其路甚坦而種麻滿坡南蓋其下亦有塢西通者西馳四里始與溪近隨流稍南半里復循坡西轉又一里下坡西望西南塢中有數家之聚田禾四繞此溪徑塢環之其塢自北山隨坡南下有水自北而南與此水同㑹於村北合而西南破峽去乃西截北來塢半里抵北來之溪有新建石梁跨之為獨木橋想昔乃獨木今雖石而猶仍舊名也橋下溪流三倍於西來之水固知北塢之源逺於東矣踰橋西即此上嶺西向直躋甚峻一里半踰其脊又西向平下者一里有岐隨岡南去者陸凉道也岡西塢中復有數家焉亦陸凉屬也其塢亦自北而南雖有村而無流路西下截塢半里徑村北又半里抵西界崇山下遂躡峻而上而陸凉之界又西盡於此矣蓋因其水南下陸凉故西自此塢東抵回窞西山皆屬之陸凉其處南抵陸凉衛路經尖山天生橋相距尚八十里也由西嶺而上又為海崖屬乃亦佐縣右縣丞土司龍姓者所轄亦佐縣有左右二丞皆土司左丞姓沙在本縣即與步雄攻黃草壩者右丞姓龍或曰即姓海在此而居近越州其地東自此嶺而西抵箐口焉東與亦佐西界中隔羅平陸凉二州之地間錯其間不接壤也從東麓西上屢峻屢平峻者削崖盤磴平者曲折逶迤三峻而三踰嶺頭共七里望見南坪有數十家之聚北峯則危聳獨懸蓋自馬場而西即望見遙峯尖削特出衆峯之上而不意直逼其下也又一里梯石懸磴西北抵危峯前其時麗日轉耀碧天如洗衆峰盡出而是山最高不特獨木西峯下伏如砥即逺而回窞老脊亦不能上與之抗惟拐澤雞場西嶺遙相頡頏其中翡翠層層皆南環西轉而接於西南巨峯此東顧之極觀也其西則亂峯回罨叢箐盤錯逺雖莫抗而近多自障焉其南則支條直走近界既豁逺巘前環此獨木諸所遙帶而下泄者西南有二峯遙凑如眉中分此盤江之所由南注者耶其西即越州所倚而東峯之外復有一峯高懸其南浮青上聳員若團蓋此即大龜山之特峙於陸凉路南師宗彌勒四州之交者耶天南諸峯悉其支庶而此峯又其伯仲行矣由峯西踰脊稍下即有石坡斜懸平􅍥砥峙古木婆娑其上亦高崖所僅見者由此歷級西下一里有壑回環中窪四合復有中懸之臺平瞰其中夾坑之岡橫亘其外石㾗木䕃映彩流霞令人神骨俱醒由橫岡西南轉二里復踰一脊又西度一中懸之岡有索哨者不顧而去度岡而西一里復上坡又一里西踰其隘復有索哨者亦不顧而去想皆所云海崖土司者踰脊又不能西見盤江又西半里西障始盡下界遙開瞥然見盤江之流自西北注東南而去來猶不能盡矚焉西向拾級直下一里抵塢中又西半里循西山南轉半里復稍上踰岡西復平行嶺上半里有岐一直西下坑一西南盤嶺見西南路稍大從之一里得數家當嶺頭其茅舍低隘牛畜雜處其中男子皆出婦人莽不解語索炊具無有應者是即所謂箐口也海崖之界於此止焉由岡頭西南去為越州道從此西北下即越州屬為曲靖道遂西北下嶺始甚峻一里轉西漸夷皆車道平拓無齟齬之慮矣又西一里飯於樹下又西馳七里始有塢北來遂盤東山北轉一里始橫截北來之塢余始謂塢中當有流南注而不知其塢亦中窪也塢中橫亘一岡南北俱成盤壑而壑南復有岡焉從中亘者馳而西一里復西上坡又一里陟坡之脊從脊西下三里連越兩坡始見塢自北來向南去其中皆員窪注水有岡中間不流通焉從坡上西北望則龍潭之山自北分突屛列而西此近山也西南望則州越南嶺隔山遙障所謂西峯也而東峯之外浮青直對則大龜之峯正與此南北相凖焉西下坡又有一塢自北而南南環為大塢與東界連窪之塢合此塢始有細流中貫獨得夾塢成畦焉流上橫小橋西渡有一老持筐賣梨於其側一錢得三枚其大如甌味鬆脆而核甚小乃種之絶勝者聞此中有木瓜梨豈即此耶西上一同平行岡上四里直抵西峯下則有塢隨其麓而深澗瀠之所謂龍塘河也然但見澗形而不見水乃西下坡約半里隨塢出西南先與一小水遇隨之既乃截塢而西又半里始與龍塘河遇有大石梁跨其上橋右村廬纍纍倚西山而居始皆瓦房非復茅舍矣龍塘河之水發源於東北山峽中其處環潭甚深為蛟龍之窟即所謂曲靖東山之東峽也其山北自白水鋪西分水嶺分支南下亘曲靖之東故曰東山而由此視之則為西嶺焉南至此瀕河而止其西腋之中為䦘木山東腋之中為龍潭即此水之所出矣自箐口西下塢中即為越州屬至此西止而田疇悉環聚焉由村西上坡即東山之南盡處也二里踰岡頭方踞石少憩忽一人自西嶺馳來謂余曰可亟還下山宿前嶺方有盜劫人毋往也已而其婦後至所語亦然而仰視日方下午前終日馳無人之境皆豺狼魑魅之窟而深夜幸免豈此周行東西夾山而居者甚衆反有賊當道耶因詰之曰既有賊汝何得至其人曰彼方剝行者衣余夫婦得迂道來耳余疑此人欲誑余還宿故托為此言又思果有之今白日返宿明日又孰保其不至耶况既劫人彼必無復待之理不若即馳而去也遂叱顧僕行即從岡上盤北山而西蓋北即東山南下之頂南即其山下墜之峽而盤江自橋頭南下為越州後橫亘山所勒轉而東流遂截此山南麓而斷之故下皆岨峿路橫駕嶺上四里抵其中旁矚北嶺石參差而岫兀突覺雲影風枝無非惴人之具令人錯顧不定投指莫擇又西四里始西南下片石中其處土傾峽墜崩嵌交錯而石骨露其中如裂瓣綴行其墜處皆流土不可著足必從石瓣中宛轉取道其石質幻而色異片片皆英山絶品惟是風鶴驚心不能狎憩而徐賞之亡何已下見西塢南流之江知去橋頭不逺可免於虎口矣乃倚石隙少憩竟作青蓮瓣中人矣從石中下者一里既及西麓復行支隴遂多聚廬之居又一里路北江回堰曲中涵大塘一圍四面豐禾環之東倚精廬高倚東山之麓西則江流所泄而石梁橫跨之者也又行畦間半里始及石梁其梁不高而長是為南盤之源北自炎方交水曲靖之東直南至此是橋為曲靖鎖鑰江出此即東南流繞越州之東而南入峽焉踰梁而西約半里上坡北而宿於逆旅即昔之所過石堡村也適夜色已瞑明月在地過畏途就安廬樂甚問主人嶺上有禦人者果有之乎主人曰即余鄰人下午樵於山數賊自山後躍出剝三人衣而碎一人首與君來時相後先也余于是始凛然悚還欣然幸深感前止宿者之厚情而不當以私衷臆度之也蓋是嶺東為越州西為石堡乃曲靖衛屯軍之界互相推委盜遂得而乘之耳初八日昧爽飯復索酒而酌為浴泉計遂由村後越坡西下則溫泉在望矣塢中蒸氣氤氲隨流東下田畦間鬱然四起也半里入圍垣之户則一泓中貯有亭覆其上兩旁復磚甃兩池夾之北有榭三楹水從其下來中間一孔方徑尺可掬而盥也遂解衣就中池浴初下其熱爍膚較之前浴時覺甚烈既而溫調適體殊勝彌勒之太凉而清冽亦過之浴罷由垣後東向半里出大道是日碧天如濯明晶然騰翠微而出浩波映甚下對之覺塵襟蕩滌如在冰壺玉鑑中北行十里過南城又二十里入曲靖南門時有戈恭游者奉按君命巡諸城堡高幢大纛擁騎如雲南馳而去余避道旁視之如赫電亦如浮雲不知兩界青山見慣袒當誰左也飯於麵肆中出東門半里入東山寺是名青龍山而實無山郭東培塿高僅丈餘大不及五丈上建大殿前列層樓配之置宏鐘焉鐘之大余所未見也正殿之左有藏經閣殿之右有三層樓皆翼於培塿之旁而齊其末者徙倚久之出寺右循然而北五里出演武場大道又三里過白石江又二里過一坡又十里抵新橋殷雷轟然大雨忽至避茅簷下氷霰交加回風湧之撲人衣靣莫可掩蔽久之乃霽仍北行濘滑不可著足十里抵交水入南門由霑益州署前抵東門投舊邸龔起潜家見其門閉異之叩而知方演劇於內也余以足泥衣垢不樂觀優亟入其后樓而憩焉霑益惟土司居州治而知州之署則在交水初九日豫倦於行役憩其樓不出作數日游記是日為重九高風鼓寒以登高之候而獨作袁安僵卧之態以日日攀躋崇峻不少也下午主人攜菊具酌不覺陶然而卧初十日寒甚止寓中終日陰翳下午復有零雨既而徹夜不休十一日余欲行主人以雨留復為强駐厭其酒脯焉豫初欲從霑益併窮北盤源委至交水起潜為豫談之甚晰皆鑿鑿可據遂圖反轅由尋甸趨省城焉十二日主人情篤候飯而行已上午矣十里仍抵新橋遂由岐溯流西南行二里抵西南小山下石撞之水乃從西北峽中來路乃從西南峽中入一里登嶺一里陟其巔西行嶺頭者又一里乃下初從嶺頭下瞰西塢有廬有疇有水瀠之以為必自西而東注石幢者迤邐西下者又一里抵塢中則其水反西南流當由南谷中轉東而出於白石江者詢是村為戈家冲由是而西併翠峯諸澗之流皆為白石江上流之源矣源短流微瀠帶不過數里之內而沐西平曲靖之捷誇為冒霧涉江自上流渡而夾攻之著之青史為不世勳而不知與坳堂無異也徵事考實書之不足盡信如此于是盤折坂谷四里越劉家坡則翠峯山在望矣蓋此山即兩旁中界之脊南自宜良分支北度木容箐又北而度火燒箐嶺又北度響水西嶺又北而結為此山又西夾峙為回龍山繞交水之西北經炎方又北抵霑益州南轉東復折而南下峙為黑山分為兩支正支由火燒鋪明月所之間南走東折下安籠所入泗城州而東峙為大明山遂盡於潯州旁枝西南由白水西分水嶺又分兩支直南者由回窞坡西嶺西南峙為大龜山而盡於盤江南曲西南分支者盡於曲靖東山其東南之水下為白石江東北之水下為石幢河而西泄於馬龍之江而出尋甸為北盤江焉然則一山而東出為南盤西出為北盤惟此山及炎方足以當之若曲靖東山則旁枝錯出而志所稱悉悮也由劉家坡西南從坡上行一里追及一嫗乃翠峯山下橫山屯人也隨之又西一里乃下坡徑塢一里有小水自西北來小石梁跨之從此西南上坡為三車道從此直西溯小水西南岸入為翠峯間道其路若續若斷橫截塢壠三里有大道自東南來則自曲靖登山之徑也于是東南望見三車市矣遂從大道西行二里將抵翠峯下復從小徑西南度隴風雨忽至頃刻而過一里下坡涉深澗又西上坡半里抵橫山屯其屯皆徐姓老嫗命其子從村後送余入山半里抵其麓即有兩小澗合流涉其北來者溯其西來者遂躡峻西上一里半盤嶺頭而北轉入西峽中則山之半矣其山自絶頂垂兩支如環臂東下北支長則繚繞而前為新橋西岡之脉南支短即所躡以上者兩臂之內又中懸一支當塢若臺之峙則朝陽菴踞其上菴東北向其南腋又與南臂環阿成峽自峰頂逼削而下則護國舊寺倚其間自西峽入半里先達舊寺然後東轉上朝陽以舊寺前墜峽下塹也舊寺兩崖壁夾而陰森其病在旁無餘地朝陽孤臺中綴而軒朗所短在前少回環余先入舊寺見正殿亦整其後危崖回峭藤木倒垂於其上而殿前兩柏甚巨夾立參天寺中止一僧乃寄鍚殿中者一見即為余爇火炊飯余乃更衣叩佛即乘間而前東登朝陽一頭陀方曳杖出菴門余入其菴亦别無一僧止有讀書者數人在東樓余叩佛畢閒步前庭庭中有西番菊兩株其花大如盤簇瓣無心赤光燦爛黃菊為之奪艷乃子種而非根分此其異於諸菊者前樓亦幽逈庭前有桂花一樹幽香飄動逺襲山谷余前隔峽盤嶺即噴而異之以為天香遙墜而不意乃敷蕚所成也桂芳菊艷念此幽境恨無一僧可托還飯舊寺即欲登頂為行計見炊飯僧殷勤整餉雖瓶無餘粟豆無餘蔬殊有割指啖客之意心異之及飯則已不蔬而止以蔬奉客始知即為淡齊師也先是橫山屯老嫗為余言山中有一僧損口苦體以供大衆有豫衣者輒復豫人有餉食者已不鹽不油惟恐衆口弗適余初至此即訊之師不對余肉眼不知即師也師號大乘年甫四十幼為川人長於姚安寄錫於此已期年矣發願淡齊供衆而於此欲靜修三年百日始一下山其形短小而目有風癢之疾苦行勤修世所未有余見之方不忍去而飯未畢大雨如注其勢不已師留止宿余遂停憩焉是夜寒甚余宿前楹師獨正殿無具無龕徹夜禪那不休十三日達旦雨不止大乘師復留憩余見其瓶粟將盡囑炊粥為晨餐師復即另㸑為飯上午雨止恐余行復强余餐忽有一頭陀入視即昨朝陽入菴時曳杖而入者見余曰君尚在此何不過我我猶可為君一日供不必噉此也遂挾余過朝陽共煨火具餐師號總持馬龍人為曲靖東山寺住持避囂於此亦非此菴主僧也此菴主僧曰瑞空昨與舊寺主僧俱入郡瑞空歸而舊寺僧并不知返蓋皆蠢蠢世法佛法一無少解者大乘精進而無餘資總持靜修而能樽節亦空山兩勝侣也已而自言其先世為姑蘇吳縣籍與余同姓昔年朝海過吳門山塘徐氏欲留之放生池師不果而歸今年已六十三矣是夜宿其西樓寒更甚而夜雨復潺潺朝陽菴則劉九菴大師所開建者碑言師名明𤣥本河南太康人曾中甲科為侍御嘉靖甲子駐錫翠峰萬厯庚子有征播之役軍門陳用賓過此感師德行為建此菴后師入涅槃陳軍門命以儒禮葬於菴之東原土人言劉為侍御出巡案置二桃為鼠所竊劉窺見之佯試門子曰汝何竊桃門子不承嚇之曰此處豈𣸪有他人而汝不承吾將刑之門子懼刑遂妄承之問核何在門子復取他核以自誣劉曰天下事枉者多矣乃棄官剃髮于此山十四日雨竟日不霽峭寒砭骨惟閉門向火不能移一步也翠峯山在曲靖西北交水西南各三十里在馬龍西四十里秀拔為此中之冠曲靖者本唐之曲州靖州也合其地置府而名亦因之霑益州土知州安邊者舊土官安逺之弟兄終而弟及者也與四州烏撒府土官安孝良接壤而復同宗水西安邦彥之叛孝良與之同逆未幾死其長子竒爵襲烏撒之職次子竒祿則土舍也軍門謝命霑益安邊往諭水西邦彥拘留之當事者即命竒祿代署州事并以上聞後水西出邊奉旨仍掌霑益竒祿不得已還其位而竒祿有烏撒之援安邊勢孤莫助擁虛名而已然邊實忠順而竒祿狡猾能結當道歡今年三月何天衢命把總羅彩以兵助守霑益彩竟乘機殺邊并挈其資二千金去或曰彩受當道意指為竒祿地也竒祿遂復專州事當道俱翕然從之獨總府沐曰邊雖土司亦世臣也况受特命豈可殺之而不問故至今九月間霑益復杌􅑾不安為未定之局云下午飯後余伺雨稍息遂從朝陽右登頂西上半里右瞰夾中護國寺下嵌穽口左瞻岡上八角菴上踞朝陽後脅西眺絶頂之下護國後箐之上又有一菴焉前臨危箐後倚峭峯有護國之幽而無其逼有朝陽之嵦而無其孤為此中正地是為金龍菴時霏雨復來俱當岐而過先上絶頂又西半里踰北嶺望見後數里外復一峯髙峙上亦有菴曰盤龍菴與翠峯東西駢峙夾北塢而下即河橋石幢河之源也南向扳嶺脊而登遇一虛堂顔曰恍入九天又南上共半里而入翠和宫則此山之絶頂也翠峰為曲靖名峰而不著於統志如閬木之在東山與此隔海子而遙對然東山雖大而非正脉而此峯則為兩江之鼻焉余初見西塢與回龍夾北之水猶東下新橋而朝陽護國是峯東麓之水又俱注白石疑是峯猶非正脊及登頂而後知正南下墜之峽則南由響水岰西獨西下馬龍出尋甸矣始信是頂為三面水分之界東北二靣俱入南盤南靣入北盤其脉南自響水岰西平度而峙為此峯即西度盤龍其水遂南北異流南者從西轉北北者從東轉南兩盤之交錯其源實分於此云翠和頂高峯峭兩老僧閉門煨火四顧霧幕峰瀰略瞰大略由南塢西下為尋甸間道余擬明日從之去者遂東南下由靈官廟東轉半里入金龍菴菴頗整潔庭中菊數十本披霜含雨幽景凄絶是菴為山東老僧天則所建今天則入省為地藏寺而其徒允哲主之肅客具齊暝雨漸合遂復半里東還朝陽欲下護國看大乘師雨滑不能瞰之而過十五日達旦雨止而雲氣靉靆余復止不行日當午獻影余遂乘興往看大乘大乘復固留時天色忽霽余欲行而度不及姑期之晚過為明日早行計乃復上頂環眺四圍逺峯俱出始晰是山之脉俱東西橫列而脉從中度屢伏屢起非直亘之脊也惟翠峯與盤龍二峯乃東西並夾而翠峯之南響水岰之支橫列東下而結為曲靖盤龍之西又南曲一支始東下而結為交水又橫亘而北始東滙炎方之水又北始轉度霑益之南塢焉從峯南下又還過八角菴仍返餐于朝陽為總持所留不淂入護國是日以嚴江嵩明二處求兆于翠和靈籖嚴江淂貴人接引喜更新嵩明淂枯木逄春欲放花皆吉兆也竊計明日可早行既暮而雨𣸪合十六日阻雨十七日雨復達旦飯後欲行總持謂雨且復至已而果然已復中霽既乃大注傾盆倒峽更甚於昨十八日徹夜徹旦㸃不少輟前二日俱午刻朗然而此即閃爍之影一併無之而冷且更甚惟就榾𣔻作生涯不復問前程矣十九日晦雨仍如昨復阻不行榾𣔻閒談總持昔以周郡尊事逮繫桁楊甚苦因筆記之東山寺昔有藏經乃唐巡撫所請歸者郡守周之相石阡人由鄉薦擢守曲靖以清直聞慕總持師道行請之檢藏延候甚密迤東巡守以下諸僚皆有獨清之意而周復不免揚其波于是悉側目之中傷於撫臺王伉羅織無迹遂誣師往還為交通賄賂以經簏為筐篚坐以重贓周復代為完之而去云二十日夜不聞簷溜晨起而霧復成及午大霽逮暮而雨聲復瑟瑟達夜而更甚焉二十一日晦冥終日逮夜復雨是日下午散步朝陽東數十步東峽中一菴當峽是曰太平菴蓋與護國東西夾朝陽者太平老僧煮芋煨栗以餉二十二日晨起晦冥然决去之念已不可止矣待飯甚久上午乃行總持復贈之以米恐途中雨後一時無宿者耳既别仍上護國後夾箐中觀龍潭潭小而流不竭蓋金龍菴下夾壁縫中之液雖不竭而非涵瀦之窟也遂西上踰嶺循翠和宫之後一里餘又踰嶺而南下雨猶霏霏不已半里及塢中又一里有岐北轉悮從之漸入山夾則盤龍所登之道也仍出從大道西南行二里有村當塢中溪流自塢直南去路由村西轉北行半里又涉塢而西一里又有村在坡間是為高坡村由村後下岡有岐從塢中西南去為小徑可南達雞頭村從岡上西北轉為大徑乃駝馬所行者初交水主人謂豫有間道自尋甸出交水甚近但其徑多錯乃近日東川駝銅騎之所出無同之旅不可獨去須從響水走雞頭村大道及余不趨響水而登翠峯問問道於山僧俱云山後雖即駝銅道然路錯難行須仍出雞頭為便至是余質之途人亦多主其說然見所云徑路反大而所云往雞頭大路者反小甚心惑之曰以村人為卜然已過村見有村人自山中負薪來呼而問之則指從北不從南余乃從駝銅路轉西北循岡三里西北過一脊其脊乃自盤龍南度者余初以為分支南下而不意乃正脉之曲出坳西見脊東所上者甚平而脊西則下墜深曲脊南北又從嶺頭駢峯高聳各極嵯峨始意是山之脊又直折而南蓋自翠峯度其北去者此又度其南一脊而半日間兩度之矣從坳西隨南峰之上盤腰曲屈其坑皆深墜北向一里餘復躋一坡一里餘又北度一脊其脊平亘於南北之中者于是又一里再躋北嶺始西北下其時天色已漸霽無復晦暝之色逺峰近峽環矚在望二里下西塢其塢自南而北其中黃雲盤隴村落連錯一溪中貫之問其水之所從出則仍從新橋石幢河也問其所從來則堰口也問其地何名則兔街子也始信所過之脊果又曲而南過堰口當又曲而北余前登翠峯苐見其西過盤龍不至此又安知其南由堰口耶前之為指南者不曰雞頭即曰桃源余乃漫隨馬踪再歷龍脊逄原之異直左之右之矣下塢南行二里遂橫涉其溪中流湯湯猶倍於白石江源也又南上坡一里是為堰口聚落數十家在溪北岡上乃入炊久之飯而行陰雨復合其處有岐北入山為麥冲道余西向行其溪亦分岐來一自北峽一自西峽余渡其北來者遂西入峽天色亦漸霽四里從嶺上北轉則北峽之窮墜處又一里復踰嶺而西是嶺自木容箐楊金山北走翠峯復自盤龍南走高坡又南至此始轉而北其東西相距數里之內凡三曲焉余一日三過之何遇之勤而委曲之不遺耶從嶺西陟塢其水遂南流一里又北轉踰嶺一里西北下山二里抵塢中隨小水北向出峽始有塢成畦路當從畦隨流西去而塢北有村落當北岡上是為灑家想亦土酋之姓或曰亦屬平夷乃一里徑塢登岡由灑家西向行一里越隴西下有峽自北來小水從之是亦麥冲南來之道遂循其塢轉而西南行二里抵新屯廬舍夾道豐禾被塢其處為平夷之屯據土人言自堰口之北兔街子屯屬平夷而糧則寄於南寧自灑家之西抵三車屯屬平夷而糧則寄於馬龍自一碗冲之西抵魯石屯屬平夷而界則屬於尋甸蓋尋甸曲靖以堰口老龍南分之脊為界馬龍南寧以堰口老龍為界而平夷則中錯於兩府之交而為屯者也自屯西踰坡共一里餘過一塢有二三家在西嶺其塢復自北而南由村南轉而踰岡西南下二里復有一塢溪疇南環聚落北倚是為官保兒莊夾路成衢為村聚之最盛者此亦平夷屯官之莊也二十三日中夜聞隔户夜起者言明星烺烺雞鳴起飯仍濃陰也然四山無霧昧爽即行始由西南涉塢一里漸轉西行入峽平陟而上三里踰一坳脊遂西下兩上兩下兩度南去之塢兩踰南行坡脊而西共五里有村在西坡上是曰三車由其村後復踰南行一坡度南行一塢一里半披西峽而入峽中水自西而東溯之行半里漸盤崖而上崖南峽中箐木森鬱微霜乍染標黃叠紫錯翠鋪丹令人恍然置身丹碧中一里餘漸盤而北折下度盤壑更覺深窈一里又循西夾上一里又踰一脊為南行分脊之最逺者東西皆其旁錯也由脊西下涉塢再西共二里有峽甚逼隨峽西折而南行半里復西踰嶺半里出嶺西始見嶺北有塢居廬岡上為一碗冲而行嶺脊之上其嶺頗平南北皆塢而脊橫其中共一里陟脊西又南轉踰岡西下共一里度一峽想即一碗冲西向泄流之峽也又西北上坡其坡頗長一里陟其巔東望所度諸嶺如屛層繞而直東一峯浮青逺出恐尚在翠峯之外豈東山閬木之最高處耶北望乃其分脊處至是乃見回支環壑而南望則東南最豁此正老脊分支環於板橋諸處者不知此處何以反伏其脊其外亦有浮青特出逺甚當是路南市邑之間惟西則本支尚高不容外矚也由巔南循坡西轉半里西度脊從脊西向西北下塢約一里有溪始向西流橫二松渡之其溪從西峽去路循西北坡上一里復西踰脊環坡南下遂循之行一里轉而西下有塢自北來頗巨橫涉其西塍泥汚濘半里有大聚落在西坡下是為魯石哨其處已屬尋甸而屯者猶平夷軍人也由村南西上踰坡一里復踰岡頭轉而西南二里又西向踰脊從脊西下峽中半里峽北忽下墜成坑路從南崖上行南聳危巘北陷崩坑坑中有石幢則崩隤之餘也循坑西下半里有北來之塢橫度之又半里涉溪西上復西南上坡橫行坡上一里又西向入峽其南有峯尖聳北有峯駢立二里從南峯之北踰腋而西又一里始行北峯之南岡與北峯隔塢相對有村居倚北峯而懸塢北為郭擴始非平夷屯而為尋甸編户由其西南下坡半里涉小澗西登坡循西坡北行又與駢峯東西隔塢共二里北上瞰駢峯之陰遂西半里踰岡從岡上平行有中窪之坑當坑之南橫墜而西其西有尖峯純石而中突兩腋屬於南北若當關之標路行坑上一里出尖石峯之北腋遂西向而下一里抵西壑則尖石峯之西峯矣南界擴然直望有尖峯最高逺插天表余疑以為堯林山而無可徵也度壑西轉二里越小溪橋有村在北隴曰壁假由其西即扳嶺北上旋踰坳而西一里復下涉壑又南見天表高峰時已追及一老人問之果堯林也又西一里復入西峽躡峽而上半里踰嶺西西界遙山始大開望見南龍老脊自西南橫列而東北則東川尋甸倚之為界者也其脊屛峙天際而西南與東北兩頭各起崇峯其勢最雄亦最逺從屛峙之中有分列一支自西北走東南若八字然其交分之處山勢獨伏而尋甸郡城正托其坳中由伏處入為東川道西踰分列之脊為嵩明并入省道循分列東麓而南為易龍道楊林之水繞堯林之東馬龍水由中和北轉同趨而北皆隨此分列之山而合於其東者也但溪流猶不可見而郡南海子則汪然可挹從此西下坡峻嶺豁一下二里抵其峽中有小水亦南行隨之西南又半里北塢回環中有村廬當坡曰海桐由其南西度塢復上岡一里抵岡頭隨岡南下轉而西共二里有塢自北來溪流隨之內有村當塢曰果壁外有石堰截流路由堰上涉水而西從平坡上行二里稍下有村倚坡之西曰栁塘坡盡畦連北抵回峯西踰江而及郡南接海子皆禾稻之區而村落相望矣從畦塍西行又二里則馬龍之溪自東南峽出楊林之溪自西南峽出夾流而北至此而合石梁七洞橫架其上曰七星橋其自南而北為北盤之上流正與石堡橋之流自北而南為南盤之上流勢正相等但未及曲江橋之大也過橋有廟三楹東向臨之中有舊碑或言去郡城十五里或言三十里或名為江外河或名為三坌河無定里亦無定名而一統志又名其溪為阿交合溪又注舊名為些丘溢𣲖江名其橋為通靖橋然注其橋曰城東二十里跨交合溪注其溪曰府東南十五里合流又自異焉按舊城在今城東五里今城築於嘉靖丁亥安銓亂後則今以十五里之說為是乃屢詢土人皆謂其流出東川下馬湖無有知其自霑益下盤江然一統志曰入霑益後考之府志其注與一統同參之龔起潛之說確而有據不若土人之臆度也間有謂自車翁江下馬湖其說益訛亦可見此水之必下車翁車翁之必非馬湖矣蓋車翁之去交水不逺起潛之諳霑益甚真若車翁之上不折而西趨馬湖則車翁之下必折而北出三板橋則起潜之指示可知也由江西岸北行半里隨江折而西循江南岸依山陟嶺又二里餘江折而北踰嶺頭折而南下半里由塢中西行循鳳梧南山之麓矣按鳳梧山者在郡城東北十里山脉由郡西外界老脊排列東突為是山西北一峯員聳東南一峯斜騫為郡中主山阿交合溪自東夾逼其麓轉而東北入峽去若避此山者是老龍東北行之脊也一統志無其名標月狐山在城東北八里環亘五十餘里以舊城計之當即此山第府志則月狐鳳梧並列似分兩山然以山形求之實無兩山分受也豈舊名月狐後訛狐為梧因訛月為鳳耶共西三里南望壑中海子水不甚大而零滙連珠蓋郡城之流東南下楊林之川南來相距於壑口而不相下遂瀦而成浸者坡南下處石骨漸稜稜露竒又一里行石片中下忽有清泉一泓自石底溢而南出其底中空泉混混平吐清冽鑑人眉宇又西數步又有泉連瀦成潭乃石隙回環中下溢而起汛汛不竭亦溢而南去此潭員若鏡而無中空之隙不知水從何出然其清冽不若東泉之碧瑩無􅊏翳也按郡志八景中有龍泉雙月謂郡城東十里有雙泉相去十數步月夜中立其間東西各見月影中逗以余觀之泉上石環樹罩雖各涵明月恐不移步而左右望中未必能兼得也又西半里有聚落倚山靣􅊤是為鳳所土人謂之馬石窩想未置所時其舊名然耳于是西北隨田塍行坡隴間時有聚落而不甚盛按郡志舊郡址在今城東五里不知何村足以當之共西三里有溪流自北塢來中貫田間有石梁跨之越之西行又三里復有溪自北塢來亦貫田間而石梁跨之此即所謂北溪也以在郡城之北為最近乃城西坡與鳳梧夾腋中出者越梁又西行一里入尋甸東門轉而南停屐於府治東之旅肆尋甸昔為土府安氏世長之成化間始改流至嘉靖丁亥安之裔孫安銓者作亂搆武定鳳廷文攻毁楊林馬龍諸州所當道奏發大兵殱之并定改流乃移尋甸郡於舊治之西五里直逼西山下始築城甃磚為雄鎮云按鳳廷文或又稱為鳳繼祖或又稱為阿鳳或又稱為鳳顯祖自改為鳳廷霄或又云本江西人贅武定土官婦遂專恣乘搆作亂以兵直逼㑹城後獲而磔之尋甸四門俱不正蓋因山勢所就也東門偏於北南門偏於東西門偏於南惟北門差正而又非經行之所城中惟街二重前重乃府與所所蒞後重為文廟城隍察院所倚其向俱東南尋甸城直東與馬龍對直西與元謀對直南與河口對直北與東川對其西北皆山其東南大豁二十四日余初欲行偶入府治觀境圗出門左有肆中二儒冠者問圖志以有板可刷對余辭以不能待已而曰有一刷而未釘者在城外家中索錢四百余與之過半既而曰須俟明晨乃得余不得已姑需之聞八景中有北溪寒洞在東門外北山之下北溪水所從出也因獨步往探之遍詢土人莫有識者遂還步城內後街入儒學城隍廟下午還寓作記是日晴而有風城中市肆與廣西府相似賣栗者以火炙而賣之二十五日晨起索志觀之非全本也考所謂阿交合溪之下流所載正與一統志同惟新增鳳梧山雙龍潭之類而已仍畀還之飯而行出西門即上西山峻甚五里逶迤躡其頂則猶非大龍之脊也其脊尚隔一塢西南自果馬山環界而北乃東度而為月狐從其北度之坳又南走一支橫障於東即此山也志稱為隱毒山謂山下有泉為隱毒泉蓋是山之西與老龍夾而中窪內成海子頗長而深是山之東有泉二𣲖一出於北今名為北溪一出於南脫數字而是山南北俱屬於大脊焉由其西向東南下二里抵塢中有小坑瀦汚流不甚大也西度塢一里半有草房數間倚南坡上有黑土坡哨前有岐西北由塢中行為潘金魏所道西南上坡為正道余乃涉坡一里復南踰其岡岡頭多眢井中陷草莽翳之或有聞水聲潺潺者越岡南行二里餘乃下坡遂與西海子遇其水沉碧深泓直潄東山之麓路既南臨水湄遂東折而循山麓行南向二里見其水汪汪北轉環所踰眢井之岡南抵南岡東逼山麓而西瀕所聚焉蓋惟西北二靣大脊環抱可因泉為田而三所屯托之所謂潘所金所魏所也乃土官三姓三所在海子西與余所循之山麓隔水相望是水一名清海子一謂之車湖水瀕山麓清徹可愛然涸時中有淺處可徑而南也今諸山岡支瞰其間湖水紆折回抱不啻數十里一統志謂四圍皆山者是謂周廣四里則不止焉想從其涸時言也又南一里東踰一瞰水之岡又陟潄水之坡南向一里海子南盡遂西南踰岡而行岡不甚峻而橫界於東西兩界之間皆廣坡漫衍由其上南行四里稍南下忽聞水聲已有細流自岡西峽墜溝而南矣有數家在西山下為花箐哨始知其岡自西界老脊度脉而東峙為東界北走而聨屬於鳳梧之西坳為隱毒山中環大窪而清海子瀦焉南走綿聳於河口之北崖為堯林山前挾交溪而果馬水入焉不陟此岡不知此脉乃由此也于是隨水南行皆兩界中之坂隴也或涉西委之水或踰西垂之坡升降俱不甚高深而土衍不能受水皆不成畦然東山逶迤而不峻西山崇列而最雄路稍近東山而水悉溯西山而南焉則花箐諸流之下泄於果馬溪者又楊林之源矣南行二十五里始有聚落曰羊街子其西界之山至是始開峽重巒兩叠凑列中有懸箐焉由此而入為果渡木朗乃尋甸走武定之間道蓋西界大山北向一支自西南橫列東北起障最高如重蓋上擁南向一支亦自西南橫列東北排巒稍殺如外幔斜騫雖北高南下而其脉實自南而北叠而中一箐為叢薄為中道之隙焉曰果馬山而南北之水由此分矣幸羊街子居廬頗聚又有牛街子在果馬溪西大山下與羊街子俱夾水之市皆木密所分屯於此者蓋花箐而南至此始傍水為塍耳時方下午問前途所宿必狗街子去此尚三十里恐行不能及途人皆為勸止遂停憩逆旅草紀數則薄暮雨意忽動中夜聞潺潺聲二十六日晨起飯後雨勢不止北風釀寒殊甚待久之不得已而行但平坡漫隴界東西兩界中路從中而寒雲氣充塞兩山漫不可見而寒氣從後擁雨而來傘不能支寒砭風刺兩臂僵凍痛不可忍十里稍南下有流自東注於西始得夾路田畦蓋羊街雖有田畦以溪傍兩山田與路猶東西各别耳渡溪南復上坡二里有聚落頗盛在路右曰間易屯又北一里半南岡東自堯林山直界而西西抵果馬南山下與果馬夾溪相對中止留一隙縱果馬溪南去溪岸之東山阻溪不能前遂北轉溯流作環臂狀又有村落倚所環臂中東與行路相向詢之土人曰果馬村從此遂上南岡平行岡嶺二里為尋甸雲南之界蓋其嶺雖不甚崇自南界橫亘直凑兩峯約十餘里橫若門閾平若堵墻北屬尋甸南屬嵩明由此脊而分焉稍南路左峯頂有菴兩重在松影中時雨急風寒急趨就之前門南向閉不可入從東側門一老僧從東廡下煨𣔻見客殊不為禮禮佛出將去之一㸑下僧號德聞出留就火薪不能燃遍覓枯槎焙之就炙濕衣體始復蘇煨粟㵸茶腸始回溫余更以所㩦飯乘沸茶食之己午過矣零雨漸收遂向南坡降三里抵坡下即楊海子之西塢也其處遙山大開西界即嵩明後諸老龍之脊東界即羅峯公館後分支為翠峯祖脊相對夾成大壑海子中滙焉其南楊林所城當鎖鑰其北堯林山扼河口海東為大道所經海西為嵩明所履但其處竹樹漸密反不遑逺眺大道東南去乃狗街子道岐路直南去為入州道余時聞有南京僧在狗街子大道之中地名大一半村者欲往參之然後入州乃從岐道下竹坑間行一里有大溪自西北環而東注即果馬溪之循西山出峽至是放而東轉者有橫木梁跨石洑上洑凡三砥木三跨而達涯之西其水蓋與新橋石幢河相伯仲者也既渡即平疇遙達村落環錯西南直行六里而抵州由塍中東南向遵小徑行二里過小一半村又一里有大路自東北走西南是為狗街子入州之道道之北即為大一半村道之南即為玉皇閣入訪南京師已暫栖州城某寺其徒初與豫言後遂忘之南京僧號金山余遂出從大道西南入州二里又有溪自西而東向注其水小於果馬之半而頗急石卷橋跨之越而西南行乃濘陷殊甚自翠峯小路來雖久雨之後而免陷淖之苦以山徑行人少也一入大路遂舉步艱甚所稱蜀道不在重崖而在康莊如此人三里直抵西山下轉而西南又一里而入嵩明之北門稍轉東而南停於州前旅舍問南京僧忘其寺名無從覓也二十七日密雲重布雖不雨不霧而街濕猶不可行豫抱膝不下樓作書與署印州同張拒不納又以一刺投州目管雖收而不即答先是州使君為吾郡鈕藩武進鄉薦余初入滇已升饒州别駕至是東其轅及月矣二倅皆南都人余故以書為庚癸呼不謂張之扞戾乃爾始悔彈鋏操竽之拙也是日買得一野鳬烹以為供二十八日晨起濃雲猶鬱勃惟東方已開余令肆婦具炊顧僕侯營倅回書余乃由州署西踐濕徑北抵城隍廟其東為察院其中北向登山數級右為文廟左為明倫堂尊經閣天色大霽四山盡出始全見海子之水當其前是海子與楊林共之即一統志所云嘉利澤也以果馬巨龍江及白馬廟溪之水為源而東北出河口為北盤江之源者也由中路再上抵文廟之後夾衢西入與文廟前後並峙者為宗境寺寺建於唐天祐中寺古而宏寂踞蛇山之巔今謂之黃龍山山小而石骨稜稜乃彌雄山東下之脉起而中峙如錐州城環之為州治之後山者也昔多小黃蛇故今以黃龍名之登此則一州之形勢盡在目中矣嵩明舊名嵩盟一統志言州治南有盟蠻臺故趾昔漢人與烏白蠻會盟之處而今改為嵩明焉州城亦因山斜繞門俱不正其向與尋甸相似嵩明正北由大山峽口入竟日而通普岸嚴章為尋甸西境正南隔嘉利澤與羅峰公館對為楊林北境正東為堯林山踞河之北為下流之砥正西踰嶺為舊邵甸縣其北之梁王山為老龍分支之處領挈衆山為本州西境與尋甸富民昆明分界者也嵩明中環海子田澤沃美其西之邵甸南之楊林皆奧壤也昔皆為縣而今省去楊林當大道今猶存所焉出寺下山還飯於店而管倅回音不至余遂曳杖出南門轉而西半里抵塔下大道東南由楊林去余時欲由兔兒關乃西南行一里有追呼於後者則管倅以回柬具程命役追至而程猶置逆旅寓中因令顧僕返取余從閒道北向法界寺待之法界寺者在城西北五里亦彌雄山東出之支突為崇峯者也路當從西門出余時截岡踰隴下度一竹塢二里而北上山躡坡盤級而上二里踰一東下之脊見北塢有山一支自頂下垂而殿宇重叠直自峯頂與峰俱下路有中盤坳中者有直躡峯頂者余乃竟躡其頂一里及之西望峯後下有重壑壑西北有遙巘最高如負扆挈領擁列回環瞻之甚近余初以為嵩明之冠而不知其即梁王之東面也轉而東峯頭有𤣥帝殿冠其頂其門東向余入叩畢問所謂南京師者仍不得也先是從城中寺觀覓之不得有謂在法界者故余復迂途至而豈意終莫可踪跡乎由殿前東向下歷級甚峻半里得玉虛殿亦東向仍道宫也兩旁危箐回合其境甚幽再上出天王殿又下半里有一菴當懸岡之中深竹菴門重泉夾谷幽寂窈窕惜皆閉户無一僧在又下始為法界正殿先入殿後懸臺之上其殿頗整有讀書其中者而主僧仍不在乃下禮佛正殿甫畢而顧僕亦從塢中上東廡有僧出迎詢知南京師未嘗至而仰觀日色尚可行三十餘里遂詢道於僧更從北徑為邵甸行蓋楊林為大道最南而迂兔兒為中道最捷而坦邵甸為北道則近依梁王最僻而險余時欲觀其挈領之勢遂取道焉由寺前西南轉竹箐中隨坳而南一里踰東南之岡出向所來道遂南下山一里抵山下有塢自西北來即前嶺頭下瞰重壑之第一層也由其南橫度而西南二里過一村村南始畦塍相屬隨塍南下西行畦中一里餘望見北岡垂盡處石崖駢沓其東有村廬倚岡上為靈雲山西有神宇臨壑為白馬廟神宇之西有塢自北山回環而成峽有大溪自峽中東注而出即前嶺頭遙瞰之第二層也其壑西南始遙逼梁王最崇峯之下蓋梁王東突聳懸中霄北分一支東下為靈雲峯即白馬所倚再分北一支東峙為法界寺法界北壑雖與梁王對夾而靈雲實中界焉故梁王東麓之溪瀠注俱從此出也其流與東山之巨龍江相似東西距州城逺近亦相似也溪無橋涉之即西上坡始余屢詢途人言渡溪而西必宿大村大村之東皆層岡絶嶺漫無村居問去村若干里曰三十余仰觀日色當已不及而土人言不妨速行而至再問皆然遂急趨登坡一里有負戴而來者再問之曰無及矣不如返宿為明晨計余隨之還仍渡溪入白馬廟廟敞甚不堪托宿乃東過駢沓石崖從村廬之後問宿於平雲山僧是菴名梵虛僧雖不知禪誦而接客有禮得安寢焉二十九日晨起碧天如洗亟飯仍半里渡溪躡西坡而上迤邐五里逾岡脊東望嘉利澤猶在足下西瞻梁王絶頂反為近支所隱不可見計其處正當絶巘之東此即其支岡也岡頭多中陷之坎枯者成眢井瀦者成天池稍西北盤岡一里復西南下一里度中窪之底復西北上遂行山南嶺坡間二里復西南下塢中其塢自西北崇中來中有流泉頗急循塢西崖東墜此梁王山東南之流也有岐路直自塢外東南來直西北向梁王山東腋去此楊林往普岸嚴章徑余交截之而西半里渡西崖急流復西北躡岡上其上頗峻一里躡峯頭已正當梁王山之南矣西向平行嶺頭一里又西下半里塢有小水猶東南流也一里徑塢又西上踰嶺半里復下其嶺南北俱起崇峯夾之水已西南行余以為過脊矣隨之下一里行峽中轉而南一里又有水自西北來同墜壑東注而下嘉澤始知前所過夾峯之脊猶梁王南走之餘支也越水復西北躡峻而上一里半抵峯頭則當梁王山之西南矣是峯西南與南來老脊又夾坑東北下嘉利澤是峯東北與梁王主峯亦盤谷東下嘉利澤從脊上平行而西一里餘出西坳半里始見其脉自南山來者從此脊之西北下伏而再起遂矗峙梁王焉梁王山者按志無其名余向自楊林西登老脊已問而知之云邵甸東北故余取道再出於此正欲晰其分支界水之源也然志雖不名梁王其注盤龍江則曰源自故邵甸縣之東山西山則指此為東山矣其注東葛勒山則曰在邵甸縣西北髙三十里為南中名山逺近諸峯高無踰此則所謂三十里者又指此為東葛勒山矣但土人莫諳舊名因梁王結寨其頂遂以梁王名之志無梁王名未嘗無東葛勒名也其脉自澄江府羅藏山東北至宜良分支東北走者為翠峯之支正支西北走者由楊林西嶺而北度兔兒關又北度此而高聳梁王山橫亘於邵甸之北其東西兩角並聳東垂下臨白馬溪之西西垂下臨牧養澗之東由西垂環而西南為分支則文殊商山之脉所由衍也由東垂走而東北為正支則果馬月狐之脊所自發也西垂曲抱而盤龍之源遂濬滇海東垂橫夾而嘉利之𣲖遂滙北盤宜其與羅藏雄對南北而共稱梁王云過脊即漸西降西瞰夾塢盤窩皆豐禾芃芃不若脊東皆重岡荒磧也一坡西垂夾塢中上皆側石斜臥從其上行二里始隨坡下墜一里及塢有小溪自東南塢中出越之西行又半里有村聚在南山下皆瓦房竹扉山居中之最幽而整者是曰大大村始東西開塢梁王山西南之水由塢北西注余所越南塢之水截塢而從之半里越村之西又開為南北之塢有小水自南來經西岡下同破西北峽而下墜當西出於邵甸之北者也路越南來小水遂西南上坡盤塢而上約里許越其巔又西下半里西南度塢其塢自南流者一里又西踰坡脊平行坡上又西一里餘始見西塢大開其塢自北而南闢夾甚遙而環峯亦甚密塢中豐禾雲麗村落星羅而溪流猶僅如帶若續若斷焉于是陟降西麓半里抵塢有村倚麓西而廬是曰甸頭村即邵甸縣之故址也是村猶偏於塢東塢北有峰中垂亦有聚廬其上其地去嵩明州四十里重巒中間另闢函蓋正北則梁王正脊亘列於後東界則老脊之北走者西界則分支之南環者其西北度處有坳頗平是通牧養東北循梁王山東垂而北是通普岸嚴章西踰嶺通富民縣即所從來者惟南塢最逺北自甸頭十里至甸尾塢中之水南至甸尾折而南去路亦踰山而西遂為嵩明昆明之界焉余既至甸頭村即隨東麓南行一里有二潭瀦東崖下南北相並中止有岸尺許橫隔之岸中開一隙水由北潭注南潭間潭大不及二丈而深不可測東倚石崖西瀕大道而潭南則祀龍神廟焉潭中大魚三四尺汛汛其中潭小而魚大且不敢捕以為神物也甸頭之水自北來流於大道之西潭中水自潭南溢流大道之東已而俱注於西界之麓合而南去路則由東界之麓相望而南塢中屢過村聚八里有小水自東峽出西入於西麓大溪踰之南二里則甸尾村橫路甸南之坡有岐直南十里通兔兒關正路則由村西向行一里餘直抵西界之麓有石梁跨大溪上踰之始隨西麓南行半里溪水由西南盤谷而入路西北向踰嶺一里登岡頭一里下嶺西塢中路復轉西南行大溪尚出東南峽中不相見也蓋其東老脊南自宜良經楊林西嶺度而北一經兔兒關其西出之峯突為五龍山則挾滙流塘之水而出松花壩者也再北經甸尾東其峰突為祭鬼山則挾邵甸之水而西出滙流塘者也西越塢脊四里隨西下一里又有水自北峽來有梁跨之其勢少殺於甸尾橋下水有村在梁之西是為小河口即牧養之流南經此而與邵甸之水合而出滙流塘者也過村西南上嶺盤折山坡者七里中有一窪之窞既而陡下峽中有小水自西北峽來渡之村聚頗盛村之南則邵甸之水已與小河口之流合而西向出峽至此復折而南入峽中是為滙流塘其瀠洄之勢可想也從此由西岸入峽其峽甚逼夾翠駢崖中通一水路亦隨之落照西傾窈不見影曲折四里有數家倚溪北岸為三家村投宿不納蓋是時新聞迷不順省中戒嚴故昆明各村俱以小路不便居停為辭余强主一家久之乃為構火炊粥啓户就榻焉十月初一日晴爽殊甚凌晨從三家村啜所存粥即西由峽中行已乃與溪别復西踰嶺共三里而入報恩寺仍轉東二里而過松花壩橋又循五龍山而南三十里經省城東北隅南行已乃轉西度大橋則大溪之水自橋而南經演武場而出火燒橋下南壩矣從橋西入省城東門飯於肆出南門抵向所居停處則吳方生出遊歸化寺未返余乃坐待之抵暮握手喜可知也兄有晋寧王可程以就醫隨吳來始知方生在唐晋寧處過中秋甚洽也徐霞客遊記卷六下
